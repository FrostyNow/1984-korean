 ESA_The_Perpetual_War:0 "The Perpetual War"
 ESA_The_Perpetual_War_desc:0 "\n\n\n\n£GFX_ESA_The_Perpetual_War_Banner\n\n\n\n\n\n\n§WEast Asia has remained in perpetual warfare by choice as victory is not the end goal. The continuation of the war is of utmost importance to the upper echelons of the Party\n\nControl of the masses is paramount to the functioning of society and constant warfare is one of the many ways the state exerts its control over the people. By constantly villainising the enemy, whether they be the False Socialists of Oceania or the Neo-Bolsheviks of Eurasia who have lost their way, we can keep the attention of the masses away from the inner affairs of the state, ensuring the continued survival of our current order.§!"
 ESA_Memories_Of_The_Eternal_President:0 "Memories of the Eternal President"
 ESA_Memories_Of_The_Eternal_President_desc:0 "\n\n\n\n£GFX_ESA_Memories_Of_The_Eternal_President_Banner\n\n\n\n\n\n\n§WComrade Kim Il Sung is the Eternal President of East Asia who has since ascended to the heavens after achieving the obliteration of the self to its core.\n\nIn his absence, his son Kim Jong Il has continued his father’s work under the guidance of the heavens where the Eternal President resides. The Story of the Eternal President’s Journey of becoming one with the heavens has inspired the masses to continue their path of self-obliteration in the hopes of joining the Eternal President. The Eternal President guides you from above, helping you serve the party and the state in accordance with your ability.\n\nAnd eventually, you too shall become one with the Eternal President and the Heavens.§!"
 ESA_Memories_Of_The_Eternal_President_Two:0 "Memories of the Eternal President"
 ESA_Memories_Of_The_Eternal_President_Two_desc:0 "\n\n\n\n£GFX_ESA_Memories_Of_The_Eternal_President_Banner\n\n\n\n\n\n\n§WComrade Kim Il Sung is the Eternal President of East Asia who has since ascended to the heavens after achieving the obliteration of the self to its core.\n\nIn his absence, his son Kim Jong Il has continued his father’s work under the guidance of the heavens where the Eternal President resides. The Story of the Eternal President’s Journey of becoming one with the heavens has inspired the masses to continue their path of self-obliteration in the hopes of joining the Eternal President. The Eternal President guides you from above, helping you serve the party and the state in accordance with your ability.\n\nAnd eventually, you too shall become one with the Eternal President and the Heavens.§!"
 ESA_Chondoist_Revision:0 "Chondoist Revision"
 ESA_Chondoist_Revision_desc:0 "\n\n\n\n£GFX_ESA_Chondoist_Revision_Banner\n\n\n\n\n\n\n§WChondoism at its core places the heavens as the ultimate truth and the leader as the interpreter and executor of said truth. The party therefore is only second to the heavens in authority and their word is absolute and final.\n\nHowever, some have called this line into question, spreading falsehoods about the faith in an act of defiance to the state and the heavens. These revisionists pose the greatest threat to East Asia and must be obliterated before their lies become truth. The faith will always be what the party and heavens determine it to be despite the cries of the proselytisers.§!"
 ESA_Chondoist_Revision_Two:0 "Chondoist Revision"
 ESA_Chondoist_Revision_Two_desc:0 "\n\n\n\n£GFX_ESA_Chondoist_Revision_Banner\n\n\n\n\n\n\n§WChondoism at its core places the heavens as the ultimate truth and the leader as the interpreter and executor of said truth. The party therefore is only second to the heavens in authority and their word is absolute and final.\n\nHowever, some have called this line into question, spreading falsehoods about the faith in an act of defiance to the state and the heavens. These revisionists pose the greatest threat to East Asia and must be obliterated before their lies become truth. The faith will always be what the party and heavens determine it to be despite the cries of the proselytisers.§!"
 ESA_Songun_Principle:0 "Songun Principle"
 ESA_Songun_Principle_desc:0 "\n\n\n\n£GFX_ESA_Songun_Principle_Banner\n\n\n\n\n\n\n§WSongun is the military-first policy of East Asia, prioritising the Asian People's Army in the affairs of state and allocation of resources. Songun as a principle guides political and economic life in East Asia, with Songun politics dominating the political system.\n\nSongun elevates the Asian People's Army within East Asia as an organisation and as a state function, granting it the primary position in the East Asia government and society. It guides domestic policy and international interactions. It is the framework for the government, designating the military as the supreme repository of power. The state grants the Asian People's Army the highest economic and resource-allocation priority and positions it as the model for society to emulate.§!"
