 ESA_Industrial_Specialisation:0 "Industrial Specialisation"
 ESA_Industrial_Specialisation_desc:0 "\n\n\n\n£GFX_ESA_Industrial_Specialisation_Banner\n\n\n\n\n\n\n§WThis province is focused on urbanisation and industrial production. Provinces that focuses on industrial and urban projects tend to be heavily populated and thus, make up a sizeable portion of the East Asian military and workforce.\n\nWhen Five Year Plans are implemented by the Party in order to expand the economy and boost production, the industrial provinces are where all resources are consolidated to streamline the production of manufactured goods, civilian and military.§!"
 ESA_Agricultral_Specialisation:0 "Agricultural Specialisation"
 ESA_Agricultral_Specialisation_desc:0 "\n\n\n\n£GFX_ESA_Agricultral_Specialisation_Banner\n\n\n\n\n\n\n§WAs one may expect, provinces with that are specialised in agricultural production are where the food to feed the vast metropolises and industrial cities of East Asia is grown. Unlike in the city, the presence of the Party is less felt, with the Party only maintaining a notable presence in the notable urban centres and the mega farms that cover the plains, leaving the residents alone for the most part.§!"
 ESA_Extraction_Specialisation:0 "Extraction Specialisation"
 ESA_Extraction_Specialisation_desc:0 "\n\n\n\n£GFX_ESA_Extraction_Specialisation_Banner\n\n\n\n\n\n\n§WResources. Minerals. Metal. Oil. Fuel.\n\nIt all has to come from somewhere. Someone has to extract it all from the Earth to fuel the Industrial and to a lesser extent, the Agricultural Provinces, and that is the role of the Extraction Provinces. Defined by its mountain mines and vast oil fields, it is these provinces that fuel all of East Asia and allows it to not only span much of the globe but maintain it's firm grip.§!"
 ESA_Convene_The_Supreme_Peoples_Assembly:0 "Convene the Supreme People's Assembly"
 ESA_Convene_The_Supreme_Peoples_Assembly_desc:0 "With the new year, comes new plans for East Asia. Despite the great strides made in unifying the combined peoples of the East, there are still those who resist our strength and the unity we bring, both inside and outside our borders.\n\nWe shall convene the Supreme People's Assembly and begin the work of uniting all of East Asia once and for all!"
 ESA_The_People_Are_God:0 "The People Are God"
 ESA_The_People_Are_God_desc:0 "The People are God, for without them, East Asia does not exist!"
 ESA_The_Third_Seven_Year_Plan:0 "The Third Seven Year Plan"
 ESA_The_Third_Seven_Year_Plan_desc:0 "If we are to continue to sustain our hold over the vast territory of East Asia and keep up with our competators, we must ensure that our industrial might continues to grow and expand across the land."
 ESA_Phase_Out_Seditious_Speech:0 "Phase Out Seditious Speech"
 ESA_Phase_Out_Seditious_Speech_desc:0 "There are traitors lurking behind every corner, each spewing forth their own toxic ideas and words that seek to undermine the goals of the Great Unification. It should therefore be the top priority of the Party to ensure that all forms of traitorous thought, from Sepratist Nationalists to so-called 'Reformists', and erased from the minds of all East Asians."
 ESA_The_Party_Is_God:0 "The Party Is God"
 ESA_The_Party_Is_God_desc:0 "The Party is God, for without Juche, East Asia does not exist!"
 ESA_Incursion_Into_Indochina:0 "Incursion Into Indochina"
 ESA_Incursion_Into_Indochina_desc:0 "Southeast Asia has long avoided our rule, preferring resistance to the Great Unification over joining in harmony. It is time to begin the process of crushing these resistance and liberate the people of Southeast Asia, starting with the rebellious Vietnamese."
 ESA_Root_Out_Revisionist_Traitors:0 "Root Out Revisionist Traitors"
 ESA_Root_Out_Revisionist_Traitors_desc:0 "The threat of revisionists, from Maoist traitors to Soviet heretics, must be utterly destroyed swiftly and decisively before they can threaten and distort the Revolution and subsequent progress achieved by the Worker's Party of East Asia!"
 ESA_The_Leader_Is_God:0 "The Leader Is God"
 ESA_The_Leader_Is_God_desc:0 "The Supreme Leader is God, for without him, East Asia does not exist!"
 ESA_Empower_Public_Security:0 "Empower Public Security"
 ESA_Empower_Public_Security_desc:0 "A strong internal security apparatus is a strong state. For too long, subversives within our nation seeking to poison the minds of the Youth have endured. By expanding the resources of the Ministry of State Security, we can continue to drive the thought criminals back and sweep them away entirely."
 ESA_Utilise_The_Young_Pioneers:0 "Utilise the Young Pioneers"
 ESA_Utilise_The_Young_Pioneers_desc:0 "The Youth are the key to long term victory over all East Asia. The old may cling onto old outdated ideas of 'China' and 'Japan' or whatever artifical nation they attach themselves to, but it will be the Youth that shed those ideas for good and bring forth a truly united East Asian state."
 ESA_The_Supreme_Leader_Eternal:0 "THE SUPREME LEADER, ETERNAL"
 ESA_The_Supreme_Leader_Eternal_desc:0 "The Supreme Leader continues to triumph in the face of his enemies, both within and beyond East Asia. His wisdom is eternal, his power unquestioned. The Great Unification will continue, and if any dare to dismantle the great civilization forged by Kim Il Sung and expanded upon by Kim Jong Il, they will destroyed by our vast armies swiftly and decisively."
 ESA_East_Asias_Answer:0 "East Asia's Answer!"
 ESA_East_Asias_Answer_desc:0 "The rebels have dared us to war against them. They expect us to cower in fear before their defiance.\n\nNever!\n\nThey wish to provoke East Asia? Well, let them have our answer in the form of blood and fire!"
 ESA_Military_Modernisation_Plan:0 "Military Modernisation Plan"
 ESA_Military_Modernisation_Plan_desc:0 "Modern warfare requires modern militaries to fight it. Whilst the East Asian Army was able to achieve their success in the past through sheer numbers and fanaticism, that may not work as before. Our enemies have studied and have evolved their doctrines and tactics to overcome us. If we wish to counter this, them on this front, we must begin the process of overhauling our system."
 ESA_Emergency_Conscription_Protocols:0 "Emergency Conscription Protocols"
 ESA_Emergency_Conscription_Protocols_desc:0 "In the past, it was our legions of fanatic soldiers that steamrolled over all our opponents, securing the Great Unification of all East Asia for the Party and the Supreme Leader. It hasn't failed before, and there's no reason conscripting a large military force of our most devoted and loyal wouldn't work this time."
 ESA_The_War_Back_Home:0 "The War Back Home"
 ESA_The_War_Back_Home_desc:0 "The war isn't just on the frontline but also behind it within our own territories. Many of our industrial zones have fallen under enemy occupation, and much more could fall if we do not mobilise our industrial base as soon as possible."
 ESA_Kim_Il_Sungism_In_Totality:0 "Kim Il-Sungism in Totality"
 ESA_Kim_Il_Sungism_In_Totality_desc:0 "Kim Il-Sung was the man who secured all of East Asia under the rule of Juche Ideology, bringing forth that Great Unification that helped to create a nation that could contend with Oceania and Eurasia as an bloc of equal power.\n\nThere is no reason to deviate from his methods when their success has yet to be invalidated."
 ESA_Reexamine_Industrial_Production:0 "Reexamine Industrial Production"
 ESA_Reexamine_Industrial_Production_desc:0 "As it stands, the industrial production of our province is not enough to crush the enemy completely. If we wish to win this war swiftly and decisively, we need to investigate and improve all aspects of industrial production as soon as possible."
 ESA_Restart_The_Five_Year_Plan:0 "Restart The Five Year Plan"
 ESA_Restart_The_Five_Year_Plan_desc:0 "We cannot allow the rebellions to prevent us from continuing our industrialisation plans. In fact, the effort to build industry has become more important than ever now that the traitors have made themselves known. The sooner we restart the interrupted Five Year Plan, the quicker we'll be able to defeat the enemy!"
 ESA_Work_As_Needed:0 "Work as Needed"
 ESA_Work_As_Needed_desc:0 "Overworking the people of East Asia will only encourage more rebellion and anger, something we cannot afford given the enemies we already face. By implementing a more efficient shift-based work flow that ensures output is constant without overworking the people, we can ensure the workers are kept happy whilst meeting their obligations to the state."
 ESA_Songun_Economic_Revival:0 "Songun Economic Revival"
 ESA_Songun_Economic_Revival_desc:0 "The aims of our industrial might must, and always will be, to support the military in our noble fight against the traitorous savages infesting our nation whilst keeping our borders safe. With the necessary reforms to our industrial complex completed, our industial base can now fulfil this task at maximum efficiency."
 ESA_Rethinking_Our_Scientific_Endeavors:0 "Rethinking our Scientific Endeavors"
 ESA_Rethinking_Our_Scientific_Endeavors_desc:0 "For a long time, there was little need to advance the cause of scientist. We held our territory with a firm grip and the system we enforced had little need for innovation. However, circumstances have changed. Our enemy does not adhere to our system and they will no doubt be exploring every option they have to defeat us. We can't afford to be complacent. We must begin the process of revitalising our scientific base if we are to win."
 ESA_Relax_Scientific_Surveillance:0 "Relax Scientific Surveillance"
 ESA_Relax_Scientific_Surveillance_desc:0 "If we want our researchers to excell at maximum efficiency, we cannot be drown them with excessive presence. Giving the Scientists some room to freely experiment without excessive oversight will allow them to conduct their research most effectively, regardless of what they may produce."
 ESA_Enforce_Patriotic_Science:0 "Enforce Patriotic Science"
 ESA_Enforce_Patriotic_Science_desc:0 "If science is to be conducted, it must solely be focused upon the needs of the state above all else. There is no time for selfish investigations into things not prioritised by the Party. It's either you focus all development into whatever the Party demands or you research nothing at all."
 ESA_Innovation_For_Victory:0 "Innovation for Victory"
 ESA_Innovation_For_Victory_desc:0 "To innovate is to succeed and in the context of the wider rebellion East Asia is facing, we need to give our researchers all the resources and, if neccesary, freedom to ensure that innovation comes as swiftly as possible."
 ESA_Songun_Scientific_Development:0 "Songun Scientific Development"
 ESA_Songun_Scientific_Development_desc:0 "Regardless of the direction of science, the focus must always be on the needs of the military. Weaponry, industrial advancement, and any other technology of military concern must remain the primary focus of Research & Development."
 ESA_Unleash_Our_Potential:0 "Unleash our Potential"
 ESA_Unleash_Our_Potential_desc:0 "The time has come to consolidate all investments and advancements made and fully reactivate our research and development capabilities. Through the advancement of technologies and weaponry, we will overpower the enemy and secure this land once and for all."
 ESA_Victory_of_the_Great_Leader:0 "Victory of the Great Leader!"
 ESA_Victory_of_the_Great_Leader_desc:0 "After much blood has been spilt and destruction spread across the nation, the people of East Asia have been reunited once more under the leadership of Kim Jong Il, who has proven his supreme and flawless capabilities once again by bringing forth the Second Great Unification!"
 ESA_Exterminate_Cultures:0 "Exterminate Cultures"
 ESA_Exterminate_Cultures_desc:0 "Cultures are a disease. The mass rebellions we put down across East Asia only prove that fact to be true. We can tolerate them no longer! We have been too soft and we have paid dearly for that weakness.\n\nNo more!\n\nThere will be no more cultures or nations, only §REast Asia!§!"
 ESA_The_New_Bandae:0 "The New Bandae"
 ESA_The_New_Bandae_desc:0 "With the war over, new boogey men are needed to focus the populations anger and hatred upon whilst the Party continues to enact its program of the total cultural assimilation upon all of East Asia. Thankfully, there were some figures in the war, from Chiang in China to Mishima in Japan. Though the men are dead, they need not be buried for their faces alone can more than replace Cho as the great evil plaguing East Asia."
 ESA_Permanently_Entrench_Chondoism:0 "Permanently Entrench Chondoism"
 ESA_Permanently_Entrench_Chondoism_desc:0 "With victory secured for all peoples of East Asia, the replacement of the old faiths with the true Chondist faith must be finalised and enforced as swiftly as possible in order to further entrench the reign of the Kim Dynasty over our great nation."
 ESA_Finalise_The_East_Asian_Revolution:0 "Finalise the East Asian Revolution"
 ESA_Finalise_The_East_Asian_Revolution_desc:0 "The time has come to complete the Revolution that began long ago. No more shall ethnicity or culture divide us, no longer shall our people be split by loyalties to outdated ideas. We are East Asian, now and forever, forever alligent to the Supreme Leader and his eternal dynasty!"
 ESA_The_Final_Embrace_Of_Death:0 "The Final Embrace of Death"
 ESA_The_Final_Embrace_Of_Death_desc:0 "All of life is a dream walking, all of death is a going home."
 ESA_starting.1.t:0 "East Asia - 1984"
 ESA_starting.1.desc:0 "REPORT:\nStability across East Asia has been tenuous since the Great Unification some 10 years ago. Though we have earned our place amongst the Super States after the great reclamation of Outer Manchuria from Eurasia, rebel activities in Kunlun and Eastern Islands remain prevalent. Underground movements in China and Korea, sponsored by the Southeast Asian Defence Intiative, have grown in number and resources.\n\nMajority support for the Eternal Leader remains, through disconnent beyond North Korea continues to grow. Immediate action must be taken to ensure continuation of the Great Unification.\n\n-Ministry of State Security"
 ESA_starting.1.a:0 "THE SUPREME LEADER, ETERNAL"
 ESA_starting.2.t:0 "The People Are God"
 ESA_starting.2.desc:0 "REPORT:\nThe people have become increasingly suseptable to SEADI propaganda via backed rebel cells. Old world ideas and notions of the 'separate nation' continue to spread in rural regions where idea control has been less effective than in urban regions. If efforts to counter enemy propaganda not taken, East Asia risks disloyalty in rural sectors sparking Anti-Revolution in region.\n\n-Ministry of State Security"
 ESA_starting.2.a:0 "THE SUPREME LEADER, ETERNAL"
 ESA_starting.3.t:0 "For the Eternal President!"
 ESA_starting.3.desc:0 "REPORT:\nAs observed in Oceania and Eurasia, devotion to the leader is on a divine level, which many within urban centers viewing their leadership as Godlike. Refutation of the power of the leader and the Party is dealt with swiftly and harshly, from what limited details have been gathered from our intelligence operatives. Whilst East Asia has managed to attain this on some level in the regions of Korea and Beijing, the rest of East Asia still resists the divinity of the Eternal Leader, many still clinging to their nation. Especially the Japanese, who's integration has been most recent whilst China is vast and ancient, and thus difficult to fully implement our doctrine.\n\nBut through careful study of Oceania and their 'Ministry of Love', a refined plan has been created and will soon be implemented by our internal security forces to better handle dissident behaviour whilst enforcing a mandate of devotion to the Kim Dynasty upon our people.\n\n-Ministry of State Security"
 ESA_starting.3.a:0 "THE SUPREME LEADER, ETERNAL"
 ESA_starting.4.t:0 "Language, Perfected"
 ESA_starting.4.desc:0 "REPORT:\nTaking lessons from Oceania's 'Newspeak', a revised and transprovincial language has been put together by the top linguistic minds of Beijing, aiming to unite Chinese, Japanese and Korean languages into a single cohesive language what will promote unity whilst diminishing the relevance of the old nations. The new language, which the linguists have referred to as 'Gugeo', will begin to be implemented across the provinces with the first edition of the Gugeo dictionary being rolled out across the Inner and Outer sectors of the Party first, before being delievered to the rest of the masses of East Asia.\n\n-Ministry of State Security"
 ESA_starting.4.a:0 "THE SUPREME LEADER, ETERNAL"
 ESA_starting.5.t:0 "The Party Is God"
 ESA_starting.5.desc:0 "REPORT:\nThe Party of East Asia must continue to be proactive in controlling the populace, and more importantly, be more resistant to the subversion of the world beyond our boundaries. It is not uncommon to find officials and even low level ministers taking bribes or harbouring sympathies toward Anti-Revolutionary movements. Though we are able to resolve these issues in a swift and ruthless matter, the fact that members of the Party are willing to undermine the authority of the Supreme Leader is deeply concerning.\n\nBy expanding the reach of our security services of the Ministry of State Security and deepening surveillance of Party Officials as well as enforcing ideological loyalty to the Supreme Leader, the Party will be made more loyal and motivated to serve the Kim Dynasty and be made less willing to step even a toe out of line.\n\n-Ministry of State Security"
 ESA_starting.5.a:0 "THE SUPREME LEADER, ETERNAL"
 ESA_starting.6.t:0 "A Bump in the Dark"
 ESA_starting.6.desc:0 "The authorisation has been given. At the moment of midnight, at the peak of the night, East Asian forces in the Tonkin Administration crossed into the territories of Vietnam and Laos, provoking open war against the nations and will no doubt bring forth the full response of SEADI. Indochina, and all of Southeast Asia by extension, had long been a region East Asia had longed to conquer. Having Opposition Forces existing within the South China Sea had long been of series concern, for East Asia, with their sponsoring of rebellious movements within the borders of East Asia having been tolerated long enough.\n\nCommander Zhang, one of the commanding officers in the Tonkin region, sighed as he set the orders down. First came the VNRF, the guerilla movement that had long been opposing East Asian occupation with loose ties to SEADI and the Comintern. Now came this war.\n\nThis wasn't something he was looking forward to, the fact is that SEADI were more than prepared for them. This wasn't like the campaigns in China, where vast plains and relatively flat land made conquest of large swaths of the nation relatively straightforward. No, Indochina was a land of dense jungle, where death comes from the shadows and the leaves of the trees. But he had no choice in the end. He was beholded to the will of Beijing, and if it was the will of the Eternal Leader that the Indochinese states be conquered and assimilated into East Asia, then he would obey without question. Rising from his desk, he grabbed his officer's hat and pistol before making his way for the door.\n\nA long war awaited him."
 ESA_starting.6.a:0 "These things happen in the dead of night."
 ESA_starting.7.t:0 "Collaborators of Cho Beware"
 ESA_starting.7.desc:0 "REPORT:\nNewly revised and refined propaganda campaign aimed at fostering culture of fear and mistrust of potential collaborators of Cho Man Sik has begun its roll out across East Asia. The fostering of mistrust between citizens will help boost loyalty and dependcy toward the Party, regarding the men and women around them as potential traitors whilst finding a good and reliable friend in the Party and the Supreme Leader.\n\nThe campaign may also encourage citizens to expose potential traitors and rebel hideout locations, allowing our security services to continue to develop an edge over the reactionary menace infecting our borders, as well as helping to counteract the propaganda funnelled in by SEADI and other foreign entities seeking to undermine the triumph of the Great Unification.\n\n-Ministry of State Security"
 ESA_starting.7.a:0 "THE SUPREME LEADER, ETERNAL"
 ESA_starting.8.t:0 "The Leader is God"
 ESA_starting.8.desc:0 "REPORT:\nRegardless of whatever reforms or adjustments made to the Party and the strength of Juche over our lands, we must never forget that without the Kim Dynasty and the Supreme Leader, there would be no East Asia at all! It was through the leadership of Kim Il-Sung and the rightful rise of Kim Jong-Il that allowed for East Asia to rise from the ashes and match the powers of Oceania and Eurasia in strength and might.\n\nBy expanding and overhualing Loyalty Rallies across East Asia and following the example of Oceania by ensuring that images of the Supreme Leader is visible at every turn, we can ensure that the people remain loyal to the Supreme Leader above all and never forget who it was that brought forth the Great Unification!\n\n-Ministry of State Security"
 ESA_starting.8.a:0 "THE SUPREME LEADER, ETERNAL"
 ESA_starting.9.t:0 "THE SUPREME LEADER, ETERNAL"
 ESA_starting.9.desc:0 "REPORT:\nTHE PEOPLE ARE GOD.\nTHE PARTY IS GOD.\nTHE LEADER IS GOD.\nTHE PEOPLE ARE GOD.\nTHE PARTY IS GOD.\nTHE LEADER IS GOD.\nTHE PEOPLE ARE GOD.\nTHE PARTY IS GOD.\nTHE LEADER IS GOD.\n\n-Ministry of State Security"
 ESA_starting.9.a:0 "THE SUPREME LEADER, ETERNAL"
 ESA_collapse.1.t:0 "Growing Unrest"
 ESA_collapse.1.desc:0 "REPORT:\nAcross the country, the unrest that we once squashed during our consolodation during the 1970s has begun to reemerge. Discontent amongst the population has begun to make itself known, as the masses of non-Koreans and anti-Juche agitators have began to recruit from the misguided and traitorous, no doubt in an attempt to undo the glory of East Asia.\n\nWar is coming.\nOur defining hour grows near.\n\n-Ministry of State Security"
 ESA_collapse.1.a:0 "We must prepare"
 ESA_collapse.2.t:0 "Unrest in Nanjing"
 ESA_collapse.2.desc:0 ""
 ESA_collapse.2.a:0 "Mobilise A Response Force!"
 ESA_collapse.2.b:0 "The spirit of Sun lives on!"
 ESA_collapse.3.t:0 "The Second Chinese Revolution"
 ESA_collapse.3.desc:0 ""
 ESA_collapse.3.a:0 "We'll unleash a new red terror once we're through!"
 ESA_collapse.4.t:0 "Riots in Daejeon!"
 ESA_collapse.4.desc:0 ""
 ESA_collapse.4.a:0 "Deploy Public Security!"
 ESA_collapse.5.t:0 "The Korean Awakening"
 ESA_collapse.5.desc:0 ""
 ESA_collapse.5.a:0 "We'll wipe these revisionists from the face of the Earth!"
 ESA_collapse.5.b:0 "Our people shall never be defiled again!"
 ESA_collapse.6.t:0 "Whispers of the Pretender"
 ESA_collapse.6.desc:0 ""
 ESA_collapse.6.a:0 "Pujie? I thought he was dead!"
 ESA_collapse.7.t:0 "The Second Manchu Restoration"
 ESA_collapse.7.desc:0 ""
 ESA_collapse.7.a:0 "These Imperial Dogs have disrespected us for the final time!"
 ESA_collapse.7.b:0 "Revive Manchukuo! Destroy the Occupiers!"
 ESA_collapse.8.t:0 "Anger in Guangzhou!"
 ESA_collapse.8.desc:0 ""
 ESA_collapse.8.a:0 "They can endure a little starvation for the war effort!"
 ESA_collapse.9.t:0 "South China Uprising!"
 ESA_collapse.9.desc:0 ""
 ESA_collapse.9.a:0 "Greedy traitors must be punished!"
 ESA_collapse.9.b:0 "Liberate Cantonia! Revolution of our times!"
 ESA_collapse.10.t:0 "The Heir of Japan"
 ESA_collapse.10.desc:0 "REPORT:\nIn Japan, the center point of our rage and hatred, a nation whom we have squashed harder than any... has been rumbling as of late. Concerning rumours have begun to spread, rumours of a discovery that could change the very fabric of the islands.\n\nA survivor of the massacre of the Imperial Family, a man ignorant of his heritage, yet holds claim to Japan... an heir, discovered by the supposed 'Last Samurai', Yukio Mushima and his Second Rightous Army. The news of his discovery has begun to spread across Japan. It will only be a matter of time before the people are rallied to action by the hope of a new Emperor to reignite the spirit of Japan.\n\n-Ministry of State Security"
 ESA_collapse.10.a:0 "It can't be... one got away... but we killed them... ALL OF THEM!!!"
 ESA_collapse.10.b:0 "Tenno Heika Banzai!"
 ESA_collapse.11.t:0 "The Japanese Uprising"
 ESA_collapse.11.desc:0 "REPORT:\nThe seemingly inevitable has happened. Seizing control over sections of the North of Japan, Mishima and his miliants have proclaimed the war for the liberation of Japan, all done in the name of the Crown Prince, the soon to be Emperor upon completion of his Imperial Education.\n\nThis outcome is terrible, to say the least. Japan is awake and motivated to fight once more. If we can't find a way to dispose of their 'Emperor' and break this uprising, we may lose control of Japan completely and be stuck with an extremely vengeful rival to the East.\n\n-Ministry of State Security"
 ESA_collapse.11.a:0 "These imperialists shall be finished once and for all"
 ESA_collapse.12.t:0 "Men in the Mountains"
 ESA_collapse.12.desc:0 ""
 ESA_collapse.12.a:0 "We were wondering when they'd pop up again."
 ESA_collapse.13.t:0 "The Second Long March"
 ESA_collapse.13.desc:0 ""
 ESA_collapse.13.a:0 "The false revolution shall be crushed once and for all"
 ESA_collapse.13.b:0 "We'll finish what you've started Chairman Mao!"
 ESA_collapse.14.t:0 "The West Buckles"
 ESA_collapse.14.desc:0 ""
 ESA_collapse.14.a:0 "This is becoming out of control"
 ESA_collapse.15.t:0 "Disorder in the West"
 ESA_collapse.15.desc:0 ""
 ESA_collapse.15.a:0 "Lock down these regions down immediately!"
 ESA_collapse.16.t:0 "The Echoes of the Great Steppe"
 ESA_collapse.16.desc:0 ""
 ESA_collapse.16.a:0 "We were wondering when they'd pop up again."
 ESA_collapse.17.t:0 "The Mongolian Revolution"
 ESA_collapse.17.desc:0 ""
 ESA_collapse.17.a:0 "A band of nomads is nothing"
 ESA_collapse.17.b:0 "The spirit of Genghis guides us all!"
 ESA_victory.1.t:0 "The Final Triumph"
 ESA_victory.1.desc:0 "REPORT:\nDespite the best efforts of the Reactionaries, Revisionists and Anti-Revolutionaries, East Asia has reunited its territories and brought forth the Second Great Unification. With Kim Jong-Il the undisbuted leader of all East Asia, there is nobody left that would dare defy the divine rule of the Kim Dynasty. With all territories of East Asia reunited once more, the process of reconstruction, restablisation, and retribution can now begin in full.\n\n-Ministry of State Security"
 ESA_victory.1.a:0 "THE SUPREME LEADER, ETERNAL"
 ESA_victory.2.t:0 "The Myth of History"
 ESA_victory.2.desc:0 "REPORT:\nJapanese and Chinese nations are ancient ideas, histories stemming back centuries. To simply attempt to erase it like before would be a fruitless endeavour. The people have been parts of their own nations for over a thousand years. East Asia and the rise of the Kim Dynasty only occured in the past few decades. If East Asia is to be an integral and long lasting power, then we mustn't erase the nations, but rather co-op their legacies and twist them to give legitimacy to the Party.\n\nEast Asia has, and always will be an inevitablility. By shifting the histories of these lands to steer them toward the inevitablility of East Asia, sprinkling 'prophecies' and 'illusions' to the coming of Juche and wording past events in a way that makes it confusing will further grant the Party to clarify the past, slowly but surely giving us absolute authority to twist history as we see fit, much like the Oceanians and Eurasians were, for a time, able to do.\n\n-Ministry of State Security"
 ESA_victory.2.a:0 "THE SUPREME LEADER, ETERNAL"
 ESA_victory.3.t:0 "New Faces, Same Story"
 ESA_victory.3.desc:0 "REPORT:\nCho Man Sik is no longer an effective enemy figurehead to rally the masses. Populace has grown numb to his face and their hatred toward him has waned over the course. Reactionary figures Chiang Wei-kuo of China and Yukio Mushima of Japan better remembered by populace. Repurpose their names and faces to foster hatred toward them and futher cement the power of the state over them, as was done before.\n\n-Ministry of State Security"
 ESA_victory.3.a:0 "THE SUPREME LEADER, ETERNAL"
 ESA_victory.4.t:0 "Last Faith Left Standing"
 ESA_victory.4.desc:0 "REPORT:\nWith the elimination of all notable faith centered rebels, including 'Chondist Reformist' Heratics, the complete entrenchment of Party backed Chondoism has taken place. All opposition faith structures have been dismantled or forced underground by Security Forces, with their dismantlement not far behind. Faiths such as Buddhism, Islam, Christianity, Shintoism, and Hinduism have been outlawed and will be repurposed to fuel culture of hate toward the enemy whilst true Chondoism will be utilized to further solidify divine rule of Kim Dyansty, the true rulers of East Asia.\n\n-Ministry of State Security"
 ESA_victory.4.a:0 "THE SUPREME LEADER, ETERNAL"
 ESA_victory.5.t:0 "The Great Refinement"
 ESA_victory.5.desc:0 "REPORT:\nPrior to the outbreak of reactionary rebellions, the provinces each upheld their own standard of the revolutionary ideal in an attempt to maintain social cohesion and reduce the risk of rebellion. Seeing as this policy has failed spectacularly, it is clear that the provinces of East Asia have maintained too much autonomy, yet did not impose as much of its authority as it should.\n\nFrom now on, the Beijing Party will deepen involvement in provincial affairs to ensure adherence to the goals of the Revolution is being observed whilst the Ministry of State Security will expand involvement in provincial enforcement departments to ensure rebel activities are being rooted out efficiently whilst removing sympathisers from positions of power.\n\nThe Revolution will endure, and it will thrive.\n\n-Ministry of State Security"
 ESA_victory.5.a:0 "THE SUPREME LEADER, ETERNAL"
 ESA_victory.6.t:0 "The Silent Symphony"
 ESA_victory.6.desc:0 "Though we live, our hearts can't beat.\n\nThough we look, we cannot see.\n\nThough we think, we cannot dream.\n\nThough we speak, our voices are silent.\n\nWho we are has long since passed. Through blood and fire, our future was sealed. The past is lost, ourselves have faded. The Sun gives no light, nor does the bloom of spring bring hope. A billion souls we are, we are all instruments of one leader.\n\nWe are not conscious, we are nation.\nWe are not alive, we are death."
 ESA_victory.6.a:0 "Though awake, we sleep forever"