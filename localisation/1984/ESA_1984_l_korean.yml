l_korean:
 ESA_BOOKMARK_DESC:0 "In the chaos of the nuclear war that enveloped the 1950s, the Democratic People’s Republic of Manchu-Korea seized the opportunity to secure all of East Asia. In the aftermath, the Democratic People’s Republic of East Asia was proclaimed, and Juche became the state ideology of the new Republic.\n\nThe system of totalitarian rule within the Democratic People’s Republic of East Asia is maintained by state organisations such as the MSS and PAD, a system developed by Kim Il Sung and later refined by his son, Kim Jong Il, after the former’s self-obliteration. Kim Jong Il continues to play the role of the chosen son of the Eternal President, leading East Asia towards oblivion for the sake of the state.\n\nBut as the decade nears its halfway point, unrest continues to creep across the entire planet, and the question of the perpetuity of the East Asian State will be confronted, whether the party is ready or not."
 1984_Opening_Screen_ESA_Title_TT:0 "§RDEMOCRATIC PEOPLE'S REPUBLIC OF EAST ASIA§!"
 1984_Opening_Screen_ESA_Desc_TT:0 "In the aftermath of the victory of the People’s War Against §9Japanese Aggression§!, the §RSoviet Union§!, in a surprise move orchestrated by §RLavrentiy Beria§!, relinquished control of Korea and Manchuria over to the §RNortheast Anti-Japanese United Army§! led by §RKim Il Sung§!, hoping to gain a more loyal subject in Asia after deeming the §RChinese Communist Party§! to be too much of a liability. The §RDemocratic People’s Republic of Manchu-Korea§!, as it was known, played an important role as a buffer between the Union and the still clashing Chinese states, but Kim had other plans. In the 1950s, when §ROPERATION: UNTHINKABLE§! commenced, the Union was far too occupied with its western flank to stop Kim from declaring Manchu-Korea’s independence and subsequently invading China and Mongolia.\n\nAfter successfully sweeping the last remnants of the Chinese rival governments and warlords in the early 1960s, Kim proclaimed the §RDemocratic People’s Republic of East Asia§! and began to formalise the State Ideology of §RJuche§!, which was officially declared to be a synthesis of §REurasian Neo-Bolshevism§! and §RKorean Chondoist Faith§!. Utilising the §RMSS§! and §RPAD§!, Kim ushered in the new era of East Asian mythos, one that would ensure the absolute devotion and loyalty of society.\n\nIn the late 1960s, Kim commenced §ROPERATION: ECLIPSE§!, successfully landing on the Japanese Home Islands and Taiwan in an attempt to secure and dominate the Eastern Seas. However, before the campaign finished, Kim had completed his journey of self-obliteration, and his son §RKim Jong Il§! inherited the Supreme Leadership. It would be Kim Jong Il who would finish the Eastern Island campaign and secure his place as the worthy son of the Eternal President. By the time the Eastern Island campaign had ended, the transformation of society had been thoroughly completed, and Juche had been fully ingrained into the hearts and minds of every citizen. No longer would even the mere thought of dissent cross the minds of anyone within the party or the citizenry as a whole and soil the revolution that the Kim Dynasty had worked tirelessly to build.\n\nBut as the new decade progresses, the whispers grow louder, ones that may settle the question of East Asian eternity §Ronce and for all.§!"
 1984_Opening_Screen_ESA_Gameplay_Paths_Desc_TT:0 "§YEast Asian Paths§!\n- Crush the §RCounterrevolution§! and exterminate the enemies of the Supreme Leader.\n- Reconquer the fallen provinces and secure East Asia from the Himalayas to the Japanese Archipelago.\n- Wage a global war to unite the Earth under the rule of §RKim Jong Il.§!§!\n\n§YEAST ASIAN REVOLT TAGS§!\n- @CHI§QNational Revolutionary Army§!\n- @JAP§PSecond Righteous Army§!§!"
 1984_Opening_Screen_ESA_Button_TT:0 "Obedience"
 1984_Opening_Screen_ESA_Province_Title_TT:0 "§R[This.GetName]§!"
 1984_Opening_Screen_ESA_Province_Desc_TT:0 "This is a province of §REast Asia§!. Though the provinces of East Asia don't have unique content §Y(yet!)§!, there still exists generic content for you to squash the rebellions, retake East Asian lands and reform the §RDemocratic People’s Republic of East Asia§!."
 1984_Opening_Screen_ESA_Province_Gameplay_Paths_Desc_TT:0 "§YEast Asian Provinces Paths§!\n- Crush the revolters and restore order to the province.\n- Reclaim all fallen provinces and reunite East Asian lands.\n\n§YNORTH CHINESE REVOLT TAGS§!\n- @CHI§QNational Revolutionary Army§!\n\n§YEASTERN ISLAND REVOLT TAGS§!\n- @JAP§PSecond Righteous Army§!"
 1984_Opening_Screen_ESA_Province_Button_TT:0 "The Supreme Leader, Eternal"
 KIN_JONG_IL_DESC:0 "§WKim Jong Il, the Supreme Leader of East Asia has served the State ever since his father, The Eternal President, Kim Il Sung ascended to the heavens following his achievement of complete obliteration of the self. The Eternal President’s prior work ensuring the safety and prosperity of the masses for years to come, Kim Jong Il has dutifully done his part in continuing his father’s work until his own time comes.\n\nThe Supreme Leader is a wise, all-encompassing leader who defends the people from the Oceanian inheritors of Western Imperialism and false Neo-Bolsheviks of Eurasia. He is said to have come from the heavens itself, delivered to his father on the peak of Paektu Mountain therefore his rule is mandated from heaven itself. With this mandate, the Supreme Leader guides the masses towards their journey of self-obliteration by displaying absolute loyalty to the values of the party in the hopes of one day joining the Eternal President in equilibrium with the sky.\n\nAny doubt about the validity of the Eternal President and Supreme Leader’s life is nothing more than subversive lies worthy of immediate execution.§!"
