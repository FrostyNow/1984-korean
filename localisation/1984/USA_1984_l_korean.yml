 US_ARMED_FORCES_RECONSTRUCTION_TT:0 "Under the rule of Oceania, many military installations across the country were either abandoned or left in a state of disrepair. This is a result of Oceanian military doctrine which focused military force in urban zones to help enforce the will of the state, or overseas near the frontlines of their forever wars, thus making many of our fortifications effectively abandoned beyond simple token forces.\n\nBy reorganising our §Garmed forces§! and restoring branches of the military that existed prior to the rise of §RINGSOC§!, we can begin the process of rebuilding these bases and reoganizing our armed forces to reach the peaks of organisation and effectiveness the United States had once reached.\n\n§YAmerica will be a Great Power once again.§!"
