 USA_Demand_Alaska_decision_desc:0 "§WAlaska, a historical territory of America, is currently under Canadian occupation. During the war for independence from Oceania, we allowed them to take control of the land for the sake of practicality. But now that the war is over, it's time for Alaska to return to its rightful owner.§!"
