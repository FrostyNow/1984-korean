l_korean:
 USA_country_selection_tt:0 "§YHOW TO PLAY THE SECOND CONTINENTAL ARMY\n-----------------------------------------§!\nPlay as the §gEnglish Socialist States of Oceania§!, play through content until the province breakdown prior to the §RAnti-Revolution§! occurs. When this occurs, open the decision menu and scroll down to the §Y'Whispers of Nations'§! decision menu and click the decision to switch to §YMountain Zone One.§!\n\nWait until the North American Revolts spawn and open the decision menu. Scroll down to the §YSecond American Revolution§! decision category and switch to the §mSecond Continental Army§!."
 1984_Opening_Screen_USA_Title_TT:0 "§mSECOND CONTINENTAL ARMY§!"
 1984_Opening_Screen_USA_Desc_TT:0 "Many years ago, before there was Oceania, there was the §mUnited States of America§!. The dominant power of North America, the United States emerged from World War 2 as the undisputed Superpower of the West, its power, influence and economic might stretching far and wide. Though suffering setbacks during the failure of §ROPERATION: UNTHINKABLE§! which saw the Soviets seize Western Europe, subsuming it into their own communist empire, the United States still stood as a global power, which only grew with the unification of America and the British Empire into the §YCommonwealth of Oceania§!.\n\nHowever, all this changed with the rise of §REnglish Socialism§!, a movement that manipulated the people of our nation and drove them to the Civil War that dominated the late 1950s. And despite our best efforts, §RINGSOC§! had won, and so began the dark era of America.\n\n§GBut hope was not lost.§!\n\nAmerican Army remnants, still loyal to the old ideals of the United States and the Consitution fled west to the Rocky Mountains to regroup, waging a campaign of guerilla resistance.\n\nTaking on the banner of the §mSecond Continental Army§!, founded by §YDwight D. Eisenhower§! & §YDouglas MacArthur§!, and now under the command of §GFerdinand J. Chesarek§!, the resistance took on the mission of restoring the §mUnited States of America§! no matter the cost. Keeping in contact with rebel cells across the country and preparing for the opportunity to strike back at Oceania, the time to retake our country has finally come at last.\n\n§RDown with Big Brother!§! §mUp with the Stars!§!"
 1984_Opening_Screen_USA_Gameplay_Paths_Desc_TT:0 "§YAmerican Paths§!\n- Crush all §iOceanian§! and separatist forces in §GNorth America§! and reform the §mUnited States of America!§!"
