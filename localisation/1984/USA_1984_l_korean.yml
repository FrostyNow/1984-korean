 USA_The_Second_American_Revolution:0 "The Second American Revolution"
 USA_The_Second_American_Revolution_desc:0 "After many long years of waiting and resting, the United States of America has reemerged from the ashes, prepared to retake the country for not only ourselves, not only our children, but for all future generations of Americans from Sea to Shining Sea."
 USA_Unearth_Mountain_Facilities:0 "Unearth Mountain Facilities"
 USA_Unearth_Mountain_Facilities_desc:0 "For decades, the production side of things have been kept relatively quiet to decrease the likelihood of the armies of Oceania discovering and striking us before we were ready for the Reclamation War. Now that we're out in the open, now is as good a time as any to reactivate these facilties and get to work on manufacturing and stablising our supplies and equipment."
 USA_Unveil_The_Hidden_Stockpiles:0 "Unveil the Hidden Stockpiles"
 USA_Unveil_The_Hidden_Stockpiles_desc:0 "With the United States Army no longer a myth but a tangible and horrifying reality for the mindless armies of Oceania, a force that aims to retake our homeland, from Los Angles to the marble monuments of Washington D.C.\n\nBut in order to achieve our aims, we need guns and lots of them. Luckily, we've managed to stash plenty of caches across the Southwest in the mountains.\n\nJust have to unearth them all..."
 USA_Assert_Polis_Control:0 "Assert Polis Control"
 USA_Assert_Polis_Control_desc:0 "Quite frankly, the cities of America are a testament to the complete indoctrination and control INGSOC has over the mind of our citizenry. Whilst the rural counties and townships have been easier to control and reintegrate, we have been less fortunate with cities such as Denver and Salt Lake City. If we don't want to have the entire effort crumble beneath our feet and be destroyed on two theaters of warfare, we should seek to clamp down on the indocrinated masses and ensure some level of order and control, no matter how harsh we have to be."
 USA_The_Spirit_Of_76:0 "The Spirit of '76!"
 USA_The_Spirit_Of_76_desc:0 "As we fight tooth and nail to liberate our country, it is not enough to simply take back territory from the cluches of Oceania. No, we must also awaken the flame of freedom that birthed our country in all citizens across our land. The Spirit within us that allowed us to fight tyranny time and time again must be reawakened by any means necessary."
 USA_Reform_The_Minutemen:0 "Reform the Minutemen"
 USA_Reform_The_Minutemen_desc:0 "It will be some time before we can restore institutions such as the Police Force and the National Guard to maintain Order and ensure stability within our homeland. Whilst we could always use the military, the fact remains that our boys need to be on the front, not preventing an internal uprising.\n\nLuckily, there exists a solution. With the reformation of the Minutemen under the supervision of High Command, militia units can help maintain order and keep the peace at home until the war is over and we can get back to the business of rebuilding our country to what it once was."
 USA_The_Giant_Awakens:0 "The Giant Awakens"
 USA_The_Giant_Awakens_desc:0 "Once upon a time, the United States was the heart of industrial manufacturing and economic prowese. That potential still exists within our land, even with all the damage Big Brother has caused to our land and our people. Though we have yet to control the entirety of the United States, we control enough territory to awaken the great industrial beast and start the process of matching Oceania's hordes of inefficent factories with the grit and quality of American industry."
 USA_Reopen_Arms_Factories:0 "Reopen Arms Factories"
 USA_Reopen_Arms_Factories_desc:0 "Supply! Supply! Supply!\n\nIf we do not have the means and resources to fight wars, do not be surprised that we can't win them. If we want to march our boots all the way across the plains and to D.C, it is imperative that we reopen the arms factories and get as much of the old production line back online as soon as humanly possible."
 USA_The_Roar_Of_Industry:0 "The Roar of Industry"
 USA_The_Roar_Of_Industry_desc:0 "It is not enough to simply build guns. America needs industries too. An economy that can not only sustain itself but grow and build, even in the face of the seemingly overwhelmning enemy we face. We must aim to beat Oceania and every front, including the economic front.\n\nAfter all, a strong American economy means a strong America!"
 USA_Arms_For_The_Love_Of_America:0 "Arms for the Love of America!"
 USA_Arms_For_The_Love_Of_America_desc:0 "God Bless the Second Amendment!\n\nWith a history of Gun ownership and weapons expertise to the point of obession, we can apply this to our factories. We must aim to do all possible to streamline gun manufacturing and ensure that every American adult, soldier or otherwise, has a gun in their hands to fight the enemy and defend America."
 USA_The_Arsenal_Of_Democracy:0 "The Arsenal of Democracy"
 USA_The_Arsenal_Of_Democracy_desc:0 "Though not quite what it used to be during World War Two, the fact remains that the Giant has fully reawoken. With each inch of territory retaken, every factory reclaimed or built, the Arsenal of Democracy gets stronger and more powerful than ever before, to the point where we can not only sustain our own effort but also help sustain the war effort in other parts of the world.\n\nINGSOC and all like it must fall, no matter what."
 USA_All_Hands_On_Deck:0 "All Hands on Deck!"
 USA_All_Hands_On_Deck_desc:0 "You can't fight a war without men and frankly, Oceania has a lot of men on their side. Sure, they're not of the quality of the Armed Forces but we can't ignore the fact that if we can't bolster our number, we'll get overwhelmed by a Human wave of dedicated, mindless drones.\n\nLuckily for us, there are plenty of Patriots out there who yearn for change and are more than willing to fight for it."
 USA_Study_The_Rise_Of_INGSOC:0 "Study the Rise of INGSOC"
 USA_Study_The_Rise_Of_INGSOC_desc:0 "The biggest disaster in the entire history of Humanity was the emergence of INGSOC, which managed to overthrow the old capitalist, democratic driven order of old Oceania and replace it with the totalitarian system we have the displeasure of knowing today.\n\nAs bitter as it can be looking back on the past, the success of INGSOC is worth closer study so that we may better understand the tactics of our enemies and more importantly, wipe the floor with them."
 USA_This_Well_Defend:0 "This We'll Defend"
 USA_This_Well_Defend_desc:0 "Not one more inch of land will be given. No American liberated by the United States Army shall be returned to tyranny. We'll fight for each and every inch of land, not matter what Oceania throws at us. Wherever the American Flag reemerges, it will never, ever be taken back down."
 USA_Come_And_Take_It:0 "Come and Take It!"
 USA_Come_And_Take_It_desc:0 "INGSOC has long fought to disarm and subjegate the people of America and beyond. To steal away their means of self defence and to reduce them to nothing more than mere slaves. We will not give up our arms, not again. Like in the days of the American Revolution, with the Spirit of the Alamo in our hearts, we will keep our arms and fight with everything we've got to keep them.\n\nYou want our guns?\n\nCome and Take It!"
 USA_Sic_Semper_Tyrannis:0 "Sic Semper Tyrannis"
 USA_Sic_Semper_Tyrannis_desc:0 "America is a land of freedom. Where new opportunities are found and new beginnings can be achieved. But America isn't just the home of the free but the graveyard of tyrants. America will not bend the knee to another set of autocrats and madmen aiming to exploit our lives and to ruin our country. This is where Tyrants come to die and it will be by America's firm hand that INGSOC dies a slow, pitiful death.\n\nSic Semper Tyrannis."
 USA_The_Myth_Of_Big_Brother:0 "The Myth of Big Brother"
 USA_The_Myth_Of_Big_Brother_desc:0 "It's time to finally spill the beans. Big Brother, if he ever was real, certainly isn't anymore. Oceania has no real leadership to speak of, only fanatical party members hunting one another and pulling each other down constantly in order to maintain the terrible status quo of oppression and despair.\n\nYou can never meet or see Big Brother beyond his static face on the telescreen because he wasn't even real in the first place."
 USA_Refute_INGSOC_Slogans:0 "Refute INGSOC Slogans"
 USA_Refute_INGSOC_Slogans_desc:0 "War is Peace\nFreedom is Slavery\nIgnorance is Strength\n\nWhat a load of horseshit. These contradictory slogans designed to confuse the people need to be not only refuted but utterly annihilated on all levels. As was written by our Founding Fathers, we pioneer the ideals of Life, Liberty and the Pursuit of Happiness. Peace is Life. Freedom is Liberating and Knowledge is the key to Happiness."
 USA_A_Land_Of_Freedom_Not_Tyrants:0 "A Land of Freedom, Not Tyrants"
 USA_A_Land_Of_Freedom_Not_Tyrants_desc:0 "America is a nation of dreamers, belivers and strivers that is being lead astray by the worst of the worst! For far too long, a collection of tyrants hiding behind the facade of Big Brother has ruled over the American people, exploiting our population and destroying all semblence of hope and optimism in our country.\n\nBut this time is ending. Soon, the American people will once again know the joy of Freedom, not the heel of Tyrants."
 USA_Remember_Our_Founding_Fathers:0 "Remember Our Founding Fathers"
 USA_Remember_Our_Founding_Fathers_desc:0 "For too long, it's been Big Brother this, Big Brother that. A monsterous avatar that has instilled obedience and despair into the American people in a crude attempt to replace our Founding Fathers and All Mighty God.\n\nIt's time to remember the vision and spirit of the men who came before. Of our great Founding Fathers from George Washington, Thomas Jefferson, Benjamin Franklin and the many who established this country and pointed us to a path of hope and prosperity.\n\nIt's time to remember our Founders, it's time to get back on the path they have set before us all."
 USA_Never_Again:0 "Never Again"
 USA_Never_Again_desc:0 "Never again shall the people of America be subject to the vicious rule of tyrants and corrupt thieves that hate our ideals and the country we long to see. We will never again submit to these people or believe their false promises. We will never forget the promise of our country as set out by our Founding Fathers. And we will never, ever, give up our right to be free.\n\nNever Again."
 USA_One_Step_Closer:0 "One Step Closer"
 USA_One_Step_Closer_desc:0 "After years of fighting in the Rocky Mountains, taking whatever scraps we could get and preparing, we've finally overthrown the beast that is Oceania, at least here in America. Though the first and most important step to retake our country is complete, complications have emerged in the fallout.\n\nNew movements have emerged in the fighting, many states and regions forming their own governments and carving out their own piece of the former Thirteen Sectors. America is free at last, the nation secured but with this victory comes a new reality we must face. We share our homeland with multiple new nations, nations that will have to be dealt with in order to fully reunify our country."
 USA_The_Hour_Of_Triumph:0 "The Hour of Triumph"
 USA_The_Hour_Of_Triumph_desc:0 "After many long decades, we retaken not just counties or towns but entire states, all back within the control of the true government of the United States of America. We stand triumphant and victorious over the forces of INGSOC now and forever. There still remains much to do, both in what we control and the rest of the country which finds itself under regional minded regimes. But that can wait, for regardless of whatever happens, we can find joy in the fact that INGSOC has been repelled from America once and for all."
 USA_Restabilising_Our_Territory:0 "Restabilsing Our Territory"
 USA_Restabilising_Our_Territory_desc:0 "Much of the territory we've captured from the Oceanian Regime is in a fair amount of chaos. From INGSOC remnants holding out in whatever hole they can find, scared and confused civilians confused as to what the hell is going on, and of course, those who seek to take advantage of the chaos for their own gain. Simply put, we need to focus on cementing our control over this land by any means available to us before the whole thing blows up and we find ourselves back at square one."
 USA_Reform_The_Supreme_Court:0 "Reform the Supreme Court"
 USA_Reform_The_Supreme_Court_desc:0 "It won't fix everything right away, but there is wisdom in restoring the Supreme Court as well as mending other parts of the judical branch of government. We can't rely on military tribunals for every single case, especially for those concerning civilian elements of society. Not to mention, with the Continental Congress at work restoring our government, it wouldn't hurt to have the judiciary guiding law making from time to time."
 USA_Laying_Down_The_Law:0 "Laying Down the Law"
 USA_Laying_Down_The_Law_desc:0 "These criminals that are taking advantage of the chaos will not be allowed to endure for long. From Nevada to Minnesota, the theives, murderers, and dissidents that try to bring about misery for others solely for their own benefit will feel the sword of justice upon them.\n\nAmerica may be the Land of the Free, the Home of the Brave. But it is also a land of Law and Order and that must be reflected in our society at all levels."
 USA_Convene_The_Provisional_Congress:0 "Convene the Provisional Congress"
 USA_Convene_The_Provisional_Congress_desc:0 "Now, having a Junta presiding over the nation is nice and all, but if we want to restore the United States back to what it once was, putting a Congress back together, even a provisional one, is a step in the right direction. It won't be easy, and will likely be a little chaotic. But then again, when was the old United States anything but a little chaotic?"
 USA_Military_Primacy:0 "Military Primacy"
 USA_Military_Primacy_desc:0 "It was the military that had that had fought and bled for this country for years on end, it was the military that repelled the forces of Big Brother from our lands and it is the military who is reviving this nation, rebuilding it from the ground up and restoring its government. The military is the protector of the people, guarding them against the forces of terror that lurks behind every cornor and keeping everyone safe. Why shouldn't the military be granted greater say in the affairs of the nation?"
 USA_Maintain_Washingtons_Legacy:0 "Maintain Washington's Legacy"
 USA_Maintain_Washingtons_Legacy_desc:0 "When the United States government was concieved, it was designed to be a people's government. A Republic that would safeguard the rights of every man, woman and child. Though our first President, George Washington, was a General, he sought to maintain a government that would serve the people's wishes and ensure that power was fairly distributed across the land to ensure that equal and accountable governance would reign across this land.\n\nWe would do well to continue this tradition."
 USA_Reinstate_The_Constitution:0 "Reinstate the Constitution"
 USA_Reinstate_The_Constitution_desc:0 "The Constitution, the brain child of all the Founding Fathers and many Great Men after them, is one of the most important pieces of the United States of America. Having been suspended years ago during the Oceanian Civil War which gave rise to INGSOC, the conditions that lead to the Constitution's suspension are no longer present. It's time to honor our mission to our country and restore the Constitution of the United States as the document that governs our land."
 USA_Restarting_The_American_Dream:0 "Restarting the American Dream"
 USA_Restarting_The_American_Dream_desc:0 "The American Dream feels like a distant memory, even amongst the oldest of Americans who lived through the Oceanian regime and have witnessed the decimation and despair it has brought upon our lands. Once a thriving nation of dreamers, pioneers and entrepreneurs, Oceania had stripped all those traits away from us in order to bring about their own twisted vision of obedience and subjegation.\n\nBut we can bring back old America, we can bring back the American Dream. The first and most important step being to restore belief that this is possible."
 USA_Inspire_American_Fervor:0 "Inspire American Fervor"
 USA_Inspire_American_Fervor_desc:0 "From east to west, the idea of a United American nation has waned from the minds of many, with the notion of who we are slowly being lost on their weary minds. We need to inspire our people in more ways than simply being against the forces of Big Brother, we have to foster the idea of a nation that stretches from sea to shining sea, filled to the brim with Patriots of all walks of life."
 USA_The_National_Rescue_Plan:0 "The National Rescue Plan"
 USA_The_National_Rescue_Plan_desc:0 "Though the war is resolved, there remains much to do for our country. Infastructure is in tatters, our factories are old and outdated, and the economy we've inherited was clearly built for a different, alien system of government. The entire economy needs to be rebuilt from the ground up, so much has to change. But we've got to start somewhere, and starting with rebuilding our cities and reopening parts of the economy would be a good start."
 USA_Appoint_An_Interim_President:0 "Appoint An Interim President"
 USA_Appoint_An_Interim_President_desc:0 "America needs a President, someone who can be it's face and voice before the world. We've got the judical and legistlative branches of government restored but it is clear that if we are to continue forward as a country, we need to restore the executive branch of government. Now, we're quite far from even considering the notion of elections, considering the state of the country and the minds of the people. But we can appoint an Interim President in the meantime to get the ball rolling."
 USA.1.t:0 "The Second American Revolution"
 USA.1.desc:0 "The United States of America.\n\nGround zero for the death of freedom and the rise of INGSOC. It was here that the evils of INGSOC took root in the minds of our people, poisoning their hearts against their nation and leading to destruction of the once democratic Oceanian government, leading to the installation of Big Brother and INGSOC as the sole governing body of our land and many other lands beyond it.\n\nFor years, we have waited, biding our time for the day we can restore what was lost and bring an end to this evil. That time has come at last for us to cast of the veil and to show Big Brother and his band of tyrants that much to their horror, the United States still exists."
 USA.1.a:0 "By God, we'll have our home again"
 USA_Victory.1.t:0 "Chesarek's Address to America"
 USA_Victory.1.desc:0 "Ferdinand sat before a desk, a microphone on top of it for him to speak to the nation, or at least what the Army could recapture and retain from the war. Exhaling, Ferdinand watched as the man in the back of the room slowly counted down with his finger from three before the red light clicked on, signalling that he was live before the nation.\n\nHe was used to making speeches and rousing morale, but this was a little different. This was the entire nation and like it or not, civilians were not the same as soldiers. The voice of a General, a military figurehead wouldn't work the same way on a people that had been trapped under the Oceanian regime for decades. It wouldn't be easy trying to connect with any of them, but Ferdinand had come this far, he couldn't choke here.\n\n\"Good evening, people of America. For those who do not yet know me, I am General Ferdinand Chesarek of the United States Military. I am speaking to you today about the state of our nation in the wake of our liberation\" Ferdinand spoke evenly, keeping his tone calm and precise.\n\n\"We find ourselves in a new world, America—a time where our destiny is uncertain, where nothing will be as it once was. I know many of you are afraid, confused, and uncertain about all of this. But let me make one thing certain for you all, our destiny as a nation is in our hands, that you can be certain of.\"\n\nFerdinand paused, allowing the words to settle for a moment before speaking.\n\n\"We have our country once again. We have agency, direction, and hope that whatever we can create, it is ours. There remains much work to do, so much to accomplish on many different levels, but it is ours. So I ask of you, to have faith in tomorrow. To have hope that our country can rise above what can before us. I ask... that you trust our country once more as our forefathers had done so many years ago.\"\n\nAfter a while, his speech had concluded with the red light of the microphone fading into nothingness. Ferdinand sighed, clasping his hands together on the table as one of the operators entered the room.\n\n\"Well... how did I do? Answer honestly\" Ferdinand spoke, glancing up from his hands to the operator."
 USA_Victory.1.a:0 "\"It's a start, sir. It's a start\""
 USA_Victory.2.t:0 "The Farm House"
 USA_Victory.2.desc:0 "Sargent Grayson stepped out of the passenger side of the truck, making his way toward the commanding officer who had been overseeing the siege of an old farm house that a group of Oceanian loyalists had taken over and made into their base of operations.\n\n\"How's the situation looking, Corporal Anders?\" Grayson asked as he walked over, the two men saluting one another before turning their gaze to the house.\n\n\"Stagnant, so far. We could storm the house, I don't doubt we could take the place but I don't want to risk losing any lives in there. So for now, I've got my unit keeping the perimeter secure in case our 'friends' inside try to make a break for it\" Anders responded with a sigh, his hands on his hips as he observed the house.\n\n\"Hmph. You'd think with everything on their side going to shit, they'd wisen up and surrender\" Grayson muttered, shaking his head slightly.\n\n\"These are fanatics. They may look Human but many of them tend not to. That's the unfortunate state of affairs, sir\" Anders remarked as he cross his arms.\n\n\"Believe me, I'd know. I was there during the battle of Salt Lake City early on during the war, Oceanian soldiers are loyal to their cause, suicidally so\" Grayson stated grimly.\n\nAnders nodded, a small frown on his face before turning to Grayson.\n\n\"So what are your orders, sir? Are we to storm the house?\" Anders asked cautiously.\n\nGrayson shook his head in response.\n\n\"Nah, they're stuck and likely hungry. Keep them couped up in there, we can out last them...\""
 USA_Victory.2.a:0 "\"Time is on our side, after all\""
 USA_Victory.3.t:0 "You Have the Right to Remain Silent"
 USA_Victory.3.desc:0 "Ricky had finally hit the end of his luck. Stuck in a car with his tires blown out, he bashed the steering wheel of his car in frustration as the police cars that had been pursuing him for the past few hours came to a stop behind him, the officers stepping out and making their way toward his car with their hands on the grip of their pistols in their holster.\n\nWalking over casually, one of the officers with a pair of sunglasses and a mustache above his lips peered inside.\n\n\"End of the line, yeah?\" The officer spoke lightly, Ricky only glaring in response.\n\n\"Fuck you\" Ricky spat in irritation.\n\n\"Hm, that's what I thought. You know, Big Brother might be gone, but that don't mean you get to steal cars that ain't yours. Now, get out of the car but I help you get out\" the officer replied, unbothered by Ricky's attitude as he opened up the door, keeping his hand on his gun.\n\nWith the other officers all standing by, watching Ricky with a analytical gaze, Ricky huffed as he reluctantly stepped out of the car.\n\n\"Pretty sure driving without a seatbelt is also a felony, bud\" the officer with the sunglasses remarked as he grabbed Ricky, pushing him toward the hood of the car and pressing him down on it, pulling out a pair of handcuffs as he restained Ricky's hands."
 USA_Victory.3.a:0 "\"Now, kid. You've got a right to remain silent...\""
 USA_Victory.4.t:0 "Congress in Session"
 USA_Victory.4.desc:0 "Ferdinand watched from afar as the Congressmen all found their seats. The new Congress had were conveneing in Grant-Humphrey's Mansion, an old rundown manor that had been refurbished and repurposed to house the Continental Congress. It wasn't perfect, but it would work until they could get their hands back on Washington D.C.\n\nJohn R. McGiffert, serving as the temporary speaker of the Congress, struck his gavel to gain the attention of the Congress.\n\n\"Members of Congress, please settle down and find your seats. This Congress is to be brought into order!\" McGiffert spoke loudly, the Congressmen swiftly resolving any conversations they were having before settling down in their respective seats.\n\n\"Thank you. Now, moving onto today's subject of discussion, the appointment of an offical Speaker to lead this Congress. I will first grant five minutes of time to representative William Turner of the State of Nevada. Representative Turner, the floor is now yours\" McGiffert spoke, gesturing to the representative before he settled into his seat as the representative got to his feet."
 USA_Victory.4.a:0 "Let deliberations begin"
 USA_Victory.5.t:0 "A Word From the King"
 USA_Victory.5.desc:0 "Standing before the press, Elvis exhaled as he looked upon the reporters and journalists that had gathered before him. They were green, trying to figure out their fields and thus, inexperienced. They were no professionals, not like during the old days. Elvis let out a quiet chuckle as he thought about the days when he was younger before everything changed, when he was just an aspiring musician who made the women swoon and the rest of the South furious. All the smear campaigns and the press, what a ride that was. Now here he was, a General in the army and addressing the press himself, a little older, though wiser?\n\nHe was still trying to figure that out.\n\n\"Ladies and Gentlemen of the Press, it is my pleasure to inform all of you that today, the Continental Congress has formally reinstated the Constitution of the United States of America\" Elvis announced, allowing the news to settle in for all of them before continuing to speak.\n\n\"This is an important milestone for all of us here today. Our rights, from freedom of speech, freedom of religion, and so many other essential God-given rights, are safe and secure once more. Freedom is being restored, one little baby step at a time\" Elvis' deep, smooth voice continued, the tinge of a Southern accent still present even after all these years.\n\n\"General Presley, sir! Does this mean you'll be making songs again?\" One of the reporters called out from the crowd.\n\nElvis chuckled, a genuine smile on his face as he thought about his brief stage days once more."
 USA_Victory.5.a:0 "\"We will see, son. We will see.\""
 USA_Victory.6.t:0 "Good Morning, America!"
 USA_Victory.6.desc:0 "Tim sat outside on the porch with his father, quietly playing with some old toy soldiers whilst his Father listened to the radio. It had been odd, to say the least, not having Big Brother around anymore. It was weird to be a kid again. When the American Army came through, Tim's Dad was swift to stick a bunch of toys in his hands, throw out all the Party propaganda and tell him to quote, \"You're free to be whoever you want now, Son. So go be a kid for a little while.\"\n\nAs Tim played with his toys, the voice of the radio host filled the air.\n\n\"Goooooood Morning, America!\" Came the loud, enthusiastic voice of the host, Robin Williams.\n\n\"This isn't a test, this is Rock'n\"Roll, time to rock it from the Pacific to the Atlantic. Is it me or does that sound like an old record from General Elvis, oh Viva Las Vegas, baby!\" The fast and humourous voice spoke, earning a few giggles from Tim and a small chuckle from his Father.\n\n\"Here in Kansas City will be enjoying some mighty fine weather, bright blue skies and not a single dreadful cloud in sight. Across the nation, our brilliant boys in uniform are having a roadhouse party day in and day out, picking up Oceanian remnants like kids on an Easter morning! They're so damned effective, I wonder what they'll do once all those fanatics are in the gutter. I fear they may be out of a job soon enough at this rate!\"\n\nTim glanced at his Dad for a moment upon hearing that. Once more, the news of a future without Oceania became present once more. Tim wondered what it was like for his dad when he was a kid, during the time before Oceania when the United States of America ruled like it does now. Tim couldn't help but smile a little as he looked down at his toys before looking over at the flag pole in their yard where the old US Flag flew proudly. Perhaps he would find out soon enough."
 USA_Victory.6.a:0 "\"Speaking of good ole' General Elvis, here's a hit of his from the good ole' days!\""
 USA_Victory.7.t:0 "Get Ready"
 USA_Victory.7.desc:0 "Ferdinand looked out the window at the small town of Jackson, Wyoming, the small and unassuming mountain town that had long served as the base of operations for the Second Continental Army and now the formal capital of the Continental Federal Republic. Sitting in his chair with a coffee in his hand, the old general let out a sigh as he glanced at the mountain range to the west of the town, the sun beginning to dip behind the towering snowy peaks.\n\nHe was getting old, and he could feel it.\n\nHis strength was beginning to fade, and though sharp, he felt slower than he had ever done leading the resistance against Oceania. He held the mug with both his hands, looking down to see that it was nearly empty. His time was running short, and it'd only be a matter of time before he was spent. Yet, despite all his service, his country still called upon him to lead. He had been unanimously selected by Congress to become the President, to guide the nation in the aftermath of everything and try restore what used to be long ago. Ferdinand knew it wouldn't be easy. There were other nations and factions to contend with now. Those who would contest their claim as heirs of America. Things had improved for most Americans, but there was still much to be done. There was still so much to fight for and then rebuild. It was all exhausting.\n\nSetting the mug aside, Ferdinand slowly got to his feet, his mind drifting to his address to Congress. They were all eager for a plan, and he had to give them one. Grabbing his script from his desk, the old General looked to the door and composed himself. America needed a leader..."
 USA_Victory.7.a:0 "And he still has a few years left in him."
 USA_government.1.t:0 "Office of the Vice President"
 USA_government.1.desc:0 "Ferdinand sat in his office, reading over a report regarding the state of the Army, which was important to have given that the rest of the states would need to be brought back into the fold soon enough. Ferdinand sighed, rubbing his eyes as he set the papers down. The Presidency hadn't been east thus far. Trying to wrangle Congress whilst trying to rebuild the country? He was used to stress, but this was a different kind of stress he'd need to get accustomed to. It was there that Bernard Rogers made his way into his office, closing the door behind him.\n\n\"Ah, Bernard. I trust you're here to tell me that all our opposition has surrendered and I can finally find a lakeside cabin to retire to?\" Ferdinand asked with a slight smile as he leaned back in his chair.\n\n\"If only it were that simple, Sir. But no, I'm here for a different reason. I'll cut to the chase, you need to pick a Vice President.\"\n\n\"You offering?\"\n\n\"Thank you, sir, but I'm quite comfy where I am. However, you need to start thinking about succession and who you want being there.\"\n\nFerdinand sighed, getting up and turning to face the window, looking out at the town of Jackson. He'd been putting it off for some time now. Whoever he picked would affect Congress in some form.\n\n\"I know. I've given the matter some thought and I've got two candidates in mind. There's James Baker from the Constitutionalists. He's moderate, Militarists won't like it but he's not too controversial. Then there's Noah Grace. Militarist, but not a War Hawk. He's an Isolationist, just wants to secure America. He'd make the Constitutionalists nervous, but he'd get enough of Congress to back future reclamation wars.\" Federinand explained.\n\n\"Two good candidates. But alas, there can only be one\" Bernard replied simply.\n\nFerdinand glanced over his shoulder back at Bernard. He knew he'd have to make a choice eventually. The succession couldn't be left vacant and he was going to need a VP to help him keep Congress firmly behind him. He had to make a decision."
 USA_government.1.a:0 "James Baker"
 USA_government.1.b:0 "Noah Grace"