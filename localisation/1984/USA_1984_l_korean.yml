 USA_Where_Tyrants_Come_To_Die:0 "Where Tyrants Come To Die"
 USA_Where_Tyrants_Come_To_Die_desc:0 "\n\n\n\n£GFX_USA_Where_Tyrants_Come_To_Die_Banner\n\n\n\n\n\n\n§WThis is America. We are not a land of submission. We do not bow our heads and go along with the whims of tyranny, regardless of whatever face it takes. This land is a free land and it was built upon the backs of dreamers, explorers and pioneers who saught to establish a land of grace and freedom. America isn't just where freedom takes root.\n\nAmerica is where tyrants come to die.§!"
 USA_Where_Tyrants_Come_To_Die_Two:0 "Where Tyrants Come To Die"
 USA_Where_Tyrants_Come_To_Die_Two_desc:0 "\n\n\n\n£GFX_USA_Where_Tyrants_Come_To_Die_Banner\n\n\n\n\n\n\n§WThis is America. We are not a land of submission. We do not bow our heads and go along with the whims of tyranny, regardless of whatever face it takes. This land is a free land and it was built upon the backs of dreamers, explorers and pioneers who saught to establish a land of grace and freedom. America isn't just where freedom takes root.\n\nAmerica is where tyrants come to die.§!"
 USA_Where_Tyrants_Come_To_Die_Three:0 "Where Tyrants Come To Die"
 USA_Where_Tyrants_Come_To_Die_Three_desc:0 "\n\n\n\n£GFX_USA_Where_Tyrants_Come_To_Die_Banner\n\n\n\n\n\n\n§WThis is America. We are not a land of submission. We do not bow our heads and go along with the whims of tyranny, regardless of whatever face it takes. This land is a free land and it was built upon the backs of dreamers, explorers and pioneers who saught to establish a land of grace and freedom. America isn't just where freedom takes root.\n\nAmerica is where tyrants come to die.§!"
 USA_Sic_Semper_Tyrannis_Idea:0 "Sic Semper Tyrannis"
 USA_Down_With_Big_Brother:0 "Down With Big Brother!"
 USA_Down_With_Big_Brother_desc:0 "\n\n\n\n£GFX_USA_Down_With_Big_Brother_Banner\n\n\n\n\n\n\n§WDown with Big Brother!\n\nDown with the party of INGSOC and their tyrannical ways! Down with those who would exploit our people and bring forth horrors upon our way of life! Down with those who would see America and the many nations of the world be forgotten in favour of a culture of confusion and despair!§!\n\n§RDOWN WITH ALL OF IT!§!"
 USA_Dismantling_The_Myth:0 "Dismantling the Myth"
 USA_Chaos_And_Disorder:0 "Chaos and Disorder"
 USA_Chaos_And_Disorder_desc:0 "\n\n\n\n£GFX_USA_Chaos_And_Disorder_Banner\n\n\n\n\n\n\n§WThe Second American Revolution is a messy afair. Though the army side of things remains steadfast and ensuring that America advances everywhere on the frontline, the domestic front can only be described as chaos and confusion. Many Proles are confused by who we are and what exactly is going in, especially those living in the Polis regions.\n\nSome have taken to our cause of restoring freedom but how they express their views, well... maybe leave the fighting to the troops.§!"
 USA_Chaos_And_Disorder_Two:0 "Chaos and Disorder"
 USA_Chaos_And_Disorder_Two_desc:0 "\n\n\n\n£GFX_USA_Chaos_And_Disorder_Banner\n\n\n\n\n\n\n§WThe Second American Revolution is a messy afair. Though the army side of things remains steadfast and ensuring that America advances everywhere on the frontline, the domestic front can only be described as chaos and confusion. Many Proles are confused by who we are and what exactly is going in, especially those living in the Polis regions.\n\nSome have taken to our cause of restoring freedom but how they express their views, well... maybe leave the fighting to the troops.§!"
