l_korean:
 RHO_country_selection_tt:0 "§YHOW TO PLAY THE REPUBLIC OF RHODESIA\n-----------------------------------------§!\nPlay as the §gFrontier Administration§!, play through content until the Frontier Collapse occurs. The event to to switch to the §nRepublic of Rhodesia§! will then pop up."
 1984_Opening_Screen_RHO_Title_TT:0 "§nREPUBLIC OF RHODESIA§!"
 1984_Opening_Screen_RHO_Desc_TT:0 "When the §RBritish Empire§! and the §mUnited States of America§! united to form the §YCommonwealth of Oceania§! following the disaster that was Operation: Unthinkable, South Rhodesia had also been included in its creation as a result of being a §RBritish Colony§!. Hopes were high in Rhodesia, being part of such a large and powerful nation offering opportunities of economic growth and further expansion of the Rhodesian populace.\n\nBut all that changed when the §REnglish Socialists§! began the §YOceanian Civil War§!, which saw chaos and revolution dominate Oceania. Unlike North America, Australia and the British Isles, most of African Oceania save for South Africa avoided the chaos of the civil war. When the outcome of the civil war beginning to become clearer, with the Loyalist Forces becoming overwhelmed by the Revolutionaries, the majority of Oceanian Africa made a decision and broke away from Oceania, preferring the chaos of independence to whatever might happen under the rule of §RINGSOC§!.\n\nRhodesia joined them in declaring their independence.\n\nIndependence had not been an east prospect for Rhodesia. Rhodesia was surrounded by enemies, with Oceania consolidating the §qCape Province§! to the south and the black majority governments around us not taking kindly to a nation that was primarily lead by the White Rhodesians. But we made it work, our status as the \"Breadbasket of Africa\" allowing us to keep the black-majority states of Africa neighbouring us from considering an invasion plan, lest their people starve. And the influx of refugees from Oceania helping to bolster our population, allowing us to adequately defend our borders from Oceanian incursions whilst keeping the §RZANU fighters§! out in the bushlands of Rhodesia under control.\n\nBut luck would not last forever. Soon enough, Oceania struck deep into Oceania, breaking through the defences of §GZambia (Once Northern Rhodesia)§! and flooding in, overwhelming the armies of the region, including our own. For years, we fought against the §iFrontier Administration§!, building up strength whilst undermining their credibility and authority in the region, all part of a wider plan to shatter the §iFrontier Administration§! and liberate all nations that found their lands occupied, including our own.\n\nAnd comes the final step. The Frontier is buckling, clinging onto what territory it still holds whilst finding itself surrounded by enemies on multiple sides.\n\nWe've made it this far.\n\n§RLet's get the job done.§!"
 1984_Opening_Screen_RHO_Gameplay_Paths_Desc_TT:0 "§YRhodesian Paths§!\n- Crush the §iFrontier Administration§! and secure independence for §nRhodesia!§!"
 1984_Opening_Screen_RHO_Button_TT:0 "Thick and Thin"
 RHO_Promise_Tribal_Autonomy_tt:0 "§YWe will promise the Tribes of Rhodesia Autonomy after the war§!"
 RHO_Dave_Smith_head_minister_desc:0 "§gMinority Government§!\n§YEconomic Prime Minister§!"
 RHO_P_K_van_der_Byl_foreign_minister_desc:0 "§gMinority Government§!\n§YPopular Minister§!"
 RHO_Angus_Graham_economic_minister_desc:0 "§gMinority Government§!\n§YSeventh Duke on Montrose§!"
 RHO_Sandy_Maclean_defence_minister_desc:0 "§gMinority Government§!\n§YMilitary Organiser§!"
 RHO_Rhodesians_Never_Die_idea:0 "Rhodesians Never Die"
 RHO_Rhodesians_Never_Die_idea_desc:0 "\n\n\n\n£GFX_RHO_Rhodesians_Never_Die_idea_Banner\n\n\n\n\n\n\n§WThe Rhodesian people and its armed forces have long fought an underground campaign of resistance against the forces of Oceania in the pursuit of a free Rhodesia\n\nThe masters of our lands and having long fought in the name of the cause, the Rhodesian military is as capable as ever before in fighting for its land and with Oceania falling apart at the seems, the time has come to finally confront Oceania's lingering African forces and repel them from Rhodesia and Africa once and for all!§!"
 RHO_White_Minority_Rule_idea:0 "White Minority Rule"
 RHO_White_Minority_Rule_idea_desc:0 "\n\n\n\n£GFX_RHO_White_Minority_Rule_idea_Banner\n\n\n\n\n\n\n§WThe Rhodesian population, compared to the native African population, isn't as numerous as we'd like it to be. Across Africa, sentiments against Oceania have also become sentiments against White people in general, leading to the emergence of socialist and communists movements aiming to 'remove' us.\n\nIf we want to endure on this continent without putting our lives in the hands of native Africans who we, frankly, cannot trust, then a minority rule government is the only solution to ensure the safety of all Rhodesian citizens from mass reprisals.§!"
 RHO_White_Minority_Rule_idea_two:0 "White Minority Rule"
 RHO_White_Minority_Rule_idea_two_desc:0 "\n\n\n\n£GFX_RHO_White_Minority_Rule_idea_Banner\n\n\n\n\n\n\n§WThe Rhodesian population, compared to the native African population, isn't as numerous as we'd like it to be. Across Africa, sentiments against Oceania have also become sentiments against White people in general, leading to the emergence of socialist and communists movements aiming to 'remove' us.\n\nIf we want to endure on this continent without putting our lives in the hands of native Africans who we, frankly, cannot trust, then a minority rule government is the only solution to ensure the safety of all Rhodesian citizens from mass reprisals.§!"
 RHO_Legacy_Of_Rhodes_idea:0 "Legacy of Rhodes"
 RHO_Legacy_Of_Rhodes_idea_desc:0 "\n\n\n\n£GFX_RHO_Legacy_Of_Rhodes_idea_Banner\n\n\n\n\n\n\n§WRhodesia's namesake, Cecil Rhodes, has continued to endure as a key part of Rhodesian identity and history, with the foundations he laid long ago serving as the basis for the modern Rhodesian nation, even with all the disruption caused by Oceania.\n\nRhode's dream of a railway from the Cape to Cairo may not become a reality, at least not in our lifetime, but we can ensure that the land he loved and his fascination with trains lives on.§!"
 RHO_Black_Reserve_Force_idea:0 "Black Reserve Force"
 RHO_Black_Reserve_Force_idea_desc:0 "\n\n\n\n£GFX_RHO_Black_Reserve_Force_idea_Banner\n\n\n\n\n\n\n§WThe Rhodesian Black Reserve Force is a reservist force that during times of war, assists in matters of military policing and garrisoning important facilities. They keep things behind the scenes stable so that our boys at the front can continue to do what they do best.\n\nFight for Rhodesia!§!"
 RHO_Rise_O_Rhodesia:0 "Rise O Rhodesia"
 RHO_Rise_O_Rhodesia_desc:0 "The years of resistance against the INGSOC regime is over. Though we find ourselves in an unlikely coalition, our objective to liberate the lands of Rhodesia remain unchanged. If the Frontier is to fall, all sons and daughters of our great Rhodesia must rise up. Rise and bring an end to this faltering, degenerate regime."
 RHO_Reorient_The_Public:0 "Reorient the Public"
 RHO_Reorient_The_Public_desc:0 "The public of Rhodesia, especially within the cities, have been subjected to constant propaganda and subversion from the Frontier Regime. Though many were not fooled into believing the slogans and tales of Big Brother, there are many who are confused and need a sense of direction now that Rhodesia has been restored.\n\nIt would do well to begin our counter campaign against Oceania to restore our national sense of identity and to give the people a message that they can resonate with and rally behind."
 RHO_Seize_Frontier_Resources:0 "Seize Frontier Resources"
 RHO_Seize_Frontier_Resources_desc:0 "Across Rhodesia, there were plenty of resources extracted by the Frontier to be shipped off to the Cape Province from which it is shipped off to the rest of Oceania. With the Frontier in chaos and unable to extract without reprecussions, we can swiftly seize all their ill gotten gains and restore them to the control of Rhodesia."
 RHO_Develop_Bulawayo_Industrial_Sector:0 "Develop Bulawayo Industrial Sector"
 RHO_Develop_Bulawayo_Industrial_Sector_desc:0 "Bulawayo has served as the heart of the Rhodesian movement, the foundation from which our country can rise again. A strong Bulawayo is a strong Rhodesia and thus, our industrial efforts must be focused here to ensure Bulawayo remains strong enough to ward off the forces of Oceania and secure our land its well deserved independence."
 RHO_Rehabilitate_Salisbury:0 "Rehabilitate Salisbury"
 RHO_Rehabilitate_Salisbury_desc:0 "The true capital of Rhodesia, Salisbury, has taken the brunt of Oceania's propaganda efforts. Here, you will find the most of our indoctrinated populace, the city not too dissimilar from Cape Town and Johannesburg in terms of how integrated it is to Oceanian society.\n\nIt will be a long road for Salisbury to be rehabilitated back into Rhodesia, but some investments into improving the situation here would be a good start."
 RHO_Resolving_Manpower_Problems:0 "Resolving Manpower Problems"
 RHO_Resolving_Manpower_Problems_desc:0 "Unlike the other factions in Africa, we do not maintain have the total support of the local population at our side, beyond the White Rhodesian populace and some black members of society who are more willing to fight for us to get rid of the Frontier.\n\nConsidering the current way Rhodesia works, it is unlikely that we can resolve the situation completely, but there are things the government can do to alleviate the situation."
 RHO_Pass_Emergency_Draft_Bill:0 "Pass Emergency Draft Bill"
 RHO_Pass_Emergency_Draft_Bill_desc:0 "We don't have time to negotiate with the black population of this land, we need men and need them now. Thus, drafting men into the armed forces now is the quickest way to expand our manpower reserves and give us the men needed to push the Frontier out of Africa and into the sea."
 RHO_Promise_Tribal_Autonomy:0 "Promise Tribal Autonomy"
 RHO_Promise_Tribal_Autonomy_desc:0 "Whilst tribal relations with the government are still uncertain, we can begin smoothing things over and start winning some of their people to ourside by promising their tribal lands autonomy within Rhodesia, allowing them self governance, the extent of which is to be determined in future negotitations.\n\nIt won't win over all of them, but it should encourage more Black Rhodesians to join our armed forces and beat back the Frontier."
 RHO_Establish_The_Black_Reserve_Force:0 "Establish the Black Reserve Force"
 RHO_Establish_The_Black_Reserve_Force_desc:0 "Whilst most Black Rhodesians are not keen on fighting on the frontline, we could entice men to join the Reserve Force. Mainly tasked with policing and garrisoning certain areas, this would free up some White Rhodesian men for the frontlines whilst Black enlistment in the armed forces.\n\nWho knows, some may even design to serve full time."
 RHO_Our_Homeland_Forever:0 "Our Homeland Forever"
 RHO_Our_Homeland_Forever_desc:0 "This is our fair Rhodesia, free and sovereign now and forever. We fought for this country, the land that we step on, the people that make this land more than a name on a map. Oceania is repelled from our lands, Big Brother pushed back elsewhere, at least for the time being. Whilst our troubles are hardly over as our allies become advaseries, fuelled by their own ambitions in the wake of their victory.\n\nBut for now, we can enjoy this new peace that has been achieved and focus inwards on our own development."
 RHO_starting.1.t:0 "The Republic of Rhodesia - 1984"
 RHO_starting.1.desc:0 "After many long years of fighting in the shadows, hiding away in the bush of our country against the forces of INGSOC, we have emerged. Our country, once in peril, now has a chance for liberation. With the situation in the Frontier having detriorated to the point where we and the other rebel groups have rose up against the administration, the liberation of Africa from these sinister forces is only a matter of time now.\n\nAs the people take up arms and begin tearing down the posters & breaking the Telescreens, the age of indoctrination is now over and the call of a free Rhodesia has come at last.\n\nThe battle has come, the battle for the future of Rhodesia."
 RHO_starting.1.a:0 "Now let's get it done"
 RHO_starting.2.t:0 "New Day, Old Order"
 RHO_starting.2.desc:0 "Jensen walked through main street of Bulawayo, watching as some construction workers were removing the statue of Big Brother and replacing it with one of Cecil Rhodes. It was strange, seeing all things to do with Big Brother and INGSOC being removed. It felt almost like a dream in a way. He remembered the days when he was young when Rhodesia was under the British Empire, when the Union Jack flags flew on every flag pole and all the posters and radio broadcasts concerned themselves with matters of Britannia rather than Big Brother.\n\nAs he glanced around the street, at the green and white flags that all containined the coat of arms of Rhodesia, Jensen couldn't help but wonder if things would be different this time. Would this be another Empire, another Big Brother, or would this be something different?\n\nEither way, he was thankful the new government let him turn off the Telescreen and remove all the microphones from his apartment."
 RHO_starting.2.a:0 "A step in the right direction"
 RHO_starting.3.t:0 "Addressing Manpower Shortages"
 RHO_starting.3.desc:0 "\"The Frontier is on the way out, I don't see why we need to worry about our manpower right now\" Ian Smith spoke, lighting a cigarette before taking a drag, looking out at Bulawayo from the balcony of the house that was serving as the provisional home of the President..\n\n\"It's not the Frontier I'm worried about, Mr President, it's after the war. You and I both know those Black Communists Angola we're working with won't play nice forever. When the Frontier is gone, they'll turn their attention to us. Their Afro Marxist ideals and all that rubbish\" Dave Smith stated, standing beside Ian.\n\n\"Right... Mr Santos and his rabble\" Ian stated dryly, exhaling slowly.\n\n\"It's best ensure our army is fully manned and ready for the coming fight, sir. Perhaps it won't be while we're fighting the Frontier forces, but we know those Communists won't be content with us remaining\" Smith continued.\n\n\"I know, Prime Minister. I know\" Smith replied before sighing and turning to face him.\n\n\"I trust you've got some ideas then?\"\n\n\"Yes, Mr President. The Front's worked out two proposal's and I want your thoughts before I bring them to Parliament. We could implement an emergency draft. It'll secure us the manpower we need but it won't be very popular, especially among the urban populace\" Dave explained.\n\n\"And the second proposal?\"\n\n\"It might be a little more risky but we could also approach the Tribal Leaders. We make some promises, including autonomy... it might encourage more Black Rhodesians to enlist\" Dave continued, pulling out a document and passing it to Ian.\n\nSmith took it, opening the folder and glancing down at it. He took another drag of his cigarette, reading over it before sighing.\n\n\"This is... awfully liberal. Not everyone in government will like it\" Ian stated neutrally.\n\n\"Perhaps, but it would encourage some more loyalty amongst the tribes. Make them less likely to join any rebel movements. The decision is yours, sir. Whatever you prefer, I will bring before Parliament.\"\n\nSmith took another drag of his cigarette, looking out at Bulawayo once more as he thought on it. After a minute, he spoke."
 RHO_starting.3.a:0 "\"Autonomy is too risky right now. The draft will do\""
 RHO_starting.3.b:0 "\"Let's approach the Tribal Chiefs'"
 RHO_starting.4.t:0 "A New Day in Salisbury"
 RHO_starting.4.desc:0 "Robert walked down the streets of Salisbury, taking in the city around him now free of all the propaganda and speakers that had filled every inch of the city of his birth. It was refreshing to see more people not wearing the blue jumpsuits anymore. Sure, there were some roaming the streets who wore the suits, but more and more people were experimenting with new fashion and styles. They weren't all necessarily good, but it was certainly better than how things used to be.\n\nRobert walked past a group of Black Rhodesians sitting on a bench, talking amongst each other whilst the radio was on. It was a speech from President Smith. It was something to do with the government returning to Salisbury and cleaning up after INGSOC. As Robert walked by, the two men stopped their conversation and watched Robert for a moment. Robert shifted, trying to ignore them as he continued on down the street. With the return of Rhodesia, there was new tensions between White Rhodesians such as himself and the Black Rhodesians. Nothing too severe just yet, but it was clear there were new tensions brewing beneath the surface.\n\nWhen or if they would manifest into something more... dangerous. Only time would tell."
 RHO_starting.4.a:0 "Rhodesia's troubles aren't over yet"