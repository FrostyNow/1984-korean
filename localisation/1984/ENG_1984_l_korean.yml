 ENG_victory_focus_tree:0 "British Victory Focus Tree"
 ENG_I_Vow_To_Thee_My_Country_tt:0 "§YThis will unlock the Victory Tree!§!"
 ENG_reuniting_the_kingdom_decision_category:0 "Reuniting the Kingdom"
 ENG_reuniting_the_kingdom_decision_category_desc:0 "Once upon a time, Britannia ruled the waves, from the shores of the Americas to the vast Pacific. A quarter of the world was ours, and we were feared and respected throughout the Earth. Those days are long gone now. And even if we wanted it, we couldn't just go out and reconquer the old empire in the name of King and Country.\n\nBut we can restore control over the island of Great Britain. It is our home, after all. Our fortress, our own slice of Earth for us to reign over. But this will not be without opposition. The Welsh and the Scottish have taken up arms and have seized their own independence and may not take kindly to the prospect of reunification.\n\nBut alas, Britain was always stronger when it was united under one banner and if we wish to maintain our independence from any powers wishing to proclaim lordship over our isles, then the reestablishment of the United Kingdom is of paramount importance."
 ENG_Propose_Welsh_Integration:0 "Propose Welsh Integration"
 ENG_Integrate_Wales:0 "Integrate Wales"
 ENG_Propose_Scottish_Integration:0 "Propose Scottish Integration"
 ENG_Integrate_Scotland:0 "Integrate Scotland"
 ENG_Properly_Rekindle_Canadian_Ties:0 "Properly Rekindle Canadian Ties"
 ENG_Reform_The_United_Kingdom_of_Great_Britain:0 "Reform the United Kingdom of Great Britain"
 ENG_Select_Leader_Portrait:0 "Select Leader Portrait"
 ENG_debug_decision_category:0 "United Kingdom - Debug"
 ENG_War_Victory_debug:0 "War Victory"
 ENG_Airstrip_One_No_Longer:0 "Airstrip One No Longer"
 ENG_Airstrip_One_No_Longer_desc:0 "\n\n\n\n£GFX_ENG_Airstrip_One_No_Longer_Banner\n\n\n\n\n\n\n§WSince its inception, Britain has been a part of Oceania, though it was never under that name. For as long as INGSOC had manhandled this once great Kingdom, this land had been refered to as Airstrip One, stripping this island of its identity in a vain attempt to erase the history of Britain.\n\nThey failed. Britain, after all the effort 'Big Brother' and the Party put in to have this nation erased, has emerged to once again fight off a monsterous tyranny that threatens to destroy our way of life. There will be much struggle in our aim to free this island but like our fathers before us, we shall persevere, we shall overcome and we shall triumph.§!"
 ENG_The_Royal_Question:0 "The Royal Question"
 ENG_The_Royal_Question_desc:0 "\n\n\n\n£GFX_ENG_The_Royal_Quesiton_Banner\n\n\n\n\n\n\n§WBritain was a Kingdom. It was always a Kingdom, with a great family and a King at the helm, steering the nation toward greatness. Yet, as we battle for our liberty and independence, many have wondered what has happened to the Royal Family?\n\nFollowing the Atomic War of the 1960s, the Royal Family had disappeared, never to be seen again. Some believe them to be dead, that the throne of Britain will remain forever empty, that the crown remain unworn by anyone of royal heritage. Though there still exists hope that there is someone out there in the world worthy of the crown, that flame of that hope withers more and more as the days go on.§!"
 ENG_Ending_Newspeak:0 "Ending Newspeak"
 ENG_Ending_Newspeak_desc:0 "\n\n\n\n£GFX_ENG_Ending_Newspeak_Banner\n\n\n\n\n\n\n§WOne of the most egregious examples of INGSOC tyranny is the implementation of Newspeak, a 'language' with the expressed goal of annihilating the English language and ensuring a vocabulary of obidience.\n\nDoublethink.\nDoubleplusgood.\nCrimethink.\n\nIndeed, a monsterous abomination that threatens the very nature of the Human being, a language that we can finally be rid of once and for all. Though it will not be overnight and many may still make use of the terms and words from Newspeak, we may rest easy knowing that in time, it will die out and the true tongue of the people of England will be restored to its former glory.§!"
 ENG_War_Is_Hell_idea:0 "War is Hell"
 ENG_Vanguards_Of_Freedom_idea:0 "Vanguards of Freedom"
 ENG_Vanguards_Of_Freedom_Two_idea:0 "Vanguards of Freedom"
 ENG_We_Shall_Never_Surrender_idea:0 "We Shall Never Surrender!"
 ENG_Saving_Our_Heritage_idea:0 "Saving Our Heritage"
 ENG_Freedom_Is_Life_idea:0 "Freedom is Life"
 ENG_Motivated_Citizenry_idea:0 "Motivated Citizenry"
 ENG_Anti_Sex_Laws_Repealed_idea:0 "Anti-Sex Laws Repealed"
 ENG_Combatting_Internal_Surveillance_idea:0 "Combatting Internal Surveillance"
 ENG_Combatting_Internal_Surveillance_Two_idea:0 "Combatting Internal Surveillance"
 ENG_Ignorance_Is_Weakness_idea:0 "Ignorance is Weakness"
 ENG_Concious_Contribution_ideas:0 "Concious Contributions"
 ENG_Resurgent_British_Nationalism_ideas:0 "Resurgent British Nationalism"
 ENG_Burning_BB_Posters_idea:0 "Burning BB's Posters"
 ENG_Unleash_The_Truth:0 "Unleash the Truth"
 ENG_Unleash_The_Truth_desc:0 "For too long, the people of England have slumbered. They have grown numb to their pain, their sorrows and yearnings drowned by propaganda and false realities aimed at keeping them down. No more. Britain must awaken from this nightmare and realise her destiny.\n\nIt was not so long ago that Winston, the man who united the disgruntled and rebellious, was asleep much like England. His eyes were open, yet he was not awake. But he broke free from the binding chains of INGSOC. If he could fight against Big Brother's influence, slip away from their prying eyes and fight back against the regime, why can't the rest of us?"
 ENG_War_Is_Hell:0 "War is Hell"
 ENG_War_Is_Hell_desc:0 "There is nothing peaceful about war. War is not who we are. Though Humanity will bicker and we often fight, to treat violence as something we are meant to be at all times isn't true. There is nothing good about warfare, only pain. So long as Oceania exists, the endless fighting will remain endless. Sons will perish and the comfort of peace ever illusive. We fight this war against the great foe to stop the endless war, to make sure no more sons of England are lost to any more pointless wars."
 ENG_The_Fight_For_Freedom:0 "The Fight For Freedom"
 ENG_The_Fight_For_Freedom_desc:0 "This isn't a war against a Big Brother, it's a war for the right to be heard. The right to say what you want to say, to be who you want to be. To have a country that views you as a person, not another cog in the machine. To have family and community around you and not have to fear growing too close to them. Where the young can share lvoe and the old can remember.\n\nWe fight for freedom, that is our aim!"
 ENG_Remember_Our_Finest_Hour:0 "Remember Our Finest Hour"
 ENG_Remember_Our_Finest_Hour_desc:0 "This isn't the first time our people have endured an enslaught of darkness. Decades ago, we were face down an enemy of a most vicious kind, and it took everything we had to overcome it. As we fight the great foe of this day, let us remember the times of old and take heart in the fact that this isn't the first time we've overcame the seemingly impossible, and we will certainly do so again."
 ENG_Speak_To_The_Troops:0 "Speak to the Troops"
 ENG_Speak_To_The_Troops_desc:0 "To inspire a man to fight for an idea isn't always an easy objective. To fight for something is to put life and limb at risk on the hope that sacrifice can bring forth something better for the next generation. We may not all be hardened soldiers. But we are survivors. Sometimes, it does well to remind someone of the strength of their resilience in the face of evil."
 ENG_Saving_Our_Heritage:0 "Saving Our Heritage"
 ENG_Saving_Our_Heritage_desc:0 "For years, Oceania has attempted to destroy our heritage and make us forget the legacy of our nation and our people. After all, the less people know of themselves, the easier it is to rule them. We can't allow this to continue on any longer. This fight is about the future of all of Britain, for preserving our ancient legacy that spans thousands of years."
 ENG_Ending_The_Forever_War:0 "Ending the Forever War"
 ENG_Ending_The_Forever_War_desc:0 "No more shall endless war dominate our future. No more shall we have to hear of allies becoming enemies and enemies becoming allies, where wars are fought for now reason and waged without end. We shall end the Forever War in Britain, once and for all."
 ENG_Freedom_Is_Life:0 "Freedom is Life"
 ENG_Freedom_Is_Life_desc:0 "Freedom is not slavery, freedom is the greatest expression of consciousness and life. The ability to freely speak your mind and choose to have your own beliefs. To associate with who you choose to associate with and to disagree with someone else, this is what separates people from drones. It was what makes us all truly alive."
 ENG_Promote_Personal_Expression:0 "Promote Personal Expression"
 ENG_Promote_Personal_Expression_desc:0 "If the people are unable to speak their minds freely and without fear of attack from the state, then they are not free. Simple as that. Yet even within our own boundaries, depsite the promises of liberty, the English people are still hesistant to speak, fearful of their own words, their own thoughts. Whilst the war must remain our top priority, we must examine methods of undoing the damage cause to the English people and restore the self confidence of every man and woman on this island."
 ENG_Repeal_The_Anti_Sex_Laws:0 "Repeal the Anti-Sex Laws"
 ENG_Repeal_The_Anti_Sex_Laws_desc:0 "The Anti-Sex Laws, whilst not literally preventing sex entirely, does heavily restrict the ability for two people to perform this act. To the point where people need to get permission from the Party in order to have sex with your state-mandated partner, with the expectation that the act would produce children that would go on to serve the Party.\n\nSafe to say these laws need to be torn apart as quickly as possible. It is not the job of the state to determine when and under what circumstances two consenting adults are allowed to share their love behind closed doors."
 ENG_No_More_Surveillance:0 "No More Surveillance"
 ENG_No_More_Surveillance_desc:0 "One of Oceania's most defining tools in maintaining their control is the dreaded telescreens, the mandated technology forced in every home and office, constantly spouting the propaganda of the Party whilst watching your each and every move. It will not be easy, but a priority of our movement must be to shut down the telescreens and remove Oceania's eyes from within as soon as possible."
 ENG_Smash_The_Telescreens:0 "Smash the Telescreens"
 ENG_Smash_The_Telescreens_desc:0 "Smash the Telescreens, smash them all! Show Big Brother your defiance! Your will to be free from his endless gaze! Do not let fear hold you back from breaking your chains! Do not rest until all of Britain is free from Big Brother's malevolent stare!"
 ENG_Big_Brother_Isnt_Watching_Anymore:0 "Big Brother Isn't Watching Anymore"
 ENG_Big_Brother_Isnt_Watching_Anymore_desc:0 "Across our territory, the few telescreens that weren't smashed by our people have long fallen silent. A black screen has replaced Big Brother, the machines severed from power and now dormant and useless.\n\nBreathe, people of England. Big Brother isn't watching anymore."
 ENG_Ignorance_Is_Weakness:0 "Ignorance Is Weakness"
 ENG_Ignorance_Is_Weakness_desc:0 "Ignorance is not a strength, not in the slightest. For ignorance is an aspect of foolishness, and we have allowed ourselves to be fools long enough. No, we must be aware and attentive. We must know what is going on around us and the actions our opposition is taking in undermining the unity and identity of the English people if we are to counter them together as a people."
 ENG_Awakening_Their_Wary_Minds:0 "Awakening Their Wary Minds"
 ENG_Awakening_Their_Wary_Minds_desc:0 "Many in Britain have been ensnared and indoctrinated into the ideology of INGSOC, their loyalty maintained out of fear of what might happen should you display anything but loyalty. This has caused may to doubt their minds, the not trust their own eyes.\n\nWe must tear apart this fear of retaliation from the state. We must show our people that they need not fear us or hide away their opinions good or bad. We must show them that in a free England, all Englishmen and women get a free voice too."
 ENG_Your_Thoughts_Belong_To_You:0 "Your Thoughts Belong To You"
 ENG_Your_Thoughts_Belong_To_You_desc:0 "Nobody can take your thoughts from you. Not your family. Not your neighbours. Not the police nor the army and certainly not Big Brothers. Your thoughts belong to you. You are the master of your concious, the owner of your mind. And nobody can rob you of that.\n\nNobody."
 ENG_Rediscover_Our_History:0 "Rediscover Our History"
 ENG_Rediscover_Our_History_desc:0 "Like in the many other nations Oceania has occupied, the history of Britain was distorted and suppressed by the Party, our glory days a distant memory for those who dared to remember what had once been. But no longer. The time of Oceania is coming to an end, with all of Britain rising once more from the ashes. Let our songs be sung and our stories be told. Let the nation that once ruled the waves be known to all once again."
 ENG_There_Will_Always_Be_An_England:0 "There Will Always Be An England"
 ENG_There_Will_Always_Be_An_England_desc:0 "So long as there are those that remember and those that still hold onto the dream of a free England for all Englishmen to know and hold to their hearts, then England shall never perish from this Earth."
 ENG_Knowledge_Is_Strength:0 "Knowledge is Strength"
 ENG_Knowledge_Is_Strength_desc:0 "There is strength in knowledge, in knowing and in searching. There may be bliss in ignorance at times, but willful Ignorance is the ultimate display of weakness. For those who close their ears and accept the world around them without question are those whom are most easy to mold and control.\n\nEngland must be more than just a free society, it must also be a society of thinkers. A society that isn't afraid to ask tough questions and explore new ideas in a constructive manner. The knowledge of tomorrow is out there, we need only the will to grasp it."
 ENG_I_Vow_To_Thee_My_Country:0 "I Vow To Thee, My Country"
 ENG_I_Vow_To_Thee_My_Country_desc:0 "We have done it. After years of oppression and struggle, England and the other nations of Great Britain have risen up and reclaimed their independence from the terror of Big Brother. Across England, song and celebration are taking place as our people can now speak freely in their homes and on the street, no longer fearing speaking out of turn and whatever may be around the corner.\n\nThe hard part is over. The long part, however, is only just beginning."
 ENG_The_New_Churchill:0 "The New Churchill"
 ENG_The_New_Churchill_desc:0 "Much like how Winston Churchill was the defining figure that secured victory for Britain following World War Two, so it is that Winston Smith has become the hero of newly liberated Britain. Through pain, hardship, and sheer determination, Winston has secured a future for all Britons that live on the island formerly known as Airstrip One, known to the world now as Great Britain, now and forever."
 ENG_Shatter_INGSOC_Strongholds:0 "Shatter INGSOC Strongholds"
 ENG_Shatter_INGSOC_Strongholds_desc:0 "Across England, there still exist many remnant strongholds of INGSOC alligent troops still clinging on to a long failed cause. Whilst they're no real threat to us now, the harm they could bring to our newly liberated citizens is definitely real. We must work to burn out these remnant strongholds as soon as possible before serious damage could be done to our people."
 ENG_Burn_BBS_Posters:0 "Burn BB's Posters"
 ENG_Burn_BBS_Posters_desc:0 "Across Britain, there exists hundreds of thousands of posters and propaganda leaflets bearing the face of Big Brother as well as numerous other slogans. We would do well to burn these posters and ensure they are made rare. This is a new era for England. It's time to put Oceania behind us."
 ENG_Meeting_With_Obrien:0 "Meeting with O'Brien"
 ENG_Meeting_With_Obrien_desc:0 "With the dust having settled and England now firmly under the control of it's own people, there is now time for Winston to visit the man who complicated his life in so many different and deceptive ways."
 ENG_Invite_The_Royal_Family_Home:0 "Invite the Royal Family Home"
 ENG_Invite_The_Royal_Family_Home_desc:0 "After years in exile in Canada, fighting in the deep north against the forces of INGSOC, the King can finally have a safehaven in England, the land of his birth. The kingdom that is his birth right. It's time to bring him and what remains of the Royal Family back home so that we can begin the restoration of our kingdom in full."
 ENG_Restoring_Westminster:0 "Restoring Westminster Palace"
 ENG_Restoring_Westminster_desc:0 "Westminster Palace was the seat of government during the age of the United Kingdom. It was where Parliament sat, creating laws and passing legislation that would affect the entire kingdom. During the age of Big Brother, Westminster was a closed off ruin, a shadow of what used to be. Left to rot. If we are to restore the kingdom, then we should begin the process of rebuilding Westminster."
 ENG_Rebuilding_Buckingham_Palace:0 "Rebuilding Buckingham Palace"
 ENG_Rebuilding_Buckingham_Palace_desc:0 "Buckingham Palace was once the home of the monarchs of the United Kingdom, the place from which the royals could project their influence in London itself whilst never being too far from their subjects. Under INGSOC, it was purposely reduced to ruins to signify the ruins of the 'tyrant monarchy'. With Big Brother gone from Britain, it would do well to begin rebuilding this important landmark."
 ENG_Honouring_Our_Heroes:0 "Honouring Our Heroes"
 ENG_Honouring_Our_Heroes_desc:0 "England is home to many legendary and historical figures from Richard the Lionheart to Sir Winston Churchill, who have each fought and preserved the glory and honour of England in their own ways, as well as numerous other leaders.\n\nTheir statues under INGSOC, however, were either removed from public view or blown up, often replaced with statues of Big Brother. But Oceania is no more, at least not in England. Let us honour our past and restore the statues of our heroes to their rightful place."
 ENG_Issue_Invitations_To_International_Leaders:0 "Issue Invitations to International Leaders"
 ENG_Issue_Invitations_To_International_Leaders_desc:0 "The coronation of the first King of England in decades is no small event. Across the world, there are many who remember Britain as a Great Power that once ruled the seas. Surely, there will be many across the seas who would like to see the coronation take place. Besides, it's a perfect opportunity for Britannia to find new allies across the world."
 ENG_The_Coronation_Of_His_Majesty:0 "The Coronation of His Majesty"
 ENG_The_Coronation_Of_His_Majesty_desc:0 "Everything is now in place to finally place Michael upon his rightous throne as the King of England, protector of his Majesty's loyal subjects, guarantor of liberty, and the defender of Christian faith."
 ENG_The_Legacy_Of_Room_101:0 "The Legacy of Room 101"
 ENG_The_Legacy_Of_Room_101_desc:0 "For many, even Winston, Room 101 is a place of terror and darkness. Where nightmares were made real and the line between Humanity and savagery were practically non-existent. We mustn't forget this dark, dark place, or the scars it left upon thousands in Britain alone, and who knows how many beyond."
 ENG_The_Failures_Of_INGSOC:0 "The Failures of INGSOC"
 ENG_The_Failures_Of_INGSOC_desc:0 "INGSOC never would have endured forever, no ideology could. But even within the current period, it's practices would not have brought forward anything but the current circumstances. Perhaps there was a time when English Socialism could have been a functional ideology with a proper vision. But what it became was a culture of distrust, backstabbing, deception, confusion, and devotion to an unseeable figure whom watched yet could not be seen himself.\n\nDid INGSOC have it's strengths? Sure, it ruled much of the world, there is no use in denying that. However, it could not hold these reigns for long. By it's own hubris and self assurance, it was undone.\n\nAnd now, we are free."
 ENG_The_Spirit_Of_Man:0 "The Spirit of Man"
 ENG_The_Spirit_Of_Man_desc:0 "The Spirit of Man yearns for meaning beyond the monotone of his day to day. It is what fuels rebellion and ensures that no status quo lasts forever. Good times will one day bring bad times, and bad times will eventually bring good times. Despite the efforts of Big Brother in squashing Man's spirit, it would seem not even the totalitarianism of INGSOC could overcome this phenomenon."
 ENG_Destroy_The_Ministry_Of_Love:0 "Destroy the Ministry of Love"
 ENG_Destroy_The_Ministry_Of_Love_desc:0 "The Ministry of Love represents obidience or terror for many across our country. There are few who would look back on the Ministry of Love and associate it with anything remotely positive. Though there are some who have suggested renovating the pyramids of the Ministry of Love, or at the very least maintaining them as landmarks in order so that the dark days are never forgotten, the general sentiment of the people is that the pyramids are better off torn down.\n\nThey have been photographed and archived. That is more than enough."
 ENG_Goodbye_Obrien:0 "Goodbye O'Brien"
 ENG_Goodbye_Obrien_desc:0 "It does not do one well to dwell on the past. Words have been exchanged and thoughts made known. For Winston, this needs to be enough. Can he forget O'Brien? Perhaps not. But the fact remains that there are those who need him at the helm.\n\nIt's time to put O'Brien, and the Legacy of INGSOC, behind us all."
 ENG_Prime_Minister_Winston_Smith:0 "Prime Minister Winston Smith"
 ENG_Prime_Minister_Winston_Smith_desc:0 "Winston Smith was the man who lead Britain out of it's darkest age, back into something resembling the nation we once knew. With England rising again from the ashes of what used to be, it's only right that the man who united the partisans and led us to freedom from Big Brother becomes our Prime Minister."
