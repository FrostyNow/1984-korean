l_korean:
 ENG_country_selection_tt:0 "§YHOW TO PLAY THE UNITED ENGLISH PARTISAN NETWORK\n-----------------------------------------§!\nPlay as the §gEnglish Socialist States of Oceania§!, play through content until the province breakdown prior to the §RAnti-Revolution§! occurs. When this occurs, remain as §YAirstrip One§! and wait until the event to to switch to the §RUnited English Partisan Network§! pops up.§!"
 1984_Opening_Screen_ENG_Title_TT:0 "§RUNITED ENGLISH PARTISAN NETWORK§!"
 1984_Opening_Screen_ENG_Desc_TT:0 "Once upon a time, §RBritannia§! ruled as the dominant power of the Earth, holding territory in every continent. Vast was the Empire's splendor, immense was its wealth and influence, nearly unparalleled was its great naval might.\n\n§GOh, how we wish we could have those days again.§!\n\nOnce ruling a quarter of the Earth, the British people now fight a desperate struggle for control of their own island. It was on Britain where §RINGSOC (English Socialism)§! had been birthed, cementing itself in British society and paving the way for §qBig Brother§! to rule over this island.\n\nBut the struggle is not hopeless. The whispers of revolutions and revolts in §qOceania§! and §REurasia§! have reinvigorated hope within our people, reviving a spirit that once conquered the world.\n\nWith §GWinston Smith§! at the helm of this revolution, a man once thought broken by the Thought Police, lulled into a sense of hopelessness and despair, has been spiritually revived and restored with a sense of hope and determination to bring down Oceania and free the island of Great Britain once and for all."
 1984_Opening_Screen_ENG_Gameplay_Paths_Desc_TT:0 "§YBritish Paths§!\n- Defeat §qAirstrip One§! and restore the §RUnited Kingdom of Great Britain!§!"
 1984_Opening_Screen_ENG_Button_TT:0 "Britannia Roars!"
 WINSTON_SMITH_DESC:0 "§WTortured and beaten. Isolated and starved. Forced to confess and left alone in the company of the broken, for many, it seemed as though Winston Smith had been broken. And for a time, that was true. The rising flame of consciousness that that shone brightly in his mind had been snuffed. But like any candle, all that is required is a small flicker of hope to reignite the flame of resistance and with Man's awakening across the globe, it wasn't long before Winston had been reawakened.\n\nBiding his time and slowly rehabiliating the once broken figures of resistance surrounding him, learning from them and growing ever wiser and aware of the methods of Big Brother, it was time for the once sleeping lion of Britain to join the world in its great revolt and roar once again, bringing an end to this monsterous tyranny, once and for all.§!"
