 ENG_victory.1.t:0 "The Dust Settles"
 ENG_victory.1.desc:0 "Winston sat on a chair in the makeshift command building in the heart of London. He held his hands together, looking down at them as he slowly exhaled, willing himself to calm down. It was finally over. Big Brother, at least in Airstr-... Britain had been cast out. It had been a long journey to get to this point, consisting of torture, warfare and pain, the fact that it was all over and that the new chapter had began was jarring to say the least. One could only imagine how many others were feeling the same way.\n\nA young soldier entered the tent, his rifle slung on his back as he stood at attention before Winston.\n\n\"Sir, we've received word that the last remaining INGSOC strongholds in Westminster and Camden have surrendered. The commanders are requesting orders, sir\" The soldier explained professionally.\n\nWinston observed the soldier for a moment before rising to his feet, composing himself as he approached the soldier.\n\n\"For now, arrest those who surrender and ensure they're disarmed. Don't kill any of them unless they give you no choice. There's been enough killing\" Winston ordered calmly, placing his hands behind his back to keep himself steady.\n\n\"Yes, sir!\" The solider replied quickly, saluting Winston before leaving to relay the orders on Winston's behalf.\n\nWinston sighed, walking over to a table and placing his palms on the edge, leaning against it."
 ENG_victory.1.a:0 "There is work to be done"
 ENG_victory.2.t:0 "Turntables"
 ENG_victory.2.desc:0 "Winston stood on the otherside of the double sided mirror, observing O'Brien sitting in his cell, his expression lacking much emotion, seeming almost despondenty in a way. Winston could recall when the positions were reversed, when he was in a cell at the mercy of O'Brien, seemingly doomed to be broken. He couldn't help but wonder if O'Brien felt any despair or disappointment he once felt, if he felt anything at all.\n\nInhaling, Winston turned and approached the door, the guard opening the door without a word as Winston walked inside, standing before the iron bars and watching O'Brien.\n\n\"It wasn't so long when I was in your shoes, O'Brien\" Winston spoke calmly.\n\nO'Brien chuckled dryly, glancing down at his hands momentarily.\n\n\"Indeed... it seems the shoe is on the other foot now. You've got me at your mercy now, free to do to me as I did to you, I imagine\" O'Brien spoke neutrally, finally meeting Winston's gaze.\n\n\"No, that is not the purpose of me being here. Perhaps a part of me... wishes to exact some form of vengence against you, to do what you had done to me, that... it'd make me no better than you. I fought to change the current order, not inherit it\" Winston replied, grabbing onto the bars and leaning closer, his gaze fixed on O'Brien with a stern gaze.\n\nO'Brien watched Winston, his brows furrowing slightly as he hummed."
 ENG_victory.2.a:0 "\"That, we shall see\""
 ENG_victory.3.t:0 "Homecoming"
 ENG_victory.3.desc:0 "Winston stood by the runway alongside the British soldiers accompanying him. There was a crowd gathering nearby, waiting patiently for the King-in-waiting, Michael, to step off the plane alongside the family that had been with him during his escape to Canada. This was a significant moment, for it had been many decades since a Royal of any stock had set foot on this island, having either been killed or driven away to distant lands in the hopes of coming back.\n\nSoon enough, the plane door opened, the people watching in with bated breath as a man in royal uniform stepped off, along with his wife and children following behind him.\n\nThis was it, the heir to the throne of England was home.\n\nWatching the crowds, Michael inhaled sharply, taking it all in. He was home at last, his exile was over. Looking down toward the end of the stairs, his eyes met Winston's. Making his way down the stairs, his family following closely, Michael approached Winston and stood before him."
 ENG_victory.3.a:0 "\"Winston, I presume?\""
 ENG_victory.4.t:0 "Rebuilding a Nation's Voice"
 ENG_victory.4.desc:0 "\"So... you think it's possible to restore Parliament?\" Michael asked as he and Winston moved through the halls of Westminster Palace, still in the midsts of reconstruction and renovation.\n\n\"A nation needs a government. It's something that needs to be pursued sooner rather than later\" Winston replied taking in the stonework and craftsmanship of the Palace as they entered into what would soon be the House of Commons once more.\n\n\"I agree but so soon? Much of the country is still devastated, many have forgotten what Parliament is supposed to even do\" Michael continued on.\n\n\"All the more reason to bring it back. The country is still unstable and in the control of few. It's best we restore some semblance of government before someone gets any ideas and becomes the next Big Brother\" Winston spoke grimly, meeting Michael's gaze.\n\nMichael felt a chill run up his spin, the thought of another Big Brother type figure infecting the Kingdom bringing him no comfort. Exhaling the King-in-Waiting slowly nodded his head.\n\n\"Very well, Winston. I shall trust your judgement\""
 ENG_victory.4.a:0 "One step at a time"
 ENG_victory.5.t:0 "Home is Home"
 ENG_victory.5.desc:0 "\"It's been a long time since I've been here\" Michael remarked, standing outside Buckingham Palace.\n\nThe Palace, despite the progress made in rebuilding it to it's former glory, was still far from a worthy home fit for the King of England, Scotland and Wales.\n\n\"I imagine so. It'll be some time before it could be considered comfortable, let alone livable for you, your Highness, but... we're getting there\" Winston stated, his hands behind his back as he looked over the Palace.\n\n\"Indeed\" Michael replied before turning to Winston.\n\n\"You know, I never expected to be on this island again as it's King. For a while, I believed that I would have to remain in Canada. I thought that even if this island were to break free of it's shackles... there would be no place for a King, or any royalty for that matter\" Michael explained, his voice quieter.\n\nWinston nodded, understanding the hopelessness of life under Oceania and the ever creeping feeling that nothing would change, that things would remain forever in Big Brother's control.\n\n\"Your Majesty, I don't remmeber much from my childhood... even then, our nation was still in the background of my mind... but if there is one thing I know for certain is that England has a King...\""
 ENG_victory.5.a:0 "\"And so, it will have you, King Michael\""
 ENG_victory.6.t:0 "Mr Chuchill"
 ENG_victory.6.desc:0 ""
 ENG_victory.6.a:0 ""
 ENG_victory.7.t:0 "Beyond Our Simple Island"
 ENG_victory.7.desc:0 "In the offices of Number 10 Downing Street, once the home of Prime Ministers of old and the temporary residence of the leadership of the Provisional Government, Winston and Michael were both writing personal invitation to leaders of major free nations, inviting them to the coming Coronation.\n\n\"It feels odd, writing to world leaders\" Michael remarked, not looking up from his writing. \"The world rest of the world feels so distant compared to the old days before Oceania. In all my years of exile, the notion of foreign diplomacy never occured to me.\"\n\nWinston chuckled slightly, setting down his pen before shaking his hand around to try ease the stiffness in his wrist.\n\n\"How do you think I feel? I've never as much written a letter to someone that wasn't related to my work in the Ministry of Truth. Now I'm writing to people I don't know and never met\" Winston spoke lightly, looking at the King who smirked in turn.\n\n\"Indeed. But it needs to be done, my friend. The nations of the world will have to start talking to each other at some point. What better way to get the world, or at least a decent chunk of it, to come together and talk then at the Coronation\" Michael spoke, shifting his eyes from the paper to Winston.\n\n\"I suppose so. Let us hope meeting them will go smoother than our letters\" Winston replied."
 ENG_victory.7.a:0 "\"Well, we have to start somewhere\""
 ENG_victory.8.t:0 "His Majesty"
 ENG_victory.8.desc:0 "In the halls of Westminster Abbey, leaders and diplomats from all over gathered in their seats, all awaiting for the ceremony for the coronation of the King of England to take place. There was a feeling of nostalga and optimism in the air, as though they had all taken a step back in time to a more familiar place, where the world wasn't ruled over by Oceania and Big Brother. Where the world seemed almost normal.\n\nWinston sat at the front, watching on as the King came on. Watching as he was crowned. Watching as he took his place on his throne. The anxiousness and fear that had been in Winston's heart since the revolt against Oceania first started began to lessen in his heart, a feeling of clarity and relief beginning to emerge as the room got to their feet and clapped for the return of the King and consequential restoration of the United Kingdom of Great Britain.\n\nIt wasn't just a celebration of the return of the King but a triumph of the old world, a piece of history that Oceania attempted to destroy and wipe away into nothingness. This was a victory, for it showed that inspite of the oppression of people and destruction of history, ground zero for the emergence of INGSOC managed to overcome it in the end."
 ENG_victory.8.a:0 "God Save the King!"
 ENG_victory.9.t:0 "Nostalga"
 ENG_victory.9.desc:0 "Winston and O'Brien stood together in Room 101, under the watchful eyes of soldiers to ensure O'Brien would stay in line. O'Brien was handcuffed, his face worn as he looked at the chair in the corner of the room.\n\n\"Are you going to put me in that chair, Winston?\" O'Brien asked at last.\n\nWinston shook is head.\n\n\"No. That is not why I have brought you here\" Winston replied.\n\nO'Brien scoffed before turning to face Winston.\n\n\"Then why did you bring me here? Do you want an apology? Do you want me grovelling at your knees begging for forgiveness?\"\n\nWinston sighed before facing O'Brien, meeting the older man's gaze.\n\n\"I want no such thing. I want you to reflect, O'Brien. To look at that chair, to stand in this room and reflect on the past\"\n\nO'Brien remained silent, furrowing his brows a little before looking away, looking at the chair once more. He was always the one to loom over his victims as he tortured them in this room, watching as they were strapped and restrained to the chair, at his mercy. He thought about the screams, all he had done in the name of Big Brother, in ensuring the survival of the Party.\n\nA Party that was no more.\n\nFrowning, O'Brien looked down at the ground, exhaling slowly as his hand twitched."
 ENG_victory.9.a:0 "\"Take me back to my cell, Winston\""
 ENG_victory.10.t:0 "Spark"
 ENG_victory.10.desc:0 "\"What made you so different from all that I encountered?\" O'Brien asked, sitting on a stool staring at Winston, the iron bars separating the two.\n\n\"I wish I knew the answer to that. I wish I could explain why I'm different, I wish I had a story of dramatics and intrigue to tell you. But truthfully, I am simply a man born of circumstance, much like any other man. All it took was a spark to begin it. Perhaps it was where I met your gaze for the first time during the Two Hours Hate all that time ago. Perhaps it was another incident that escapes my mind that became the catalyst for who I have become. It's not often one recognises change until it happens\" Winston explained, sitting on a stool of his own as he held his hands together, looking down at the floor.\n\nO'Brien observed Winston, watching him with an analytical eye as he always had done with anyone, a habit of his time as a member of the Thought Police. Crossing his arms, O'Brien too looked down at the floor, considering Winston's words before finally speaking.\n\n\"So all it takes is a spark, eh? All the propaganda, all the consequences. All brought down by a mere spark within a man\" O'Brien mused quietly."
 ENG_victory.10.a:0 "\"Yes, a spark\""
 ENG_victory.11.t:0 "Chain Reaction"
 ENG_victory.11.desc:0 "\"I don't see how it can be that one man can stir so much trouble. Perhaps I am just too old, too set in my ways but... I cannot fathom your role in all this. You were a man of the Outer Party, as ensared and under watch as any other Party Member, yet you managed to drag the entire island to your side with mere words\" O'Brien spoke flatly, sitting on his cot whilst Winston stood there.\n\nWinston pulled out a small pack of cigerettes from his coat, pulling two out and sticking one in his mouth before moving to pass one to O'Brien. O'Brien watched the cigerette for a moment before huffing, taking the cigerette and nodding in thanks as Winston lit both his own cigerette and his. Taking a drag and exhaling the smoke, Winston hummed a little as he pondered O'Briens words.\n\n\"A bit of a chain reaction, I suppose, much like anything else. The conditions were there, they always were. It just took a man to influence another who would influence another in turn and so on. The Party ran on fear and despair and that was both its greatest strength and weakness. Devoid men of hope long enough and eventually, they'll trully have nothing to lose. And it is men like that who set the stage for change against systems that fail\"\n\nO'Brien took a puff of his own cigerette, furrowing his brows as he thought on Winston's words.\n\n\"So, you mean to tell me that the whole system came crashing down because the Party took too much then?\" O'Brien inquired neutrally, glancing up at Winston.\n\nWinston shook his head, glancing at his cigerette for a moment before placing it back in his mouth, inhaling before removing it and exhaling."
 ENG_victory.11.a:0 "\"It never gave much to begin with\""
 ENG_victory.12.t:0 "Ashes to Ashes, Dust to Dust"
 ENG_victory.12.desc:0 "The distant sounds of explosions could be heard echoing throughout London, the crunching of concrete and the ploom of smoke rising into the air as the pyramid that served as the headquarters for the Defunct Thought Police descended down into the Earth, from a monolith to ruin as the skyline of the old city was cleansed of the sight of the once imposing building.\n\n\"I suppose you enjoyed having your hand in that\" O'Brien stated flatly, standing beside Winston, his hands bound as he watched where the Ministry of Love once was.\n\n\"I can't say I didn't feel any satisfaction watching that place go. It was quite the eyesore, that\" Winston remarked lightly, watching the dust rise into the sky before glacning over at O'Brien.\n\n\"I shouldn't be so shocked then. When you won, it was only a matter of time before you started tearing things down\" O'Brien replied dryly, meeting Winston's gaze with an unimpressed look on his face."
 ENG_victory.12.a:0 "\"Just the things that need tearing down\""
 ENG_victory.13.t:0 "Dream Made Real"
 ENG_victory.13.desc:0 "O'Brien looked out the window at the jubilent crowds, the atmosphere thick with a sense of optimism and hope as the world seemed to move on without men like him. O'Brien should have expected as much, history tends to leave the losers behind in favour of the victor. Hearing footsteps echoing behind him, O'Brien glanced over his shoulder where he saw Winston standing there, looking all prim and proper like a true Englishman ought to.\n\n\"So... we've got a King again\" O'Brien stated, looking out the window once more.\n\n\"Indeed. Seems this island is back to where it used to be before Big Brother\" Winston remarked.\n\nO'Brien shook his head a little.\n\n\"I suppose there is some truth. Though, Britannia doesn't exactly rule the waves... or much else anymore\" O'Brien replied flatly.\n\n\"Perhaps not. The nation may not span the Earth. But it doesn't need to. This island, it's people... they're more than enough.\"\n\nBut what of overseas, hm? The Unionists in Ulster, the Loyalists lingering Africa and the other former dominions... those will have to get answered at some point Winston. Are you prepared for that?\" O'Brien asked, turning to face Winston fully.\n\n\"Questions for another day. We shall see what the future holds for us all. Until then, I'm afriad I must be leaving you now, O'Brien\" Winston replied.\n\nO'Brien was silent, a slight look of surprise in his eyes as he slowly spoke.\n\n\"Leaving?\"\n\n\"For good, I'm afraid. We all need to move on from what was and embrace what is coming. I must do the same. This is goodbye, O'Brien, goodbye to the men we once were, goodbye to Oceania, to Big Brother. To you\" Winston replied softly, exhaling as he glanced down at the ground, composing himself before meeting O'Briens gaze again.\n\nO'Brien sighed quietly, slowly nodding in response.\n\n\"I suppose I... understand, Winston. Things are not the same... and they likely never will... but it seems my role in that destiny is over, and your journey still continues on... goodbye, Winston. Perhaps we shall meet again in the future, as different men\" O'Brien replied quietly, nodding a little at Winston before exhaling and turning to look out the window once more, a solemn look on his face.\n\nWinston nodded in response, smiling a little before turning to walk away."
 ENG_victory.13.a:0 "\"Until then, old friend\""
 ENG_victory.14.t:0 "Where Were We?"
 ENG_victory.14.desc:0 "Winston stepped through the door into the office of the King, who was quietly looking out the window, seemingly in thought.\n\n\"Your Majesty... you requested my presence, sir?\" Winston asked as he moved deeper into the room and stood at the center.\n\nThe King shifted his gaze back to Winston before turning fully to face him.\n\n\"Winston, my friend. You have accomplished great things. It is by your hand that this Kingdom is restored and that the misery of Big Brother is over. I owe you much, as does everyone else\" Michael spoke, smiling a little as he walked over and stood before Winston.\n\n\"But the work isn't over, though I suppose it never is. There's always something to do, something to build, to manage and so on. There remains much uncertainty for the future, for this new world you helped usher in. But if there is one thing I am certain of, it is that this Kingdom needs leaders to guide us through it as you have done so\" The King explained.\n\nWinston watched Michael for a moment before slowly nodding.\n\n\"I agree, your Majesty\" Winston spoke calmly.\n\nMichael nodded as well, inhaling and exhaling before meeting Winston's gaze again.\n\n\"Winston, I feel your leadership is needed still. I never once thought that I'd be the one to ever make such a request of any man, let alone you but... Winston, if you are willing, I would like to appoint as Prime Minister of this United Kingdom.... will you form a government?\"\n\nWinston was left speechless. He knew of the importance of the role of Prime Minister, a powerful position second only to the King himself. The significance wasn't lost on him. Winston had figured he'd retire out to the countryside, to spend his days in peace. Yet, his King, his country, were asking he remained a little longer, to continue to be a voice for the voiceless and to bring back what was lose, or at least try to. With a slow exhale, Winston slowly began to nod, a feeling of determination washing over him."
 ENG_victory.14.a:0 "\"I shall, your Majesty\""
 ENG_decision.1.t:0 "British Reunification Proposal"
 ENG_decision.1.desc:0 ""
 ENG_decision.1.a:0 "Yes"
 ENG_decision.1.b:0 "No"
 ENG_decision.2.t:0 "Wales Accepts Integration!"
 ENG_decision.2.desc:0 "After careful consideration, the Welsh have agreed to join Kingdom of England, provided that their autonomy be preserved within the nation.\n\nThe reunification of England and Wales is a victory for the island of Great Britain, bringing two historic peoples back together in the name of strength, prosperity and unity that is sorely needed in the era of post-Oceania."
 ENG_decision.2.a:0 "Once step closer to unity"
 ENG_decision.3.t:0 "Wales Rejects Integration!"
 ENG_decision.3.desc:0 "Despite our generous offer, the Welsh have decided against joining England, citing cultural concerns and their wish to remain independent.\n\nThis outcome is an unfortunate one indeed, but that does not mean we are without options. We are much larger than Wales and if push comes to shove, there is little they could do against us..."
 ENG_decision.3.a:0 "I'm sorry, little one"
 ENG_decision.4.t:0 "British Reunification Proposal"
 ENG_decision.4.desc:0 "TODO"
 ENG_decision.4.a:0 "Yes"
 ENG_decision.4.b:0 "No"
 ENG_decision.5.t:0 "Scotland Accepts Integration!"
 ENG_decision.5.desc:0 "After careful consideration, the Scottish have agreed to join Kingdom of England & Wales, provided that their autonomy be preserved within the nation.\n\nAt last, the unification of the island of Great Britain has been achieved, with the three core peoples of this island brought back together under one banner once more. Britain is more than a dream, it is destiny. Our people were always meant to be together, and with the return of Scotland back into the fold of London, the restoration of the United Kingdom is only around the corner."
 ENG_decision.5.a:0 "Britannia united once more!"
 ENG_decision.6.t:0 "Scotland Rejects Integration!"
 ENG_decision.6.desc:0 "Despite our generous offer, the Welsh have decided against joining England, citing cultural concerns and their wish to remain independent.\n\nThis outcome is an unfortunate one indeed, but we cannot allow one rebellious country to the north to get in the way of the dream of a restored United Kingdom. Great Britain must be restored, one way or another..."
 ENG_decision.6.a:0 "One island, no matter what"
 ENG_decision.7.t:0 "Select Leader Portrait!"
 ENG_decision.7.desc:0 "With England free, which portrait would you prefer to see moving forward?"
 ENG_decision.7.a:0 "King Michael I!"
 ENG_decision.7.b:0 "Uprising Winston Smith!"
 ENG_decision.7.c:0 "Prime Minister Winston Smith!"
 ENG_decision.7.d:0 "Winston Smith Smoking!"
 ENG_decision.7.e:0 "Casual Winston Smith!"
 ENG_decision.7.f:0 "Formal Winston Smith!"