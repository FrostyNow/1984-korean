l_korean:
 PNO_country_selection_tt:0 "§YHOW TO PLAY PENINSULA ONE\n-----------------------------------------§!\nPlay as the §gEnglish Socialist States of Oceania§!, play through content until the province breakdown prior to the §RAnti-Revolution§! occurs. When this occurs, open the decision menu and scroll down to the §Y'Whispers of Nations'§! decision menu and click the decision to switch to §YPeninsula One.§!"
 1984_Opening_Screen_PNO_Title_TT:0 "§gPENINSULA ONE§!"
 1984_Opening_Screen_PNO_Desc_TT:0 "Inhabiting what was once known as the §CState of Florida§! during the days of the old United States of America, §BPeninsula One§! is a province unlike others in Oceania, created with a unique directive and its own specialisation. Where other provinces comit itself to the extraction of resources, agricultural production or urban-industrial growth, Peninsula One is focused on the development of space technologies.\n\nThe Space Program, which had been in its infancy under the old Oceanian government, has been the sole directive of the Province's administrator, §BSoloman§!, the mind behind the most ambitious project of Peninsula One yet. The §BOrbit Initiate§!, a precursor to a future endeavour that will see Oceania reach for Luna.\n\nBut as §Rrebellion§! spreads across the globe, seeking to draw the Earth back down to its old ways, the fate of Peninsula One is at stake. Shall Oceania be the one to touch the stars above, or shall that destiny be left to another?"
 1984_Opening_Screen_PNO_Gameplay_Paths_Desc_TT:0 "§YPeninsula One Paths§!\n- Crush the §CFlorida Rebels§! and restore control over  Peninsula One in the name of §BSoloman§! and §gBig Brother.§!\n\n§YPENINSULA ONE REVOLT TAGS§!\n- @FLR§CRebel Army of Florida§!"
 1984_Opening_Screen_PNO_Button_TT:0 "Ad Astra"
 PNO_Peninsula_One_Desc_tt:0 "Priding itself on its development on void borne technologies, Peninsula One stands out from the other Provinces, it's race for space as opposed to total dominion and continuance of what is giving it a goal and motivation that other provinces do not have."
 PNO_province_decision_category:0 "Peninsula One"
 PNO_Rejoin_Oceania:0 "Rejoin Oceania"
 PNO_Debug_Menu_decision_category:0 "Peninsula One - Debug Menu"
 PNO_Initiate_Florida_Revolt:0 "Initiate §RFlorida Revolt§!"
 PNO_selection_tt:0 "Select to continue playing §RPeninsula One§! @PNO"
 PNO_Strict_Public_Curfews:0 "Strict Public Curfews"
 PNO_District_Army_Mobilised:0 "District Army Mobilised"
 PNO_Orbit_To_Peninsula_One:0 "Orbit To Peninsula One"
 PNO_Orbit_To_Peninsula_One_desc:0 "With chaos beginning to spread across Oceania, gripping the provinces one by one, it's only a matter of time before our own rebel movement, which has existed for longer than we care to admit, decides to make their own moves against us.\n\nWith the Orbit Initiative potentially at stake, and all that we have worked towards on the line, we cannot afford to ignore the rebels or underestimate them.\n\nWe must prepare for the inevitable!"
 PNO_Enact_Stricter_Curfews:0 "Enact Stricter Curfews"
 PNO_Enact_Stricter_Curfews_desc:0 "With rebels movements becoming bolder in their attacks against our force, securing themselves more towns and outposts in the forests of Northern Florida and the Everglades. The fact is, the frontlines are being drawn before our very eyes, and it won't be long before proper warfare breaks out.\n\nIn order to continue our hold over the metropolitan areas of Florida, we must enact curfews and expand our surveillance network to ensure we don't lose these cities to the rebel scum."
 PNO_Mobilise_The_Rocket_Arsenal:0 "Mobilise the Rocket Arsenal"
 PNO_Mobilise_The_Rocket_Arsenal_desc:0 "With war on the horizon, we can't leave anything to chance. Peninsula One, in its long standing effort to touch the stars above, has assembled a sizeable stockpile of rockets and missles. Whilst a good number of them are outdated, they explode all the same and in a war of survival, it certainly doesn't hurt to have as many cards in one's deck as possible."
 PNO_Fortify_Cape_Canaveral:0 "Fortify Cape Canaveral"
 PNO_Fortify_Cape_Canaveral_desc:0 "Cape Canaveral is the heart of the Orbit Intiative, it's where we launch our rockets and coordinate with Orbit Station. We cannot allow this facility to come under enemy hands. The rebels cannot be allowed to breach the boundaries of the facility.\n\nWe will hold this base, no matter the cost!"
 PNO_Fire_In_The_Sky:0 "Fire in the Sky!"
 PNO_Fire_In_The_Sky_desc:0 "Our preparations have been made worthwhile. The war we have expected to come has come. It's time to act and remove all restrictions placed upon us. The future of Peninsula One and the Orbit Intiative is at stake. We must not falter in our mission.\n\nThe land with burn and the skies will come alight, but in the end, we will have the stars.\n\nNo matter the cost."
 PNO_Utilize_Solomans_Archives:0 "Utilize Soloman's Archives"
 PNO_Utilize_Solomans_Archives_desc:0 "Kept secret from the wider Party, Soloman has maintained numerous archives and vaults containing pre-INGSOC knowledge and forbidden information. Normally, this would continue to be kept secret out of fear of risking the wrath of the Thirteen Sectors. But with the rest of Oceania busy and the other provinces racing to restart their own R&D sectors, the chances of any retaliation over Peninsula One cracking open these vaults in the name of restarting our research sector will be minimal."
 PNO_Reorient_Peninsula_One_Research:0 "Reorient Peninsula One Research"
 PNO_Reorient_Peninsula_One_Research_desc:0 "Since the creation of Peninsula One, our focus has been on the development of rocketry and void born technology. But with the war underway and the rebels racing to gain the upper hand, it's best we counter their efforts by diverting our R&D sectors toward the development of new industrial and military technologies that will allow us to swiftly and effectively our enemies once and for all."
 PNO_Mobilise_The_District_Army:0 "Mobilise The District Army"
 PNO_Mobilise_The_District_Army_desc:0 "With the war underway, it's best we mobilise all available forces, including the District Armies, and get them to the frontline. We cannot afford to underestimate our enemy nor overestimate our own strength. The Orbit Intiative is on the line, we must not risk the Rebels winning."
 PNO_Open_Up_Rocket_Stockpiles:0 "Open Up Rocket Stockpiles"
 PNO_Open_Up_Rocket_Stockpiles_desc:0 "We need every advantage we can get. With the rebels gaining steam and refusing to back down, it's time to unleash every rocket we have against these bastards. It doesn't matter if they're old, malfunctioning, or decommissioned, we will put them all back into service and rain down hell from the skies.\n\nWe will make them fear the very skies above!"
 PNO_Unleash_The_Rocket_Engineers:0 "Unleash the Rocket Engineers"
 PNO_Unleash_The_Rocket_Engineers_desc:0 "The Rocket Engineers are the pride of Peninsula One, the ones who forge the Star Engines that takes us beyond the clouds into the void above. Though their expertise is in rocketry, with the war underway, their skills are best served bolstering our industrial and production sectors, making sure they remain at peak efficiency for the duration of the war."
 PNO_The_Dyson_Industrial_Project:0 "The Dyson Industrial Project"
 PNO_The_Dyson_Industrial_Project_desc:0 "Industrial might is the key to victory. Tactics and strategy are good and all, but without the means to conduct our operations, our chances of victory become slimmer and slimmer. Thus, the Dyson Industrial Projcet will aim to establish a new industrial city in the heart of Peninsula to further bolster the industrial aspect of this war."
 PNO_district.1.t:0 "Surface Command"
 PNO_district.1.desc:0 "\"Surface Command, this is Alex, come in Surface Command\" Alex spoke over the intercomn, floating out in space in his suit as he worked the outer shell of the new extensions to Orbit Station.\n\n\"This is surface Command. Maintenance status\"\n\n\"Hull's is acceptable. Doubleplusgood. Fix tool is low condition. Will require a new one for next void supply\" Alex replied as he kicked off the hull, floating in the vacuum of space, the tether keeping him from drifting too far from Orbit Station.\n\n\"Supply request acknowledged. Approved for next supply trip. Any other resources?\"\n\n\"Spare bolts. Many have become too damaged. Current onboard stockpile... inadequate\" Alex replied as he used the tether to pull himself back to station, toward the airlock.\n\n\"Acknowledged. Double shipment approved. Would that be all, Voidnaut?\"\n\nAlex opened the airlock and made his way inside, waiting patiently for procedures to complete before he could enter Orbit Station and finally remove his helmet."
 PNO_district.1.a:0 "\"That's all, Surface Command. Alex out.\""
 PNO_district.2.t:0 "In the Name of the Mission"
 PNO_district.2.desc:0 "Bill leaned in his chair, smoking a victory cigarette as he listened in on the radio. This was a usual activity of his after work. Relax on his front porch, smoke, and fill the silence with something else. Taking a drag, Bill hummed along to the Party Propaganda song that was being played when the music was interrupted by an emergency news broadcast.\n\n\"Attention all listeners. Effective immediately, a curfew will be put into place from 6:00AM to 8:00PM sharp! Anyone caught being outside of their homes outside this time period without proper authorisation will be treated as rebel spies and will be handled accordingly. Thank you for attention, hail Big Brother\" the broadcast woman spoke, devoid of emotion as usual before the announcement ended, the propaganda music returning as usual."
 PNO_district.2.a:0 "\"Things must be getting pretty bad out there\""
 PNO_district.3.t:0 "Phoenix One"
 PNO_district.3.desc:0 "\"4... 3... 2...1... Ignite!\" the speaker spoke as the rocket containing the supply shipment for the Orbit Station ignited, its thrust lifting it off the ground and propelling out of Cape Canaveral toward the great void above.\n\n\"Take off successful. Supplies inbound.\"\n\nDaniel watched from afar as the rocket took off for space, carrying whatever the Orbit Intiative needed to stay afloat. The vessel, Phoenix One, was a marvel in his eyes, having been part of the team that helped build it's thruster that allowed it to soar for space. He couldn't help but feel a sense of pride in watching it soar, a sense of forbidden accomplishment washing over him as he watched the rocket, Phoenix One, breach the clouds in pursuit of the heavens. Perhaps things weren't the way they should be, with Big Brother and INGSOC and all the war on Earth... but perhaps with the stars, something new could be made away from this broken world, should fate permit it."
 PNO_district.3.a:0 "\"Phoenix One, the stars will be ours\""
 PNO_district.4.t:0 "Ignite the Flame!"
 PNO_district.4.a:0 "The Orbit Initiative must not falter!"
 PNO_district.4.b:0 "Down with Soloman! Down with Big Brother!"
 PNO_district.5.t:0 "Opening the Vault"
