l_korean:
 EUR_BOOKMARK_DESC:0 "Bolshevism reigns all across Eurasia. Through blood and sacrifice, Europe had conquered and all of Eurasia had been consolidated under the ideology of Neo-Bolshevism.\n\nGuided by the Grand Premier, the Union of Eurasian Socialist Republics is a totalitarian regime that utilises the NKvD and various methods of Soviet Propaganda and revisionism to maintain total control. All matinained under the careful rule of the Grand Premier, Lavrentiy Beria, the face of tomorrow.\n\nBut as the unrest continues to rise across the Earth, and Beria grows ever older. The world is seemingly on the cusp of change. Whether that affects Eurasia or not, only time shall tell"
 1984_Opening_Screen_EUR_Title_TT:0 "§RUNION OF EURASIAN SOCIALIST REPUBLICS§!"
 1984_Opening_Screen_EUR_Desc_TT:0 "Following the victory over the §qThird Reich§!, Bolshevism had reigned all across Eastern Europe, under the firm hand of §RJoseph Stalin§!. Through blood and sacrifice, Europe had been claimed and with the development of nuclear weaponry in 1949, the §RUnion of Soviet Socialist Republics§! became a true superpower to rival the §mUnited States of America§!. It was during the early 1950s, with the West beginning §ROPERATION: UNTHINKABLE§! and breaching the Iron Curtain that Stalin's final triumph came, obliterating the Western Armies with the numerically superior Red Army and sweeping through what remained of Europe, bringing the continent, save for the British Isles, under the complete control of the Soviet Union.\n\nStalin perished soon after and a struggle for the leadership of the USSR took place, resulting in the emergence of §RLavrentiy§! Beria as the General Secretary of the Communist Party. It was under his rule that the Union of Soviet Socialist Republics began to change, slowly transforming into the §RUnion of Euriasian Socialist Republics§! that we know today. Utilising the §TNKvD§! and various methods of Soviet Propaganda and revisionism, Beria set the stage for the modern Eurasian nation, fabricating the myths that keep our society in line.\n\nTo this day, the §GGrand Premier§! reigns as the face of the Union of Eurasian Socialist Republics. Neo-Bolshevik Thought having been fully introduced into Eurasian Society. No longer would internal squabbles infect the Party structure, no more would dissenters poison the ideals of the revolution.\n\n§REurasia will endure, now and forever.§!"
 1984_Opening_Screen_EUR_Gameplay_Paths_Desc_TT:0 "§YEurasian Paths§!\n- Crush the §RRevolts§! and wipe out the old nations.\n- Reconquer the fallen provinces and unite Eurasia from the Bay of Biscay to the Bering Strait.\n- Wage a global war to unite the Earth under the rule of the §RGrand Premier.§!\n\n§YEURASIAN REVOLT TAGS§!\n- @RUS§GSiberian Provisional Government§!\n- @SOV§RSecond Red Army§!\n- @FRA§RFrench Revolutionary Republic§!\n- @UKR§BUkrainian Insurgent Army§!\n- @NOV§2Proletarian Army of Donbas§!"
 1984_Opening_Screen_EUR_Button_TT:0 "Workers Unite!"
 1984_Opening_Screen_EUR_Province_Title_TT:0 "§R[This.GetName]§!"
 1984_Opening_Screen_EUR_Province_Desc_TT:0 "This is a province of §REurasia§!. Though the provinces of Eurasia don't have unique content §Y(yet!)§!, there still exists generic content for you to squash the rebellions, retake Eurasian lands and reform the §RUnion of Eurasian Socialist Republics§!."
 1984_Opening_Screen_EUR_Province_Gameplay_Paths_Desc_TT:0 "§YEurasian Provinces Paths§!\n- Crush the revolters and restore order to the province.\n- Reclaim all fallen provinces and reunite Eurasian lands.\n\n§YSIBERIAN REVOLT TAGS§!\n- @RUS§GSiberian Provisional Government§!\n\n§YEASTERN EUROPEAN REVOLT TAGS§!\n- @SOV§RSecond Red Army§!\n\n§YWESTERN EUROPEAN REVOLT TAGS§!\n- @FRA§RFrench Revolutionary Republic§!\n\n§YDNIEPER REVOLT TAGS§!\n- @UKR§BUkrainian Insurgent Army§!\n- @NOV§2Proletarian Army of Donbas§!"
 1984_Opening_Screen_EUR_Province_Button_TT:0 "For Eurasia!"
 LAVRENTIY_BERIA_DESC:0 "§WThe Grand Premier serves as the head of the Neo-Bolshevik World, and the face of the Union of Euriasian Socialist Republics. The Grand Premier has served as the vanguard against the forces of the Tsar and his traitorous agents that have threatened to destroy the dream of the Eurasian people.\n\nPowerful and wise, Lavrentiy Beria is the one who shields the Eurasian people from the wickedness of Oceania and East Asia, guiding the Eurasian people towards true prosperity and socialism. Lavrentiy Beria is strong in health and character, the true moral compass of all Eurasians.\n\nOf course, any rumours that the Grand Premier has grown weak with sickness and age will be shot without mercy.§!"
