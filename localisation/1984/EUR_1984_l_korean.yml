 EUR_The_Great_Purge:0 "The Great Purge"
 EUR_Enforced_Linguistic_Demolition:0 "Enforced Linguistic Demolition"
 EUR_Industrial_Specialisation:0 "Industrial Specialisation"
 EUR_Industrial_Specialisation_desc:0 "\n\n\n\n£GFX_EUR_Industrial_Specialisation_Banner\n\n\n\n\n\n\n§WThis province is focused on urbanisation and industrial production. Provinces that focuses on industrial and urban projects tend to be heavily populated and thus, make up a sizeable portion of the Eurasian military and workforce.\n\nWhen Five Year Plans are implemented by the Party in order to expand the economy and boost production, the industrial provinces are where all resources are consolidated to streamline the production of manufactured goods, civilian and military.§!"
 EUR_Agricultral_Specialisation:0 "Agricultural Specialisation"
 EUR_Agricultral_Specialisation_desc:0 "\n\n\n\n£GFX_EUR_Agricultral_Specialisation_Banner\n\n\n\n\n\n\n§WAs one may expect, provinces with that are specialised in agricultural production are where the food to feed the vast metropolises and industrial cities of Eurasia is grown. Unlike in the city, the presence of the Party is less felt, with the Party only maintaining a notable presence in the notable urban centres and the mega farms that cover the plains, leaving the residents alone for the most part.§!"
 EUR_Extraction_Specialisation:0 "Extraction Specialisation"
 EUR_Extraction_Specialisation_desc:0 "\n\n\n\n£GFX_EUR_Extraction_Specialisation_Banner\n\n\n\n\n\n\n§WResources. Minerals. Metal. Oil. Fuel.\n\nIt all has to come from somewhere. Someone has to extract it all from the Earth to fuel the Industrial and to a lesser extent, the Agricultural Provinces, and that is the role of the Extraction Provinces. Defined by its mountain mines and vast oil fields, it is these provinces that fuel all of Eurasia and allows it to not only span much of the globe but maintain it's firm grip.§!"
 EUR_Assemble_The_Eurasian_Congress:0 "Assemble the Eurasian Congress"
 EUR_Assemble_The_Eurasian_Congress_desc:0 "The year 1984 has come, and with it comes a chance to further dismantle the Federal system within Eurasia and bring an end to the autonomies, creating one truly Eurasian state. With the Eurasian Congress Assembled, this goal will be accomplished and the old nations will finally die."
 EUR_On_The_March:0 "On The March"
 EUR_On_The_March_desc:0 "It has been years since the wars against the Anti-Proletariat forces attempted to shatter the Revolution. First was the remnants of the Tsarist force, whom we murdered and destroyed. Then came the Fascist Hordes, who we drove from Eastern Europe back into their rotting heart of then Berlin. The came the greatest foes of all, the capitalists of the Atlantic who attempted to bring ruin before our greatness could truly shine.\n\nThey failed too and in their hubris, a new revolution emerged in their own lands, a new enemy to hold the line against.\n\nBolshevism has endured conflict after conflict, yet the Revolution of Lenin has proved stronger still, and continue enduring we shall."
 EUR_Expand_Our_North_African_Holdings:0 "Expand Our North African Holdings"
 EUR_Expand_Our_North_African_Holdings_desc:0 "In Northern Africa, there are remnant forces who cling onto the old world ideologies in defiance of our revolution, occupying the city of Tripoli and preparing themselves for the 'Reclamation' of Italy. It is time to remind so called Tripolitania and the rest of the free nations who weilds the saber of power in this world."
 EUR_Crack_Down_On_Tsarist_Rebels:0 "Crack Down On Tsarists Rebels"
 EUR_Crack_Down_On_Tsarist_Rebels_desc:0 "Rumours of the Tsar continue to permeate throughout the lands that long ago, were considered the Russian Empire. Tales of a distant Tsar in exile, rebuilding the old empire in a far away land has captivated many. Though the Tsar has long been a tool used to ensure the loyalty of the populace by crafting a web of fear and mystic around him, the rumours of a New Tsar is concerning to say the least.\n\nNo matter, we shall deal with these decievers and falsifiers directly and put to bed the rumour of the so called Tsar in Exile. The Grand Premier rules the nation, not some old fool in a far away land."
 EUR_The_Sixth_Five_Year_Plan:0 "The Sixth Five Year Plan"
 EUR_The_Sixth_Five_Year_Plan_desc:0 "If we are to remain on par with the forces of Oceania and East Asia and ensure that the current arrangement holds, we must do all that we can to maintain the balance of power of Eurasia and not fall behind the other super states. Thus, a Sixth Five Year Plan is in order, the commencement of the next great Stalinist industrial struggle to ensure the continued prosperity and strength of the Union."
 EUR_The_Exploitation_Of_Nature:0 "The Destruction of Nature"
 EUR_The_Exploitation_Of_Nature_desc:0 "Nothing must get in the way of progress. Not Man. Not God. Not Nature. If Eurasia is to experience the full and total might of industrial supremacy over its enemies, we must tear through the natural world and exploit it to it's fullest, using all that lies within the Earth to fuel the expansion of the Eurasian Nation."
 EUR_Remake_Politik:0 "Remake Politik"
 EUR_Remake_Politik_desc:0 "Within Kapitalgrad, there are Party members and dissenters who quietly seek the transformation of our great Union State. Some call for the restoration of the old Union of Soviet Socialist Republics. Some discuss ideas that could be described as right wing and revisionist. Some seek to restore the old world and the old nations.\n\nFools. There is on place for revisionism, not in Eurasia. Our path is perfect, our mission is perfect. Any and all dissenters and traitors who seek to subvert and change the end goal of Eurasia need to be dealt with.\n\nPermanently."
 EUR_Draft_New_Amendments:0 "Draft New Amendments"
 EUR_Draft_New_Amendments_desc:0 "As we move toward centralising the state and prepare for the gradual dismantlement of the remaining autonomous zones within Eurasia, the provisions of the Eurasian Constitution need to be updated to empower the bureaucracy in Eurasia, providing the Party in Kapitalgrad greater power and control over the affairs of the nation whilst depowering interest groups within the provinces."
 EUR_The_Extinction_Of_Language:0 "The Extinction of Language"
 EUR_The_Extinction_Of_Language_desc:0 "So long as the old languages continue to persist throughout the nation in the various sectors and provinces, the separatist sentiment will never go away.\n\nRussian. French. German. Italian. And many, many others.\n\nThey all need to be replaced one way or another. All shall speak Eurasian, and nothing else."
 EUR_The_New_Union_Treaty:0 "The New Union Treaty"
 EUR_The_New_Union_Treaty_desc:0 "The stage is set for the true unification of the Union of Eurasian Socialist Republics. No more will the nations of old hold us back from our true destiny, no more shall the old history bind us. We are Eurasia, separate and forever. We do not cling to dead traditions and proto-Eurasian cultures, we are above them.\n\nEurasia Forever."
 EUR_The_War_Within:0 "The War Within"
 EUR_The_War_Within_desc:0 "Though steps toward maintaining order over the provice have been taken, it seems the long expected revolt has come at last. Rebels have seized territory, taken command of cities, organised governments and are now on the march against our regime with an intent to dismantle all that we have worked towards in favour of restoring their failed nations and reviving their outdated cultures.\n\nWe cannot allow their failed dreams to come to pass. Eurasia has outgrown these old world ideas, moved past their pitiful cultures and histories that hold no meaning to us. In the interest of forging a Eurasia free from the shackles of the dead world that came before, we shall confront these rebels and vanquish them from our lands once and for all."
 EUR_The_Domestic_Front:0 "The Domestic Front"
 EUR_The_Domestic_Front_desc:0 "As we wage war against the enemy, we cannot deny the reality of our situation. These rebels are homegrown and have recruited from the province. There's nowhere else they could have come from, after all. Many of the workers may hold sympathies toward these rebels, clinging onto some faint memory of a supposed 'better time' before the emergence of Eurasia.\n\nWe must move to ensure their loyalty to the Neo-Bolshevik cause and do all that is necessary to make sure that our industrial capicity is not impeded by these false dreams of lost gradeur, wrapped up in nostalgia of an era they scarcely remember."
 EUR_Stalinism_In_Full:0 "Stalinism in Full"
 EUR_Stalinism_In_Full_desc:0 "The way of Stalin hasn't failed us yet, and it will not fail us now. It was the industrial economic policy of Joseph Stalin that saw the old world crumble and absorbed into the Union of Eurasian Socialist Republics and it will be his legacy that will guide our hand once more.\n\nThe workers will work, the factories will roar and the hounds of war shall carve through the enemy and bring victory to our nation, once and for all."
 EUR_Reapproach_Industrial_Flexibility:0 "Reapproach Industrial Flexibility"
 EUR_Reapproach_Industrial_Flexibility_desc:0 "Perhaps the rigid and orthodox industrial approach we've held for many years needs to be revised. We can't ignore the fact that many of the workers are either sympathetic to the cause of the rebels or have joined them outright. This doesn't mean that the system has failed, but rather it needs to be adjusted in order to retain loyalty without sacrificing output or doctrine."
 EUR_Overwork_The_Workers:0 "Overwork the Workers"
 EUR_Overwork_The_Workers_desc:0 "The army is out there battling against the enemies on the fields and in the cities, and those troops require the means of war in order to crush our enemies. Thus, it is necessary that our workers give all that they can give to produce and support our boys, even if it pushes them to their limits.\n\nAnd then some."
 EUR_Another_Four_Year_Plan:0 "Another Four Year Plan"
 EUR_Another_Four_Year_Plan_desc:0 "If we want to triumph over these vermin, we need to mobilise as many resources and industrial facilities as possible. Factories, and lots of them, will be needed to produce the weapons of war needed to crush the enemy and secure our hold over the Province forever.\n\nThus, a another Four Year Plan will be needed to facilitate this rapid industrial growth and grant us the edge needed to wipe out the rebellion for good."
 EUR_Gradual_Build_Up_Plan:0 "Gradual Build Up Plan"
 EUR_Gradual_Build_Up_Plan_desc:0 "The rebellion infecting our borders may be great, but we can't allow these insurgents to force us into making rash decisions that will only cause more of the workers to defect over to the other side. We must maintain a steady but firm plan toward industrial growth and development. We won't let the actions of the rebels dictate our methods and force us to be reactionary in response. We will bide our time, show patience and use our greater resources to our advantage to put this insurgency down for good."
 EUR_Total_Industrial_Warfare:0 "Total Industrial Warfare"
 EUR_Total_Industrial_Warfare_desc:0 "War isn't just fought with men, but also with factories, resources, and equipment.\n\nBombs. Planes. Tanks.\n\nUsing our long established industrial base, we shall use it to out produce and overwhelm our enemies. They shall be buried by Eurasian industry, flattened by our sheer might and shall be forever reminded why it is Eurasia that reigns and not them."
 EUR_Reorganise_The_Party:0 "Reorganise the Party"
 EUR_Reorganise_The_Party_desc:0 "TODO"
 EUR_Restore_Soviet_Experimentalism:0 "Restore Soviet Experimentalism"
 EUR_Restore_Soviet_Experimentalism_desc:0 "When Eurasia, Oceania, and later East Asia, emerged as the powers of the developed world, threatened only by each other and nobody else, the field of research and development fell by the wayside as the need to compete in the field of research became unncessary. The three super states agreed to the current order, and fought to maintain it. Thus, moving past anything that was created in the early 1950s would be seen as a provokation unless all super states jointly agreed to create it: such as the telescreen.\n\nHowever, with our control at threat and the old world threatening to reawaken, tearing apart all that we built in the name of their nostalgia, it has become necessary to revive the old Research and Experimentation Departemtns in order to craft the technologies needed to defeat the enemy swiftly and brutally."
 EUR_Reexamine_Approach_To_Science:0 "Reexamine Approach to Science"
 EUR_Reexamine_Approach_To_Science_desc:0 "For a long time, our approach to science were limited to the fields of social control and military development, as other sections of the science and development became less necessary to investigate. However, with the war breaking out within our borders and our civilian population the target of these rebels, seeking to recruit them and entice them with the old world, perhaps the time has come to explore other sections of science and research, looking for ways to effectively control the population and support our industrial base."
 EUR_Harness_Human_Rage:0 "Harness Human Rage"
 EUR_Harness_Human_Rage_desc:0 "Rage.\n\nRage is a destructive and creative force of man that has seen the Earth subjegated under it's grip. It was rage that saw the greatest of Empires rise and the weak purged. We can't waste time with focusing on research that does not contribute to realising the potential of rage. We must see to it that our armed forces are provided with the means to entact their fury upon the rebellion, no matter the cost."
 EUR_Encourage_Provincial_Knowledge_Exchange:0 "Encourage Provincial Knowledge Exchange"
 EUR_Encourage_Provincial_Knowledge_Exchange_desc:0 "the provinces across Eurasia are, like us, also engaged in a struggle for order in their own lands. Though we can't help one another direction without risking losing control of our own affairs, we can contribute to one another in the field of research to ensure that all parts of Eurasia have the research capabilities to beat back the Old Think Hordes and ensure that order reigns above all things."
 EUR_Prioritise_Industrial_Innovation:0 "Prioritise Industrial Innovation"
 EUR_Prioritise_Industrial_Innovation_desc:0 "Despite the continued industrial policies of the Great Joseph Stalin still in effect, maintaining the continued industrial strength of the province, the technological aspect of our industrial sector still leaves much to be desired, the outdated technologies threaten to cause the Union State to fall behind unless we direct our experiments and development toward the research and creation of new industrial technologies that will prevent others from surpassing the greatness and power of Eurasia."
 EUR_Hornet_Swarm_Tactics:0 "Hornet Swarm Tactics"
 EUR_Hornet_Swarm_Tactics_desc:0 "Like hornets, our men will become a vast and overwhleming swarm. Arming them with the most advanced military goods we can muster and infusing them with all the tools of rage and utter devotion, we shall make our force an unstoppable wave. All opposition will be crushed. All cries for mercy will be ignored, and Eurasia will triumph over all.\n\nHow can we lose when we have more men than they have bullets?"
 EUR_Force_Start_Eurasian_Research:0 "Force Start Eurasian Research"
 EUR_Force_Start_Eurasian_Research_desc:0 "With all resources and individual in place, the time has come to forcibly restart research in full, utilising all means to end the stagnation and begin the process of discovering the victory technologies that will see the rebels crushed and the Union of Eurasian Socialist Republics elevated to even greater levels of power and prosperity."
 EUR_The_Final_Baptism_Of_Fire:0 "The Final Baptism of Fire"
 EUR_The_Final_Baptism_Of_Fire_desc:0 "We have done it. All territories from the Barrents to the Bay of Biscay have been resecured for Eurasia. The revolution has been tried and tested once again, put through the fire and emerging stronger than ever with a new leader at the helm. Now comes the time to at last complete what Beria set out to do and bring forth a true Eurasian Union!"
 EUR_Exterminate_The_Past:0 "Exterminate the Past"
 EUR_Exterminate_The_Past_desc:0 "It seems we were not efficient enough when crushing the old archives and monuments to the old world. So long as they linger, the promise of past glories that Eurasia was not responsible for will linger on in their mind. That changes now. Any monument we cannot explain will be destroyed, and any information regarding the old world still left will be revised and repurposed to fit our history. The history of the Eternal Eurasia."
 EUR_Rivers_Of_Blood:0 "Rivers of Blood"
 EUR_Rivers_Of_Blood_desc:0 "The cleansing of Eurasia must be done so with the blood of traitors who have turned against the dream of our Union and have embraced weakness and old ways. To ensure this does not happen again, a great purge of any potential dissidents and trouble makers has been organised. Ambition will be squashed and any words, no matter how great or small, that go against the will of the Party will be crushed swiftly and without mercy.\n\nWe will not rest until all rivers of Eurasia are overflowing with the blood of traitors."
 EUR_The_Final_Death_Of_God:0 "The Final Death of God"
 EUR_The_Final_Death_Of_God_desc:0 "Too many regions within our nation have clung onto their old outdated religions. From faith in their supposed 'Christ' to Allah, and whatever else they believe in. It's time to squash these falsehoods that have long threated our glorious Eurasia, now and forever."
 EUR_Outlaw_The_Old_Languages:0 "Outlaw the Old Languages"
 EUR_Outlaw_The_Old_Languages_desc:0 "The tolerance we had of the old tongues has back fired us severely. It allowed the people to hold onto their old world ways through them, poisoning their views on the glorious future we aim to bring and instead moving them toward a position of rebellion. No more. There will be no more dissident language except for one language, the Eurasian Language."
 EUR_The_New_Internal_Enemy:0 "The New Internal Enemy"
 EUR_The_New_Internal_Enemy_desc:0 "The Tsarist threat we long promoted has lost it's flare, so to speak. It no longer resonates with the youth, with most acknowledging the Romanov's as long dead. Even with the brief reappearance of a pretender Tsar, villainizing Tsarist fervor no longer does the trick. But if there's one good thing from all the revolutions we face, there exists plenty of faces and candidate of traitors and enemies of Eurasia that can be made into many enemies for the people to direct their hatred."
 EUR_Edelweiss:0 "Edelweiss"
 EUR_Edelweiss_desc:0 "Edelweiss.\n\nEdelweiss.\n\nEvery morning you greet me.\n\nSmall and White.\n\nClean and Bright.\n\nYou look happy to meet me."
 EUR_starting.1.t:0 "Eurasia - 1984"
 EUR_starting.1.desc:0 "Stretching from the Iberian Coast to the tip of the Bering Strait, Eurasia stands dominate in the lands of Europe and the vast territories of what was once Russia. Continuing the legacy of the Soviet Union, Eurasia strives for the liberation of the working class across the globe, vowing to never rest until all the peoples of Oceania and East Asia have been freed from oppression.\n\nAs the new year begins, the opportunity for Eurasia to evolve and to leave behind the backwards cultures of old have come at last. As the Eurasian Congress Assembles, bringing in administrators from across all Eurasia, let us work together to end the dark past of division and bring forth the vision of our Grand Premier."
 EUR_starting.1.a:0 "Eurasia Forever!"
 EUR_starting.2.t:0 "Glory to the Red Army"
 EUR_starting.2.desc:0 "The Red Square of Kapitalgrad was filled with the seemingly endless rows of soldiers that marched, shoulder to shoulder. Alexei could remember a time when the parades were held just once a year to remember the grounding of the Soviet Union, then later to celebrate the victory over the Nazi's. But as Eurasia took form, the marches slowly became more frequent, becoming monthly, then weekly, and now daily. It was a constant reminder of the strength of the state, no longer a symbol of victory but just another tool used to strike awe and fear into the people of Eurasia.\n\nAlexei sighed, adjusting his hat as he watched the army march on by. It was funny in a way, how stagnant and unchanging the event seemed to be in a way. The soldiers did not look too dissimilar to the old Red Army, their weapons and uniforms having remained largely the same. The only real notable difference were the darkening of the uniforms. Checking over his shoulder before walking away, Alexei spared one last glance at the army before shaking his head slightly."
 EUR_starting.2.a:0 "\"Invincible and Legendary? Hmph\""
 EUR_starting.3.t:0 "War of the Sands"
 EUR_starting.3.desc:0 "Vadim huffed as he walked through the desert, the sun bearing down on him. He glanced down at his uniform, questioning whether it was even suited for the temperatures around here. It felt too thick on his skin, making him feel even hotter. Is this why the North African Administration required reinforcements all the time?\n\n\"I can't believe they expect us to fight Italians like this\" Pyotr, a friend of Vadim's who had thrown away his shirt.\n\n\"Tell me about it. I was born in Siberia. I'm not built for this heat\" Vadim replied flatly, wiping the sweat off his forehead.\n\n\"I've heard all crazy stories about Libya. There's the monarchy, but apparently there are fascists too. I even heard rumours about a Legion. Something about Rome?\"\n\n\"Rome. The Mediterranean capital?\" Vadim questioned.\n\n\"Something like that. I suppose exile to Africa has made the old worlders mad. All sorts of strange stories\" Pyotr replied with a small shrug.\n\nVadim nodded and looked ahead at the rest of his squad, all continuing their march toward a border village called Al Assah, an Arab majority settlement and the first target of the Eurasian Army."
 EUR_starting.3.a:0 "\"This sun will likely kill us before the natives can.\""
 EUR_starting.4.t:0 "Beware the Tsar"
 EUR_starting.4.desc:0 "Pavel was an old man, keeping to himself in his cabin far from everyone else. Branded a traitor long ago, the old man secluded himself to the icy tundras of Northern Russia away from everyone, living a life of solitude but relative peace. As he sat in an armchair by the fire pit in his cabin, the old man thought of a time before all of this. Before Russia, and much of Europe, had been suffocated by Eurasia.\n\nHe was only a boy growing up in the Empire when the Bolsheviks came over and the Royal Family disappeared. He remembered the days of Stalin, even serving in the Red Army when the Germans had struck back in the 40s. But what had once been thought as a triumph of humanity became something darker. From the ashes of the war, a new ideology worse than the forces of fascism emerged. It subverted Russia as it did the rest of the West and the East. The old world, already on the brink in the old Soviet Union, finally fell as three superstates emerged.\n\nPavel glanced up above the fire pit, where the old Imperial Flag of Russia hung. The old world felt so distant, so out of reach. He could recall in the cities and towns how they painted the Tsar, some great evil ready to subjegate the land.\n\nAs if they weren't already."
 EUR_starting.4.a:0 "\"What use is there in caring when the world is already lost?\""
 EUR_starting.5.t:0 "To Comrade Stalin"
 EUR_starting.5.desc:0 "\"Alright class\" the teacher began, standing at the front of the classroom as the students, obedient and silent, all watched the teacher with a critical eye.\n\nThe teacher exhaled, calming her nerves before continuing.\n\n\"Today, we will be learning about one of the great men of Eurasia. Comrade Joseph Stalin\" the teacher spoke, putting on a brave smile as the students watched on without much reaction.\n\n\"Um... B-before we start, how about we... write a letter to express our adoration for Stalin, yes?\" the teacher spoke, quickly grabbing a pile of papers from her desk before beginning to set them out on the desk before the students. Like robots, they picked up their pens and got to work.\n\nThe teacher moved to the front of the room, her eyes on the blackboard as she let out a shaky exhale, silently praying to God as she was stood in the classroom, feeling trapped by her own students and what they would do to her should she slip up."
 EUR_starting.5.a:0 "\"God, please. Awaken their hearts, make them children as they should be.\""
 EUR_starting.6.t:0 "Obliteration"
 EUR_starting.6.desc:0 "Vladimir entered his office, setting his gun down on the table as he approached his seat and sat down. He rubbed the bridge of his nose as he let out a slow exhale. He had done it. Another day, another supposed dissident dead. It was hard to be sure in this day and age when every word had multiple layers, where the lines between truth and falsehood continues to blur.\n\nHe wasn't proud of it.\nThere wasn't any satisfaction in killing.\nHe felt numb to it at this point, all the 'opposition' he had to kill or torture in the name of 'stability'. Vladimir had to wonder whether the people he was being tasked with breaking and killing were opposition at all? Did they really pose a threat to the Party or did they just spring him on random Party Officials for the sake of reminding everyone that terror reigns.\n\nVladimir exhaled slowly, glancing at his desk where he saw a letter. Reaching for it, he opened it up, tossing the envelope away before reading the contents of the letter. He raised an eyebrow as he read about his next target.\n\nSome administrator out in Siberia that the powers at be were becoming uncomfortable with. Vladimir hummed a little as he set the letter aside, looking forward to getting away from Kapitalgrad for once."
 EUR_starting.6.a:0 "\"Over the Urals to the land of snow, away from all of this\""
 EUR_starting.7.t:0 "Speak As We Say"
 EUR_starting.7.desc:0 "Vasily sat as his desk, a worn and tired expression on his face as he read over the latest changes imposed by Kapitalgrad. The administrator of the Far East Sector could only stare at the words in silence, rereading the document over and over.\n\n\"...Henceforth, the Russian language within the Siberian Socialist State is to be phased out on all levels of society and is to be replaced with the Eurasian language. Resources and party approved teachers will be provided for and will arrive within one month. You will be expected to learn the language in full, no exceptions...\"\"\n\nVasily sighed, setting down the paper before looking at the Party Members within the room.\n\n\"Is it as bad as we thought it'd be?\" Valentin, the administrator of the district of Kemerovo, asked tentatively.\n\n\"Worse\" Vasily replied grimly.\n\n\"Well what can we do? Surely, there must be something we can do to stop this, this is our language!\" Vladimr spoke up, hands behind his neck as he walked over to the window.\n\n\"I know... I know...\" Vasily replied, rubbing his eyes before rising to his feet. \"For now, keep quiet about this. I don't want a peep of this escaping the office, not yet. I'll... I'll work out something.\"\n\n\"Something? What can be done about this?\" Valentin asked quietly, running a hand through his hair.\n\nVasily remained quiet, tapping his fingers on his desk, his hand instictively moving to his heart as he let out a small exhale."
 EUR_starting.7.a:0 "\"Just... give me time\""
 EUR_starting.8.t:0 "EURASIA FOREVER"
 EUR_starting.8.desc:0 "As the finale constitutional reforms designed to further centralise the Union of Eurasian Socialist Republics into a more centralised state, liberated from the old identities and now free to embrace its future as the sole, undisbuted rulers of all Eurasian lands, the whispers of the disidents still persist. Clinging onto their old ways, inspite of the world moving on from their outdated claims, they remain a lingering thorn in the side of the Party.\n\nThough the Red Army remains confident in Eurasia's ability to keep these Thought Criminals at bay and keeping stability within the state, it's no small secret that the recent radical reforms were most unpopular and it will likely create some rebelliousness within the population, especially those belonging to prouder legacies.\n\nA storm is brewing in Eurasia, a final obstacle that will cement the new age and allow the Neo-Bolshevik movement to prove itself as the rightous guiding hand of the Proletariat once and for all."
 EUR_starting.8.a:0 "Now we wait."
 EUR_collapse.1.t:0 "The Death of Beria"
 EUR_collapse.1.desc:0 "After years of declining age and prevelant age, Comrade Beria has passed away. The details of his death are thus far, unclear. However, with his death comes chaos. A month of now, Comrade Beria was supposed to declare a successor to the position of Grand Premier of Eurasia. However, despite our investigations into documentation and notes of the Grand Premier, no definitive successor has declared.\n\nAlready, the factions within the Party and the Army have begun to bicker and argue over the future of Eurasia, with numerous figures vying for leadership over an increasingly unstable Super State."
 EUR_collapse.1.a:0 "Let us hope a successor can be found"
 EUR_collapse.2.t:0 "Party Schism!"
 EUR_collapse.2.desc:0 "Despite the best hopes of some of the more optimistic members of the Party, the lack of a successor has ultimately split the Union of Eurasian Socialist Republics into five factions.\n\nSerov, a man of the NkVD who aims to continue the policy of Beria.\n\nKaganovich, a staunch believer of Stalinism.\n\nGumiliev, the wild card who aims to completely overhaul Eurasia away from it's Soviet legacy.\n\nGorbachev, the enigmatic reformer who seeks to establish a more moderate, albiet firm Party.\n\nAnd then there is Yazov, the head of the Red Army who has turned away from the Eurasianist mindset and seeks to restore the old Union of Soviet Socialist Republics, focused on true Communism envisioned by Vladimir Lenin.\n\nBattle lines have been drawn and HQ's established. It is only a matter of time before the situation explodes into pure chaos."
 EUR_collapse.2.a:0 "Blood stains Eastern Europe once more."
 EUR_collapse.2.b:0 "For a new Union!"
 EUR_collapse.3.t:0 "The Eurasian Civil War"
 EUR_collapse.3.desc:0 "The inevitable has come. Across Eastern Europe, the tense peace has ended as the five factions have officially begun combat operations, and with it, the fight for the future of Eurasia has begun.\n\nAlready, shockwaves have been felt across the rest of Eurasia, with the various leaders and opportunists having quickly caught wind of Eurasia's moment of weakness. Chaos has come, and it will surely spread the longer it goes on."
 EUR_collapse.3.a:0 "The unravelling begins"
 EUR_collapse.4.t:0 "Baikal Rebellion!"
 EUR_collapse.4.desc:0 ""
 EUR_collapse.4.a:0 "Shukshin has betrayed Eurasia"
 EUR_collapse.4.b:0 "To serve Russia!"
 EUR_collapse.5.t:0 "The Siberian Uprising"
 EUR_collapse.5.desc:0 ""
 EUR_collapse.5.a:0 "Death to traitors!"
 EUR_collapse.6.t:0 "Resurgent Partisan Activity"
 EUR_collapse.6.desc:0 ""
 EUR_collapse.6.a:0 "Clinging onto dead identities"
 EUR_collapse.7.t:0 "The Baltic Civil War"
 EUR_collapse.7.desc:0 ""
 EUR_collapse.7.a:0 "The Baltics belong to Eurasia!"
 EUR_collapse.8.t:0 "Caucasian Instability"
 EUR_collapse.8.desc:0 ""
 EUR_collapse.8.a:0 "War in the Mountains? Please, no..."
 EUR_collapse.9.t:0 "The Caucasian Uprising"
 EUR_collapse.9.desc:0 ""
 EUR_collapse.9.a:0 "Don't tell my mother I'm in the Caucasus"
 EUR_collapse.10.t:0 "Echoes Across the Steppe"
 EUR_collapse.10.desc:0 ""
 EUR_collapse.10.a:0 "Central Asia is waking up"
 EUR_collapse.11.t:0 "The Steppe Alight"
 EUR_collapse.11.desc:0 ""
 EUR_collapse.11.a:0 "Horse Men and Persians. Perfect."
 EUR_collapse.12.t:0 "They Rose From the Catacombs"
 EUR_collapse.12.desc:0 "Reports have come in that much of Ludovicgrad and much of the land surrounding the city has fallen into the hands of the so-called 'Revolutionary Reistance Movement', with the rebels that had emerged from the cities old catacombs  quickly establishing a new government called the French Revolutionary Republic, supposedly stylising themselves on the Jacobins and Revolutionary ideas of the French Revolution Centuries ago.\n\nWe have've made it clear that this open rebellion will not stand and we have issued numerous ultimatums to stand down, or face the full might of the Western European Socialist Republic. These have fallen on deaf ears, however. If these rebels do not buckle, then war will quickly become inevitable."
 EUR_collapse.12.a:0 "They came from where?"
 EUR_collapse.12.b:0 "Vive la France!"
 EUR_collapse.13.t:0 "The Second French Revolution"
 EUR_collapse.13.desc:0 "We've warned them time and time again, but the Revolutionaries occupying Ludovicgrad have continued to ignore our demands. With our choices limited and our patience spent, orders to put down this 'Republic' by force have been issued. The rebels, however, seem far from intimidated, with their leader Georges Marchais declaring the beginning of the Second French Revolution, stating openly his intention to end our regime.\n\nA cute fantasy, to be sure, but an intolerable declaration nonetheless. We will teach them the error of their failed ways."
 EUR_collapse.13.a:0 "What's with all the red flags?"
 EUR_collapse.14.t:0 "Dnieper Martial Law"
 EUR_collapse.14.desc:0 "There's ballet on TV again. Tchaikovsky's \"Swan Lake\". They'd air it instead of the news every time something happened. Beria's death, the loss of communication with the capital and the western regions, and now that the rebels' terror has plunged parts of the country into chaos. After the ballet ended, something clicked, and all that remained was a black screen, as if no one bothered to change the tape on the air."
 EUR_collapse.14.a:0 "Everyone's an opportunist these days"
 EUR_collapse.14.b:0 "And once again, we're emerging from the forests to save Ukraine"
 EUR_collapse.14.c:0 "Eurasian Bolshevism has only harmed Ukraine"
 EUR_collapse.14.d:0 "Tsar' will lead these lands out of their troubles"
 EUR_collapse.15.t:0 "The Dnieper Collapse"
 EUR_collapse.15.desc:0 ""
 EUR_collapse.15.a:0 "Enemies on all sides"
 EUR_collapse.16.t:0 "The German Awakening"
 EUR_collapse.16.desc:0 ""
 EUR_collapse.16.a:0 "Nothing keeps the Germans down long, it seems"
 EUR_collapse.17.t:0 "The New German Revolutions"
 EUR_collapse.17.desc:0 ""
 EUR_collapse.17.a:0 "History Repeats"
 EUR_collapse.18.t:0 "The Powder Keg Rumbles"
 EUR_collapse.18.desc:0 ""
 EUR_collapse.18.a:0 "Please, not the Balkans..."
 EUR_collapse.19.t:0 "The Powder Keg Explodes!"
 EUR_collapse.19.desc:0 ""
 EUR_collapse.19.a:0 "It's not a war without the Balkans"
 EUR_collapse.20.t:0 "Ancient Echoes"
 EUR_collapse.20.desc:0 ""
 EUR_collapse.20.a:0 "Lands of Ancient Empires stir"
 EUR_collapse.21.t:0 "The Mediterranean War"
 EUR_collapse.21.desc:0 ""
 EUR_collapse.21.a:0 "Vineyards and Minefields"
 EUR_collapse.22.t:0 "From North, a land of snow"
 EUR_collapse.22.desc:0 ""
 EUR_collapse.22.a:0 "Let's see how this pans out"
 EUR_collapse.23.t:0 "Scandinavian Civil War"
 EUR_collapse.23.desc:0 ""
 EUR_collapse.23.a:0 "Barbarians like their ancestors"
 EUR_collapse.24.t:0 "Memory of the Turks"
 EUR_collapse.24.desc:0 ""
 EUR_collapse.24.a:0 "Dig in for a fight"
 EUR_collapse.25.t:0 "The Anatolian War"
 EUR_collapse.25.desc:0 ""
 EUR_collapse.25.a:0 "Who do they think they are?"
 EUR_victory.1.t:0 "Red Triumph"
 EUR_victory.1.desc:0 "The march in Kapitalgrad celebrating the end of the war took place. I was among them, as was my regiment, all selected for the honour of taking part in the Victory Parade over our enemies. Our participation, the way I see it, was well earned. We had fought in Siberia and parts of Central Asia, through the frozen wastes and the sweltering heat, and we did so without complaint.\n\nIt was unusual fighting the Russian Nationalists. What they fought for. Is Eurasia not the final produce of what Russia had long aimed to create? A united Eurasian nation stretching from the Atlantic to the Pacific. If Eurasia was the end game of Russia, then what were they rebelling over?\n\nPerhaps it was nothing. The Russians were always strange, even in my younger days whenever I encountered them. Strange to think the ones who formed Eurasia wanted to end it. No matter. They failed, and the Eurasian nation lives on, as it should. I am due to my posting in Alma-Ata soon. With things settling down, perhaps home would make more sense.\n\n- Miras Suleimenov"
 EUR_victory.1.a:0 "A day of victory"
 EUR_victory.2.t:0 "Night of the Killing"
 EUR_victory.2.desc:0 "They came upon the village like wolves in the dead of the night. Like Spectres of vengence, they searched and searched for those whom had initally escaped the grasp of Eurasian Armies during the chaos of victory. This had been the second time this week the army had come through. I suppose Serov is eager to produce results, to make a show of his newfound power and, in a way, justify it.\n\nThey snatched up Vadim. A young man from Leningrad whom sided with Yazov during the civil war. For a while, we thought he may have been able to slip through the cracks and live in relative peace with the Malakov Family. But he was unfortunate. Much like the Malakov Family.\n\nI had hoped, dared even, that perhaps something new would emerge from all the chaos that had taken hold over Eurasia. With how widespread it all was, the emergence of a new status quo felt inevitable. But no, against all odds, the old order remains and once more, we have to learn to live with it.\n\n- Vitaly Sidorov"
 EUR_victory.2.a:0 "The status quo forever"
 EUR_victory.3.t:0 "Fall, Fall, the Son of Man"
 EUR_victory.3.desc:0 "I could only watch from the safety of the forest as the men came to my church in the deep forests of Siberia. I had thought that perhaps, our small commune of faith would be able to protect us from what had gone on in the towns and the cities. That the desolation would shield us, allow us to practice our faith without drawing the eye of the Party. But it seems not even a small church village in the frost is beyond the notice of the Grand Premier.\n\nI was the head of the church, it's Father and the spiritual guide of the community. I had spoken the word of Christ, our Lord. Had preached of his goodness and hope, that no matter what, His victory would come for how could God lose? I believe it, I still do. But what we have endured for so long now has tested me, my mind and resolve. I wonder if this is the end times, if we are on the brink of Christ's return, where He would do away with all this pain and evil and bring forth the Kingdom of Heaven on Earth forever.\n\nI hope that day comes, and soon. I hope that despite all of this, God will see to it that his enemies fall. For now, I must leave. The church is burning now. I and what remains of my followers must travel now.\n\nTo where, only God knows.\n\n- Father Sergei Popov"
 EUR_victory.3.a:0 "No light too small"
 EUR_victory.4.t:0 "Night of Burning Silence"
 EUR_victory.4.desc:0 "They did it. They came and they took it all. Took it to the courtyard and burnt every book they could get their filthy hands on. The poems, the stories, even the dictionaries and the childrens books. All cast into the fires. They dragged me outside and threw me down to the ground. They kicked me, beat me. Spat in my face and screamed at me. I don't even remember what they said. No word they spoke could be understood in the chaos of it all.\n\nI am... I was a librarian. Not a major one, just a small one in a village in the Alps. Never before had the Party cared about my little library. Never before had the Party under Beria even cared. Yet, this time, with this Serov in charge, things have changed. They're more erratic, more aggressive than before. Eurasia is lashing out like it has something to prove, as though the wars didn't defang the beast and must prove it's authority to rule.\n\nWhatever it is, it feel's like they're robbing us of more than just our nations now. They're breaking into homes, seizing books and notes. Anything written down is being taken and burned. I don't know what their aim is. If this is just some crazy scare tactic or perhaps something darker.\n\nKnowing Eurasia, and what it is becomg, it is likely the latter.\n\n- Stefan Jung"
 EUR_victory.4.a:0 "Pages reduced to ash"
 EUR_victory.5.t:0 "Struck Twice"
 EUR_victory.5.desc:0 "I feel weaker day by day. My body betrays me, my age wearing me down more and more. I feel tired. sick. Like I'm on the edge of darkness without a harness to lift me back up incase I fall. I want to believe that this is but a phase of health that will soon pass. But I know better, I know my time is running short.\n\nAlready. My rule has barely begun and I'm already near the end.\n\nWhat will become of Eurasia after me? Even if I do pick a successor, I haven't endured long enough in power, haven't garnered enough influence to secure my successor and the future of Eurasia.\n\nI can already see what tomorrow brings. Another Civil War. A new wave of rebellion and old world idealists. It doesn't matter how many I swipe down, if I can't make a lasting impact on the Party in time, then another crisis will rock Eurasia once again. A crisis I'm unsure if Eurasia can endure again so soon after the last.\n\nPerhaps prevention isn't the best course of action. Perhaps my only option now, with the time I have left, is preparation for the next catastophe.\n\n- Grand Premier Ivan Serov"
 EUR_victory.5.a:0 "Nothing lasts forever"