 EUR_The_Eternal_War:0 "The Eternal War"
 EUR_The_Eternal_War_desc:0 "\n\n\n\n£GFX_EUR_The_Eternal_War_Banner\n\n\n\n\n\n\n§WEurasia fights in a struggle that is never meant to end. Whether we face the armies of Oceania or the armies of East Asia, the continuation of the struggle is paramount.\n\nVictory is not the aim of the fighting, control of the masses is, a fact that all participants of the Eternal War are well aware of. The endless war and violence is one of the many tools utilised to maintain the State's dominance over Eurasia. By keeping the hearts and minds of the Proletariat focused on the fear of attack from foreign foes, we can keep them from diverting their attention to the affairs of the State. By use of the forge of the way, that the Eurasian system endures.§!"
 EUR_The_Legacy_Of_Nations:0 "The Legacy of Nations"
 EUR_The_Legacy_Of_Nations_desc:0 "\n\n\n\n£GFX_EUR_The_Legacy_Of_Nations_Banner\n\n\n\n\n\n\n§WThe Eurasian Union is a nation that is made up of many nations, as it was during the time of the Soviet Era. Though it has been the will of the Party to erase these nations from the minds of the people, the memory of what once was persists in their minds, memories of Europe.\n\nRussia. Germany. France. \n\nThose amongst the many names that continue to defy the will of the state. These words pose the greatest threat to Eurasia and must therefore be obliterated from memory before they become more than just mere words. They will know themselves only as Eurasians, whether they like it or not.§!"
 EUR_Tsaranoia:0 "Tsaranoia"
 EUR_Tsaranoia_desc:0 "\n\n\n\n£GFX_EUR_Tsaranoia_Banner\n\n\n\n\n\n\n§WIn the 1960s, Oceania had found an effective means to outlet the people's fury and focus it on a single being, late INGSOC party member Emmanuel Goldstein. An inverse to their Big Brother, Goldstein and all his ideals would become the focal point of their hatred, distracting their rage away from the Party itself.\n\nThus, it became necessary for Eurasia to find its own figure of hatred. Thus, the Tsar became our Goldstein. A twisted representation of the long-dead Nicholas II, the Tsar is now a cruel and evil being, seeking to overthrow Eurasia in order to usher in an evil empire that would bring about an age of corruption and immorality that would ultimately destroy Eurasia.\n\nThus far, Eurasia's bogyman has proven effective, creating fear of the Tsar's agents amongst the people, enemies and traitors that seek to destroy the Eurasian Union.\n\nIt also works well as an excuse to obliterate anybody we don't like.§!"
 EUR_Tsaranoia_two:0 "Tsaranoia"
 EUR_Tsaranoia_two_desc:0 "\n\n\n\n£GFX_EUR_Tsaranoia_Banner\n\n\n\n\n\n\n§WIn the 1960s, Oceania had found an effective means to outlet the people's fury and focus it on a single being, late INGSOC party member Emmanuel Goldstein. An inverse to their Big Brother, Goldstein and all his ideals would become the focal point of their hatred, distracting their rage away from the Party itself.\n\nThus, it became necessary for Eurasia to find its own figure of hatred. Thus, the Tsar became our Goldstein. A twisted representation of the long-dead Nicholas II, the Tsar is now a cruel and evil being, seeking to overthrow Eurasia in order to usher in an evil empire that would bring about an age of corruption and immorality that would ultimately destroy Eurasia.\n\nThus far, Eurasia's bogyman has proven effective, creating fear of the Tsar's agents amongst the people, enemies and traitors that seek to destroy the Eurasian Union.\n\nIt also works well as an excuse to obliterate anybody we don't like.§!"
 EUR_The_Stalin_System:0 "The Stalin System"
 EUR_The_Stalin_System_desc:0 "\n\n\n\n£GFX_EUR_The_Stalin_System_Banner\n\n\n\n\n\n\n§WIn the Union of Soviet Socialist Republics, which would one day go on to become the Eurasian Union, the State had been ruled by the now revered Comrade Stalin, who laid the groundwork for what the State would become today. It was during his rule that the lands once known as \"Russia\" had been rapidly industrialised, bringing power and industry to a once underdeveloped and impoverished land.\n\nThus, it was only natural that Stalin's system would endure in Eurasia, more refined than ever before. With the lessons learned from Comrade Stalin, the great fire of industry will burn brightest in Eurasia.§!"
