 FERDINAND_MARCOS_DESC:0 "§WHow do you define a good person? Is it by his values? His actions? Or is it comparing how much good he has done compared to his evil? That is what many are asking on Ferdinand Emmanuel Edralin Marcos Sr.\n\nBorn in 1917 to a upper class family in Ilocos. He would get shoved into politics early with his role in the assasination of Julio Nalundasan in 1935, during his period in prison he would score top on the UP Bar Exam. Only to be pardoned by Jose P. Laurel, and later running for local office after WW2.\n\nWhen the world fell to Totalitarianism the Philippines were spared from the iron fists of Oceania and East Asia, as the fall of the old world passed Marcos rose the ranks from local office to senate, to finally president in 1965. He would solidify his rule with martial law when bombing campaigns rang out across the country and Communists rose up to topple his rule.\n\nThroughout his rule Marcos has maintained his iron first, yet he is seen positively. A light in the darkness of Asia, one of the last free countries in the world, compared to the Superstates atleast. Through his term he has brought in development and modernization of the country even as refugees pour into the islands and dogfights occur in the skies.\n\nAs Marcos gets older, it is becoming ever more clear that it will only be time that will decide the fate of his work, should his family continue to rule the islands, or shall the wave of a true democracy run through the islands once and for all?§!"
 CESAR_VIRATA_DESC:0 "§WCesar Virata has been the right hand man of Marcos for more than five years, and now that he is dead it is him that will take charge of this new country in a new era. Born in 1930 he had a quiet life before moving to the United States and studying in Wharton University where he took up many lessons regarding economics and industry.\n\nHe quietly rose through the ranks through the government before becoming Finance Minister in 1970, being a skilled economist and a pragmatic figure. In 1981 he would be appointed as Prime Minister being seen as a light of reform within the Marcos Government.\n\nIn 1989, Marcos Sr. would pass. Cesar Virata now becoming incharge of the entire Philippines. With him a brighter future for Philippine Democracy. His pragmatic rule along with a very clean record in his political history shines sees many calling him a reformer within the public. Cesar Virata promises that the Philippines will continue its path for economic growth while focusing on a quiet transition to democracy as he guides the country towards a return to stability following the death of Marcos.§!"
 PRO_MARCOS_COUNCIL_DESC:0 "§WThis is not the result we have wished, but it is a necessary.\n\nA group of various politicians, many part of the Rolex 12 has taken over the Philippines from the hands of the reformer Cesar Virata. Lead by Fabien Ver the country has seen the return of martial law and a complete lockdown.\n\nThat is if it could actually be enforced, in reality the coup has seen an explosion in opposition as most of the military has begun to defect to the Provisional Government and are siding with Aquino and the Enrile-Ramos Side of the military. The government is scrambling to attempt to buy any loyalty from the military, but it appears everyone is tired of authoritarianism. It may be only a mere matter of not if but when this government shall fall to what appears to be an revolution that cannot be stopped.§!"
 BENIGNO_AQUINO_DESC:0 "§WIt has been done, Ninoy has done it after decades of oppressive rule under the Marcoses, democracy is back. But how did Ninoy get all the way here to the very top?\n\nBenigno “Ninoy” Simeón Aquino Jr. was born in Tarlac in 1932 to a political family, his father being Senator Benigno Aquino Sr. He was an average student, later a war correspondent. He was elected mayor in his hometown, then became a close advisor to Magsaysay. His standing rose in the 1960s, elected as governor of Tarlac, then as  senator. Criticizing the Marcos regime, he recognized the growing authoritarianism.\n\nIn 1972 he was arrested after the declaration of martial law, going on hunger strike and sentenced to death. But Marcos would commute it, with growing internal pressure. In 1978 he failed to run for parliament from boycotting, forming Lakas ng Bayan after. In 1980 he had two heart attacks, he was allowed to move to Singapore in return for no criticizing of the Marcoses, this deal was broken after a slow recovery. \n\nWhen Aquino returned in 1983, he was nearly assassinated, shot four times. After recovery he still spoke out against the Marcos regime. When Marcos died and Virata couped, he lead many against the new regime, he was recognized the head of the opposition. Eventually, the council fled, and Aquino was inaugurated as president. However this is just the start, Aquino will still have to re-transition the country to democracy, but at least after so long, democracy has come.§!"
 JOVITO_SALONGA_DESC:0 "§WKa Jovy never had a stable life. Born into poverty, youngest of five brothers, Ka Jovy spent time as a kid shining shoes and selling newspapers, studying and managing to reach some of the highest Bar Exam scores.\n\nSalonga participated heavily for his country when Japan brutally occupied the country, then captured and tortured. Sentenced to 15 years of hard labor. When the war ended however, he travelled to the United States to study at Harvard and Yale, later returning just before chaos erupted within the country to teach law back in his home country.\n\nFollowing this he would get into government, later getting into the Senate. Fiercely opposing Marcos following his election, becoming a lawyer for Ninoy Aquino. He would get greatly injured following the 1971 Plaza Miranda Bombings, following the declaration of Martial Law Ka Jovy would oppose Marcos even more, dodging arrest due to medical issues and fleeing to Singapore.\n\nWhen Aquino returned, so did Salonga. Fiercely continuing his campaign against Marcos he saw the end of the regime, he would lead the charge to exposing the Marcoses ill-gotten wealth and was part of the first cabinet of Aquino, Senate President along with his roles. Jovito Reyes Salonga by 1992 would be elected president of the country. With his task of guiding the country to a new era of reform and change. One with a message, that the torch of democracy will continue to burn forever.§!"
 SALVADOR_LAUREL_DESC:0 "§WBack in Malacañang, the Laurels have once again achieved another presidency in the Philippines. This time, not appointed by a mere Japanese overlord.\n\nSalvador Roman Hidalgo Laurel was born fifth son under Jose P. Laurel. He studied with exceptional grades, but it was in high school when World War II broke out, and his family soon enough were the figureheads of the brutal occupation that followed with Japan. After the war however, he would continue his studies.\n\nDoy would run for public office, already experienced with law since the 1950s, he would win a seat in the Senate, passing many laws in favor of the poor, even voted in as the most outstanding senator for three years. It is also at this time that he helped form UNIDO, against Marcos, helping lead the charge against his rule.\n\nFollowing the end of Marcos, Laurel would run for the 1992 elections, and surprisingly winning out. Laurel will now focus on helping the poor, and uphold the values of the old Filipino, before a time where Japan broke the social order, before a time where Marcos ruled with an iron fist. For Laurel, a bright future shall be laid by him for the country he has so worked hard on.§!"
 GREGORIO_HONASAN_DESC:0 "§WBorn in Baguio to a large family, Gringo studied hard throughout his life, later heading to the Philippine Military Academy, he joined the special forces and fought against the New People’s Army, wounded in many battles. His service payed as he would rise the ranks.\n\nThere, he would become assistant to Juan Ponce Enrile, later becoming the Chief of Security of the Defense Ministry. It is where he and other military allies would form the RAM-AFP to oppose Marcos as he gradually aged. When Marcos died, it was them that let the military defect to the side of the protestors.\n\nAfter this however, it split. RAM never disbanded, but it’s ideas changed. For the trust within the Aquino’s Administration would collapse, as the army still wasn’t given its attention and reforms. Angered by this, Gringo would pull the largest coup in Philippine history, bigger than even the one in EDSA.\n\nIt is now past that, for it is him, Gringo, Gregorio Ballesteros Honasan II who now leads the country. Though rule may be insecure for now, his era begins now, for even as violence grows, the country suffers, it is all necessary. There are still dangers lurking to take the country down. There are threats from within, the Communists, the Moros, the ones fighting for so called democracy again. It is all up to him, Gringo, to save the country and the army from being ignored and abused for personal gain.§!"
