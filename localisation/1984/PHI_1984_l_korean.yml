 PHI.7.t:0 "March on EDSA"
 PHI.7.desc:0 "-\"Are we ready?\" said Mike Lacanilao, as the noise of protests rang through his ears. -\"Yes, handa na. We are, live in 3... 2... 1...\" the Cameraman said to Lacanilao.\n\n-\"This is GMA Balita with Mike Lacanilao, reporting live from EDSA.\" the News Anchor reported. Juan focusing closer at the TV. -\"Jose Rizal once said. \"The people no longer have confidence in their former protectors, now their exploiters and executioners. The masks have fallen.\" This quote is now more relevant than ever, as we are currently receiving alarming reports from Metro Manila: demonstrators are storming Malacañang Palace in what appears to be the most intense escalation yet of nationwide unrest.\" Lacanilao moving sideways for the cameraman to show the ongoing protests on EDSA.\n\n-\"This wave of protest follows the death of former President and dictator Ferdinand Marcos on February 9. In the immediate aftermath, Cesar Virata assumed the role of acting president, promising to turn the country into a democracy with a focus on economic development to restabilize it. His relatively clean record as a technocrat had made him be seen as a legitimate figure by many. However, his leadership was short-lived as strong Marcos loyalists quickly ousted him in a bid to reestablish a pro-Marcos government, triggering outrage and igniting mass demonstrations.\" Taking deep breath before continuing.\n\n-\"Since February 22, protesters have filled the streets of EDSA and beyond, clashing with riot police. The unrest has spread to cities such as Cebu and Davao, with demonstrators voicing their support for democratic reform. Today, two of the nation's most prominent church leaders, Jaime Cardinal Sin and Cardinal Ricardo Vidal, issued a public call to action, urging Filipinos to peacefully correct what they called the \"evils\" inflicted by the current regime. That call galvanized the movement, drawing nearly a million more into the streets.\" Lacanilao was shortly interrupted as a man in a Barong and straw fedora walked up to him and whispered regarding new information. The camera cutting to Helen Vela's pre-recorded report of the news before it cut back to Lacanilao positioning himself towards the camera.\n\n-\"Now, as members of the military and constabulary defect to the side of the people, we are receiving word that the gates of Malacañang have been breached. From Luzon to Mindanao, Filipinos are rising as one, calling for the restoration of democracy.\" Taking a breath before continuing.\n\n\"This revolt, the biggest in the 1970s is being called by many as the...\""
 PHI.7.a:0 "\"People's Power Revolution.\""
