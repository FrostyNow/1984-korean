 PHI_Crippling_Refugee_Wave:0 "Crippling Refugee Wave"
 PHI_Crippling_Refugee_Wave_desc:0 "\n\n\n\n£GFX_PHI_Crippling_Refugee_Wave_Banner\n\n\n\n\n\n\n§WNot only have we suffered a humiliating defeat at the hands of the Indochinese Totalist Scum, but we have also received a massive amount of refugees who are fleeing the incoming subjugation from their new overlords due to our status as the last remaining free nation of Southeast Asia after the fall of the SEADI.\n\nWith the amount that are coming to our shores every day, our resources to properly accommodate them become even more sparse leading to worsening living conditions not only for the incoming refugees but also for our citizens.\n\n§RGod help us as more come, for we do not have enough to help them all...§!§!"
 PHI_Marcos_Dictatorship:0 "Marcos Regime"
 PHI_Marcos_Dictatorship_desc:0 "\n\n\n\n£GFX_PHI_Marcos_Regime_Banner\n\n\n\n\n\n\n§WFerdinand Marcos and his family has ruled the country ever since his election in 1965. His presidency has seen the backsliding of Filipino Democracy, yet the continued economic development and defense of the country. His rule is marked with controversy as many question whether the Philippines is still in need of a strognman. Despite this as of now he still holds complete rule with the Kilusang Bagong Lipunan, the country has not seen any election and the military is under the complete control of him.§!"
 PHI_Calls_For_Democracy:0 "Calls For Democracy"
 PHI_Calls_For_Democracy_desc:0 "\n\n\n\n£GFX_PHI_Calls_For_Democracy_Banner\n\n\n\n\n\n\n§WAfter the end of the Old World and the rise of the Superstates the country experienced a short period of democratic turmoil before the election of Ferdinand Marcos in 1965. The country experienced democratic backsliding as Marcos used the opportunity of the rise of the Superstates in order to centralize power into his party. Many accepted it and justified as a measure to safeguard the country from invasions from their larger neighbors. However as time continued and the situation gradually stabilized more and more people called for a return to democracy. Spearheaded by Benigno Aquino, who would later become the main opposition leader against Marcos. The situation appears serious as many have begun protesting and openly calling for the removal of the Marcoses and the party.§!"
 PHI_Ongoing_Insurgency:0 "Ongoing Communist Insurgency"
 PHI_Ongoing_Insurgency_desc:0 "\n\n\n\n£GFX_PHI_Ongoing_Insurgent_Conflict_Banner\n\n\n\n\n\n\n§WDuring the period of revolution in East Asia, ex-PKP members, lead by Jose Maria Sison split off from the party to form the New Peoples Army, following a more Chinese wing of Communism though not that of East Asia, this would later evolve into an entire armed group which rose up in 1968, small in scale however.\n\nThis, the constant bombardments from the Superstates, and a bombing in Plaza Miranda would lead to the declaration of Martial Law. During this period the New Peoples Army would significantly expand their operations. This conflict has been going on for the past 20 years and has shown no signs of stopping any time soon through both force and diplomacy.§!"
 PHI_Inevitable_Revolution:0 "Inevitable Revolution"
 PHI_Inevitable_Revolution_desc:0 "\n\n\n\n£GFX_PHI_Inevitable_Revolution_Banner\n\n\n\n\n\n\n§WIt's over for the new regime. Following the ousting of Cesar Virata and the establishment of a more Pro-Marcos Government the entire country has risen up in a strong call for democratization, Ninoy Aquino Jr. being the leader of this charge, all attempts to crush the protests have failed as police have turned on us, it's only a matter of time until we fall to Aquino and his allies.§!"
 PCW_Civil_War:0 "The Philippine Civil War"
 PCW_Civil_War_desc:0 "\n\n\n\n£GFX_PHI_Civil_War_Banner\n\n\n\n\n\n\n§WIt all came crashing down. The Philippines has fallen into a civil war, both RAM-AFP and the Philippine Government were not able to win the coup, leading to an ugly stalemate. Despite RAM-AFP's clear rule over Manila the Provisional Government of the Philippines has resecured legitimacy across the provinces that had been more Anti-Marcos. In the more rural areas and the mountains the New People's Army took over much of the governments ability to control the provinces and have taken up arms against both Manila and Legazpi. While in the south a new independence movement has taken over in the form of a Bangsamoro Republik, one that seeks to break the rule of the Christian Filipinos over Muslim Mindanao. This conflict will take years to finish, and its legacy will be ugly.§!"
 PHI_Legacy_of_Marcos:0 "Legacy of the Marcos Regime"
 PHI_Legacy_of_Marcos_desc:0 "\n\n\n\n£GFX_PHI_Legacy_of_Marcos_Banner\n\n\n\n\n\n\n§WThe Marcos Regime will have a long lasting legacy on the Philippines. It may take decades or even a century before his legacy will even be eroded. His unique way of ruling, an authoritarian regime while continuously developing the country and defending it against Superstate airstrikes will always be remembered. People will continue to remember him good or bad, a constant debate and questioning, either for his corruption or for his protection. His family will continue to hold political influence aswell, as is usual with the phenomena of Cacique Democracy in the Philippines, as Ferdinand Marcos Sr. has made his mark, and this mark will be there for a long time.\n\n One day there may even be a chance of his family returning to the Palace once more, though unlikely... or so it may seem.§!"
 PHI_Economic_Recovery:0 "Economic Recovery"
 PHI_Economic_Recovery_desc:0 "\n\n\n\n£GFX_PHI_Economic_Recovery\n\n\n\n\n\n\n§WIt's finally time for recovery, with the chaos settled and elections cleaned the government will now focus on rebuilding the economy and things such as de-monopolization from the Marcos Period. This period will be long however and will be met with fierce opposition from almost all oligarchs who collaborated with the Marcos Government. But despite this, now a new bright light of hope is coming over the Philippines and hopefully it will come fast and stay for the years to come.§!"
 PHI_RAM_AFP_Takeover:0 "RAM-AFP Takeover"
 PHI_RAM_AFP_Takeover_desc:0 "\n\n\n\n£GFX_PHI_RAM_AFP_Takeover\n\n\n\n\n\n\n§WThe Reform the Armed Forces Movement has taken control of the Philippine Government, and now the country is falling apart because of it. There are few clear centers of control in many parts of the country are under the control of the RAM-AFP with the ongoing civil war. Their position is unstable with the civil war as the country falls apart with various factions fighting over control over the archipelago especially with Pro-Democratic protests commonly striking cities within the country, only to be brutally repressed by the military. Only time will tell on what will happen.§!"
 PHI_RAM_AFP_Rule:0 "RAM-AFP Rule"
 PHI_RAM_AFP_Rule_desc:0 "\n\n\n\n£GFX_PHI_RAM_AFP_Rule\n\n\n\n\n\n\n§WWith the dust and fighting settled it is clear that one thing is for certain, RAM-AFP rules the Philippines and the country slips towards despotism once more. Gregorio Honasan, ruling president is set to rule with a strongman identity. Despite this there are some factions within his rule who wish to change the status quo, especially with those wishing to restore the Marcoses Rule with his wife, Imelda Marcos or his son, Ferdinand Marcos Jr. For now though it is clear that the RAM-AFP movement will stay in power for quite some time, months, years, and possibly another two decades.§!"
 PHI_Pinatubo_Eruption:0 "Abo at Buhangin"
 PHI_Pinatubo_Eruption_desc:0 "\n\n\n\n£GFX_PHI_Pinatubo_Eruption\n\n\n\n\n\n\n§WThe 1991 Mount Pinatubo Eruption has been a complete disaster in Central and Southern Luzon, with the eruption being recorded as the second largest volcanic eruption of the century, with temperatures globally even dropping.\n\n Millions of tons of ash, sand and lahar pour down, destroying roofs, blocking the Tarlac River, choking our agriculture, and burying transport and infrastructure in ash. A thousand people have been killed and thousands upon thousands have been evacuated from the danger zone. Furthermore key former military sites that hold precious former US arms have been damaged. It will take decades to recover and billions of pesos diverted to recovery funds.§!"
