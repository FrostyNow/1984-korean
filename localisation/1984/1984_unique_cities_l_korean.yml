l_korean:
 Unique_City_TT:0 "[Unique_City_Scripted_Localisation]"
 Unique_City_Halifax_Ruins_TT:0 "§YRuins of Halifax§!\nOnce the home of the Canadian Atlantic Fleet, the city of Halifax was wiped out by nuclear fire early on during the Atomic War, wiping out both the fleet and much of the city. Halifax largely exists as ruins now, abandoned and forgotten in favour of other cities which arose following the fall of Halifax."
 Unique_City_Nova_Scotia_TT:0 "§YNew Glasgow§!\nFollowing the destruction of Halifax and recieving a major influx of refugees from the fallen city, New Glasgow has emerged as a major zone of commerce and industry in Nova Scotia, becoming the largest city of the Province as well as it's capital.\n\n§YLunenburg§!\nWhen Halifax fell, the remaining naval and maritime assets that survived the destruction sailed to Lunenburg. Though initially a chaotic and overcrowded town due to this and the many refugees fleeing south, Lunenburg eventually managed to stablise and take Halifax's place as the main port city of Nova Scotia."
 Unique_City_Metropolis_TT:0 "§YMetropolis§!\nThe largest city in all of North America, Metropolis is the industrial and economic hub of Oceania. Metropolis can almost be described as the proving ground of Oceania when it comes to imposing state mandated cultural norms and policies, with its citizens the guinea pigs for the Party's various mass social experiments."
 Unique_City_New_York_City_TT:0 "§YNew York City§!\nThe largest city in all of North America, New York City has been in a state of recollection in the wake of Oceanian rule. The years of social engineering, experimentation and being the general focal point of the Party has had it's toll on the people living here. Though a major hub for the resurgent America and a stronghold of Anti-INGSOC sentiment, the city will not soon forget the horrors inflicted upon them by Big Brother and the English Socialist ideology."
 Unique_City_Big_Brother_TT:0 "§YBig Brother§!\nThe place where the Oceanian Civil War first began, the event which eventually lead to the rise of INGSOC over all of Oceania, it was unsurprising when the city once known as Baltimore became the new capital of the nation. Big Brother is home to the Core Party, a segment of Oceanian politics that are above even the Inner Party members of the various provinces, the true ruling authority of Oceania."
 Unique_City_Baltimore_TT:0 "§YBaltimore§!\nIn the aftermath of Oceanian rule, Baltimore is perhaps the most unique city of them all. After all, it's role as Oceania's capital is not soon forgotten, the shadow of it's legacy still looming over the region like a great spectre. In many ways, Baltimore has become a zone of contention for many. What is to be done with the city now? What of the Pyramids that loom over the skyline and the landmarks created by the Party? Would attempting to erase what had been mend the city's legacy or would it only make things worse?"
 Unique_City_Franklin_Crater_TT:0 "§YFranklin Crater§!\nThe existence of the Franklin Crater is something widely accepted as completely unintentional. The nuclear weapon, which detonated in the small town of Franklin which became the namesake of Franklin Crater, was believed to be intended for nearby Norfolk, where significant naval facilities are located. Regardless of the reasoning, whether it be inaccuracy or otherwise, the fact remains that Franklin and some of the nearby towns in the region that once existed don't exist anymore."
 Unique_City_Naval_Anchor_Alpha_TT:0 "§YNaval Anchor Alpha§!\nNaval Anchor Alpha, formerly the primary port of the US Atlantic Fleet, is now the base of operations for the Oceanian North American Atlantic Naval Fleet. Though not as large as it once was due to the exodus of people from this city following the nuking of Frankin, Naval Anchor Alpha remains a highly important naval asset for Oceania."
 Unique_City_Norfolk_TT:0 "§YNorfolk§!\nAfter many long years of Oceanian rule, the city of Norfolk has returned to American hands, it's name restored and destiny recharted. Naval facilities belonging to Oceania have either been evacuated or seized by local resistance groups that have alligned themselves with the new rulers of the city.\n\nThe city is still, in many respects, a shadow of its former self. But now that it is under new hands, perhaps Norfolk can finally begin anew."
 Unique_City_London_TT:0 "§YLondon§!\nOnce the heart of a mighty Empire, London has been reduced to the seat of power of an Oceanian province, the city often bearing the brunt of bombing raids by Eurasia. The ministeries of Oceania maintain a powerful presence here, the Administrative Pryamids an overbearing presence on a city that has long forgotten its face."
 Unique_City_London_Liberated_TT:0 "§YLondon§!\nThe age of Big Brother and Oceania has passed by, with London emerging once more, it's legacy remembered and it's path forward clear. Though the path ahead is long, and there is much to be done in the aftermath of Oceanian rule, London stands a bastion of Britannia once more."
 Unique_City_Scapa_Flow_TT:0 "§YScapa Flow§!\nWhilst Scapa Flow in the modern day has become reduced to devastated ruins and uninhabitable islands, there was once a time in which Scapa Flow was once a major component in the old British Navy. But early on in the Atomic War, Scapa Flow was among the first military targets struck by the Soviet Union, wiping out much of the North Sea Fleet in an instant.\n\nScapa Flow can be described as a tomb of the Old World in many respects, the remnants Old World villages and Naval ruins jutting out from the seas like decaying gravestones."
 Unique_City_Colchester_Ruins_TT:0 "§YRuins of Colchester§!\nColchester is regarded specially these days as the first city in Britain to ever be struck by nuclear weapons. It was never fully understood why Colchester was the first city to be struck. Perhaps it was a move to frighten nearby London. Maybe they struck the wrong city. Eitherway, Colchester is an echo now, an abandoned monument to a world that has long since passed by."
 Unique_City_Lviv_TT:0 "§YLvov§!\nLvov, once known as the city of coffee, the center of Ukrainian Piedmont, has changed hands seven times over the last hundred years and has outlived five previous owners, which has had a significant impact on it. Once a beautiful city built by the Austrians, it is now sinking into mud and ruin, which only fuels the anger of local nationalists. Rumor has it that Galicia is connected by a vast network of partisan hideouts, called \"kryivkas\", where dissidents hide and forbidden knowledge is spread, and because of their activity, military convoys must defend themselves fiercely, with the slightest mistake punishable by a tribunal."
 Unique_City_Lviv_Liberated_TT:0 "§YLviv§!\nLviv, the old city of coffee and the center of Ukrainian nationalism, suffered greatly from the occupations of the Nazis, Communists, and Neobolsheviks. In cities, villages, and forests, the city hid the centers of those who remained loyal to Ukraine for forty years. In these poor places, hidden from prying eyes, the idea of a free Ukraine lived on, and weapons were kept that allowed people to fight against the occupation all this time - books. Musical compositions, poems, works of fiction, biographies, and philosophical texts - dozens of books by Ukrainian authors who sang the praises of Ukraine - this is what defended us from destruction.\n\nAnd as an additional argument, boxes of grenades and ammunition behind the bookcases."
 Unique_City_Ludovicgrad_TT:0 "§YLudovicgrad§!\nNamed after Ludovic-Oscar Frossard, Paris fell to the Eurasians in mid-1946 after a gruelling four months seige. When the Soviets planted the Hammer & Sickle upon the Eiffel Tower, they went straight to work, tearing down the Colonne de Julliet, and razing the Arc de Triomphe and the Louvre in order to destroy France's culture. And yet, hopes for a Free France have yet to die, with the Catacombs of the City of Lights becoming increasingly utilised by various Resistance groups, preparing for the coming liberation of the city."
 Unique_City_Kapitalgrad_TT:0 "§YKapitalgrad§!\nThe Russian Empire. The Soviet Union. And now Eurasia.\n\nindeed, Moscow, better known as Kapitalgrad these days, has long been the seat of great continent spanning empires and this age is no different. From here, the Neo-Bolshevik Party reigns from their home in the Palace of the Soviets, projecting their power and influence across all of Eurasia like previous administrations had done many times before."
 Unique_City_Moscow_TT:0 "§YMoscow§!\nRulers change, yet Moscow remains. The Neo-Bolsheviks, much like the Stalinists and Leninists, are gone and with it, comes a new vision for Moscow. What the vision will look like, nobody truly knows. However, with Moscow reclaiming its name and becoming yet again the heart of a new Russian state, perhaps things will not be as bad as they used to be."
 Unique_City_Beijing_TT:0 "§YBeijing§!\nThe centrepiece of many large civilisations and empires, Beijing has always been the seat of Asia's largest power, whether it be the Chinese dynasties of old or the East Asian Superstate that dominates Asia. It is here where the core Workers Party conducts its daily affairs and projects its power and influence across all of East Asia, like the Great Dynasties that came before it."
 Unique_City_Beijing_Liberated_TT:0 "§YBeijing§!\nOnce more, Beijing changes hands, with the grasp of the Workers Party no longer present, the centrepiece of Chinese civilisation is once again back under Chinese domain. With their historical capital reclaimed, the Chinese nation faces an uncertain yet optimistic future."