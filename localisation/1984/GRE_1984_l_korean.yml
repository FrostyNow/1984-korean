l_korean:
 GRE_Christ_The_Saviour:0 "Christ the Saviour"
 GRE_Christ_The_Saviour_desc:0 "\n\n\n\n£GFX_GRE_Christ_The_Saviour_Banner\n\n\n\n\n\n\n§WThe Father, the Son, and the Holy Spirit.\n\nThrough the sacrifice and ressurection of our Lord, Jesus Christ, Mankind was freed from the bounds of sin and was given a pathway to join our holy God in Heaven. All one needs to do is to believe in the death and the ressurection of our Lord and give themselves to Him, and you shall be liberated.\n\nChrist gave us the keys to salvation, therefore, we have an obligation to honour the gift we did not deserve by fighting against the false gods of Neo-Bolshevism and see to it that all know that it is Christ is who is the Lord, our God.§!"
 GRE_Mary_The_Blessed:0 "Mary the Blessed"
 GRE_Mary_The_Blessed_desc:0 "\n\n\n\n£GFX_GRE_Mary_The_Blessed_Banner\n\n\n\n\n\n\n§WBlessed be Mary, our Holy Mother, the wonderful woman who carried and birthed our Lord into this world. May she forever live on in our hearts and in the vast splendour of Heaven as a symbol of purity and love. May the Lord, our God, impart the blessings and love He granted her onto all of us, in Greece and all loyal children of God as we embark in the great crusade against the minions of the evil one in the name of our Lord eternal.§!"
 GRE_Michael_The_Archangel:0 "Michael the Archangel"
 GRE_Michael_The_Archangel_desc:0 "\n\n\n\n£GFX_GRE_Michael_The_Archangel_Banner\n\n\n\n\n\n\n§WThe Archangel Michael showed true loyalty to God and his Kingdom by confronting Lucifer and besting the fallen angel in the name of the Father. His noble and rightous effort led to the evil one being casted from the Heavens and the end of the rebellions in Heaven against the Creator.\n\nJust as the Archangel casted the one who would be known now as Satan out from His home, let us cast out Eurasia and the demonic presence out, not just from our homeland but across the Earth, from Iberia to Kamchatka.§!"