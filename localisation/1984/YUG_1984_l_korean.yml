l_korean:
 YUG_Republic:0 "Federal Republic of Yugoslavia"
 YUG_Republic_DEF:0 "The Federal Republic of Yugoslavia"
 YUG_Republic_ADJ:0 "Yugoslav"
 SLOBODAN_MILOSEVIC_DESC:0 "§WBorn in 1942 in the black cancer that was Ustaše Croatia, Slobodan Milošević and his Chetniks have done nothing but fight for Yugoslavia's independence for 50 years against the Godless tyranny of Eurasia. Following in the steps of the late Chetnik leader, Draža Mihaljović, he seeks a free Yugoslavia with a strong Serbia at its core\n\nAs Europe begins to awaken from the Eurasian nightmare, the opportunity has finally come for the Chetniks to strike against their greatest foe, but unlike his former, he does not seek a monarchy. That time has long since passed. Instead, Milosevic seeks to establish a dictatorship with himself as the leader, for only he knows how to lead his people out of tyranny and into freedom.§!"
 YUG_Fanatical_Resistance:0 "Fanatical Resistance"
 YUG_Fanatical_Resistance_desc:0 "\n\n\n\n£GFX_YUG_Fanatical_Resistance_Banner\n\n\n\n\n\n\n§WThe people of the Balkans have a long history of resistance against foreign enemies. From the Turks to the present Eurasian threat, the people of Yugoslavia have consistently fought tooth and nail for the independence of our region and that has not changed.\n\nWith revolts occuring across Eurasia, from the Rhine to Siberia, the oppertunity has arose for Yugoslavia to rise from the grave once more and take the fight to our oppressors.\n\nAgainst us there is no antidote. All you can do is kill us. And even then, our graves will continue the fight against you.§!"
 YUG_For_The_Cross:0 "For The Cross"
 YUG_For_The_Cross_desc:0 "\n\n\n\n£GFX_YUG_For_The_Cross_Banner\n\n\n\n\n\n\n§WUnder the tyranny of Eurasia, faith in the Lord of Lords, Jesus Christ of Nazareth, had been heavily supressed. For a Generation and more, the light of the Lord had been kept from them, the spirit of Jesus kept from millions, unable to bring salvation for their souls.\n\nWe may not be able to liberate the right to faith in the Lord Jesus Christ across the world, but we can at least restore the power of the cross here in Yugoslavia.§!"
 YUG_Disjointed_Movement:0 "Disjointed Movement"
 YUG_Disjointed_Movement_desc:0 "\n\n\n\n£GFX_YUG_Disjointed_Movement_Banner\n\n\n\n\n\n\n§WThe Yugoslav Movement as it exists, to be frank, is a mess. Though we stand united in our goal to vanquish the Eurasian enemy, issues persist regarding the coordination of various partisan groups, linguistics and the future of Yugoslavia after the war has been won.\n\nThese are issues that will need to be resolved at one point or another, if we wish to maintain the unity of the movement against our common foe.§!"