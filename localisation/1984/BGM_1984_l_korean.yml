l_korean:
 BGM_NUR_MISUARI_DESC:0 "§WFor once in almost 450 years, the Moros are finally free and united, with a new face incharge, but who exactly is this man?\n\nNur Misuari was born in 1939 to a family suffering financial difficulties, only managing to enter university with a scholarship he participated in many political groups and helping co-found some. He established the Mindanao Independence Movement, using peaceful methods despite the rule of the Marcoses. Though establishing the Moro National Liberation Front as a secret armed organization in case anything went wrong.\n\nWhen the Civil War broke out, the MNLF were activated and quickly took control of Muslim Mindanao, when the dust settled he declared the independence of this new region, Bangsamoro. Now incharge of this new state it is he who will decide how this new Bangsamoro shall go, for Bangsamoro is a new identity, and it is up to him to build up Bangsamoro for a brighter future.§!"
 BGM_Murad_Ebrahim_head_minister_desc:0 "§aUnited Moro Islamic Party§!\n§YPatriotic Moro§!"
 BGM_Muslimin_Sema_foreign_minister_desc:0 "§aMoro National Liberation Party§!\n§YCompromising Bridge§!"
 BGM_Nur_Misuari_economic_minister_desc:0 "§aMoro National Liberation Party!\n§YPragmatic Leader§!"
 BGM_Salamat_Hashim_defence_minister_desc:0 "§aUnited Moro Islamic Party§!\n§YIslamic Guerilla§!"
 BGM_Malaysian_Aid:0 "Friends in Kuala Lumpur"
 BGM_Malaysian_Aid_desc:0 "\n\n\n\n£GFX_BGM_Friends_In_Kuala_Lumpur\n\n\n\n\n\n\n§WDespite Malaysia officially being an ally of the Philippines, supporting Bangsamoro favors their interest more. With the chaos in most of the archipelago the Malaysian Government has taken the iniative to aid the Moro Government in keeping their independence so long as they keep watch of Moro Piracy. Some issues still hold however, mainly over the North Borneo dispute due to the strong historical connections between the former Sulu Sultanate and the current government.§!"
 BGM_New_Identity:0 "New Identity, New Bangsamoro"
 BGM_New_Identity_desc:0 "\n\n\n\n£GFX_BGM_New_Identity\n\n\n\n\n\n\n§WUnlike the former sultanates that once ruled this land divided. The idea of a Bangsamoro is relatively new, only being conceptualized in the 1970s under the Marcos Regime. It was only by chance when the Philippine Civil War began that Nur Misuari’s sleeper cells rose up and Bangsamoro was declared free. Yet these soldiers are small compared to the vast population of Bangsamoro. It will take years before we can properly build up a new identity, one that strips away the divisions of the former sultanates that dominated the country for over 500 years.§!"
 BGM_Non_Involvement:0 "A Ready Neutrality"
 BGM_Non_Involvement_desc:0 "\n\n\n\n£GFX_BGM_Non_Involvement\n\n\n\n\n\n\n§WBangsamoro is neutral in the Philippine Civil War, thus taking in a lot of refugees. However in return we have been receiving aid from Malaysia in order to secure our borders despite the recognition of the Philippines being to the RAM-AFP Government which wishes to re-annex us, our army is ready for any conflict spillover or a re-annexation conflict, with the spirit of three hundred years of sultanates in our ranks. For now however there is peace and we shall take in refugees as long as in return there is little harm in taking them.§!"