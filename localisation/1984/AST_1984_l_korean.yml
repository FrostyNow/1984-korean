l_korean:
 AST_Unified:0 "Australian Provisional Government"
 AST_Unified_DEF:0 "The Australian Provisional Government"
 AST_Unified_ADJ:0 "Australian"
 AST_Reclaiming_Australia_decision_category:0 "Australian Reclamation Decisions"
 AST_Unify_Australia_debug:0 "Unify Australia"
 AST_Reclaiming_Our_Continent:0 "Reclaiming Our Continent"
 AST_Reclaiming_Our_Continent_desc:0 "\n\n\n\n£GFX_AST_Reclaiming_Our_Continent_Banner\n\n\n\n\n\n\n§WFor years, the remnants of the Australian Army have carried out the campaign of resistance against the armies of human drones Oceania that occupy our great land. Though most of our operations consisted of sabotage and assassinations of key military leaders, the chance for boldness has arrived.\n\nWith Oceania's armies being sent away to go fight in Africa and the Americas, the time has come for us to exploit Oceania's growing weakness and reclaim our continent from the claws of Big Brother.§!"
 AST_Two_Peoples_One_Goal:0 "Two Peoples, One Goal"
 AST_Two_Peoples_One_Goal_desc:0 "\n\n\n\n£GFX_AST_Two_Peoples_One_Goal_Banner\n\n\n\n\n\n\n§WTo those who still remember, the history between Aboriginals and Anglo-Australians have been... complicated, to put it lightly. With a long history of conflict and mutual distain, any path of reconcilation, if it were to be taken at all, would have been a lengthy process that would have likely taken decades.\n\nHowever, if there is one benefit to the rule of Oceania and Big Brother over Australia, is that it has allowed the peoples of this continent to set aside their grievences to face a far greater enemy. With this unity between our peoples, we now fight alongside one another with a singular purpose in mind.\n\nThe liberation of Australia from Big Brother.§!"
 AST_Masters_Of_The_Outback:0 "Masters of the Outback"
 AST_Masters_Of_The_Outback_desc:0 "\n\n\n\n£GFX_AST_Masters_Of_The_Outback_Banner\n\n\n\n\n\n\n§WThough in the past, the outback had been a vasy ad mysterious land, filled with both danger and uncertainty, in recent years this vast terrain that defines much of the Australian continent has become our greatest strength. Living in the arid plains and forced to adapt to the desert landscape, the Australian Army has truly mastered the art of desert warfare.\n\nMay Oceania throw its great armies into the maw of the Australian Outback, for we can outlast any man in a black uniform, assuming the scorching heat doesn't get them first!§!"