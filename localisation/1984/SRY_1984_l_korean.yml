 SRY_The_Serayarossiya_Concept:0 "The Serayarossiya Concept"
 SRY_The_Serayarossiya_Concept_desc:0 "\n\n\n\n£GFX_SRY_The_Serayarossiya_Concept_Banner\n\n\n\n\n\n\n§WA recent concept dreamed from the mind of Zhirinovsly, Serayarossiya is designed to serve as nation made for the Russians of Northern Kazakhstan, a people who share different faiths, tradiations and cultural values from the people that inhabit the rest of Central Asia.\n\nThough the local Kazakhs that happen to live in this land are opposed to the idea of existing within a Russo-centric state, their numbers are fewer than the Russians of Serayarossiya and the need for an independent Russian state far outweighs the objections of anyone who isn't part of the coalition.§!"
 SRY_A_Whirlwind_Of_Ideologies:0 "A Whirlwind of Ideologies"
 SRY_A_Whirlwind_Of_Ideologies_desc:0 "\n\n\n\n£GFX_SRY_A_Whirlwind_Of_Ideologies_Banner\n\n\n\n\n\n\n§WThe government of Serayarossiya is home to numerous ideological factions, from democratic reformists, Zhrinovskyites, theocrats, to Imperial Restorationists. This can be difficult to manage at times considering how varied these ideas can be, but the greater threat of Eurasia and it's armies ensure that political unity for the sake of survival comes first.§!"
 SRY_Za_Russkiy_Mir:0 "Za Russkiy Mir"
 SRY_Za_Russkiy_Mir_desc:0 "\n\n\n\n£GFX_SRY_Za_Russkiy_Mir_Banner\n\n\n\n\n\n\n§WWe fight for the independence of a Russian state free from the influences of the Eurasianists who seek to wither away Russian indentity and replace it with a people that are bland and unremarkable, to be reduced to mere drones of a state that views us are nothing more than tools.\n\nWe can't leave it to chance, the liberation and preservation of the Russian nation must come first.§!"