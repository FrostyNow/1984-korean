 ARB_United:0 "United Arab Republic"
 ARB_United_DEF:0 "The United Arab Republic"
 ARB_United_ADJ:0 "Arabian"
 ARB_Arab_United_Front_decision_category:0 "Arab United Front"
 ARB_Reclaim_The_Arab_Heartland_decision:0 "Reclaim the Arab Heartland"
 ARB_Consolidate_Arabia_decision:0 "Consolidate Arabia"
 ARB_Secure_Egypt_decision:0 "Secure Egypt"
 ARB_The_Arab_Liberation_Movement:0 "The Arab Liberation Movement"
 ARB_The_Arab_Liberation_Movement_desc:0 "\n\n\n\n£GFX_ARB_The_Arab_Liberation_Movement_Banner\n\n\n\n\n\n\n§WThe Arab United Republic only controls a fraction of the Arab World, with the rest living beyond our grasp as a result of Oceania's, Eurasia's and East Asia's constant incursions into the Middle East and North Africa.\n\nIn spite of this, however, the Arab United Republic still lives on, standing firm and united in the face of this threat, prepared for the day we can surge out from our boundaries and finalise the dream of a unified Arab World.§!"
 ARB_The_Heart_Of_The_Islamic_World:0 "The Heart of the Islamic World"
 ARB_The_Heart_Of_The_Islamic_World_desc:0 "\n\n\n\n£GFX_ARB_The_Heart_Of_The_Islamic_World_Banner\n\n\n\n\n\n\n§WMecca, the heart of the Islamic faith, remains firmly in our hands. Its religious sights, including the Kaaba, have been well preserved and maintained. The preservation of Islam's holiest city has been instrumental in preserving the people's faith, a bastion of what was in the face of this practically alien world.§!"
 ARB_Saudi_Resistance:0 "Saudi Resistance"
 ARB_Saudi_Resistance_desc:0 "\n\n\n\n£GFX_ARB_Saudi_Resistance_Banner\n\n\n\n\n\n\n§WWhen the Iraqi army swept through much of the Arab Peninsula to subjegate the Peninsula, it was the Saudi's who resisted the most out of any faction. Aiming to retain their positions of power, the Saudi's fought back against the Iraqi Arab Military tooth and nail.\n\nThough failing, the surviving Saudi resistance remains a persistant thorn in the side of the Front, with many supporters still at large in the former territories of what was once known as Saudi Arabia.§!"