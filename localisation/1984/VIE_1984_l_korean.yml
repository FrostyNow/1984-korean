 VIE_Prepare_The_Hue_Conference_decision:0 "Prepare the Hue Conference"
 VIE_Our_Lost_Brothers:0 "Our Lost Brothers"
 VIE_Our_Lost_Brothers_desc:0 "\n\n\n\n£GFX_VIE_Our_Lost_Brothers_Banner\n\n\n\n\n\n\n§WUp north, our brothers are being bombarded and subjugated by the East Asian hordes, as a result, many of our people up north have fled down south. Due to our current political situation, there is nothing we can do but watch helplessly.\n\nAs more people flee down south, bringing with them stories of death and misery, our people demand decisive action against the northern invaders. The northern threat for the most part has diverted attention away from our internal issues, their anger fueling the drive to further militarise society and safeguard our nation from the Horrid Regimes to our North and West.§!"
 VIE_Insurgency_In_The_Highlands:0 "Insurgency in the Highlands"
 VIE_Insurgency_In_The_Highlands_desc:0 "\n\n\n\n£GFX_VIE_Insurgency_In_The_Highlands_Banner\n\n\n\n\n\n\n§WWithin the Central Highlands, the ethnic makeup of the region puts the ethnic Vietnamese people squarely within the minority, despite this, administrators of the regions are ethnically Vietnamese and are responsible for pushing out policies that are often detrimental to the indigenous peoples of the Highlands.\n\nAs a result, the indigenous peoples with some assistance from the Kampuchean regime to our west have started organising resistance against the central government, with objectives ranging from more autonomy within the republic to outright independence. As their attacks intensify, the calls for addressing their concerns grow higher.\n\nFailure to address the issue could destabilise the region and leave it vulnerable to Khmer Rouge attacks!§!"
 VIE_Emerging_Student_Movements:0 "Emerging Student Movements"
 VIE_Emerging_Student_Movements_desc:0 "\n\n\n\n£GFX_VIE_Emerging_Student_Movements_Banner\n\n\n\n\n\n\n§WIn 1963, President Ngo Dinh Diem was overthrown by a clique of military officers after implementing a multitude of disastrous policies that almost led the nation to complete ruin. The promises of democratisation by the military over the years have become nothing more than a complete lie.\n\nAs a result, the nation’s students have organised mass protests to demand changes from the current military government and as more students walk out, the stability of the nation erodes further. Should their demands not be addressed, it could spell complete disaster for our already unstable nation.§!"