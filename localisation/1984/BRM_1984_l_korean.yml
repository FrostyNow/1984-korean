 BRM_Burmanisation:0 "Burmanisation"
 BRM_Burmanisation_desc:0 "\n\n\n\n£GFX_BRM_Burmanisation_Banner\n\n\n\n\n\n\n§WThe official state policy of the Burmese State in regards to ethnic policy is Bamar racial chauvinism. Governmental policies often heavily favor the Bamar majority at the cost of other ethnic groups.\n\nThe ultimate goal of these policies is to establish a singular Burmese culture that stems from Bamar culture. The coming stability from these policies will ensure national unity for centuries to come, should we be successful.§!"
 BRM_Total_Tatmadaw_Authority:0 "Total Tatmadaw Authority"
 BRM_Total_Tatmadaw_Authority_desc:0 "\n\n\n\n£GFX_BRM_Total_Tatmadaw_Authority_Banner\n\n\n\n\n\n\n§WThe Tatmadaw has been the dominant force in Burma’s politics since the 1962 coup. Their heavy involvement with state matters has helped shape the elite and domineering military culture that has guided Burmese society to what it is today.\n\nThanks to their guidance, the nation, especially the metropolitan areas has enjoyed relative tranquillity thanks to the harsh crackdowns on the protests following the coup. However, as a result, they have become complacent with the status quo which is not very beneficial in the long run, should things stay the way they are, our society will become stagnant.§!"
 BRM_Surging_Minority_Separatism:0 "Surging Minority Separatism"
 BRM_Surging_Minority_Separatism_desc:0 "\n\n\n\n£GFX_BRM_Surging_Minority_Separatism_Banner\n\n\n\n\n\n\n§WDue to the policies that heavily favor the Bamar majority, racial tensions have surged to a near-boiling point. Many regions where the majority aren’t Bamars are being driven to near rebellion.\n\nDespite our best efforts, we’ve been stretched too thin to be able to effectively deal with all regions. If we cannot do anything to uplift the current status quo, our nation will fall into ethnic civil war.§!"