 RUS_Russia_Awakens:0 "Russia Awakens"
 RUS_Russia_Awakens_desc:0 "After many decades under the rule of the Bolsheviks, whose anti-human philosophies have attempted to break the Russian people and spirit in their quest to forge the 'Eurasian Man', Great Russia has arisen from the ashes of its despair to take up arms against their true enemy.\n\nThe road ahead of us is long and great struggles are a garuntee. But in the end, no matter how long it takes, when the true flag of Russia flies over our native Moscow and Eurasia has been vanquished from the Earth, let all Humanity will know that was here that Russia had truly been reborn, free from the long nightmare."
 RUS_Fighting_The_Second_Great_Patriotic_War:0 "Fighting the Second Great Patriotic War"
 RUS_Fighting_The_Second_Great_Patriotic_War_desc:0 "Once again, Russia is battling against an enemy that would see us erased. First came the Mongols. Then the French. The Germans. And now Eurasia, wearing the faces of our fellow Russians and many other nations it has assimilated into its faceless society.\n\nWe fight for the survival of a Russia, a struggle not just to our nation but for our very soul.\n\nThe Second Great Patriotic War is upon us all. It's fight or perish."
 RUS_Standardise_Military_Training:0 "Standarise Military Training"
 RUS_Standardise_Military_Training_desc:0 "The training of troops to fight in the war for our survival has been chaotic to say the least. Each division and battallion are rag tag or defectors, each having their own training and methods of fighting, from guerilla tactics to running at the enemy.\n\nIf we wish to maintain a cohesive military structure, working on a Standardised training regiment for our troops and new recuits is a top priority."
 RUS_Evolve_Modern_Military_Doctrine:0 "Evolve Modern Military Strategy"
 RUS_Evolve_Modern_Military_Doctrine_desc:0 "Military Tactics since the coming of Eurasia have not changed significantly and have arguably regressed, adopting the worse aspects of old WW2 Soviet Tactics as part of its efforts to cultivate a fanatic, suicidal army. If we want to beat the enemy, we must move past what has been in use for decades and look into altervative, smarter means of fighting the enemy."
 RUS_Exploit_The_Homefield_Advantage:0 "Exploit the Homefield Advantage"
 RUS_Exploit_The_Homefield_Advantage_desc:0 "Siberia is our home, our fortress. We have lived here and endured here for many long centuries, from blistering cold and to rough terrain. Our boys know this land better than any Eurasian trooper from the Kapital or Marxgrad. We will use every advantage our great and vast land has to offer to be victorious in battle whilst crushing our enemies."
 RUS_Support_Serayarossiya:0 "Support Serayarossiya"
 RUS_Incite_Ethnic_Revolts_desc:0 "In the steppes of Northern Kazakhstan, Russian people have come together under the leadership of a man named Vladimir Zhirinovsky, revolting against their Central Asian Masters in order to establish a free Russian state. Whilst our views may not align perfectly, the people of Serayarossiya are our kin and thus, need our assistance if they wish to see the splendour of a free Russia like we wish to see."
 RUS_Obliterate_Eurasia:0 "Obliterate Eurasia"
 RUS_Obliterate_Eurasia_desc:0 "There can be no room for negotiation, nothing left to chance. Eurasia had its chance and it failed. The Eurasian Union State must not only be punished for the damage it has caused, but utterly oblierated like how they oblierated people who moved against them.\n\nWe will start with finishing off Siberia before striking outwards. We will not rest until Moscow is back in our grasp."
 RUS_Maximising_What_We_Have:0 "Maximising What We Have"
 RUS_Maximising_What_We_Have_desc:0 "Russia is a land of plenty. Beneath our feet lies all the resources we could ever need to sustain the war effort against the enemy, from steel, oil, coal, and vast other quantities of various metals and resources. With this vast wealth in our hands, we must maximise our use of these resources to develop our economy, expand production and overwhelm the enemy with our industrial prowess."
 RUS_The_Rapid_Development_Of_Industry:0 "The Rapid Development of Industry"
 RUS_The_Rapid_Development_Of_Industry_desc:0 "Compared to other regions, the Industrial state of Siberia leaves much to be desired. Whilst we have factories, it is clear we will require more industrial facilities if we wish to triumph over our enemies comfortably without worrying about facing shortages of equipment and/or other goods."
 RUS_Mechanize_Agriculture:0 "Mechanize Agriculture"
 RUS_Mechanize_Agriculture_desc:0 "Food is at the heart of every single nation, no matter what. It doesn't matter our large your armies, how vast your cities, how great your economy, if you don't have a sufficent supply of food, you are not a nation. Considering the harshness of the Siberian land that we control, mechanizing agricultural and utilizing every technique to maximise the limited growing seasons will ensure the Russian State will maintain enough food to carry on the fight without worrying about famine."
 RUS_Develop_The_Trans_Siberian_Railway:0 "Develop the Trans-Siberian Railway"
 RUS_Develop_The_Trans_Siberian_Railway_desc:0 "The Trans-Siberian Railway is the lifeblood of Siberia, connecting all our major cities and ensuring that our vast Siberia doesn't become too disconnected from one another. With the war raging across the Siberian plains and mountains, this vital railway has sustained significant damage. With Novosibirsk in our hands, we should dedicate some resources to maintaining and developing this railway in order to ensure cohesion and connectivity across Siberia."
 RUS_Forcing_Open_Eurasian_Stockpiles:0 "Forcing Open Eurasian Stockpiles"
 RUS_Forcing_Open_Eurasian_Stockpiles_desc:0 "Our position in the Far East has left us in possession of numerous stockpiles filled with weapons and essential equipment not too far from the border of East Asia. Intially constructed and stocked in case of East Asian incursions into the Far East, this equipment will be seized and used by the Russian Government to arm our forces, using Eurasia's own weapons against them."
 RUS_Ignite_The_Skies:0 "Ignite The Skies"
 RUS_Ignite_The_Skies_desc:0 "Eurasia holds an edge in the skies, that much is clear. Their industrial and manpower capabilities makes confronting them head on in the skies a risky proposition. However, within the stockpiles we have opened, existed numerous stationary anti-air guns. Whilst impractical for a mobile army, these guns can be utilized to defend our skies and support our pilots up in the skies whenever Eurasia dares initiate air missions into our airspace."
 RUS_The_Shukshin_System:0 "The Shukshin System"
 RUS_The_Shukshin_System_desc:0 "The Stalinist System that has been in place in Russia and across Eurasia has been a detriment to our people, trading lives for factories, a philosophy that is unacceptable. A new system of economic development, one that is careful and doesn't sacrifice our own citizenry at the alter of development, must be implemented swiftly. Luckily, Provisional President Shukshin has been working tirelessly to forge a new economic system that seeks to do away with the outdated Stalinist System and replace it with something far more acceptable for our nation."
 RUS_Remembering_Who_We_Are:0 "Remembering Who We Are"
 RUS_Remembering_Who_We_Are_desc:0 "Since 1917, the forces of Marx and Bolshevism has been working tireless to upend and destroy the Russian identity and the identities of many other nations. Starting with religion and faith, the process of Eurasianisation has been devastating to the Russian people and who they are. We must work to reverse the damage done to our nation and people."
 RUS_Formalise_The_Ethnic_Republics:0 "Formalise the Ethnic Republics"
 RUS_Formalise_The_Ethnic_Republics_desc:0 "Joining in the revolt against Eurasia, the former ASSRs: The Sahka Republic, the Buryat Republic and the Tuvan Republic have all agreed to cooperate and formally integrate itself into the Russian Provisional Government provided that certain rights and demands be met in order to facilitate the survival of their own peoples. With the war still raging and unity more important than ever, its time to finalise these agreements and bring Russia one more step closer to total unification."
 RUS_Promote_Cultural_Expression:0 "Promote Cultural Expression"
 RUS_Promote_Cultural_Expression_desc:0 "Under Eurasia, the expression of Russian indentity and culture had been gradually more repressed by the Eurasian Government. Our history was slowly being swept away or edited, our traditions were increasingly shunned and eventually banned outright. And they attempted to finish us off with the eradication of our language. Though the mother tongue of Russia has been saved, there is still much to do to save the Russian identity. Norms to rediscover, history to uncover, faith to restore.\n\nWe must promote the Russian culture and tradition amongst our people as much as possible to ensure the total rebirth of Russia is achieved."
 RUS_Revive_The_Russian_Orthodox_Church:0 "Revive the Russian Orthodox Church"
 RUS_Revive_The_Russian_Orthodox_Church_desc:0 "The Orthodox Church, prior to the emergence of Communism and the morale decay it brought upon our people. The Church, though still existing in Russia, is fragmented and isolated, functioning in small pockets throughout the North far from the eyes of the Neo-Bolshevik Party.\n\nWith the emergence of the new government, the time has come to finally unite this scattered remnants and reunify the church under the protection of the reborn Russia."
 RUS_Redeem_The_Tsar:0 "Redeem the Tsar"
 RUS_Redeem_The_Tsar_desc:0 "For years, since the dark times first began, the Tsar of Old Russia has made into a figure of mystic and fear, misrepresented as a genocidal Emperor who sought to ruin all of Eurasia and plunge the world into darkness, as if the darkness hadn't already come.\n\nThe truth of the Tsar and who he truly was must be revealed to the public. We must tear away the mist of fear that Eurasia has surrounded the old Tsar with and uncover the man who once was."
 RUS_Healing_Our_Broken_Sons:0 "Healing Our Broken Sons"
 RUS_Healing_Our_Broken_Sons_desc:0 "The sons of Russia have suffered immensely at the hands of Eurasia. Conditioned into a life of fanaticism, deprived of their true legacy, their faith and history stolen away from them all while their lives are made worthless in the eyes of the Neo-Bolshevik Party who only viewed them as a means to an end.\n\nThis cycle must end. No more will our children be made into monsters without a soul. They must be healed from the horrors and be welcomed back to the Motherland that calls to them."
 RUS_Victory:0 "Den' Pobedy"
 RUS_Victory_desc:0 "After so much fighting across the Siberian plains and the vast mountains, across the rails and through the cities, we've finally beaten back Siberia, at least here in Siberia. There is still much to do in order to bring all Russian peoples under the banner of Russia once more, but for now, a free Russian state has been secured, spanning from the Ural to the Barrents. Though Moscow is just over the mountains now, there is still much left to do here in Siberia before we can ready ourselves for such an operation.\n\nFor now, let us revel in the fruits of victory and thank the Lord we have triumphed over evil."
 RUS_The_Constitutional_Convention:0 "The Constitutional Convention"
 RUS_The_Constitutional_Convention_desc:0 "With the war resolved, at least for now, we must take the opportunity to further strengthen and legitimise the new Russian state. The Eurasian influence lingering within will be dismantled and all Russians will know their legacy. We can begin with the drafting of a constitution, one that will outline the powers of the goverment whilst putting in provisions to ensure the Neo-Bolsheviks can never return to power."
 RUS_Reform_The_State_Duma:0 "Reform the State Duma"
 RUS_Reform_The_State_Duma_desc:0 "The State Duma was an institution that, though brief in its existence, was an early legislative body designed to serve as a function through which laws could be created and passed, where the regions of Russians could have their voices and concerns heard without fear of repression. Reimplementing this body would be a good step in both establishing trust amongst the Russian people as well as serving as a safeguard against others who may seek to restore a Neo-Eurasianist regime within our land."
 RUS_Organise_Local_Elections:0 "Organise Local Elections"
 RUS_Organise_Local_Elections_desc:0 "With the State Duma being built up and it's systems worked on, it's time to bring in the most important component of the Duma, deputies to represent the Oblasts and Krais of Russia. Through the selection of deputies, we can further develop the framework of this new Russian government and allow for new voices to join and guide the government."
 RUS_Formalise_The_New_Government:0 "Formalise the New Government"
 RUS_Formalise_The_New_Government_desc:0 "With deputies elected and the framework of the governemnt developed, it's time to convene the new government of Russia convene in Novosibirsk and begin laying the greater work of crafting a new, long term plan for Russia and her people."
 RUS_Consolidate_The_Nation:0 "Consolidate the Nation"
 RUS_Consolidate_The_Nation_desc:0 "All territories east of the Urals must all be consolidated under the Russian flag. We have finished off the beasts of Eurasia here in Siberia, but there are other Russian regions that must be brought under our flag. Serayarossiya, founded on the idea of creating a free Russian stat , must be runified with the Motherland, under one banner."
 RUS_Empower_The_Oblasts:0 "Empower the Oblasts"
 RUS_Empower_The_Oblasts_desc:0 "With many of the Oblasts and Krais still in a state of disorder and chaos, it would be wise to allow our subdivisions to allow them more control over their territories and grant them greater authority to handle issues within their own boundaries in order to allow the wider government to focus on more pressing matters, from handling insurgents to establishing nationwide goverment."
 RUS_Establish_The_Supreme_Court:0 "Establish the Supreme Court"
 RUS_Establish_The_Supreme_Court_desc:0 "With numerous Eurasian officers and generals being tried by the military in the aftermath of the war, the civilian side of things has been neglected, leading to crime to emerge in the civilian sector. We need to begin the process of restoring a civil justice system, one that doesn't require the military to handle 24/7. By restoring the Supreme Court and working our way down from there, we can begin the process of restoring law and order to our land whilst ensuring a strong civilian sector of governance."
 RUS_A_Revitalised_Russian_State:0 "A Revitalised Russian State"
 RUS_A_Revitalised_Russian_State_desc:0 "As the days go on, more and more of Russia awakens. Growing numbers of people attend church, people are becoming more social and willing converse with one another, and old traditions once thought lost are slowly regaining prominence across the nation. The road to recovery will be long, and it will likely take decades for the healing to complete, but we can be assured by this single truth.\n\n§YRussia is back.§!"
 RUS_Root_Out_Eurasian_Remnants:0 "Root Out Eurasian Remnants"
 RUS_Root_Out_Eurasian_Remnants_desc:0 "Though the Eurasian Resistance has largely been broken, there still lingers some scattered remnants clinging onto their ideologies, waging their lost war against us. If we are to restore stability, we must root out these scattered groups and crush militant loyalists wherever they emerge."
 RUS_Educate_The_Lower_Classes:0 "Educate the Lower Classes"
 RUS_Educate_The_Lower_Classes_desc:0 "As part of their system of control, the Neo-Bolshevik kept the lower classes of society uneducated and indoctrinated as to keep them under their thumb. Though this didn't prevent rebellion completely, the effects of this policy on the lower echelons of society can still be felt. Thus, if we wish to break the lingering indoctrination and bring those people up to speed, we begin dedicating resources toward educating these people."
 RUS_Implement_The_National_Reconstruction_Plan:0 "Implement the National Reconstruction Plan"
 RUS_Implement_The_National_Reconstruction_Plan_desc:0 "With the war for the independence of Russia completed, much of Siberia has been devastated by the conflict. Infrastructure has been ruined, homes broken and the industrial foundations battered. Though it will take time for living standards to not only be restored to pre-war levels but surpass it, we can begin now by implementing a reconstruction plan designed to swiftly restore essential Infrastructure and industries to get the nation back on track and smoothen the path towards total reconstruction and development."
 RUS_Moscow_In_Our_Sights:0 "Moscow In Our Sights"
 RUS_Moscow_In_Our_Sights_desc:0 "With Siberia secured and the Russian Federation formalised as a successor to the Russia of old, the time has come to shift our gaze toward the Mother city of Moscow. Eastern Europe, much like Siberia, had been consumed by chaos, war and revolution engulfing the region.\n\nWith Eastern Europe still weak, the time has come to strike West and reclaim our Western lands.\n\n§YLet us reunite the Motherland.§!"
 RUS.1.t:0 "Formation of the Provisional Government"
 RUS.1.desc:0 "Since the announcement of the replacement of all languages, including Russian, by the Eurasian Government, key groups and administrators throughout the Far East have had enough and have been working swiftly for what was to come. With the revolts occuring across Eurasia, the Russian Provisional Government headed by Vasily Shukshin has been established.\n\nThe aim is simple. To bring to an end the forces of Bolshevism that has plagued Russia since 1917 and much of Eurasia following the Atomic War and restore an independent Russian state, one that promotes Russian language and identity. Of course, the enemy will stand idle as we reclaim our lost past. They will fight back with fervor and fanaticism, lashing out like they have against the other rebellious peoples across Eurasia. But we must not falter. Russia is at a crossroads between destruction and freedom.\n\nIf Russia is to perish at the hands of Eurasia, then we will fight to death standing, not quivering on our knees."
 RUS.1.a:0 "Vstavay Rossiya!"
 RUS.2.t:0 "Formation of the General Staff"
 RUS.2.desc:0 "Shukshin was gathered in a room surrounded by the Minister of Defence, trusted Generals and need to know officials. With the war on and the Siberian Socialist State moving swiftly to answer the declaration of the Provisional Government, it became clear that the young government needed to prepare to act as well.\n\n\"So... I suspect you all have ideas on how to fight this?\" Shukshin asked after a while, leaning on the table and looking down at the map of Siberia, littered with troop placements and frontlines being drawn on.\n\n\"Yes, sir. The majority of generals believe that an offensive move against Siberia at this time would be ill advised. Frankly, they outnumber us and have more equipment\" General Anatoly Kulikov spoke up.\n\n\"We can't just sit around and wait for them\" Vasily asked, his gaze meeting the General.\n\n\"They'll strike at us, they're too sure of themselves to resist attacking first. That's why we'll hold the line. The terrain we hold, the forests and the mountains, they're advantageous to us defence wise. Siberia has numbers but not nearly enough to cause significant damage to our lines\" the Defence Minister, Igor Sergeyev, spoke up.\n\n\"We'll let them grind into us, throw their forces head first into the forests. Most of the troops they have, they're city dwellers. Novosibirsk, Sverdlovsk, Omsk. They may fight well in Urban areas or the plains, but they have no clue how to fight anywhere else without getting themselves killed\" General Nikolay Makarov added calmly.\n\nShukshin nodded a little in understanding, looking over the map once more before straightening up.\n\n\"Okay. We let them weaken themselves against our troops, then once they're disorganised enough, we strike\" Vasily summarised as he looked over the General."
 RUS.2.a:0 "\"Correct, Mr President\""
 RUS.3.t:0 "Operation: Permafrost"
 RUS.3.desc:0 "The frost of Siberia was not for the feint of heart. It was cold, and it was brutal. Many dangers lurked in the remote regions of the vast territory, travelling far on foot was ill advised the further North you went. Yet, Vadim and his troops were making their way North toward a town called Saskylakh deep in the Sahka territory. According to command, the town had been seized by Eurasian loyaltists and militants who continue to work the town to the bone and launch raids on other villages in the area.\n\n\"Fucking bastards had to wage their guerilla war in the snow. Fucking scoundels\" One of the men muttered, wrapping his winter coat around his form tighter as a gust of cold wind swept over them.\n\n\"Might just kill the lot of them for making us march through the snow\" Another soldier spoke up.\n\n\"We have our orders, boys. If they surrender, we take them in. For now, let's focus on the task at hand. The town is only 30 minutes away now. There are civilians in the area and I wouldn't be surprised if they tried to use them as human shields. We need to be careful\" Vadim spoke up, glancing behind him at the troops in his command.\n\n\"Human shields. How can we be careful when they're using people as meat shields?\" One of the soldiers asked incredulously.\n\nVadim sighed, rubbing the bridge of his nose with his gloved hand as he looked ahead once more."
 RUS.3.a:0 "\"We just have to try. That's all any of us can do.\""
 RUS.4.t:0 "Operation: Middleman"
 RUS.4.desc:0 "Pyotr stood stood by his trucked, parked on a dirt road surrounded by vast Steppe. He pulled out a cigerette, lighting it before taking a drag of it. Exhaling the smoke, he sighed as he looked up the road to see a truck making its way down the road toward him. Taking another drag, he quietly observed as the truck veered off the road and parked behind his truck. Dropping the cigerette and crushing it beneath his boot, he walked over to the other truck where a woman, Alexandrova, was climbing out.\n\n\"I'm surprised your government is willing to send us anything, considering the problems you already have\" Pyotr stated neutrally, getting the woman's attention.\n\n\"Yes, well... plenty of stockpiles near the border with East Asia. Plenty of guns and weapons, more than enough to support our kin on this side of the border\" Alexandrova explained lightly as she approached him.\n\n\"How kind of you. Having extra guns certainly won't hurt\" Pyotr remarked, glancing at her truck briefly before looking back at her.\n\n\"So, I just take your truck and you take mine?\"\n\n\"Yes, it'll save us having to move the equipment from one truck to the other. Everything is in the back in crates. Mostly guns, but there's plenty of other stuff packed in. Uniforms, helmets, grenades, and so on\" Alexandrova replied, reaching forward and planting the truck keys in his hands.\n\nPyotr nodded in understanding, wrapping his hand around her keys before reaching into his pocket and giving her his keys.\n\n\"Very well. I wish you and your side well in your efforts then. Pleasure doing business\" He spoke civilly with a small smile.\n\n\"Likewise. Take it easy out there\" Alexandrova replied, smiling back as she took his keys and made his way over to the truck, climbing inside and putting the key into the ignition. Pyotr stepped back, watching as she drove back up the road."
 RUS.4.a:0 "From Russia with love"
 RUS.5.t:0 "Formation of the Economic Development Council"
 RUS.5.desc:0 "\"Viktor, I'll get straight to the point, we need factories. Industry. Every resource we can get our hands on, we need\" Vasily began, arising from his desk and walking over to the window.\n\n\"Eurasia will not stand by and wait for us to be ready for war. When we defeat Siberia, any other surviving forces of Eurasia will no doubt come to try restore their control over our lands. If all the revolts across Eurasia fail and we're the last ones left standing, we have to be ready for that possibility\" Shukshin explained, looking out at the city of Irkutsk before returning his gaze to Viktor Zubkov, his Economic Minister.\n\n\"Of course. I've organised plenty of individuals and organisations that can help you get the resources you need. The Economic Development Council will stand by you. You have my word\" Zubkov replied, nodding in agreement with the Provisional President as he took a sip of his Vodka.\n\nVasily nodded, placing his hands on the back of his chair and leaning on it.\n\n\"Eurasia will be relentless. They will not allow us to build up in peace. There could be moments where the demands may seem greater than you can manage. Do you think you can handle such a task?\" Vasily inquired."
 RUS.5.a:0 "\"Vasily, when I'm done, Russia will be the most industrious nation on Earth.\""
 RUS.6.t:0 "Formation of the Cultural Recovery Committee"
 RUS.6.desc:0 "Vasily and Valentin stood before a painting of Fyodor Dostoevsky which hung above a lit fire place, one of the few remaining paintings of him left in Siberia. They had discovered this in one of the Eurasian Vaults in Irkutsk, belonging to a Inner Party member who held a personal collection of historical goods such as this.\n\n\"The Russian Identity has taken a considerable hit\" Vasily stated quietly, his gaze fixed on the painting.\n\n\"Indeed. We were the first to be subjected to Bolshevism... but if we can come back from it, we can show the world it's not too late to come back\" Valentin replied calmly, looking down at the fire.\n\nVasily nodded, exhaling as he looked down at the fire as well.\n\n\"Have you heard the rumours about Oceania?\" Valentin asked.\n\n\"Here and there. Something about the Americas. Who knows if its true. We have a hard enough time getting information about the other provinces of Eurasia, let alone the affairs of Oceania\" Vasily replied, turning to look at Valentin.\n\n\"Indeed. But still... it's motivating to know that we aren't the only ones fighting this. That there are other people's out there just as conscious as ours\" Valentin mused.\n\nShukshin nodded, humming in agreement as he returned his gaze to the painting."
 RUS.6.a:0 "\"Let us hope their resolve is stronger\""
 RUS.7.t:0 "Status of the Ethnic Republics"
 RUS.7.desc:0 "It was a cold morning in the city of Yakutsk which tended to be the norm for a city this far north in the harsh lands of Siberia. That didn't stop it from being an interesting day. When the ASSRs joined the Provisional Government in revolt, questions were swift to arise over their place within Russia when the dust settled.\n\nIndependence?\nAutonomy?\nIntegration?\nAs Aysen made his way down the snowy streets of his home city, he looked around and noticed the Russian Flag being hoist up alongside the flag of the Sakha Republic. There was an air of caution amongst the people, the news of the Yakut's people new status within Russia having caused a stir. Whilst it was generally accepted that the Yakut people would be integrated back into Russia, there were still fears over their future. Things hadn't exactly been fruitful under the rule of Eurasia, the Union State having left a considerable mark on Yakutsk and the rest of the Yakut heartland. Whist most didn't believe that the Provisional Government had any ill intent, there was still that uncertainty that existed. Just because they were good now, didn't mean they would always stay that way.\n\nAysen let out a small sigh, steeling himself as he continued down the street. Regardless, there was still a war to fight. They could worry about the future another time."
 RUS.7.a:0 "\"At least we've got autonomy\""
 RUS.8.t:0 "Dancing in Okhlopkov"
 RUS.8.desc:0 "Anastasia watched the ballet performance with a small smile, her eyes analysing the dancer, a man and a woman, dancing together before the crowd, their movements a flow of smooth movements and grace. The Okhlopkov Theater had been run down for some time up until recently, the theater having been ordered restored by the Provisional Government for the purposes of promoting Russian plays, dances, and culture to the residents of Irkutsk, all part of the wider effort of cultural recovery.\n\nAnastasia sighed softly, feeling a sense of contentment for the first time in a very long time as she watched the dancers dance, allowing herself the time to relax and let her worries fade away. She knew it wouldn't always last, moments of peace like this. There was still a struggle going on for the future of Russia, battles being fought across the frozen wastes. But that was why they should fight right? So that all Russia could enjoy and cherish the moments of peace when they came, such as right now, within the secluded walls of the historic theater."
 RUS.8.a:0 "They've got moves!"
 RUS.9.t:0 "The Truth"
 RUS.9.desc:0 "Vasily sat before the microphone, the words written out on the paper in his hands as he prepared to speak to the nation. Vasily inhaled, composing himself before slowly exhaling as the red light came on, signalling he was live.\n\n\"People of Russia. I am here before you to expose a truth that Eurasia has long suppressed. The truth of the late Tsar Nicholas\" Vasily began evenly.\n\n\"For years, you have been told that he was a monster. An evil who sought to hurt you, subjegate you. To ruin your lives. But the truth is, the Tsar and his family was murdered long ago. He isn't lurking in the shadows. He was killed many long decades ago\" Vasily spoke, taking a moment to pause before continuing.\n\n\"His life was used to fuel your fears and to ensure your obedience. The Tsar was not an evil man. He made mistakes. He tried to do what he thought was best, even if it wasn't perfect. He was not a perfect man, but he was a man nonetheless.\""
 RUS.9.a:0 "\"He was Human, like all of us\""
 RUS.10.t:0 "Rehabilitation"
 RUS.10.desc:0 "\"So tell me about what your childhood was like?\" Abrasha asked calmly, a pen and a notepad in his hand as he gazed upon the young man laying on the couch.\n\n\"I... grew up on a farm with my mother and father for some time... I don't remember much about them, they were taken away for crimes against the state. I believe they were called Kulaks, a... rich peasant or something like that\" Kolya, a Eurasian soldier who had surrendered himself to the Russian Forces, spoke quietly as he looked at his hands.\n\n\"And what happened to you?\" Abrasha asked softly, his gaze never leaving Kolya.\n\n\"The... state took me away. I was put into an orphanage where I grew up... it uh... wasn't easy, being around so many different children... the farm was quiet and the orphanage was loud and chaotic\" Kolya answered, sitting up and leaning on his side against the back of the couch.\n\nAbrasha nodded, jotting down some notes before exhaling.\n\n\"You joined the Red Army when you became a young man, correct?\"\n\n\"Yeah... wasn't many other opportunities for me so the army is where I went. I fought in the Atomic War, for a little while anyway... then all the changes began, Stalin died and... someone else took power, Beria I think... thing's became a lot more secreative after that\" Kolya explained, sitting his legs over and sitting up right, leaning his forearms on his knees.\n\n\"Sounds like a confusing time to live in\" Abrasha replied sympathetically.\n\n\"Yeah... the age of smoke and mirrors... that's what I like to call it anyway... it's been a long time since I've been some place where there haven't been truths smothered by lies\" Kolya stated, letting out a dry chuckle as he glanced up at the wall behind the therapist, where the flag of Russia could be seen hanging on the wall."
 RUS.10.a:0 "\"But for once, I think that era is finally ending\""
 RUS.11.t:0 "Novosibirsk Victory March"
 RUS.11.desc:0 "In the heart of the newly named Victory Square in Novosibirsk, soldiers marched shoulder to shoulder, moving with discipline and well practised precision as they marched step by step. Tanks and various other military vehicles and equipment rolled along as well, the march structured by formation and machine, a display of the power and strength of newly liberated Russia.\n\nVasily watched from his stage, surrounded by other members of government, military, and honoured guests of the war, mainly vertains. He smiled a little, enjoying the sight and the sound of music as the band played songs deticated to the military, songs that were made during the war as well as other songs from the Imperial era that were recovered. After all this time, Russia was finally back, not as some 'autonomy' or reduced to a mere province, but a free state once more with its own destiny, it's own right to exist earned through blood and sacrifice.\n\nVasily inhaled slowly before exhaling, the smile on his face holding as his eyes continued to watch the victory celebrations."
 RUS.11.a:0 "Victory belongs to Russia"
 RUS.12.t:0 "The Future of Russia"
 RUS.12.desc:0 "Shukshin sighed, rubbing the bridge of his nose as he leaned back in his chair. At the table he sat at, he was gathered by generals, politicians, dipolats and other parts of the Provisional Government. All voices that forged the government and lead the uprising, now convened to create a permanent that would govern Russia for many years to come, hopefully long after all in the room have passed.\n\n\"So, we're clear that we're bringing back a Duma, but what about the powers of the President? How much power should the executive branch have over government?\" Rasputin asked, glancing around at the other members of the room.\n\n\"Tough question. We can't have the executive be too strong, but not too weak either\" General Kulikov mused, his hand on his chin in thought.\n\n\"How much power should the Duma have over the executive? Which is more powerful?\" Viktor Subkov asked out loud, thoughtfully.\n\n\"I mean, I suppose the Duma should ideally have more power, but how will that work? How much of the Duma should agree on something to override the President?\" Vysotsky asked, speaking up.\n\n\"Should it just be the Duma? What of the National Security Council, should they weigh on as well?\" General Barsukov asked, spinning in his chair to look around at the others.\n\nVasily listened intently as they all asked questions, discussed solutions, and debated on how the government should work among many other things."
 RUS.12.a:0 "A much needed discussion, despite the chaos"
 RUS.13.t:0 "Russia's New House"
 RUS.13.desc:0 "Vasily walked along Valentin, wrapped up in his coat as he looked upon the Novosibirsk Administrative Building, once a major center of power in Central Siberia, now being renovated to serve as the seat of the State Duma.\n\n\"Looks good so far\" Vasily stated as he watched the construction take place.\n\n\"Agreed. It's no Kremlin or Winter Palace, but it will get the job done, at least for now\" Valentin replied, coming to a stop to look at the building before them, Vasily stopping as well.\n\n\"Strange to think about our lives before. Just administrators... low level officials... how far we have come\" Vasily mused with a small smile.\n\n\"Indeed. Now look at what we have to show for it\" Valentin replied lightly, gesturing to the building before them, earning a small chuckle from Vasily.\n\n\"Not a bad prize\" Vasily replied lightly, looking at Valentin."
 RUS.13.a:0 " Humble beginnings"
 RUS.14.t:0 "Presidential Address"
 RUS.14.desc:0 "Vasily sat before the microphone, something he was growing used to at this point. Having his script neatly in front of him, his eyes looked over the paper for a moment before flicking his gaze to the microphone right as the red light turned on.\n\n\"People of Russia. This is your President speaking to you all today to tell you about developments occuring in the Russian Government. As some of you may know, the State Duma has recently convened. With new deputies elected thanks to all of you, the process of governing the Russian Federation has begun. I wanted to thank all of you, people of Russia, for your patience and your trust as we move toward stablising and rebuilding our society. We've had a lot thrown at us as a people. We almost lost ourselves to Eurasia, and though there still exist remnants out there who will no doubt seek to disrupt our way of life. We must hold steady and be resiliant to all threats to Russia. There can be no room for compromise, no space for indecision. We've taken our nation back and now we must protect it at all cost. No matter what is thrown at us, no matter who or what may come to threaten our heartland, we must never falter. This is our country. Our homeland. And we must never let it fall to anyone else ever again.\""
 RUS.14.a:0 "\"Slava Rossiya\""
 RUS.15.t:0 "Battle of Norilsk"
 RUS.15.desc:0 "\"I'm getting sick of this fucking snow\" Maxim complained, rubbing his hands together rapidly as they moved around the perimeter of the mine.\n\nThe army had arrived in Norilsk after reports of Eurasian remnants had gathered in the city and attempted to occupy. To make a long story short, it failed and the remnants had retreated into the mines, hiding out in the tunnels which they've made into their own fortress. Storming the tunnels was out of the question, the prospect too risky.\n\n\"Tell me about it. The cold comes and these fuckers decided to camp out in the minds\" Vadim replied flatly, glaring down at the massive strip mine they had been patrolling around for weeks now.\n\n\"Think they'll come out soon?\" Maxim asked as they glanced down at one of the tunnels down the hole, the entrance dark yet containing danger within.\n\n\"Nah, they'll likely starve themselves before they willingly come out. fanatic fucks will probably start eating each other before they submit to us\" Vadim remarked grimly, nodding toward a police officer as he passed by, who was drapped head to toe in winter gear.\n\n\"Those guys still down there?\" The officer asked neutrally as he passed.\n\n\"What do you think?\" Maxim asked rhetorically, irritation in his voice.\n\nThe officer just threw up his hands in response.\n\n\"Right. Dumb question. Just try stay warm, alright?\" The officer replied as he continued on walking.\n\nVadim sighed, stopping and looking down at the mine once more."
 RUS.15.a:0 "\"Just another day in frozen paradise.\""
 RUS.16.t:0 "Dreams of Europe"
 RUS.16.desc:0 "The Ural wall, constructed in recent years in preparation for the war with Eastern Europe, was an impressive and vast fortification, infusing the already towering and imposing Ural Mountains with vast networks of fortifications and bunkers. Fyodor patrolled around one of the anti-air encampments, it's position offering a good view of the plains of Eastern Europe that lay beyond the mountains. He let out a small breath, the air he exhaled white and frosty. It was intimidating to be so close to the boundaries of the enemy, to see it all before him in such splendour.\n\nThe prospect of marching west was an intimidating one. Eastern Europe had more factories, more people, more everything. Fyodor knows the Federation aimed to strike west whilst the West was still weak from its own rebellions, but that didn't make the future any less terrifying. But there wasn't much choice. Whoever took control of Kapitalgrad, whether that be the old Regime, Gumilyov, or some other rebel group, they would inevitably strike east toward Siberia to enact their own ambitions.\n\nThe clock was ticking. Russia yearned for unification, and it would only be a matter of time before the question would need to be answered one way or another."
 RUS.16.a:0 "The Russian bear looks west"
 RUS_border_war.1.t:0 "Russian Victory"
 RUS_border_war.1.desc:0 "Our troops in Primorsky are victorious! The East Asian horde has been repelled, and Primorsky Krai and the city of Vladivostok have been reclaimed for the Russian people"
 RUS_border_war.2.t:0 "East Asian Victory"
 RUS_border_war.2.desc:0 ""
 RUS_border_war.1.a:0 "Haishenwai, now and forever."