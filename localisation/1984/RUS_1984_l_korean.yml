 RUS_Executive_Orders_decision_category:0 "Presidential Executive Orders"
 RUS_Executive_Orders_decision_category_desc:0 "As Commander-In-Chief of the Russian Armed Forces and the highest representative of the Russian people and state, it is the role of the President to push back against all aggressive elements threatening Russia and to restore the full independence of the Russian state from the terror that began long ago in 1917.\n\nThrough use of Presidential Executive Powers, the President has the ability to authorise military operations and fast track civilian projects with the full backing and support of the Russian Government.\n\nFrom Kamchatka to the Barents Sea, from Sevastopol to Norilsk, the Motherland will be free once more."
