 RUS_Arise_Russia:0 "Arise, Russia!"
 RUS_Arise_Russia_desc:0 "\n\n\n\n£GFX_RUS_Arise_Russia_Banner\n\n\n\n\n\n\n§WEver since 1917, Russia has long been a broken nation. Trapped in a slumber, comatose by the Red Banners and anti-Human forces, never to awaken again, doomed to fade away into the gentle night.\n\nNever again.\n\nIn the face of its destruction, the great bear has awoken once more. Not since the time of the Great Patriotic War has Russia been threatened with such destruction. No more shall we toil in the dark, awaiting the cold embrace of death. We will stand our ground and shout out with all the strength the Lord Christ can grant, \"We are not Eurasian, We are Russian!\".\n\nThe skies will burn. Homes will be broken and many sons will perish, but it is a price that must be paid. We will fight for our right to exist, even if we have to fight the entire world.§!"
 RUS_Everything_Towards_Liberation:0 "Everything Towards Liberation"
 RUS_Everything_Towards_Liberation_desc:0 "\n\n\n\n£GFX_RUS_Everything_Towards_Liberation_Banner\n\n\n\n\n\n\n§WA great struggle lies ahead of us, though unlike the Eurasia, there exists an end goal in sight. No more lies or fears, there is only one objective. The Liberation of all Russia from the tyranny of so call 'Eurasia'. It will not be an easy task and much will be demanded of all peoples, from Siberia to Iberia, in order to vanquish this great foe. The price is high but it is a price we shall willing pay.\n\nWe will win this damn war, or die trying.§!"
 RUS_Neo_Bolshevik_Remnants:0 "Neo-Bolshevik Resistance"
 RUS_Neo_Bolshevik_Remnants_desc:0 "\n\n\n\n£GFX_RUS_Neo_Bolshevik_Remnants_Banner\n\n\n\n\n\n\n§WThe battle for Russia isn't just a fight for freedom but for the soul of our nation. For many years, our people have been inflicted with the virus of Eurasianism, and unfortunately for many, they have developed Stockholm Syndrome, seeking to fight for the State that hates them and everything their forefathers had fought to build. It will take some time and great effort to break Eurasia's hold on these people and restore the Humanity and dignity that was stolen away from them.§!"
 RUS_Neo_Bolshevik_Remnants_Two:0 "Neo-Bolshevik Resistance"
 RUS_Neo_Bolshevik_Remnants_Two_desc:0 "\n\n\n\n£GFX_RUS_Neo_Bolshevik_Remnants_Banner\n\n\n\n\n\n\n§WThe battle for Russia isn't just a fight for freedom but for the soul of our nation. For many years, our people have been inflicted with the virus of Eurasianism, and unfortunately for many, they have developed Stockholm Syndrome, seeking to fight for the State that hates them and everything their forefathers had fought to build. It will take some time and great effort to break Eurasia's hold on these people and restore the Humanity and dignity that was stolen away from them.§!"
