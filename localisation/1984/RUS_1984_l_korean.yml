l_korean:
 RUS_country_selection_tt:0 "§YHOW TO PLAY THE SIBERIAN PROVISIONAL GOVERNMENT\n-----------------------------------------§!\nPlay as the §RUnion of Eurasian Socialist Republics§!, play through content until the province breakdown prior to the revolts occurs. When this occurs, open the decision menu and scroll down to the §Y'Legacy of Nations'§! decision menu and click the decision to switch to the §YSiberian Socialist State§!\n\nWait until the event to switch to the §GSiberian Provisional Government§! pops up."
 1984_Opening_Screen_RUS_Title_TT:0 "§GSIBERIAN PROVISIONAL GOVERNMENT§!"
 1984_Opening_Screen_RUS_Desc_TT:0 "When the government in Kapitalgrad made the decision to follow in the footsteps of the government in Oceania by implementing a new language, a Eurasian language that held a similiar principle to §QNewspeak§! in Oceania, many nations were outraged by this new objective.\n\nBut none were more furious than the Russian People, the founding people of the old §RUSSR§!, who had fought to create the regime that exists now. Civilians, administrators, generals, all uniting in their disgruntlement toward what had been occuring in Kapitalgrad and what had once been European Russia. As revolutions and revolts sweep across Eurasia, the Russians were no exception. Under the guidance of party administrator turned leader of the Russian people in Siberia, §GVasily Shukshin§!, the new Russian nation has emerged in the frozen lands of §GSiberia§!.\n\nThe journey ahead will be filled with conflict and hardship, with many likely perishing in the objective to forge a free Russia. But in the end, whether it be tomorrow or many years in the future, the provisional government will fight for a free Russian State.\n\n§RAnd Russia will triumph.§!"
 1984_Opening_Screen_RUS_Gameplay_Paths_Desc_TT:0 "§YRussian Paths§!\n- March from the eastern icy shores of the §mFar East§! to the heartland of §GRussia!§!\n-Vanquish the opposition governments and reunite Russia under the banner of the §QRussian Federation!§!"
