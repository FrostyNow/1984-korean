 FLR_Scavenge_Naval_Anchor_Alpha_decision:0 "Scavenge §DNaval Anchor Alpha§!"
 FLR_Americas_Destiny_decision_category:0 "America's Destiny"
 FLR_Americas_Destiny_decision_category_desc:0 "With Peninsula One vanquished, we can now turn our gaze from Florida to beyond. The rest of the American Continent has awoken and have waged a campaign of independence from the rule of the Thirteen Sectors and its vast forces of indoctrinated troops. With Florida free, the time has come for us to join in shaping America's destiny in the wake of Oceania's destruction.\n\nIt's time for Florida to join in that great struggle and to contribute to the freedom of every American from the forces of Big Brother, if not to play the part of heroes on the continent, then to ensure that all threats to Florida are removed from the immediate future.\n\n§RBetter to fight them out there than risk them coming here.§!"
