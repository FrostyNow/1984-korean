l_korean:
 FLR_country_selection_tt:0 "§YHOW TO PLAY THE REBEL ARMY OF FLORIDA\n-----------------------------------------§!\nPlay as the §gEnglish Socialist States of Oceania§!, play through content until the province breakdown prior to the §RAnti-Revolution§! occurs. When this occurs, open the decision menu and scroll down to the §Y'Whispers of Nations'§! decision menu and click the decision to switch to §YPeninsula One.§!\n\nGo through the focus tree until the event to to switch to the §cRebel Army of Florida§! pops up."
 1984_Opening_Screen_FLR_Title_TT:0 "§CREBEL ARMY OF FLORIDA§!"
 1984_Opening_Screen_FLR_Desc_TT:0 "When the remnants of the American Army fled westward toward the Rocky Mountains to regroup and continue the fight, there were those left behind in the east, cut off from the newly formed §mSecond Continental Army§! and left to fend for themselves. The shattered remains of the South Army split up. One, under the command of §RGeneral Smedley Butler§! fled into the §nAppalachian Mountains§!, whilst the remaining contingent, under the command of §CBilly Waugh§! of the §Y5th Special Forces Group§! went further south toward §CFlorida§!.\n\nHiding out in the forest and the swamps of the state, Billy made it his mission to be a painful headache for the administrator of Peninsula One, §YSoloman§!. After years of raiding, sabotage and constant guerilla warfare, the emergence of resistance groups, partisans and revolts across Oceania has presented a unique opportunity for Billy and his Rebel Army.\n\nWith the rest of Oceania too distracted with their own problems to care about an insurgency in Florida, the time has finally come to emerge from the forests and the swamps of Florida and reclaim the State of Florida from Soloman and his army."
 1984_Opening_Screen_FLR_Gameplay_Paths_Desc_TT:0 "§YFloridan Paths§!\n- Crush Peninsula One and end the reign of §YSoloman§! for good\n- Join the war to end Oceanian rule over §GNorth America§! and reunite the §mUnited States of America§! §YOR§! allign with the §mSecond Continental Army.§!"
 1984_Opening_Screen_FLR_Button_TT:0 "Swamp Fever"
 FLR_EXECUTIVE_ACTION_FLAG:0 "§YExecutive Action Taken§!"
 FLR_Florida_Liberation_War_decision_category:0 "Florida Liberation War"
 FLR_Florida_Liberation_War_decision_category_desc:0 "After many years of resistance in the swamps & marches of the Everglades and the forests & towns of Northern Florida, our forces have taken advantage of the chaos of the §YSecond American Revolution§! that has spread across the Thirteen Sectors to wage a direct war of independence against Peininsula One.\n\nWe fight for the land of Florida, a region that has endured decimation of identity, our land and cities being renamed to suit Big Brother and Soloman. Our people have been sidelined, our resources plundered and taken advantage of in order to bolster the secretive Orbit Initatitive, a project based in Cape Canaveral that, according to our intel, is the culmination of everything the Rocket Program of Peninsula One has been working toward.\n\n§RWhatever the goal of the initatitive is, it is clear that it must be stopped at all costs.§!"
 FLR_Declare_Florida_Liberated:0 "Declare Florida §GLiberated!§!"
 FLR_Operation_Sunburn_decision:0 "Operation: §YSUNBURN§!"
 FLR_Defend_The_North:0 "Defend the North"
