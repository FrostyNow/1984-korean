 FLR_Unleashed_The_Crazies:0 "Unleashed the Crazies"
 FLR_Florida_Or_Bust:0 "Florida Or Bust!"
 FLR_Florida_Or_Bust_desc:0 "From the depths of the swamps and the forests, we have emerged to cast off Oceania and restore authority of the State of Florida back to the wider population. Soloman and his forces will not give up easily, and will seek to bring the entirity of Florida under his thumb once more. We must be careful, yet bold if we are to see the land of Sunshine free once more."
 FLR_Continental_Overtures:0 "Continental Overtures"
 FLR_Continental_Overtures_desc:0 "Whilst we're quite distant from the bulk of the revolutions and uprisings taking place out west against the Thirteen Sectors, there is certainly no harm in reaching out, establishing connections with the Continental Regime in Jackson and exchanging information regarding the mutual threat we face in the forces of Oceania.\n\nIt's better to have friends in the aftermath of warefare than to stand alone among the ashes."
 FLR_Titan_Of_The_East:0 "Titan of the East"
 FLR_Titan_Of_The_East_desc:0 "Florida stands as one of the more powerful, populated regions of the eastern former United States and it's geography grants us a unique position to bottle neck the enemy and hold the line for as long as it takes. With our war against Peninsula One underway and the threat of the Thirteen Sectors still looming over us, it is imperative that Florida has all the industrial and military facilities needed to not only sustain the war effort, but allow it to be part of the wave that sweeps away Oceania from the United States of America once and for all."
 FLR_Unearth_Old_World_Research:0 "Unearth Old World Research"
 FLR_Unearth_Old_World_Research_desc:0 "With the war for Florida igniting to new heights, and the threat of the Thirteen Sectors still ever present, it is more important than ever that we kick start our research sector so that we can start gaining an edge over our enemies.\n\nLuckily for us, Soloman has archives and hidden libraries all over the state, containing documents, blue prints and old world research once thought lost forever.\n\nI'm sure he won't mind us cracking open those vaults and studying whatever's inside."
 FLR_Operation_Sunburn:0 "Operation: SUNBURN"
 FLR_Operation_Sunburn_desc:0 "It's time to take the fight to our enemies. We can't just sit in the swamps and the forests, our goals need to be bigger. More ambitions. Towns, cities, urban sprawl, all containing the people and resources needed to win. Luckily, we've kept a stockpile of Naplam just for this occasion. Unforunately, it's limited and once it's used up, it's used up. But we can use it to throw off our enemies and seize settlements and strategic positions from the enemy in addition to doing some damage."
 FLR_Swamp_Fever:0 "Swamp Fever"
 FLR_Swamp_Fever_desc:0 "We are the ones who dominate the swamps. We've mastered the Everglades, tamed it, made it our fortress against Soloman and Big Brother. Now it is time to use all we have learned to repel Oceanian troops not just in the Everglades and the forests but from all of Oceania. No stone will be left unturn, nowhere will be safe for them.\n\nThis is our moment, and we will not fail."
 FLR_Expand_Resource_Extraction:0 "Expand Resource Extraction"
 FLR_Expand_Resource_Extraction_desc:0 "If our rebel army is to be victorious in this conflict, it's not just men and factories we need at our disposal but resources. Steel. Oil. Anything and everything we need to sustain the war effort and to produce the goods we need to fight. Luckily, the areas within our control also contain within them deposits of minerals and liquid gold that we can exploit to fuel our rebellion against Peninsula One and allow us to secure the final victory against Soloman and Big Brother."
 FLR_Unleash_The_Crazies:0 "Unleash the Crazies"
 FLR_Unleash_The_Crazies_desc:0 "Florida is full of crazy people who like to do crazy things without much regard for their own well being.\n\nLet's use them."
 FLR_Comeuppance:0 "Comeuppance"
 FLR_Comeuppance_desc:0 "It's time to finish off Soloman and his forces once and for all. There can be no more retreat, no more respite, no hesitation. Florida will be free once again, Peninsula One will finally get their comeuppance!"
 FLR_war.1.t:0 "Arise, Sons of Florida"
 FLR_war.1.desc:0 "\"After years of lurking in the swamps and the forests of Florida, fighting a ceaseless guerilla war against the enemy, the weakness of Oceania has granted us the opportunity to tear down Soloman and the rest of Peninsula One\" Billy spoke to his troops, his bearded face looking to each of them.\n\n\"I know it's been a long journey. For some of you, the fights been going on for decades. Hell, it's all we know. But the final stretch is coming. Peninsula One is isolated and on its own, they're gonna have to fight us man to man. We've fought this long, gentlemen. Let's get this done\" Billy finished, his speeches short and to the joint as they always were, clasping his hands together as the soldiers and officers all raised their weapons in unison."
 FLR_war.1.a:0 "\"Sir! Yes, sir! Urah!\""
 FLR_war.2.t:0 "Light 'em Up!"
 FLR_war.2.desc:0 "Dale looked through the binoculars on his chair, waiting casually for the Oceanian patrol to arrived on the main road.\n\n\"So, Chef. What are we cooking tonight?\" Ernie asked as he waltzed over, carrying a sniper rifle in his hand as he sat on the chair beside Dale.\n\n\"We're having a roast. Oceanian troopers with a hint of Napalm\" Dale quipped, smirking as he took a sip of his beer, waiting patiently for the patrol.\n\n\"Ah, the good stuff\" Ernie replied humourously, leaning back as he saw the Oceanian troops come into troops.\n\n\"Ah, here comes the main ingredient\" Dale said eagerly, pulling out the detonator as he waited for the Oceanian Squad to get into position.\n\n\"Wait... wait... and... BOOM!\" Ernie exclaimed as Dale activated the Napalm bombs, the Oceanian soldiers swiftly engulfed by flame before they could even react."
 FLR_war.2.a:0 "\"Cooked well done\""
 FLR_war.3.t:0 "The Everglade Butchers"
 FLR_war.3.desc:0 "Kent was deep in the swamp water, his eyes above water as his gaze remained fixed on the Oceanians ahead. It was a supply truck, guarded by soldiers, all moving toward a bridge up ahead. Kent's gaze narrowed, his head fully out of the water as he brought a walkie talkie to his mouth.\n\n\"They're coming. Drop the tree\"\n\nThe rebel soldiers near the bridge all moved swiftly, drawing their axes and bringing it upon the partially cut tree, cutting into it more before pushing it down, falling on the road right in front of the truck which was now stuck on the bridge. The soldiers climbed out, approaching the tree in confusion as they carried their weapons.\n\n\"What the hell is going on?\" The commanding officer asked out loud in frustration.\n\n\"Hey, boys\" A voice spoke, getting the attention of the soldiers who saw a man with a camera standing there, flanked by rebels carrying weapons.\n\n\"Smile for the camera for me, will ya?\" The man spoke lightly, taking a picture, the flash blinding them for a moment before the rebels opened fire, eviserating the Oceanian troops before they could raise their weapons."
 FLR_war.3.a:0 "Hope he got their good sides."
 FLR_war.4.t:0 "It's Lonely Out in Space"
 FLR_war.4.desc:0 "Alex floated around in the Orbit Station above ground, an anxious look on his face as he floated over to the com station. It had been dead silent the past few days, all communications from the surface having gone silent. Alex had tried reaching out to them for days now, trying to reach Surface Command, Cape Canaveral, anyone. But still, it remained silent.\n\nBut Alex refused to give up. Pressing the button, once more he tried to contact Surface Command.\n\n\"Surface Command, this is Alex. Come in\" he spoke.\n\n1 minute. 2 minutes. 3 minutes.\n\n\"This is Alex Greene of Orbit Station, is there anyone out there?\" Alex asked his voice becoming more desperate, his jaw clenching.\n\n1 minute. 2 minutes. 3 minutes.\"Is there anyone out there!? Hello!\" Alex screamed into the microphone, the silence and isolation becoming increasingly overbearing.\n\n1 minute. 2 minutes. 3 minutes."
 FLR_war.4.a:0 "And like the void, all was quiet. Perhaps forever"
 FLR_decision.1.t:0 "A New State Capital"
 FLR_decision.1.desc:0 "With the state of Florida now secured, the future of this state and it's new administration must be discussed, namely the capital. Whilst there are those who have argued that the capital of should return to Tallahasse, the historic capital of the State, there have been arguments that other cities, primarily Orlando and Miami, should have a shot at becoming the new capital. Orlando is much more central and thus, practical in terms of administering the state whilst Miami is the most populous city of the state and is in close proximity to other notable population zones such as Fort Lauderdale and West Palm Beach.\n\nWith the ruling council divided over the issue, the decision has fallen into the hands of Billy Waugh."
 FLR_decision.1.a:0 "The old capital, Tallahasse"
 FLR_decision.1.b:0 "Oceania had the right idea about Orlando"
 FLR_decision.1.c:0 "Miami, the biggest city"
 FLR_decision.2.t:0 "A Letter from Florida"
 FLR_decision.2.desc:0 "TODO"
 FLR_decision.2.a:0 "To Florida we go!"
 FLR_decision.2.b:0 "We have our own problems"
 FLR_decision.3.t:0 "Liberia Accepts!"
 FLR_decision.3.desc:0 "After much deliberation from the Liberian government, they have agreed to support our war effort against Oceania by sending volunteers, exiles and Americo-Liberians alike, to join in the fight and help reclaim the Floridan Peninsula in the name of freedom and the destruction of Oligarchal Collectivism.\n\nThough the Atlantic divides us, the common cause of freedom against tyranny unites us all!"
 FLR_decision.3.a:0 "Friends abroad!"
 FLR_decision.4.t:0 "Liberia Refuses!"
 FLR_decision.4.desc:0 "Despite our best efforts to try gain support for our cause, the Liberian government have expressed their reluctance in directly supporting our cause beyond diplomacy, citing their own issues back home in Africa.\n\nThough an unforunate outcome, some exiles living in Liberia have agreed to come to Florida to enlist in the war effort in Liberia. It's not what we hoped for, but in a situation like this, beggars certainly can't be choosers."
 FLR_decision.4.a:0 "It'll have to do"
 FLR_decision.5.t:0 "America's Destiny"
 FLR_decision.5.desc:0 "With the continental former United States of America now united under one banner, our banner, it is time to decide the future of our nation. Shall we continue on as the Commonwealth of America? Or shall we take on a new identity to represent the newly unified nation."
 FLR_decision.5.a:0 "Commonwealth of America"
 FLR_decision.5.b:0 "United States of America"