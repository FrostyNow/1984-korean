 EEU_Eastern_Europe_Desc_tt:0 "The capital province of Eurasia and home to Eurasia's largest city, Kapitalgrad, Eastern Europe is the industrial and political heart of Eurasia. It was from here that early Bolshevism took root, forging the Soviet Union, a nation that would go on to lay the foundations of what would become the Eurasian Union State."
