 EEU_revolt.3.t:0 "The Stalingrad Coup"
 EEU_revolt.3.desc:0 "Field Marshal Yazov, who had been assigned to assist in the governing of the Kuban Military District years ago, has recently shown his true colours. Taking a portion of the Army Garrison in the region, he has overthrown the regional administration of Stalingrad and has declared the true successorship to the Communist Regime, stating that the Eurasian Union State has lost its way and has became an enemy to the people and the revolution.\n\nThis treachery and blantant falsities that he as spewed out will not go unpunished. He has struck Eurasia at a difficult time, selfishly subsuming power for his own gain.\n\nHe will be made an example of. They all will."
 EEU_revolt.3.a:0 "Yazov's defection will not go unpunished"
 EEU_revolt.3.b:0 "Eurasia has lost its way, long live the Soviets!"
 EEU_revolt.4.t:0 "Caucasian Revolt"
