l_korean:
 ZAP_United:0 "Popular Republic of Mexico"
 ZAP_United_DEF:0 "The Popular Republic of Mexico"
 ZAP_United_ADJ:0 "Mexican"
 ZAP_Red_Tidal_Wave:0 "Red Tidal Wave"
 ZAP_Red_Tidal_Wave_desc:0 "\n\n\n\n£GFX_MEX_Red_Tidal_Wave_Banner\n\n\n\n\n\n\n§WThe true revolution of socialism as envisioned by Marx and Engels will come and it will be Mexico that leads the charge alongside the nations of Latin America who stand together in common belief and cause against the true enemy of the people, Oceania.\n\nWe will come like a great red wave, sweeping away the false revolution of INGSOC and bring about a state worthy of the title Socialist.§!"
 ZAP_March_Of_The_Red_Aztecs:0 "March of the Red Aztecs"
 ZAP_March_Of_The_Red_Aztecs_desc:0 "\n\n\n\n£GFX_MEX_March_Of_The_Red_Aztecs_Banner\n\n\n\n\n\n\n§WAs the Aztecs had brought Mexico under their rule before the coming of the Spanish Empire, so too shall the Zapatistas of Mexico unify the homeland under our rule.\n\nWe have waged this war of resistance for many long decades now, blood has been shed and lessons have been learned time and time again. We will not buckle or falter, we will wipe out Oceania not just in Mexico but eject them from the Americas all together!§!"
 ZAP_Divided_Linguistics:0 "Divided Linguistics"
 ZAP_Divided_Linguistics_desc:0 "\n\n\n\n£GFX_MEX_Divided_Linguistics_Banner\n\n\n\n\n\n\n§WMexico has been subject to the lingusitic conversion efforts of Oceania, phasing out the Spanish tongue in order to bring about simplified English, otherwise known as Newspeak. Though many across Mexico still remember the old tongue, many of them capable of speaking both, the linguistic damage caused to Mexico has been done and will take some time to heal fully.§!"