l_korean:
 FRA_country_selection_tt:0 "§YHOW TO PLAY THE FRENCH REVOLUTIONARY ARMY\n-----------------------------------------§!\nPlay as the §RUnion of Eurasian Socialist Republics§!, play through content until the province breakdown prior to the revolts occurs. When this occurs, open the decision menu and scroll down to the §Y'Legacy of Nations'§! decision menu and click the decision to switch to the §YWestern European Socialist Republic§!\n\nThen wait until the event to switch to the §RFrench Revolutionary Army§! pops up."
 1984_Opening_Screen_FRA_Title_TT:0 "§RFRENCH REVOLUTIONARY REPUBLIC§!"
 1984_Opening_Screen_FRA_Desc_TT:0 "When §ROperation: Unthinkable§! blew up in the faces of the §mWestern Allies§!, it was those on Continental Europe that fell to the Soviet onslaught, with the fall of France marking the total dominion of the Soviet Union, later Eurasia, over all of Europe. Though the §zFrench Government§!, whom had barely been back in control of France following the end of World War Two, were once more forced to flee to the §YAfrican colonies§! for a much more extended exile, the §RFrench people§! were left behind to struggle and survive on their own against an enemy that ruled an continent.\n\nFor many long years, partisan groups and resistance movements, though long surpressed by our new overlords, slowly organised and built up their numbers. In the catacombs and in the slums, we gathered. And when news of Beria's death came, we prepared. And when news came of §REurasia's Civil War§!, we struck.\n\nWith revolutionary zeal in our hearts, the French Resistance emerged from the depths and took back Paris from the occupational government, and much of the surrounding towns and villages in the name of a free France. Under the leadership of §RGeorges Marchais§!, and the §RNew Jacobin Movement§!, a clear vision for France has been outlined, a vision that aims to fulfil the goals of the §RFrench Revolution§! and establish a truly free France.\n\nBut that goal will not be without struggle. Though we have pushed the occupation out of Paris, they are not defeated and they will not stand idly by as we gather strength. §YIf the dreams of those who came before us are to be achieved, we must fight and we must win.§!"
 1984_Opening_Screen_FRA_Gameplay_Paths_Desc_TT:0 "§YFrench Paths§!\n- Crush the §RWestern European Socialist Republic§! and liberate §YNorthern France§! from the terrors of the §RUnion of Eurasian Socialist Republics!§!"
 1984_Opening_Screen_FRA_Button_TT:0 "Vive la France!"
