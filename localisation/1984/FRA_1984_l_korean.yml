 FRA_Lionel_Jospin_head_minister_desc:0 "§RJacobinism§!\n§YAustre§!"
 FRA_Anicet_Le_Pors_foreign_minister_desc:0 "§RJacobinism§!\n§YThe Red Diplomat§!"
 FRA_Jacques_Delors_economic_minister_desc:0 "§PPan-Europeanism§!\n§YPan-European Proponent§!"
 FRA_Henri_Rol_Tanguy_defence_minister_desc:0 "§RJacobinism§!\n§YLong Time Resistance Leader§!"
 FRA_Georges_Guingouin_army_chief_desc:0 "§RJacobinism§!\n§YPartisan Legend§!"
 FRA_Bernard_Louzeau_navy_chief_desc:0 "§RJacobinism§!\n§YNaval Officer§!"
 FRA_Roland_De_La_Poype_air_chief_desc:0 "§RJacobinism§!\n§YRed Hawk§!"
 FRA_Guy_Hermier_intelligence_chief_desc:0 "§RJacobinism§!\n§YSecretariat§!"
 FRA_The_Revolution_Reborn:0 "The Revolution Reborn"
 FRA_The_Revolution_Reborn_desc:0 "\n\n\n\n£GFX_FRA_The_Revolution_Reborn_Banner\n\n\n\n\n\n\n§WMany years ago during the late 1700s, the French people rose up against their dismissive rulers and begna a movement built for them, to put into place rulers that would do the same.\n\nOnce again, the French have risen up once more, this time to cast off the veil of Eurasia that had been unforced upon it and other nations in Europe. France will not only have a government that will serve the people of France but will fight to ensure that Eurasia and all it's evils are brushed arise swiftly and decisively.§!"
 FRA_Liberty_Equality_Fraternity:0 "Liberty, Equality, Fraternity"
 FRA_Liberty_Equality_Fraternity_desc:0 "\n\n\n\n£GFX_FRA_Liberty_Equality_Fraternity_Banner\n\n\n\n\n\n\n§WThe French State post monarchy was a land built upon the principles of Liberty, Equality and Fraternity. Though Eurasia has done well to try sweep these ideals under the rug as a means to make the French people subservient to the Eurasian Union and all it represents, ideas and all they entail are not so easily broken.\n\nThe French people will awaken from their slumber and when all Frenchmen do, it will be these guiding principles that will shine the way for all of us.§!"
 FRA_The_Popular_Army:0 "The Popular Army"
 FRA_The_Popular_Army_desc:0 "\n\n\n\n£GFX_FRA_The_Popular_Army_Banner\n\n\n\n\n\n\n§WThe Popular Army is a coalition of various anti-Euriasian and pro-independence forces that have come together under the banner of the Revolutionary Republic to create the Popular Army of France.\n\nThe Popular Army is a force that stands committed to the liberation of the French People, fighting against Eurasia and liberating our people on the battlefields whilst we free their minds from the despair and propaganda that had once ruled the lives of the people at home.§!"
 FRA_Overwhelmed_Administration_One:0 "Overwhelmed Administration"
 FRA_Overwhelmed_Administration_Two:0 "Overwhelmed Administration"
 FRA_Overwhelmed_Administration_Three:0 "Overwhelmed Administration"
 FRA_Iron_Curtain_idea:0 "Iron Curtain"
 FRA_History_Repeats:0 "History Repeats"
 FRA_History_Repeats_desc:0 "Much like in 1789, the French people have risen up against tyranny to bring forth liberty, equality, and fraternity amongst the French people. A revolt that has long been brewing for many years now, a resistance movement that took root since the day the Soviets seized Paris decades ago, the time has come for us to break the chains and liberate all of France once and for all."
 FRA_Reviving_Francophilia:0 "Reviving Francophillia"
 FRA_Reviving_Francophilia_desc:0 "Eurasia has long promoted a policy of disconnecting the people from their respective groups.\n\nThe French, much like the many groups of Europe, were put through this process, with millions of our kin disconnected from their homeland and the legacy of their forefathers. We must seek to undo what was done to France and heal our broken nation."
 FRA_Reviving_Our_Language:0 "Reviving Our Language"
 FRA_Reviving_Our_Language_desc:0 "The Neo-Bolsheviks in the later years of their regime before they became consumed by civil war, were set on implementing a Pan-Eurasian language that would be mandated upon all people's of the continent. A language loosely based on a strange mix of Russian and German, it's brief period of implementation was destructive and confusing for our people, something that needs to be rectified and quickly.\n\nWe are French people. Every single one of us ought to speak it."
 FRA_Restoring_Our_Culture:0 "Restoring Our Culture"
 FRA_Restoring_Our_Culture_desc:0 "Our top priority above all else must be to rekindle the fires of French Identity and a common vision for the people of France to rally behind. The Revolutionary Assembly is perfectly poised to ensure this is done. The Eurasians did well to dismantle our nation as they did with many others and we must dismantle Eurasianism in response.\n\nWhilst there are those who cling to false ideas of what France ought to be to the south of us, this will not stop us in our aims to bring forth the true France, the France that was envisioned during the First French Revolution long ago!"
 FRA_The_Red_Christ:0 "The Red Christ"
 FRA_The_Red_Christ_desc:0 "Christianity has long been an integral part of French identity and we'd be fools to castrate our faith in the Lord after all we have done. However, we cannot allow for the Christian faith to be weaponised against us by believers beyond our boundaries.\n\nNo, if Christ is to be part of France, he must be perceived as a sponsor of the socialist spirit of revitalised France. After all, he was very charitable, surely he must agree with us?"
 FRA_Promote_Revolutionary_Figures:0 "Promote Revolutionary Figures"
 FRA_Promote_Revolutionary_Figures_desc:0 "To succeed today, we must look to the past at the revolutionary figures that came before us. To learn from the triumphs and from their mistakes to ensure that our revolution is triumphant and that our enemy can be crushed completely. "
 FRA_Death_To_The_Eurasian_Monarchs:0 "Death to the Eurasian Monarchs"
 FRA_Death_To_The_Eurasian_Monarchs_desc:0 "Like Monarchs who have wronged France before, the Eurasians are no differnet. Whilst they espouse their hatred of monarchy, with heavy emphasis on the old Russian Tsar, they are truly no different from the system they despise.\n\nThey rule with absolute authority, with the few lording over the many.\n\nNo more. No more shall we hear their lies, no more shall we submit to their falsehoods. France will arise above this neo-monarchs and bring forth a nation unchained!"
 FRA_Eternally_Red_France:0 "Eternally Red France"
 FRA_Eternally_Red_France_desc:0 "The stage is set for the return of France. But not just any France. Revolutionary France, the France that could've been. The France that the world resisted and suppressed, but now stands ready to reclaim the rightful territories"
 FRA_A_Jacobin_Constitution:0 "A Jacobin Constitution"
 FRA_A_Jacobin_Constitution_desc:0 "A Jacobin nation requires a Jacobin Constitution to establish it's foundation and chart it's destiny moving forward. One that empowers the French people whilst ensuring a strong state able to protect it's citizens from hostile outside forces.\n\nLet the work begin."
 FRA_Ending_Citizen_Stratification:0 "Ending Citizen Stratification"
 FRA_Ending_Citizen_Stratification_desc:0 "Eurasian society operated on a strictly enforced system of stratification, where segments of society were separated from one another. Thus, social mobility in terms of status was impossible. Those at the bottom could not accend the bureaucracy, and those at the top did not come down, they were simply slain.\n\nThis system must not be inherited by the Revolutionary Republic."
 FRA_Defining_The_Rights_Of_Man:0 "Defining the Rights of Man"
 FRA_Defining_The_Rights_Of_Man_desc:0 "The Declaration of the Rights of Man and of the Citizen were first formulated centuries ago during the First French Revolution, back when our fore fathers were tearing down it's tyrannical regime. However, these rights have long been trampled upon by the Eurasians who sought to establish a collectivised, soulless nation that served only the interests of Neo-Bolshevism.\n\nIt is time to draft up a new declaration for the new age."
 FRA_Revised_Robespierrism:0 "Revised Robespierrism"
 FRA_Revised_Robespierrism_desc:0 "Robespierre is the father of Jacobinism, the man whom laid the foundations for what we are now and what we aim to establish moving forward in this new age of post-Eurasian Europe. We should look back on the ideas and concepts he laid out centuries ago and retrofit his vision to work for our resurgent nation."
 FRA_A_Jacobin_Work_Culture:0 "A Jacobin Work Culture"
 FRA_A_Jacobin_Work_Culture_desc:0 "Eurasian Work Culture was one of neglect for the worker and outdated building practices, creating structures that were dull and uninspired, looking out of place compared to the old ruins that, despite their damage, outclass anything Eurasia has built in France in the time it has occupied our nation.\n\nJacobite France must break away from the inferior Eurasian tradition and focus on revitalising the working man of France. The Working Class are not drones, they are artists whom are tasked with building the future, and we must reflect this in our policy moving forward."
 FRA_French_Workers_Brotherhood:0 "French Workers Brotherhood"
 FRA_French_Workers_Brotherhood_desc:0 "It's not enough to simply empower the working class. No, for there to be a strong and productive working class, there must exist a common ideal and nothing brings people together quite like the concept of brotherhood, of the sense that we are all in it together.\n\nWhilst not always easy to bring forth, the war situation and the foe we face in Eurasia offers the perfect opportunity to rally the workers of France to the ideals of brotherhood and unity."
 FRA_The_Rose_Red_Republic:0 "The Rose Red Republic"
 FRA_The_Rose_Red_Republic_desc:0 "France is ready for the post-Eurasian age. Ready to leave the darkness behind and prepared to enter the era of the great triumph of Jacobinism. No longer shall we be shackled by forces that seek to undermine the people, but instead embrace the true liberty promised by the French Revolution from centuries ago and bring it forth to all of France... and perhaps, to others as well."
 FRA_The_New_Jacobin_Army:0 "The New Jacobin Army"
 FRA_The_New_Jacobin_Army_desc:0 "The French Army that is leading the charge against the Eurasian forces, though great in heart and spirit, is lacking in terms of resources and the strict professionalism that defined old world militaries. If we are to not only secure our independence but become a viable power on the European continent, then we must move swiftly to remedy the situation."
 FRA_An_Army_Marches_On_Its_Stomach:0 "An Army Marches On It's Stomach"
 FRA_An_Army_Marches_On_Its_Stomach_desc:0 "If history has taught us anything, it's that an army is only good as it's supply lines that fuel it. We can't simply throw our precious men at the enemy, no, we must make sure that they recieve whatever resources we can provide them and in a timely fashion. By investing in the creation of a dedicated logistics corps, we can ensure our troops have steady supply lines."
 FRA_The_Foundries_Of_War:0 "The Foundries of War"
 FRA_The_Foundries_Of_War_desc:0 "War is a fruitless effort without the means to support it. Luckily, Paris is a historic city, with a considerable industrial legacy that lives on to this day. With this in mind, we can make use of some of the cities defunct facilities that can be repurposed into viable industrial-miltary complexes."
 FRA_Honneur_et_Fidelite:0 "Honneur et Fidélité"
 FRA_Honneur_et_Fidelite_desc:0 "Honour and Fidelity should be the aim of every unit in every army, and it will most certainly be the aim of the Jacobite Army. Loyalty to your fellow man and to the ideals we all champion, this must be the attitude of every soldier fighting on the battlefield against the enemy."
 FRA_Red_Banner_Patriotism:0 "Red Banner Patriotism"
 FRA_Red_Banner_Patriotism_desc:0 "A patriotic people is a strong and united people. If victory is our cause, then we need the people of France committed to our message and our cause. We must remind the French people what happens if we fail. We must tell them of the future we could have and who stands in the way of it. We must rally them all to fight against the enemy, for the future of our nation."
 FRA_The_Guilotine_Act:0 "The Guillotine Act"
 FRA_The_Guilotine_Act_desc:0 "This is a wartime situation and currently, our enemies both foreign and domestic are plentiful. Unlike in the old days, we simply do not have the time or resources to properly imprison those who wish harm against us. However, in history lies another option. That being the Guillotine, where enemies of the Revolution were killed in large numbers. Whilst we won't make a public spectacle out of it, executing the worse of our criminals will help alleviate the burdens of having too many high risk prisoners whilst keeping the rest of the lower risk prisoners in line."
 FRA_The_Spirit_Of_Napoleon:0 "The Spirit of Napoleon"
 FRA_The_Spirit_Of_Napoleon_desc:0 "The original spirit of the French Revolution has been awakened, identity and soul intact. And with it, stirring in our armed forces, is the spirit of France's greatest leader, Napoleon Bonaparte. Our troops are motivated, adapting to the long outdated tactics of Eurasia, with many of our generals leaning into the strategies and ideals of the late leader to triumph in battle.\n\nFrance is rising again, and soon, the whole continent will know it."
 FRA_Viva_La_France:0 "Viva La France"
 FRA_Viva_La_France_desc:0 "After years of subjegation, the catastrophe of Operation: Unthinkable has been avenged once and for all. Paris, and much of France, has been liberated alongside some other people groups that have found themselves within our boundaries, their fates to be determined at a later date. Though there is still much more to do, for now, we celebrate!"
 FRA_The_Red_Roses_Bloom:0 "The Red Roses Bloom"
 FRA_The_Red_Roses_Bloom_desc:0 "The grounds of France are red, not with blood, but with roses and popies. With victory comes rebirth, a chance to begin anew and to look ahead instead of back. A new destiny awaits France, the question being what that destiny will be?"
 FRA_Prioritise_Domestic_Revival:0 "Prioritise Domestic Revival"
 FRA_Prioritise_Domestic_Revival_desc:0 "Frnace is not ready for war, at least not yet. The homeland is devastated and there are people within our borders which need help now, not later. Though this may not please some of the more nationalistic minded members of our government, it will serve us better in the long run to see this through."
 FRA_National_Reunification_Plan:0 "National Reunification Plan"
 FRA_National_Reunification_Plan_desc:0 "Though much of France has been liberated, not all of it has. There are territories that are beyond the reach of our government, preventing true unification from taking place. Whilst focusing on a military build up so soon after our independence war may be viewed as foolish by some, it will ultimately be necessary if we want to be strong and ready for whatever threat comes our way."
 FRA_The_Peoples_Symphony:0 "The People's Symphony"
 FRA_The_Peoples_Symphony_desc:0 "The song of the French nation has been dull and stale under the rule of Eurasia, muffled by the drone of oppression. But today is a new day, a free day, where France can sing of the triumphant revolution and all the splendour it brings to our people, forever unchained."
 FRA_Relinking_The_Industrial_Republic:0 "Relinking The Industrial Republic"
 FRA_Relinking_The_Industrial_Republic_desc:0 "A linked Republic is a strong Republic. By focusing on the rail and road connections that links our nation together, we can ensure a more speedy reconstruction and an even more prosperous future."
 FRA_Incinerate_Eurasian_Remnants:0 "Incinerate Eurasian Remnants"
 FRA_Incinerate_Eurasian_Remnants_desc:0 "Throughout our territory, there still exist Eurasian holdouts and partisans clinging onto a nation that is choking and dying more and more with each passing day. To ensure these traitors and anti-Francophile forces cease their parade of chaos, we must snuff them out swiftly and effectively."
 FRA_Revive_French_Irredentism:0 "Revive French Irredentism"
 FRA_Revive_French_Irredentism_desc:0 "There is no greater dream than a Greater France, one that stretches from the Channel to the Sea, from the Rhine to Biscay, and everywhere in between. The road toward a truly unified French state. There will be those who oppose us, who attempt to stop us from achieving our aims.\n\nBut much like how the fires of revolutionary fervour liberated our people, we will bring forth the revolutionary ideal to other nations should they decide to stand in our way."
 FRA_Neo_Napoleonism:0 "Neo Napoleonism"
 FRA_Neo_Napoleonism_desc:0 "Europe has, and always will be, France's destiny. Napoleon saw this centuries ago, and so do we. Nothing, not even Eurasia's dominion over France, has changed that. It will not be an overnight affair, but with time, strength and patience, France will become the continental power it was always destined to be once more."
 FRA_The_Iron_Curtain:0 "The Iron Curtain"
 FRA_The_Iron_Curtain_desc:0 "The lines in the sand are being drawn. Our enemies are preparing against us, desiring our territory and seeking to crush the Revolutionary Republic we have fought and bled to build. Though we are not yet ready for war, their time will soon come. Soon, all of France will enjoy the fruits of reunification and all of Europe will be freed once and for all from the chains that have kept her shackled for many long decades."
 FRA.1.t:0 "From the Depths"
 FRA.1.desc:0 "Georges Marchais walked through the streets of liberated Paris, taking in the splendour of red flags flying off of each people, the newly formed Popular Army roaming through the streets in search of Eurasian troops foolish enough to continue fighting in spite of their so-called 'Ludovicgrad' falling back into the rightful hands of the French people.\n\n\"Is there anything I should know about?\" Georges asked as he glanced at Henri Rol-Tanguy, the head of the armed forces.\n\n\"The city has been secured, as you can see. We've recieved word that our operations in some of the surrounding towns, villages, and some cities. Rouen. Amiens. They're in our hands as well. Reims too, I suspect\" Henri explained professionally as they walked by an abandoned Eurasian APC.\n\n\"And what of our dears Eurasian friends?\" Georges inquired, glancing at the APC and the tattered Eurasian flag that still clung to it's antenna, no doubt put up by a Eurasian soldier at some point as an act of defiance.\n\n\"Regrouping. The WESR government, they've been regrouping, mainly in Brussels in the east and Brest to the west. Looks like they're going to play this the hard way.\"\n\n\"To be expected. Eurasia may have a lot wrong with it but they certainly don't lack of stubborness... nor foolishness\" Georges replied, humming a little before glancing back at Henri."
 FRA.1.a:0 "\"We've got much to do.\""
 FRA.2.t:0 "French Legacy"
 FRA.2.desc:0 "\"It's windy up here\" Anicet Le Pors remarked as he observed Paris from the top of the Effiel Tower, now liberated from all the 'modifications' the Eurasians had made to it, returning it from a communications complex back to at national landmark.\n\n\"Tends to happen when you're this high up\" Georges replied as he leaned on the railing.\n\n\"I suppose so\" Anicet replied before glancing back at Georges.\n\n\"So I suspect you didn't bring me up here just to sightsee. I appreciate the view, don't get me wrong. But I'm certainly not lacking for things to do these days\" Anicet remarked as he leaned on the railing as well.\n\n\"Then I'll cut to it. French culture is a mess. Most people, even much of our members, they don't fully understand what it is we are fighting for. The France we seek to restore. Our cultures been trampled and diluted for decades, and we've been hardpressed to practice any tradition in recent years\" Georges explained as he glanced over at Anicet.\n\n\"And you want me to resolve that?\" Anicet questioned, seeking confirmation which he recieved in the form of a nod.\n\nHe exhaled, looking back out at the city as he thought about his next words.\n\n\"I appreciate the vote of confidence and all, but isn't this more up Jacques' ally?\" Anicet asked plainly.\n\nGeorges sighed, hands gripping the railing.\n\n\"He has his uses. Keeping people happy, that's what he does. But his... Pan-European ideals that he clings onto, well... I want to restore France, not create some... vague hybrid European state, if you get my meaning\" Georges answered, giving Anicet a meaningful glance.\n\nAnicet was quiet for a moment before nodding a little. He knew of the general tension between Jacques and Georges, not enough for any hostility per say. But it was clear that Georges wanted him to stay where he was, and not move an inch. Looking back at Paris, Anicet nodded again before he spoke."
 FRA.2.a:0 "\"I'll see what I can do then.\""
 FRA.3.t:0 "Un, Deux, Trois, Quatre"
 FRA.3.desc:0 "\"Yes, yes! Good work, Rose\" Chloe spoke praisingly, smiling warmly as the young teen allowed a small smile back before walking back and returning to her desk.\n\nChloe was a teacher, here with a specific goal in mind. To 'De-Eurasianise' the youth that had been indoctrinated by the Neo-Bolsheviks. More specifically, undoing the forced simplification of French language which had twisted the very language she had come to love. At present, she was teaching a classroom of girls how to write numbers properly in the French language. Not how the Eurasians forced everyone to do it.\n\n\"Alright, now. Lina, would you please come up and write up five in word form\" Chole spoke, turning her attention to the next girl in her class.\n\n\"Uh... yes! Okay!\" Lina replied, getting up from her seat stiffly as she awkwardly sauntered her way over to the blackboard.\n\nLina was a quiet student, always careful of her words. Years ago, her father had been taken by Eurasian authorities for word crimes. The event clearly left an impression on the girl, judging from the way she carried herself, her hesitance in every move. That wasn't to say Lina wasn't smart. She was adaptable, and was learning quickly.\n\nSoon enough, Lina had written Cinq on the board before turning to Chole with a look that tentatively saught approval."
 FRA.3.a:0 "\"Good job, Lina. You prove yourself a fast learner once again.\""
 FRA.4.t:0 "Les Miserables"
 FRA.4.desc:0 "\"Will you give all you can give, so that our flag may advance? Some will fall and some will-\"\n\n\"No, no, no!\" Robert Hossein, the director, exclaimed as he got up to his feet, Claude-Michel Schonberg simply rubbing the bridge of his nose nearby before speaking up.\n\n\"It's so that our 'banner' may advance! Not flag, banner!\" Robert exclaimed to the assembled cast on stage.\n\n\"Robert, they've been practicing for hours now. Perhaps a break would be more prudent\" Claude reasoned, knowing that the cast had been at it for hours now.\n\nBut Robert simply spun around where he stood to look at Claude, his gaze fixed on the man.\n\n\"They can have a break when they get it right! Director Marchais will be in attendence of this play. This is the first major work of theater France and I will not have it be a mess of mistakes and failures\" Robert spoke firmly, shutting him down before turning back to the cast once more.\n\n\"Do it again!\" he ordered, the cast suppressing the urge to groan before they got back into position.\n\n\"...Will you give all you can give, So that our banner may advance? Some will fall and some will live, will you stand up and take your chance?\""
 FRA.4.a:0 "\"The blood of the martyrs will water the meadows of France!\""
 FRA.5.t:0 "Divine Recontextualisation"
 FRA.5.desc:0 "\"This isn't correct, not at all\" Father Gabriel stated bluntly, flicking through the 'Party Approved' Bible before looking back at them.\n\nFather Gabriel, until recently, had lead the underground Church in Paris, avoiding the authorities and working in secrecy to preserve the French Christain tradition. When the Revolutionary Republic rose up from the shadows and was established, Gabriel was swift to reclaim a church building and begin the process of rebuilding it for future usage. He thought he'd be able to preach the Gospel without issue. But increasingly, that didn't seem to be the case.\n\nThe two Maquis agents glanced at each other before looking back at Gabriel.\n\n\"What's wrong with it?\" One of them asked.\n\nGabriel groaned, closing the book.\n\n\"Christ is many things, gentlemen. A spiritual leader, a source of wisdom... the Son of God. He is, however, not a political figure. He doesn't preach ideology, He is about faith! And yet, this Bible paints Him as though He were some kind of precursor to Jacobinism. A proto-Socialist. That is not who He was!\" Gabriel protested bluntly.\n\nThe second Maquis agent simply scoffed.\n\n\"I don't care what you think He is, this comes from the top. This is the Bible now. This is what you will use to preach, and this is how people will view your... God. If you don't like it, then you can consider your days as a preacher over.\"\n\nGabriel glared at the two men, his grip on the two men tightening slightly as he inhaled sharply before he slowly exhaled, glancing down at the book briefly before glaring back at them.\n\n\"Fine\" he relented reluctantly through gritted teeth.\n\nIt wasn't ideal, but it was better than being underground, fearing the day the NKVD would strike. Perhaps someday, the word of God would be able to be freely spoken once more, without fear of persecution or censorship."
 FRA.5.a:0 "Some ways still remain"
 FRA.6.t:0 "Scuplture"
 FRA.6.desc:0 "Anicet watched as the artist, Antoine, pulled the blanket off of the scuplture he had created: A statue of Robespierre himself.\n\n\"What do you think, sir? Surely, this is more than suitable for a place like Vendome, yes?\" Antoine asked, clearly eager to get his work out there for all of Paris to see.\n\nAnciet simply hummed, walking around the statue, inspecting every detail of it before humming again.\n\n\"It is interesting\" Anicet murmured, stopping at the front of the statue, looking up at the face of Robespierre.\n\n\"However, Vendome is reserved for Napoleon. The old Column with Napoleon at the top, that is being recreated as we speak.\"\n\nAntoine deflated a little, a discreet look of disappointment on his face.\n\n\"Oh... I... I see\" Antoine replied, trying to hide the disappointment in his tone at being unable to secure the statue of Vendome, something that did not go unnoticed by Anicet.\n\n\"But\" Anicet began, catching Antoine's attention once more.\n\n\"We don't have anything at the Square des Batignolles. It's more of a garden space area, as you know. Modelled after English garden designs. Perhaps that may be of some interest?\" Anicet explained, deciding that just because the statue didn't have a place at Vendome doesn't mean it didn't have a place at all in Paris.\n\nAntoine smiled a little in response, giving the man a nod of appreciation."
 FRA.6.a:0 "\"Yes, I am very interested\""
 FRA.7.t:0 "A Revolutionary Age"
 FRA.7.desc:0 "\"France is more than just a province\" Georges spoke, addressing the gathered Jacobin Revolutionary Assembly.\n\n\"We are not simply a place on a map, a region for Eurasia to add to it's collection. No, we are a distinct people, a people of zeal and determination.\"\n\nThe Assembly gave their applause, each member displaying their approval for the Director's words. Once they had settled down, Georges spoke once more.\n\n\"The people of France require assurances. guarantees we can give to our kin that Eurasia was unable to give. We are here to deliever a promise envisioned centuries ago, the culmination of the French Revolution in full!\"\n\nAnother round of applause came, the Jacobin dominated Assembly each displaying their support.\n\n\"Moving forward, I want this assembly to focus on completing that vision for the modern age. To create a free France! A Red France! A Jacobin France!\" Georges yelled, the Assembly all standing up, their ideological zeal stoked to press forward with their mission."
 FRA.7.a:0 "The Red Republic rises"
 FRA.8.t:0 "Rights Renewed"
 FRA.8.desc:0 "Lionel and Jacques both watched quietly as Georges read over the bill detailing the rights of the French people which had been recently passed by the Assembly. He'd been reading through it for about 10 minutes now, the two men glancing at each as Georges flipped over to another page. Like it or not, Georges was the one with authority to either sign the bill into law or veto it. This bill would be a big milestone for Lionel and Jacques, the two being the primary authors behind it.\n\n\"Is it to your liking, Director?\" Lionel asked after a while, Jacques glancing at him briefly.\n\n\"Just one thing to ammend. The bill refers to European peoples\" Georges stated, setting the papers down as he gave Jacques a pointed look.\n\n\"We aren't a rabble of Europeans, we are French. It needs to be made explicit in all bills we propose, especially ones of this nature\" Georges spoke firmly.\n\n\"I...I just thought that-\" Jacques began to speak, but was swiftly cut off by Georges.\n\n\"Enough! I don't care what you thought. You can have your ideas, Jacques, but let me make this clear, you keep them to yourself from now on\" Georges spoke as he picked up his pen and crossed off European, before writing French above it."
 FRA.8.a:0 "Signed, Director Georges Marchais"
 FRA.9.t:0 "The March of Progress"
 FRA.9.desc:0 "At the base of the Effiel Tower, a crowd of thousands of French men and women had gathered before a stage. Many carried red banners with them, like a constant wave of fabric in the wind. Georges made his way onto the stage, watching as the crowd all were roused to applause. Once they had settled, Georges gripped onto the podium before him, looking out at the assembled crowd of people for a few moments before he spoke into the microphone.\n\n\"In the time the Jacobite Revolutionary Assembly has took control of Paris from the occupation forces, we have made more progress for our people than Eurasia has over the past fours decades of their rule\" Georges announced, much to the approval of the crowd before him.\n\n\"More and more, we create a forging a state that truly empowers the working class and makes manifest the ideals of the French Revolution, a revolution guided not by foreign names like Marx or Lenin but by French name, French people, and French ideas\" Georges continued on, earning another round of applause from the crowd.\n\n\"I say this to all of you, and to all outside observers. We will not rest until we make France a utopia for all French people!\" he exclaimed as the flag bearers amongst the crowds waved their flags as high as they could, for all of Paris to see."
 FRA.9.a:0 "A Jacobite's utopia, and nobody elses."
 FRA.10.t:0 "State of the Popular Army"
 FRA.10.desc:0 "The Popular Army, as it has come to be known, was originally a coalition of various underground resistance groups collectively organised into a relatively organised army that could work together to push the enemy out of Paris when the time came, which they did rather well. But retaking a city from within is not the same as fighting frontline warfare against an enemy that is more than willing to pay any blood price to ensure victory.\n\nThe Popular Army, frankly, needs overhaul. Restructuring, reorganisation. From a collection of rebels into a proper army that can take down the Western European Socialist Republic, and in future, the rest of France. Luckily, the Republic has many experienced officers within its ranks, many of whom have been fighting since the Second World War. With the leadership of General Henri Rol-Tanguy and the experience at France's desposal, the goal of making the Popular Army a powerful fighting force will be achieved in no time."
 FRA.10.a:0 "Victory by any means"
 FRA.11.t:0 "Old World Lessons"
 FRA.11.desc:0 "\"Can we learn anything from the Eurasian's about warfare?\" am officer asked as the assembled committe of military officers discussed how best to adapt military tactics for the Popular Army.\n\n\"Sure. They can teach us how to lose thousands of men enmasse\" General Georges Guingouin remarked, earning some chuckles from the other officers.\n\n\"The Eurasian army is all zeal, no discipline. There's not much we can learn from them\" General Rol-Tanguy muttered, the head of the military pacing around as he read over a book detailing French tactics from the Napoleonic era.\n\nGuingouin noticed this, raising a slight eyebrow at what Henri was reading.\n\n\"No offense, but isn't war from that era a little outdated now?\" he asked plainly.\n\n\"Not necessarily. Whilst the general tactics of the time aren't applicable anymore, there are some things we could learn from Napoleon himself\" Henri spoke before looking up from the book.\n\n\"True arrogance is believing that just because technology and tactics have evolved, lessons from past leaders are no longer applicable. French has a long legacy of warfare, and winning many battles. Eurasia thinks itself the end of history, the last military giant. They do not see things as we do. That arrogance will fuel their defeat\" Henri stated as he closed the book with the hand he was holding it in, the officers in the room each wearing thoughtful expressions on their faces.\n\n\"Perhaps we should review some of Napoleon's battles in urban areas. Ought to be something useful there\" Guingouin suggested, glancing around at the other officers in the room."
 FRA.11.a:0 "History is never irrelevant"
 FRA.12.t:0 "Rebirth of Honour"
 FRA.12.desc:0 "Captain Etienne Moreau stood before his soldiers, silent at first, gazt steady as he took in the faces of his recruits. \"This is more than just loyalty\" he said. \"Anybody can be loyal. Anyone can do their duty. Eurasia does this well. No, the French Army is not an army of fanatics.\"\n\nThe recruits glanced at each other for a moment before returning their gaze to Captain Moreau.\n\n\"We are an army of discipline. Brotherhood. Honour. When you're in the darkest hole or enduring hardship, the difference between life and death will be the trust you place in your brothers in arms. When you are faced with hard decisions, it will be up to each of you to hold each other to the standard all Frenchmen ought to attain. I expect all of you to hold each other up high.\"\n\nA brief pause.\n\n\"You aren't soldiers. Not yet. Becoming a soldier isn't accomplished in training, it is forged in battle and duty. By serving your company, and your country. And the day will soon come where you will earn an opportunity to prove that you are indeed soldiers. But until then...\"\n\nCaptain Moreau then turned away."
 FRA.12.a:0 "\"You will stand, you will listen, and you will obey my every command.\""
 FRA.13.t:0 "Echoes of History"
 FRA.13.desc:0 "Though the act of executing enemies of the state were no longer made public spectacle like in the days of the first French Revolution, execution by Guillotine would still endure as a method of punishing the most wicked of the Eurasian Regime, all taking place in the courtyard of the Hotel de Brienne.\n\n\"Hugo Dubois, former administrator of Paris, previously known as Ludovicgrad. For the treachery and crimes against the French people, this miltary tribunal has hereby declares you guilty and will therefore, face execution by Guillotine\" one of the officers, his gaze fixed on Hugo's tired gaze.\n\nHugo simply exhaled through his nose, his eyes dropping down to the ground. There was no use in protesting, the decision had been made long before he ever set foot in this place. As he was haulled by two French soldiers over toward the Guillotine, Hugo could feel his heart beat just a little faster with every inch he got closer to the archaic execution device. When they forced his head down, neck in the aim of the blade which was above him like an ominous spectre. But he refused to let the fear show on his face. He'd seen many prisoners cower in fear before they died. He'd be damned if he were to do the exact same.\n\n\"Any last words, Hugo?\" the soldier who manned the Guillotine asked, his tone as though this were just another day of work.\n\nHugo glanced up at the soldier, before looking around at all the soldiers and officers in attendence, including General Guingouin who watched from the balcony. Feeling a final surge of defiance rouse from within, he inhaled, his frown forming before he spoke..."
 FRA.13.a:0 "\"Fuck you all\" he spoke, before the blade came crashing down."
 FRA.14.t:0 "In the Shadow of Greatness"
 FRA.14.desc:0 "The square was quiet in the early morning. The sun had barely begun to creep over the horizon and cast it's light upon Paris. On patrol in the square stood a soldier, here to protect the newly placed statue of Napoleon Bonaparte from Eurasian sympathisers and terrorists who would most definitely attempt to desecrate the statue dedicated to France's greatest General.\n\nThe soldier looked up at the statue, at his bronze visage and set features. Chin lifted, hand tucked into his coat as he looked on like a man with a vision too great for many to attain. He looked as though he had stopped in his duties as General, immortalised where he stood.\n\nThe soldier gripped his rifle tightly, looking up at the man that had once brought France glory.\n\n\"You never hesitated, did you?\" he muttered to the statue.\n\nThe statue, naturally, did not answer. Yet, his bronze presence was here as history would like to remember him: decisive, relentless, inevitable.\n\nBut those who knew a thing or two knew that Napoleon, for all his triumphs, was Human. He had loved, he had raged, and he had feared like any man had. But the difference between most men and Napoleon was faith. Faith in himself that he would not falter, that victory would come, but only if he fought to claim it.\n\nThat was arguably Napoleon's greatest strength.\n\nA breeze passed through the square, stirring the solider back to reality. He sighed, adjusting his cap before glancing around the square, seeing the early risers of Paris begin to slowly trickle into the square.\n\nIt was time to get back to it."
 FRA.14.a:0 "Even in eternal silence, the Emperor lives on."
 FRA.15.t:0 "Revolutionary Triumph!"
 FRA.15.desc:0 "The air was filled with Triumph. In Paris, much like the rest of France, people gathered on the streets, joy spread amongst the populace as the evil the people had long fought against, the enemy they hoped would be overthrown, was finally gone. Red banners flew from the windows of most buildings, the foreign government gone and a homegrown administration emerging to take France in a new direction.\n\nGeorges walked down the street, keeping discreet with his guards nearby in their own civilian clothes. Normally, he'd avoid mingling with the crowds so directly, and no doubt, the Assembly would be furious to find out the Directior himself had disappeared. But this was a special occasion, one that he felt he should see personally.\n\nChildren played, couples danced, and soldiers spent time with friends and families. For a brief moment, things felt perfect. Like for once, there were no troubles, no goals to work toward, nothing to overcome, just... enjoying the peace that had been won. Georges came to a stop as he watched some kids dancing around in front of a man with a guitar, who was playing some kind of new aged song that Georges wasn't familiar with. Hands in his coats, he observed the seen, taking it all in. For once, it wasn't about him or the Assembly or the Jacobin Revolution. For once, none of that mattered.\n\nNot in this moment."
 FRA.15.a:0 "Triumphant joy"
 FRA.16.t:0 "Moving Forward"
 FRA.16.desc:0 "With celebrations beginning to die down and the new reality of France becoming the norm, the direction of France going forward, at least for the time being, needs to be considered. Thus far, within the halls of the Assembly, two main voices have emerged on what the priority of Revolutionary France needs to be at the present moment.\n\nOn the one hand, as expected, are those who seek to focus on domestic affairs and rebuild the frankly embarassing infrastructure and industrial capabilities of France. The civilian market is practically nonexistant and living standards are in the toilet and have been for some time. Focusing on resolving these issues, for some, seems like the sensible thing to focus on.\n\nHowever, the emerging revanchist faction favours a policy of taking advantage of the current situation in Europe to reclaim the rest of France from the Eurasians and rebel groups whilst they are all still weak, believing that domestic development can come later and that waiting will only make future reclamation a more difficult task.\n\nWith this in mind, the Director has come to a decision on the matter, his voice holding the ultimate sway over the direction of the Assembly."
 FRA.16.a:0 "\"Our people need our attention\""
 FRA.16.b:0 "\"We can't stop until ALL of France is free\""
 FRA.17.t:0 "Pride and Prosperity"
 FRA.17.desc:0 "Georges and Lionel were watching the reconstruction of the Arc de Triomphe from a respectable distance, watching as the various workers moved about on the ground and on the scaffolds, planners and archetects off to the side ensuring that all was going according to their meticulous plans.\n\n\"Looks like how I remember it. You know... before the Eurasians blew it up years back\" Georges remarked, hands behind his back as he calmly walked around the perimeter of the Arc, taking in the details that were slowly being manifested by the workers as Lionel followed after him.\n\n\"Yes. Soon, it will be as though it were never gone in the first place\" Lionel concurred.\n\nGeorges simply hummed, eventually coming to a stop at the front of the Arc before sighing.\n\n\"People will appreciate this. If we tried going to war before we had any of this done, well... I doubt there'd be many smiling faces\" he remarked, glancing over at Lionel for a brief moment before smirking and looking back at the Arc."
 FRA.17.a:0 "\"They will come to love the Jacobin way.\""
 FRA.18.t:0 "The Modern Age Roars"
 FRA.18.desc:0 "For Francis, trains were hardly a new thing in France. Sure, people saw them but unlike those who worked, under Eurasia, kids such as himself weren't permitted onto any of the trains. Francis loved to go by the train yards when he thought nobody was looking and watch the trains go by. It may have gotten him in trouble from time to time, but it was worth seeing. But today was different. He was actually on a train, taking a trip from Paris to Brest, way west of the capital city. With travel now less restrictive, his mother and father were eager to head west to see if there was any family members there still alive after all of this.\n\nIt was a little nerve wracking at first, being so far from the city he'd grown so used to. Going onto the train, when it first lurched forward, he did yelp in surprise much to his embarassment and the amusement of his parents. But as Paris began to move by him and the train picked up speed, Francis could only watch with wonder. And as the train roared by the web of buildings and roads that made up Paris and breached into the countryside where vast fields and recovering towns, villages, and farms could be seen, Francis felt a smile grow on his face, a smile like no other."
 FRA.18.a:0 "Enjoy the little things"
 FRA.19.t:0 "Memento Mori"
 FRA.19.desc:0 "Vladimir was a long way from home. He grew up so far east, all the way in Magadan. Thousands of kilometers away from here. Now here he was, holed up in some warehouse office in the middle of... France, as it was called now...with nothing but a pistol in his hands, his rifle having ran out of ammunition long ago now. His squad was dead now, each one of them keeping up their loyalty to Eurasia by dying for it.\n\nOne by one.\n\n\"Surrender your weapon!\" A French soldier called out.\n\n\"We know you are in there. We have you surrounded and out gunned. Come quietly and you won't have to die where you stand.\"\n\nVladimir exhaled, gripping his pistol tightly. He understood enough French to know the gist of what the soldier was asking. Give up, and he won't die. Eurasia had long drilled into him that surrender to the enemy was cowardice, worthy of death. Normally, he wouldn't consider it... but as he glanced at his pistol, with only one magazine in it. Eurasia had lost in this region. The rebels won outright. Even if he did somehow make it out of here, where would he even go? There was no rescue, nowhere to run to that wouldn't have the French trying to gun him down. Maybe if he'd just took his chance, perhaps he'd make it as a prisoner instead of a fugitive.\n\n\"I'm coming out\" Vladimir spoke in what was likely the worst French pronounciation in history.\n\nBut good enough to get the point across. Sighing, he creaked open the door slowly before tossing his pistol out, taking a moment before getting up, opening up the door further and stepping out with his hands in the air."
 FRA.19.a:0 "No honour in senseless death"
 FRA.20.t:0 "What They Took From Us!"
 FRA.20.desc:0 "\"What they took from us\" Leo read out, his eyes on the poster on the wall, displaying those words with a map of France, shattered into various pieces, with Georges Marchais trying to get those pieces back.\n\n\"Didn't think the government would be trying to antagonise the southerners so soon\" his friend, Jules, remarked beside him.\n\n\"Yeah... would've thought they'd give everyone a rest for a little while\" Leo replied, turning and making his way further down the street.\n\n\"I guess the Jacobites aren't one for waiting, I suppose. Get it over and done with sooner rather than later\" Jules stated, following after Leo.\n\n\"I guess so. Still, not exactly eager to get back to the frontline. I only just found out my Mom is still alive back in Calais. I'd like to spend some time with her.\"\n\nJules nodded, a solemn look on his face as they passed by another set of posters, all working toward motivating pro-war reunification sentiment."
 FRA.20.a:0 "Conflict on the horizon"
 FRA.21.t:0 "The Coming Trials"
 FRA.21.desc:0 "Georges watched the plans laid out on the war map on the table, listening as Henri explained each step, from the opening stages down to cities of immediate priority. Georges didn't have much of an expression on his face, just watching almost blankly as Henri pointed out areas of the map where attacks needed to be focused and where it would be best to fight defensively.\n\n\"Director?\" Henri asked, snapping Georges out of his trance-like state.\n\nGeorges blinked, turning his gaze to Henri. It was a lot to think about, knowing war was coming, knowing that there would soon come a gamble that would risk everything he had built so far, to test his power against the powers south of him.\n\n\"Yes?\" he replied calmly.\n\n\"Is everything okay? Would you like me to repeat any aspects of the plan?\" Henri asked, a hint of concern on his features.\n\n\"I'm fine, General, just... you mentioned Bordeaux earlier?\" Georges muttered, gesturing the map, trying to direct the conversation away from him.\n\nHenri was silent for a moment.\n\n\"Right, Bordeaux...\" Henri spoke slowly before returning his gaze back to the map and beginning his explanations once again, taking a moment now and then to check if the Director was paying attention."
 FRA.21.a:0 "War is a gamble, not a game"
 FRA.22.t:0 "The Broken West"
 FRA.22.desc:0 "Silence blanketed Georges office as the man himself sat at his desk, fingers drumming on the desk as he remained isolated with his own thoughts. Thoughts of tomorrow, and the day after that. Days of the coming conflict that would no doubt come soon. There was no use in avoiding the topic, whether he intiated it or if his enemies beyond the borders of the Republic were to strike first instead. At the end of the day, so long as the French lands remained divided, the coming of war seemed inevitable.\n\nHe got up from his desk, walking over to the nearby doors that lead out onto the balcony, where he got a decent view of Paris. Georges had accomplished much so far. Paris was his, as was Northern France. The Jacobite cause had established its foothold and Eurasia was gone. But with gain comes the fear of losing, and Georges now had much to lose now. He was in a position where millions would turn to him in times of crisis, for leadership and directions.\n\nGeorges sighed, leaning on the railing as he closed his eyes for a moment, composing himself before opening up his eyes, a look of resolve on his face. He wouldn't buckle or submit to fear. Fear is what lost France in the first place. Fear is what saw Paris fall to outsiders time and time again..."
 FRA.22.a:0 "And he wouldn't make the same mistake"