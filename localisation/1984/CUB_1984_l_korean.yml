 CUB_Unified:0 "Republic of Cuba"
 CUB_Unified_DEF:0 "The Republic of Cuba"
 CUB_Unified_ADJ:0 "Cuban"
 CUB_Cuban_Revolution_decision_category:0 "Cuban Revolution Decisions"
 CUB_Declare_Total_Victory:0 "Declare Total Victory"
 CUB_Patria_O_Muerte_Venceremos:0 "Patria o Muerte, Venceremos!"
 CUB_Patria_O_Muerte_Venceremos_desc:0 "\n\n\n\n£GFX_CUB_Patria_O_Muerte_Venceremos_Banner\n\n\n\n\n\n\n§WThough the Cuban homeland is in a tough spot, the spirit of our people has not subsided. Everyday, Cubans across the island continue to fight with intent to win back their island from the Oceanian threat. With Castro as our guiding hand, we will reclaim our island, one dead Oceanian at a time.\n\nHomeland or death, we will prevail!§!"
 CUB_The_Enduring_Spirit_Of_Revolution:0 "The Enduring Spirit of Revolution"
 CUB_The_Enduring_Spirit_Of_Revolution_desc:0 "\n\n\n\n£GFX_CUB_The_Enduring_Spirit_Of_Revolution_Banner\n\n\n\n\n\n\n§WThe spirit of the revolution has yet to have faded from our people. Whilst the Oceanians continue to impose their vision of the 'Revolution' upon Cuba and the world, we have not forgotten the true revolution, one that is for Cuba and embodies the true vision of socialism.\n\nThe people know what is at stake and what it will take to reclaim not only the island of Cuba but the true nature of Socialiam from the traitorous dogs occupying the Americas and the other parts of the world.§!"
 CUB_The_Fight_For_Independence:0 "The Fight for Independence"
 CUB_The_Fight_For_Independence_desc:0 "\n\n\n\n£GFX_CUB_The_Fight_For_Independence_Banner\n\n\n\n\n\n\n§WAfter years of waiting and preparing, the fight has come at last. Cuba stands poise to not only reclaim our island from the clutches of Oceania, but to assist our Latin brothers across the Americas to regain their independence, from Mexico to Patagonia.\n\nThe fight will not be an easy one, especially with a power as great as Oceania, but with strength and determination, we shall overcome and take our independence not only for ourselves but for all of the Americas.§!"