l_korean:
 GNB_Colony:0 "Colony of New Bissau"
 GNB_Colony_DEF:0 "The Colony of New Bissau"
 GNB_Colony_ADJ:0 "Portuguese"
 GNB_A_Foreign_Monarch:0 "A Foreign Monarch"
 GNB_A_Foreign_Monarch_desc:0 "\n\n\n\n£GFX_GNB_A_Foreign_Monarch_Banner\n\n\n\n\n\n\n§WDuarte, King of Bissau and heir to the crown of Portugal, is a King in an unfamiliar continent, presiding over what was once a colony of his lost kingdom. Home is a distant memory and his fellow Portuguese countrymen are few in contrast to the native and European refugee population of Bissau.\n\nThough the King remains firm in his vision to hold onto Bissau, maintaining it as a bastion of European monarchism in the hopes to one day return to the Portuguese homeland, his rule is a tense one at best.§!"
 GNB_Growing_Native_Unrest:0 "Growing Native Unrest"
 GNB_Growing_Native_Unrest_desc:0 "\n\n\n\n£GFX_GNB_Growing_Native_Unrest_Banner\n\n\n\n\n\n\n§WWith the continued rule of the Portuguese over their homeland and the continued influx of refugees from Europe and the Americas, the natives have grown discontent with the rule of the King with some minor rebel factions emerging in more native dense sections of the kingdom.\n\nWhilst the army has the situation well in hand for the time being, the situation could easily spiral if we are to become too careless with the already wary native population.§!"
 GNB_European_Refugee_Haven:0 "European Refugee Haven"
 GNB_European_Refugee_Haven_desc:0 "\n\n\n\n£GFX_GNB_European_Refugee_Haven_Banner\n\n\n\n\n\n\n§WPrimarily from Europe, though having recieved refugees from the Americas, the refugees that have arrived to Bissau since the formation of the superstate of Eurasia that had occupied the Portuguese homeland long ago have made their way here in search of safety and cultural familiarity in a world dominated by the Godless forces of Oligarchical Collectivism.\n\nEach refugee brings with them their own horror stories of life in the homeland and in other territories, across the globe, giving us even greater reason to hold onto this little bastion of old Europa and to defend our way of life with everything we've got.\n\nThe cost of settling these refugees on our territory is costly, indeed, but it is a price well worth paying.§!"