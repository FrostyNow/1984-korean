 BRA_Masters_Of_The_Amazon:0 "Masters of the Amazon"
 BRA_Masters_Of_The_Amazon_desc:0 "\n\n\n\n£GFX_BRA_Masters_Of_The_Amazon_Banner\n\n\n\n\n\n\n§WFor many long years, the Brazilian Army has waged a guerrilla campaign of sabotage and resistance against the Oceanian occupation in the depths of the vast Amazon Rainforest. We know this rainforest like the back of our hands now, mastering this territory and taking advantage of it in ways Oceania could only dream of.\n\nThe Amazon is our fortress, and now it will serve as our spring board to retake the rest of our native Brazil.§!"
 BRA_Amazonian_Tribal_Translators:0 "Amazonian Tribal Translators"
 BRA_Amazonian_Tribal_Translators_desc:0 "\n\n\n\n£GFX_BRA_Amazonian_Tribal_Translators_Banner\n\n\n\n\n\n\n§WRemaining within the depths of the Amazon Rainforest, it is unsurprising that we've had to interact and work with the various tribal groups that we share this expansive jungle with.\n\nThough we may be different, with the Oceanian encroachment upon tribal lands in an effort to foricibly integrate them into their system, we and the tribes have come together in alliance to fight against Oceania and it's armies.\n\nThis alliance has thus been massively beneficial to our cause, especailly when it comes to exploiting local knowledge and protecting communications & intelligence from prying enemy eyes and ears.§!"
 BRA_Vanguards_Of_Christ:0 "Vanguards of Christ"
 BRA_Vanguards_Of_Christ_desc:0 "\n\n\n\n£GFX_BRA_Vanguards_Of_Christ_Banner\n\n\n\n\n\n\n§WThough Oceania has largely shattered our country and has enforced upon our people their ideas of Atheism and the cult of Big Brother, trying to replace the true Messiah with a false God, the fact remains that Brazil is a land that belongs to Christ.\n\nThoguh we have struggled and have endured hardship, we have kept our faith and trusted that in the end, victory is and will always be on our side.\n\nAs we march from the Amazon down to Rio, let us keep God in our hearts and remain ever vigilant of his enemies, for victory is with God and we are with God!§!"