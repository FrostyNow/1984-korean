l_korean:
 CZE_country_selection_tt:0 "§YHOW TO PLAY THE CZECHOSLOVAK LEGION\n-----------------------------------------§!\nPlay as the §REurasian Union State§!, play through content until the province breakdown prior to the revolts occurs. When this occurs, open the decision menu and scroll down to the §Y'Legacy of Nations'§! decision menu and click the decision to switch to the §YCentral European Socialist Republic§!\n\nWait until the event to switch to the §BCzechoslovak Legion§! pops up."
 1984_Opening_Screen_CZE_Title_TT:0 "§BCZECHOSLOVAK LEGION§!"
 1984_Opening_Screen_CZE_Desc_TT:0 "After the 2nd World War, §BCzechoslovakia§! was promised independence, but in the February 1948, §RCommunist Party of Czechoslovakia§! took over the whole nation, ending any semblance of Democracy from before the war.\n\nWhen the §ROperation: Unthinkable§! began, Europe had fallen into even more bloodshed. During the war, more and more extreme measures were put into place and then the §REurasian Union§! was formed after the §RSoviet Union§! took whole Western Europe.\n\nFew years later, in the §RCentral European Socialist Republic§! there was an attempt to reform the system, at first the things were smooth and have bringed hope for the people. It was called the Prague Spring and it had brought hope to the people in the §YCentral European Socialist Republic§! for a brief moment. But all things came to end as the §RKapitalgrad§! has decided to arrest the Reformists and have sent the Army. In the streets of the largest cities in Central Europe have crowded in tanks and other military vehicles and have killed every protester seen on the streets and because of that, over 50,000 people have been killed and injured and over 100,000 went missing.\n\nAfter all that, the reforms have been reversed and §RNormalization§! has been implemented and even more strict rules have been put into place. But in the underground and in rural parts of the §YCentral European Socialist Republic§!, partisan groups have started to grow in popularity in the countryside.\n\nIn the year 1984, a final nail in the coffin was placed into the Eurasian Union as they tried to remove our language from existence and replace it with Eurasian language. People have gone back into streets and started protesting and even though the Kapitalgrad Government has tried to stop the protests, a new crisis internally has happened and §RBeria§! has died and cause of that, the East has collapsed into anarchy. So we took our chances and struck against the Eurasian occupiers. \n\nOur Partisans and dissidents have taken over Bratislava and Brno and its surroundings from the collapsing Eurasian control on European continent.\n\n§BBut will we prevail?§!\n\n§ROr this is will be our end?§!"
 1984_Opening_Screen_CZE_Gameplay_Paths_Desc_TT:0 "§BCzechoslovak Paths§!\n- Crush the §REurasian§! scum and slowly rebuild the nation from ashes, then choose the future of §BCzechoslovakia!§!"
