 CZE_Truth_Prevails:0 "Truth Prevails"
 CZE_Truth_Prevails_desc:0 "For months, the land itself seemed to bleed. Artillery thundered through the Tatras, rivers carried bodies alongside water, and cities trembled under marching boots. Then, one by one, the guns fell silent.\n\nWhen peace returned, the people poured into the streets. Bells rang, flags bloomed from balconies, and a nation that had whispered for years finally spoke aloud. The nightmare ended at dawn. The Neo-Bolsheviks crimes belong to history now.\n\n§RThe truth has prevailed!§!"
