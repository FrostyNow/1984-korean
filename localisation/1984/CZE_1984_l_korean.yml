 CZE_This_is_our_last_Chance_desc:0 "\n\n\n\n£GFX_CZE_This_is_our_last_Chance_Banner\n\n\n\n\n\n\n§WWe have one last opportunity to stand against the Neo-Bolshevik vermin after all they have done to our glorious nation. Volunteers across the country are going to the new Legions, just like during the First World War, but this time the fight is not abroad, but here on our own land.§!\n\n§BWe will not surrender.§!\n\n§RWe will not submit.§!\n\n§WWe will fight to the last man, for our homeland and our freedom.§!"
