 NPA_Various_Factions:0 "Various Factions"
 NPA_Various_Factions_desc:0 "\n\n\n\n£GFX_NPA_Various_Factions\n\n\n\n\n\n\n§WThere are various factions within the New Peoples Army ranging from Maoists to Moderate Socialists, this makes it difficult for internal governance and party unity, far from our goals of National Democracy. Furthermore there is a large movement of Cordillera Autonomy Fighters in the heart of our guerilla operations.§!"
 NPA_Unending_Struggle:0 "Unending Workers Struggle"
 NPA_Unending_Struggle_desc:0 "\n\n\n\n£GFX_NPA_Unending_Struggle\n\n\n\n\n\n\n§WThe New Peoples Army has fought for twenty years. Our struggle is an unending one and will only end when the workers of the Philippines are liberated from their slavery under the landlords. We have many experienced fighters and leaders from our conflict and many more inspired by our struggle. It shall take another twenty years just to beat us back to where we started.§!"