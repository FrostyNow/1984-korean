l_korean:
 JOSE_MARIA_SISON_DESC:0 "§WJose Maria Sison, leader of the new Philiippine Revolution and Chairman of the Communist Party of the Philippines.\n\nBorn in Ilocos to a land owning political family, he studied in various universities before ending up in the PKP, lead by Luis Taruc, joining the first revolution only to be crushed by the last salvo of American aid. Co-founding the Makabayan youth he eventually split in the First Great Rectification Movement, later founding a new Philippine Communist Movement and later the New People’s Army.\n\nIt has been twenty years that he has fought against the capitalist oligarchs of Imperial Manila, now fighting amongst themselves. He has liberated millions of people now with the fall of their authority, and now it has come to this. The final step to revolution in the Philippines. The best opportunity to allow a red star to rise over the Philippines, once and for all.§!"
