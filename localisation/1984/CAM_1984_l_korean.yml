 CAM_The_Call_Of_Angkar:0 "The Call of Angkar"
 CAM_The_Call_Of_Angkar_desc:0 "\n\n\n\n£GFX_CAM_The_Call_Of_Angkar_Banner\n\n\n\n\n\n\n§WAngkar is the divine voice of the revolution, urging all citizens to leave behind the old, corrupt ways of life and embrace the revolutionary ideals of Angkar, the collective force of the people. The Party represents the will of the nation, and to serve Angkar is to serve the future of Kampuchea. Every individual must discard their personal identity, submitting entirely to the unity of the collective. All who hear the Call must surrender their lives to the cause, with no room for doubt or hesitation. Angkar guides the people toward purity through obedience, and those who fail to answer will be cleansed. The revolution demands that the people join in unison to forge a new Kampuchea, where the Party alone dictates the path.§!"
 CAM_Radical_Agrarian_Reform:0 "Radical Agrarian Reform"
 CAM_Radical_Agrarian_Reform_desc:0 "\n\n\n\n£GFX_CAM_Radical_Agrarian_Reform_Banner\n\n\n\n\n\n\n§WRadical Agrarian Reform is the foundation upon which the new Kampuchea is built. The cities, full of their decadence and capitalist decay, must be dismantled, and the people must return to the land. The true strength of the nation lies in the peasants, the backbone of the revolution. All who are willing to serve must leave the cities behind and join the collective farms, where their labor will fuel the nation’s rebirth. Under this reform, the land will be cultivated not by individuals, but by the collective will of the people, guided by the Party. The urban centers will be purged, and the fields will flourish under the watchful eyes of Angkar. This return to agrarian purity will create a self-sufficient and revolutionary Cambodia, free from the corrupting influences of the past.§!"
 CAM_Anti_Urbanite_Campaign:0 "Anti-Urbanite Campaign"
 CAM_Anti_Urbanite_Campaign_desc:0 "\n\n\n\n£GFX_CAM_Anti_Urbanite_Campaign_Banner\n\n\n\n\n\n\n§WThe Anti-Urbanite Campaign is a necessary purge of the decadent forces that have tainted our land. The cities are filled with those who have been corrupted by capitalist greed and intellectual poison. The bourgeoisie, the intellectuals, and those who have lived in the urban centers must be removed to restore purity to the revolution. These elements have no place in the new Kampuchea, and their destruction is essential to the cleansing of the people. Citizens must be moved to the countryside, where they will learn the true value of labor and unity in the collective farms. This campaign is the process by which we will rid our nation of all traces of the old order, creating a society of pure, devoted revolutionaries who live and work in harmony with the land. The urban centers will be abandoned and erased, and their people forced to start anew in the fields, where they will contribute to the greatness of Angkar.§!"