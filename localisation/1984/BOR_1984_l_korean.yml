 BOR_March_Of_The_Afrikaans_idea_desc:0 "\n\n\n\n£GFX_RHO_Legacy_Of_Rhodes_idea_Banner\n\n\n\n\n\n\n§WThe Afrikaans language is one that is unique to the Boer People. Due to the enforcement of Newspeak throughout the Frontier Province of Oceania, many of the administrators are not as familiar with the language as they should be. This gives us an advantage against the hordes of Oceanian loyalists, as we are more freely able to use our language to transmit information and strategy without fear of Oceania being able to efficently decipher what we are planning before we can do it.§!"