 UKR_secret_event_decision:0 "Secret Event"
 UKR_secret_please:0 "§RPlease click on this decision only when you have completed the unification of Ukraine under the democrats or nationalists, so that the scenario looks complete!§!"
 UKR_new_army_decision_category:0 "New Army"
 UKR_new_army_decision_category_desc:0 "After the start of full-scale fighting, it turned out that our army was very outdated: the main tactics are guerrilla battles, and the tactics of offensive operations have not changed since the Second World War. We need immediate reforms if we want to survive in this burning world."
 UKR_New_Army_Change:0 "Modify §Y$UKR_We_Are_Forest_Devils$§! by:"
 UKR_better_arms_decision:0 "Rearm the army"
 UKR_better_arms_decision_desc:0 "Open weapons depots and our guerrilla attacks have given us access to better weapons than we have now - in fact, any Eurasian rifle will be better than what we have to fight with. By disposing of outdated equipment and issuing newer models to soldiers, we will deal with the mishmash of weapons from different times and nations that hampers our army."
 UKR_new_tactics_decision:0 "New Tactics"
 UKR_new_tactics_decision_desc:0 "Partisan attacks have served us well for the past half century, but on this scale it is unprofitable to use them as the main tactic. We must concentrate on something more than small raids on the enemy."
 UKR_reintegrate_ukraine_decision_category:0 "Reintegrate Ukraine"
 UKR_reintegrate_ukraine_decision_category_desc:0 "Our native lands, which were defined by the Ukrainian People's Republic and the USSR, are gradually returning to our hands. But these lands are inhabited by people who have forgotten their origins and, after Eurasian and tsarist oppression, are hostile to any other rule. By organizing methods that have already been tested in the North, we will be able to awaken national consciousness in these regions and peacefully unite them with us."
 UKR_reintegrate_transcarpathia:0 "Reintegrate Transcarpathia"
 UKR_reintegrate_transcarpathia_desc:0 "The new territories acquired as a result of the Balkan Pact agreement are characterized by strong Hungarian nationalism, which served as the basis for Hungary's claims to this territory. Supporting and organizing the Ukrainian population, as well as granting rights to national minorities, will assist us in stabilizing this region."
 UKR_Carpathia_Reintegrated:0 "Caprapthia Reintegrated"
 UKR_reintegrate_kharkiv:0 "Reintegrate Kharkiv"
 UKR_reintegrate_kharkiv_desc:0 "The homeland of tank building - it was from here that the first T-34s set out to destroy the German invasion. This region must remember its valor and heroism!"
 UKR_Kharkiv_Reintegrated:0 "Kharkiv Reintegrated"
 UKR_reintegrate_donbas:0 "Reintegrate Donbas"
 UKR_reintegrate_donbas_desc:0 "The region, which supplies Ukraine with coal and metallurgy, has quite radical views on its own definition. Perhaps we will be able to find common ground with them, as we did with the Lviv miners at the time."
 UKR_Donbas_Reintegrated:0 "Donbas Reintegrated"
 UKR_reintegrate_south:0 "Reintegrate Sourthern Ukraine"
 UKR_reintegrate_south_desc:0 "The southern plains from Odesa to Mariupol have always been heavily Russified, and recently also Eurasianized. By introducing gentle Ukrainization and supporting minorities, we are reintegrating these lands and preventing mass separatism from tearing them apart."
 UKR_South_Reintegrated:0 "Southern Ukraine Reintegrated"
 UKR_reintegrate_crimea:0 "Reintegrate Crimea"
 UKR_reintegrate_crimea_desc:0 "The Crimean peninsula has been severely affected by wars and the deportation of the Crimean Tatars. This people is quite sympathetic to Ukraine and will coexist comfortably with it if we help them recover from all the upheavals."
 UKR_Crimea_Reintegrated:0 "Crimea Reintegrated"
 UKR_declare_ukrainian_reunification:0 "Ukrainian reunification"
 UKR_declare_ukrainian_reunification_desc:0 "Finally, all our lands are united by common thoughts and goals. Now the Ukrainian people will be united in their great and glorious country, and other peoples living in this territory can live freely and self-determine without fear of repression."
 united_ukraine:0 "Ukraine united"
 great_ukraine:0 "Great Ukraine proclaimed"
 UKR_move_border_to_caucas:0 "Move border to Caucas"
 UKR_provoke_south:0 "Provoke South"
 UKR_provoke_south_desc:0 "Although we prefer a less aggressive foreign policy, the very idea of sitting and waiting for the tsarists or Eurasianists to consolidate their power in the south is foolish in itself. Instead, we could stage a border skirmish, as a result of which Ukrainian troops would be \"broken and flee\", and the enemy, sensing our \"weakness\", would go on to \"liberate\" the northern territories. The main thing is that we are prepared for such maneuvers."
 UKR_new_rus_decision_category:0 "New Rus"
 UKR_new_rus_decision_category_desc:0 "We are ready to return to where we started. The ancient, beautiful state that inspired awe, respect, and fear in all around it, which could only be destroyed by a wave of force, will return to the world map, dominating its enemies."
 UKR_proclaim_rus:0 "Proclaim §Gthe Holy Rus§!"
