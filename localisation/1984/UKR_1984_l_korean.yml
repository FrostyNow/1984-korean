 UKR_Ready_To_The_Strike_Idea:0 "$UKR_Ready_To_The_Strike$"
 UKR_Rus_Knowledge:0 "$UKR_Cradle_Of_Knowledge$"
 BLR_Trade_Opinion:0 "Belarusian-Ukrainian Trade"
 Trade_With_Free_Europe:0 "Trade With Free World"
 Good_Neighbor_Policy:0 "Good Neighbor Policy"
 Scandinavia_Friend:0 "Pact Rus-Scandinavia"
 Rus_Sca_Faction_Name:0 "Pact Rus-Scandinavia"
 UKR_We_Were_Born_At_A_Great_Hour:0 "Zrodylys' my Velykoyi Hodyny"
 UKR_We_Were_Born_At_A_Great_Hour_desc:0 "When Eurasian hegemony is bursting at the seams, the sons and daughters of a forgotten country for half a century ago emerged from the shadows. From the fires of war and the flames of fire to make a loud statement to the whole world:\nFor centuries, a state has existed, exists, and will continue to exist on these lands, from the time when there was no Eurasia, no Lavrentiy Beria, no Dnieper District. And its name is §BUkra§!§Yine!§!"
 UKR_Ruthenian_Ukrainian_Question:0 "The enemy of my enemy..."
 UKR_Ruthenian_Ukrainian_Question_desc:0 "In addition to us, several other uprisings have broken out across the Dnieper Military District, each with its own plans for the region. It’s hard to call them friends, but their struggle is helping us hold our ground during these difficult times. And at the very least, for the duration of the war, we must stand together."
 UKR_Raise_The_Militia:0 "Raise the Militia"
 UKR_Raise_The_Militia_desc:0 "This uprising against the dictatorship was initially led by OUN fighters: old wolves who had survived for years in the forests of western Ukraine, trained by the wild. These fighters know the landscape of Ukraine like the back of their hand, but they are not enough to stand up to the disorganized but numerous neobolshevik army. Since the government was missing a few rifles and a handful of ammunition during the collapse of Eurasia, the best option now would be to give them to someone who is willing to fight for Ukraine, even if they don't know how.\n\nA peasant, a student, a Eurasian deserter - anyone with a fire in their heart can become the sword of the people."
 UKR_Anger_Fed_Us:0 "Kormyv nas Hniv ta Zlist' na Vorohiv"
 UKR_Anger_Fed_Us_desc:0 "While Eurasia was destroying everything that was precious to us - literature, memory, history, culture, language - we sat, cherishing it in our hearts, and accumulating anger. Because of the chaos, we can only cherish what we managed to save.\n\nAnd get angry.\n\nSo that later this anger could wash away everyone who wants to take away what we have been saving for so long."
 UKR_Restore_Western_Industry:0 "Restore Western Industry"
 UKR_Restore_Western_Industry_desc:0 "During the collapse of Eurasia and the Dnipro District, the insurgents made every effort to undermine the enemy's production capabilities. Now that our liberation movement has grown into a full-fledged war, we need to resume production of weapons and civilian goods.\n\nWe have many industrialists and workers on our side who knew these factories and helped to damage them, so they can restart production at a rapid pace."
 UKR_Build_Roads:0 "Build Frontier Roads"
 UKR_Build_Roads_desc:0 "All the logistics that the UIA knew for decades were specialized people who moved secretly between hideouts, passing equipment. In today's environment, this is inefficient; an effective army must make efficient use of roads and convoys of vehicles so that soldiers never lack ammunition or equipment."
 UKR_Repair_Lviv_Mines:0 "Repair Lviv Mines"
 UKR_Repair_Lviv_Mines_desc:0 "When communications between Lviv and Kyiv collapsed, an organized group of miners staged mine collapses in several places, burying resources and mining equipment. Following instructions from the UIA and their own knowledge, they made a series of explosions in special places that had a tangible effect and, if necessary, these rubble could be quickly removed. Now, while these mines are under our control, it is time to resume their work so that our rebuilt factories can receive steel for weapons."
 UKR_Tank_Industry:0 "Ukrainian Tank Industry"
 UKR_Tank_Industry_desc:0 "\"If we had had at least one tank division back in '41, we would never have been broken.\" - Vasyl Kuk.\n\nAs much as we hate to admit it, it is enemy tanks that are now the biggest problem for our army. The heart of the tank industry, Kharkiv, is now in the hands of another district, and it will not soon be ready to provide us with the famous Kharkiv tanks. But fortunately, there is a whole tank complex in western Ukraine that used to produce the outdated but reliable T-72s for Eurasia. There are still a large number of chassis and turrets in its warehouses, and if we make efforts to restore it, a hundred tanks will leave its walls to strike and defeat the enemy."
 UKR_Repurpose_Civilian_Logistics:0 "Repurpose Civilian Logistics"
 UKR_Repurpose_Civilian_Logistics_desc:0 "The civilian logistics that Eurasia has set up to connect the districts are now actively idle, so while our citizens are working to win and the districts are burning with rebellion, railcars will be used to transfer equipment and soldiers to the battlefields."
 UKR_Afterwar_Economic_Planning:0 "Afterwar Economic Planning"
 UKR_Afterwar_Economic_Planning_desc:0 "Our economists are almost going crazy now - although we have ensured reliable production during the war, this attitude to the economy threatens to collapse in the future. That is why they are demanding that we reduce spending on the army and focus on long-term planning so that we do not face a crisis and mass starvation after the war. Although the military command criticizes this decision because it will reduce our defense capabilities in such a difficult time, the majority in the government recognizes that in the long run our young state will only benefit from it."
 UKR_Afterwar_Economic_Planning_tt:0 "We will §Greduce our pressure on the economy§! to allow it to §Gdevelop§!. If we raise the pressure again before we have at least §Y25 civilian factories§!, it will threaten §REconomic Collapse§!."
 UKR_Explore_Abandoned_Armories:0 "Explore Abandoned Armories"
 UKR_Explore_Abandoned_Armories_desc:0 "The current weapons situation, while still stable, is extremely chaotic. Most of the rebels are armed with weapons that their grandfathers could theoretically have used to fight - these weapons are unreliable and cannot compete with the modern models used by Eurasia. When we were driving the enemy army out of the western regions of Ukraine, it was forced to leave behind some weapons depots that had not been removed or destroyed. Their use will allow us to replenish our stocks and at least partially modernize our army's weapons."
 UKR_New_Tactics:0 "New Tactics"
 UKR_New_Tactics_desc:0 "The first large-scale battles showed us how outdated our army is in terms of strategy. For decades, our army has been hiding, striking from the shadows, only to quickly escape into them. Although even now, in conditions of chaos, any tactic can withstand the enemy, but when he recovers and gets organized... Therefore, we better start planning the tactics of a large-scale war to prevent the enemy from recovering."
 UKR_Support_Paramilitary_Organizations:0 "Support Paramilitary Organizations"
 UKR_Support_Paramilitary_Organizations_desc:0 "There are many people in the liberated territories who want to fight, but due to the current recruitment process and the UIA's inability to arm everyone, they are forced to sit and wait. However, many of them are ready to organize themselves into military groups. If we give them the green light, we will see new capable units and new capable officers on the battlefield."
 UKR_Modern_Cossacs:0 "Modern Cossacs"
 UKR_Modern_Cossacs_desc:0 "Infantry alone, even with the support of artillery, is not able to effectively break through the front and surround enemy troops. We need fast troops, like the ancient Cossack horsemen who broke through the enemy's defenses and did not allow them to escape."
 UKR_Restore_Millitary_Airports:0 "Restore Military Airports"
 UKR_Restore_Millitary_Airports_desc:0 "Previous wars have taught us that it is important to control not only the front on the ground, but also the front in the sky. After the nuclear war, the great powers froze the idea of controlling other dimensions of war besides the ground.\n\nBut we are not so stupid. Our enemies' forgotten fighters and attack aircraft will fly out of the hangars and unleash their anger on their heads."
 UKR_Deterrence_Army:0 "Deterrence Army"
 UKR_Deterrence_Army_desc:0 "There is no point in throwing people at the enemy in the hope that he will break. Our main tactic should be to maintain a defense that will slowly exhaust the enemy, and only then will our army finish off a half-living enemy."
 UKR_Lightning_Army:0 "Lightning Army"
 UKR_Lightning_Army_desc:0 "There is no point in sitting in the trenches and waiting for the opposing side to make at least some moves. We need to take the initiative and attack, attack and attack again. Tanks and motorized vehicles will push our infantry through the enemy until there is no enemy left to resist us."
 UKR_Revive_Science:0 "Revive Science"
 UKR_Revive_Science_desc:0 "All Eurasian research institutes were closed and forgotten as relics of the past. In the conditions of eternal war, there is no need for innovations that will destroy the enemy. But we are tired of fighting forever, we need an enemy that has already been destroyed. It's time to revive research and start looking for a way to destroy the enemy with the greatest efficiency."
 UKR_Stuses_Learning_Methodics:0 "Stus's Learning Methodics"
 UKR_Stuses_Learning_Methodics_desc:0 "Living conditions in Eurasia have led to a massive dumbing down of the population - most of the population does not have basic skills such as reading and writing, has poor command of even one language, and is not capable of critical thinking. The new methods of basic education developed by Vasyl Stus should help not only young people learn the Ukrainian language or math, but also develop the ability to research information and form their own vision among adults."
 UKR_Revive_Theaters:0 "Revive Theaters"
 UKR_Revive_Theaters_desc:0 "The theater has always been the largest center of Ukrainian culture: hundreds of plays written by dozens of famous writers have shown the history of the Ukrainian nation from significant events to everyday life. Eurasia mercilessly destroyed this center of culture, but under the protection of the new Ukraine, it will flourish again."
 UKR_Our_History:0 "Our History"
 UKR_Our_History_desc:0 "It is unacceptable for the unity of our nation when it does not even understand the meaning of the word \"Ukraine\" in a basic way. From schools to public meetings, historical lessons and discussions should be held to familiarize people with the past. The founding of Kyiv, Rus-Ukraine, the Hetmanate, the UPR, the UIA - people should be proud of their rich past and take care not to repeat the mistakes of the past and carry its knowledge into the future."
 UKR_Lviv_Alma_Mater:0 "Lviv Alma Mater"
 UKR_Lviv_Alma_Mater_desc:0 "Not only schools, but also higher education require reforms. The opening of Lviv National University will be the beginning of reforms in professional higher education, producing new scientists, specialists and inventors who will move the country forward."
 UKR_Blue_Yellow_Flag_Of_Freedom:0 "Pid Synyo-Zhovtym Praporom Svobody"
 UKR_Blue_Yellow_Flag_Of_Freedom_desc:0 "We have done it! Our enemies have been defeated, and the name Ukraine is once again shining on the world's maps. Although it is now divided and exists only within the former Dnieper District, the blue and yellow flag is once again flying over Kyiv, demonstrating to the world the will and indomitability of our people!"
 UKR_Form_UNA_UNSO:0 "Form UNA-UNSO"
 UKR_Form_UNA_UNSO_desc:0 "The war is over, and all the problems of the state have come to light from under the melted snow. We must act quickly - if we do not stabilize the state immediately, we will drown in civil unrest. The OUN is considering the idea of creating a separate political organization, but we will develop it into a political party so that people filled with nationalist ideas can influence the situation in the state."
 UKR_Political_Stability:0 "Political Stability"
 UKR_Political_Stability_desc:0 "If we want to maintain stability, we must establish ourselves as the legitimate government of Ukraine. A government that will protect its citizens from the influence of even more radical movements and anarchy."
 UKR_National_Democracy:0 "National Democracy"
 UKR_National_Democracy_desc:0 "The idea of a single government in difficult times can easily lead us to despotism and dictatorship. Although we are taking a risk by changing our ideas on the fly, the democrats, currently led by Prime Minister Vasyl Stus, have many good ideas and solutions that can help us in these difficult times."
 UKR_Organise_Oblasts:0 "Organise Oblasts"
 UKR_Organise_Oblasts_desc:0 "If we want to show the people that they have power over their own political life, we must give them the opportunity to solve problems locally. We will partially decentralize power, appoint local administrations, and hold mayoral elections so that cities and regions can better organize their own affairs."
 UKR_Police_Reform:0 "Police Reform"
 UKR_Police_Reform_desc:0 "The old Eurasian police force is a politicized and corrupt system designed to be the sword of the government, not the shield of the people. We will conduct a re-certification of personnel and reform the National Police of Ukraine to rid it of old ideas."
 UKR_Control_Over_Radicals:0 "Control Over Radicalism"
 UKR_Control_Over_Radicals_desc:0 "Open fascists, communists, and who knows who else are trying to destabilize the political system by promoting ideas that led to collapse in the past. The special services will organize surveillance and detention of the most active propagandists of these ideas and bring them to justice."
 UKR_Destroy_Eurasianists:0 "Destroy Eurasianists"
 UKR_Destroy_Eurasianists_desc:0 "Remnants of neobolshevism still exist in the country, poisoning the stream of statehood that we have worked so hard to establish. Today, they evoke nostalgia for the past in pensioners and grief over the loss of stability in the homeless and drunks, and tomorrow they will call for terrorism and strikes to destroy the \"false Bandera-Jewish government\". Either we will crush them, or they will crush us."
 UKR_Clean_Out_NKVD:0 "Clean Out NKVD"
 UKR_Clean_Out_NKVD_desc:0 "Our biggest problem is what we cannot see. After the war began, the NKVD's internal intelligence service in Eurasia managed to flee abroad or go underground, taking with them or destroying all the evidence against them. Even if we have to gather documents from the ashes or search for traitors among every person, we will seek out the remnants of the NKVD and destroy them once and for all, before they destroy us."
 UKR_Propaganda: "Antieurasian Propaganda"
 UKR_Propaganda_desc:0 "For every measure, there must be a countermeasure. Grandmas sitting on benches in the yard talk about the golden days of \"ice cream for three kopecks\", \"sausage for 2.20\", and \"the good Eurasian people\". Great, we have something to remind them of as well. Hours-long queues for bread with ration cards, shortages of basic necessities, the destruction of free thought and human uniqueness. Feel free to reminisce about that!"
 UKR_Hate_For_Eternal_Father:0 "Hate For Lenin"
 UKR_Hate_For_Eternal_Father_desc:0 "The people's anger cannot be suppressed forever; it must be directed at someone. And we have a candidate - Lenin, the reason for the emergence of the USSR and later Eurasia, the reason for the defeat of the Ukrainian People's Republic in World War I. His face is literally associated with neobolshevism and Eurasia. So let the anger of the people for all the hardships they had to endure be directed at him."
 UKR_Where_The_Vozhd:0 "Where the Vozhd?"
 UKR_Where_The_Vozhd_desc:0 "After we gained independence, everyone was tormented by one question: where was this apostle of the Ukrainian revolution, whom we so often referred to and mentioned? This question also torments our government, because after Stepan Bandera remained in Germany until the 1950s, no information about him or the rest of the OUN leadership abroad during or after the nuclear war was received.\n\nFortunately, some documents were found among the captured remains of the NKVD, which for some reason were not destroyed or transported, and they partially shed light on the events of those times. This issue only needs to be investigated in more detail."
 UKR_Court_On_Eurasian_Servants:0 "Court On Eurasian Servants"
 UKR_Court_On_Eurasian_Servants_desc:0 "Finally, all remnants of the NKVD and their assistants were crushed and captured. There is more than enough evidence against them, which testifies to their activities before and after the Ukrainian uprising. Now they will face a grand and just trial, which will be seen by all of Northern Ukraine."
 UKR_Court_On_Eurasian_Servants_effect:0 "§R$UKR_Unstable_Politics_Unstable$§! now become §G$UKR_Unstable_Politics_Stable$§!"
 UKR_New_Economy:0 "New Economy"
 UKR_New_Economy_desc:0 "The economy of Ukrainian territories is largely agrarian - Eurasia supported the idea of a \"breadbasket of Europe\" and practically did not develop industry in these territories. But now, as an independent state, we need our own industry. The rebuilt factories of Eurasia will be the beginning of it."
 UKR_Northern_Industry:0 "Northern Industry"
 UKR_Northern_Industry_desc:0 "The north is our current foundation. It is protected from attacks by Belarus, which is now loyal to us, so we can focus the core of our economy here. By transferring land and abandoned industrial facilities to the right people, we will get several new factories in return."
 UKR_Revive_Poltava:0 "Revive Poltava"
 UKR_Revive_Poltava_desc:0 "Poltava is the heart of metallurgy, which has been prevented from beating. Beneath these lands lie large deposits of ferrous and non-ferrous metals, which Eurasia has rejected, focusing its attention on wheat fields. The time has come to allow this heart to beat, so that metal blood can flow through Ukraine's veins."
 UKR_Ukrainian_Belarusian_Trade:0 "Ukrainian-Belarusian Trade"
 UKR_Ukrainian_Belarusian_Trade_desc:0 "Although the Ukrainian and Belarusian peoples have recently clashed in war, we clearly understand that hostility between such small states threatens the disappearance of both. We will organize closer trade ties and ensure that no one here is left behind."
 UKR_Western_Industry:0 "Western Industry"
 UKR_Western_Industry_desc:0 "The West became our refuge in such difficult times, our fortress and our hope. Here, people learned to unite and support each other, and were baptized by fire. Now we will restore neglected production facilities so that the West continues to be the hope of all Ukraine."
 UKR_Open_New_Mines:0 "Open New Mines"
 UKR_Open_New_Mines_desc:0 "Although the deposits in the west are nowhere near as substantial as those in southern Ukraine and Donbas, they are still a significant resource that can support our industry in difficult times."
 UKR_Trade_With_Free_Europe:0 "Trade With Free World"
 UKR_Trade_With_Free_Europe_desc:0 "In Europe, dozens of nations are still fighting each other, some having plenty of something, while others are in dire need of it. Free trade must be established with all Free Worldan states so that everyone can get what they need and give away what they don't need."
 UKR_Sourthern_Industry:0 "Sourthern Industry"
 UKR_Sourthern_Industry_desc:0 "After the liberation of southern Ukraine, only empty steppes of burnt wheat and destroyed cities remained. The fighting was fierce and bloody, and we must immediately send more resources here to rebuild these regions."
 UKR_Strengthen_Donbas:0 "Strengthen Donbas"
 UKR_Strengthen_Donbas_desc:0 "Donetsk is the mining heart of Ukraine. By developing this region properly, we will obtain all the resources necessary for the development of our economy.."
 UKR_Industry_Center_In_Crimea:0 "Industry Center In Crimea"
 UKR_Industry_Center_In_Crimea_desc:0 "The Crimean Peninsula provides us with convenient access to the Black Sea, which has abundant oil deposits, as well as a sea route to the world's oceans. We need to establish an industrial center in the region that will meet all our maritime needs."
 UKR_Rise_Of_Democracy:0 "Rise Of Democracy"
 UKR_Rise_Of_Democracy_desc:0 "Recently, the growth of democratic forces led by Vasyl Stus and Vyacheslav Chornovil has become much more noticeable. The people are tired of everything being decided for them and without them, and have begun to openly demonstrate their desire to directly influence what is happening in the country. One more step, and the UNA will realize this and retreat."
 UKR_Good_Neighbor_Policy:0 "Good Neighbor Policy"
 UKR_Good_Neighbor_Policy_desc:0 "If we want to show the world our sincere intentions, we need to start with our neighbors. Although we may have had many quarrels and disagreements throughout history, in these times we need to leave them in the textbooks and move forward together toward a new future."
 UKR_Free_Trade:0 "Free Trade"
 UKR_Free_Trade_desc:0 "When we have ties with our neighbors, we can begin to pay attention to the rest of the world. Dozens of nations are now fighting for their freedom and seeking support. They have something to offer us, and we have something to offer them."
 UKR_Free_Nation_Volunteer_Group:0 "Free Nation Volunteer Group"
 UKR_Free_Nation_Volunteer_Group_desc:0 "Nowadays, the best way to show support for others is to help militarily. By sending volunteer corps to free nations, we will hasten the fall of world hegemons and achieve freedom for the whole world."
 UKR_Vozhd_Spirit:0 "Vozhd Spirit"
 UKR_Vozhd_Spirit_desc:0 "Now more than ever, the country needs a strong leader capable of leading it forward. Although the leader of the past war of liberation is no longer with us, his spirit still guides us into battle. All we need is someone to take up his mantle."
 UKR_Carpathian_Ukraine:0 "Carpathian Ukraine"
 UKR_Carpathian_Ukraine_desc:0 "Caprat Ukraine is our region that has been permanently separated from us. After declaring independence from Czechoslovakia in 1939, it was captured by the Hungarians the next day, and later, after the nuclear war, it was transferred to the Balkan District. Now this region is in the hands of the Balkans, but perhaps we have a chance to kill two birds with one stone, returning the Carpathians to Ukraine and breaking up the Eurasian District nearby."
 UKR_Return_Carpathia:0 "If the §YBalkan Liberation Front§! still §Gexists§!, we will send a proposal to the leader of the alliance[GetBalkanFactionLeader] to join the §RBalkan War§! in exchange for territory in §YTranscarpathia§!. If §YHungary§! exists at the time of the focus, it may §Rappeal this decision and refuse assistance§!, but if §YHungary§! capitulates after that, we will §Gresend it§!. If the §YBalkan Liberation Front§! has §Rsurrendered completely§!, we will §Rdeclare war on the Balkan district§! and §Gliberate it§!."
 UKR_GRE_leader:0 ", [GRE.GetNameWithFlag],"
 UKR_YUG_leader:0 ", [YUG.GetNameWithFlag],"
 UKR_ROM_leader:0 ", [ROM.GetNameWithFlag],"
 UKR_HUN_leader:0 ", [HUN.GetNameWithFlag],"
 UKR_No_Balkan_Leader:0 " "
 Return_Carpathia:0 "Return Carpathia to Ukraine"
 Greece_at_Crete:0 "Greece capital moved to Crete island"
 UKR_New_Economic_Course:0 "New Economic Course"
 UKR_New_Economic_Course_desc:0 "In the current situation, when we are surrounded by enemies, it is foolish to wait for salvation from outside. We need to organize our economy so that it can be completely self-sufficient."
 UKR_To_Ukrainian_Autarky:0 "To Ukrainian Autarky"
 UKR_To_Ukrainian_Autarky_desc:0 "There will be no \"breadbasket of Europe\" as long as it cannot provide for itself. Ukraine is now moving towards complete self-sufficiency, from breadcrumbs to tanks - we must be able to produce everything ourselves and in sufficient quantities."
 UKR_March_To_The_South:0 "March To the South"
 UKR_March_To_The_South_desc:0 "Now that the situation has stabilized everywhere, it is time for a unifying war. We will march south, into the territory of the former Black Sea District, to unite Ukraine before Eurasia seizes these territories. Whether the self-proclaimed kings of a long-fallen empire or the remnants of Lenin's slaves are sitting there now is irrelevant; we will crush everyone on our way to a free and united Ukraine."
 UKR_Vid_Syany_Po_Kavkaz:0 "Vid Sany Po Kavkaz"
 UKR_Vid_Syany_Po_Kavkaz_desc:0 "After such significant victories over the enemy, no one doubts what Ukraine is capable of. And now our gaze is directed outward. Now we have a chance to avenge all the insults we suffered in two world wars, when we were divided and destroyed for the benefit of others. Therefore, it is time to strike at the very heart of evil - at Kapitalgrad. We will liberate the territories of Ukraine that we claimed back in the 1920s and destroy the threat to the peace of the entire continent. §RSo if you don't help us, you'd better not stand in our way.§!"
 UKR_Ready_To_The_Strike:0 "Ready To The Strike"
 UKR_Ready_To_The_Strike_desc:0 "In the south and east, there are still enemies who want to destroy our little paradise, which we have worked so hard to build. Therefore, we must prepare for their attack. No matter who comes to us, no matter what ideology they try to bring, they will break their teeth on our steel army."
 UKR_Unexpected_Alliance:0 "Unexpected Alliance?"
 UKR_Unexpected_Alliance_desc:0 "Our intelligence constantly intercepts enemy communications from abroad. Coordination between disconnected districts is extremely poorly protected and uses outdated communication systems, which makes interception extremely easy. However, this time our colleagues from Belarus intercepted a signal that was very different from previous ones.\n\nAt the very least, it was extremely well protected."
 UKR_United_Indivisible:0 "United Indivisible"
 UKR_United_Indivisible_desc:0 "Finally, after a long journey, we are united and indivisible. Ukraine, from Lviv to Luhansk, from Sumy to Sevastopol, is finally together. And our happiness is to be this way. We are not messiahs who destroy world evil, nor are we barbarians who go to conquer what belongs to others, because long ago we considered it ours.\n\n§BWe are Ukrainians, and w§!§Ye are happy on our land.§!"
 UKR_Forgotten_Past:0 "Forgotten Past"
 UKR_Forgotten_Past_desc:0 "The current political arena in Ukraine is doomed to failure. Liberals are ready to swallow all the insults hurled at them by their enemies, while nationalists cling to a losing idea. It is time to return to something... something forgotten."
 UKR_Sign_From_The_Stars:0 "Sign From The Stars"
 UKR_Sign_From_The_Stars_desc:0 "The stars... Distant galaxies inhabited by unknown civilizations. Civilizations that have recently begun to show a strong interest in these lands. What message are they trying to convey to us?"
 UKR_Cradle_Of_Knowledge:0 "Cradle Of Knowledge"
 UKR_Cradle_Of_Knowledge_desc:0 "Rus was the cradle of knowledge for all of Europe. Yaroslav the Wise founded libraries and schools, taught his children, who married into European nobility, for whom reading and writing were only necessary for scribes and sages. We will continue to carry this burden of wisdom, giving knowledge to all who need and desire it."
 UKR_Identity_Issues:0 "Identity Issues"
 UKR_Identity_Issues_desc:0 "The issues of our people's identity are extremely important right now. Although we are moving toward another, long-forgotten state, Ukrainian identity is still quite strong in our lands. Do we need to create a new nationality, or build it on the basis of the existing one?"
 UKR_Pact_Rus_Scandinavia:0 "Pact Rus-Scandinavia"
 UKR_Pact_Rus_Scandinavia_desc:0 "Scandinavia is an ancient ally of Rus. Askold and Dir came from there, and the legendary route \"from the Varangians to the Greeks\" ran through there, filling our coffers. We must come to their aid so that they will come to ours in the future."
 Pact_Rus_Scandinavia_Effect:0 "We will help §YScandinavia§! in their war against the §REurasian District§!, if they §Gagree§!."
 UKR_Crusade_Against_Neobolshevism:0 "Crusade Against Neobolshevism"
 UKR_Crusade_Against_Neobolshevism_desc:0 "Neobolshevism is the plague of this world, infecting all nations. In the south and east, the centers of this plague thrive, ruining our lives. We will go on a holy crusade, freeing these lands from them."
 Crusade_Against_Neobolshevism_Effect:0 "Unlocks decisions that will allow us to destroy the §REurasian districts§! that control the §Yterritories we need§!."
 UKR_Purge_The_Unfaithful:0 "Purge The Unfaithful"
 UKR_Purge_The_Unfaithful_desc:0 "Our lands, to which we have a historical right, are being encroached upon by unfaithful nations who have forgotten their past and whom they should serve. So let the sword remind them."
 Purge_The_Unfaithful_Effect:0 "Unlocks decisions that will allow us to destroy §Rfalse ideologies§! that control the §Yterritories we need§! and threaten our §Gdreams§!."
 UKR_prewar_events.1.t:0 "Memories"
 UKR_prewar_events.1.desc:0 "The explosion outside the window caused Vasyl to drop his tongs with a cube of pressed sugar. Forgetting about his hot tea, he got up from the table, leaning on his cane, and went to the window. Pulling back the curtain, he saw a column of black smoke rising several blocks above the houses. Somewhere behind the residential neighborhoods were armories and a large artillery factory. Vasyl quickly closed the window with a curtain, returned to the table, sat down, and began to examine a piece of pressed sugar in the tongs. \"If the guerrillas,\" he thought, \"have gotten so bold as to terrorize even Kyiv, then the rumors about the collapse of Eurasia were not just rumors. Vasyl sat at the table, but he was no longer interested in tea. He was remembering. What he had promised to forget.\n\nHe remembered the time when he joined the OUN as a student. He remembered smuggling weapons to the partisans, escaping from the Polish police, night training, fighting German and Soviet soldiers, the battle near Gurba, the underground. He recalled Myron, Shukhevych, Onyshkevych, Bandera... Primas. \"What are these bastards thinking, there will be no new '41!\" - he hissed, getting up from the table and pouring the cooled tea into the sink.\n\nSitting down on the bed, he remembered Beria's face. Beria's face, the walls of the Moscow detention center, and the letter. A letter that only needed to be signed. A letter that would seal his entire past. Beria did not need martyrs. Just sign and forget. Vasyl propped his head up with his hand. To sign and forget - after the man in front of him had wiped Khrushchev off the map, such an offer from him was like a godsend. He remembered how he took the pen from his hand, and writing..."
 UKR_prewar_events.1.a:0 "\"With sincere greetings and respect - Vasyl Stepanovych Kuk\""
 UKR_prewar_events.2.t:0 "Executioner"
 UKR_prewar_events.2.desc:0 "A distant rumble distracted Alexei from his writing. He knew perfectly well that the partisans of a long-forgotten country had once again felt the winds of change in their empty heads, and that their activities would only add to his workload. In the context of decentralization and temporary isolation of districts, work was in full swing at the 5th Department of the NKVD of the Dnieper District. Dozens of cases were brought in, dozens of new ones were opened, dozens of arrest warrants were issued, and dozens of sentences were handed down. The victim could still walk the streets with impunity, while in offices like his, cases were being opened and sentences and their conditions were already being handed down. Court proceedings, like many other things in Eurasia, were show trials. A kind of spectacle for the people, where the state and the Lavrentiy Beria saved them from mad tyrants who dreamed of anarchy and chaos, ensuring stability and prosperity.\n\"Buzyna, are you done yet?\" The boss's voice distracted him from filling out another case file. \"The Second Department wants us to finish with the dissidents faster and help them with the rebel movements. There's still a lot of work to be done there. Because of their riots in the east wing, the windows are still broken.\"\n\"Don't rush me, I know. I'll finish these three files and then I'll go.\" The boss nodded and left the office, and Alexei reread the case he had been distracted from.\n\nA 47-year-old man who works in a shoe factory and kept banned Eastasian literature in his apartment is a dissident, repeat offender, activist, and poet. Additional charges have been brought, testimony has been given, but the verdict is unclear. About two years ago, a person with a shorter list was simply exile or \"removed\" (although many picked up the foreign term \"evaporated,\" Alexei prefers the old terms), but now, due to the temporary decentralization of Eurasia, Capitalgrad has given orders to temporarily hold criminals within the districts. \n\"We'll have problems with prison overcrowding,\" Alexei mused as he filled out the sentence..."
 UKR_prewar_events.2.a:0 "\"Temporarily imprison in Lvov colony\""
 UKR_prewar_events.3.t:0 "Devil in a suit"
 UKR_prewar_events.3.desc:0 "He couldn't stand looking at this man. He literally reeked of the Komsomol, party leaflets, and neobolshevik propaganda. And this man would be defending him in court - a man recognized by Eurasia as a \"particularly dangerous repeat offender.\" The dark-haired lawyer placed his briefcase next to the table where the defendant was chained, put the case file on the table, and sat down. \"You can just call me Victor,\" said the lawyer, opening the folder. \"So, sir...\"\n\n\"Please tell me, Victor,\" the defendant said to him in pure literary Ukrainian, \"why are you here? Who is this whole spectacle for?\"\n\n\"I am your lawyer, assigned to you by the state,\" Victor said with obvious indignation. \"And you, Vasyl, have quite a long list - dissidence, anti-Eurasian activities, criticism of the actions of the Lavrentiy Beria, incitement of the masses, drunkenness... Shall I continue this list? If you want me to defend you...\"\n\n\"I don't want you to. I can defend myself,\" Vasyl replied sharply. This reaction surprised Victor. For the next hour, all his arguments seemed to go over Vasyl's head, and he had no choice but to gather his things and leave the interrogation room. The verdict was handed down behind closed doors. And without the defendant.\n\n\"Defense attorney for Vasyl Stus, Viktor Medvedchuk, do you have anything to add to the case?\" Adjusting his hair, which covered a considerable bald spot, Viktor stood up at the judge's voice.\n\n\"Your Honor, I must state that the person I am forced to defend is completely uncooperative. Stus refuses to admit his guilt; he even stated that he would defend himself, which means we have to pass sentence without him. I hope, Your Honor, that you will impose an appropriate punishment.\" While the judge read out the case again before passing sentence, Viktor pondered. \"What a stubborn fool. He could have played the loser, and we would have dragged it out less. Anyway, his sentence was handed down long before the trial.\" Victor understood his role. Although he had some legal authority, in matters of \"dissidents\" he was only a supporting actor. Stus's sentence was not handed down in the courtroom, but in the offices of the NKVD. But even if he was a supporting actor, he would play his part so that no one in the Party would doubt him.\n\nVictor raised his head and listened to the final words of the sentence. \"...under these articles, Vasyl Stus would have been sentenced to 10 years of correctional labor and 5 years of exile in special regime camps, but due to the complex internal situation and the order from the capital regarding internal criminals, we cannot transport the convicted person beyond the Dnieper District. Therefore, as a temporary measure, the convicted person will serve his sentence in a strict regime colony in Lvov until the situation in the country stabilizes.\""
 UKR_prewar_events.3.a:0 "\"Case closed\""
 UKR_prewar_events.4.t:0 "Overcoats"
 UKR_prewar_events.4.desc:0 "The tactic was as old as the hills: strike the head and tail of the column, and the enemy will have nowhere to run. That was the case now: burning GAZ-66s lit up the morning sky in front and behind, and in the middle, trucks and armored vehicles from different times and nations were decorated with bullet holes, bloodstains, and the remains of frightened soldiers. Sitting with his back against the IFV, Ivan barely breathed, looking at the mud- and blood-covered road and the dark forests beyond it.\n\nAnd then he saw them. They crawled out of the forest like vipers, in dark green greatcoats. In a moment, like ghosts, a dozen partisans emerged from the forest. \"Okay, guys, break it up. Sokol, take your men and watch the road, the rest of you disperse and look around. Don't invite guests for tea,\" came the commander's authoritative voice. Some of the \"green overcoats\" went down the road in the direction from which the convoy had come, while the rest, encouraged by the commander's joke, began to examine the bodies and vehicles. Only now could Ivan see them properly and be disappointed - they, the pride of Eurasia, had been shot down like partridges by a flock of ragged old men. The \"overcoats\" looked well over 30, and most of them could easily have been over 45. Although some of them had modern Eurasian equipment and Kalashnikov assault rifles, many carried weapons from before the nuclear war. Two figures caught Ivan's eye by the road: a seventy-year-old man in a worn and patched green overcoat, with a long gray mustache and a German MG-42 slung over his shoulder, and next to him stood a commander of about 20, who was checking the serviceability of his Mosin-Nagant rifle - a rifle that looked as if it had seen all the tsars and leaders of the revolution!\n\"So, what do we have here?\" said the \"overcoat\" enthusiastically, sitting down next to Ivan and starting to search his pockets. The overcoat belonged to a tanned, black-haired man, his thick black mustache and stubble reddened by the fire. The man took Ivan's machine gun, found the crackers he had hidden from his rations in his pockets, and when he tried to remove his bulletproof vest, Ivan gave himself away with a heavy groan. The man immediately jumped away from him, causing several \"overcoats\" to rush for the weapon. When Ivan stopped making sounds, the man slowly approached him and examined him. \"Hey, this one's still alive. What's up, darling, got hurt, huh?\" Speaking with a noticeable Caucasian accent, the man laughed as he continued to remove Ivan's equipment. After removing the load, the Caucasian took off a badge in the shape of a white star with a hammer and sickle, threw it on the ground, and drove it deep into the mud with the heel of his boot. \"Sorry, darling, but the commander said not invite for tea,\" said the Caucasian, pulling a pistol from his belt, cocking the hammer, and pointing it at Ivan's head."
 UKR_prewar_events.4.a:0 "But there was no need for that - Ivan was no longer breathing."
 UKR_prewar_events.5.t:0 "Nearby"
 UKR_prewar_events.5.desc:0 "\"Here's your extra work, we start next week.\" - A man in a long black coat and a black cap handed Viktor a case with documents. \"The previous case was closed well, albeit with force majeure. Take care that there are no problems with protection in the future.\" They shook hands and went in different directions of the alley. This is not the first time Medvetchuk has been handed a case involving dissidents like this, and it certainly won't be the last.\n\nAll his activities have been closely intertwined with the NKVD - he contacted them when he was young, when his family first moved to Zhytomyr, they helped him with his admission to the law school at the Kiev National University named after Lenin, they gave him a job and protected him. His schedule had become a routine - he would meet the trustees at pre-arranged places, take instructions from them and follow them. But this time, Viktor noticed that something had changed. He could not shake the feeling that he was being followed.\n\nWhen he came out of the alley, he couldn't help but look back at the man who had handed him the case. The man walked quickly to a black Volga parked in the parking lot of the NKVD office and quickly got in. A second later he heard the sound of the engine starting and... an explosion. The Volga was thrown several meters by the explosion, the windows of the building were shattered, and the blast wave spread to neighboring cars, causing a chain reaction of explosions.\n\nIn a second, Viktor ran through the narrow streets of Kiev, almost knocking down an old man with a cane, to escape and seek rescue. They saw. Saw him. They know. He ran a few blocks and jumped behind the wheel of his Moskvich, which was hidden among the yards. When the trembling stopped a few minutes later, he realized his mistake and quickly got out to inspect the car for suspicious objects. But he found nothing suspicious under the car, under the hood, or in the interior. After calming himself down, Viktor got back behind the wheel, carefully started the engine, and with a sigh, drove off."
 UKR_prewar_events.5.a:0 "He needs to hide"
 UKR_prewar_events.6.t:0 "It's necessary"
 UKR_prewar_events.6.desc:0 "Vasyl walked the streets of Kyiv, leaning on his cane. In recent years, this has become the old pensioner's main pastime and entertainment - walking and watching the city. Theaters were closed or transferred to other needs, the few cinemas showed only propaganda films, and other leisure options were either banned or modified to benefit the Party. So Vasyl Kuk simply walked along the left bank of Kyiv, which he had long known, observing the city. The tension caused by the rebels was noticeable. The usual liveliness of the streets was noticeably diminished, the few public transports ran even less frequently, and people were trying to get home as quickly as possible. The only place that was more lively than before was the store. There were huge lines in front of the buildings with \"Bread\" signs. Vasyl thought about how this region is still called the \"breadbasket of Europe,\" and even its residents lack bread. During the Second World War, the Germans exported this fertile land by train...\n\nHis thoughts were interrupted by a sharp revival. A hundred meters away, a black car near the NKVD exploded. Its explosion also caused the explosion of several neighboring cars and shattered windows in the buildings. The street and the line for bread immediately emptied out - some people fled to their homes in panic, and some brave ones went to meet the fire to watch what was happening. The play of fire right in front of the heart of Eurasia's stability danced in Vasyl's eyes.\n\nPerhaps he was mistaken.\n\nPerhaps the new '41 has arrived.\n\nVasyl quickly turned around and walked down the streets. As he rounded the corner of a house, he was almost hit by a man in a suit, who ran further between the houses. It took him a couple of hours to get to his apartment in Darnytsia because the traffic was completely stopped due to sabotage. Once inside the apartment, Vasyl stood on the doorstep for a minute. He had no one to tell everything that was on his mind: his son was studying at university far away from his father, and his wife died back in the 70s. So he just stared for a minute at his apartment, which was given to him after the day he renounced. But he would not be so stupid again. He walked over to an old wardrobe hidden from prying eyes in the corner and quietly pushed it aside. He pulled a piece of parquet out of the vacant corner and took an old metal coffee box out of the hole. Inside were his belongings from his youth - an old but serviceable Walther pistol, two magazines, a supply of ammunition, and an OUN badge. Vasyl quickly transferred the contents to the inside pocket of his old overcoat, put the box back in place, and pushed the closet back in place and left the apartment."
 UKR_prewar_events.6.a:0 "The bear is out of the cage"
 UKR_prewar_events.7.t:0 "Benderites"
 UKR_prewar_events.7.desc:0 "Stus realized that he would not last long here with his health. Lvov Correctional Colony 48, built shortly after World War II, had not been renovated since then. The cells were damp, the beds had old box springs that cut into his exhausted back, the prisoners were forced to work at metalworking machines, they were hardly allowed outside, and to top it off, his poor health was compounded by the heavy prison food, which was not at all pleasant for his operated stomach. Among this gloom there was only one bright spot - everyone here was his own. The prison guards dismissively called them \"Benderites\", although they were only amused by this nickname. Levko Lukyanenko, Vasyl Ovsienko, Mykola Kuntsevych - if the prison held a contest for the \"most Banderite Banderites,\" their cell would have no equal.\n\nBecause of Eurasia's internal problems, instead of being exiled to the Urals, they were all sent to less severe prisons in the district, which pleased many people. Due to the sharp influx of dissidents and rebels, the prison was severely short of wardens, so there was plenty of time for free leisure - Vasyl and Levko organized literary evenings, Mykola recounted theatrical and circus performances of the \"old, good times,\" and Vasyl Ovsiienko always managed to get an extra portion of tea, crackers, or sugar for such gatherings in the short time they were outside their cell. And what pleased Vasyl the most was that he could write. Having borrowed a notebook and a pencil from the prisoners, he would hide behind his bed in the evenings and write poetry.\n\n\"Vasyl, do you think these poems will make it to freedom?\" - Mykola asked in between stories about bears on bicycles and vulgar jokes about the Party.\n\n\"Somehow the previous ones made it to people, so I'll get this one across,\" Vasyl replied thoughtfully. Sometimes he himself doubted whether anyone reads his poems. It was impossible to publish them legally under Party censorship, so they were often distributed secretly, through underground printing houses, but how many readers were there? Were there any left who still cherished the Ukrainian language? He didn't know, but he wanted to believe that at least someone was warmed by them.\n\n\"Well, if one day I see your collection on the shelf, I'll definitely buy it,\" Mykola replied cheerfully, his circus soul constantly radiating joy and optimism, \"have you thought of a title yet?\"\n\nVasyl closed his notebook to look at the cover."
 UKR_prewar_events.7.a:0 "\"Bird of the Soul\""
 UKR_prewar_events.8.t:0 "Repentance"
 UKR_prewar_events.8.desc:0 "\"Okay, grandpa, but slowly and without tricks,\" the commander was intensely aiming his Mosin at the unknown man who had suddenly appeared near their hideout. Several partisans behind him also kept their weapons ready. Vasyl Kuk, as promised, slowly unbuttoned a couple of the top buttons of his overcoat with one hand, slowly put his hand into his inner pocket, and took out a badge, showing it to the partisans. The badge was old, corroded by metal corrosion and dampness, but the OUN symbol was still clearly visible. The partisans, surprised by this turn of events, slowly lowered their weapons after the commander. \"Wow, grandfather,\" the commander lowered his weapon and came a little closer, \"even if you picked it up somewhere on the road, you had to find us. How did you find us? You certainly didn't go into the forest to pick mushrooms.\"\n\n\"You, partisans, haven't changed at all. I remember the instructions on how to set up hiding places from my youth.\"\n\nA gray-haired, with long mustache old man stepped out of the crowd of partisans, a look of understanding on his face. \"Wait, you're... Kuk! Vasyl Kuk!\" - the guns took off again and aimed at Vasyl, but the commander stood calmly - \"Damn dog! He merged with the Eurasians, betrayed ours, and now he came running to repent because he felt the noose tightening!\"\n\n\"I didn't merged with anyone and I won't repent to anyone. The bastard \"Chumak\" Prymas put me in jail. They grabbed my wife, took my young son, the executioners were already rubbing arms, and then they bring me a letter, what was I supposed to do!?\"\n\n\"Primas \"Chumak\"... I remember him. He appeared out of nowhere, walket around near the commanders, and disappeared when you were captured. But the letter. That our struggle is in vain, that the Ukrainian people will defend the Soviet - when Stetsko read this letter, he almost cried! How could you write such a thing!?\"\n\n\"Wrote it because they was forced to, don't you know what they do? Calm down, Kobzar!\" the commander's commanding voice chilled everyone. Vasyl looked on in amazement as the men, who looked almost three times older than their commander, shook under his shout. Kobzar, having had enough, lowered his weapon and wiped his long gray mustache. \"Did Beria at least send his greetings to our people?\" - the commander asked with a smile, extending his hand to Vasyl, \"We are facing a great test. Do you believe in the new '41?\"\n\n\"I didn't want to until the last moment, but now I have to!\" - Vasyl replied, shaking hands.\n\n\"Then let's get acquainted. Stepan Bratsiun. And that loud-mouthed peer of yours is Yukhym Kobzar. You'll have time to meet the rest of us later. Let's go, we have to get ready.\" The whole group turned around and started to enter the hideout."
 UKR_prewar_events.8.a:0 "We need to plan everything"
 UKR_prewar_events.9.t:0 "Into the unknown"
 UKR_prewar_events.9.desc:0 "Stus could not sleep. His whole body ached, and his stomach reminded him of his opinion about the prison food every day. After working at a shoe factory, the profession of a prison locksmith was extremely difficult for him. Even the solace of evening gatherings no longer relaxed him, and his initial optimism began to fade quickly. Vasyl just tossed and turned on his bed, unable to sleep because of the constant pain. And there was something else that kept him awake, a feeling that something was coming. The feeling was familiar - the last time it kept him awake was the morning before he was arrested...\n\nThe echo of an explosion somewhere nearby lifted everyone in the camera. A second later, anxious voices started to spread throughout the prison block, and the lights came on in all the cells. \"Oh my God, what is this...\" Immediately, a second deafening explosion knocked him down and deafened him. Vasyl came to his senses on the floor, the cell filled with smoke and sharp dust, which made it difficult to breathe and see anything, and his head was buzzing as if a hundred drums were beating nearby. Feeling the floor around him, he found Levko coughing on the floor and they got up together.\nAs if from afar, they heard Ovsiyenko's voice, picking Mykola up from the ground: \"Fucking cholera, what was that?\" When the smoke settled and the drums stopped, the scale of the events became clear. The lights that had been turned on after the first explosion went out, the door of their cell was bent inward by the blast, throwing beams of emergency red light, spotlights were on outside the window and sirens were wailing, and running, screaming, and gunshots were coming from the corridors. While they were recovering from the shock, they heard someone running hard and stopping near the cell.\n\nA tall figure appeared in the doorway - \"Break out, guys! It's a do-or-die!\" - the figure opened the door to the food supply and threw in a package, then ran on. Levko cautiously approached the package and kicked it, and it came open, spilling a couple of pistols, several small knives, and a heavy crowbar onto the floor. Levko bent down and picked up a pistol. \"Jesus, does anyone know how to use one of these?\" Ovsiyenko came over and picked up another pistol.\n\n\"I had to sometimes.\" - He answered, cocking the bolt.\n\n\"You? You were only handing out propaganda leaflets,\" Mykola said, twirling the crowbar in his hand.\n\n\"Sometimes there was a very strong demand for them. I had to fight off some of the most eager people,\" Ovsiyenko replied mockingly, putting a knife behind his belt."
 UKR_prewar_events.9.a:0 "\"Let's go\""
 UKR_prewar_events.10.t:0 "Into the unknown"
 UKR_prewar_events.10.desc:0 "Ovsiyenko slammed his shoulder into the warped door. The two-meter-high wall of steel snapped and shifted, revealing a hole with a hinge torn out. Mykola shoved a crowbar through the hole and, together with Ovsiyenko, helped the door fall to the floor. Ovsiyenko jumped out into a corridor full of smoke, where only red lights and empty cell doors were visible. \"Hello, you bastard! Give my regards to Lenin!\" he shouted and fired two shots into the corridor, \"Come on guys, the whole army will be here soon!\" Stus jumped out of the cell after the rest of his friends, who were already jumping over the puddle that was growing under the shot guard.\n\nStus could not remember the next few minutes. Consciousness returned to him only on the street - he was walking with a bloody knife behind the other prisoners who were lighting the way through the night streets of Lviv, and behind him Lemko and Ovsiyenko were dragging the wounded Mykola on their shoulders. \"Oh, God, what now?\" They are free, but where do they go now? And as if by magic, the headlights of a truck shone out of the darkness. A man in a green overcoat waved his hand into the back, helping those who could not grab in on their own. The guys quickly carried Mykola in and laid him on the floor, and before they could find a place to sit, the man in the overcoat slammed his palm on the car three times, and then the truck's engine roared to life, taking the fugitives away. Stus managed to get down on the bench along the body with trembling legs. He looked at his wounded comrade, who was lying on the floor holding his bloody side, and turned his gaze to the prison, which was slowly disappearing behind the trees and buildings, waving goodbye to the searchlight columns.\n\nOnly now did he remember the knife in his hand, and he threw it overboard."
 UKR_prewar_events.10.a:0 "Where are they taken?"
 UKR_prewar_events.11.t:0 "Punch"
 UKR_prewar_events.11.desc:0 "Alexei recalled in his head all the curses he knew. Reports from the regions were getting more and more disappointing. Raids on convoys, killing of agents right in front of their eyes, open recruitment campaigns of citizens, and now a raid on a prison with political prisoners. The capture of the rebels yielded almost nothing - most of them either knew too little or were too hardened to just give up and tell everything. Alexei was grinding his teeth, but not out of anger - his office was above the NKVD parking lot, so after the explosion, the windows were boarded up with pieces of plywood that let in the cold. The case of colony 48 lacked information - between the explosions, the rebels damaged the communication lines, so the raid became known only an hour after the prisoners escaped, and any information had to wait for hours.\n\n\"Comrade Buzyna!\" his assistant came whirling into the office, \"We're in trouble!\"\n\n\"As if everything was fucked up before!\" - Alexei was no longer able to keep it together, \"A handful of assholes fucked the entire defense apparatus as soon as they wanted! What else could be worse than that?!\"\n\nAn assistant stood in front of his desk in a fur coat, all red, despite the low temperature in the entire building. \"We have lost contact with the military groups in the West. The only thing we received was a SOS signal a few minutes ago. The northwest is also cut off.\"\n\nAlexei covered his face with his hands. That's how you are, you fucking assholes! For weeks they had been nightmarizing Kiev, so that one day they could get together and go to Lvov! While they were trying to save the heart of the District, these bastards hit them in the side. \"FUCK!\" Alexei slammed his fists on the table, all the papers flew up and spilled onto the floor. He had worked his way up to the head of the department, so he would be the first to be blamed.\n\nFor not looking out.\n\nFor not foreseeing it."
 UKR_prewar_events.11.a:0 "\"Call General Staff! Let them raise the troops!\""
 UKR_prewar_events.12.t:0 "Rise"
 UKR_prewar_events.12.desc:0 "\"As a result of the brutal sabotage, we know about a dozen prison guardians killed and two dozen wounded,\" the newscaster's voice came monotonously from the TV, \"about one and a half hundred dissidents and particularly dangerous criminals escaped from the prison, and there are already isolated cases of attacks on police and military officers, which is why a state of emergency and a curfew from 10 p.m. to 8 a.m. have been introduced throughout the Dnieper District. All citizens who will be on the street during these hours without authorizing documents will be arrested and charged with treason. We ask all citizens to be careful and report any suspicious persons...\"\n\nThe TV was talking, but few people were listening.\n\nPeople were preparing.\nThe regime has become weak.\nThere was hope.\n\nWeapons were being cleaned in homes in dim light, food stored for a rainy day was being turned into rations, gasoline and motor oil were being poured into beer bottles, and the last of the intact clothes was being torn into igniters and bandages. Hammers, bricks, or someone's fists flew at the TV screens, and everything that could theoretically be a camera or wiretap was ripped out of the walls. People could no longer stand it."
 UKR_prewar_events.12.a:0 "They will fight"
 Revolution_Will_Started:0 "§RThe revolution is entering its final stage of preparation, and it is unlikely that anything will stop it now.§!"
 UKR_war_events.1.t:0 "The Path"
 UKR_war_events.1.desc:0 "Stepan held a cigarette in his mouth as he operate on the wounded man in the hospital tent. The field medics nearby silently observed this deviation from sanitary norms, but no one dared to comment - after all, talents like this are hard to find. A shot from a shotgun with large shots to the left side - several shots remained in the body and broke the lower rib, but fortunately missed vital organs. Stepan pulled the tongs out of the body and threw a piece of rib onto a tray with bloody shots. \"Lucky circus performer. He'll limp for a couple of weeks, but he'll be fine. But how well it turned out, cried my unobtained medical degree. Sew it up.\" Stepan walked away, giving his assistant a chance to sew up the wound, while he took off his disposable clothes and left the tent. It was dark outside, with only the stars and small lanterns near the guard post providing light.\n\n\"How is Mykola?\" - Stus dived out of the darkness into the circle of light from the lantern Stepan was smoking in.\n\n\"The circus performer? He hypnotized the flying shots so that they wouldn't kill him,\" he answered with a chuckle, \"He'll be recovering for a few weeks, but it's okay. How are you feeling?\" - Bratsiun was told that after some desperate jail worker shot Kuntsevich, Stus stabbed him in the neck.\n\n\"I don't know. Everything is so mixed up.\" - Stus wiped his face with his hands and looked off into the distance, \"Do you think we have a chance?\"\n\n\"If I didn't, I would have stayed in the hideouts. Chances are fought for, not waited for.\"\n\n\"Even if the struggle can be choked?\"\n\n\"\"How good it is that I fear not death, and ask not whether my cross is heavy,\" was it?\" - Bratsiun smiled, quoting one of Stus's poems - \"this is our Path, we are not given any other.\""
 UKR_war_events.1.a:0 "\"And we are following this Path.\""
 UKR_war_events.3.t:0 "Lack of"
 UKR_war_events.3.desc:0 "\"Stepan, I have a lot of people who want to help me, but where am I going to find weapons? I won't even have enough leaky spoons.\" - Kobzar sat at the table across from Bratsiun, puffing on his pear wood pipe, \"We're not doing well with weapons. Most of the old rifles fall apart after a few hours of fighting, and the Eurasians didn't bother to leave us enough assault rifles.\n\nStepan sat with a cigarette in his hand, looking at the papers. \"What about deserters? Hunters, the rest of the people who have small arms?\" - Stepan knocked the ashes from his cigarette into an ashtray cut from the bottom of a glass bottle.\n\n\"Oh, no, there are a hundred or two per kuren at most, maybe fifty kurens in total. But I wouldn't trust such elements that run from one flag to another very much.\"\n\n\"We'll have to, in times like these we don't have to choose allies. Up to two hundred per hut is fine, every rifle is on the verge of gold now.\"\n\nAfter listening, Yukhym Kobzar pushed the ashes from his pipe into an ashtray, saluted, and left. Stepan sat thoughtfully with a cigarette in his mouth."
 UKR_war_events.3.a:0 "How long will they last?"
 UKR_war_events.4.t:0 "We took Ternopil and besieged Lviv..."
 UKR_war_events.4.desc:0 "Bratsiun, Kuk, and Kobzar inspected the troops who were training before being sent to the front. All the operations went like clockwork, but they had a much more difficult test ahead of them. Now, while Eurasia is disorganized and does not understand what is happening, they need to defeat and throw all those who remained faithful to the Lavrentiy Beria outside the district. Stepan looked at the training ground where the newly recruited fighters were practicing their shooting. Their recent operation to blow up the colony, for which they had trained so carefully, had shaken the people, who had been drawn to the rebel army en masse. The shortage of prison guards made it easy to slip their people in, who only had to place explosives under the cell doors and in the guard room. The only thing that upset Stepan was that instead of one big explosion, there were two consecutive ones, but he was satisfied with the effect anyway. The enemy is disorganized, their government is filled with capable figures, and people no longer want to tolerate neobolshevik scum.\n\n\"Oh, we wish we had more tanks here,\" Vasyl Kuk said sadly, \"the enemy has enough to break us. If we had had at least one tank division back in '41, we would never have been broken.\"\n\n\"Yeah, and if we had a dozen nuclear bombs and a huge cannon aimed at Capitalgrad,\" Yukhym Kobzar said sarcastically, \"we would have found assault rifles for everyone that were not older than their owners.\"\n\n\"Everything will happen,\" Bratsiun said calmly, \"but in time. Now we need to be happy with what we have. Let's go, these guys need good command.\""
 UKR_war_events.4.a:0 "We will trample our way to freedom"
 UKR_Anger_Fed_Us_tt:0 "§GIt is time to solve all the problems surrounding the UIA.§!\n\n§RDo-or-die.§!"
 UKR_war_events.5.t:0 "Training"
 UKR_war_events.5.desc:0 "For Maksym, it was a real test. When the Dnieper District was burning, he joined the UIA, dreaming of commanding an army, destroying the enemy, and raising the flag over the liberated cities. But from the moment he was accepted to the officer's staff, he only wrote. At first, in hideouts, writing about tactical maneuvers and strategy, told by an old general who would hit your desk with a cane as soon as you were distracted for a moment. And now the commanders have invented a new \"entertainment\". Sitting in the bushes, they and scouts watched the movement and deployment of enemy troops. Maksym sat with a few other guys and drew maps on paper with a pencil, occasionally peering at a cheat sheet with the symbols of battalions and terrain. When they returned to the hideout, they would be reviewing and planning battles based on their maps. Maksym exhaled - it was all so tedious."
 UKR_war_events.5.a:0 "But he realized that it was necessary"
 UKR_war_events.6.t:0 "Faithful youth"
 UKR_war_events.6.desc:0 "The commander looked sternly at the young man standing before him. There was no shortage of such individuals at the recruitment center, always telling the same story: they want to fight for Ukraine, they will soon be eighteen, and their birth certificates were lost in the chaos of the uprising. The only thing that set him apart was the missile forces chevron he placed on the commander's desk. The commander continued to look at the young man with suspicion-he didn't look like he was eighteen, let alone a military officer. \"So, you were recruited by the Eurasians after decentralization, and you deserted, right?\"\n\n\"Yes, sir! Our whole company deserted. They sent us to the Lviv direction, but we tied up the major and droped him in the bushes, and we ourselves fled across the front line.\"\n\nThe commander raised an eyebrow. \"And what, did you lead everyone?\"\n\n\"Yes, sir! We took maps of combat operations and as much equipment as we could carry from headquarters, and led them to Ukrainian unit, where we surrendered.\"\n\nThe commander covered his mouth with his hand, still holding the chevron in the other. He had been told about young people loyal to the national struggle and about the mass defections of those who considered themselves Ukrainians. But this guy surprised him. \"To hell with this,\" he thought, \"we're practically led by a boy too, so why be surprised?\"\n\n\"Once again, what's your name?\" the commander asked aloud.\n\n\"Dmytro. Yarosh Dmytro Anatoliyovych.\""
 UKR_war_events.6.a:0 "\"All right, Anatoliyovych, you'll have time to fight.\""
 UKR_war_events.7.t:0 "Breakthrough strategy"
 UKR_war_events.7.desc:0 "Stepan Bratsiun sat at the table, propping his head up with his hand. Two old generals sitting opposite him had been arguing for a long time, unable to calm down.\n\n\"I'm glad, Vasyl, that you like military vehicles, but we don't have time to waste. The Eurasians still can't figure out where their own heads are, so we need to hit them and break through the front now! Like in the good old days: get on a horse and chase them all the way to Sumy.\"\n\n\"What if they chase you back? What good is a horse now, Yukhym? When rifles fired once a minute, then a horse was good. But now, they'll fire a burst from their machine guns and you'll be reassigned to the infantry? We need to beat the enemy with what they use to beat us-armored vehicles. Our guys on the front line destroy so many enemy armored vehicles and tanks every day, and how many of them can still go back into battle!\"\n\n\"The question here is not how many will go, but when. Equipment requires more skills, and besides, how much fuel does it need? How many barrels of oil do we need to dig up?\"\n\n\"I don't think that more than sacks of oats for horses...\"\n\nA slap on the table reminded them both that they were not alone in the room. Leaning back in his chair, Stepan stared at the ceiling for a moment."
 UKR_war_events.7.a:0 "\"So how much oats do we need, Yukhym?\""
 UKR_war_events.7.b:0 "\"Vasyl, will we be able to start up a lot of the equipment again?\""
 UKR_war_events.8.t:0 "Trenches"
 UKR_war_events.8.desc:0 "\"Ok, pride of Eurasia, lunchtime is over, back to work!\" the officer shouted into the megaphone, and everyone sitting at the tables buried in the ground began to slowly get up and carry their bowls to the tray to pick up their shovels and continue digging. Ivan stood up, finished the uzvar left in his wooden mug, and limped over to carry his dishes to the tray, where the guards were waiting to wash them.\n\nThe events that had taken place since the beginning of the year could not be called happy for Ivan: he was seriously wounded while walking in a convoy, and the partisans spared a bullet to shoot him, thinking that he was already dead, where the next convoy found him barely alive. Barely recovered, he was sent to Lviv to suppress the uprising, where the same rebels attacked them again and took them prisoner. One of his comrades seemed to have heard that they had been betrayed by a company of deserters. And now they were standing here, in a field, a dozen kilometers from the front line, digging trenches for Ukrainian soldiers who would settle here and exhaust his soldiers. Some dug deep, others widened the trench, still others carried concrete and iron for the bunkers, and all wore black Eurasian military greatcoats with white scarves tied to their forearms with numbers written in charcoal. \"Like the Nazis with the Jews,\" flashed through Ivan's mind as he digging the hard ground.\n\nBut there were also other people, without military uniforms. Many locals brought wheelbarrows full of earth and helped with the digging.\n\n\"What, did the military catch you?\" a man of about forty asked him, either out of curiosity or boredom, digging nearby. \"They didn't take me. I fell off a ladder at the steel mill, and they said I couldn't fight, that I should go make stools instead of fighting. But what can I do? My back ill, but i have hands, so at least I can dig. At least I can help the guys at war in some way.\"\n\nIvan just dug silently when a military truck drove up to the field. The driver and several soldiers got out and went to the officer. It was a common occurrence - factories also needed workers, so they were transported back and forth. The officer approached the trench and began calling out numbers. His was among them. Ivan stuck his pickaxe into the ground, climbed out of the trench, reported to the officer, and walked with the others to the truck.\n\n\"Hey, who's here! You're alive!\" A painfully familiar voice made him turn around. The truck driver, a Caucasian with stubble reddened by the fire, approached with a smile and slapped him on the back. \"Look how resilient you are! I spared you a bullet, darling, but you took offense and decided not to die, ha ha! You look very pale, want a cigarette? Let's get to know each other a little, my name is Vano. Don't worry, darling, it will all end someday, maybe they'll let you go, and if you're good, they definitely will.\" Vano gave Ivan a light and led him by the shoulder to the truck."
 UKR_war_events.8.a:0 "Indeed, someday this nightmare will end"
 UKR_war_events.9.t:0 "Steel"
 UKR_war_events.9.desc:0 "Vasyl Kuk inspected the tanks. Freshly painted, just a few days ago they had been knocked out by our troops, or in separate pieces at the factory, but very soon they would be going against their owners. He felt a kind of euphoria - this was what had always been needed - a formidable steel machine that would repel the enemy, saving the lives of their soldiers.\n\n\"Well, will they be ready soon?\"\n\n\"The electronics in some of the machines are damaged, so we'll have to wait another day or two,\" replied the chief engineer, \"but fortunately, we have plenty of spare parts, so they'll be as good as new.\"\n\n\"That's good. Very good. Better to have bullets riddling steel than someone's brave chest,\" said Vasyl, placing his hand on the tank's armor. The engineer looked away awkwardly.\n\n\"Well, um... We're going to... test drive a few vehicles... would you like to come along?\"\n\nVasyl took his hand off the tank and turned around, smiling."
 UKR_war_events.9.a:0 "\"You're still asking? Of course I want to!\""
 UKR_war_events.10.t:0 "Lessons"
 UKR_war_events.10.desc:0 "Alexander finished handing out the sheets of paper to the students and sat down at the teacher's desk. After the collapse of Eurasia, these were probably the strangest lessons he had ever taught. Not only because, after so many years, he was once again teaching Ukrainian writing and language at school. Not because the schools were missing windows due to explosions. What surprised him most were the students. The vast majority were peasants and proletarians - people who had difficulty knowing their native language, let alone Ukrainian. The class was simply astonishing in its contrast: a brick factory worker sat at the same desk as a Eurasian prisoner of war, and they copied out exercises from a sheet of paper; an 80-year-old grandmother showed a boy which way to write the letter \"Ye\"; a Ukrainian partisan helped a local shepherd compose sentences. Oleksandr checked his notebook, which contained the lessons - a learning methodology recently developed by Vasyl Stus himself, designed to help even the most hopeless students learn the language. The methodology was flexible enough to teach people with different levels of language proficiency. And it helped - even those who spoke Eurasian poorly were able to speak short sentences and read texts with a dictionary at Ukrainian by the end of the week.\n\nAlexander glanced at his watch; it was 11:20. \"Class, five minutes left to hand in your work. Next, we'll have reading.\" Alexander stood up and walked over to the cabinet, in the recess of which there used to be a bust of Lenin, but now the rebels had placed a bust of Shevchenko there, battered but still in good condition. Alexander took out a stack of small, old, and torn books. They had been preserved for almost half a century, and the title, written in faded gold lettering, could still be read on the damaged leather cover."
 UKR_war_events.10.a:0 "\"Kobzar\""
 UKR_war_events.11.t:0 "Scene"
 UKR_war_events.11.desc:0 "\"Sell it like that? Sell your faith? Sell your own people? Stop, get off your horse!\" Obediently, like a child, Andriy got off his horse and stood before Taras, neither alive nor dead.\n\n\"Stop and don't move! I gave birth to you, and I will kill you!\" said Taras, and, taking a step back, took the musket from his shoulder. Andriy stood as white as a sheet: you could see his lips moving quietly and hear him utter someone's name; but it was not the name of his father, mother, or brother - it was the name of a beautiful Polish girl. Taras fired. Like a wheat ear cut by a sickle, like a young lamb that felt the deadly blade of a knife under its heart, he bowed his head and fell to the grass without saying a word.\n\nA loud applause rose, and the curtain fell.\n\nMykola Kuncevich, who had just been the dead Andriy Bul'ba, got up from the floor, and Taras Bul'ba, who was known outside the stage as Yuriy, wiped his bald head with a handkerchief and the Cossack forelock glued to it, which had almost come off from sweat. Yes, he was not used to performing in front of such a large audience.\n\n\"Well, Yuriy, is it good to be back on stage instead of in hiding?\" Mykola said cheerfully, limping slightly on his left side - a bandage was visible under his embroidered shirt on his left side.\n\n\"Yes, I haven't had this much fun in a long time!\" Both Yuriy and Mykola were in love with the theater. They loved the sets and scripts, the hundreds of lives they lived on stage, the enchanting applause and flowers. Yuri had been acting since he was young, back when theaters in Eurasia were still open. Then he started putting on shows with friends in hideouts and shelters for those who still remembered the theater. There he met Kuncevich, where they performed together, and they became friends. Mykola took a watch from under his clothes.\n\n\"Damn, I might not make it to the doctor. Okay, gentlemen, you don't need a dead actor anymore, say hello to the rest.\" Mykola walked past the workers who were changing the scenery for the new act and left the stage. Yuriy wiped his neck with a handkerchief and hid it - a ten-minute break, enough time for tea."
 UKR_war_events.11.a:0 "Long live the theater"
 UKR_war_events.12.t:0 "Achievements and mistakes"
 UKR_war_events.12.desc:0 "\"On June 30, 1941, in Lviv, Stepan Bandera proclaimed the Act of Restoration of the Ukrainian State, according to which Hitler's Germany would help the Ukrainian people win freedom from Moscow's occupation. As a result, on July 5, the Germans arrested him along with Oleksandr Stetsko, and he spent three years in the Sachsenhausen concentration camp...\"\n\n\"Question!\" One of the students raised his hand. Vasyl Ovsienko stopped reading the lecture and nodded to him. The student stood up and asked, \"Why did Bandera choose Germany as an ally? Why did he get close to those who had no plans to cooperate with the Ukrainians?\"\n\n\"Why? Because it was a force that kept Europe in fear. And to put it simply...\" Vasyl took off his glasses, wiped them, and put them back on. \"...we were short-sighted fools. Many will deny it, but it's true. We believed that if we bowed down nicely, everything would be fine. We thought that way many times, many times... We achieved a lot, but we also made many mistakes in our history. However, we cannot remain silent about our mistakes.\""
 UKR_war_events.12.a:0 "\"We must remember them and learn from them.\""
 UKR_war_events.13.t:0 "Freedom"
 UKR_war_events.13.desc:0 "\"You took so long! You were almost late,\" Bratsiun threw his cigarette on the ground and stamped it out with his foot when he saw a man running toward him with a tube. \"There's not much time. Run to the roof.\"\n\n\"Can you imagine, there were no blue sheets to be found anywhere in the country. To hell with them!\" Orest Karelin cursed, running with Stepan up the stairs of the former Supreme Council of the Dnieper District in Kyiv. They reached the roof of the building just in time - the solemn speech was already coming to an end in front of the people who filled the square in front of the Council on Kirova Street. The speaker on the podium, Vasyl Stus, who replaced Bratsiun in the final speech, proclaimed the end of Ukraine's liberation struggle against the Eurasian horde, the proclamation of the Verkhovna Rada of Ukraine, and the renaming of Kirova Street to Hrushevsky Street.\n\n\"Hurry up, Stus is dragging out his speech as he can.\" Vasyl Kuk stood guard and waited for the signal from below. Stepan and Orest quickly ran to the flagpole, which glistened in the morning sun.\n\n\"Come on, Orest, attach it.\" Orest opened the tube and quickly tied its contents. A moment later, Kuk raised his hand, looking at the crowd from around the corner. Applause and whistles were heard from below. \"Pull!\" Kuk shouted and waved his hand, and Orest and Stepan pulled on the rope.\n\nThe huge blue and yellow flag fluttered in the wind, illuminated by the morning sun above the building, as if it wanted to be seen by the whole city. The whistles and applause grew louder, and the musicians played the old anthem of the Ukrainian People's Republic, \"Shche ne vmerla Ukraina.\" When the nine-meter flag fluttered at the very top of the flagpole, Bratsiun turned to the crowd, waving to their cheers. \"Load!\" commanded Yuhim Kobzar, his medals jingling on his new parade uniform. Soldiers in shiny new uniforms cocked their guns and raised their barrels to the sky. The musicians finished playing the chorus of the anthem."
 UKR_war_events.13.a:0 "\"Fire!\""
 UKR_lose_events.1.t:0 "Second renunciation"
 UKR_lose_events.1.desc:0 "Alexey sat at a table in the NKVD office, reading the papers presented to him. The windows in the office were still broken, but now they did not bother him at all. Vasyl Kuk sat opposite him at the table, physically and morally destroyed. Another defeat, another solitary confinement. Another renunciation.\n\n\"Not bad, Comrade Vasily. But how much can I trust this information?\" Buzyna spoke condescendingly, with a noticeable mockery in his voice.\n\n\"I myself cannot trust them. There's no guarantee that they haven't all burrowed into their holes while we're sitting here.\"\n\n\"Well, heh... If a mole digs a hole, they put a hose with water in it, and he either comes out or drowns.\" Buzyna, amused by his own wit, threw the papers into a folder. \"According to all written and unwritten laws, you should be tried and shot, comrade, but what's the point of wasting precious bullets on an old man? However long you have left to live, I think you will be able to live in peace, without worrying about your life or your family.\"\n\nThe mention of Vasyl's family shook him as if he had a fever. Once again, the NKVD was poking its fingers into the same wounds, forcing him to talk."
 UKR_lose_events.1.a:0 "And he talk. Everything they wanted to hear."
 UKR_lose_events.2.t:0 "Faithful unto death"
 UKR_lose_events.2.desc:0 "The Eurasian soldier ran through the alleys between the houses, trying to catch the young man. He could not let him get away, as his head was on a par with other leaders of the uprising, despite his young age. Having exposed one of the few OUN hideouts in Lvov, the young man fought the soldiers, but under pressure from superior forces, he tried to escape through the streets of the city while the others were distracted by the arrest of the rest of the terrorist group. The soldier ran after the young man into a fairly open area, immediately dropped to one knee, aimed at the silhouette, and fired several short bursts. The silhouette, visibly staggering, hurried around the corner of the building and began to shoot back at the soldier. Hiding behind benches and burned-out cars, the soldier began to approach the corner where the OUN member was supposed to be, but when he got there, he saw only a bloody trail leading further away. It was a fairly large trail, and even a blind man could find the wounded man by following it. \"Damn, they'll scold me for this, there aren't even enough medicines for the soldiers,\" flashed through his mind as he quietly crept around another bend, following the bloody trail. But once he got there, he realized there was no need to be cautious anymore.\n\nThe young man was lying with an automatic rifle between his legs against the wall of the garage, curled up in a fetal position. His face was frozen in every possible expression: rage, reproach, determination, disappointment. Coming closer, he saw that the magazine had been removed from the rifle and was lying not far from the body. Empty. \"How thoughtful, he saved the last bullet for himself, the bastard,\" the soldier cursed silently. Yarosh was needed by the Party alive, not dead. Exhaling, the soldier took out his radio to report."
 UKR_lose_events.2.a:0 "Target eliminated."
 UKR_lose_events.3.t:0 "The fall of the Vozhd"
 UKR_lose_events.3.desc:0 "\"Move your hooves, you bastard!\" A blow with the butt of a rifle between the ribs pushed Bratsiun out onto the street, where it was all about to end. A simple brick wall covered in red and black bloodstains, mud, and a pile of bodies that no one was in a hurry to clean up. As the rather unfriendly soldier pushed him between the bodies against the wall, he managed to notice a body with a familiar gray mustache, covered in a layer of blood and mud. \"Stay where you are, bitch!\" the soldier shouted as he walked away. It was easy to say, but his bare, bruised feet tried with all their might to hold his body, even though it had lost a lot of weight in recent days. The firing squad, seeing WHO had been brought to them, visibly cheered up, putting down their cigarettes and starting to check their rifles.\n\nMedvedchuk approached the officer in charge, handing him a tablet with the execution protocol. The officer glanced briefly at the paper and threw the tablet into the nearest puddle. \"Load!\" The soldiers loaded their rifles. \"Aim!\"\n\n\"Comrade, maybe at least for the record...\"\n\nThe officer just waved his hand. \"I don't give a damn about your records. Fire!\" A dozen shots rang out almost in unison, and Bratsiun's thin figure, swaying, became part of the pile of bodies and bloodstains on the wall. The officer turned to Medvedchuk. \"Did you have any comments, comrade?\" Viktor just shook his head silently and went into the concentration camp building. Taking another document, he documented the execution procedure."
 UKR_lose_events.3.a:0 "No comments. Signature."
 UKR_lose_events.4.t:0 "Exiles"
 UKR_lose_events.4.desc:0 "The ship, accompanied by a military fleet, docked on the shores of the African continent. The old Eurasian ship, with the Ukrainian flag flying from its mast, moored in the harbor of a free African city, the name of which Stus could not remember. Lowering the gangway, people began to descend onto foreign, unfamiliar land. Stus did not know most of them, some he knew vaguely, but he did not see any of his friends among them. Was he the only politician who had been evacuated? He descended the gangway without luggage, like most of the passengers fleeing Ukraine who had managed to evacuate across burning Eurasia to the free states of Africa, in dirty clothes that stank of sweat. After descending, Vasyl approached a bench and sat down on it, silently staring at the sea. Of all the scenarios he had expected, this was the worst imaginable.\n\nWith nothing, in a foreign land.\n\nAnd even without hope."
 UKR_lose_events.4.a:0 "What to do next?"
 UKR_lose_events.5.t:0 "Cursed"
 UKR_lose_events.5.desc:0 "Vasyl Kuk sat on the bed, covering his head with his hands. He blamed himself for everything he had done or not done, could or could not do. An explosion outside the window momentarily interrupted his thoughts. Even they had become scarce: most had been caught or had gone into hiding. The old TV quietly reported on the NKVD's successes in eradicating the terrorist organization and the reinforcements on their way from Kapitalgrad. They had already played the lottery with death three times, and lost three times.\n\nVasyl had witnessed it twice. Yes, another defeat would not destroy this people; yes, they were unburnable, but they were cursed. Cursed to fight forever for a hope that was never meant to come true, to die for an idea that would never see the light of day.\n\nVasyl raised his head and glanced at the rotary phone lying on the table. No one would call him anyway. His only son, the only thing of value left to him in this world, no longer wanted to see or hear from him. He understood him. No one would wish such a weak-willed, unsuccessful father on anyone. He lay down silently on the bed, looking at his cold, practically empty apartment. The NKVD had turned every corner upside down, taking away everything suspicious they could get their hands on. Vasyl Kuk thought disappointedly about how much they had taken until he was too tired to keep his eyes open."
 UKR_lose_events.5.a:0 "In the morning, a cheap coffin was carried out of the apartment."
 UKR_afterwar_events.1.t:0 "Political chaos"
 UKR_afterwar_events.1.desc:0 "Stepan Bratsiun watched the new war unfold. A war that was not decided by bullets, artillery, or aircraft. Here, words were decisive. Before him were four hundred deputies who were actively arguing. The end of the war and the restoration of independence brought to the surface a pile of problems that everyone wanted to bury. Inefficient administration, which remained from the district and led to its collapse, uncertainty in foreign policy.\n\nBut the most annoying were the neobolshevik rats - about 150 deputies who were either non-aligned or had joined the Social Democratic Party of Ukraine - they had a rather dark past, which would take time to investigate. While the new chairman of the Verkhovna Rada of Ukraine, Leonid Kravchuk, tried to ensure at least visible calm at the meeting, Bratsiun glanced at the documents lying next to him along with speeches and draft laws. Medvedchuk... Buzyna... Something is fishy about them, but there is not enough information, the NKVD is good at covering its tracks. Unfounded arrests will only undermine the stability of the state; we must keep searching. He glanced at the seats where their party was sitting. Who was there... Shufrich, apparently in on the conspiracy... Poroshenko, seemingly clean... Korchynskyi nearby, co-founder of the UNA, has connections, check...\n\nThe Security Service has a lot of work to do."
 UKR_afterwar_events.1.a:0 "But they will do it."
 UKR_afterwar_events.2.t:0 "Prince Standard-Bearer"
 UKR_afterwar_events.2.desc:0 "\"Here, Mr. Orest, this is all I could find.\" Lydia handed him a bundle of fabric. \"We called Lviv, Podillia, Chernivtsi, even abroad, but blue fabric is nowhere to be found right now.\"\n\n\"We'll figure it out, let the aliens eat them with those fabrics.\" The bald man with a thick gray beard and glasses on a string cursed, leafing through the bundle of blue fabrics and entering the small room of the workshop where his studio was located. Orest Karelin-Romanshyn was a respected man in the weaving workshop, as there were very few experts left in his profession. Orest sewed flags. Practically forgotten in the days of Eurasia, they began to be in high demand in independent Ukraine, and he was a master. Orders for flags came from government agencies, cities, regions, and even military units. Lydia followed Orest into the cramped room that now served as his workshop. Almost half of the space was taken up by a table with a huge shelf, the rest of the space was taken up by a sewing machine. On the huge shelf above the table, all types and colors of fabric were arranged by number and type in compartments, and on the table was a yellow fabric with some marks on it, and on the wall, on a sheet of paper taped with duct tape, was a picture from the Holy Scriptures - Yuri the Dragon Slayer, stabbing a spear into a snake under his horse's feet.\n\nOrest turned on the table lamp, put down his cup of tea, and placed the bundle of fabric on the table. \"What do we have here... Cobalt polyester... Lapis lazuli... Flag mesh... Satin...\" Orest quickly folded the fabrics into separate bundles and arranged them in special compartments. Among all these colors, blue was clearly at a disadvantage, while there were plenty of red shades. Orest ran his finger over the labels and took a large bundle of red fabrics from one shelf, leaving several blue ones in their place. \"You can take it, maybe someone needs it for a dress.\"\n\n\"No way, Orest, red went out of fashion pretty quickly,\" Lydia giggled, understanding the reason for such a rapid decline in the popularity of red shades.\n\n\"Workers always need rags. And by the way, how did I ask you to address me?\"\n\n\"Go to hell! Command your wife like that!\" Lydia took the fabric and left the workshop. Lately, Orest had been behaving very strangely-demanding to be addressed as Prince of Rus and becoming obsessed with the theory of extraterrestrial life, which only provoked slight ridicule from his colleagues in the workshop.\n\nOrest just sat down silently at the table and began to transfer the image of the Saint from paper to fabric."
 UKR_afterwar_events.2.a:0 "The order was important."
 UKR_afterwar_events.3.t:0 "Guardians of order"
 UKR_afterwar_events.3.desc:0 "\"One hryvnya and six kopiyka's? Just a moment, just a moment... Here you go... No, no, don't worry about the change. Thank you!\" Taras took the bag of fried pies from the saleswoman and crossed the road from the stall to the parking lot, where his partner was waiting for him. Vasyl was leaning on the hood of the police \"Zhiguli\", smoking a cigarette and looking at the morning sun. \"All right, breakfast is ready. By the way, you're complaining for nothing, it looks comfortable.\" Taras twisted a little, as if to make sure that the new uniform really didn't pinch him. \"Let's get in the car, it's a bit chilly this morning.\"\n\nThe police officers got into the patrol car, Vasyl turned the ignition key and turned on the heater while Taras took napkins out of the glove compartment and selected pies from the bags. \"Which one do you want? Potato, pea, or cabbage?\"\n\n\"You got the pea ones again!\" Vasyl muttered, slightly lowering the window next to his driver's seat so that the cigarette smoke could escape from the car. \"I'll have to air out the car after you.\"\n\n\"And after your \"Stolichny\" cigarettes, isn't it necessary?\" Taras, holding a pie in his teeth, handed Vasyl another one wrapped in a napkin, placing the bag with the rest on the mat between his feet.\n\n\"Form is form, get used to it with time. But how many people have submitted their badges?\"\n\n\"That's right,\" Taras took the pie out of his mouth, took a bite, and examined its green, porridge-like filling. \"Sergei left, Volodya too. New exams, new requirements. Well, never mind, there will be no shortage of newcomers. Rebranding, or whatever the word was? Although, you know... It seems like things have calmed down since then. Well, even before the collapse of Eurasia, it wasn't this quiet. Even those... radicals seem to have calmed down.\" Vasyl didn't answer, only the sound of sauerkraut crunching in his mouth could be heard. The silence was broken by the hissing of the radio.\n\n\"Attention patrols in the third district. There's been an accident on Heroes of the UIA Street. No casualties. Available patrols, respond. Over.\"\n\nTaras quickly wiped his hands on a napkin and picked up the radio. \"Base, this is four, we're on our way, give us the exact address.\" Vasyl started the engine of new, freshly painted VAZ-2107, commonly known as a \"Zhiguli,\" and drove out of the parking lot in the residential area toward the city center.\n\nOnly when the police car left the residential areas did Vasyl turn on the flashing lights and police siren, rushing to the scene of the accident."
 UKR_afterwar_events.3.a:0 "To serve and protect"
 UKR_afterwar_events.4.t:0 "Rats"
 UKR_afterwar_events.4.desc:0 "Victor stood silently at the entrance to the city market, watching people. Chattering his teeth, he tried not to miss the right person - the morning cold and rain were unbearable, despite his warm black coat and fur hat. His upturned collar and black umbrella hid him from the wind, rain, and unwanted glances, which he needed to avoid at this time. In a few minutes, he saw the person he was looking for - a tall man with a perfectly smooth skull, wearing a black raincoat and carrying a small men's bag, who quickly ran under the covered roof of the market and walked between the stalls. Victor hid his umbrella and slowly followed him, occasionally looking back at the stalls and sometimes stopping to examine the goods when the bald man in front did the same. After half an hour of wandering, the man led Victor to a food stall, where he stopped for a moment and went behind it. Victor glanced around briefly and folowed him. Behind the stall was a market trash cans, not far from which, near a concrete fence, stood Buzyna with a plastic cup of steaming coffee. Seeing Victor, Alexei nodded slightly and took a cigarette out of his pocket.\n\n\"Got a light?\"\n\nThe brief flash of a match illuminated Alexei's face, revealing his noticeably thinner cheeks and bags under his eyes.\n\n\"Medvedchuk? Anyone, really. I sent letters to three more people, but it seems they didn't arrive - either the letters or the recipients.\" Buzyna took a long drag. \"In short, everything went to shit. Our people were scattered everywhere, and most of them haven't been heard from since the war began. On the bright side, we managed to establish contact with the \"Capital\" - they're in the same fucking chaos, but it seems to be more controlled. We'll have to sit and endure this madness until the \"saviors\" come to rescue us from this \"misunderstanding.\" But we won't sit idly by. Here are all the instructions. Wait for the signal and keep your eyes open.\"\n\nLooking back, Buzyna took a gray package from under his cloak and handed it to Victor."
 UKR_afterwar_events.4.a:0 "\"We're already hooked, it's just a matter of when they'll pull us out.\""
 UKR_afterwar_events.5.t:0 "Catch"
 UKR_afterwar_events.5.desc:0 "Medvedchuk now understood the reason for the bags under his eyes. What remained of the NKVD of the Dnierer District tried to somehow shake up the situation that had developed. Gathering in the basement of a residential building, people who were still loyal to neobolshevik ideals did everything they could to continue to instill faith in the revolution in people: a hastily assembled printing press produced leaflets and posters, poems and speeches about faith in the revolution and the Lavrentiy Beria were written, and trusted individuals collected these posters and distributed them among the most vulnerable segments of society. Buzyna nodded his head toward the exit, and he followed him from the stuffy basement to the first floor of the building. The house of one of the former employees of the district civil administration stood on the outskirts of Kyiv, serving as the temporary Eurasian headquarters. Buzyna sat at the kitchen table, holding his fourth mug of coffee and sixth cigarette since three in the morning.\n\n\"How are your political leaflets coming along?\" he asked quietly. Viktor had spent the last week writing leaflets that declared the Ukrainian government illegal on behalf of Kapitalgrad and called for its overthrow.\n\n\"Little by little,\" replied Victor, rubbing his eyes and glancing at the window, from which the morning chill was blowing in. \"It's hard to call for the restoration of Eurasia when your opponent is doing everything to wipe it out. The liaison officer recently said that everything in the \"Capital\" has gone to hell - Gumilev has decided to build his own \"Eurasia.\" At this rate...\"\n\nA metallic clang on the floor distracted Victor. Some kind of metal cylinder rolled up to the table. A moment later, a bright light blinded him, and a piercing squeal deafened him. A few seconds later, Victor was lying on the floor and saw Buzyna, who had jumped to his feet, stagger and drop the gun from his hands, falling face down next to him, with a hole where his left eye should have been, blood flooding his slightly surprised face. Victor vomited as he tried to get up, but an unknown force pinned him to the ground. He could only see several armed men storming the basement, which refused to surrender without a fight. That unknown force, which turned out to be another soldier, said something to him, but he only heard the last words."
 UKR_afterwar_events.5.a:0 "\"...You are under arrest for treason.\""
 UKR_afterwar_events.6.t:0 "It's rainiang Lenins"
 UKR_afterwar_events.6.desc:0 "Yawning, the Kyiv police chief glanced at his watch. It was already eleven o'clock, which meant that the city had been awake for almost six hours. About three hundred people had gathered at the intersection of Shevchenko Boulevard and Khreshchatyk Street for a mass rally, which had attracted almost five hundred people by dawn. It was the largest rally he had seen since independence was declared, so there was no shortage of police on the scene - a dozen patrols had to be sacrificed to simply monitor the situation, with orders to intervene only in case of emergency. The cause of this gathering, a granite monument to Lenin, was already decorated with eggs, rotten vegetables, red paint, flags of Ukraine, the UPA, and party organizations, and there was no shortage of offensive inscriptions on the pedestal.\n\nBut it seemed that the police would not have to stand there for long, as the crowd began to move toward the climax of the event. Several men with scarves tied around their faces climbed onto the pedestal and threw ropes over the statue. The police chief waved to the police to go to the pedestal, while he himself took a megaphone:\n\n\"Dear citizens! Move away from the statue immediately, at least five meters! Ensure that civilian casualties are minimized!\"\n\nThe protesters themselves understood the danger of the three-meter granite statue falling, and with the police's help, the crowd quickly cleared the area in front of the statue, leaving only a few dozen men who grabbed the ropes and began to pull. The police chief did not believe that they would succeed, but a minute later he saw through his binoculars how one of Lenin's legs cracked, and then the other quickly gave way - the three-and-a-half-meter statue of red granite fell headfirst, hitting the ground. The event caused a sensation among the crowd, and several men climbed ladders to the pedestal, where only the feet of the leader of the revolution remained, waving Ukrainian flags.\n\nThe rally caused minor damage-apart from the broken monument and the broken pavement where Lenin had smashed his head, there was no further damage or casualties. Finishing writing his report at the police station, the chief scratched his neck."
 UKR_afterwar_events.6.a:0 "This is definitely not the last falling Lenin"
 UKR_afterwar_events.7.t:0 "The Lost Apostle"
 UKR_afterwar_events.7.desc:0 "\"...and as you all know, dear listeners, until the 1950s, Stepan Bandera lived and worked in the territories of the then Federal Republic of Germany, which was formed from the occupied territories of Germany by the Allies, where he remained the Head of the Foreign Parts of the OUN-B. However, after the start of the nuclear war, any mention of Bandera and the FP OUN-B disappeared.\" The announcer of the national radio station \"Ukraine,\" whose story was broadcast live on all radio and television channels in the country, took a breath and drank some water from a glass nearby. \"But after the capture of members of the former NKVD, some documents were found that partially shed light on the events of those times. After the start of the nuclear war, the \"Banderites\" and the democratic \"Dviykars\" led by Lev Rebet at the time reunited to save the OUN. The documents reported that the leadership was to be evacuated by train to the Italian city of Genoa, from where a submarine was to transport them to the North African colonies of France. But... after their arrival in Genoa, no one saw them again - the NKVD found no one in the city, and there were no reports of refugees arriving in Africa. Later, after the war, locals found a piece of a submarine washed up on the shore. Experts figured out it was an American submarine that had been relocated to Genoa right at the start of the war and then disappeared without a trace. The NKVD reported to the capital that the leadership of the OUN, together with Stepan Bandera, had died in mid-October 1951, probably after encountering a Soviet depth charge 40 kilometers from the island of Sardinia.\" The announcer took another sip of water from his glass. \"Although many now dispute Bandera's influence on the Ukrainian revolution, even he himself acknowledged the failure of the liberation that had been going on since 1941, hardly anyone would question his influence on Ukrainian consciousness and Ukraine as a whole. Wherever his remains may be now - whether they were washed up on the shores of Africa or lie among the ruins at the bottom of the Mediterranean Sea - Ukraine will always remember the hero of this struggle.\""
 UKR_afterwar_events.7.a:0 "\"Rest in peace.\""
 UKR_afterwar_events.8.t:0 "Collapse"
 UKR_afterwar_events.8.desc:0 "Viktor Medvedchuk sat silently on the defendant's bench, as if detached from reality. The events of the last month had shaken him to the core and sucked the last of his vitality out of him. He had lost the will to fight for anything, even his own life. The Kyiv court had been working tirelessly - it had already sentenced about a hundred members of his party and other people involved in anti-Ukrainian activities, and now it was his turn. The list of charges included treason, organizing terrorist activities, attempting to undermine statehood, and other minor charges. They even mentioned all the cases he had brought against dissidents. His state-appointed lawyer fought hard for him, countering the charges with the Eurasian judicial system, which was decided without lawyers, but Viktor did not care. He only briefly glanced around the courtroom, which had undergone changes - all Eurasian symbols had been replaced with Ukrainian ones, there were many more people in the room listening to the case, and there were microphones on stands next to the parties to the case and the judge, stretching to the table with the press.\n\n\"Medvedchuk Viktor Vladimirovich, please stand up,\" the judge's voice rang out. Viktor reluctantly stood up. \"Do you have anything to say before the verdict is handed down?\"\n\nHis lawyer looked at him questioningly, hoping for an admission of guilt or at least minimal agreement, but Viktor simply lowered his head. The judge had no choice but to deliver the verdict with a bang of his gavel."
 UKR_afterwar_events.8.a:0 "\"Life imprisonment.\""
 UKR_afterwar_events.8.b:0 "\"Capital punishment.\""
 UKR_afterwar_events.9.t:0 "Transfer of power"
 UKR_afterwar_events.9.desc:0 "[UKR.GetLeader] entered the Office of the President of Ukraine and quickly made his way to the appropriate office. He was a frequent visitor here, so he could go straight to the main office without any introductions. Knocking on the door, [UKR.GetLeader] entered - Stepan Bratsiun was gathering documents into folders at his desk. After exchanging handshakes, Stepan looked around his office, which was now his former office.\n\n\"Well, it seems like everything is finished. You already know where the necessary documents are, I left all the necessary contacts, and...\" Stepan paused, not knowing what to say next. \"...maybe some tea?\"\n\nA minute later, they were sitting at the table with tea. \"You know, it's for the best. By nature, I'm more of a military man than a politician. All these papers and diplomacy...\"\n\n\"You did quite well. This country needed a strong leader, and you handled that burden perfectly.\"\n\n\"I had good assistants.\" Victor smiled as he sipped his tea. \"Well, you have your movement for freedom and democracy, and I have my military organization - we'll both have plenty to do.\""
 UKR_afterwar_events.9.a:0 "Towards a new future."
 UKR_afterwar_events.10.t:0 "Ukrainian good neighborliness"
 UKR_afterwar_events.10.desc:0 "Amidst the chaos engulfing Eastern Europe, a bright torch of freedom burns. The Ukrainian Republic, which managed to stabilize after the war, has become a beacon of hope for many nations striving for freedom and democracy. It is now actively accepting refugees from our regions and is committed to helping free states in their struggle for freedom. Although now, when the shadow of Eurasia still hangs over Europe, borders are more of a fictitious phenomenon, we will have a good neighbor in the future."
 UKR_afterwar_events.10.a:0 "Friendship or deception?"
 UKR_afterwar_events.11.t:0 "Wounds"
 UKR_afterwar_events.11.desc:0 "The tranquility of the city, fast asleep, was shattered by the sirens of ambulances rushing through the night streets. The sharp screech of tires from an old UAZ-452 ambulance, commonly known as a \"bukhanka\", echoed throughout Hrushevsky Street. Paramedics with medical bags and stretchers quickly ran to the main entrance of the Cabinet of Ministers, where a security guard waved them over. A few minutes later, the paramedics carried a man in a black suit on a stretcher, followed by a man in a brown suit who ran out of the building and argued with the paramedics by the car, but they still allowed him to get in, and the ambulance immediately rushed to the hospital.\n\n\"Coronary heart disease, stomach ulcer with bleeding...\" the gray-haired paramedic said quietly as he wrote in the patient's chart, \"Oh, you've really let yourself go, sir.\"\n\nStus regained consciousness only at noon the next day in the hospital. Warm light filtered through the hospital curtains. Mykola Kuncevych was sitting next to the bed, reading a book. Seeing the movement, he quickly put the book down.\n\n\"Vasyl, you're finally awake! You scared everyone so much... Oh well, let's not talk about that. How are you feeling?\"\n\n\"Not great...\" Vasyl was surprised at how quiet his voice was.\n\n\"Oh, well, at least that's something. The doctor said it was a heart attack. Chornovil accompanied you here and sat outside the operating room until the doctors sent him home to sleep. But I can tell you for sure, lunch won't have time to cool down before he's back here.\"\n\nIndeed, Vyacheslav Chornovil appeared before lunch during the last hour of morning visiting hours. After similar questions about his health, he said that he had made sure that work would not come to a standstill without Vasyl.\n\n\"There's a session in the Verkhovna Rada soon,\" Vyacheslav glanced at his watch and stood up. \"See ya, friend, get well soon.\""
 UKR_afterwar_events.11.a:0 "\"You can still do so much for Ukraine.\""
 UKR_afterwar_events.12.t:0 "Bestseller"
 UKR_afterwar_events.12.desc:0 "Stus was sitting near a small coffee shop, opposite which was a bookstore. Today, from early morning, it was particularly busy - a new book had gone on sale, which had already become a bestseller in Ukraine. Although due to a lack of funds and time, it was a simple paperback with no illustrations, the first print run of \"Bird of the Soul\" sold out at an impressive speed. About eighty copies were supposed to arrive at this bookstore, but the number of visitors waiting for the opening suggested that they would not have time to be displayed on the shelves. Vasyl Stus did not know how to act in such a situation - after underground publications, where instead of fans he encountered NKVD raids, this was a completely different feeling.\n\nThere was a commotion - from the group of people who quickly entered the store after it opened, Mykola Kunchevych quickly jumped out, swearing and waving his cane. He quickly went to Stus, who was sitting on a bench, taking a book out of his pocket.\n\n\"They flocked like flies to honey, honestly! But I promised I would definitely buy it!\"\n\n\"Have you ever read poetry?\"\n\nMykola smiled as he twirled the book in his hand. \"Honestly, never. I don't really like reading, mostly scripts. But I promised back in the colony, how could I forget!\n\nSmiling, Vasyl took the book from his hands."
 UKR_afterwar_events.12.a:0 "He took a pen out of his pocket and signed the first page."
 UKR_afterwar_events.13.t:0 "Farewell"
 UKR_afterwar_events.13.desc:0 "The night taxi driver, encouraged by generous tips, sped through the night streets of Kyiv, breaking all possible speed limits and traffic rules. But Chornovil still felt that they were running late. When the taxi slowed down in front of the hospital building, Vyacheslav threw a twenty bill on the front seat and quickly jumped out of the car. He ran past the doctor on duty straight to the painfully familiar ward. When he entered it, he could hardly restrain himself from groaning. Over the past few weeks, Vasyl Stus had become unrecognizable - he looked like a skull with sunken eyes covered with pale skin. His son Dmytro and his wife Valentina sat by the bedside of the heavily breathing Stus, holding his hand and trying to hold back tears. Bratsiun, Kuncevich, Lukyanenko, and Ovsienko stood in the ward, still in shock. \"He has a week left at most.\" Those words from the doctor on the phone still echoed in Vyacheslav's head.\n\n\"Guys... I'm glad you came...\" Stus's hoarse voice was barely audible. \"I'm glad that I know all of you... that we've been through so much... done so much... but most of all, I'm glad that I finally saw [GetUkraineSituationStus]...\"\n\nIt was an extremely cold day, and it rained incessantly - as if the heavens themselves could not cry enough. A coffin was carried out of the door of the Ascension Church and taken by hearse along the road to the Baikove Cemetery. The car passed by a crowd of thousands of people, from politicians to ordinary passers-by who had come to see Stus off on his last journey. Vyacheslav Chornovil was unable to utter a single word during the entire funeral procession. After accompanying the hearse to the grave in plot No. 33, he gave Bratsiun the right to say a farewell speech. When the coffin disappeared into the ground, he placed a bouquet of flowers on it, uttering the only words he spoke all day."
 UKR_afterwar_events.13.a:0 "\"Goodbye, my friend.\""
 UKR_Ukraine_United:0 "Ukraine... free and united"
 UKR_Ukraine_Great:0 "a large and free Ukraine... from the San to the Caucasus"
 UKR_Ukraine_Rus_United:0 "a free country... one that no one could even imagine"
 UKR_Ukraine_North:0 "a free Ukraine... although still divided"
 UKR_Stus_Died:0 "§RRest in peace, Vasyl Semenovych Stus\n1938.01.06-[?global.date.GetDateStringNoHour]§!"
 UKR_afterwar_events.14.t:0 "Contact"
 UKR_afterwar_events.14.desc:0 "\"Lydia, you won't believe what happened!\" Orest rushed into the workshop's utility room. Lydia, startled, knocked over the sugar bowl.\n\n\"Damn you, Orest! Where have you been?! You haven't been at work for three days, we were about to file a missing person report!\"\n\n\"Oh, I'll tell you now, it's unbelievable!\" Orest pulled up a stool to the table and sat down next to Lydia. \"Two days ago, I went to a village outside the city, and there they saw something like flying saucers at night...\"\n\n\"Oh my God, Orest, did you at least see a doctor? You'll get lost somewhere in the fields with your aliens!\"\n\n\"Just listen! So, I asked the villagers and decided to spend the night on the outskirts.\n\nI pitched my tent near the field, and in the morning I woke up and saw this!\" Orest took a photo out of his pocket and gave it to Lydia. In the photo, the colors were mixed up in places due to poor development, but could still see the field, photographed from above. And in the field itself, there were trampled circles - perfectly even circles of different sizes connected by equally perfect lines, forming a bizarre figure that stretched beyond the horizon.\n\n\"Well, what is it?\"\n\n\"It's a sign! They recognized me as worthy! The whole village was surprised - everyone talked about flying saucers, but they had never seen symbols in the field before. I spent two more nights there, but nothing else happened. They definitely had a reason for leaving the symbol to me! Even beyond the planet, they recognized the new prince!\"\n\nLydia just rolled her eyes. Orest's ramblings about aliens and the principality sometimes reached the point of absurdity. She looked at the photo again."
 UKR_afterwar_events.14.a:0 "Orest really needs to see a doctor."
 UKR_afterwar_events.14.b:0 "Perhaps there is something to his stories."
 UKR_Secret_Branch:0 "§YSomething will happen...§!"
 UKR_afterwar_events.15.t:0 "Moses"
 UKR_afterwar_events.15.desc:0 "Bratsiun stood in front of the balcony door. Dressed in military uniform and holding the text of his speech in his hands, he could not contain his excitement. The building in which he now stood was the very building of the Prosvita Society in Lviv, and he was about to step out onto the same balcony that Stetsko had stepped out onto in 1941.\n\nThe same place,\n\nfor the same idea\n\nand the same goal.\n\nTaking a deep breath, he put the text of his speech aside and stepped out onto the balcony. Rynok Square was full of people who looked up at the balcony and greeted Serdulets with cheers. Speakers were attached to the balcony railing to broadcast his speech to the street and on the radio throughout the country. Below, the cameras of photographers and videographers clicked away so that the news of the speech would make it into the newspapers and onto television screens.\n\nThe speech that Stepan Bratsiun delivered to the crowd was quite similar to the text of the Act of Restoration of the Ukrainian State. But this time, they would not make the same mistake they had made twice already in this century. They would not seek foreign powers to save them - they would liberate themselves from the yoke of neobolshevism. Amidst the cheers of the crowd, Victor simply stared silently at the horizon. The burden he had taken on was not an easy one."
 UKR_afterwar_events.15.a:0 "But they will manage."
 UKR_Return_Carpathia_Effect:0 "The leader of the alliance may agree to transfer the territories of Transcarpathia to Ukraine in exchange for its entry into the Balkan War, and to forward the proposal to Hungary (if it is not the leader of the alliance, it can immediately choose whether to transfer Transcarpathia). If Hungary refuses to transfer Transcarpathia after the alliance leader passes on the proposal, Ukraine will be able to resubmit its proposal to join the war when Hungary capitulates."
 UKR_Deslined_Carpathia_Effect:0 "Although Hungary has refused to hand over Transcarpathia, we will be able to resubmit the proposal once it capitulates."
 UKR_afterwar_events.16.t:0 "Ukrainian proposal"
 UKR_afterwar_events.16.desc:0 "The Ukrainian administration managed to contact us and offered an unusual deal. Northern Ukraine has recently managed to secure its place on the world map, and now it wants to help others do the same. But in return, they are asking for territorial concessions. They demand that we cede them the territories of Transcarpathia, including the city of Berehove, in exchange for which they will immediately order their troops to advance into the Balkans to help us."
 UKR_afterwar_events.16.a:0 "A strong ally for small territories? That's great!"
 UKR_afterwar_events.16.b:0 "We do not trade either foreign or our own lands"
 UKR_afterwar_events.17.t:0 "[FROM.GetName] wants us to transfer Transcarpathia"
 UKR_afterwar_events.17.desc:0 "Recently, [FROM.GetName] spoke with the government of Northern Ukraine, which offered to transfer Transcarpathia in exchange for Ukraine's direct intervention in the war in the Balkans. Their participation could be decisive in the war with Eurasian control in the Balkans, but is it worth giving up our lands for that? [FROM.GetName] has demonstratively shown that she is not opposed to such an agreement, but what about us?"
 UKR_afterwar_events.17.a:0 "This is really extremely profitable"
 UKR_afterwar_events.17.b:0 "Did you ask us?! No way!"
 UKR_afterwar_events.18.t:0 "[FROM.GetName] agrees"
 UKR_afterwar_events.18.desc:0 "Today, [UKR.GetLeader] signed an agreement with [FROM.GetName] to transfer Transcarpathia, including the city of Berehove, to Ukrainian control, in exchange for our assistance in defeating the remaining Eurasian forces in the Balkans. The army has already been mobilized and is awaiting orders."
 UKR_afterwar_events.18.a:0 "Forward!"
 UKR_afterwar_events.19.t:0 "[FROM.GetName] refuse"
 UKR_afterwar_events.19.desc:0 "The response from [FROM.GetName] was unpleasant. It stated that it would not trade either its own or other people's lands, even if this would jeopardize their survival."
 UKR_afterwar_events.19.a:0 "Sadly, it's their prerogative."
 UKR_afterwar_events.20.t:0 "Hungary interferes in the agreement"
 UKR_afterwar_events.20.desc:0 "When everything seemed to be going quite smoothly, Hungary abruptly broke off all agreements. It declared that it would not allow the fate of its lands to be decided behind its back, and that the Balkan Pact would deal with all threats on its own."
 UKR_afterwar_events.20.a:0 "We'll see about that."
 UKR_afterwar_events.21.t:0 "Hungary capitulated"
 UKR_afterwar_events.21.desc:0 "The Hungarian government's rhetoric about how it would stand up to its enemies went up in smoke along with its army. Now that Hungary is no longer an obstacle, we can repeat our request for the return of Transcarpathia."
 UKR_afterwar_events.21.a:0 "But this time we will not repeat ourselves"
 UKR_afterwar_events.22.t:0 "Ukrainian proposal, once more"
 UKR_afterwar_events.22.desc:0 "The Ukrainian government has reestablished contact. Now that Hungary has surrendered, they recognize how vulnerable we are to resisting on our own. The same conditions as before, Transcarpathia in exchange for intervention."
 UKR_afterwar_events.22.a:0 "We agree"
 UKR_afterwar_events.22.b:0 "Never!"
 UKR_afterwar_events.23.t:0 "[FROM.GetName] agrees"
 UKR_afterwar_events.23.desc:0 "Today, [UKR.GetLeader] signed an agreement with [FROM.GetName] to transfer Transcarpathia, including the city of Berehove, to Ukrainian control, in exchange for our assistance in defeating the remaining Eurasian forces in the Balkans. The army has already been mobilized and is awaiting orders."
 UKR_afterwar_events.23.a:0 "That's it right away!"
 UKR_afterwar_events.24.t:0 "[FROM.GetName] refuse"
 UKR_afterwar_events.24.desc:0 "The response from [FROM.GetName] was unpleasant. It stated that it would not trade either its own or other people's lands, even if this would jeopardize their survival."
 UKR_afterwar_events.24.a:0 "It was the last attempt"
 UKR_afterwar_events.25.t:0 "Kurultai"
 UKR_afterwar_events.25.desc:0 "Today, [?global.date.GetDateStringNoHour], the Crimean Tatar people are once again gathering for a large congress to resolve internal issues, for the first time in almost eighty years. This congress, known among Turkic peoples as a kurultai, is the second in the history of Crimea and is once again discussing issues of its identity. Having proclaimed Mustafa Dzhemilev Abdulcemil as its leader, the kurultai declared the creation of Crimean autonomy, aligned with Ukraine. After welcoming Mustafa Abdulcemil to the Verkhovna Rada to announce this news, the Ukrainian parliament began discussing the implementation of Crimean autonomy. Although Crimea is now independent, the kurultai gave the Ukrainian government the green light to fully resolve the issue of its autonomy."
 UKR_afterwar_events.25.a:0 "We will preserve Crimea's autonomy"
 UKR_afterwar_events.25.b:0 "Crimea will receive autonomy at the regional level"
 UKR_afterwar_events.26.t:0 "Voices from the taiga"
 UKR_afterwar_events.26.desc:0 "[UKR.GetLeader] now agreed with intelligence - the intercepted radio communications did not belong to Eurasia. The manner of speech helped distinguish Eurasian from Russian, and when the names of operations and locations with imperial terms were heard, all doubts disappeared. The player, which stood in the center of the table in front of the assembled general staff, clicked and fell silent, signaling to those present that the recording had ended.\n\n\"So, the Russians are beyond the Urals. How did you manage to get this recording? They're at least two thousand kilometers away?\"\n\n\"They use Eurasian radar stations to transmit commands deep into the continent to saboteurs. The Belarusians intercepted one from Kaliningrad and broke the codes.\"\n\n\"So, we can contact them...\" [UKR.GetLeader] thought for a moment. Vasyl Kuk stood up.\n\n\"Let me ask you this - you're not going to establish contact with them, are you?\"\n\nOne of the generals also stood up. \"Why not? Eurasia still exists and could attack us at any moment, and such an ally would be quite valuable.\"\n\n\"We promised not to repeat the mistakes of the past. We don't even know the approximate situation beyond the Urals, let alone the intentions of the Russians. How many more times will we voluntarily put on the shackles of slavery from such \"friends,\" \"allies,\" and \"brotherly peoples\"? Vasyl Kook's words increased the tension in the room, inciting everyone present to argue. [UKR.GetLeader] stood up to say the last word."
 UKR_afterwar_events.26.a:0 "\"We must prepare for the arrival of enemies. Distant voices do not interest us.\""
 UKR_afterwar_events.26.b:0 "\"I will make sure that we don't make the same mistake again.\""
 UKR_RUS_alliance_effect:0 "If we form a Ukrainian-Russian anti-Eurasian alliance, when the [RUS.GetNameWithFlag] launches Operation Borodino, or when [UKR.GetNameWithFlag] decides to attack Kuban and Eurasia, the other state will be called to war as an ally. If, at the time of the formation of the alliance, the [RUS.GetNameWithFlag] is at war with the [SIB.GetNameWithFlag], [UKR.GetNameWithFlag] will be able to send volunteers to it and will not be able to launch an attack until the war is over."
 UKR_RUS_alliance:0 "Ukrainian-Russian anti-Eurasian alliance was formed"
 UKR_afterwar_events.27.t:0 "Voices from the steppe"
 UKR_afterwar_events.27.desc:0 "Shukshin sat down at his desk to think about what he had heard. That evening, they had received a message that no one had expected. It was one of those messages that came from distant separatists via the Eurasian radar system, with the same encryption as all the others. But when the radio operators decrypted the message, they discovered its unusual content. The Eurasian governments of the Dnieper and Black Sea regions had been overthrown, and Ukraine had been restored in their territories. Its goals, like those of Russia, are similar: to ensure freedom for their peoples, and this goal is impossible as long as Eurasia and other dangerous entities exist alongside them. Ukraine proposes to join forces to help drive the danger away from the San to the Ural Mountains, ensuring the survival of their peoples."
 UKR_afterwar_events.27.a:0 "We are not entirely sure about them"
 UKR_afterwar_events.27.b:0 "Establish a direct connection with Kyiv!"
 UKR_afterwar_events.28.t:0 "[RUS.GetName] refuse"
 UKR_afterwar_events.28.desc:0 "After several days of trying to contact the Russian government, we finally received a response. The Russian government refused to cooperate in any way, after which the broadcast went silent. Well, at least we both agree on one thing without question."
 UKR_afterwar_events.28.a:0 "We cannot trust each other"
 UKR_afterwar_events.29.t:0 "[RUS.GetName] agree"
 UKR_afterwar_events.29.desc:0 "After several days of trying to contact the Russian government, we finally received a response. The Russian government, led by Vasily Shukshin, agreed to political and military cooperation that would bring an end to Eurasian domination."
 UKR_afterwar_events.29.a:0 "Together to victory"
 UKR_afterwar_events.30.t:0 "[FROM.GetName] attacks Eurasian remnants"
 UKR_afterwar_events.30.desc:0 "The news immediately stirred our army - [FROM.GetAdjective] army crossed the borders of the remaining Eurasian districts, launching a full-scale offensive. Our troops were put on alert and are awaiting orders."
 UKR_afterwar_events.30.a:0 "Charge!"
 UKR_afterwar_events.31.t:0 "Wait?"
 UKR_afterwar_events.31.desc:0 "Through the binoculars, it was very clear to see a column of vehicles moving along the dirt road. Heavy rains had turned it into a veritable swamp, where more than one cow had gotten stuck in peacetime, so the vehicles moved cautiously, avoiding every section that seemed dangerous. \"Well, can you tell who's there?\"\n\n\"They all look the same. Either a machine or a machine gun. How can they tell friend from foe?\" Vano stroked his mustache and looked through his binoculars again. \"Judging by their uniforms, they could be Eurasians, communists would hardly be able to get out of Stalino, or imperialists from Crimea. But you know, I like this swamp.\"\n\n\"In what sense?\"\n\n\"Let's go back, darling, I'll explain later. We've seen everything we needed to see.\" Vano and the scout gathered their things and set off through the forest from the line they called \"no man's land\" - a place where, in theory, the border between the old districts lay, but neither side dared to verify its existence. After walking a kilometer through the swampy thickets, they came to a hidden military vehicle, where Ivan was sitting next to it, shivering from the cold. All three immediately got into the vehicle and drove towards their positions.\n\n\"So you said, Ivan, how many cows drowned here?\"\n\n\"Three or four got stuck every summer. I got a beating from my father once when I drowned our Maska in the pasture.\" The guide chuckled - sometimes Ivan's surzhik seemed more cheerful to him than Vano's accent with its constant \"darling\". - \"What do cows have to do with it?\"\n\n\"You'll find out later, darling. When I ask the bosses if they're ready to drown three or four tanks.\"\n\n\"Why?\""
 UKR_afterwar_events.31.a:0 "\"So it won't be boring. Let's go.\""
 UKR_afterwar_events.32.t:0 "Independence Day"
 UKR_afterwar_events.32.desc:0 "A bright sunny day lit up the streets, decorated with ribbons and flags. In the heart of Kyiv, on Khreshchatyk Street, there were many people walking around the city, wandering between the pavilions of the festive fair and portable stages where musicians played and performances were held. At noon, a military parade took place. Airplanes flew across the sky, military units marched down Khreshchatyk with flags, and military equipment drove by.\n\nAfter the parade, [UKR.GetLeader] took the stage. In a long speech, he praised the bravery of Ukrainian soldiers and citizens who fought so that they could stand there today, so that after half a century of struggle, Ukraine could finally call itself truly free, independent, and united. His speech was broadcast on large screens in all cities where mass celebrations were held."
 UKR_afterwar_events.32.a:0 "Happy Independence Day, Ukraine!"
 UKR_afterwar_events.33.t:0 "Memory"
 UKR_afterwar_events.33.desc:0 "Bratsiun couldn't sleep in the compartment of the old train traveling from Kyiv. The last few days had been filled with various meetings and ceremonies, which could start one hour after another in a different city. Bratsiun lay there, remembering the opening of the memorial, which had taken place just two hours earlier. It was a memorial to the victims of Babyn Yar, made in the shape of a Jewish menorah. To his surprise, there were indeed many Jews at the opening - a people who have survived all the world's misfortunes, and it was because of them that the opening had to be rescheduled for evening so as not to coincide with the Sabbath.\n\n\"I guess they still remember the 1940s,\" Stepan said to Vasyl. Vasyl Kuk was sitting on his bed, setting up a chessboard on the table by the window.\n\n\"I still remember how the leadership argued about whether they were for or against the Bolsheviks. It was only during the Palestinian War that we started saying 'Jew' instead of 'Yid'. And at the opening, a certain Hasman Mandyk approached me; it turns out he knew me. We served in the same kuren, and then he fought under my command in the OUN...\" Vasyl sighed, looking at the black king piece in his hand. \"It's good that at least with them we came to our senses in time, some were less fortunate .\"\n\n\"Speaking of those who were less fortunate, we are now going...\"\n\nVasyl nodded."
 UKR_afterwar_events.33.a:0 "\"Unveiling of a memorial to the victims of the Volhynia tragedy\""
 UKR_rus_events.1.t:0 "Long live the king!"
 UKR_rus_events.1.desc:0 "Crowd stood quietly near the Verkhovna Rada of Ukraine, waiting to see what would happen next. At the entrance to the building stood an object that attracted the most attention - an oak throne covered with expensive red fabric, gold, and precious stones, with the coat of arms of the Rurikids carved into its wooden backrest. Next to the throne was a small table with a red pillow covered with a gilded lid, and what was hidden under it was no less interesting than the throne itself.\n\nAt the sharp command of an officer, the guards lined up in two rows raised their trumpets to their lips and began to play the Ukrainian anthem. The organizer of this event, Orest Karelin-Romanshyn, emerged from the Council building and walked among the guardsmen. Against the backdrop of this organized, semi-fairytale performance of an enchanted kingdom, his clothing slightly disappointed the crowd - although he wore a red cloak on his shoulders, he was dressed in the same black admiral's uniform, albeit well decorated, and on his head was a large cylindrical white hat made of animal skins, which had recently been featured frequently in the newspapers. Orest walked to the throne under the gaze of the public, where he took his place. Vyacheslav Chornovil, who had now become the king's right-hand man, picked up a pillow with a lid, removed it, and showed its contents. On the pillow lay a golden crown, beautifully decorated with precious stones. This crown was a theoretical reconstruction of the one that Danylo Halytskyi must be worn, and its creation was personally supervised by Orest. After delivering a speech in which Orest Karelin-Romanshyn was proclaimed King Orest I of Ukraine, Vyacheslav stood by the throne and placed the crown on the king's head. After applause from the audience, who were both surprised and pleased with such an interesting turn of events, Orest rose from the throne and approached the podium with microphones, in front of which the press's cameras and video cameras were tirelessly clicking away.\n\n\"Subjects! Citizens! Friends! Today we stand on the threshold of a new era that will lead us to a bright future for our new state! Long ago, having inherited this ancient title, I will lead Ukraine to those glorious times when these lands were revered by all of Europe!\""
 UKR_rus_events.1.a:0 "Long live Orest I!"
 UKR_rus_events.2.t:0 "Second contact"
 UKR_rus_events.2.desc:0 "The entire royal guard had been on foot since the evening - in the king's new residence, which was a converted former Office of the President of Ukraine, no one could find King Orest I. The footman, who was supposed to bring him evening tea to his office, did not find him there, nor anywhere else in the building. The guard, with orders to check all possible locations without unnecessary noise, had already reported that he had not been found at home or at the garment factory, and had already begun to cordon off the city. When the guard officer began to get seriously worried, one of the guards ran up and reported that the king had returned on his own. Refusing to call the king's right-hand man, he personally went to check if everything was all right with the king (if something was wrong, the blame would immediately fall on him).\n\n\"Your Majesty, thank God you are all right!\" the officer exclaimed when he saw the king sitting on a chair in the lobby. Although his simple clothes were completely dirty, the king himself looked extremely happy.\n\n\"I'm fine, that's not the word!\" Orest said cheerfully as the officer escorted him to his chambers. \"No wonder they say that Zaporizhia is the largest gathering place for alien humanoids.\"\n\n\"Zaporizhia? You were all the way in Zaporizhia?!\"\n\n\"Incognito, of course, but yes, I managed to get there by train before dark. As usual, I set up camp in a field, and then it happened. I wake up in the middle of the night and see a bright light. I look, and there's a flying saucer standing there, its door open and light shining from inside, and standing next to it is... he... or rather she... probably her, judging by the silhouette. To be honest, I didn't understand anything from the sounds and didn't see clearly, as I was blinded and the saucer disappeared. But it's no coincidence that they appeared to me! Even alien civilizations recognize my power!\"\n\nThe officer's head was spinning from such stories. He decided it would be better to let the king's right-hand man think about these questions. \"That's very interesting, Your Majesty, very interesting. Chornovil will be here soon, you can discuss it with him.\""
 UKR_rus_events.2.a:0 "\"But please give advance notice of such visits.\""
 UKR_rus_events.3.t:0 "Who are we?"
 UKR_rus_events.3.desc:0 "The only active issue that still concerns us in domestic politics is the question of our nation. Although we consider ourselves descendants of ancient Kyivan Rus, it is impossible to erase Ukrainian nationality so easily, as Eurasia has proven. In his magnum opus, Mykhailo Hrushevsky used the name \"Ukraine-Rus\", emphasizing the close connection between Ukrainians and Rus. We could play on this to lift the spirits of our people."
 UKR_rus_events.3.a:0 "We will take the name of Hrushevsky!"
 UKR_rus_events.3.b:0 "We are the descendants of ancient Rus!"
 UKR_Rus_Ukraine_Effect:0 "In the future, we will adopt the name Ukraine-Rus"
 UKR_Rus_Kyiv_Effect:0 "In the future, we will adopt the name Kyivan Rus"
 UKR_rus_events.4.t:0 "The Pact of Rus and Scandinavia"
 UKR_rus_events.4.desc:0 "After the collapse of Eurasia, the continent was swept by a wave of revolutions, even the most bizarre ones. And now, we have recently received a message from the Kingdom of Ukraine, which has proclaimed itself the successor to Rus. Their king, Orest I, made a statement about our long-standing friendly ties, which cannot be broken by a millennium of history. Their goals from such friendship are not entirely clear to us, but their help in the war would be extremely useful."
 UKR_rus_events.4.a:0 "We will accept their help"
 UKR_rus_events.4.b:0 "It's better not to mess with them"
 UKR_rus_events.5.t:0 "Pact Rus-Scandinavia"
 UKR_rus_events.5.desc:0 "Today, the Scandinavian government officially restored its long-standing friendly ties with us, which existed even during the times of the road from the Varangian on the Greeks. Our troops are already preparing to march to distant frosty lands to help our brothers in the war against Eurasia."
 UKR_rus_events.5.a:0 "To arms"
 UKR_rus_events.6.t:0 "Scandinavia refuse"
 UKR_rus_events.6.desc:0 "The Scandinavian government has refused to cooperate with us. Even if it would help them survive the war."
 UKR_rus_events.6.a:0 "Well..."
 UKR_rus_events.7.t:0 "Ultimatum from Rus"
 UKR_rus_events.7.desc:0 "Today we received an official letter from Northern Ukraine, which has proclaimed itself the direct successor to Rus. In it, Orest I the Self-Proclaimed, albeit in a rather refined and polite manner, issued us an ultimatum: either we recognize his authority as king of Rus and integrate into his future state, or we will be wiped out by force."
 UKR_rus_events.7.a:0 "Do we have a choice?"
 UKR_rus_events.7.b:0 "You can't do this to me! I started this company!"
 UKR_rus_events.8.t:0 "[FROM.GetName] laid down its arms"
 UKR_rus_events.8.desc:0 "It seems that [FROM.GetName] remembers our power well. The border guards let our troops pass without any resistance, which marked the beginning of the transfer of power to us."
 UKR_rus_events.8.a:0 "Awesome!"
 UKR_rus_events.9.t:0 "[FROM.GetName] mobilizes its army"
 UKR_rus_events.9.desc:0 "In response to our ultimatum, the [FROM.GetAdjective] government began mobilizing its army. They understand that we are not joking and are ready for war."
 UKR_rus_events.9.a:0 "Forward!"
 UKR_economic_collapse.1.t:0 "Economic collapse!"
 UKR_economic_collapse.1.desc:0 "Our short-sightedness has led us to a deplorable situation: there is hunger in some regions, long queues for basic things, and the lack of resources has hit production. Changing the laws will do little to help in this situation, so our only hope is to fulfill the conditions of economic planning, no matter how difficult it is."
 UKR_economic_collapse.1.a:0 "It's terrible!"
 UKR_economic_collapse.2.t:0 "Economic collapse solved"
 UKR_economic_collapse.2.desc:0 "After this long time of suffering for our economy, it seems that we now have enough resources to provide for the military and civilian sectors. Industrialists are counting losses, and city administrations are counting the victims of hunger. If only we weren't so hardheaded..."
 UKR_economic_collapse.2.a:0 "Finnaly..."
 UKR_economic_collapse.3.t:0 "Economic planning ended"
 UKR_economic_collapse.3.desc:0 "After this long time, it seems that we now have enough resources to provide for the military and civilian sectors. Although we could have developed our economy for much longer, the military administration believes that this is enough to fully provide the country with everything it needs, and has switched the economy back to active military production."
 UKR_economic_collapse.3.a:0 "Ok"
 UKR_secret.1.t:0 "The Return of the Prodigal Sons"
 UKR_secret.1.desc:0 "\"Damn, it's barely staying afloat!\" The captain of the military boat \"Pryluky\", who was on duty off the coast, looked in amazement at the unknown ship battling the stormy waves. The ship was completely rusted and looked like an old, neglected structure, with a torn, unknown flag flying from the mast that resembled a Scandinavian flag. \"As far as I know, it's extremely dangerous to cross the Bosporus for now, and with this storm... Vasyl, how long do I have to wait for communication?!\"\n\n\"There is no communication with them, I tried,\" the communications officer replied angrily, trying to find at least some channel through which to contact the unknown ship.\n\n\"Oh, damn you. Load the blanks!\" At the command, the cannons fired a blank volley, trying to break through the noise of the storm and attract attention. And it seemed to help - through the noise of the waves, a ship's horn sounded like the buzzing of a mosquito, and the ship drifting in the sea in front of them began to turn towards them. At the command \"full speed ahead\", the \"Pryluky\" quickly caught up with the ship to try to bring it safely to shore. \"Let them deal with them there,\" the captain thought to himself.\n\n\"Hey, that's banderites flag!\" one of the sailors exclaimed, pointing to the torn flag. As they got closer, they were able to read the rusty letters on the stern."
 UKR_secret.1.a:0 "\"Ark\""
 UKR_secret.2.t:0 "The Return of the Lost Father"
 UKR_secret.2.desc:0 "The old Soviet destroyer, self-named \"Ark\" by the refugees, served them well - it carried hundreds of people from Ukraine and Southern Europe to Africa, hiding in former colonies from the flames of World War III. And now, it has once again crossed the Bosporus, that burning in the chaos of war, to bring people home on its last voyage, despite the fact that a storm damaged its electronics and opened several holes in its hull.\n\nA temporary headquarters was set up in the port of Odesa, where they tried to sort out the ship's passengers, understand their origins, and decide what to do with them. While one of the employees was rubbing his eyes, an old man sat down next to him, wearing a suit yellowed by dampness and age, and handed him some equally yellowed documents with his dry hand. This was not the first time - amid the anarchy in Africa, even such documents were rare, so he carefully opened them to read about the new arrival. His eyes immediately widened, and he looked in surprise from the papers to the old man. No, it couldn't be. Realizing that it was not worth making a fuss about, he nodded slightly and picked up the phone.\n\n[UKR.GetLeader] looked at the old man who had been brought to Kyiv by express train. He immediately realized that it was not a rumor - although wrinkled and wearing glasses, he was easy to recognize from the photographs. They shook hands. \"Did you get here on your own? Your wife, children?\"\n\nThe grandfather waved his hand. \"Ebola,\" though quite quiet, his voice was unmistakable, \"took many, but for some reason left me.\"\n\n\"I sympathize. But... a submarine...\"\n\n\"When our air filters failed, we transferred to the ship and left the submarine adrift.\"\n\n\"That's how it was.\" - [UKR.GetLeader] smiled, although perhaps they is no longer the person they used to be, but everyone will undoubtedly welcome this return with joy and hope."
 UKR_secret.2.a:0 "\"You're at home, Stepan Andriyovych\""
 UKR_news.1.t:0 "[GetNewspaperHeader]                                         Ukrainian Reunification"
 UKR_news.1.desc:0 "After half a century of fighting for its very existence, [UKR.GetName] has officially proclaimed its complete reunification. From Lviv to Donetsk, from Kyiv to Crimea, the Ukrainian language is once again heard and Ukrainian flags are flying, demonstrating to the world the indomitable spirit of this nation. Although the world is still ablaze with revolutions and its neighbors are still uncertain about peaceful coexistence with this state, Ukraine is already halfway to restoring the nation from all the horrors brought about by years of occupation and extermination."
 UKR_news.1.a:0 "Indeed, an unburnable nation"
 UKR_news.2.t:0 "[GetNewspaperHeader]                                         Ukrainian-Russian... war?"
 UKR_news.2.desc:0 "At night, Ukrainian and Russian aircraft were scrambled into the sky, while the armies of the two states launched an offensive. What many initially considered to be a new conflict between free and long-conflicting states turned out to be a joint operation to crush the remnants of Eurasia in the territories between Leningrad and the Caucasus. The armies of the two countries have already agreed on their borders and are now moving to destroy once and for all the neobolshevik threat that has haunted the continent for the last half-century."
 UKR_news.2.a:0 "Between the Russian hammer and the Ukrainian anvil"
 UKR_news.3.t:0 "[GetNewspaperHeader]                                         Proclaiming of Holy Rus"
 UKR_news.3.desc:0 "What seemed like a foolish idea or the delusion of a madman suddenly became reality. Long forgotten in the thickets of history, [UKR.GetName] reappeared on the world map. The state, led by King Orest I, took all the lands it claimed by fire and sword and proclaimed itself the heir to ancient Rus. It seems that we are returning to the days of bloody wars fought for personal ambitions."
 UKR_news.3.a:0 "With God's help?"
 UKR_news.4.t:0 "[GetNewspaperHeader]                                         The return of Stepan Bandera"
 UKR_news.4.desc:0 "The news of the last few days has come as a real shock to the whole of Ukraine. What seemed impossible has happened - Stepan Andriyovych Bandera, leader of the OUN(b) during World War II and father of Ukrainian nationalism, who was believed to have been dead for half a century, has returned home after a long period in hiding in Africa. Although the chain of events seems extremely crazy, the Ukrainian people joyfully welcome the return of the leader of the Ukrainian revolution, who has once again taken the helm of the Ukrainian state."
 UKR_news.4.a:0 "A happy ending, just what we needed"