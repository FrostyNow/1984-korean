 UKR_war_focus_tree:0 "Ukrainian War Focus Tree"
 UKR_We_Are_Forest_Devils:0 "We Are Forest Devils"
 UKR_We_Are_Forest_Devils_desc:0 "\n\n\n\n£GFX_UKR_We_Are_Forest_Devils_Banner\n\n\n\n\n\n\n§RThey thought they had destroyed us.\nBut we were actually just waiting.§!\n\n§WThe Ukrainian people have been destroyed for thousands of years. It has been erased by the Mongols, trampled by the Poles, chained by the Russians, pressed from both sides by the Germans and the Soviets, and attempted to erase its identity by the Neo-Bolsheviks. But as in the legend of the burning bush, Ukraine emerges from the fire and ashes, ready to challenge its enemies again.§!\n\n§BSoul and body shall we lay down for our liberty,§!\n§YAnd we'll show, O brethen, that we're a Cossack family!§!"
 UKR_Unburnable_Bump:0 "Burning Bush"
 UKR_Unburnable_Bump_desc:0 "\n\n\n\n£GFX_UKR_Unburnable_Bump_Banner\n\n\n\n\n\n\n§WThe ancient legend of the burning bush tells the story of when the Hungarian and Polish kings approached the glorious city of Dorohobuzh with their armies, demanding that it surrender without a fight. In response, a messenger came out of the city with a strange bush, named \"Dictamnus albus\", or \"Burning Bush\", that burned with a greenish flame but did not burn, and said nothing else. Seeing this, the kings turned the army around and left with nothing.\n\nAnd now our glorious nation has emerged from the fire, ready to fight for freedom, demonstrating the only true truth - no matter how many times this nation has fallen, it will rise again.§!"
 UKR_Desline_Of_Nation:0 "Decline of Nation"
 UKR_Desline_Of_Nation_desc:0 "\n\n\n\n£GFX_UKR_Desline_Of_Nation_Banner\n\n\n\n\n\n\n§WWho are Ukrainians? Why do we call ourselves that? What are we fighting for?\n\nNow, united by adversity and a common enemy, this nation is fighting as a single mechanism, but these questions are becoming louder and louder. A fallen nation, mixed with other, having lost its identity, needs answers to these questions.\n\nHow long will we allow these questions to destroy us from within?§!"
 UKR_Desline_Of_Nation_Change:0 "Modify §Y$UKR_Desline_Of_Nation$§! by:"
 UKR_Tank_Industry_Idea:0 "Ukrainian Tank Industry"
 UKR_Tank_Industry_Idea_desc:0 ""
 UKR_Repurpose_Civilian_Logistics_Idea:0 "Repurpose Civilian Logistics"
 UKR_Repurpose_Civilian_Logistics_Idea_desc:0 ""
 UKR_Economic_Planning:0 "Economic Planning"
 UKR_Economic_Planning_desc:0 "§WOur economists want us to ease the pressure on the economy in this difficult time to allow it to develop to an acceptable level. Instead of fulfilling military orders, our factories will produce consumer products until there are enough resources to fully support both the civilian and military sectors.\n\nIf we raise the economic law above the §YPartial Economic Mobilisation§! when we have less than §Y25 civilian factories§!, it threatens §REconomic Collapse!§!§!"
 UKR_Economic_Collapse:0 "Economic Collapse"
 UKR_Economic_Collapse_desc:0 "§WOur short-sightedness has led us to a deplorable situation: there is hunger in some regions, long queues for basic things, and the lack of resources has hit production. Changing the laws will do little to help in this situation, so our only hope is to fulfill the conditions of economic planning, no matter how difficult it is.§!"
 UKR_Unstable_Politics:0 "[GetUnstablePolitics]"
 UKR_Unstable_Politics_desc:0 "[GetUnstablePoliticsDesc]"
 UKR_Unstable_Politics_Change:0 "Modify §Y$UKR_Unstable_Politics$§! by:"
 UKR_Unstable_Politics_Unstable:0 "Unstable Politics"
 UKR_Unstable_Politics_Unstable_desc:0 "\n\n\n\n£GFX_UKR_Unstable_Politics_Banner\n\n\n\n\n\n\n§WNow that the war for independence is over, we have seen the true extent of the fragility of our politics. We have given groups of people the right to form parties and express themselves, and now radical groups are gaining influence across the country, oligarchic-collectivist remnants inciting of the masses to action and questioning the legitimacy of the UNA's rule. We can only resolve this by either strengthening our own power or giving it to those who are stronger.§!"
 UKR_Unstable_Politics_Stable:0 "Stable Politics"
 UKR_Unstable_Politics_Stable_desc:0 "\n\n\n\n£GFX_UKR_Unstable_Politics_Banner\n\n\n\n\n\n\n§WNow that the country's political arena has stabilized, we can finally calmly decide on Ukraine's future.§!"
 UKR_Eurasian_Remnants:0 "Eurasian Remnants"
 UKR_Eurasian_Remnants_desc:0 "\n\n\n\n£GFX_UKR_Eurasian_Remnants_Banner\n\n\n\n\n\n\n§WConspiracies and gossip are spreading in dark alleys and courtyards. The Eurasian rats that we did not manage to destroy have hidden in their burrows and only come out to cause trouble for us. They are already actively brainwashing ordinary people, telling them fairy tales about stability and a bright future for Eurasia, and that our independence will only bring ruin.§!\n§RWe'll find them and shove their tongues up their asses!§!"
 UKR_Eurasian_Remnants_Change:0 "Modify §Y$UKR_Eurasian_Remnants$§! by:"
 UKR_Refugee_Influx:0 "Refugee Influx"
 UKR_Refugee_Influx_desc:0 "\n\n\n\n£GFX_UKR_Refugee_Influx_Banner\n\n\n\n\n\n\n§WBorder troops have raised the alarm due to mass gatherings near the borders - and it's not the army. After rumors spread around the world that Ukraine had managed to secure its place on the map, hundreds of refugees from burning districts began fleeing to us from the war. Right now, this is playing into our hands - the refugees are settling in settlements devastated by purges and war and filling the labor shortage in factories, but who knows how things might turn out.§!"
 UKR_Antieurasian_Propaganda:0 "Antieurasian Propaganda"
 UKR_New_Economy_Idea_desc:0 "§W$UKR_New_Economy_desc$§!"
 UKR_New_Economy_Idea:0 "Kremenchuk Steel Works"
