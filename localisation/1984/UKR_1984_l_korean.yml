 achievement_UKR_from_san_to_chukotka_DESC:0 "As Rus, unite the Tsardom of Moscowy under the rule of Victor I, include Siberia."
 UKR_country_selection_tt:0 "§YHOW TO PLAY THE UKRAINIAN INSURGENT ARMY\n-----------------------------------------§!\nPlay as the §REurasian Union State§!, play through content until the province breakdown prior to the revolts occurs (before clicking the §Y'Eurasian Dusk'§! event button, pause the game or set the game speed to minimum if you don't want to miss any prewar event). When this occurs, open the decision menu and scroll down to the §Y'Legacy of Nations'§! decision menu and click the decision to switch to the §YDnieper Military District§!\n\nWait until the event to switch to the §RUkrainian Insurgent Army§! pops up."
 1984_Opening_Screen_UKR_Title_TT:0 "§BUKRAINIAN IN§!§YSURGENT ARMY§!"
 1984_Opening_Screen_UKR_Desc_TT:0 "After the failure of the OUN in 1945, after the arrest and murder of the leaders of the §BUkrai§!§Ynian§! movement, after the nuclear war and the establishment of total control over the continent, Eurasia thought that the §Ruprising§! had been suppressed. §RIt was wrong§!. §BUkra§!§Yine§! had always lived on - in hideouts disguised among the forests, in underground clubs in cities and villages, among poor people who remembered the taste of §Rrebellion§!.\n\nAnd now, as Eurasia burns, they are coming out of hiding, weapons in hand, with a short prayer of \"do-or-die.\" They are going to show the Lavrentiy Beria the truth that he did not understand, that neither Beria, nor Stalin, nor Lenin, nor the Russian tsars, nor the Ottoman sultans, nor the Mongols understood.\n\n§R§BUkra§!§Yine§! cannot be destroyed§!."
 1984_Opening_Screen_UKR_Gameplay_Paths_Desc_TT:0 "§YUkrainian Paths§!\n- Crush the §RNeobolshevism§! and restore §BUkrai§!§Ynian§! control over North oblasts.\n- Make peace with §wLukashenko's§! ruthenianism.\n- Restore the §BUkrai§!§Ynian§! people and reclaim the rest of §BUkra§!§Yine§!."
 1984_Opening_Screen_UKR_Button_TT:0 "Glory to Ukraine!"
