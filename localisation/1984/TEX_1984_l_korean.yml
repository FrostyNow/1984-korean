 TEX_Texas_decision_category:0 "[TEX.GetName]"
 TEX_Select_Leader_Portrait:0 "Select Leader Portrait"
 TEX_Bill_Clements_head_minister_desc:0 "§BConservative Democracy§!\n§YDefence Enthusiast§!"
 TEX_Elvis_Presley_foreign_minister_desc:0 "§BLiberal-Conservatism§!\n§YOld World Star§!"
 TEX_Ross_Perot_economic_minister_desc:0 "§BRightwing Populism§!\n§YTBD§!"
 TEX_R_Lee_Ermey_defence_minister_desc:0 "§BConservative Democracy§!\n§YDrill Sargent§!"
 TEX_Oliver_North_army_chief_desc:0 "§gPatriotic Democracy§!\n§YLoyal Veteran§!"
 TEX_Bobby_Ray_Inman_navy_chief_desc:0 "§gPatriotic Democracy§!\n§YNaval Intelligence Officer§!"
 TEX_George_H_W_air_chief_desc:0 "§BConservative Democracy§!\n§YWorld War Two Pilot§!"
 TEX_David_Atlee_Phillips_intelligence_chief_desc:0 "§gPatriotic Democracy§!\n§YWorld War Two Pilot§!"
 TEX_Spirit_Of_The_Alamo:0 "Spirit of the Alamo"
 TEX_Spirit_Of_The_Alamo_desc:0 "\n\n\n\n£GFX_TEX_Spirit_Of_The_Alamo_Banner\n\n\n\n\n\n\n§WThough much has been taken from Texas by the Oceanian spirit, our spirit to fight on against tyrants has not. With the moment of victory having arrived, the spirit of the Alamo has reignited like a bonfire, raging for all the Earth to see.\n\nAnd it won't simmer, not until all of Texas is liberated from hostile rule.§!"
 TEX_Confused_Populace:0 "Confused Populace"
 TEX_Confused_Populace_desc:0 "\n\n\n\n£GFX_TEX_Confused_Populace_Banner\n\n\n\n\n\n\n§WThe war to free Texas, for many, has been chaotic and sudden, our sheltered populace, especially those in the Outer Party, who thought that freedom was a distant dream are now confronted by those whom call themselves 'Texan' and are actively fighting to restore Texas.\n\nThis is a major adjustment and change in status quo, a change that will take time to properly adapt to.§!"
 TEX_Finding_Meaning:0 "Finding Meaning"
 TEX_Warriors_Of_Texas_idea:0 "Warriors of Texas"
 TEX_Operation_Snakevenom:0 "OPERATION: SNAKE VENOM"
 TEX_Our_Foes_Scared_Shitless:0 "Our Foes Scared Shitless"
 TEX_Disorganised_Economy:0 "Disorganised Economy"
 TEX_Disorganised_Economy_desc:0 "\n\n\n\n£GFX_TEX_Disorganised_Economy_Banner\n\n\n\n\n\n\n§WFrom the mismanagement of Oceanian rule to the current chaos of revolution taking place, the Texan Economy has certainly seen better days. Though the potential isn't lost, it will take some effort to get everything back on track.§!"
 TEX_Economic_Lumberings:0 "Economic Lumberings"
 TEX_Growing_Economic_Movement:0 "Growing Economic Movement"
 TEX_Prosperity_Texas_Style:0 "Prosperity Texas Style!"
 TEX_Motorisation_Effort:0 "Motorisation Effort"
 TEX_Administrative_Overextension_One:0 "Administrative Overextension"
 TEX_Administrative_Overextension_Two:0 "Administrative Overextension"
 TEX_Administrative_Overextension_Three:0 "Administrative Overextension"
 TEX_Emergency_Relief_Efforts:0 "Emergency Relief Efforts"
 TEX_Black_Gold_State_idea:0 "Black Gold State"
 TEX_Christ_Minded_Governance:0 "Christ Minded Governance"
 TEX_Port_Of_Houston:0 "Port of Houston"
 TEX_Cowboy_Renaissance_idea:0 "Cowboy Renaissance"
 TEX_The_Lone_Star_Rises_Again:0 "The Lone Star Rises Again"
 TEX_The_Lone_Star_Rises_Again_desc:0 "After years of turmoil under Oceanian rule, Big Brother's weakness has opened the window for Texas to break free of it's chains and rise up once more. Seeing as many others across North America are taking advantage of his golden opportunity to reduce Oceania to ash, we may as well do the same.\n\nTexan style."
 TEX_Chucks_Declaration:0 "Chuck's Declaration"
 TEX_Chucks_Declaration_desc:0 "With chaos and confusion all across Texas taking place, as to be expected when the status quo falls apart in spectacular fashion, the only way to bring folks together is to find a friendly voice which can ground the people and get them caught up to speed.\n\nLuckily, there is Chuck Norris, who is more than capable of being the friendly voice Texas needs in times like this."
 TEX_Jumpstart_The_Texan_Economy:0 "Jumpstart the Texan Economy"
 TEX_Jumpstart_The_Texan_Economy_desc:0 "Even before the war for liberation, the Texan economy is a shadow of what it used to be. However, the potential of our land still remains. That is something Big Brother has yet to destroy. By consolidating our resources and taking command of whatever facilities Oceania left behind, we can used them as a firm foundation from which Texas can bounce back."
 TEX_Develop_Beaumont:0 "Develop Beaumont"
 TEX_Develop_Beaumont_desc:0 "Beaumont isn't what many would envision when they think of Texas. But it is our current capital, our safezone from which we can conduct our operations. If we want to keep Beaumont loyal to the cause, even when times our tough, we need to show folks around here that we are here for them, not against them.\n\nBy developing infrastructure and industrial capabilities in the city and surrounding areas, we can ensure the people's support remains firm."
 TEX_Develop_Texas_Raw_Bounty:0 "Develop Texas Raw Bounty"
 TEX_Develop_Texas_Raw_Bounty_desc:0 "Texas is a land of plenty. Big, diverse, and full of raw resources. More than most nations could ever dream of. This is our slice of heaven, set aside by God for us to prosper. And by God, we will take advantage of what He has so generously given us."
 TEX_Americas_Oil_Giant:0 "America's Oil Giant"
 TEX_Americas_Oil_Giant_desc:0 "Aside from it's large territory in comparison to other states, oil is what truly put Texas on the map. Our land is blessed with it, perhaps unfairly so. But now is not a time to be apologetic about how fortunate we are. There are reserves to exploit all over the state, even here in the Piney Woods.\n\nLet's make good use of it."
 TEX_Expanding_The_Texan_Liberation_Army:0 "Expanding the Texan Liberation Army"
 TEX_Expanding_The_Texan_Liberation_Army_desc:0 "Without the brave men and women fighting and supporting the Texan Liberation Army, our movement would still be a mix of underground whispers and discontent against the Oceanian regime. We need to give them all that we can muster in order to win this war and ensure that the sons of Texas are able to return back to their families once their duty is done."
 TEX_Trucks_And_Guns:0 "Trucks and Guns"
 TEX_Trucks_And_Guns_desc:0 "Trucks and guns. If those things don't define Texas, I don't know what does!\n\nMotorisation is what separates a nascent army from a proper fighting force. From supply lines to support divisions, trucks are essential in keeping our troops mobile and efficient.\n\nAs for guns, well... if you got a problem that words can't deal with: Use a gun. And if that don't work.\n\nUse more gun."
 TEX_Texas_The_Fighting_State:0 "Texas the Fighting State"
 TEX_Texas_The_Fighting_State_desc:0 "Texas is a land of fighters and pioneers. From oil barrons and cowboy riders, we certainly grow our boys tough in Texas and when we're on the battlefields, our enemies find out pretty quickly just how tough. Though Oceania has certainly attempted to weaken our mentality, their attempts have only strengthened our resolve to win."
 TEX_Scare_The_Shit_Out_Of_Them:0 "Scare the Shit Out of Them"
 TEX_Scare_The_Shit_Out_Of_Them_desc:0 "We don't need our enemies questioning themselves, no, we want them scared shitless. We want them to know what it means to mess with Chuck Norris and all of Texas. By the time we're done with these 'Oceanian' boys, we'll send them all running back home to their Mama's crying... presuming we don't put them in a casket first."
 TEX_Establish_Delta_Force:0 "Establish Delta Force"
 TEX_Establish_Delta_Force_desc:0 "Chuck believes that a strong military force ought to have a powerful spearhead trained to puncture through any frontline and put the fear of God into the hearts of any man, no matter how indoctrinated they are.\n\nThus, he has ordered the formation of Delta Force, a unit composed of the best of the very best Texas has to offer."
 TEX_No_Shortage_Of_Land:0 "No Shortage of Land"
 TEX_No_Shortage_Of_Land_desc:0 "Texas is doesn't just have a lot of land, it has a lot of usuable land. Land that is easy to build on and develop. We don't have to contend with the mountains and rolling hills of the Rocky Mountains out west or those across the Rio Grande.\n\nHere in Texas, we can afford to claim vast properties and build big!"
 TEX_Everythings_Bigger_In_Texas:0 "Everything's Bigger in Texas!"
 TEX_Everythings_Bigger_In_Texas_desc:0 "What isn't bigger in Texas? We build big, we dream big, and we sure as hell punch above our weight. From industries to everything, we built big in Texas because we sure as hell ain't building small."
 TEX_Warriors_Of_Texas:0 "Warriors of Texas"
 TEX_Warriors_Of_Texas_desc:0 "The Texas Liberation Army fought tooth and nail against Big Brother's army in the forests of the Piney Woods long before we took our next bold step. We fought in forests and small towns, making every enemy trooper fear every tree he passed by. As the Texan Liberation Army continues to swell with new members from across Texas, it would do well to ensure that the lessons learnt are not forgotten by the new generation."
 TEX_Operation_Snake_Venom:0 "OPERATION: §YSNAKE VENOM§!"
 TEX_Operation_Snake_Venom_desc:0 "As George Patton once said:\n\n\"A good plan, violently executed now, is better than a perfect plan next week.\"\n\nWe've held our ground long enough. It's time to become bold. To becoming daring. To not be afraid to throw out what we are comfortable with and attack! Attack! ATTACK!!!"
 TEX_Yellow_Rose_Of_Texas:0 "Yellow Rose of Texas"
 TEX_Yellow_Rose_Of_Texas_desc:0 "We've done it. Oceania has been pushed out of Texas and with it, our home has been secured! Well... for the most part, anyhow. There are other factions that have popped up in Texas, factions that need to be confronted at some point if we want to create a unified Texan Republic.\n\nBut for now, let us enjoy our newfound freedom from the clutches of Big Brother."
 TEX_The_Lone_Star_Republic:0 "The Lone Star Republic"
 TEX_The_Lone_Star_Republic_desc:0 "With Texas reborn on the map, not whole, but at least free, it is time to begin the work of transforming our nation from an defacto military junta into the Republic that was ordained to be by Providence so many long years ago."
 TEX_Chucks_Law_Is_Texan_Law:0 "Chuck's Law is Texan Law"
 TEX_Chucks_Law_Is_Texan_Law_desc:0 "Whilst a proper legal code is still a long ways away, the need for law and order in Texas is immediate. From criminal opportunists to INGSOC remnants that need to be dealt with, the need for bringing back stability is great. Luckily, there exists a temporary solution which can be found in our leader, Chuck Norris. Through executive authority, we can set forth a provisional framework for law and justice in Texas, at least until a robust and effective legal system can be established."
 TEX_Assist_The_Affected:0 "Assist the Affected"
 TEX_Assist_The_Affected_desc:0 "The war for Texan independence left our populace, which were already in less than ideal conditions, struggling in the aftermath. Homes were lost and supply chains are even more unreliable than before. If we want to prove ourselves better than what came before, we need to show the people of Texas that we are a government for them, a government that wants them to thrive and prosper without having to fear their own government ruining their lives."
 TEX_Restore_The_Texas_Legislature:0 "Restore the Texas Legislature"
 TEX_Restore_The_Texas_Legislature_desc:0 "The Second Texan Republic cannot be a true Republic until the structure needed for a republican style government to exist can be put into place. The military has done an admirable job in reclaiming and restablising Texas. But if Texas is going to be a land for Texans, then it needs a government that represents the best interest of Texans."
 TEX_Restore_Texan_Oil:0 "Restore Texan Oil"
 TEX_Restore_Texan_Oil_desc:0 "Texan oil is what made Texas a major player, both within the old United States of America, and on the global stage. We fuelled a nation, bringing wealth and allowing our lands to develop in a way previously unthought of. We can do this again. We can rebuild our oil fields and become a major global oil player, exporting the liquid gold beneath our feet and use it to bring untold prosperity to our people."
 TEX_The_Black_Gold_State:0 "The Black Gold State"
 TEX_The_Black_Gold_State_desc:0 "Texas is truly blessed when it comes to oil. And as the world changes and shifts in all these different ways, the world will need oil. Perhaps more than we can currently provide. If we want to keep up with demand and be the top choice for oil purchases, then we need to expand our production of oil."
 TEX_Off_Shore_Prospects:0 "Offshore Prospects"
 TEX_Off_Shore_Prospects_desc:0 "The oil that Texas can reach isn't just here on our land, but also off our shores in the Gulf of Mexico. Though crude oil rigs constructed by Oceania do exist, they are desperate need of renovation and refurbishment. By investing in the oil that can be found out in the depths, we can further expand our production and never have to fear running out any time soon."
 TEX_Fix_Up_Dallas:0 "Fix Up Dallas"
 TEX_Fix_Up_Dallas_desc:0 "The Dallas-Fort Worth Metropolitan area is a region that has seen better days. Devastated by the war and already poorly managed under Oceanian rule, Dalla is a prime candidate for showing our people what can be achieved when Texas is run by Texans."
 TEX_Dallas_Fort_Worth_International:0 "Dallas-Fort Worth International"
 TEX_Dallas_Fort_Worth_International_desc:0 "International air travel may not be a multi-billion industry, the potential for it cannot be ignored. Whether that be domestically here in Texas or internationally, air travel will quickly become a major sector for the entirity of Texas, not just the military.\n\nDallas is a prime location for an air transportation hub. By building up the existing airport into a proper international airport that can handle high levels of air traffic, we can show Texas that we are not only focused on what exists now, but also looking to the future."
 TEX_Beating_Heart_Of_Texas:0 "Beating Heart of Texas"
 TEX_Beating_Heart_Of_Texas_desc:0 "The Dallas-Fort Worth area is the hub of Texas. Millions live here, whether that be in the cities themselves or the surrounding area. It is a natural nexus of trade and finance, which will only continue to grow and evolve in the coming years. By investing in the economies of the twin cities, we can ensure the Dallas-Fort Worth region has the means to continue being a major economic hub for our people."
 TEX_Renovate_Austin:0 "Renovate Austin"
 TEX_Renovate_Austin_desc:0 "The historic state capital of Texas, Austin, has long been neglected and forgotten. It's importance fell when Oceania came, with the Red Province administering from Dallas, causing the city to lose it's relevance. With Austin to be the capital of Texas once more, it's only right that the city be rebuilt into a proper capital city."
 TEX_Rebuild_The_State_Capitol_Building:0 "Rebuild the State Capitol Building"
 TEX_Rebuild_The_State_Capitol_Building_desc:0 "When INGSOC took over, the State Capitol Building was left in disrepair as it fell out of use, left practically abandoned by the time we arrived in the city. Sure, the other controllers of the land after INGSOC have attempted to revive the city, but thus far, have proven themselves unsuccessful.\n\nNo, if Austin is to be brought back as it once was, it needs to become our capital once more."
 TEX_Charity_Kindness_And_Getting_It_Right:0 "Charity, Kindness, and Getting It Right!"
 TEX_Charity_Kindness_And_Getting_It_Right_desc:0 "We can't just think about getting and getting more. That kind of attitude contributed to the rise of INGSOC, who used the greed of corporations that controlled old Oceania to justify their revolution.\n\nWe need to offer more than just the accumilation of material, we need to give back to our people. To help the sick and starving. To find families for homeless children and to create cities and towns of beauty and wonder.\n\nGod calls us all to be kind and charitable, and that is what we must do."
 TEX_Houston_Calling:0 "Houston Calling"
 TEX_Houston_Calling_desc:0 "The jewel of the Gulf of Mexico, Houston is the largest city in all of Texas. A hub of trade and people, it's easy to see why Oceania designated Houston one of if it's thirteen polis city. But with the devastation of the city during the Battle of Houston and the collapse of shipping in the wake of Oceania's collapse, Houston is in dire need of attention and restructuring."
 TEX_The_Gateway_To_Texas:0 "The Gateway to Texas"
 TEX_The_Gateway_To_Texas_desc:0 "Houston is the gateway to Texas, no matter who controls our land. This is a simple fact. It's the largest city and with it, contains the largest port. And it's about time we advertise that to the Free Nations of the world, those who wish to do business across the Atlantic. We will make sure that all know that here in Texas, there is lots of money to be made, and it is in Houston where business can be done best."
 TEX_All_Roads_Lead_To_Houston:0 "All Roads Lead to Houston"
 TEX_All_Roads_Lead_To_Houston_desc:0 "Things gravitate toward Houston similarly to Dallas. It's a port city, after all, and port cities are prime hubs of trade, commerce, and activity. By making it easier for surrounding towns and municipalities to travel to and from Houston, we can ensure maximum trade efficiency whilst giving Houston the boost it needs for it's total recovery."
 TEX_Aiding_The_Ranchers:0 "Aiding the Ranchers"
 TEX_Aiding_The_Ranchers_desc:0 "You can't discuss Texas without discussing those who forged our identity into what it is. The ranchers. The cowboys and farmers, the first to pioneer and tame this land we now call our own. For a long time, they were taken for granted by Oceania, their work toward sustaining our nation forgotten and dismissed by INGSOC.\n\nBut not us. Chuck Norris will show them that they have a voice once again, that Texas is the land of cowboys and ranchers once again!"
 TEX_Facilitate_The_Cowboy_Renaissance:0 "Facilitate the Cowboy Renaissance"
 TEX_Facilitate_The_Cowboy_Renaissance_desc:0 "When INGSOC came rolling in and saw the cowboy culture that existed here, men on horse back roaming the lands and safeguarding their cattle, they were quick to try mechanize the entire thing, replacing horses with trucks and trying to manhandle the entire business. Naturally, this didn't work out the way INGSOC hoped, the urbanite focused Party understanding little to nothing about how to operate a ranch and what it requires, leading to a drop in productivity and discontent amongst the ranchers.\n\nWith INGSOC gone and the ranchers of Texas free to reorganise their properties and businesses back into something that actually works, this provides the Texan government with the perfect opportunity to help facilitate this coming renaissance and develop a positive image among rural Texas."
 TEX_Land_Of_Rich_And_Plenty:0 "Land of Rich and Plenty"
 TEX_Land_Of_Rich_And_Plenty_desc:0 "Texas is vast, and is blessed with vast flat terrain that is easy to build on and utilize for numerous different agricultural and recreational purposes. From raw resources beneath our feet to fertile plains as far as the eye can see, Texas is uniquely rich.\n\nSome might say Texas is spoilt. But you certainly won't hear any Texan's complaining about that!"
 TEX_Dont_Mess_With_Texas:0 "Don't Mess With Texas!"
 TEX_Dont_Mess_With_Texas_desc:0 "Texas has proven its strength and right to exist. We have confronted those who would see us erased and emerged a stronger nation. But with all that we accomplished, some can't help but look beyond our boundaries to the rest of America. To see the chaos of statelets and ideological governments that have risen up, and old INGSOC remnants lurking in the shadows.\n\nWe began with Texas in mind, but America... Texas was once part of it. We share a kinship with these folks, from California to New York, and everywhere in between. Should we really sit on the sidelines and do nothing while America suffers?"
 TEX_event.1.t:0 "The Modern Alamo"
 TEX_event.1.desc:0 "Squads of soldiers with Texan flag patches on their shoulders moved through the streets of Beaumont, rifles in their hands as they went about completing their final check of the city for any potential Oceanian remnants still lingering. Some soldiers were escorting Oceanian troops wise enough to surrender to them, the townsfolk watching in awe as their oppressors were being hauled off, wrists bound and a gun to their backs for a change.\n\nGoing down main street in a truck, Chuck Norris in normal civilian clothing sat in the driver's seat, with Lee Ermey  in the passenger seat.\n\n\"Doesn't look too bad\" Chuck mused as he noted the condition of the buildings in the town.\n\n\"Not a lot of time to cause chaos. We caught 'em off guard, we ran them out quickly. They tried to organise a counter attack, take the city back but it was messy. Disorganised. They were forced to retreat\" Lee explained plainly.\n\n\"Back to Houston?\" Chuck inquired, glancing at Lee.\n\n\"For the moment, but they'll be back eventually. They're fanatic\" Lee answered, looking back at Chuck.\n\n\"They are. But we can use that against them. They won't be patient. Let them hit first, let them smash themselves against our lines and when we see and opening, we go in and kick them all the way back to Big Brother\" Chuck spoke as he pulled the truck over to watch as a group of soldiers ripped down an Oceanian flag from a flag pole and hoisted up the flag of Texas."
 TEX_event.1.a:0 "\"Sounds like a plan\""
 TEX_event.2.t:0 "Doin' Things Texas Style"
 TEX_event.2.desc:0 "A stage was set outside of Beaumont City Hall, the current home of the Texan Liberation Army administration. A crowd was gathered outside, most from within the city itself but some coming from outside the city boundaries. The crowds had a look of uncertainty on their faces. There were too many conflicting stories, too much confusion. People were searching for answers on what exactly was happening, it was what brought them here. It was there that a man walked onto the stage, wearing a white cowboy hat on his head like an old world cowboy.\n\n\"Good evening, folks\" Chuck spoke as he arrived at the podium, immediately catching the attention of anyone who wasn't looking, eyes all turning to him.\n\n\"I hope you're all doing alright. I know things have been a mess for many of you. You've been out of the loop. Hell, you've all been out of the loop of things for years now. But rest assured, I'm here to get you all up to speed and what's happening, I only ask that you help spread the word.\"\n\nMany in the crowd glanced at each other for a few moments before looking back at Chuck. Their expressions were tentative at best, but they were listening to him. That was a start, at least.\n\n\"I am Carlos Ray Norris… but you can just call me Chuck. It's what everyone calls me and I think I prefer it at this point\" Chuck introduced himself, earning some murmurs amongst the crowd.\n\n\"I'm sure some of you may have heard all sorts of stories about me. Some crazy ones, I imagine. But I'm not going to focus on that, we'd be here all day if we did. No, I'm here to talk about the Texan Liberation Army and what our goals are. Our goals are quite simple. We want to free Texas from Oceanian rule. No more telescreens or Thought Police or any of that nonsense. Just a Republic, where folks can be free to say what they want. Where they can choose their leaders and freely teach their children the true history of the land they live in. We want the Texas we used to remember, that is what we're all about. We want to make it so we can do things our way. The Texas way\" Chuck explained plainly, setting pleasantries aside for the blunt truth.\n\nPeople's expressions slowly changed as Chuck continued to speak more and more, what he was talking about beginning to settle into their minds. Cautious hope was building in their hearts, the yearnings of freedom being rekindled as something that long felt so impossible was seeming more possible the more Chuck spoke. They looked around, at the Texas flags on the flag poles and the soldiers that guarded the stage. Texan soldiers, with Texan flag patches, there to protect, not to oppress."
 TEX_event.2.a:0 "Maybe it's okay to finally dream again"
 TEX_event.3.t:0 "Go Big or Go Home"
 TEX_event.3.desc:0 "Chuck was in his office. The late administrators office, technically, but he wasn't around anymore so naturally, Chuck took it. With a little make over first. Wasn't that hard to improve, the place was just a desk with some filing cabinets and some chairs. It was incredibly dull. It was there that Ross entered the room, taking the room in for a moment before glancing at the giant Texas flag on the wall.\n\n\"Somebody's extra patriotic\" Ross remarked lightly, smiling a little as he turned and walked over to Chuck's desk, taking a seat nearby.\n\n\"It covers the telescreen I destroyed,\" Chuck explained briefly, glancing up from the report he was reading before setting it aside.\n\n\"So what's the damage?\" Chuck inquired.\n\n\"Well, narrowing it down to industries. They're workable, none of them were damaged during our take over but God, is it all outdated. Machinery is old, buildings aren't exactly what I would call safe. Hell, if we didn't need them right this second, I'd knock them down and start over\" Ross explained, placing the file that was in his hand onto Chuck's desk.\n\n\"So not ideal\" Chuck surmised, opening up the file and looking it over, the fingers of his right hand drumming on the desk.\n\n\"No. But we're stuck with it\" Ross muttered.\n\n\"You're right. But we can make this work, for now at least. Just do the best you can with this, alright? All we need to do is get everything to standard before we can start thinking bigger. The sooner we win this thing, the sooner we can start looking past Oceania for once\" Chuck stated, shifting his gaze back to Ross."
 TEX_event.3.a:0 "\"Sooner, the better\""
 TEX_event.4.t:0 "Let the Black Rivers Run!"
 TEX_event.4.desc:0 "For the first time in years, new oil derricks rose over the tree line of the tree sprawl of the Piney Woods. New machines, refined and ready to fulfil the demands of a movement, had arrived to reach below the soil and the roots to extract the life blood of an industrial nation.\n\nTom Alvarez stood at the edge of the artificial clearing, watching as the derrick and the crew around it got to work on finding that precious black gold they'd been searching for.\n\n\"There's supposed to be whole lakes of oil under the dirt\" one of the crewmen muttered, standing nearby and lighting a cigarette. \"Texas is supposed to be full of it.\"\n\nTom simply hummed in acknowledgement, watching as the machine began to work. He knew that with oil would come change. The forest around it would become a town. Money and people would come. They always did, no matter what government was in charge.\n\nA shout then came from the rig.\n\n\"Pressure's building, boys!\"\n\nMen moved swiftly, voices cutting through the hum of machinery. Tom watched to see the first surge of black liquid roar through the steel pipe, spilling into the waiting system for the men to see.\n\nFirst, there was silence. Then cheered as more black crude oil poured out. They all knew what it meant. It meant change, and a fighting chance for the Texan Liberation Army to liberate all of Texas from Oceanian rule once and for all."
 TEX_event.4.a:0 "For once, luck comes in black"
 TEX_event.5.t:0 "Fight For Texas"
 TEX_event.5.desc:0 "The screen door slammed shut behind them, the warm evening air blowing by as, one by one, the boys climbed into their late-father's pickup truck, engine rumbling to life as the eldest got himself comfortable in the driver's seat. Mama stood nearby on the porch, expression right as she watched the boys with rifles in their hands all piled into the back. Her boys. Her five boys. About to ride off into war. Walking over to the truck, she made it to the window of the driver's side.\n\n\"You take care of them, Nate, you hear?\" She spoke firmly, fighting to keep the emotions at bay.\n\nNate met his mother's gaze before reaching out of the window and taking his mother's hand.\n\n\"Goes without saying, Mama\" he spoke softly, offering her a small smile.\n\n\"I know... I just...\" she trailed off, exhaling as she glanced at the back end of the pickup truck before looking back at Nate.\n\n\"Just do your best, Hon. Protect your brothers. And when you're done helping this... Chuck Norris fellow, you come home right away, all of you\" She instructed firmly.\n\n\"We'll be back home before ya know it, Mama!\" The youngest boy, Tommy, yelled from the truck, the other boys voicing their agreements much to Nate's amusement.\n\n\"We'll write as often as we can, Mama. This war will be over before you know it\" he spoke, grinning at her before leaning forward out of the window to kiss her cheek before settling back into his chair and putting the pickup into reverse.\n\nAs the truck got onto the road, leaving the farm house behind, Brandon who sat beside Nate glanced at his older brother for a moment before he turned on the radio.\n\n\"...Reporting live from the city of Dallas. Enemy forces have increased their presence in the city as Texan partisans continue to ramp up their efforts to weaken city defences in time for the army's arrival. Chuck Norris has called upon our boys in Dallas to hold strong and don't let Oceanian terror keep them at bay...\"\n\n\"Doesn't feel real\" Brandon murmured, watching the radio for a moment before glancing out the window.\n\nNate watched him for a moment before returning his attention to the road."
 TEX_event.5.a:0 "\"Maybe not. But home is  and we have to protect it\""
 TEX_event.6.t:0 "Big Brother Doesn't Watch Chuck Norris"
 TEX_event.6.desc:0 "A few miles away from the frontlines in the dark of the night, a group of Oceanian soldiers were gathered around a campfire. Their CO was away for the time being, meaning the troops were allowed to speak freely amongst themselves.\n\n\"So... this Chuck Norris guy\" One of the soldiers, Louis, stated tentatively, glancing around at the others.\n\n\"Yeah. Chuck Norris. What is it with this guy? I mean, have you heard all the stuff they've been saying about him?\" Daniel, another soldier, replied.\n\n\"Yeah…\" Ethan stated, trailing off for a moment before speaking once more. \"I heard Chuck Norris killed multiple men with a hand grenade... then the grenade exploded.\"\n\nThe soldiers all turned their heads, watching him with an incredulous look as he shrunk back where he sat a little.\n\n\"I heard a King Cobra bit Chuck Norris once. After a few days of agonising pain, the snake died\" another soldier spoke up, a few of the soldier's eyes widening.\n\n\"There's no way that's real\" one of them exclaimed.\n\n\"Yeah? I heard Chuck Norris once took down ten fighter jets in a single dog fight\" Louis chimed in.\n\n\"That's impossible. One guy? One guy takes down ten jets. That isn't possible\" another soldier argued, despite the shifting of some of the other soldiers.\n\n\"I heard Big Brother doesn't watch Chuck Norris. Chuck Norris watches Big Brother.\"\n\nThe camp fire suddenly went silent when they heard Daniel utter those words, all eyes glued to him in shock.\n\n\"But... Big Brother watches everyone, there's no way that Chuck Norris can watch him, that's...\" Louis trailed off, going silent as the troops caught sight of the CO beginning to make his way back to them.\n\n\"Everything is well over here, men?\" The commander asked gruffly, stopping as he noticed how uncomfortable and disturbed some of the men looked, expressions distant as though someone asked them to jump off a cliff."
 TEX_event.6.a:0 "\"We're fine, sir. Just exchanging stories\""
 TEX_event.7.t:0 "Texas Finest"
 TEX_event.7.desc:0 "The men of the newly formed Delta Force stood at attention in the hanger they were all gathered in. Moments passed by before the hanger doors began to open up, natural light filling the room as two men entered. Chuck Norris, the leader of the Texan Liberation Army himself. And then there was R. Lee Ermey, the meanest son of a bitch west of the Mississippi.\n\nErmey's eyes quickly found their eyes and his features hardened as he marched toward them, Chuck hanging back as the man spoke.\n\n\"You think you're elite?\" he barked.\n\n\"You're not! Not yet, not until I am done with each and every one of you. You all volunteered to be my bitch moving forward and from now on, that is what you will be. You will do what you are told and you will not complain. You make a mistake, that isn't just on your ass, that is on all of you!\"\n\nNobody moved, not a single muscle.\n\nHe paced around, his eyes scanning each of them. \"You will be pushed. You will be put in the shit. Things will go tits up and I expect you to perform, do you understand!?\"\n\n\"Sir, yes, sir!\" the soldiers shouted in unison.\n\nIt was there that Norris finally stepped forward, his voice a contrast to Ermey's blunt harshness.\n\n\"This unit isn't like any other. This isn't about toughness, it's about control. You'll hold your ground where others will retreat, and you'll make the impossible possible. It's not enough for me to have faith in each of you, you need to have faith in yourselves as well. That is how you're going to make it\" Chuck spoke calmly, each of the soldiers seeming to straighten up a little at his words.\n\nErmey gave a short nod before addressing the formation once more.\n\n\"You want to be the best, you earn it\" he shouted before pointing toward the open door."
 TEX_event.7.a:0 "\"Now move out!\""
 TEX_event.8.t:0 "Norris Economics"
 TEX_event.8.desc:0 "Ross Perot stood behind a chair, hands resting on the top of it's back as he watched Chuck quietly looking over the report. Perot didn't rush him, simply waiting until Chuck returned his attention to him. Finally, Chuck closed the folder.\n\n\"Give me the run down.\"\n\nPerot nodded once. \"Things are stablising. We're not out of it, not yet, but the economy is getting stronger, that much is clear. Energy sector's climbing back. Oil extraction is getting things moving again, especially on the frontline of things. Some small businesses are opening up. It's not much, not much of a middle class yet, but it's happening. Rural areas aren't perfect, but the oil for food deal is keeping them content. At least until created enough dollars for it to be viable\" Perot explained.\n\n\"How about our gold reserves?\" Chuck inquired.\n\n\"We're making good on our stockpile. Surprisingly, gold isn't an issue. It's just a matter of figuring out the best way of distributing money to the populace without flat out giving it out to them.\"\n\nChuck nodded in understanding. \"You've done an exemplary job so far, Ross. I have no doubt you'll figure out how to do it. If anyone can, it's you.\"\n\nRoss nodded, a small smile emerging on his face.\n\n\"Well, with that vote of confidence, how can I fail?\" he remarked, the both of them letting out a small chuckle."
 TEX_event.8.a:0 "Slow but steady recovery"
 TEX_event.9.t:0 "Just Ain't Your Day, Is It?"
 TEX_event.9.desc:0 "Dawn broke over the plains of Texas as Nate moved quietly through the bushes and trees, head low and rifle held close as he moved. He was behind enemy lines, sent for one single purpose. To catch the sniper that had killed six soldiers with his pants down and take him out. Nate moved, eyes scanning the terrain as he drew closer. He needed to be careful, last thing he needed was the sniper discovering him and taking a shot at him.\n\nIt was there that Nate approached an old cabin from behind. Abandoned, unexpecting, and no doubt the perfect place for a sniper nest. Moving in, Nate ensured his silencer was fitted properly onto his rifle. Last thing he needed was more Oceanian troops showing up after he dealt with the bastard. Entering the cabin through an open window, Nate moved quietly, hearing the crack of a sniper rifle nearby.\n\nOh, he was definitely here.\n\nDropping low, Nate entered and spotted him with a blanket over his head and back to him. Oh this was perfect. Sneaking up on him, Nate slowly raised the rifle and aimed it at the sniper's head.\n\n\"Dammit\" the sniper muttered, missing his target as he pulled the pin back to load another round.\n\n\"This just ain't your day, pal\" Nate remarked, startling the sniper who turned around only to find the barrel of a rifle in his face.\n\nA crack split through the cabin as the sniper dropped dead. Nate straightened up a little, looking down at the sniper's body before spitting on him."
 TEX_event.9.a:0 "\"That was for Tommy, you son of a bitch\""
 TEX_event.10.t:0 "Let's Play House!"
 TEX_event.10.desc:0 "The sun set of Beaumont, and the rest of Texas. Yet for millions of people, it was a new era for them all. Texas was free. Free from the oversight of unelected bodies and institutions that aimed to erase them. Free from the clutches of Oceania. Finally just free. Chuck watched on from the window of his office. For Chuck, this moment wasn't a loud one but quiet. After many long years, the core objective of the Texan Liberation Army had been fulfiled.\n\nIt was there that Elvis approached him, carrying two glasses of soda in his hands.\n\n\"Here. Just soda. I know how you feel about alcohol. Trust me, I feel the same way\" Elvis spoke, passing the drink to Chuck before taking a sip of his own drink.\n\n\"Good looking out, Elvis\" Chuck replied, smiling before taking a sip and looking back out the window.\n\n\"So we've done it, hm? You know, when I was forced into the military back in the fifties, well... I never imagined any of this\" Elvis mused, smiling a little as he saw the crowds dancing in the streets, the sound of music in the air.\n\n\"Been a long time since your singing days, hm?\"\n\n\"Oh ho, yeah. Long time. Hell, not sure I'd be up to par anymore\" Elvis replied with a chuckle.\n\n\"Oh, I still think you have the voice of an angel\" Chuck spoke lightly, causing Elvis to laugh a little more.\n\n\"Whatever you say, Norris. You coming to the party later tonight?\" Elvis asked, glancing at Chuck.\n\n\"Only if you sing that old Hound Dog song of yours\" Chuck answered lightly, earning a smirk from Elvis."
 TEX_event.10.a:0 "\"Deal\""
 TEX_event.11.t:0 "Settle Down Now"
 TEX_event.11.desc:0 "Fireworks faded away, and Dallas began to grow quiet. Nate, Brandon, Jimmy, and Kyle were gathered around a campfire, holding beers in their hands as they watched the flames.\n\n\"It's over\" Jimmy murmured quietly.\n\n\"Yeah. I guess it is\" Brandon replied, glancing down at his beer for a moment before taking a sip.\n\n\"What are we gonna tell Ma? Tommy, he-\"\n\n\"I'll tell her, Kyle. I... I should've been the one looking out for him. It was my responsibility, I'll be the one to tell her\" Nate cut in bluntly.\n\n\"Nate, you shouldn't be hard on yourself about this, you... you couldn't have known that sniper...\" Brandon trailed off, exhaling sharply through his nose as he looked down at the ground.\n\n\"We'll tell her together. All of us. It's what we've always done. It's what Tommy would have wanted\" Jimmy stated.\n\nThe boys looked at Jimmy for a while before slowly nodding in agreement. Even Nate did after a while, though there was a look of guilt still present in his eyes.\n\n\"I want to make a toast\" Nate began, holding his beer up. \"To Tommy. Hope you're watching over us, brother. We're gonna make you proud. Here's a drink for you.\"\n\n\"Cheers\" the boys spoke, all holding up their beers for a moment before turning them down to the ground, allowing the liquid to flow down out of their bottles."
 TEX_event.11.a:0 "Memento Mori"
 TEX_event.12.t:0 "Nobody Crosses Chuck Norris"
 TEX_event.12.desc:0 "Chuck was silent as he read over the reports that Bill had presented to him. The war was barely over and already, there was chaos and confusion. Not among the population, but on the newly formed police departments being set up across the nation. Martial law was still in effect for the most part, but with the war over and governing now becoming a priority, it was becoming increasingly clear that the civilian police were very disorganised. Some departments were becoming increasingly brutal toward suspects. Others are too soft on crime. It was a mess.\n\n\"As you can see, Mr President. A police without law to follow just become… renegades. Outlaws, in certain cases. Not to say this is all police, most are doing what they can. But the fact is, they don't really know what to do. For a lot of folk, their only reference for good policing is what Oceania was doing\" Bill explained, seated across from Chuck.\n\n\"And that's not exactly ideal policing\" Chuck muttered, rubbing the bridge of his nose before sighing as he tossed the reports onto his desk.\n\n\"Well, that needs to change and fast. I won't have Texas be defined by what came before it\" Chuck stated, putting his hands together, brows furrowed in thought.\n\n\"We're still miles away from a legal framework. Old world documentation on the subject is… sparse… to say the least. We need more time to figure out how the hell we're gonna do things moving forward\" Bill explained.\n\nChuck nodded, sighing as he leaned back in his chair. He was silent for a while, seemingly mulling over options in his head before shifting his gaze to Bill.\n\n\"Here's what we're gonna do. I'm gonna issue a set of executive orders, stuff that the civilian police force are going to follow. No killing of any criminals or suspected criminals. No brutalising or beating if whoever they're arresting has surrendered or isn't a threat. If they arrest someone, they can put 'em in a cell but they can't do anything, not until we have a damn court system back. If policemen out there can't abide by that, they'll have to deal with me\" Chuck explained firmly, leaving no room for argument.\n\nBill nodded slowly in agreement. It wasn't completely ideal, having the executive step in like this. But ideally, they'd have a legal system by now. Getting Chuck involved was the best way to make things more manageable, at least until things had actually progressed. Normally, Bill would be wary of this kind of overreach, but this was Chuck. "
 TEX_event.12.a:0 "And Chuck was somebody he could trust"
 TEX_event.13.t:0 "Get Things Started"
 TEX_event.13.desc:0 "Where surveilance rigs once hung, now were simply lights. Where Oceanian terminals had lined the walls, there were patches of stone - Cleaned, but not forgotten. Sure, it wasn't a proper State Capitol building. But the facilities in Beaumont worked well enough.\n\nThe Texas Legislature was in session again.\n\nBehind the podium at the front of the chamber, Bill Clements stood firm. Older now, but steady. The room quieted as the representatives settled in. Most were vertans, but there were those who were scholars, archivists, and ordinary citizens who were selected by their communities to represent their interets.\n\n\"Let's begin\" Bill spoke calmly.\n\nNo grand speech. No theatrics.\n\nThere's been more than enough of that as of late.\n\nVoices rose as the first items were called - confirmation of the new legal code, limits on emergency powers, dismantling the last remnants of centralized surveillance. Each topic carried weight. Each holding importance in their own way.\n\nIn the gallery above, Chuck Norris stood with his arms folded, watching as work to fix what was broken continued."
 TEX_event.13.a:0 "Moving forward"
 TEX_event.14.t:0 "Texan Oil Fuels Everything"
 TEX_event.14.desc:0 "\"Western Texas was victim to a fair amount of sabotage. Pipes are damaged, refineries are a mess. Hell, we're still trying to figure out which Oil Wells are usable and which aren't rigged to blow up on us\" Elvis explained, standing by a map of Texas which more many X's and O's marked on it.\n\nRed circles meant damagte. Black X's meant unknown.\n\n\"Alright. What's the plan then?\" Chuck inquired, crossing his arms from his place at the head of the table.\n\n\"Refineries are very. What good are wells if we can't refine it. Beaumont's overwhelmed enough as is, refineries can help alleviate the pressure\" Bill advised.\n\n\"Not much point in refineries if the pipes are compromised. We can't just ignore it\" Elvis pointed out, pointing toward some of the pipe's mapped out in red.\n\n\"We'll have to pick which one's get priority then. I say Dallas and Houston. They're the biggest cities, and have the biggest refineries. After them, we work our way out. Seems like the most sensible thing to do\" Ross spoke absentmindedly, his attention on the folder on the table in front of him.\n\n\"I'll ask Ermey if he can send out some sappers to handle the oil wells. I don't want any workers out there dying, not when it can be prevented. We clear 'em before we consider them operational\" Chuck spoke up, unfolding his arms, his gaze fixed on the map.\n\nThe group nodded in agreement, knowing better than to go against Chuck on this. When Chuck Norris tells you he needs a problem fixed, you don't complain, you do get it done."
 TEX_event.14.a:0 "Everything comes back to oil eventually"
 TEX_event.15.t:0 "This Better Pay Well"
 TEX_event.15.desc:0 "The helicopter peeled away, leaving Dawson and the other new workers on the platform of the newly constructed oil rig off the coast of Texas.\n\nThe rig was different from Oceanian rigs. There was no overbearing military presence all over the place, no oversaturation of surveilance cameras aside from key points in the facility. There was just the machinerty that did what it's told, the crew to maintain it, and the managers to ensure everything and everyone was looked after.\n\nDawson adjusted his hard hat and stepped onto the deck, taking it all in. Crew members moved around with purpose. They weren't rigid like under Oceania. No, these men had a flow to them. A sense that though they were there to work, they didn't feel like their lives were in any danger.\n\n\"First day?\" a supervisor asked, approaching Dawson.\n\n\"Yeah\" Dawson replied with a nod.\n\nThe man pulled a piece of paper from his clipboard before handing it to Dawson.\n\n\"Here's the schedule. Today, you and the other new guys will shadow. Watch what's going on so you can get a sense of how we do things around here. Any questions?\" the supervisor asked.\n\n\"No, sir\" Dawson replied with a nod.\n\n\"Good. Follow me. Oh, and none of that sir stuff, if you would. Makes me sound old\" The supervisor stated, smiling a little as he gestured for Dawson to follow him."
 TEX_event.15.a:0 "Welcome to the Rig"
 TEX_event.16.t:0 "The Good Ole' Hub"
 TEX_event.16.desc:0 "When Dallas was first liberated, it ws a city caught between slience and motion.\n\nPower flickered across the skyline, some regions in light, others in darkness. Streets that were once so monitored by the extensive surveilance systems of Oceania were now suddenly open. People emerged, numbers growing as the feeling of danger faded, replaced with a growing sense of tentative freedom.\n\nMilitary roamed the streets, maintaining order alongside the new police force. Buildings were damaged, but servicable for the time being. Clean crews moved about, trying to get the cities infrastructure functioning again. There was the occasional report of some Oceanian holdout here and there in the city, but they were few and being dealt with swiftly.\n\nDallas hadn't erupted or panicked, it steadied. Today, the city is moving forward, daring to to do so now that Oceania had been stripped away from it There was still much to do, even now, but the city was a free city."
 TEX_event.16.a:0 "Now it had to prove it could function that way"
 TEX_event.17.t:0 "The Jewel of Texas"
 TEX_event.17.desc:0 "Morning light shone on the glass and steel towers of Dallas as a truck rolled on through the main street of the city. It wasn't the Dallas of the pre-INGSOC age, but it was a free city nonetheless - Rebuilt from the bones of what was once a wartorn city.\n\nBehind the wheel of the truck was Chuck Norris, accompanied by Elvis Presley, both men wearing civilian clothes and hats to try look inconspicuous as they took in the city around them. People were out - really out. Not keeping their heads down, avoiding the oppresive stare of Big Brother or the cameras that once hid in every nook and cranny of the city, but keeping their heads high as though the populace had reclaimed their confidence. People walked and talked. A street vendor argued over prices with a customer as though it was his only concern in the world.\n\n\"Now that's a good sign\" Elvis spoke, smiling faintly.\n\n\"What is?\" Chuck inquired, glancing over at him.\n\n\"People complain' about normal things\" Evlis said. \"Means they ain't scared of the boogymen anymore. Not afraid of us, neither.\"\n\n\"That's the way it ought to be\" Chuck replied with a small smile as they passed through an intersection, passing by a city that was once a devastated ruin.\n\n\"Hold on, look over there\" Elvis spoke up, urging Chuck to stop as his eye caught something.\n\nChuck did so, pulling the truck over to the side of the road before looking over to see what had caught his passenger's attention. It was there, on one of the buildings was a painted flag of Texas, crudely painted and made in haste. The wall was cracked and damaged, yet there it was. A symbol of resistance and defiance against a decaying overlord."
 TEX_event.17.a:0 "The spirit of Dallas reborn"
 TEX_event.18.t:0 "The Mixed Bag"
 TEX_event.18.desc:0 "Austin, in the immediate aftermath of liberation, felt like a city that had been brought back to life with defibrillators.\n\nIt's slow death had ceased as the resurgence of a free Texas brought with it a new opportunity. Surveilance was over, and history of what Austin used to be was shared. It wasn't just a random city in the plains of Texas, smack in the center of it all, but rather the capital of old world Texas. The city itself, unlike larger cities like Dallas and Houston, was largely spared of severe destruction. Oceanian troops didn't put up much of a fight here compared to the big cities. They made a show, yes, but retreated soon enough. But that wasn't really Austin's problem at present. The city had been a decaying one, and much of it's infrastructure was crumbling. It wouldn't be impossible to fix, and it was more functional than most major cities in Texas, but it would still require attention if Austin ever hoped to become worthy of being the capital of Texas once more."
 TEX_event.18.a:0 "On the road to recovery"
 TEX_event.19.t:0 "If It Ain't Right, It Ain't Mine"
 TEX_event.19.desc:0 "Chuck Norris stood by the window of his office, arms folded. Bill sat in a chair nearby, reviewing a stack of recovery briefs.\n\n\"We're rebuilding infrastructure\" Chuck said. \"Power. Ports. Cities. but we're missing something.\"\n\nClements didn't look up. \"We're missing a lot of things.\"\n\n\"Children\" Chuck replied, turning to look back at Bill. \"The ones who fell through during the war. A lot of them lost homes. Families. With nobody to turn to, nobody to look out for them.\"\n\nThat made Clements pause, gaze turning from the papers to Chuck.\n\n\"You're talking about a program?\"\n\n\"I'm talking about charity. Food, shelter, clothes, education. Temporary relief isn't enough, those kids need something to depend on\" Chuck explained, taking a step forward.\n\n\"It's not a simple endeavour, Chuck... I... we've barely gotten the economy off of it's deathbed. Are you sure now is the right time?\" Bill asked plainly.\n\n\"They're the future of our nation, Bill. If we aren't willing to look out for the children of Texas, what does that say about us? What happens to them if they have nobody?\" Chuck pressed bluntly, causing Bill to lean back in his chair, rubbing the bridge of his nose.\n\n\"Alright, Chuck. If this is what you want to do, then I'll start pulling strings. See what I can throw together. I can't promise everything\" Bill answered.\n\nChuck nodded in understanding."
 TEX_event.19.a:0 "\"That's all I'm asking, Bill.\""
 TEX_event.20.t:0 "Biggest and Loudest"
 TEX_event.20.desc:0 "The first hours of liberation made Houston, a city that was always seeming to buzz with activty, finally stand still.\n\nPorts were silent. Oceanian surveilance systems went dead. Crances in the harbours were motionless and ships belonging to Oceania now belonged to nobody.\n\nFreedom had come, but doing so put the city out of business, at least for the time being.\n\nThe city is slowly waking up, taking in it's now destiny.\n\nSome dockworkers returned to work, unsure of waht exactly to do, but ready to begin again. People emerged onto the streets, the sight of Texan soldiers a stark contrast to the usual black uniforms of Oceania. Industrial facilities, no longer having the oversight of Oceania, found themselves wary under the new eyes of Texas. Factories were on once more, but lacking direction. This was the capital of the Red Province was. Everything was planned, each step monitored closely by the Party.\n\nBut now, that plan was gone."
 TEX_event.20.a:0 "Houston seeks a new vision"
 TEX_event.21.t:0 "The Hub of the West"
 TEX_event.21.desc:0 "Salt air carried the sharp scent of oil and steel as the port of Houston, was a broken shell of itselt hummed with life and activity. Chuck and Ross were up on an elevated platform overlooking the renovated port, looking at the various ships, containers, and trucks that filled the port.\n\n\"It's efficient\" Perot remarked, arms cross. \"We cut a lot of the dead weight around here. On top of the damage. It's not perfect, but it's a lot better than before.\"\n\n\"That's good. We're gonna need this place as time goes on. Many nations will be looking to Texas for trade\" Chuck replied, observing as the workers below moved around with purpose - no panic, no hesistation, just getting back to it.\n\n\"That, I have no doubt. Texas will starting booming again, just like in the old days\" Perot remarked, shifting his gaze over to the Houston skyline, allowing a smile to emerge on his face as he enjoyed seeing the fruits of his work coming to life day by day."
 TEX_event.21.a:0 "Waves of progress"
 TEX_event.22.t:0 "Yeehaw!"
 TEX_event.22.desc:0 "Wind flows across open land, carrying dust and dirt with it as the sound of hoofbeats and the murmur of cattle. Chuck Norris was on the fence line, observing as the ranchers long deprived on their horses without fear of incurring Big Brother's anger were now free to race back out onto the open field on horseback once more. They guided the herd with quiet signals and practice movements, as though things were all back to normal. The old ranchers guided the newer ones, instructing them how to ride and what to do, keeping tradition alive.\n\nA rider noticed Chuck Norris and rode by on his horse, tipping his hat in acknowledgement and thanks.\n\nChuck nodded back, smiling as the man rode off to join the rest of the ranchers in guiding the herd. This was what ranching was meant to be. No out of place machines or trucks. No more inefficiency or outside interference from those who didn't understand their way of life. Just the correction that had been desperately needed.\n\nA horse kicked up dust as another rider rode out, lasso in hand as he moved to pull a stray cow back to join the rest of the herd."
 TEX_event.22.a:0 "The cowboys ride again!"
 TEX_event.23.t:0 "The Thing About Destiny"
 TEX_event.23.desc:0 "The hum of traffic and light filled the air of Austin, a city once on the decline now a hub learning to breathe once more. On the balcony of the Capitol Building, Chuck and Elvis leaned on the railing ext to each other, the unexpected duo observing the city. Elvis looked at the city, at the people on the streets and the cars that drove by. Chuck, however, wasn't looking at the city, but rather toward the northeast, in the direction of Washington.\n\nAnd a nation that had long remained broken.\n\n\"You alright?\" Elvis asked, noting Chuck's silence.\n\n\"Washington\" Chuck answered.\n\n\"Jesus, thinking of D.C again? We just got the ship sailing right here, and you're thinking about the rest?\" Elvis asked.\n\n\"On, come on, Elvis. You're from Mississippi right? Been in Tenessee. You ended up in Texas because that was where the Army put you all those years ago. You telling me you don't want to head back there some day?\" Chuck inquired, turning to face Elvis.\n\nElvis sighed, looking away from a moment before leaning forward on the railing.\n\n\"Sure, but... Texas is our slice of paradise. We can't just look beyond like it's another stepping stone for us. America isn't for us to resolve, it's for them.\"\n\n\"But what if it is the next stepping stone. One day, Elvis, whether it be Oceania coming back or a new government, sooner or later they'll want Texas back. Why wouldn't they? And what if the America that comes isn't so agreeable to us? Sounds to me that if we go in, we start stablising things ourselves, we can at least ensure that Texas is always protected\" Chuck explained, having given the matter considerable thought.\n\nElvis sighed, shifting a little in place.\n\n\"I thought Texas was gonna be our destiny, Chuck\" he muttered, sighing before meeting Chuck's gaze.\n\n\"\"That's the thing about destiny, Elvis..."
 TEX_event.23.a:0 "\"...It never ends where you think it does.\""
 TEX_decision.1.t:0 "Select Chuck Norris Portrait!"
 TEX_decision.1.desc:0 "With Texas free, which portrait would you prefer to see moving forward?"
 TEX_decision.1.a:0 "The Uprising Portrait"
 TEX_decision.1.b:0 "The Presidential Portrait"
 TEX_decision.1.c:0 "The Moustache Portrait"
 TEX_decision.1.d:0 "The Missing In Action Portrait"