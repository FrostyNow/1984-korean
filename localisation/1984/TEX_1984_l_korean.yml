l_korean:
 TEX_country_selection_tt:0 "§YHOW TO PLAY THE TEXAN LIBERATION ARMY\n-----------------------------------------§!\nPlay as the §gEnglish Socialist States of Oceania§!, play through content until the province breakdown prior to the §RAnti-Revolution§! occurs. When this occurs, open the decision menu and scroll down to the §Y'Whispers of Nations'§! decision menu and click the decision to switch to the §YRed Province.§!\n\nGo through the focus tree until the event to to switch to the §tTexan Liberation Army§! pops up."
 1984_Opening_Screen_TEX_Title_TT:0 "§tTEXAN LIBERATION ARMY§!"
 1984_Opening_Screen_TEX_Desc_TT:0 "Texas has always had to fight to get what it needs. Whether that be independence from §nMexico§! a hundred years back to independence from §gOceania§! today. In that regard, nothing has really changed. Though days as part of a greater, powerful §mUnited States of America§! have long since passed, it doesn't mean Texas can't carve out it's own place in the world.\n\nUnlike the first §tTexan Republic§!, we aren't undermanned or lacking in resources. We have the means at hand to create a strong and prosperous Texas, able to function on it's own terms if needs require it, and more than capable of making it's voice known across the world.\n\n§tWe need only fight to reclaim our lost dreams.§!"
 1984_Opening_Screen_TEX_Gameplay_Paths_Desc_TT:0 "- Unite §tTexas§! under the leadership of §YChuck Norris!§!"
 1984_Opening_Screen_TEX_Button_TT:0 "Yeehaw!"
 CHUCK_NORRIS_DESC:0 "§WBorn Carlos Ray Norris in the town of Ryan, Oklahoma in 1940, during the time of the Second World War, Chuck Norris, as he came to be known within the military, was enlisted early in his youth during the Oceanian Civil War. Serving in the Oceanian Airforce against INGSOC, Chuck made a name for himself as a bold fighter pilot, most notably during the battle of St. Louis, where he took down five Oceanian aircraft and successfully escorted a damaged bomber back to an Allied airfield.\n\nThough the Oceanian Civil War ended with an INGSOC victory, Chuck had managed to garner a following of his own with the reputation of a 'Reliable Badass' with many stories surrounding his name, from taking down a squadron of Oceanian soldiers with a rocket launcher to a King Cobra dying shortly after biting him. Regardless of the validity of those stories, Chuck has used them to gather allies and support throughout Texas over the years, his popularity allowing him to take command of the Texan Liberation Army, once a loose network of remnant forces and partisan forces, now rallied into a proper fighting force.\n\nWith Oceania on the decline and the chaos of revolution emerging across Oceania's vast territories, Chuck has the opportunity to finally liberate Texas from the clutches of Big Brother once and for all.§!"
