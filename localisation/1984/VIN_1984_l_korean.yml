l_korean:
 VIN_North_Vietnam:0 "Democratic Republic of Vietnam"
 VIN_North_Vietnam_DEF:0 "The Democratic Republic of Vietnam"
 VIN_North_Vietnam_ADJ:0 "Vietnamese"
 VIN_Vietnamese_Liberation_decision_category:0 "Vietnamese Liberation"
 VIN_Consolidate_The_North_decision:0 "Consolidate the North"
 VIN_Tradition_Of_Defiance:0 "Tradition of Defiance"
 VIN_Tradition_Of_Defiance_desc:0 "\n\n\n\n£GFX_VIN_Tradition_Of_Defiance_Banner\n\n\n\n\n\n\n§WOur people have upheld a formidable reputation of being an unconquerable force, fighting tooth and nail for our independence, winning each time against seemingly impossible odds. This fight is just another one of many struggles of liberation that our people will partake in.\n\nFailure is not an option, like our previous struggles for liberation, should we lose this fight, it could potentially spell the end for our people and nation as a whole. Whether they be the Chinese Imperialists, the French and Japanese Colonisers, and now the East Asian Jucheists, all will fall beneath our guns and blades.§!"
 VIN_All_Hands_For_Liberation:0 "All Hands for Liberation"
 VIN_All_Hands_For_Liberation_desc:0 "\n\n\n\n£GFX_VIN_All_Hands_For_Liberation_Banner\n\n\n\n\n\n\n§WThe road ahead of us is treacherous to say the very least, needless to say, these obstacles will not hold us back from clawing our way towards total liberation from the East Asian Imperialists. All over the occupied parts of Indochina, the whispers of nationhood have turned to outright shouts for liberation. Our brothers from all walks of life have set aside everything to contribute to our national liberation for they know what will happen should we fail.§!"
 VIN_Reinvigorated_Revolutionary_Spirit:0 "Reinvigorated Revolutionary Spirit"
 VIN_Reinvigorated_Revolutionary_Spirit_desc:0 "\n\n\n\n£GFX_VIN_Reinvigorated_Revolutionary_Spirit_Banner\n\n\n\n\n\n\n§WFor decades after the false revolutionaries of East Asia descended upon our lands, our people have had to endure decades of our revolution being stripped away from us, being replaced by a revolution of lies and slavery. On top of that, The East Asians dared to strip our history away from us, attempting to erase our national heroes and their deeds from the national consciousness.\n\nEnough is enough, our ancestors didn’t fight and bleed for centuries just to have it all be taken from us within a generation. We will fight to the very bitter end to protect our culture and history for generations to come.\n\n§RThis is Vietnam’s greatest hour, we either succeed now, or we shall forever be erased from history...§!§!"