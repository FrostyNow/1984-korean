 MTO_Echoes_Of_AM:0 "Echoes of AM"
 MTO_Echoes_Of_AM_desc:0 "\n\n\n\n£GFX_MTO_Echoes_Of_AM_Banner\n\n\n\n\n\n\n§WWhen AM destroyed all of America and Canada as a final act of spite to all of Humanity, many had hoped that despite all the death and destruction, at least the omnicidal machine was gone for good.\n\nHowever, that might not be the case.\n\nRefugees from the America's spoke of cameras still watching them. Echoes of maniacal laughter throughout the wasteland and people from refugee caravans escaping the wastes going missing on their journey.\n\nThough unconfirmed, many fear that the AI that caused all this death and decay may still exist within the wastes,§! §Rplotting his next move against Humanity.§!"
 MTO_Refugee_Crisis:0 "Refugee Crisis"
 MTO_Refugee_Crisis_desc:0 "\n\n\n\n£GFX_MTO_Refugee_Crisis_Banner\n\n\n\n\n\n\n§WEverday, refugees fleeing from America are arriving, fleeing the devastation caused by AM and his omnicidal effort to wipe out Mankind. Though we do what we can to spare them from the death traps their lands have turned into, this has put considerable strain on our resources. Many are hungry and sick, bringing injuries and radiation burns with them. Our services are stretched thin, grinding everything to a halt.\n\nHowever, this isn't the most terrifying part of all this. Every day, the numbers of refugees grow fewer and fewer, America becoming more silent and desolate with each passing day.§!"
