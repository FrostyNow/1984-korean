l_korean:
 NIMDOK_DESC:0 "§WFrederick Ellison was born on September 13th, 1912 in the city of Dresden, Germany to a Jewish father and a German mother. A genius and distinguised scientist, Frederick was a member of the National Socialist Workers Party of Germany following his mother's death, having blamed her death on his Jewish Father, whom he had arrested by the Nazi authorities in exchange for furhter accesion into the Party.\n\nTaken under the wing of Doctor Josef Mengele in the late 1930s, he participated in a long line of experimentation related to Hitler's Final Solution, using many test subjects of varying backgrounds in his experiments, one of them involving an attempt to create a solution to extend the lifespan of Human beings. When the Reich fell in the mid 1940s, Frederick was recruited by the United States under Operation Paperclip, being brought to America where he was permitted to carry on with new experiments, biological, chemical, and soon electrical. With heavy supervision.\n\nBut despite being spared of the treatment Josef Mengele had suffered, having been executed during the Nuremburg Trials, Frederick felt no loyalty to America, his sole purpose now being focused upon his own line of experimentation. During the Oceanian Civil War, Frederick defected to INGSOC when it became clear who the victor would be. Ingratiating himself into the INGSOC Regime, Frederick was permitted a significant position in the province of Mountain Zone Two, where he would be left with the challenging, yet intriguing task. To construct a Mastercomputer program designed for the sole purpose of waging war and suppressing any and all rebel forces.§!"
