 MTO_Call_A_Meeting:0 "Call A Meeting"
 MTO_Call_A_Meeting_desc:0 "With the growing destablisation of Oceania across all its territories, the future of this project is now uncertain. With demands from Big Brother mounting to finish and activate the Oceanian Mastercomputer to be used against the rebel forces, Gorrister has called a meeting to discuss the situation and what course of action should be taken with regards to the premature activation of the Oceanian Mastercomputer."
