 RAJ_Indian_Reunification_War_decision_category:0 "Indian Reunification War"
 RAJ_Reclaim_Southern_India_decision:0 "Reclaim Southern India"
 RAJ_The_Ruins_Of_The_Raj_idea:0 "The Ruins of the Raj"
 RAJ_The_Ruins_Of_The_Raj_idea_desc:0 "\n\n\n\n£GFX_RAJ_The_Ruins_Of_The_Raj_idea_Banner\n\n\n\n\n\n\n§WModern-day India lives within the shadow of the Raj that came before it. The land is in tatters and ruins, the dream of a unified state more distant than ever. When independence from Britain was achieved after World War 2, we believed a future of optimism and prosperity awaited us.\n\nThe future we recieved did not adhere to the dreams we held.\n\nThe emergence of the three super-states that dominate the world and the collapse of the old global order led to turmoil within India. India became isolated, and the provinces took more control of their affairs while Delhi lost its prominence. We are a shadow, with only a handful of provinces to our name. With Oceania invading from the South, Eurasia to the West, and the new states across our lands seeking to enact their ambitions, the dream of a united India is distant, indeed.§!\n\n§RBut not dead.§!"
 RAJ_Legacy_Of_The_Punjab_War_idea:0 "Legacy of the Punjab War"
 RAJ_Legacy_Of_The_Punjab_War_idea_desc:0 "\n\n\n\n£GFX_RAJ_Legacy_Of_The_Punjab_War_idea_Banner\n\n\n\n\n\n\n§WWhen the Pakistanis lost their Western holdings to Eurasia during the late '60s, they sought to recuperate their losses by shifting their gaze eastwards towards the Punjab province, commencing an invasion of our territory in the  1970s.\n\nThe war was a bloody one, with thousands of troops battling across the province for control over the territory, with most of the province and other areas falling under Pakistani occupation. But after many long years of decline and failure, the Delhi government had managed to avenge its failures when, under the command of Sam Manekshaw, the Indian Army managed to repel the Pakistani Army from most of India.\n\nThough Jalandhar remains under Pakistani control, the war reinforced Delhi's status as a regional power.\n\nThough the scars of war are still fresh, the war made it clear. Delhi's decline, at least for now, had been halted.§!"
 RAJ_Disfunctional_Economy_idea:0 "Disfunctional Economy"
 RAJ_Disfunctional_Economy_idea_desc:0 "\n\n\n\n£GFX_RAJ_Disfunctional_Economy_idea_Banner\n\n\n\n\n\n\n§WThe Indian economy is a mess.\n\nThe railways are crowded, our industrial facilities are outdated, and it has been a very, very long time since India has experienced any form of foreign investment, forcing us to be as self-sufficient as possible and expanding trade with the remaining free nations of the world to ensure we stay afloat.\n\nBut there is still much to resolve. Unemployment is still high, industrial output remains stagnant, and our technology, much like the rest of the world, hasn't changed much to improve the situation.\n\nIf India is to be reunited once more, fixing the economy needs to remain our top priority.§!"