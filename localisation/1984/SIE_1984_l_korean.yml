 SIE_Sierra_Desc_tt:0 "Nestled between the Thirteen Sectors and Amazonia, Sierra is the bridge that links the two provinces together. Home to the Canal, that allows Oceania to more effectively project power over North and South, Sierra also specialises in the production of specialised agricultural goods that can only be grown in the climate zone that Sierra finds itself situated in."
