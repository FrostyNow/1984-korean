 SIA_Surrounded_By_Psychopathy:0 "Surrounded by Psychopathy"
 SIA_Surrounded_By_Psychopathy_desc:0 "\n\n\n\n£GFX_SIA_Surrounded_By_Psychopathy_Banner\n\n\n\n\n\n\n§WOur current geopolitical situation is far less than ideal, we are surrounded on all sides by regimes that wish to subjugate us. Their constant cross-border raids devastate the villages they manage to tread upon.\n\nAs a result, there is an air of fear and uncertainty among Thai citizens wondering when these nations will attempt to deliver their final blow not only upon Thailand but the remaining free nations of Southeast Asia as well.§!"
 SIA_Military_Paranoia:0 "Military Paranoia"
 SIA_Military_Paranoia_desc:0 "\n\n\n\n£GFX_SIA_Military_Paranoia_Banner\n\n\n\n\n\n\n§WHis majesty Rama IX could not have subdued parliament on his own, after concessions were given, the military stormed parliament and delivered the King’s demands to the president of the national assembly, solidifying the authority of his majesty.\n\nHowever, as Rama expands his powers even further, some in the military have grown concerned over their future in the matters of the state with some even saying that he seeks to expel the military’s influence from the administration altogether. If the military isn’t dealt with soon, they could potentially force the king to become a mere puppet, threatening to weaken the nation further.§!"
 SIA_Growing_Parliamentarian_Calls:0 "Growing Parliamentarian Calls"
 SIA_Growing_Parliamentarian_Calls_desc:0 "\n\n\n\n£GFX_SIA_Growing_Parliamentarian_Calls_Banner\n\n\n\n\n\n\n§WAfter the revolution in East Asia, Rama IX dissolved parliament, justifying his move as an act to protect the Thai people from the claws of Totalitarianism in East Asia. For years afterwards, the people accepted this reality, justifying it as the only defence against total subjugation.\n\nOver time as more people begin to see the lack of any significant action from any of the totalitarian states that surround us, the calls for a return to the pre-absolutist status quo grow even louder with rumors of totalitarian infiltration in their movement. Should we neglect to address their demands, this could spell disaster for our national security.§!"