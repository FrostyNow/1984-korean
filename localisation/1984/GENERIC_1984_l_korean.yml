 BOOKMARK_1984_DESC:0 "The year is 1984, and the world is dominated by Eurasia, East Asia, and Oceania. Freedom is a distant memory for the millions that endure in this dark world, with most living within the shackles of Oligarchal Collectivism. What remains live on in impoverished free zones, fighting over the scraps of the old world. The world is stagnant, and unchanging, with millions seemingly accepting the current order. Yet, below the surface, a silent rage is brewing, an anger that may change the world as we know it."
