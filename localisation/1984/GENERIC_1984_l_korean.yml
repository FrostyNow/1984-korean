 MANN_Co_INFO_TT:0 "§YDEVELOPER NOTE!§!\nThis mechanic or the lore of §YTeam Fortress 2§! is not considered canon to §R1984: Revolution§!. This exists purely for nations that do not have Generals yet.\n\nThis is mainly due to the instability of the current recruitment vanilla system which doesn't work properly despite my efforts to fix it. Thus, I am giving General-lacking nations access to this fun little mechanic which let's you hire the merc's from TF2 as proper Generals so you can actually fight wars and such with them.\n\nThis will eventually be phased out as more and more nations recieve Generals and military leadership and so on."
