 startup.1.desc:0 "So far, there exists content for:\n\n- The English Socialist States of Oceania\n- Eurasian Union State\n- The Second Continental Army\n- Florida Rebel Army\n- The British Royal Resistance\n- Siberian Provisional Government\n- Russian Soviet Federative Socialist Republic\n- Peninsula One\n- The Frontier Administration\n- The Republic of Rhodesia.\n\nWe hope you enjoy the mod and stick around to watch this mod continue to take shape.\n\n-1984: Revolution Development Team"
