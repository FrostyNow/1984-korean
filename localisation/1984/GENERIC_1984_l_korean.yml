 GENERIC_Technological_Hierarchy:0 "Technological Hierarchy"
 GENERIC_Technological_Hierarchy_desc:0 "\n\n\n\n£GFX_Generic_Technological_Hierarchy_Banner\n\n\n\n\n\n\n§WAny Technological Advancement that occurs these days exists only within certain regions of the Super States and its access is limited depending on your place in society, with the Elites recieving the most advanced pieces of technology available, some stranger than others. Research and development is localised, with different regions having different technological focuses and availabilities.\n\nThis system makes it difficult for those outside the sphere of the Elite of the Super States from getting access to these technologies, including rebels and the free nations. It will take immense effort to overcome this system in order to kickstart the scientific sector back to how it used to be during the age of the Old World.§!"
 GENERIC_Technological_Stagnation:0 "Technological Stagnation"
 GENERIC_Technological_Stagnation_desc:0 "\n\n\n\n£GFX_Generic_Technological_Stagnation_Banner\n\n\n\n\n\n\n§WAs a result of years of constant warfare, global isolation and general inefficency, research and development has been stagnant or in some cases, regressive.\n\nThe truth is that the world exists in a state of limbo with no real desire or means to innovate beyond the status quo. It will take immense effort to overcome this phenomeon in order to kickstart the scientific sector once more.§!"
