 CAN_Last_Stronghold_Of_The_Empire:0 "Last Stronghold of the Empire"
 CAN_Last_Stronghold_Of_The_Empire_desc:0 "\n\n\n\n£GFX_CAN_Last_Stronghold_Of_The_Empire_Banner\n\n\n\n\n\n\n§WWith the British Royal Family and many British loyalists taking residence in Canada during the Oceanian Civil War which first brought about the rise of INGSOC, the northern reaches of Canada remains a vast stronghold through which the remnants of the British Empire continue to hold on, the swaths of forests and lakes allowing us to wage a campaign of resistance against the forces of Oceania.\n\nThough the dream of retaking the Home Isles still remain distant, with the King at the helm, we can atleast reclaim Canada.§!"
 CAN_The_Great_White_North:0 "The Great White North"
 CAN_The_Great_White_North_desc:0 "\n\n\n\n£GFX_CAN_The_Great_White_North_Banner\n\n\n\n\n\n\n§WThe northern territories of Canada are cold, harsh and sparsely populated. Though rich in resources, setting up a large population up in the north is a difficult endeavour. However, this is served to the benefit of the reistance as with the north being so disconnected from the rest of Canada, it has made it abundantly difficult for Oceania to enforce its rule, allowing us to thrive and spread out without much resistance.\n\nAs we rise up to fight against Big Brother, our time in the north of Canada and our mastery over this region will undoubtably give us an advantage against the loyalist hordes of Big Brother.§!"
 CAN_Reign_Of_The_Mounties:0 "Reign of the Mounties"
 CAN_Reign_Of_The_Mounties_desc:0 "\n\n\n\n£GFX_CAN_Reign_Of_The_Mounties_Banner\n\n\n\n\n\n\n§WOf all the forces making up the Royal Resistance, the Mounties have proven to be the most important and thus, influential force. Their use of horses have allowed them to be swift yet difficult to detect amongst the vast forests of Canada, helping to secure supply lines across Canada and proving most effective in Hit & Run tactics against the few Oceanian forces unfortunate enough to be sent up to the North.\n\Naturally, the Mounties have become the face of the army on the battlefield, their likeness becoming symbols of liberation and drawing thousands of volunteer soldiers from all across Canada and even neighbouring Alaska.§!"
