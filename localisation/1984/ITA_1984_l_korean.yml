 ITA_The_Legacy_Of_Rome:0 "The Legacy of Rome"
 ITA_The_Legacy_Of_Rome_desc:0 "\n\n\n\n£GFX_ITA_The_Legacy_Of_Rome_Banner\n\n\n\n\n\n\n§WItaly sits upon the heartland of the ancient Roman Empire, the superpower of Antiquity, and thus the natural inheritor of the ancient Roman legacy. Though the conditions that Rome found itself in when charting it's destiny is quite different from our own, the truth that the Italian peninsula has and always will belong to the Italian people remains undisputed.\n\nHowever, there are those who would attempt to usurp our people and erease our Roman heritage and Italian identity, that enemy being Eurasia. The barbarians are at the gates once again and it is up to the Italian people to push them out of the peninsula and beyond the Alps!§!"
 ITA_The_Heart_Of_The_Mediterranean:0 "The Heart of the Mediterranean"
 ITA_The_Heart_Of_The_Mediterranean_desc:0 "\n\n\n\n£GFX_ITA_The_Heart_Of_The_Mediterranean_Banner\n\n\n\n\n\n\n§WItaly is the heart of the Mediterranean Sea, one only needs to look at a map to recognise this basic fact. From this peninsula, we are able to project power and influence to other lands bordering the Mediterranean Sea whilst also consolidating regional power within our peninsula.\n\nWith power comes strength and the Italian peninsula is a very advantagous position to project that power across the entire sea.§!"
 ITA_The_Vatican_Pact:0 "The Vatican Pact"
 ITA_The_Vatican_Pact_desc:0 "\n\n\n\n£GFX_ITA_The_Vatican_Pact_Banner\n\n\n\n\n\n\n§WBefore Eurasia came and smashed it to pieces, the Holy See called Italy home. It was the seat of power for the Catholic Church and the Pope, reiging in Italty for over a millenia without challenge to its spiritual authority. That was until the Eurasians, then known as the Soviets, invaded the city and dispelled the Vatican, devastating the buildings and forcing the leadership to flee.\n\nThough a shadow of it's old power, the Vatican is eager to retake the Italian peninsula in the name of the Lord Jesus Christ and to dispell the state enforced Atheism that has been enforced upon our people. Thus, it is only natural that an alliance between ourselves and the Church has formed in the interest of reclaiming our land, for Italy and for God.§!"
 ITA_Vittorio_Emanuele_idea:0 "Vittorio Emanuele"