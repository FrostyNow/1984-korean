l_korean:
 oligarchal_collectivism:0 "Oligarchal Collectivism"
 oligarchal_collectivism_desc:0 "Oligarchal Collectivist Regime"
 oligarchal_collectivism_drift:0 "Oligarchal Collectivist Drift"
 oligarchal_collectivism_noun:0 "Oligarchal Collectivism"
 ingsoc_subideology:0 "English Socialism"
 ingsoc_subideology_desc:0 "\n\n\n\n£GFX_Ideology_INGSOC\n\n\n\n\n\n§REnglish Socialism§!\n\n§WWar is Peace.\nFreedom is Slavery.\nIgnorance is Strength.\n\nA far cry of the principles that once came from the nations that had come before, INGSOC demands total and utter obidience to the Party at all levels of society, even the surrender of logic and personal desires. If the Party believes that two plus two is equal to five, then it is so. Anyone who refutes the will of the party is a though criminal and a traitor.\n\nThere is no ideology in English Socialism. There is no Right nor Left, No Right nor Wrong, no Past nor Future, there is only the will of Big Brother. Any deviance from this mindset is a traitor and is therefore guilty of thought crime. There will be no mention of what came before. There is to be no mention of the Kingdoms and Republics that came before, the only history that matters is Oceania.§!"
 neo_bolshevism_subideology:0 "Neo-Bolshevism"
 neo_bolshevism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Neo_Bolshevism\n\n\n\n\n\n§RNeo-Bolshevism§!\n\n§WFollowing the end of the nuclear war of the early 1950s and the death of Stalin soon after, the triumphant continental super power that was then known as the Soviet Union fought an internal struggle of control between Khrushchevite Reformists and the NKvD Apparatus headed by Beria.\n\nThe Khrushchevites had failed to defeat Beria and were purged from the party. What followed was the total transformation of the Soviet Union into the Eurasian Union. All territories, from Iberia to the shores of Kamchatka, were united under a single banner through force. The intelligence apparatus was empowered immensely, monitoring each and every citizen, ensuring absolute loyalty remained. The economic policies of the late Stalin were institutionalised, even harsher and more brutal than before. This overhauled amalgamation of Stalinism became known to those within Eurasia as Neo-Bolshevism, the vision of the immortal Lenin perfected.§!"
 juche_subideology:0 "Juche"
 juche_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Juche\n\n\n\n\n\n§RJuche§!\n\n§WThe People are God.\nThe Party is God.\nThe Leader is God.\n\nA Synthesis of Neo-Bolshevism and Chondoism, Juche venerates the heavens as the ultimate principle of good and justice. It is summarised as the popular masses being placed in the centre of everything, and the leader in the centre of the masses. According to party doctrine, the leader is the messenger of heaven therefore his word is its directive. Anyone who refutes the will of the party is not only an enemy to the people, but also an enemy to heaven itself.\n\nIn keeping with its Chondoist roots, Juche emphasises the obliteration of the self in the hope that, as one strips oneself of one's individuality, one comes closer to the party and therefore heaven as well. Deviation from the path not only takes one further from the party, it is also taken as a sign of one being nothing but a traitor who seek to bring down society as a whole. In the beginning, there was nothing, the only history that has ever existed is the revolution, gifted from the heavens on the peak of Paektu.§!"
 nguemaism_subideology:0 "Nguemaism"
 burmese_socialism_subideology:0 "Burmese Socialism"
 burmese_socialism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Burmese_Socialism\n\n\n\n\n\n§RBurmese Socialism§!\n\n§WA Deviation from mainstream socialism, The Burmese Way to Socialism is characterised by an extensive dependence on the military, emphasis on the rural populace, and Burman nationalism. Officially it is deemed as socialism, influenced by Buddhist, humanist and Marxist views, despite the party phraseology being socialist, their actions are those of ardent nationalists seeking to maximise the power of their state.\n\nUnder Burmese Socialism, Individual expression is heavily restricted and non-state publications are forbidden. All must work towards the betterment of the Burmese nation and they shall revere the chairman as a great provider to the nation.\n\nAny word against the chairman is a word against the nation and people and shall be swiftly met with a noose wrapped around the neck.§!"
 agrarian_bolshevism_subideology:0 "Agrarian Bolshevism"
 agrarian_bolshevism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Agrarian_Bolshevism\n\n\n\n\n\n§RAgrarian Bolshevism§!\n\n§WFollowing the fall of Phnom Penh, Pol Pot began to consolidate power over the Kampuchean nation and began its transformation. Birthed from the transformation, Agrarian Bolshevism is a synthesis of Neo-Bolshevism and Maoism, where heavy emphasis is placed on de-urbanisation in favor of rural revitalisation.\n\nUnder Agrarian Bolshevism, all must submit their will to the will of Angkar and revere Angkar as the savior of the Khmer Nation and the bringer of the new Kampuchean Era.\n\nAll who dissent against Angkar dissent against the nation as a whole and must therefore be cleansed from Kampuchea from the end of a gun barrel.§!"
 indsoc_subideology:0 "Indian Socialism"
 indsoc_subideology_desc:0 "\n\n\n\n£GFX_Ideology_INDSOC\n\n\n\n\n\n§RIndian Socialism§!\n\n§WAn off shoot of INGSOC Ideology, Indian Socialism aims to establish a truly homogenous Indian soceity, devoid of old cultural indentities and regionalist sentiments all while hinging on the ideals of its mother ideology: English Socialism.\n\nThere is no past or future. No differences between us. The only thing that matters is India.§!"
 managed_democracy_subideology:0 "Managed Democracy"
 managed_democracy_subideology_desc:0 ""
 ai_dominion_subideology:0 "AI Dominion"
 ai_dominion_subideology_desc:0 "\n\n\n\n£GFX_Ideology_AI_Dominion\n\n\n\n\n\n§RAI Dominion§!\n\n§WHere, the reign of the Machine has come. Man no longer has control over this land, no, the business of ruling is done by computers and machines. Here, Humans are another variable, something to consider in the self preservation and rule of the Artificuial Intelligence that rules here.§!"
 hutu_supremacy_subideology:0 "Hutu Supremacy"
 hutu_supremacy_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Hutu_Supremacy\n\n\n\n\n\n§RHutu Supremacy§!\n\n§WHutu Power or Hutu Supremacy is an ethnosupremacist ideology that asserts the superiority of the Hutu, often in the context of being superior to the Tutsi and Twa. Therefore, they are entitled to dominate and exterminate these two groups.\n\nHutu Supremacists seek to establish a Pure Hutu Nation, one where Hutus dominate public institutions and public life, completely segregate themselves from Tutsis and Twa, and completely exclude Tutsis and Twa from public institutions and life.§!"
 cultism_subideology:0 "Cultism"
 cultism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Cultism\n\n\n\n\n\n§RCultism§!\n\n§WCults are social groups which have unusual, and often extreme, religious, spiritual, or philosophical beliefs and rituals. Extreme devotion to a particular person, object, or goal is another characteristic often ascribed to cults.§!"
 fascism:0 "Fascism"
 fascism_desc:0 "Fascist Regime"
 fascism_drift:0 "Fascist Drift"
 fascism_noun:0 "Fascism"
 fascism_subideology:0 "Fascism"
 fascism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Fascsim\n\n\n\n\n\n§jFascism§!\n\n§WFirst envisioned in Italy by Benito Mussolini, the idea of Fascism hinges on the notion of all within the state and nothing outside of the state. An authoritarian ideology, which could be summarised as collectivised nationalism, Fascism typically consists of militarism, a totalitarian view of the state & leader, the weaponisation of tradition and culture, and the primacy of the national interest over the interest of the individual.§!"
 national_socialism_subideology:0 "National Socialism"
 national_socialism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_National_Socialism\n\n\n\n\n\n§jNational Socialism§!\n\n§WRooted in extreme nationalism, National Socialism is driven by ideas of Germanic supremacy. It promotes aggressive expansionism and a totalitarian state where the people are united under a leader with absolute power, the Fuhrer.§!"
 imperial_restoration_movement_subideology:0 "Imperial Restoration Movement"
 imperial_restoration_movement_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Imperial_Restoration_Movement\n\n\n\n\n\n§jImperial Restoration Movement§!\n\n§WRooted in Japanese Fascist and Monarchist Movements, the goal of any Japanese Imperial Restoration Movement is simple. To restore the Emperor of Japan to the Chrysanthemum Throne and restore the Japanese Empire by any means necessary.§!"
 revised_eurasianism_subideology:0 "Revised Eurasianism"
 ethnonationalism_subideology:0 "Ethnonationalism"
 ethnonationalism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Ethnonationalism\n\n\n\n\n\n§jEthnonationalism§!\n\n§WEthnonationalism is a form of nationalism that defines the nation primarily by shared ethnicity, ancestry, or a myth of common ancestry, rather than by civic principles like shared citizenship or values. This ideology emphasizes loyalty and devotion to an ethnic group and its culture, language, and traditions, often with the goal of achieving statehood or cultural autonomy for that group.\n\nEthnonationalism can manifest as claims of ethnic superiority, demands for equal place for a marginalized ethnicity, or a desire for a distinct homeland.§!"
 social_darwinism_subideology:0 "Social Darwinism"
 social_darwinism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Social_Darwinism\n\n\n\n\n\n§jSocial Darwinism§!\n\n§WSocial Darwinism is a pseudoscientific theory that applies biological concepts of natural selection and \"survival of the fittest\" to human societies, politics, and economics. It suggests that the \"weak\" are naturally diminished while the \"strong\" prosper and establishes a social hierarchy to reflect this idea.§!"
 nationalism:0 "Nationalism"
 nationalism_desc:0 "Nationalist Regime"
 nationalism_drift:0 "Nationalism Drift"
 nationalism_noun:0 "Nationalism"
 nationalism_subideology:0 "Nationalism"
 nationalism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Nationalism\n\n\n\n\n\n§8Nationalism§!\n\n§WNationalism is an ideology and political movement that prioritizes the value of the nation as the highest form of social unity and its primacy in the state-building process. It asserts that every nation has the right to self-determination and that the nation is the only legitimate source of political power. This ideology prioritizes the development of the nation through the promotion of culture.\n\nDespite the biased view of nationalism as a radical right-wing ideology, nationalism is loyal to national minorities and grants them the right to self-determination.§!"
 ultranationalism_subideology:0 "Ultranationalism"
 ultranationalism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Ultranationalism\n\n\n\n\n\n§8Ultranationalism§!\n\n§WUltranationalism is an extreme form of nationalism that places the interests of one's own state or people above all others, often treating foreigners with contempt. It is an ideology that borders on fascism, supports authoritarian regimes, and draws on myths of \"organic unity\" and the glory of the past.§!"
 ukrainian_nationalism_subideology:0 "Ukrainian nationalism"
 ukrainian_nationalism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Ukrainian_Nationalism\n\n\n\n\n\n§8Ukrainian nationalism§!\n\n§WA distinct form of nationalism founded by its first ideologue, Mykola Mikhnovsky, and further developed by the ideologues of the OUN, Ukrainian nationalism aims to establish and develop a Ukrainian nation-state and to preserve national identity.§!"
 despotism:0 "Despotism"
 despotism_desc:0 "Despotic Regime"
 despotism_drift:0 "Despotist Drift"
 despotism_noun:0 "Despotism"
 despotism_subideology:0 "Despotism"
 despotism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Despotism\n\n\n\n\n\n§qDespotism§!\n\n§WDespotism is a form of government in which a single entity rules with absolute power. Normally, that entity is an individual, the despot, and maintains rule through use of the military and other arms of the state.§!"
 partisan_movement_subideology:0 "Partisan Movement"
 partisan_movement_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Partisan_Movement\n\n\n\n\n\n§qPartisan Movement§!\n\n§WA partisan movement is a resistance group fighting an occupying force, often through guerrilla warfare, sabotage, and other forms of armed resistance§!"
 theocracy_subideology:0 "Theocracy"
 theocracy_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Theocracy\n\n\n\n\n\n§qTheocracy§!\n\n§WTheocracy or ethiocracy is a form of autocracy or oligarchy in which one or more deities are recognized as supreme ruling authorities, giving divine guidance to human intermediaries, with executive, legislative, and/or judicial power, who manage the government's daily affairs.§!"
 absolute_monarchy_subideology:0 "Absolute Monarchy"
 tridemism_subideology:0 "Tridemism"
 tridemism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Tridemism\n\n\n\n\n\n§qTridemism§!\n\n§WThe foundational ideals of Dr. Sun Yat-sen, Tridemism, more formally known as the Three Principles of the People places an emphasis on the ideas of Nationalism, Governance, and Welfare. Though the practices and implementation can vary drastically depending on the leadership's interpretation of the late Sun Yat-sen's ideals, all strains of Tridemism seek to bring honor and glory to the Chinese nation, people, and society, and guide them towards a modern destiny.§!"
 japanese_imperial_system_subideology:0 "Japanese Imperial System"
 japanese_imperial_system_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Japanese_Imperial_System\n\n\n\n\n\n§qJapanese Imperial System§!\n\n§WThe Japanese Imperial system, the world's oldest continuous hereditary monarchy, features an Emperor with divine linage stemming from Amaterasu and is constitutionally defined as \"the symbol of the State and of the unity of the people\". The Japanese Emperor holds incredible sway over people and state, with the power to grant and take authority resting solely with him.§!"
 tsarist_autocracy_subideology:0 "Tsarist Autocracy"
 tsarist_autocracy_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Tsarist_Autocracy\n\n\n\n\n\n§qTsarist Autocracy§!\n\n§WSimilar to Absolute Monarchy, Tsarist Autocracy is a system of government originating from the Russian Empire from which most, if not, all power is invested in the Tsar, the divine leader of all Russias.§!"
 american_separatism_subideology:0 "American Separatism"
 american_separatism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_American_Separatism\n\n\n\n\n\n§qAmerican Separatism§!\n\n§WMade up of Pro-American militia and political movements, the aim of American Separatists are quite simple. To liberated the United States of America by any means necessary.§!"
 texan_separatism_subideology:0 "Texan Separatism"
 texan_separatism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Texan_Separatism\n\n\n\n\n\n§qTexan Separatism§!\n\n§WMade up of Pro-Texan militia and political movements, the aim of Texan Separatists are quite simple. To establish a free and independent Texas.§!"
 russian_separatism_subideology:0 "Russian Separatism"
 russian_separatism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Russian_Separatism\n\n\n\n\n\n§qRussian Separatism§!\n\n§WMade up of Pro-Russian militia and political movements, the aim of Russian Separatists are quite simple. Separate themselves from whatever nation they were previously in and become part of the Russian heartland or, if there is no Motherland to rejoin, create a new Russian State themselves.§!"
 visionary_capitalism_subideology:0 "Visionary Capitalism"
 visionary_capitalism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Visionary_Capitalism\n\n\n\n\n\n§YVisionary Capitalism§!\n\n§WLook at the world around you. The chaos that the forces of so called Enlightment has wrought upon the Earth.\n\nDemocracy, Socialism, Fascism.\n\nAll mechanicisms that have allowed the foolish to govern the innovators, drowning the Earth in their envy and impulsiveness whilst restraining those who succeed and thrive.\n\nNo longer can the foolish be allowed to govern again. The great will no longer be constrained by the small. No longer shall the labours of man be stolen away and given out to the rats and vultures to be wasted. The rebirth of society must be guided by those with vision, the mind to innovate, and the firm hand to guide the masses from the dirt below to the stars beyond.§!"
 afrikan_autocracy_subideology:0 "Afrikan Autocracy"
 afrikan_autocracy_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Afrikan_Autocracy\n\n\n\n\n\n§qAfrikan Autocracy§!\n\n§WRooted in Black Nationalist sentiments, Afrikan Autocracy seeks to establish a nation that focuses on Black American interests above all else.\n\nAfrikan Autocracy is a system governed solely by Afrikans, with a strong autocratic system that largely excludes other groups from its governing structure.§!"
 authoritarian_democracy:0 "Authoritarian Democracy"
 authoritarian_democracy_desc:0 "Authoritarian Regime"
 authoritarian_democracy_drift:0 "Authoritarian Democrat Drift"
 authoritarian_democracy_noun:0 "Authoritarian Democracy"
 authoritarian_democracy_subideology:0 "Anocracy"
 authoritarian_democracy_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Anocracy\n\n\n\n\n\n§gAnocracy§!\n\n§WA system of government that combines features of both democracy and autocracy, creating a hybrid regime that is neither fully democratic nor fully dictatorial. These regimes are sometimes called hybrid regimes or quasi-democracies because they exhibit some democratic characteristics but also contain significant autocratic elements.§!"
 oligarchy_subideology:0 "Oligarchy"
 oligarchy_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Oligarchy\n\n\n\n\n\n§gOligarchy§!\n\n§WOligarchy is a form of government in which power rests with a small number of people. Leaders of such regimes are often referred to as oligarchs, and generally are characterized by having titles of nobility or high amounts of wealth.§!"
 patriotic_democracy_subideology:0 "Patriotic Democracy"
 patriotic_democracy_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Patriotic_Democracy\n\n\n\n\n\n§gPatriotic Democracy§!\n\n§WPatriotic Democracy is a system of governance that focuses on infusing democratic traditions with patriotic symbolism and fervor, often to ludicrous degrees\n\nWhilst not to the seem degree as dictatorships, Patriotic Democracies often have authoritarian tendencies that are often justified by upholding patriotism and the good of the nation, no matter the cost.§!"
 minority_government_subideology:0 "Minority Government"
 minority_government_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Minority_Government\n\n\n\n\n\n§gMinority Government§!\n\n§WMinority Rule is a form of government is where political power and influence is disproportionately held by certain members of an ethnic group, which rules over the majority peoples of a nation or territory.§!"
 stratocracy_subideology:0 "Stratocracy"
 stratocracy_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Stratocracy\n\n\n\n\n\n§gStratocracy§!\n\n§WA stratocracy is a form of government headed by military chiefs. The branches of government are administered by military forces, the government is legal under the laws of the jurisdiction at issue, and is usually carried out by military workers.§!"
 dixiecrat_subideology:0 "Dixiecrat"
 dixiecrat_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Dixiecrat\n\n\n\n\n\n§gDixiecrat§!\n\n§WThe Southern Dixiecrats are a southern interests segregationist party. Their platform focuses on upholding white supremacy, suppressing desegratationist movements, and promoting the cultural norms of the South.\n\nDixiecrats tend to govern with a firm hand, favouring strong law enforcement policies and developing a strong military structure in order to uphold the system.§!"
 chiangist_tridemism_subideology:0 "Chiangist Tridemism"
 chiangist_tridemism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Chiangist_Tridemism\n\n\n\n\n\n§gChiangist Tridemism§!\n\n§WThe foundational ideals of Dr. Sun Yat-sen, Tridemism, more formally known as the Three Principles of the People places an emphasis on the ideas of Nationalism, Governance, and Welfare. Though the practices and implementation can vary drastically depending on the leadership's interpretation of the late Sun Yat-sen's ideals, all strains of Tridemism seek to bring honor and glory to the Chinese nation, people, and society, and guide them towards a modern destiny.§!"
 conservative_democracy:0 "Conservative Democracy"
 conservative_democracy_desc:0 "Conservative Regime"
 conservative_democracy_drift:0 "Conservative Democrat Drift"
 conservative_democracy_noun:0 "Conservative Democracy"
 conservative_democracy_subideology:0 "Conservative Democracy"
 rightwing_populism_subideology:0 "Rightwing Populism"
 rightwing_populism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Rightwing_Populism\n\n\n\n\n\n§gRightwing Populism§!\n\n§WA political movement that combines nationalist rhetoric with populist appeals, often portrating itself as the voice of the \"ordinary people\" against corrupt elites or outsiders. Rightwing populist regimes emphasize strong national identity, cultural conservatism, and restrictive immigration policies, while supporting decisive leadership to protect traditional values.§!"
 market_conservatism_subideology:0 "Market Conservatism"
 market_conservatism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Market_Conservatism\n\n\n\n\n\n§BMarket Conservatism§!\n\n§WMarket Conservatives advocate tax cuts, reduced government spending, free markets, deregulation, privatization, free trade, and minimal government debt. Fiscal conservatism follows the same philosophical outlook as classical liberalism whilst maintaining elements of conservative economic and administrative thought.§!"
 liberal_conservatism_subideology:0 "Liberal-Conservatism"
 liberal_conservatism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Liberal_Conservatism\n\n\n\n\n\n§BLiberal-Conservatism§!\n\n§WLiberal conservatism is a political ideology combining conservative policies with liberal stances, especially on economic issues but also on social and ethical matters, representing a brand of political conservatism strongly influenced by liberalism.§!"
 right_tridemism_subideology:0 "Right Tridemism"
 right_tridemism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Tridemism\n\n\n\n\n\n§BRight Tridemism§!\n\n§WThe foundational ideals of Dr. Sun Yat-sen, Tridemism, more formally known as the Three Principles of the People places an emphasis on the ideas of Nationalism, Governance, and Welfare. Though the practices and implementation can vary drastically depending on the leadership's interpretation of the late Sun Yat-sen's ideals, all strains of Tridemism seek to bring honor and glory to the Chinese nation, people, and society, and guide them towards a modern destiny.§!"
 liberal_democracy:0 "Liberal Democracy"
 liberal_democracy_desc:0 "Liberal Regime"
 liberal_democracy_drift:0 "Liberal Democrat Drift"
 liberal_democracy_noun:0 "Liberal Democracy"
 liberal_democracy_subideology:0 "Liberal Democracy"
 national_liberalism_subideology:0 "National Liberalism"
 national_liberalism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_National_Liberalism\n\n\n\n\n\n§aNational Liberalism§!\n§WNational Liberalism is a variant of liberalism, which combines liberal policies, ideas, and issues with some elements of nationalism.§!"
 liberal_futurism_subideology:0 "Liberal Futurism"
 liberal_futurism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Liberal_Futurism\n\n\n\n\n\n§aLiberal Futurism§!\n§WFuturism espouses the creation of a society governed primarily by scientists and engineers that places a heavy focus on technological growth. Liberal Futurism believes that man's history of being subjugated has limited man's technological innovation and that the rapid technological innovation of the Industrial Revolution onwards was spurred by the rise of individual liberty, leading to the conclusion that only through the promotion of individual liberty can the future be attained.§!"
 social_democracy:0 "Social Democracy"
 social_democracy_desc:0 "Social Democratic Regime"
 social_democracy_drift:0 "Social Democrat Drift"
 social_democracy_noun:0 "Social Democracy"
 social_democracy_subideology:0 "Social Democracy"
 left_wing_populism_subideology:0 "Left-Wing Populism"
 left_wing_populism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Left_Wing_Populism\n\n\n\n\n\n§pLeft-Wing Populism§!\n§WA political current that blends populist rhetoric with leftist ideals, framing politics as a struggle between the common people and powerful elites. Left-wing populist regimes emphasize social and economic justice, welath redistribution, and expanded welfare, often opposing large corporations and entrenched interests.\n\nWhile rooted in democratic participation, they may undermine traditional institutions in pursuit of popular mandates, creating a system that balances between radical reform and concentrated leadership.§!"
 eco_populism_subideology:0 "Eco Populism"
 eco_populism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Eco_Populism\n\n\n\n\n\n§pEco Populism§!\n§WEco-populism is a political ideology that fuses ecological concerns with populist politics, framing environmental issues as a struggle between \"the people\" and an \"elite\" or \"oligarchy\". It can manifest as grassroots movements opposing environmental injustice, or as more formal political strategies aimed at uniting a broad base against corporate or state-led policies that harm the environment.W!"
 socialism:0 "Socialism"
 socialism_desc:0 "Socialist Regime"
 socialism_drift:0 "Socialism Drift"
 socialism_noun:0 "Socialism"
 socialism_subideology:0 "Socialism"
 socialism_subideology_desc:0 ""
 left_tridemism_subideology:0 "Left Tridemism"
 left_tridemism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Tridemism\n\n\n\n\n\n§RLeft Tridemism§!\n\n§WThe foundational ideals of Dr. Sun Yat-sen, Tridemism, more formally known as the Three Principles of the People places an emphasis on the ideas of Nationalism, Governance, and Welfare. Though the practices and implementation can vary drastically depending on the leadership's interpretation of the late Sun Yat-sen's ideals, all strains of Tridemism seek to bring honor and glory to the Chinese nation, people, and society, and guide them towards a modern destiny.§!"
 jacobinism_subideology:0 "Jacobinism"
 jacobinism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Jacobinism\n\n\n\n\n\n§RJacobinism§!\n\n§WJacobinism refers to the radical political ideology of the French Revolution's Jacobin Club, characterized by extreme egalitarianism, fervent republicanism, and centralized, authoritarian state power to enforce social change.§!"
 anarchy_subideology:0 "Anarchy"
 anarchy_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Anarchy\n\n\n\n\n\n§RAnarchy§!\n\n§WA territory without authority, a society without rules, Anarchy exists in a political vacuum, a hole waiting to be filled by someone, regardless of who they might be.§!"
 communism:0 "Communism"
 communism_desc:0 "Communist Regime"
 communism_drift:0 "Communism Drift"
 communism_noun:0 "Communism"
 communism_subideology:0 "Communism"
 marxism_leninism_subideology:0 "Marxism-Leninism"
 marxism_leninism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Marxism_Leninism\n\n\n\n\n\n§RMarxism-Leninism§!\n\n§WMarxism-Leninism is a communist ideology derived from Marxism and developed by Vladimir Lenin. It advocates for a vanguard party to lead a proletariat revolution, establish a dictatorship of the proletariat, and guide society from capitalism to a socialist state and ultimately a communist society.§!"
 stalinism_subideology:0 "Stalinism"
 stalinism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Stalinism\n\n\n\n\n\n§RStalinism§!\n\n§WStalinism refers to the political, social, and economic system developed by Joseph Stalin, characterized by extreme state control, aggressive industrialization through Five-Year Plans, forced collectivization of agriculture, intense political repression (including purges and terror), and the suppression of dissent.§!"
 maoism_subideology:0 "Maoism"
 maoism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Maoism\n\n\n\n\n\n§RMaoism§!\n\n§W\n\n\n\n£GFX_Ideology_Maoism\n\n\n\n\n\n§RMaoism§!\n\n§WBased on the communist doctrines of Mao Zedong, Maoism holds onto the permanent revolution as a central idea, stressing the importance of the peasantry, small-scale industry, and agricultural collectivization.§!"
 marxism_leninism_maoism_subideology:0 "Marxism-Leninism-Maoism"
 marxism_leninism_maoism_subideology_desc:0 "\n\n\n\n£GFX_Ideology_Marxism_Leninism_Maoism\n\n\n\n\n\n§RMarxism-Leninism-Maoism§!\n\n§WMarxism-Leninism-Maoism is the combination of the philosophies and teachings of the three figures of Communism, with Maoism uphead as the higher stage of Marxism. Marxism-Leninism-Maoism applies Mao's theories to all aspects of governance and social order, including the concept of the protracted people's war, the Mass Line (The concept of gathering ideas from people and refining them into a big tent revolutionary ideology for the people to act upon), and the concept of New Democracy, a system which, in theory, establishes a democratic system lead by the proletariat.§!"