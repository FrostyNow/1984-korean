 SOV_Second_October_decision_category:0 "Second October"
 SOV_Second_October_decision_category_desc:0 "The Union of Eurasian Socialist Republics, under the path of so called 'Neo-Bolshevism', has strayed far from the ideological foundations set forth by Marx and Lenin, dishonouring the great Soviet Union that came before it.\n\nWith the coup of the Leningrad and surrounding districts complete and Yazov taking charge as the true heir of the USSR, now comes the time to vanquish the Anti-Soviet force that has hijacked our country and restore the true spirt of Maxist-Leninism to the nation.\n\nOur enenmies, however, are fierce and driven, and will not rest in their effort to restore the false revolution to power. But let us not forget, we are the sons and daughters of those who drove the fascist menace into hell and repelled the Bourgeoisie from Europe. It was we, the Soviets, that had spread Communism far and wide.\n\n§RAnd we shall do so again.§"
