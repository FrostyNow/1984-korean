 SOV_Divided_Party_idea:0 "Divided Party"
 SOV_Party_Of_Lenin_idea:0 "Party of Lenin"
 SOV_Party_Of_Soviet_Stratocrats_idea:0 "Party of Soviet Stratocrats"
 SOV_Disfunctional_Economy_idea:0 "Disfunctional Economy"
 SOV_Military_Industrial_Plan_idea:0 "Military-Industrial Plan"
 SOV_The_New_Economic_Plan_idea:0 "The New Economic Plan"
 SOV_The_New_Soviet_Dream_idea:0 "The New Soviet Dream"
 SOV_Cult_Of_Yazov_idea:0 "Cult of Yazov"
 SOV_The_Second_October:0 "The Second October"
 SOV_The_Second_October_desc:0 "After decades of deviation from the vision of the true Lenin that lived long ago, the Second October has come to restore the revolution and wipe away the false state of Eurasia. Though the Second Red Army holds only Northern Kuban and now battles to hold onto it's territory, the spark of revolution that has ignited everywhere else in Eurasia has been lit here in Russia.\n\nThe battle ahead will be long and difficult, but with Marshal Yazov as our guide, who could possibly oppose us and win?"
 SOV_Spirit_Of_The_Army:0 "Spirit of the Army"
 SOV_Spirit_Of_The_Army_desc:0 "The army is a disorganised mess, to be blunt. ideologically divided and lacking clear military operational direction, the army needs a military vision to rally behind in order to unite and become a true fighting force."
 SOV_The_Zhukov_Doctrine:0 "Zhukov Doctrine"
 SOV_The_Zhukov_Doctrine_desc:0 "There was a reason Georgy Zhukov is regarded as the Marshal of Victory, having been the man who lead the bulk of the Red Army against the Germans in World War 2, driving them out of Stalingrad, all the way back to the black heart of Berlin.\n\nIt was through overwhelming might and force, seeking to utterly destroy the enemy, that Zhukov was able to secure victory for the Soviet Union against the Germans. There is much that could be learned from Marshal Zhukov and his wartime prowess."
 SOV_Operation_Soviet_Storm:0 "OPERATION: SOVIET STORM"
 SOV_Operation_Soviet_Storm_desc:0 "Part of the reason Marshal Zhukov was able to triumph over Germany long ago was due to the vast amounts of tanks and armour at his disposal, which allowed him to overwhelm the enemy. Whilst we may not be able to muster the tank force Zhukov had at his disposal any time soon, we can scrape together enough decomission tanks and retrofit them for service in order to create new divisions that can give the Red Army the advantage it needs to combat the enemy."
 SOV_The_Yazov_Doctrine:0 "The Yazov Doctrine"
 SOV_The_Yazov_Doctrine_desc:0 "The Eurasianist Doctrine, and to an extent the Soviet Doctrine, emphasis a constant state of aggression, with plans being to sweep in quickly and overwhelm any enemy before they can retaliate. But considering our circumstances, perhaps a more reserved approach favouring a system of defensive readiness and attrition warfare would be more suited for this conflict. We do not have as many resources as we'd like to have and we need to adjust our strategy and warplans to reflect that fact.\n\nWe win by playing it smart, not fast."
 SOV_Defense_Is_The_Best_Offense:0 "Defense is the Best Offense"
 SOV_Defense_Is_The_Best_Offense_desc:0 "Playing defensive means being prepared. We can't presume the war is always going to go in our favour. We may be able to deal with Kuban but there are other players in the region that will not simply wait for us to be ready. Thus, in the interest of ensuring we are as prepared as we can be, we should fortify the cities of the northern Kuban region."
 SOV_Spirit_Of_The_Party:0 "Spirit of the Party"
 SOV_Spirit_Of_The_Party_desc:0 "The Communist Party is divided.\n\nBroken up by factions owing alligences to various political figures, from Trotsky, Bukharain, Stalin and many, many others, the Party needs to be forcibly united and rallied by a central figure and idea in order to stop the factionalism from tearing the Soviet movement apart."
 SOV_Legacy_Of_Leninism:0 "Legacy of Leninism"
 SOV_Legacy_Of_Leninism_desc:0 "The Soviet Union was built upon the foundations set out for us by Vladimir Lenin and we will not betray the revolution by going against those ideals. Forget all these other revisionists and deviants attempting to derail the revolution. Lenin's shall be our guide in our quest to rebuild the great Soviet Union!"
 SOV_True_Marxist_Bureaucracy:0 "True Marxist Bureaucracy"
 SOV_True_Marxist_Bureaucracy_desc:0 "With the issue of factionalism forced to be set aside by Marshal Yazov, the goal of rebuilding the USSR to its former glory can at last be focused on. No more petty squabbles, no more open arguments. The Party will focus on the building of new Russia and nothing else.\n\nShould any grievances arise, the Party Members should sort it out themselves, least Marshal Yazov be forced to intervene..."
 SOV_Revitalised_Soviet_Research_Sector:0 "Revitalised Soviet Research Sector"
 SOV_Revitalised_Soviet_Research_Sector_desc:0 "For a long time, the research sector of Eurasia had been stagnant and without a guide, more focused on mass producing ineffective machinery in order to continue the system of war and stagnation that had dominanted the Eurasian Union State.\n\nHowever, with the Soviet Union back on the rise with a new vision guiding it, all the research sector requires now is the resources and backing of the Party to fuel the efforts of the scientists to create the Russia of tomorrow."
 SOV_Red_Napoleonism:0 "Red Napoleonism"
 SOV_Red_Napoleonism_desc:0 "We cannot risk the Soviet Union falling to a bureaucrat paper pusher that will lead it astray. The Red Army has always served as the valiant defenders of Communism and the Soviet People, and are more invested in it's preservation. Thus, it is essential that the Red Army be given greater say in the political structure of the resurgent USSR to best ensure the likes of Beria don't rise to power again."
 SOV_The_Will_Of_The_Red_Army:0 "The Will of the Red Army"
 SOV_The_Will_Of_The_Red_Army_desc:0 "The Red Army is the one battling against the Eurasianists, revisionists, and traitors. It is the Red Army that is retaking the lost republics and restoring the Union to glory. If the will of the Red Army cannot be expressed in the political structure of the Party, then the Red Army will fight no more.\n\nThe Red Army is the army of the people! Of Yazov! Of the Soviet Union!\n\nNot the Party bureaucrats."
 SOV_Spirit_Of_The_People:0 "Spirit of the People"
 SOV_Spirit_Of_The_People_desc:0 "Without the people, the Soviet Union has no soul. The economy, as it stands, is in tatters, and if it is not resolved swiftly, the Russian people may turn against us and rise up from within to support another movement. We cannot allow this to happen, the revolution must survive at all costs."
 SOV_Revised_Heavy_Industrialism:0 "Revised Heavy Industrialism"
 SOV_Revised_Heavy_Industrialism_desc:0 "Victory in this war requires the production and industry to ensure it. The Stalinist era, though a source of death and a path to what would become Eurasia, did well in the development of industry. It wouldn't hurt to refine these methods in order to bolster our economic state and provide us with the tools of warfare we need to win."
 SOV_Military_Industrial_Expansion_Plan:0 "Military-Industrial Expansion Plan"
 SOV_Military_Industrial_Expansion_Plan_desc:0 "The military needs to harness all available resources in order to defeat the enemy and reunite all lands of the Soviet Union, as fast as possible. We need to focus on the development of factories for our miltary to ensure they have all the tools at their disposal to be victorious in this conflict."
 SOV_Revisiting_Bukharianism:0 "Revisiting Bukharianism"
 SOV_Revisiting_Bukharianism_desc:0 "With the revolution underway to bring about a new Soviet Union, free of the mistakes of Stalin and Beria, perhaps it wouldn't hurt to look into the policies and proposals of the pre-Soviet era. In particular, the views of Nikolai Bukharain, the leader of the old Soviet Right, had some views and ideas that could be of benefit to the new Soviet Union."
 SOV_Implement_The_New_Economic_Plan:0 "Implement the New Economic Plan"
 SOV_Implement_The_New_Economic_Plan_desc:0 "The New Economic Plan, a mixture of limited localised capitalism and socialism, could be the best alternative for the people of the Soviet Union in the long term. Giving people some level of control over their assets can encourage our people to be more productive whilst also allowing for the state to continue industrial projects that are needed.\n\nThe Party can focus on certain industries whilst the people maintain their own needs in their own sectors, from agriculture to small business enterprise."
 SOV_The_New_Soviet_Dream:0 "The New Soviet Dream"
 SOV_The_New_Soviet_Dream_desc:0 "A new destiny has been charted for the peoples of the Soviet Union. No longer shall we be fixated upon the ideas of Eurasianist, Neo-Bolshevik ideals pioneered by the likes of Beria.\n\nNo, our focus shall be upon the vision of Lenin and the Communist Dream envisioned by the Soviets of the revolutionary times before Stalin and later Beria took command and took our nation onto a different path, alien from the Soviet Dream."
 SOV_The_Cult_Of_Yazov:0 "The Cult of Yazov"
 SOV_The_Cult_Of_Yazov_desc:0 "Had it not been for Marshal Yazov, our commander and guide, hope for the Soviet Union itself, the Soviet Union would have been lost, forever tainted by the stain of Eurasianism crafted by Beria. But with the Marshal at the held, the true spirit of Communism has returned, here to fight and defend the true revolution envisioned by the great Vladimir Lenin.\n\n§RTo the Marshal of Redemption! Urah!§!"
 SOV.1.t:0 "Second Red Army - 1984"
 SOV.1.desc:0 "Yazov paced through his office, located in Leningrad. Oleg Baklanov, who sat on one of the office chairs, spoke up with a calm, concise voice.\n\n\"The coup was a sucess\"  Oleg began smoothly.\n\n\"The administrators who have not sworn alligence have either fled or have been arrested. The army has pledged its alligence to you, Marshal Yazov.\"\n\nYazov continued to pace, seemingly in thought as he listened to Baklanov's words.\n\n\"Good... good\" he replied evenly.\n\n\"But the loyalty of the troops is shaky. Their faith in the Eurasian system was broken by Afghanistan and the internal reforms, but they are loyal to you because you offer an alternative. But Marshal, this isn't just a war of words, but of arms and blood. If you are to succeed, you need victories against our enemies\" Oleg advised standing up.\n\nYazov stopped, still for a brief few moments before nodding.\n\n\"Then victory is what I will give them. Kuban is still in disarray, as is the rest of Eurasia. We've waited long enough...\" Yazov spoke, turning to look Oleg square in the eye."
 SOV.1.a:0 "\"It's time to strike at our enemies.\""
 SOV.2.t:0 "The Hounds of War"
 SOV.2.desc:0 "\"The army is a mess\" Akhromeyev stated bluntly as he and Yazov moved through the Leningrad Command Center.\n\n\"Tell me something I don't know, General\" Yazov replied with a sigh, glancing over at one of the office doors where the sound of officers arguing could be heard, a common occurance as of late.\n\n\"Well, sir, the army needs direction. The Eurasianist doctrine won't work when we are in opposition to Eurasia.\"\n\n\"You wouldn't bring this up if you didn't have a suggestion, General\" Yazov stated bluntly, shifting his gaze to look at Akhromeyev as they walked through a set of doors out onto a balcony that looked over the courtyard.\n\n\"The past, Marshal Yazov. Zhukov during his day was the heart of the Red Army, it was his tactics that brought the original Red Army to glory during the days against the Nazi horde. We need to focus our military doctrine on that\" Akhromeyev explained plainly.\n\nYazov nodded slowly, taking in his words as he leaned on the railing, mulling it over in his head. Zhukov was one of the greats, there was no denying that. His name held great name, even long after his death. However, Zhukov ruled the battlefield by overwhelming his enemies with immense force and crushing them outright. It was effective when the Soviet Union controlled the territory it did back then, but now? That may not be the best strategy, given their limitations. Dmitry sighed, rubbing the bridge of his nose as he debated internally on whether to go through with Akhromeyev's suggestion or simply taking command of the entire military situation himself. Looking to his Defense minister, Yazov made a decision..."
 SOV.2.a:0 "\"Zhukov's Legacy will guide the Red Army forward\""
 SOV.2.b:0 "\"The Red Army needs new direction\""
 SOV.3.t:0 "Reforging Sovietism"
 SOV.3.desc:0 "\"What's the status of the Party?\" Yazov asked Valentin tentatively, his hands resting on the desk as he looked the man in the eye.\n\n\"Chaos, as per usual. Party is a mess, is basically a free for all of ideologies. Leninists, Neo-Stalinists, Beriaites, Bukharinists and Trotskites. Who knows what else\" Valentin explained with a look of frustration on his face.\n\n\"It's a miracle we haven't fallen apart from within already. I'm good, but I can only play the part of miracle worker for so long, Yazov\" Valentin explained, leaning back in his chair and adjusting his glasses.\n\nYazov sighed.\n\n\"Seems like I have to force them together. Remind them of Lenin's cause\" Yazov stated, adjusting the cuffs of his jacket.\n\n\"Leninism... that's a loaded term these days, Yazov. You know, last time we let bureaucrats have an absolute say, we ended up with Beria. We can't just unite the Party, Yazov, we need a shake up. One that includes the Red Army\" Valentin explained, meeting Yazov's gaze.\n\nThe Marshal was quiet as he looked at his right hand man. He had a point. Beria did emerge through the old Soviet bureaucracy through the NKvD. reigning terror and laying the foundations for Eurasia. Maybe if the Army had a say, the chances of another fat, creepy bureaucrat taking command would decrease significantly. But it was not a simple decision. There would those who would would possibly be discontent with the idea of greater army influence, which could bubble up into an issue in the long term if left unchecked.\n\nDecisions, decisions..."
 SOV.3.a:0 "\"We cannot stray from the path of Leninism\""
 SOV.3.b:0 "\"You're right. We cannot allow another Beria. The Army must have a say\""
 SOV.4.t:0 "Tools of Prosperity"
 SOV.4.desc:0 "Oleg entered Yazov's office, the Marshal quietly signing through some documentation related to the war effort when he glanced up, noticing Oleg's entry into his office, carrying a set of documents.\n\n\"I did as you asked, Grand Marshal. I've got two proposal's for economic reorganization\" Oleg explained as he set down two sets of documentation before pointing at the set of documents on the left.\n\n\"This is a revised model of our current industrial focused economy, taking from the old Stalinist model and making it less crude and more effective. Considering our current war circumstances, this policy would be best suited for keeping our forces as equipped as possible.\"\n\nYazov hummed, his fingers drumming along his desk for a while before glancing to the documents on the right.\n\n\"What about those?\" he asked curiously.\n\n\"Ah, those. Well, this was something I stumbled upon during my research of pre-Stalinist economic policy. The New Economic Plan. It was championed by the old Soviet-Right, essentially a mix of socialist principles with a limited form of capitalism, allowing smaller enterprises abnd farms to have greater control over their financial assets, allowing the economy to develop more organically, with less state interference.\"\n\nYazov was intrigued, to say the least. Sure, the industrial system would be good for the military and allow for the Red Army to have more wiggle room production wise... but the New Economic Plan sounded interesting, especially as a long term plan. The war was as much about winning the people's hearts and minds as it was battles. But it also presented plenty of risks, especially to the wider principles of Socialism.\n\nThat left Yazov with a simple question: Should the Soviets stick to their guns or should the NEP be given more serious consideration?"
 SOV.4.a:0 "\"We can just adjust the current system\""
 SOV.4.b:0 "\"The NEP... it sounds interesting. Care to elaborate further?\""
 SOV.5.t:0 "New Dawn of the Soviets"
 SOV.5.desc:0 "Pyotr walked through the park with his grandson, Artyom. Red flags waved on the flag poles and the park itself was much more cleaner and lively than it had during the Eurasian days. Other people roamed around the park comfortably, less on edge than they had used to be, less depressed and more motivated with a sense of collective vision that had been spread by the Communist Party, promoting a vision of renewal, of Soviet rebirth.\n\n\"Papa? Could we go to the playground? I want to go on the swing\" Little Artyom asked, looking up at his grandfather with his big, blue eyes, a far cry from the indoctrinated boy the Neo-Bolsheviks had made him long ago.\n\nPyotr smiled warmly, ruffling up his grandson's hair before guiding the boy over to the playground.\n\n\"Of course, little Artyom. But just for a little while, okay? Don't want your mother to be cranky with me for having you out for too long, yeah?\" He spoke lightly.\n\nArtyom smiled widely, bouncing on his feet a little.\n\n\"Okay, Papa\" he spoke before bolting off toward the swing set with childish eagerness.\n\nPyotr chuckled softly, shaking his head a little in amusement before walking over to help his grandson swing on the swingset."
 SOV.5.a:0 "Toward a New World"
 SOV.6.t:0 "Saviour of the Union"
 SOV.6.desc:0 "\"Vadim! Did you hear? Comrade Yazov is inspecting the troops today\" Ivan spoke enthusastically, slapping his hand onto his friend's shoulder as he walked with him.\n\n\"Marshal Yazov? Here? At the base?\" Vadim asked curiously, his eyes widening a little as he looked back at his friend.\n\n\"Yep. The commander wants us all on best behaviour. Don't want to look foolish in front of the leader of Soviet Russia, eh?\" Ivan replied lightly, a grin on his face as he adjusted the sling of his rifle.\n\n\"Agreed. It'd be odd seeing him in person, you know. I already see his face all over the walls, plastered onto every army poster\" Vadim replied, gesturing over to the nearby poster for emphasis.\n\n\"True. But he's the face of the movement. He's going to have his face plastered all over the place. It's not like its a fake leader like the 'Eternal Father'\" Ivan replied humourously, making quotation marks with his fingers, earning a small laugh from Vadim."
 SOV.6.a:0 "\"No, I suppose it could be worse. At least Yazov is real and alive.\""
 SOV.7.t:0 "Eyes to the West"
 SOV.7.desc:0 "As troops marched through the Red Square in celebration of the recent reformation of the Union of Soviet Socialist Republics, Grand Marshal Yazov watched on with interest and pride at his Red Army. It wasn't long ago that Yazov had been assigned to the position of garrison commander of Northern Kuban, an effort to get him out of the Eurasian picture, yet here he stood as the sole leader of the reborn Soviet Union with a great army at his disposal.\n\nAs the parade continued, Dmitry found his eyes slowly drifting off in the western direction, where rest of Europe existed.\n\nEurope was no longer the uniform place it had been under the reign of Eurasia. Division, struggle and remnants dominated the continent, not too different from how it been in the pre-Eurasian era for the most part.\n\nEurope, frankly, was chaos... a continent that required order... order that only Yazov could bring.\n\nYazov inhaled before exhaling slowly, his expression shifting just a little as he watched the army march on. He squared his shoulders, tilting his head up just a little. The reunification of the Union of Soviet Socialist Republics wasn't the end of the journey for Yazov. No. No, the journey was just the beginning."
 SOV.7.a:0 "The Red Behemoth awakens"