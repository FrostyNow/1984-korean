l_korean:
 SOV_country_selection_tt:0 "§YHOW TO PLAY THE SECOND RED ARMY\n-----------------------------------------§!\nPlay as the §RUnion of Eurasian Socialist Republics§!, play through content until the province breakdown prior to the revolts occurs. When this occurs, open the decision menu and scroll down to the §Y'Legacy of Nations'§! decision menu and click the decision to switch to the §YKuban Military District§!\n\nWait until the event to switch to the §RSecond Red Army§! pops up."
 1984_Opening_Screen_SOV_Title_TT:0 "§RSECOND RED ARMY§!"
 1984_Opening_Screen_SOV_Desc_TT:0 "The §tSoviet Dream§!, once a vision of prosperity for the Soviets, a chance to create a stronger society built upon Communist ideals, has been hijacked and torn apart by §REurasia§!. Beria's deceit and cunning had taken what should have been the birth of the communist age into something far darker, one that nobody had originally intended to exist.\n\n§GMarshal Dmitry Yazov§!, one of the great Marshals that has not been bewitched by §RNeo-Bolshevism§!, has long perpared and waited for the day to depose the Neo-Bolshevik hydra. And with chaos engulfing Eurasia as a result of its own hubris, the time has emerged for a Soviet rebirth. Though Kuban is but a fraction of the territory of old Russia, it is more than enough for Marshal Yazov to begin the work of relcaiming the old Soviet Union.\n\nOne by one, through fire and blood as it was in the old days, the §RUnion of Soviet Socialists Republics§! will break free from the perversion that has ensnared it and a new Union shall rise, one that shall not fall for the poison of Beria's Union but shall look beyond that toward a new vision, a new destiny for Communism under the carefull guidance of Marshal Yazov."
 1984_Opening_Screen_SOV_Gameplay_Paths_Desc_TT:0 "§YSoviet Paths§!\n- Sweep away all Eurasian and separatist forces and reform the §RUnion of Soviet Socialist Republics.§!"
 1984_Opening_Screen_SOV_Button_TT:0 "From the ashes, a Phoenix"
