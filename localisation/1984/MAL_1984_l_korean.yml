l_korean:
 AHMAD_SHAH_DESC:0 "§WBeing the constitutional monarch of Malaysia, King Ahmad Shah had a quiet life. Being the only son of the Sultan of Pahang, he studied abroad before fleeing back to Malaya after the disastrous revolutions that killed the British Empire. \n\nHe inherited his father in 1979 after his death, his rule has been marked with Matahir Mohamad's policies for making Malaysia grow despite the situation that the world is in. Time is ticking however, as the next monarch is set to rule in a couple of months which will lead to Ahmad Shah to step down.§!"
 ISKANDAR_DESC:0 "§WIskandar ibni Almarhum Sultan Ismail[ of Johor was born in Johor on April 8 1932. He studied quietly in school, later moving to a British school then going abroad for studies. During the Third World War, Sultan Iskandar among many others had begun to realize that the Allies would lose against the Soviets. Which prompted him to flee back to Johor.\n\nWhen he returned he briefly worked in the Johor Civil Service before his appointment as Tunku Mahkota of Johor. In 1981, following the death of his father. He was apponted as Regent of Johor, later being sworn in a day before his father's burial. In turn, causing his younger brother to be demoted. He later became chancellor of a university in Malaysia before under the council of rulers, he was elected as King of Malaysia. It's expected that he will act more in Malaysian politics unlike the previous king, which could either bring in more popularity or controversy to himself, and the role of king in Malaysia.§!"
