 MAL_Black_Gold:0 "Oil Economics"
 MAL_Black_Gold_desc:0 "\n\n\n\n£GFX_MAL_Black_Gold_Banner\n\n\n\n\n\n\n§WOil has been a strong industry in Malaysia ever since the 1910s, but it wasn’t expanded upon until the 1950s as WW3 raged on in Europe. When the world fell to totalitarianism in the 1950s and 1960s, Malaysia consolidated their oil industry into one company. Later fully organizing it into Petronas in the 1970s. \n\nMalaysia has essentially been the dominant power when coming to fuel in Southeast Asia, with Malaysia as the heart, where oil pumps and flows across the whole organization. This has obviously given them a major advantage, however many have begun to worry on the overreliance of oil and diversification attempts have begun, meanwhile countries such as Vietnam have tried to kickstart their own oil industry in the South China Sea. For now however, Malaysia has been dominant, and will continue to do so until it either falls or the world frees itself once more from the shackles of the Totalitarian states.§!"
 MAL_Racial_Tensions:0 "Racial Tensions"
 MAL_Racial_Tensions_desc:0 "\n\n\n\n£GFX_MAL_Racial_Tensions_Banner\n\n\n\n\n\n\n§WEver since Malaya’s independence and later on the unification of Malaysia, the country has experienced major racial tensions especially during its early period of independence. It was this reason that caused Singapore to be kicked out of Malaysia, and it continues to be the issue well into the decade. \n\nFollowing major protests in the 1960s, this racial discrimination became more prevalent with the passing of the New Economic Policy, which favored the ethnic Malay population more than the Chinese or Indian populations, causing both racial tensions and brain drains to other countries such as Singapore. \n\nThis has also encouraged many others to join the Malaysian Communist Insurgents in the mountains, further strengthening their numbers in the conflict, which has been going on since the 1950s.§!"
 MAL_Inheritors_of_the_Royal_Navy:0 "Inheritor of the Royal Navy"
 MAL_Inheritors_of_the_Royal_Navy_desc:0 "\n\n\n\n£GFX_MAL_Inheritors_of_the_Royal_Navy_Banner\n\n\n\n\n\n\n§WWhen Britain fell along with the rest of the nations that had united following the disastrous conflict in Europe, the Royal Navy fled. First to America, then when the Latin American War broke out, to India. When India collapsed, they fled to the last bastion of what they’d hope would accept them, Malaysia. \n\nMalaysia gladly did, fully integrating most sailors and acquiring multiple cruisers, destroyers, and even submarines. This greatly helped the defense of Southeast Asia, most especially in the Battle of the Straits, which saw Oceania’s Pacific Navy humiliated from an unexpected defense by a combined force of Southeast Asian ships and aircraft. To this day the Royal Navy continues to function under the flag of Malaysia, keeping the internal waters of Southeast Asia safe from attacks.§!"
