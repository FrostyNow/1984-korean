 DCU_Caucasus_Desc_tt:0 "A mountainous region of Eurasia, the land bridge that links Eastern Europe to the Middle East, the Caucasus Region remains essential to continued Eurasian dominance in Central Asia and Anatolia. Rich in mineral resources and oil deposits, the Caucasus region is as rich as it is strategic as a great mountain fortress region."
