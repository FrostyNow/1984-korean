 RSE_The_Eastern_Migration:0 "The Eastern Migration"
 RSE_The_Eastern_Migration_desc:0 "\n\n\n\n£GFX_RSE_The_Eastern_Migration_Banner\n\n\n\n\n\n\n§WFollowing the joint invasion of Somalia alongside Ethiopia to repel Communist forces, our people from the overcrowded territories of Sagello and Djibouti, primarily the Cossacks, have began migrating eastward in search of land and open spaces.\n\nThough the influx of people from west to east has caused some amount of strain on the economy, the Russification of the eastern provinces will ensure long term control over these lands in the name of the Tsar.§!"
