 RSE_Imperial_Reclamation_decision_category:0 "Imperial Reclamation of Russia"
 RSE_Imperial_Reclamation_decision_category_desc:0 "After so many years of exile away from our sacred homeland, the vast spleandor of our Empire is in reach. Though our reclamation begins with Crimea, it shall not cease here. Great Russia stands ready for the return of the Tsar, their spirit suppressed by the suffocation of Eurasia and the Bolsheviks who have tainted the Russian spirit.\n\nBut we shall not run from our old foe, we shall face the enemy head on. We have learned from 1917, grown from it. Whilst the Bolsheviks relished in their victory and plotting in the holy city of Moscow and enacted their dark plans for Russia and the rest of Europe, we were were preparing. Plotting. Waiting for the day of our return to end the Second Time of Troubles that has befallen the Russian Homeland and restore the Tsar to his rightful place on the throne of Russia.\n\nThe time has come, and God willing, all Russia shall once again know peace."
