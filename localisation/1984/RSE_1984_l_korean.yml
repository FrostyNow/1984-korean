 RSE_An_Empire_In_Exile:0 "An Empire in Exile"
 RSE_An_Empire_In_Exile_desc:0 "\n\n\n\n£GFX_RSE_An_Empire_In_Exile_Banner\n\n\n\n\n\n\n§WWe are an Empire without a homeland, stranded far from the vast plains of Russia, our home. Distant are we from the Empire that once stretched from the Baltic to the Barents, now we linger in a continent far from the home, alien to our people. Yet, here we linger, trying to ensure the survivla of what remains of the Tsardom, in the hopes that one day, we may be able to return to the home we lost so long ago.§!"
 RSE_Native_Resistance:0 "Native Resistance"
 RSE_Native_Resistance_desc:0 "\n\n\n\n£GFX_RSE_Native_Resistance_Banner\n\n\n\n\n\n\n§WThe natives of the Horn of Africa have not taken kindly to the Imperial presence here in Africa. We are of different faith, different nation, different histories. And so, they resist, wishing expel us from the territory of Africa, and bring an end to the last remnants of old Russia and her fading legacy.§!"
