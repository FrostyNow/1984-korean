l_korean:
 GFX_East_African_Pact_decision_category:0 "East African Pact"
 ETH_Invite_South_Sudan_To_The_East_African_Pact_decision:0 "Invite South Sudan to the East African Pact"
 ETH_Invite_Tanzania_To_The_East_African_Pact_decision:0 "Invite Tanzania to the East African Pact"
 ETH_Stronghold_Of_East_Africa:0 "Stronghold of East Africa"
 ETH_Stronghold_Of_East_Africa_desc:0 "\n\n\n\n£GFX_ETH_Last_Bastion_Of_Africa_Banner\n\n\n\n\n\n\n§WFor a long time since the fall of the old order, the Ethiopian Empire has served as the regional power of East Africa, a position that was cemented with the destruction of the Somalian Communist Forces in the 1970s, seeing their armies south to Jubaland, no doubt plotting their revenge.\n\nBut our position isn't as all encompassing as we'd like. There are powers, from the European remnants in West Africa to the growing presence of OPFOR further North, not to mention the tolerance of our estranged Orthodox Tsarist neighbour calling into question our commitment to freedom and security for all East Africans.\n\nEast Africa has become a House of Cards in many ways, a House of Cards that could easily blow up in our faces if we are not careful.§!"
 ETH_Somali_Separatism:0 "Somali Separatism"
 ETH_Somali_Separatism_desc:0 "\n\n\n\n£GFX_ETH_Somali_Separatism_Banner\n\n\n\n\n\n\n§WThe Somali people are quite distinct from the people of Ethiopia. Living on the coast of Africa and following the Islamic faith, as opposed to the Orthodox Christians of the heartland, many Somalian's wish to be free of Ethiopian rule and to establish their own state.\n\nThe separatism has thankfully, not become a violent movement, but the sentiments have hindered our popularity in the region§!"
 ETH_Growing_Reformist_Movement:0 "Growing Reformist Movement"
 ETH_Growing_Reformist_Movement_desc:0 "\n\n\n\n£GFX_ETH_Growing_Reformist_Movement_Banner\n\n\n\n\n\n\n§WIn the face of invasion from the super states of Oceania and Eurasia, Ethiopia was forced to make some tough and unpopular decisions to assure its survival. With the Monarchy and the military given immense power, the independence and security of Ethiopia has been secured, with the people living in safety from the Totalist hordes for many decades now.\n\nBut as the years past, there are those who yearn for a return to some form of civilian government in some capacity. Though the sentiment isn't wide spread, the fear of the enemy keeping the people supportive of the government, it will be an issue that will have to be addressed at some point in the future.§!"