 NOV_reintegrate_ukraine_decision_category:0 "Reintegrate Ukraine"
 NOV_reintegrate_ukraine_decision_category_desc:0 "Our native lands, which were defined by the USSR, are gradually returning to our hands. But these lands are inhabited by people who have forgotten their origins and, after Eurasian and nationalist oppression, are hostile to any other rule. By organizing methods that have already been tested in the South, we will be able to awaken national consciousness in these regions and peacefully unite them with us."
