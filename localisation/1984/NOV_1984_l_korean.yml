l_korean:
 NOV_country_selection_tt:0 "§YHOW TO PLAY THE PROLETARIAN ARMY OF DONBAS\n-----------------------------------------§!\nPlay as the §REurasian Union State§!, play through content until the province breakdown prior to the revolts occurs (before clicking the §Y'Eurasian Dusk'§! event button, pause the game or set the game speed to minimum if you don't want to miss any prewar event). When this occurs, open the decision menu and scroll down to the §Y'Legacy of Nations'§! decision menu and click the decision to switch to the §YBlack Sea Military District§!\n\nWait until the event to switch to the §RProletarian Army of Donbas§! pops up."
 1984_Opening_Screen_NOV_Title_TT:0 "§2PROLETARIAN A§!§RRMY OF DONBAS§!"
 1984_Opening_Screen_NOV_Desc_TT:0 "§YIt is not worth upsetting the proletariat§! - a rule that everyone should have remembered by now. §RBut Eurasia did not remember§!.\n\nDonbas, the coal and metal feeder of all Eastern Europe, was practically dying under the rule of the neobolsheviks. They did not need people, only resources.\n\nSo, Comrade Beria, if you didn't want to supply the Donetsk mines, then don't ask where the APCs in the Donetsk mines came from."
 1984_Opening_Screen_NOV_Gameplay_Paths_Desc_TT:0 "§YDonbas Paths§!\n- Crush the §RNeobolshevism§! and restore §2Ukrai§!§Rnian§! control over South oblasts.\n- Destroy §wTsarists§!.\n- Restore the §2Ukrai§!§Rnian§! or §RSoviet§! people and reclaim the rest of §2Ukra§!§Rine§!."
 1984_Opening_Screen_NOV_Button_TT:0 "Glory to proles!"
