 NOV_Captains_Argue_Ship_Stands_Still_desc:0 "[GetCaptainsArgueDesc]"
 NOV_Captains_Argue_Ship_Stands_Still_Change:0 "Modify §Y$NOV_Captains_Argue_Ship_Stands_Still$§! by:"
 NOV_Captains_Argue_Ryzhkov:0 "Captain Ryzhkov and Ship of Soviets"
 NOV_Captains_Argue_Ryzhkov_desc:0 "\n\n\n\n£GFX_NOV_Captains_Argue_Ship_Stands_Still_Banner\n\n\n\n\n\n\n§WAfter arguments, the disobedient captain was successfully thrown overboard, in accordance with old Stalinist tradition, which quickly made it clear to the crew that they either had to help steer the ship to a Soviet harbor or follow their rebel.§!"
 NOV_Captains_Argue_Shelest:0 "Captain Shelest and Ship of Ukrainian Communism"
 NOV_Captains_Argue_Shelest_desc:0 "\n\n\n\n£GFX_NOV_Captains_Argue_Ship_Stands_Still_Banner\n\n\n\n\n\n\n§WAfter arguments, the disobedient captain was removed from the captain's cabin to scrub the deck, in accordance with old Soviet tradition, allowing the ship to sail peacefully toward a new Ukrainian communism.§!"
 NOV_Captains_Argue_Default:0 "Captains Argue - the Ship Stands Still"
 NOV_Captains_Argue_Default_desc:0 "\n\n\n\n£GFX_NOV_Captains_Argue_Ship_Stands_Still_Banner\n\n\n\n\n\n\n§WTwo prominent figures in the Donetsk region, Nikolai Ryzhkov and Petro Shelest, took control of the Ship of Revolution, which causes most of the problems.\n\nRyzhkov sees Ukraine as nothing more than an industrial resource of the USSR, another cog in the Soviet machine, and if necessary, he will walk over mountains of corpses to put that cog back in place.\n\nShelest looks at Ukraine and cherishes the hope of its joyful communist future, which he entrusted to Capitalgrad, but they betrayed his ideal, and because of this he is ready to protect this land of farmers and agricultural workers.\n\nBoth captains pull the helm toward themselves, preventing the ship from sailing, and this will only end §Rwhen one of them is thrown overboard.§!§!"
 NOV_Captains_Argue_To_Ryzhkov:0 "Idea §Y$NOV_Captains_Argue_Default$§! will be known as §Y$NOV_Captains_Argue_Ryzhkov$§!"
 NOV_Captains_Argue_To_Shelest:0 "Idea §Y$NOV_Captains_Argue_Default$§! will be known as §Y$NOV_Captains_Argue_Shelest$§!"
 NOV_Red_Terror:0 "The Red Terror"
 NOV_Red_Terror_desc:0 "\n\n\n\n£GFX_NOV_Red_Terror_Banner\n\n\n\n\n\n\n§WOur methods of fighting the enemy cannot be called humane. Soviet methods of destroying the enemy through terror and scorched earth tactics cause unjustified losses among the civilian population and significant destruction. Our Red Army cannot advance along destroyed roads in cities where people are afraid of being killed in battle. We must either change our tactics or ensure that no one objects to them.§!"
 NOV_Red_Terror_Change:0 "Modify §Y$NOV_Red_Terror$§! by:"
 NOV_Uncertainty:0 "Uncertainty"
 NOV_Uncertainty_desc:0 "\n\n\n\n£GFX_NOV_Uncertainty_Banner\n\n\n\n\n\n\n§WNo one can say what our goal is. A group of lost peoples, who were forcibly destroyed, wander amid uncertainty about tomorrow and do not understand the purpose of this struggle. Their leader must lead them out of the desert of oblivion, show them who they really are, and give them a purpose for their existence.§!"
 NOV_Uncertainty_Change:0 "Modify §Y$NOV_Uncertainty$§! by:"
 NOV_Volunteer_Group:0 "Communistic Volunteer Group"
 NOV_Free_Trade_Idea:0 "Open Borders"
 NOV_Emergency_Response_Units:0 "Emergency Response Units"
 NOV_Industrial_Boom_Idea:0 "Industrial Boom"
 NOV_KTEP_Idea:0 "KTEP"
 NOV_Arise_Ukrainian_Proletariat:0 "Arise, Proletariat of Donbas!"
 NOV_Arise_Ukrainian_Proletariat_desc:0 "When the leaders of the false revolution found themselves cut off from their cliques, dozens of nations took up arms and threw off their yoke. The time has come for you, worker, miner, farmer, to take up arms to restore the righteous rule of the working people to these lands. So let your hand grab these traitors by the throat and throw them into the Black Sea, in the name of the future of Marxism-Leninism!"
 NOV_Ryzhkov_Supremacy:0 "Ryzhkov Supremacy"
 NOV_Ryzhkov_Supremacy_desc:0 "Our current Secretary General, Mykola Ryzhkov, has a grand goal - to return the territories that belonged to the Ukrainian SSR back to the USSR, and he is prepared to violate all moral principles to achieve it. Especially when someone is always around him, imposing those principles on him. Well, Lenin was right when he said that revolutions are not made with white gloves..."
 NOV_Supremacy_Effect:0 "The choice of secretary general will §Ydirectly influence§! our future policy: §RSoviet Puppet§! or §GIndependent Ukraine§!"
 NOV_Restore_Soviet_Man:0 "Restore the Soviet Man"
 NOV_Restore_Soviet_Man_desc:0 "It is impossible to build a state if the people do not recognize it. This territory is inhabited by a crushed people who have been subjected to attempts to re-educate them into \"model Eurasians\". And while all memories of the past have been erased from the minds of this people, and Eurasia has not yet managed to impose its own vision of the future on them, we need to take up the task of \"educating\" them."
 NOV_Suppress_Nationalism:0 "Suppress Nationalism"
 NOV_Suppress_Nationalism_desc:0 "And yet, the enemies of the revolution are alive! Nationalist groups, seeing the collapse of the Eurasian ideal, began to actively destabilize our efforts to establish their own forgotten states. They must be crushed before we drown in this anarchy."
 NOV_Everything_For_Army:0 "Everything for Army!"
 NOV_Everything_For_Army_desc:0 "The Red Army must have everything: every soldier must be clothed, fed, and armed, and his rifle must be constantly loaded to protect communism. And we must convert as much production as possible to military needs. Ordinary people will suffer from this in the short term, but for the sake of the revolution, our people will endure everything."
 NOV_Industrial_Restart:0 "Industrial Restart"
 NOV_Industrial_Restart_desc:0 "The adaptation of industry to our needs has almost reached its final stage. Captured enemy factories and specialists will resume weapons production so that our army can continuously bombard the enemy with ammunition."
 NOV_Only_Soviets:0 "There's Only Soviets"
 NOV_Only_Soviets_desc:0 "Ukrainians, Russians, Tatars... nationalists cling to dead ideas that we have already crushed in the past. There is no need to stand on ceremony with these separatist bastards. There are no Ukrainians or Tatars here. There are only Soviets, the people of Lenin's glorious state, which was unceremoniously taken away from us."
 NOV_Work_For_USSR:0 "Work for the New Soviet Union"
 NOV_Work_For_USSR_desc:0 "The blows of hammers echo off the walls of factories. The clanging of pickaxes fills the mines. Every worker in Donbas is now working to regain what has been lost. Even if the whole world is against this idea, these people will fight for the Soviet Union to exist. On the map, and in the hearts of its inhabitants."
 NOV_Shelest_Supremacy:0 "Shelest Supremacy"
 NOV_Shelest_Supremacy_desc:0 "Petro Shelest, the current deputy secretary general and concurrently minister of agriculture, is the complete antithesis of Ryzhkov. Although he was also loyal to the USSR, his trust in Moscow and the frienship of nations was betrayed long ago. He will not mourn the old Union, especially after what it has become. He will independently realize his dream of a happy communist Ukraine, even if he has to resort to \"old methods\" to eliminate dissenters."
 NOV_Restore_Ukrainian_Man:0 "Restore the Ukrainian Man"
 NOV_Restore_Ukrainian_Man_desc:0 "Eurasia trampled on European nations for decades. But no one had ever seen anything like this. How did this people, oppressed for centuries by all kinds of invaders, find the strength to rise up again and fight? Truly, they are indestructible, they are unburnable. But how many of these hard workers, who have known nothing but labor, remember their past? They must remember, otherwise our struggle is already lost."
 NOV_Ensure_Civil_Sector:0 "Ensure Civil Sector"
 NOV_Ensure_Civil_Sector_desc:0 "The civilian sector in Donbas is a priority for restoring normal life. People must have jobs, food, and housing, otherwise they will not be able to support our struggle. We must restore the civilian sector so that people see that we are fighting not only for ideas, but also for their well-being."
 NOV_Support_Farmers:0 "Support Farmers"
 NOV_Support_Farmers_desc:0 "Nothing is as important to our country as fields and gardens. It is a simple truth that if we feed farmers today, they will be able to feed us all tomorrow. Agriculture will have everything it needs to ensure that bread is on our tables on time and in sufficient quantities."
 NOV_Support_National_Identity:0 "Supporting National Identity"
 NOV_Support_National_Identity_desc:0 "It would be barbaric to ignore other nationalities living in the Black Sea region. Our lands are home to large numbers of Tatars, Romanians, Jews, and Gypsies, and ignoring their cultural needs will only lead to new waves of discontent. We must support their national identities so that they feel part of our common struggle."
 NOV_Friendship_Of_Nations:0 "Friendship of Nations"
 NOV_Friendship_Of_Nations_desc:0 "During the Soviet era, many Russians were brought to Ukraine, while large numbers of Ukrainians and Crimean Tatars were deported. Now, united in our struggle, we must achieve what Moscow failed to achieve: friendship between peoples who are fighting together for a common future."
 NOV_For_New_Ukrainian_SSR:0 "For Ukrainian SSR"
 NOV_For_New_Ukrainian_SSR_desc:0 "From fields to mines, from factories to villages, every resident of the Donbas region is now working for a new future. Our struggle will not end with these lands - it will move forward to Kherson to establish a foothold for a new and friendly communist Ukraine."
 NOV_Restore_Most_Important:0 "Restore the Most Important"
 NOV_Restore_Most_Important_desc:0 "We managed to carry out a rather daring operation - sabotaging the main industrial centers of Donbas, leaving the enemy without most of its production capacity. Now that these resources are in our hands, specially selected industrialists who organized the sabotage will be able to quickly restore the factories and mines so that they work for the benefit of the revolution."
 NOV_Wartime_Economic:0 "Wartime Economic"
 NOV_Wartime_Economic_desc:0 "The current situation calls for desperate measures. The Black Sea region was extremely poor in industry, living mainly off mining, which is why we have to protect every factory that could undermine our position from the enemy. Because of this, our economy must switch to a war footing in order to supply the army. Food ration cards and hunger will once again become commonplace, but survival is more important than prosperity."
 NOV_Soviet_Army_Discipline:0 "Soviet Army Discipline"
 NOV_Soviet_Army_Discipline_desc:0 "This is not an army, it is a bunch of scoundrels who do not know which side the machine gun fires from! Throughout its existence, the Eurasian army has been involved in everything except military training. But our army, which consists of enemy deserters and miners, is also not known for its discipline. And while the enemy has not yet come to its senses, this army must undergo real training to become a true Red Army capable of defeating the enemy."
 NOV_Guerilla_Not_Terrorist:0 "We are Guerillas - not Terrorists"
 NOV_Guerilla_Not_Terrorist_desc:0 "These ideas of terrorizing people for the sake of advancing must come to an end. Our army cannot forever advance across devastated lands. The Black Sea region is famous not for terrorists, but for desperate partisans who, during World War II, undermined the activities of the Wehrmacht and did not allow them to rest even in the rear. This is the tactic we must inherit from the past."
 NOV_Demonstrative_Terror:0 "Demonstrative Terror"
 NOV_Demonstrative_Terror_desc:0 "The idea of terrorizing the enemy's civilian population is completely immoral, but could it also be... useful? What would happen if we not only attacked the enemy's army and industry, but also carried out demonstrative attacks on civilian sectors, which in fact would not be aimed at killing or maiming anyone? Such strikes would not only distract the enemy from important targets, but also sow chaos and panic among its population, causing them to doubt Eurasia's ability to protect them."
 NOV_A_Fucking_Hell:0 "Fire and Hell"
 NOV_A_Fucking_Hell_desc:0 "Our wrath upon these traitors to the revolution will rain down upon them. This wrath destroys everything that helps the enemy hold on, without distinguishing between the \"good\" and the \"bad\". A Eurasian soldier, calmly strolling along, will shoot our freedom fighter tomorrow; a Eurasian worker will forge a bullet or shell tomorrow that will kill our soldiers; a Eurasian resident will glorify Eurasia and Beria, resisting us to the last. Our wrath will fall on everyone until there are only three types of Eurasians left: those so intimidated that they are unable to resist, those who have fallen at our feet and sworn allegiance, and those who are dead."
 NOV_Research:0 "New Soviet Ingenuity"
 NOV_Research_desc:0 "After the founding of Eurasia, research institutes practically ceased to exist, and any bright minds in the state are scattered throughout the district. At a time when we need everything that can save our revolution, we must restore the research infrastructure to bring all these talents together and direct them toward creating new technologies that will help us defeat the enemy."
 NOV_To_Victory:0 "To Victory - To Free Ukraine!"
 NOV_To_Victory_desc:0 "Every day, the enemy's confidence that Eurasia will remain near the Black Sea is becoming weaker. The Donbas troops are advancing along the coast, liberating more and more territories, and soon they will be standing near Kherson. But this is not the end of our struggle - it is only the beginning. We must go all the way to victory in order to liberate all of Ukraine from the yoke of Eurasia and the traitors of the revolution."
 NOV_Break_Between_Fights:0 "Break Between Fights"
 NOV_Break_Between_Fights_desc:0 "The enemy has finally fallen, and the Black Sea coast is completely under the control of the proletariat. But we cannot stop now, the enemies still surround us, although... we deserve a break."
 NOV_Our_Policy:0 "Our Policy"
 NOV_Our_Policy_desc:0 "In this world, remaining neutral is extremely dangerous - not only could we fall, but the entire revolution could fall with us. Therefore, we must cooperate with states that are ideologically close to us in order to ensure our survival."
 NOV_Our_Policy_Effect:0 "We will be able to assist communist and socialist states in their wars and send them weapon."
 NOV_Comrade_Yazov:0 "Friendship with Comrade Yazov"
 NOV_Comrade_Yazov_desc:0 "Now, Comrade Yazov, Secretary General of the restored RSFSR, is fighting to restore the Soviet Union, which was long ago destroyed by the neobolsheviks. Whatever differences our two countries may have had in the past, we must now help each other in order to survive."
 NOV_Comrade_Yazov_Effect:0 "Yazov will not be able to annex us for next 1,5 years."
 NOV_Comrade_Yazov_SOV_Effect:0 "We will not be able to annex Ukrainian SSR for next 1,5 years."
 NOV_Open_Borders:0 "Open Borders"
 NOV_Open_Borders_desc:0 "Open borders will allow us to import necessary resources into our country, exchanging our raw materials for weapons and equipment."
 NOV_Moldavian_Question:0 "Moldavian Question"
 NOV_Moldavian_Question_desc:0 "Along with all the territories of southern Ukraine, we also gained the territories of the former Moldavian SSR. During this time, the settlement of peoples in this territory has not differed from ours, and we could try to integrate them. We could also give them freedom or correct the mistake of the USSR and return Moldova to Romania."
 NOV_Belarusian_Question:0 "Belarusian Question"
 NOV_Belarusian_Question_desc:0 "Along with the territories of the former Dnieper District, we also acquired territories in Belarus, and the issue of their territories is much more complicated. However, we believe that our secretary general will decide what to do."
 NOV_Establish_Emergency_Response_Units:0 "Establish Emergency Response Units"
 NOV_Establish_Emergency_Response_Units_desc:0 "The war for independence showed us how chaos and instability can ruin all plans. We need special units, on par with the Soviet \"spetsnaz\", that could respond quickly to critical situations and have more authority than regular police."
 NOV_Industrial_Boom:0 "Industrial Boom"
 NOV_Industrial_Boom_desc:0 "The Donbas region's industry was well developed due to its large deposits of resources. By utilizing these resources, we will be able to quickly develop our economy to an acceptable level."
 NOV_Donbas_Coal:0 "Ukraine Can't Do Without Donbas Coal"
 NOV_Donbas_Coal_desc:0 "Coal is our own gold. But while gold is just a valuable toy, coal has thousands of uses. Coal keeps us warm in winter, cooks our food, melts metal, and generates electricity, so it is clear that Ukraine cannot do without Donbas coal in the future."
 NOV_Reopen_KTEP:0 "Reopen KTEP"
 NOV_Reopen_KTEP_desc:0 "The V. O. Malyshev Transport Engineering Plant in Kharkiv is a legendary factory dating back to World War II, which produced the equally legendary T-34 tanks during the war. Due to the leadership of Eurasia, this plant has been abandoned, but we have sufficient resources to revive it."
 NOV_Resources:0 "Expand Resource Extraction"
 NOV_Resources_desc:0 "In addition to coal, we also need non-ferrous and other metals for weapons. Fortunately, the Donbas basin is rich in such resources."
 NOV_New_Factories:0 "New Factories"
 NOV_New_Factories_desc:0 "Our future goals require a considerable amount of resources, which we will not be able to obtain anytime soon at the current pace. The development of additional industries should help us with this."
 NOV_Break_Up_Tsarists:0 "Break Up Tsarists"
 NOV_Break_Up_Tsarists_desc:0 "Now the territories of the Crimean peninsula have been seized by tsarists exiled to Africa, who are trying to revive their fallen empire under a false leader. We need to show them that we have not weakened after the civil war, and throw them back across the ocean."
 NOV_Advance_To_North:0 "Advance to North"
 NOV_Advance_To_North_desc:0 "We are ready for our final strike, which will return all Ukrainian lands to us. Whoever stands against us - whether Ukrainian nationalists or Eurasian remnants - will be crushed."
 NOV_Independent_Ukraine:0 "Independent Ukraine"
 NOV_Independent_Ukraine_desc:0 "Shelest's dream has finally come true - Ukrainian communism, free from foreign rulers, a home for all peoples in this territory. May a free and independent Ukraine now flourish."
 NOV_Annex_By_Yazov:0 "Submit to Yazov"
 NOV_Annex_By_Yazov_desc:0 "Ryzhkov's dream has finally come true - Ukraine has become a springboard for a new Soviet Union, which, under the leadership of new General Secretary Dmitry Yazov, will help restore the Union's former glory."
 NOV_Annex_By_Yazov_Effect:0 "Now Yazov can annex us. We can also participate in his wars as an ally."
 NOV_Rescue_Yazov:0 "Rescue Yazov"
 NOV_Rescue_Yazov_desc:0 "We were already happy that it was the last battle, but now we have another one ahead of us. Dmitry Yazov's revolution was defeated and swallowed up by enemies. So now our revolutionary stronghold must act independently, and the goal is clear - to move forward no matter what, to save the general secretary!"
 NOV_prewar_events.1.t:0 "Incompetent"
 NOV_prewar_events.1.desc:0 "Looking out the window, Ryzhkov understood why Eurasia had failed.\n\nThey had strayed from the teachings of Lenin and Stalin.\n\nThey had turned Stalin's superpower, which was heading toward a bright communist future, into a spectacle of oligarchy behind a screen of the hammer and sickle. What they had fought against had ultimately taken over.\n\nNow he watched as this circus began to fall apart and the circus lions escaped from their cages to devour their former trainers. He watched all this and quietly rejoiced."
 NOV_prewar_events.1.a:0 "Soon, everything will return to normal."
 NOV_prewar_events.2.t:0 "Foolish"
 NOV_prewar_events.2.desc:0 "Looking at the devastated street, Shelest understood why Eurasia had failed.\n\nThey had abandoned the idea of friendship between nations.\n\nThey had turned Stalin's superpower, which was moving toward a bright future of brotherhood, into a prison for nations, where they were slowly being exterminated. They even banned people from speaking their native languages here in the Black Sea region, where most people speak Ukrainian, Russian, or Crimean Tatar. And he had served this circus, believing in the brotherhood of nations!\n\nBut now this circus was falling apart, and he was glad."
 NOV_prewar_events.2.a:0 "The proletariat of Ukraine will soon be liberated."
 NOV_prewar_events.3.t:0 "Arrogance"
 NOV_prewar_events.3.desc:0 "Two Eurasian police officers watched as firefighters extinguished a car burning in the middle of the street. By the time the firefighters arrived, the car had burned to a crisp, leaving only a charred shell, but when the fire was extinguished and the firefighters retreated, they also saw two charred bodies in what was left of the front seats.\n\n\"I never thought that one well-aimed throw could do so much,\" said one of the police officers, rereading the witness statements in the folder. \"Some unknown person jumped out onto the road from around the corner with a burning Molotov cocktail and threw it at the car, which quickly caught fire. And he chose his target well - two officers from the local military unit.\"\n\n\"And who dared to openly kill people? Terrorists? The tsar's servants?\"\n\n\"Nobody knows. But there are quite a few of them, and now there is unrest throughout Eurasia.\"\n\nWhile they were talking, men in suits took the charred bodies out of the car, took a few pictures, and packed them into black bags, which they carried to the ambulance."
 NOV_prewar_events.3.a:0 "Without rushing, the car drove toward the morgue."
 NOV_prewar_events.4.t:0 "Reserve"
 NOV_prewar_events.4.desc:0 "Maksym stood guard at the entrance to one of the mines, shivering from the cold and staring into the night. From this spot, he could clearly see one of the largest quarries, illuminated by hundreds of spotlights and lanterns, while his mine was not even lit by the moon. Caution did not even allow him to take out a match and light a cigarette - for what they were doing, they were guaranteed to be executed, or something even worse...\n\nHis thoughts about the types of punishment practiced by the NKVD were interrupted by the distant hum of engines, which could be mistaken for the typical hum of mining machines that never stop even at night. But from the other sounds, this one was approaching this very spot. Maksym left his guard post to help the new arrivals find their way in the dark. Several old Eurasian APCs drove up to the mine with their headlights off, where Maksym directed them straight onto the boards laid out on the muddy ground leading into the mine. When all the vehicles were hidden inside, men began to climb out of them, quickly taking out rifles and ammunition to lay them out in agreed places. They then quickly changed out of their dirty, in some cases bloodstained, clothes into miners' uniforms, after which they set about \"cleaning up.\"\n\nIn a few minutes, the mine looked again as if it had long been abandoned and forgotten, but could be quickly and easily accessed if necessary. After making sure that no suspicious footprints remained in the mud, the men returned to the quarry by hidden paths to their workplaces."
 NOV_prewar_events.4.a:0 "No one even noticed their absence."
 NOV_prewar_events.5.t:0 "Terror"
 NOV_prewar_events.5.desc:0 "A group of Eurasian soldiers marched down the street in parade formation. It was one of the typical parades that took place almost daily, although the current goal was not to demonstrate the army's strength, but to demonstrate calm and control over the situation. However, even the most loyal citizens were not greatly reassured by this - reports of terror and crime were becoming more frequent and widespread, and the parade itself was smaller and less organized than the rest. An old man watching the parade with the crowd felt the tension in the air. It was as if something was about to happen, something even right...\n\nOne of the parade trucks, which was standing right next to the marching infantry, suddenly exploded, scattering burning debris around. In an instant, the crowd, seized by panic, began to flee in all directions, seeking refuge in houses. The old man looked at his cane, which had fallen to the ground, and at his hand, which was stretched out toward it, but he couldn't understand why he couldn't reach it.\nHe also did not understand why he was lying on the ground,\ncould not understand why his hand seemed to be further away from him and was covered with a large piece of metal.\nAnd he did not understand why the tiles beneath him were turning red.\n\nLater, it became known that more than thirty soldiers and about ten civilians had been killed, and nearly a hundred had been wounded. This terrorist attack was the beginning of other terrorist attacks throughout Stalino and Voroshilovgrad, undermining the already shaky stability of the region and severing ties between the administration and the army."
 NOV_prewar_events.5.a:0 "The oldest victim was 74 years old... the youngest was thirteen..."
 NOV_prewar_events.6.t:0 "Preparation"
 NOV_prewar_events.6.desc:0 "Shelest glared angrily at Ryzhkov, who stood with his back to him. Ryzhkov stood silently, angrily pondering Shelest's words. This was the second thing they had in common, apart from their shared cause. They hated each other intensely.\n\n\"But it had the desired effect! We drove the Eurasian troops out of Donbas and showed our strength and determination!\"\n\n\"By killing pensioners and children?! Who are you going to protect and liberate if you kill them right on the streets?!\"\n\n\"If you want to cry over every swineherd who gets beaten up, you can go, Petro, good luck, but don't plan an uprising! As someone you know said, \"Revolutions aren't made with white gloves!\"\"\n\n\"Thanks to these \"swineherds\", this revolution even exists. Which of them will follow a leader who will kill them in the first battle?\"\n\nRyzhkov barely restrained himself so that another elderly pensioner would not appear in the news about the terrorist attack. This quarrel, like most before it, ended in nothing, with both sides of the same revolution silently going their separate ways. From all these verbal debates, they drew only one truth."
 NOV_prewar_events.6.a:0 "This ship does not need two captains."
 NOV_prewar_events.7.t:0 "Revolution against revolution"
 NOV_prewar_events.7.desc:0 "They no longer needed such a revolution. The idea of Eurasian friendship and unity became tyranny without freedom and a common goal. The Ukrainian communist movement is weak now, but should it be allowed to gain momentum?"
 NOV_prewar_events.7.a:0 "Lenin's legacy has been distorted, but we will save it!"
 NOV_prewar_events.7.b:0 "Crush these dung beetles!"
 NOV_war_events.1.t:0 "Thunder"
 NOV_war_events.1.desc:0 "The Eurasian soldiers entrusted with guarding the mines could not have expected such an attack. When an unknown rumbling sound came from the abandoned mines, they expected old mining machines to be started up, miners to violate the curfew, anything but armored cars and trucks driving out of them.\n\nThe coal basin under the former Stalino was captured by the miners' militia by surprise and with virtually no resistance, and most of the Eurasian soldiers were taken prisoner. Having captured more weapons and regrouped, they moved on, helping the rebels capture important positions."
 NOV_war_events.1.a:0 "Worker can hold more than just hammers..."
 NOV_war_events.2.t:0 "Posthumous hero"
 NOV_war_events.2.desc:0 "Ryzhkov arrived at one of the local collective farms as soon as the incident was reported. By that time, the police had finished collecting evidence and covered the deceased's body with a sheet. The official version was death as a result of sabotage during an inspection of the collective farm. He was satisfied with this conclusion. Petro Shelest's body was taken to an ambulance, which slowly made its way to the morgue. Due to the chaos and instability in the region, the funeral would be modest and quick, without unnecessary fuss. Ryzhkov was quite satisfied with this. His colleague would be remembered.\n\nBut not for long. All that would remain of the man who loved to put a spoke in his wheel would be a short line in a history textbook."
 NOV_war_events.2.a:0 "The swineherds were left without their protector"
 NOV_war_events.3.t:0 "Unimportant"
 NOV_war_events.3.desc:0 "One morning letter can turn everything upside down. Ryzhkov felt this firsthand. The letter, written in an elegant manner, informed him that the temporary party council had approved his \"promotion\" to head of the Donbas coal and ore basin development and his replacement as secretary general by Petro Shelest. All he could do now was sit and quietly curse.\n\nWhile he was thinking, Shelest was already taking action. Once he had secured Ryzhkov's \"promotion\" to an insignificant position from which he would be unable to influence politics, he began to slowly remove and dismiss people loyal to Ryzhkov from the corridors of power."
 NOV_war_events.3.a:0 "The executioner has been dismissed"
 NOV_war_events.4.t:0 "Enemies of the people"
 NOV_war_events.4.desc:0 "Case No. 12\nOn charges against Mustafa Dzhemilev Abdusemil, born on November 13, 1943, for crimes against the proletarian union, organizing nationalist groups of Crimean Tatars in territories controlled by the proletarian army of Donbas, and destabilizing the region. According to the testimony of the arrested participant [CLASSIFIED], Mustafa maintains ties with other groups of Ukrainian nationalists. The citizen does not admit his guilt.\nAs a precautionary measure, Mustafa was taken into custody."
 NOV_war_events.4.a:0 "Signature"
 NOV_war_events.5.t:0 "Unchanged"
 NOV_war_events.5.desc:0 "Vasyl smoked silently, resting his foot on the bench and looking at the school. To an outside observer, his expression would have seemed indifferent, but in reality, this was not the case. Vasyl simply understood that in this situation, a 50-year-old school security guard could do nothing.\n\nA military truck stood in front of the building, and soldiers were loading sealed boxes onto it amid the teachers' curses and cries. These boxes contained items that had been protected from the Bolsheviks for 40 years: Ukrainian books, busts of Ukrainian writers, maps, and other school supplies in Ukrainian. The school was ordered to be Russified, and everything that had been confiscated was to be destroyed. Everything remained unchanged: the authorities banned languages and took away everything related to them. Now the nearest Ukrainian-language school is 12 kilometers from the village, if it has not yet been converted to the \"Soviet order\".\n\nDuring an argument between the gray-haired teacher and the soldier, the latter dropped the box, which fell with a crash, and pieces of the yellowed bust of Ivan Franko spilled out of it. The soldiers grabbed the indignant teacher and took him into the building, and a minute later, only pieces of yellowed marble on the stairs reminded of the situation. Vasyl threw down his cigarette and stamped it out with his foot. Everything remained unchanged."
 NOV_war_events.5.a:0 "Only the portraits on the walls have changed"
 NOV_war_events.6.t:0 "I am..."
 NOV_war_events.6.desc:0 "Now, the constant protests for freedom and equality among peoples began to subside little by little. After all, now that the government had begun to treat national minorities more loyally, the protesters had found a better way to attract attention.\n\nFrom early morning, amid the usual colors of clothing, they shone as if competing with the sun. Some people called them \"circus performers\" or \"spotlights\", but more often than not, it was just a joke rather than an attempt to provoke conflict. Among the heads of the crowd, one could often see Tatars halpahs and Jewish kippahs, their outfit shining with colorful embroidery and sparkling ornaments among the gray outerwear, and their conversations stood out from the usual noise with their unusualness.\n\nMost of these clothes from different nations did not look their best after years of being hidden at the bottom of chests, and their conversations sounded as if they had forgotten some of the words, but these people were glad that they no longer had to hide who they were."
 NOV_war_events.6.a:0 "Is this really freedom?"
 NOV_war_events.7.t:0 "All are equal"
 NOV_war_events.7.desc:0 "After so much time, the regional administration had a clear picture of the situation. Although conducting a census is an extremely difficult task in the current circumstances, Secretary General Petro Shelest insisted on the urgency of this task. According to the census, about 48.2% of Ukrainians, 37.6% of Russians, 4.7% of Crimean Tatars, 3.2% of Jews, 2.4% of Gypsies, and another 3.9% of other small peoples live in the region. Ensuring that each ethnic group's culture was protected was a difficult task. There were problems finding schools that could teach them in their native languages, and the issue of freedom of religion had not yet been resolved. But the very fact that the state was doing something for them gave hope that things were changing for the better. It was also permitted to form national councils that would unite people of the same nation and help solve problems locally."
 NOV_war_events.7.a:0 "It will be a homeland for all"
 NOV_war_events.8.t:0 "Victory in battle, but not in war"
 NOV_war_events.8.desc:0 "The dust of battle has finally settled, and we have emerged victorious. The flag of the Ukrainian SSR flies from Donetsk to Kherson, and all of southern Ukraine is free from the oppression of the working people. But for the general secretary, this is not enough. Our battle will end when Ukraine is free from Kyiv to Lviv. And then..."
 NOV_war_events.8.a:0 "Well... we'll see what happens next..."
 NOV_afterwar_events.1.t:0 "Break"
 NOV_afterwar_events.1.desc:0 "The army felt a noticeable relief after so much time - finally, they had some free time. At last, they were able to leave the trenches and rest. Everyone understands that this will not last long, that the enemies are still nearby."
 NOV_afterwar_events.1.a:0 "But this is a break"
 NOV_afterwar_events.2.t:0 "Independent Ukraine"
 NOV_afterwar_events.2.desc:0 "Today, Secretary General Dmitry Yazov received a message in which [NOV.GetLeader], leader of [NOV.GetName], announced political cooperation with our government. At the same time, they want to ensure the independence of their own policies for a while, until they resolve their internal issues."
 NOV_afterwar_events.2.a:0 "Ok"
 NOV_afterwar_events.3.t:0 "The question of Moldovan independence"
 NOV_afterwar_events.3.desc:0 "Moldova, formerly the Moldavian SSR, is part of the Romanian people, who were initially subjected to Moldovanization and Russification during the Russian Empire in the 18th century in order to cultivate a separate Moldovan identity, and then was taken away again by the USSR in Romania after a little more than 20 years of reunification.\n\nOn the one hand, Moldova is the fruit of the tsars, which should not exist and must be returned to its rightful owner (perhaps even for an additional fee); on the other hand, we should not dictate to peoples how they should live, even if they were artificially cultivated. Although some still hold the view that if the Moldavian Autonomous SSR existed in the territory of Transnistria as part of the Ukrainian SSR between 1924 and 1940, then we have the right to claim the protection of the whole of Moldova."
 NOV_afterwar_events.3.a:0 "Now this is our land"
 NOV_afterwar_events.3.b:0 "Let them decide their own fate"
 NOV_afterwar_events.3.c:0 "The sale of these lands to Romania needs to be discussed"
 NOV_afterwar_events.4.t:0 "The question of Belarusian independence"
 NOV_afterwar_events.4.desc:0 "Belarus, formerly the Byelorussian SSR, came to us as a result of the struggle with the remnants of the Dnieper District, and is now under our occupation. This is a completely different people, very different from us, and despite similarities in terms of language, traditions, and the situation with mixed peoples, there can be no question of integration.\n\nFortunately, our wise general secretary has the right decision about these territories, and that is..."
 NOV_afterwar_events.4.a:0 "...liberate this people and give them the right to self-determination"
 NOV_afterwar_events.4.b:0 "...occupy this nation, so that it can then be handed over to the USSR government"
 NOV_afterwar_events.5.t:0 "Independence Day"
 NOV_afterwar_events.5.desc:0 "The morning air is filled with festive scents - after all, today is truly a festive day. Today, [?global.date.GetDateStringNoHour] will go down in Ukrainian history textbooks as the day of its independence from Eurasia, from foreign rulers, and from foreign ideals.\n\nThis is a special victory for Petro Shelest, because his idea of a free communist Ukraine, untainted by foreign influence, did not find support even among his ideological colleagues, and now he is the general secretary from Kyiv to Donetsk, while this short-sighted fool counts coal cars somewhere near Horlivka while smart people plan the future."
 NOV_afterwar_events.5.a:0 "And let the rest celebrate today"
 NOV_afterwar_events.6.t:0 "Ukrainian SSR"
 NOV_afterwar_events.6.desc:0 "The new report could not fail to please Yazov - his struggle had not gone unnoticed, and the proletariat itself was drawn to him like a baby to its mother. Ukrainian General Secretary Ryzhkov announced his readiness to integrate all the lands they controlled into his state. Intelligence reported that this victory had not been without drama, from political assassinations to open terror, but that did not concern him much at the moment."
 NOV_afterwar_events.6.a:0 "After all, now they have new friends"
 NOV_afterwar_events.7.t:0 "USSR in the war"
 NOV_afterwar_events.7.desc:0 "Secretary General Dmitry Yazov has just launched a new campaign to reunite the lands of the former USSR against [nov_target_country.GetName]. We must help him in any way we can."
 NOV_afterwar_events.7.a:0 "Troops, forward!"
 NOV_afterwar_events.8.t:0 "Annexation"
 NOV_afterwar_events.8.desc:0 "Secretary General Dmitry Yazov announced to us the need to annex the Ukrainian SSR into his future USSR in order to centralize power and better coordinate the troops."
 NOV_afterwar_events.8.a:0 "We have accomplished our mission"
 NOV_afterwar_events.8.b:0 "Is Yazov our boss, that he can command us like that?"
 NOV_afterwar_events.9.t:0 "Ukrainian SSR is resisting"
 NOV_afterwar_events.9.desc:0 "The damned Petro Shelest rudely announced that his state was an independent Ukraine that did not obey some old general, even if he commanded from Moscow itself, and that Ukraine would now forge its own happy path."
 NOV_afterwar_events.9.a:0 "We'll prove him wrong!"
 NOV_afterwar_events.9.b:0 "Is it worth fighting over?"
 NOV_news.1.t:0 "[GetNewspaperHeader]                                         Ukrainian Reunification"
 NOV_news.1.desc:0 "After half a century of fighting for its very existence, [NOV.GetName] has officially proclaimed its complete reunification. After the defeat of Soviet communism on this land, it has revived it again, built for a specific purpose. Whether it will be a new Ukraine or whether it will become a springboard for new Soviet power is unknown, but now its inhabitants can enjoy a certain degree of freedom."
 NOV_news.1.a:0 "The proletariat of Ukraine is free again"