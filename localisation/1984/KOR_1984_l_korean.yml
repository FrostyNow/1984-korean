 KOR_Revival_Of_Koryo:0 "Revival of Koryo"
 KOR_Revival_Of_Koryo_desc:0 "\n\n\n\n£GFX_KOR_Revival_Of_Koryo_Banner\n\n\n\n\n\n\n§WKorean culture had been subjected to a vile disfigurement that later resulted in the modern East Asian culture we bear witness to. New customs that were the antithesis of the core values of Korean society were the norm for decades.\n\nThis ends now.\n\nNever again shall Korean culture be dictated by the will of a few, never again shall Korean culture revolve around one individual, never again shall Korean culture be used as a tool to indoctrinate and subjugate.\n\nAnd above all, we shall fight to ensure our culture is never bastardised again.§!"
 KOR_Songun_Mindset:0 "Songun Mindset"
 KOR_Songun_Mindset_desc:0 "\n\n\n\n£GFX_KOR_Songun_Mindset_Banner\n\n\n\n\n\n\n§WThe Songun Principle is the policy that prioritised the military above all other aspects of politics and economics. Life in East Asia revolved around the military to the point of placing the population under permanent defence readiness.\n\nAs a result, our people are well above prepared for warfare against the central government, not letting years or even decades of training and drills go to waste. The policy that was meant to be another aspect of control has backfired tremendously for the East Asian oppressors and they shall pay with their lives.§!"
 KOR_Correcting_The_Course:0 "Correcting the Course"
 KOR_Correcting_The_Course_desc:0 "\n\n\n\n£GFX_KOR_Correcting_The_Course_Banner\n\n\n\n\n\n\n§WThe Chondoist faith was initially a symbol of Korean independence and a way for Koreans to grow closer to the Heavens. Its core values and beliefs center around self-improvement to eventually become one with nature and the sky.\n\nHowever, the Workers Party had twisted these beliefs for their benefit, revolving the faith around one individual as another means to control the people of East Asia. Over the years, the revisioned faith became the norm for life in Korea and beyond.\n\nIt will take years to reverse the damage inflicted upon the faith by the Party, but by the end, Chondoism will finally return to its humble origins as a way for the common folk to improve their life and serve the sky.§!"