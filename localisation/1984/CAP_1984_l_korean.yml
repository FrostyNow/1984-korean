 CAP_Cape_Desc_tt:0 "At the bottom of Africa, the Cape is our southern stronghold that allows Australiasia and the Indo-Pacific Territories to connect with the rest of Oceania. An essential aspect of the trans-global network of shipping and supply between the provinces, the Cape has the essential task of mining Chromium, Diamonds, and other rare earth metals."
