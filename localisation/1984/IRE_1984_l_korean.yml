l_korean:
 IRE_Victory:0 "Republic of Ireland"
 IRE_Victory_DEF:0 "The Republic of Ireland"
 IRE_Victory_ADJ:0 "Irish"
 IRE_Internal_Squabbles:0 "Internal Squabbles"
 IRE_Internal_Squabbles_desc:0 "\n\n\n\n£GFX_IRE_Internal_Squabbles_Banner\n\n\n\n\n\n\n§WThe Irish Republican Army is a coalition of various militia and partisan groups from across Ireland, each having their own ideas of what Ireland should look like after Ireland is free once more.\n\nThis internal squabbling and arguing from within has largely been kept under control by Patrick Kelly, who has strong armed the coalition into focusing on the real enemy of the Irish rather than each other, though the issues regarding what comes after still persists on and will have to be addressed properly some time.§!"
 IRE_Catholic_Resurgence:0 "Catholic Resurgence"
 IRE_Catholic_Resurgence_desc:0 "\n\n\n\n£GFX_IRE_Catholic_Resurgence_Banner\n\n\n\n\n\n\n§WWith the shackles on faith removed and the Lord's good book being accessible to the people once more, faith in Jesus Christ and the Catholic faith have flurished once more in Ireland as the people reclaim their roots.\n\nThis rediscovered faith has reinvigorated the people and have thus, helped them to better reconnect to their roots and identity as Irish men and women.§!"
 IRE_Legacy_of_1916:0 "Legacy of 1916"
 IRE_Legacy_of_1916_desc:0 "\n\n\n\n£GFX_IRE_Legacy_of_1916_Banner\n\n\n\n\n\n\n§WIt's 1916 all over again, lads. We may not be revolting against the English but the principle remains the same. Oceania are our oppressors and it's high time we tossed them off the little island of ours and retake our independence from these bastards.\n\nFrom Galway to Dublin.\nfrom Cork to ole' Donegal.\n\nEvery inch of this island will know the freedom of an Irish banner.§!"