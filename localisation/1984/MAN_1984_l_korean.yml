 MAN_The_Fight_For_True_Independence:0 "The Fight for True Independence"
 MAN_The_Fight_For_True_Independence_desc:0 "\n\n\n\n£GFX_MAN_The_Fight_For_True_Independence_Banner\n\n\n\n\n\n\n§WFor centuries, our people have never truly had a state to call our own, even when we had the dragon throne, we always had to give in to the demands of the Han Majority. This state of affairs has long plagued our people throughout our existence.\n\nThis ends now. We Shall no longer live to serve the whims of another group as perpetual servants. We shall take control of our future once and for all and rule our people on our terms!§!"
 MAN_Spirit_Of_The_Qing:0 "Spirit of the Qing"
 MAN_Spirit_Of_The_Qing_desc:0 "\n\n\n\n£GFX_MAN_Spirit_Of_The_Qing_Banner\n\n\n\n\n\n\n§WThe House of Aisin-Gioro, whose namesake translates to gold has always been at the helm of Manchu royalty, from the Jin Dynasty to the Qing Dynasty. Their guidance and helped to shape our identity for centuries.\n\nWith the return of Pujie, our people are more motivated than ever to fight for their Homeland and Emperor, even if we never return to the Dragon Throne, we can take solace in the fact that a descendent of the great Bukuri Yongson leads our people once more.§!"
 MAN_What_Is_A_Manchu:0 "What is a Manchu?"
 MAN_What_Is_A_Manchu_desc:0 "\n\n\n\n£GFX_MAN_What_Is_A_Manchu_Banner\n\n\n\n\n\n\n§WBesides our Tungusic roots, there is little that distinguishes our people from other groups in Northeastern Asia thanks to the assimilation of our people under several Chinese dynasties, the centuries of Sinicisation have made people forget about our culture and traditions.\n\nWhen discussing the way forward for our people and culture, some believe we should strictly return to our pre-Sinitic roots while others believe the only way forward is to incorporate the Sinitic and Korean influences and make it our own, no matter which path is taken, it will take a while before we can distinguish ourselves as a separate people.§!"