 GXC_Revolution_Of_Our_Times:0 "Revolution of our times!"
 GXC_Revolution_Of_Our_Times_desc:0 "\n\n\n\n£GFX_GXC_Revolution_Of_Our_Times_Banner\n\n\n\n\n\n\n§WOur people have never truly tasted freedom, for as long as we have existed there has always been an overlord dictating to us from Beijing whether we like it or not. Yet throughout the years, our people have always yearned to be free from the will of Beijing.\n\nAs we take arms and fight to claim our own destiny, the will of the Cantonese people is strong as they know that this may be their only shot at a taste of true freedom. As more people awaken from the brainwashing of Beijing, only one phrase comes to mind for everyone...\n\n\"Liberate Cantonia, Revolution of our times!\"§!"
 GXC_The_Lion_Rock_Spirit:0 "The Lion Rock Spirit"
 GXC_The_Lion_Rock_Spirit_desc:0 "\n\n\n\n£GFX_GXC_The_Lion_Rock_Spirit_Banner\n\n\n\n\n\n\n§WThe city of Hong Kong is where the Cantonese identity began to make its distinction more apparent thanks to British Colonialism. The decades of British oversight helped foster a unique identity for the city's  people.\n\nNow as the entire Cantonese sphere liberates themselves from the East Asian yoke, they look to the example of Hong Kong as the apex of Cantonese culture, the Lion Rock serving as a symbol of a free Cantonese people alongside the tri-flower emblem.§!"
 GXC_The_Question_Of_Identity:0 "The Question of Identity"
 GXC_The_Question_Of_Identity_desc:0 "\n\n\n\n£GFX_GXC_The_Question_Of_Identity_Banner\n\n\n\n\n\n\n§WDespite our unique culture and customs, our identity has always been shaped by others to the point where many consider us to be an offshoot of the Mandarin-speaking Northern Han peoples despite many characteristics pointing to the contrary. Even within our own circles, many of our people consider themselves to be more Chinese than Cantonese due to centuries of conditioning by Beijing.\n\nAs a result, a debate has formed amongst those who wish to forge a separate Cantonese state and destiny while others have the grander ambition to form a Federal China in which the Cantonese people can coexist amongst the other peoples of China in accordance with the vision of Chen Jiongming. The debate must be resolved quickly lest our people become stuck in an endless nationwide identity crisis.§!"