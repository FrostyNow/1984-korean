l_korean:
 1984_Opening_Screen_TSC_Title_TT:0 "§qTHIRTEEN SECTORS§!"
 1984_Opening_Screen_TSC_Desc_TT:0 "Once the home of a continent spanning nation that reigned over the Western Hemisphere, the Thirteen Sectors is the heart of Norht American Oceania with the largest population of any Province. Home to vast industrial scapes and urban centers home to millions, the Thirteen Sectors keeps the provinces of Oceania in line.\n\nIf Airstrip One is the heart of Oceania, then the Thirteen Sectors is its muscle.\n\nHowever, with growing instability across Oceania and discontent emerging amongst the population, the Thirteen Sectors right to rule may be challenged soon enough."
 1984_Opening_Screen_TSC_Gameplay_Paths_Desc_TT:0 "§YThirteen Sectors Paths§!\n- Restore control over the Thirteen Sectors from the rebel threat and reconquer North America for Big Brother.\n- Go rogue with §YJohn Staunton§! at the helm and carve out a new American state."
 TSC_Thirteen_Sectors_Desc_tt:0 "Once the home of a continent spanning nation, the Thirteen Sectors is the industrial heart of Oceania, home to vast industrial scapes and urban centers home to millions.\n\nIf Airstrip One is the heart of Oceania, then the Thirteen Sectors is its muscles."
 TSC_country_selection_tt:0 "§YHOW TO PLAY THE THIRTEEN SECTORS\n-----------------------------------------§!\nPlay as the §gEnglish Socialist States of Oceania§!, play through content until the province breakdown prior to the §RAnti-Revolution§! occurs. When this occurs, open the decision menu and scroll down to the §Y'Whispers of Nations'§! decision menu and click the decision to switch to the §YThirteen Sectors.§!"
