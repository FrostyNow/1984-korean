 TSC_Wipe_Out_The_Rebel_Scum_decision:0 "Wipe Out the Rebel Scum"
 TSC_Rejoin_Oceania:0 "Rejoin Oceania"
 TSC_Empowered_Thought_Police_Idea:0 "Empowered Thought Police"
 TSC_Brutal_Rebel_Suppression_Idea:0 "Brutal Rebel Suppression"
 TSC_Party_Reorganisation_Idea:0 "Party Reorganisation"
 TSC_Burn_It_Down_Idea:0 "Burn It Down!"
 TSC_Yearning_For_More_Idea:0 "Yearning For More"
 TSC_The_Pursuit_Of_Perfection_Idea:0 "The Pursuit of Perfection"
 TSC_A_Handsome_Face:0 "A Handsome Face"
 TSC_A_Handsome_Face_desc:0 "Americans often appreciate and follow beauty. When there is someone that exudes charisma and follow the standard of what is considered to be beautiful, people will often gravitate toward it.\n\nWith this in mind, as Big Brother is away to 'fight' the rebellion, we will make someone who can draw the eye of the people in charge. Someone we can control.\n\nJohn Staunton seems like a a good looking young man, and an employee at the Ministry of Plenty no less. He will suit our purposes just fine."
 TSC_More_Than_Meets_The_Eye:0 "More Than Meets the Eye"
 TSC_More_Than_Meets_The_Eye_desc:0 "The Party thinks that I'm just some puppet for them to control. Another face to mold and forge into the face of Oceania to hide away their complex web of lies, deception and confusion that permeates this nation and the other two, I imagine. But I won't be, I won't submit to this arrogant monsters who seek to make this continent into their own.\n\nOnly an American can rule America, this they will soon learn."
 TSC_Wipe_The_Slate_Clean:0 "Wipe the Slate Clean"
 TSC_Wipe_The_Slate_Clean_desc:0 "INGSOC was careful to put as many checks and balances on me as possible, to try and scare me into submission and maken me their own. On an ordinary, rationale man, these safeguards and threats may have keep him in line. But I'm hardly ordinary and hardly rationale. But most importantly, I know how to dodge and weave, so to speak.\n\nThey underestimate me, something that will soon prove to be a fatal error."
 TSC_Burn_It_Down:0 "Burn It Down!"
 TSC_Burn_It_Down_desc:0 "I'm not what you would refer to as a reasonable and calm person. Sure, I may put up the front of someone respectable and professional, but like any man, I have that urge to decimate and destroy all that seeks to bring me down to my knees. The difference is I'm not afraid to do it.\n\nThere's an old saying I've come to like: Keep your friends closer and your enemies closer. INGSOC keep me too close and they'll learn the consequences of their short sightedness.\n\nStarting with Paul Allen..."
 TSC_Yearning_For_More:0 "Yearning For More"
 TSC_Yearning_For_More_desc:0 "I look around Polis', the cities that have come to define much of America and are deemed to be the blue print of Oceania, for what we are to become. This dystopian, brutalist nation, devoid of beauty and character makes me sick to my stomach. What is there to by inspired by, what is there to convince a man to be elevated, to be greater than meets the eye.\n\nThis is all by design, naturally, with INGSOC not having much ambition beyond the status quo. But I am quite ambitious, you see, I will not settle for anything less than more.\n\nPerhaps this is a strength. Perhaps this is a flaw. But I do know this, the way things are have to change and they have to change right now!"
 TSC_The_Pursuit_Of_Perfection:0 "The Pursuit of Perfection"
 TSC_The_Pursuit_Of_Perfection_desc:0 "People have become meanial cogs in a ever stagnant and lackluster bureaucratic aparatus that doesn't make anything of real meaning or create something that inspires the masses. The Party takes everything from the common man and expects them to be happy, that all is well.\n\nI have one simple rebuke. If you produce something that is bland and devoid of meaning, you simply shouldn't exist. We should strive for perfection, pursuing greatness beyond ourselves til the day we die.\n\nOur mind is a library, our body a temple, and our spirits greater than our own forms and our society should reflect that notion."
 TSC_A_New_American_Declaration:0 "A New American Declaration"
 TSC_A_New_American_Declaration_desc:0 "Men and women of America, the people who lack identity and have given all to a Party that has gave nothing in return, I ask of you to join me in creating something of meaning, something that transcends body and mind. I invite you to join me in forging something that brings fulfilment to our souls and ignites a fire that will shine on the many generations.\n\nOceania brings many false promises. It offers love, yet delievers contempt. It demands loyalty, yet ensures your demise. It promises victory, yet across the globe, failure reigns.\n\nThe time has come America. It's time to wipe the slate clean.\n\n§RBURN IT DOWN!§!"
 TSC_The_American_Big_Brother:0 "The American Big Brother"
 TSC_The_American_Big_Brother_desc:0 "The First Big Brother may have failed, but it was not the idea that failed but rather, our failures to replace him when Big Brother began to live on far longer than he should have. John Staunton, though having some unique ideas, will remain under our firm grasp.\n\nWe will mold him into the Big Brother that America, then one day, the rest of Oceania will come to love."
 TSC_Strengthen_The_Thought_Police:0 "Strengthen the Thought Police"
 TSC_Strengthen_The_Thought_Police_desc:0 "If the Rebellion in the Southwestern Sector has proven anything, is that the Thought Police require even more resources to keep the population in line and to ensure the rebel element remains squashed and broken, no matter what hole they reside in."
 TSC_Root_Out_Rebel_Sympathisers:0 "Root Out Rebel Sympathisers"
 TSC_Root_Out_Rebel_Sympathisers_desc:0 "Many people have shown apathy toward the Party and cautious hope for the Continental Army that ravages the Western half of the continent with their incessant rebellion and chaos. The very notion that our citizenry can actually sympathize with the enemy is not only deeply offensive, but outright treasonous.\n\n§RFreedom?§! §WDemocracy?§! §BChange?§!\n\nThe only thing that will change for any of you traitors will be the bullet we put into your damned skulls."
 TSC_Reorganize_The_Party:0 "Reorganize the Party"
 TSC_Reorganize_The_Party_desc:0 "Staunton is the new Big Brother, the new face of Oceania and the Party needs to be restructured to reflect this notion. Those who deny and cling onto the Failed Brother will be cast out of the Party, those who seek to undermine our new 'leader' will be thrown out and find their place among the rest of the rabble that makes up the population.\n\nJohn Staunton is Big Brother, and Big Brother is the only name that shall be known."
 TSC_Pulling_The_Puppets_Strings:0 "Pulling the Puppet's Strings"
 TSC_Pulling_The_Puppets_Strings_desc:0 "John Staunton is a young man and can be quiet deceptive at times. Always with the backchat and the underhanded compliments that threaten to undermine the unity of the Inner Party. We should make it clear to him that, despite his position as 'leader' of America and one day, all of Oceania, he is simply a face we can show the people to keep them distracted while the real Party gets to business behind closed door. A puppet.\n\nJohn Staunton is nothing. Big Brother is everything."
 TSC_Reaffirm_Oceanian_Identity:0 "Reaffirm Oceanian Identity"
 TSC_Reaffirm_Oceanian_Identity_desc:0 "Americanism and any of the other so called 'Identitarian Movements' need to be swept under the rug as soon as possible. Oceania is the only thing that matters, all that stands. The old nations died, they failed. Their objectives are meaningless, what they preach will only lead to ruin.\n\nThey are failed peoples with failed ideas, what on Earth makes anyone believe that this time would be any different?"
 TSC_Revive_The_Heartlands:0 "Revive the Heartlands"
 TSC_Revive_The_Heartlands_desc:0 "The Industrial Heart of the Thirteen Sectors, much like the rest of Oceania, has been stagnant for a long time now. A lack of innovation and real need to expand the industrial power of Oceania has left our industrial might illprepared for the conflict we face.\n\nIf the Thirteen Sectors are to be victorious in this conflict, we need to expand our industrial capabilities as soon as possible."
 TSC_Refine_Workplace_Standards:0 "Refine Workplace Standards"
 TSC_Refine_Workplace_Standards_desc:0 "The rebels have been able to lure people over to their side by making light of the current conditions of the average worker of Oceania and promising to give them better lives. We must counter this by improving workplace standards and reforming the work culture of Oceania. We will show these so called 'Revolutionaries' that it is Oceania that has the adoration of the people, not the disgruntled few leeching off the masses."
 TSC_Extend_Work_Hours:0 "Extend Work Hours"
 TSC_Extend_Work_Hours_desc:0 "We need all hands on deck in the war for our future. The current order will not do. No, we need to maximise every single second our workers can work. We need hands to build, extract and create at all times. Victory, no matter the cost!"
 TSC_The_Ten_Year_Plan:0 "The Ten Year Plan"
 TSC_The_Ten_Year_Plan_desc:0 "The Thirteen Sectors may be in it for the long haul, not just against the rebels here but in other provinces across North America. To ensure we are as prepared as we can possibly be against the threat infesting this continent, we need to expand our industrial capabilities as much as possible to fight this continent spanning war."
 TSC_Revive_The_Sciences:0 "Revive the Sciences"
 TSC_Revive_The_Sciences_desc:0 "Knowledge is power, and in a conflict against so many enemies, both within our borders and beyond, it is best we gather what best and brightest we have at our disposal to revive the Research and Development Sector from a broken husk into something more functional to our needs."
 TSC_Culture_Of_Brutality:0 "Culture of Brutality"
 TSC_Culture_Of_Brutality_desc:0 "The sciences cannot be distracted with matters of experimentation and research that do not benefit the state and military in some way. The Thirteen Sectors requires weaopns of war and the means to dominate all who stand in our way. We must be ruthless and brutal, to show the enemy that it is we who have the monopoly on force in this land."
 TSC_Allow_Scientific_Autonomy:0 "Allow Scientific Autonomy"
 TSC_Allow_Scientific_Autonomy_desc:0 "Scientific discovery was often happening when the scientist was free to experiment and explore at his own leisure, examining all through the lens of his conscious away from the control of others who do not understand his mind. If we are to have a mandate on knowledge over the rebels, we have to allow for our researchers to have space to explore and experiment however they wish, even if what they create isn't always what we wish for."
 TSC_Reign_Of_The_Madmen:0 "Reign of the Madmen"
 TSC_Reign_Of_The_Madmen_desc:0 "We hold the keys to the knowledge of victory. The arms of war are at our disposal, and the minds behind them allow us to triumph. Experiments and research grant us more tools to rule, expanding our control in ways never concieved before.\n\nThe Madmen have come to dominate the sciences of the Thirteen Sectors, may their reign be long and fruitful."
 TSC_events.1.t:0 "The Staunton Regime"
 TSC_events.1.desc:0 "With Oceania growing increasingly chaotic, provincial regimes have been empowered to handle matters more directly with reduced supervision from the wider Party, a necessary move given how wide spread the issue of rebelliousness has become in recent months. That includes the capital province of the Thirteen Sectors which, much like the other provinces of North America, have seen growing rebel bolder and in number.\n\nWith this temporary change in authority having taken place, the Provincial Governor of the Thirteen Sectors, John Staunton, finds himself suddenly more important and powerful than before. Originally chosen to be the local face of the Party in the region, a Little Brother if you will, John now has more authority than he originally bargined for.\n\nNormally, the members of the Inner Party wwouldn't bat an eye at this given the times, but John has always been a little more odd than most, like there was something beneath the veil, a hidden madness that couldn't be proven. Given the circumstances, the Party is left with a decision. Should they honor the decree of the wider party and allow John to take greater administrative command, or should the Thought Police be sent to keep a close eye on him?"
 TSC_events.1.a:0 "\"Better safe than sorry, right?\""
 TSC_events.1.b:0 "\"So what if he's a little unhinged, aren't we all?\""
 TSC_events.2.t:0 "Puppet of America"
 TSC_events.2.desc:0 "John sat at his desk, looking over casualty reports from the frontline. He exhaled quietly, sparing a glance at the two Thought Police officers who stood by his door. Officially, they were here for his protection but John... John knew better. They were here to keep an eye on him, to ensure he would remain as the Party's lapdog.\n\nLooking away, he leaned over and grabbed the bottle of Victory Gin on his desk, taking the lid off and pouring himself a drink. Once his glass was poured, he set the bottle aside and lifted the glass near his nose. The smell was strong, and a little nauseating, but it was alcohol all the same. Closing his eyes, he took a long swig of the Gin, feeling the liquid race down his throat before he set the glass down and leaned back in his chair.\n\nThe drink was his only distraction now. His only means of distracting himself from the strings that made him a slace of the puppeteer that was the Party. He doubted any of them would be impressed with his increasing reliance of Gin, but Staunton didn't care. He was still their puppet at the end of the day..."
 TSC_events.2.a:0 "All they had to do was pull the strings."
 TSC_events.3.t:0 "Setting the Stage"
 TSC_events.3.desc:0 "Staunton looked at the assortment of men in uniform he'd managed to bring under his wing, all lined up and standing at attention. He never quite understood why the Party barely kept an eye on him. If they looked closer, maybe they'd see what he was doing. The plans he had in store for them. Perhaps they underestimated him. Too busy with the war with the rebels to see what was brewing right under their noses! That would be their mistake.\n\nSmiling, John stepped forward, hair slicked back and dressed in a suit as he placed his hand behind his back.\n\n\"Gentlemen, I'd like to thank you all for volunteering for this little plan of mine. I know you're all very eager to let out some pented up anger and believe me, I'm just as eager\" John began, a smirk emerging on his face as he looked at each of them before pacing around in front of them, each step precise and calculated.\n\n\"Our friends in the Party have no idea what we've got in store for them. They're all too focused on this war, this chaos that they've created. But they're going to get their day. And we'll secure our hold with a price paid with their blood\" He spoke, his eyes scanning over each of them before stopping, turning to look at each of them with a distant expression.\n\n\"Our time is coming, for America to be reshaped into a place of beauty and strength. Where the strong thrive and the rats scurry in the gutter. No more niceties or politeness. We're going to take what is rightfully ours and we're going to forge this world into the way we want it to be!\" He continued, growing in passion before he fell silent for a few moments, his expression going calm once more before he spoke once more with a crooked smile on his face.\n\n\"We will make what is theirs... ours.\""
 TSC_events.3.a:0 "It's all coming together"
 TSC_events.4.t:0 "Hey, Paul!"
 TSC_events.4.desc:0 "Paul Andrews was one of the more meticulous members of the Party. He worked hard and he was loyal. His work concerned itself with matters of Party stability, ensuring everyone was kept in line with the Party's needs. Naturally, he had heard rumours of Staunton and his near psychotic ramblings. Amusing, but of no real concern. It didn't matter if Staunton wasn't right in the head, so long as he focused on looking good for the camera and signing off on the occasional document, he was fine where he was.\n\nAs if on cue, the door opened up, revealing John standing there, looking rougher than usual, more unkempt. Unusual given how obsessed John was about his appearance.\n\n\"Mr Staunton? What's going on?\" Paul asked, his graze narrowing slightly, the echoes of screams being heard down the hallway.\n\n\"Oh, you know... business\" John spoke, his voice eerily calm as he looked Paul square in the eye.\n\nPaul swallowed, a feeling of unease creeping in as he spoke once more.\n\n\"W-Why are you here? Governor?\"\n\nJohn simply smiled in response, stepping inside with an axe in his hand.\n\n\"Oh, you know...\" John began, his hand moving to the door handle.\n\n\"Job evaluation.\"\n\nThe door was closed, followed by screams.\""
 TSC_events.4.a:0 "Happy times"
 TSC_events.5.t:0 "Pursuit of Tomorrow"
 TSC_events.5.desc:0 "The Staunton Clique, as it had come to be known, had assembled in a hall once reserved for the Two Minutes Hate, now made the staging ground for Staunton's accension from mull of the Party to the face of America, reforged and remade into something more. The Party had become less and less powerful with each passing day. More disappearances, the Thought Police being purged and whipped into Staunton's own force. The end of INGSOC was coming, that much was certain. It had failed horribly, unable to keep hold of the power it once had over the nations. And now Staunton has emerged with his own vision of triumph.\n\n\"Friends! Hear me tonight. A new dawn is coming for us all. The age of ugliness and visionlessness is at an end!\" John shouted, earning cheers from the crowd of supporters before him, their hands raised in the air.\n\nOnce upon a time, a rogue governor like himself would have been killed. If not by the Province Thought Police, then by another branch from a neighbouring province.\n\n\"The time for our victory is at hand. It was by INGSOC's own hubris that that we emerged. Their pride hsa blinded them, decieved them into thinking they were unbeatable. They grew comfortable... complacent... and it is from tha shadow that we have emerged. We will cast aside the age of brutalism and darkness. When we gaze upon our cities, our people, we should not see ruin and decay. No, we should see the monuments of what a strong society can build. A nation ruled by vision, not numbers. Lead by strength, not stagnation. We will see our vision of our future come to pass and we will kill ANYONE who stands in the way!\" John shouted out, tension in his shoulders growing as he stared back at his supporters."
 TSC_events.5.a:0 "And the strong roared loudly, for their age was coming."
 TSC_events.6.t:0 "A New Destiny"
 TSC_events.6.desc:0 "The Victory Square of White-Polis was packed with people, all gathered before the stage that had been set up the night before. They all watched with curiosity and apprehension in their eyes, all wondering what was happening. Why weren't there any INGSOC symbols in the area anymore? Why weren't there any posters glorifying Big Brother? Why were they all replaced with the emblems of the white eagle surrounded by stars?\n\nTheir answers may soon come as John Staunton come onto the stage, approaching the podium for all the crowd to see in the flesh.\n\n\"INGSOC is no more\" John announced boldly, much to the surprise of the crowd.\n\n\"Their weakness has been purged. And with it, a new dawn can begin for us all. No more shall we be strung up and controlled like puppets. No longer shall we be equally kept down in the ground! The strong will emerge and will take this nation back from the bitter and decadent!\" John shouted, sounding more unhinged as he spoke.\n\nThe crowd all shared glances, all surprised at what the Governor was saying. This was treasonous talk. The kind that would get you killed for even listening to it. Moments passed before one set of hands could be heard clapping, the sound echoing through the square. They were soon followed by another... then another. The crowd increasingly followed along, joining in as they all began to clap and cheer for the Governor, all conforming to what seemed like the new consensus. John grinned looking as the people all clapped in agreement. This was it, the moment of his triumph. The final death of INGSOC & the Thirteen Sectors and the rise of something new. His next words were on the tip of his tongue, the words that would define him... and how the nation that he was claiming as his and his alone would see him."
 TSC_events.6.a:0 "\"To the age of triumph!\""
 TSC_events.6.b:0 "\"To the age of strength!\""