 OCA_Industrial_Specialisation:0 "Industrial Specialisation"
 OCA_Industrial_Specialisation_desc:0 "\n\n\n\n£GFX_OCA_Industrial_Specialisation_Banner\n\n\n\n\n\n\n§WThis province is focused on urbanisation and industrial production. Provinces that focuses on industrial and urban projects tend to be heavily populated and thus, make up a sizeable portion of the Oceanian military and workforce.\n\nWhen Three Year Plans are implemented by the Party in order to expand the economy and boost production, the industrial provinces are where all resources are consolidated to streamline the production of manufactured goods, civilian and military.§!"
 OCA_Agricultral_Specialisation:0 "Agricultural Specialisation"
 OCA_Agricultral_Specialisation_desc:0 "\n\n\n\n£GFX_OCA_Agricultral_Specialisation_Banner\n\n\n\n\n\n\n§WAs one may expect, provinces with that are specialised in agricultural production are where the food to feed the vast metropolises and industrial cities of Oceania is grown. Unlike in the city, the presence of the Party is less felt, with the Party only maintaining a notable presence in the notable urban centres and the mega farms that cover the plains, leaving the residents alone for the most part.§!"
 OCA_Extraction_Specialisation:0 "Extraction Specialisation"
 OCA_Extraction_Specialisation_desc:0 "\n\n\n\n£GFX_OCA_Extraction_Specialisation_Banner\n\n\n\n\n\n\n§WResources. Minerals. Metal. Oil. Fuel.\n\nIt all has to come from somewhere. Someone has to extract it all from the Earth to fuel the Industrial and to a lesser extent, the Agricultural Provinces, and that is the role of the Extraction Provinces. Defined by its mountain mines and vast oil fields, it is these provinces that fuel all of Oceania and allows it to not only span much of the globe but maintain it's firm grip.§!"
 OCA_Eternal_Liberation_idea:0 "Eternal Liberation"
 OCA_Eternal_Liberation_idea_desc:0 "\n\n\n\n£GFX_OCA_Eternal_Liberation_Banner\n\n\n\n\n\n\n§WFor over a decade, Oceania has maintained a long campaign of integration and assimilation of Latin America. Urban Zones have been turned into total indoctrination centers, entire populations being subjected to propaganda and forced langauge conversions, from Spanish & Portuguese to Oceania's own Newspeak.\n\nThis has created a culture of resentment, fuelling dissent and motivating the youth to despise Big Brother and the armies that rule their homelands.§!"
 OCA_Legacy_Of_The_Latin_American_War_idea:0 "Legacy of the Latin American War"
 OCA_Legacy_Of_The_Latin_American_War_idea_desc:0 "\n\n\n\n£GFX_OCA_Legacy_Of_The_Latin_American_War_Banner\n\n\n\n\n\n\n§WThe Latin American War of the late 1960s and early 1970s has long left its mark on the lands of Latin America. Many parts of Latin America are still in ruin and disrepair, with once promising metropolitan zones and developing lands now in stagnation as Oceania works tirelessly to reduce the nations and peoples of this land into their drones no different from their own subjects in their own heartlands.\n\nThe Latin American War was a lengthy and costly war for Oceania, and though much of the lands of Latin America have been conqured by Oceanian forces, they are far from pacified.§!"
 OCA_Constant_Guerrilla_Resistance_idea:0 "Constant Guerrilla Resistance"
 OCA_Constant_Guerrilla_Resistance_idea_desc:0 "\n\n\n\n£GFX_OCA_Constant_Guerrilla_Resistance_Banner\n\n\n\n\n\n\n§WThe war may have ended for Oceania, but not for Latin America. In the mountains, jungles, and remote regions of the lands, the rebel networks and partisan grounps continue to work, fight and bleed for their lands.\n\nThe fight for freedom has been long and hard fought, and continued to tie down Oceanian resources in the region. But so long as there are those who remember their nations and know their histories, the resistance in South America will continue.§!"
 OCA_Blockade_idea:0 "Blockade"
 OCA_Blockade_idea_desc:0 ""
 OCA_Rocket_Specialisation:0 "Rocket Specialisation"
 OCA_Rocket_Specialisation_desc:0 "\n\n\n\n£GFX_OCA_Orbit_Specialisation_Banner\n\n\n\n\n\n\n§WPeninsula One, under the guidance of Province Premier Soloman, has concerned itself with the mysteries of the void above, granting it a unique directive to deviate from some of the other provinces to focus on rockets and matters of space.\n\nThis emphasis on space bound technology has allowed Peninsula One to be more proficient in research and development, making it more capable of overcoming stagnation, shifting its dreams from the ground below to beyond the heavens.\n\nDestiny calls, and Peninsula One aims to answer it.§!"
 OCA_Tis_For_Thee:0 "'Tis For Thee"
 OCA_Tis_For_Thee_desc:0 "The year is 1984. Many decades have passed since the Great Atomic War and in its wake existing three super states. One of those states is Oceania, which rules under the political ideology of English Socialism.\n\nInheriting the forgotten legacies of the United States and the British Empire, the new year brings forth new opportunities to bring glory to the name of Big Brother."
 OCA_War_Is_Peace:0 "War Is Peace"
 OCA_War_Is_Peace_desc:0 "Oceania was at war with Eurasia: Therefore Oceania had always been at war with Eurasia. The enemy of the moment always represented absolute evil, and it followed that any past or future agreement with him was impossible."
 OCA_Freedom_Is_Slavery:0 "Freedom Is Slavery"
 OCA_Freedom_Is_Slavery_desc:0 "How could you have a slogan like FREEDOM IS SLAVERY when the concept of freedom has been abolished? The whole climate of thought will be different. In fact there will be no thought, as we understand it now. Orthodoxy means not thinking—not needing to think. Orthodoxy is unconsciousness.'"
 OCA_Ignorance_Is_Strength:0 "Ignorance Is Strength"
 OCA_Ignorance_Is_Strength_desc:0 "WHO CONTROLS THE PAST\nCONTROLS THE FUTURE\nWHO CONTROLS THE PRESENT\nCONTROLS THE PAST"
 OCA_Increase_The_Chocolate_Ration:0 "Increase The Chocolate Ration"
 OCA_Increase_The_Chocolate_Ration_desc:0 "Heard the rumor?\n\nNo. Good news, is it?\n\nI should say so, yes.\n\nChoco rations going up.\n\nReally?\n\nTwenty-five grams next week.\n\nDoubleplus good."
 OCA_Two_Minutes_Hate:0 "Two Minutes Hate"
 OCA_Two_Minutes_Hate_desc:0 "The Two Minutes Hate is an integral aspect of every Oceanian's daily life and an important function of the state. It is here together in a crowd that the people can let loose their anger and frustrations over their lives, rage in which the Party is able to direct toward Goldstein, the great enemy of Oceania, whilst off setting their discontent toward their living conditions under INGSOC rule."
 OCA_The_Man_In_The_Corner:0 "The Man in the Corner"
 OCA_The_Man_In_The_Corner_desc:0 "Privacy is seldom seem in Oceania, yet when it is found, it is more valuable than gold. In an age of telescreens watching your every move and hidden cameras and microphones within every wall, a moment with no eyes on ones self is a moment of pure bliss."
 OCA_Bolster_The_Junior_Spies:0 "Bolster the Junior Spies"
 OCA_Bolster_The_Junior_Spies_desc:0 "Sing to the sailors, on the floating fortress\nSing to the soldiers, on the battlefield\nSing to the airmen, in the burning azure\nSing to the farmers, rising yields\n\nWe are the children, builders of the future\nAnd we the children swear too thee; Loyal devotion\nFearless devotion\nAnd to die with dignity\n\nSing to the faithful members of the party\nSing to the party policy\nSing to our country, mighty Oceania\nLand of peace and victory"
 OCA_Vaporize_The_Too_Intelligent:0 "Vaporize the Too Intelliegent"
 OCA_Vaporize_The_Too_Intelligent_desc:0 "One of these days, thought Winston with sudden deep conviction, Syme will be vaporized. He is too intelligent. He sees too clearly and speaks too plainly. The Party does not like such people. One day he will disappear. It is written in his face."
 OCA_Release_The_Latest_Newspeak_Dictionary:0 "Release the Latest Newspeak Dictionary"
 OCA_Release_The_Latest_Newspeak_Dictionary_desc:0 "\"What I had really intended to say was that in your article I noticed you had used two words which have become obsolete. But they have only become so very recently. Have you seen the tenth edition of the Newspeak Dictionary?\"\n\n\"No,\" said Winston. \"I didn't think it had been issued yet. We are still using the ninth in the Records Department.\"\n\n\"The tenth edition is not due to appear for some months, I believe. But a few advance copies have been circulated. I have one myself. It might interest you to look at it, perhaps?\"\n\n\"Very much so,\""
 OCA_Kindred_Spirits:0 "Kindred Spirits"
 OCA_Kindred_Spirits_desc:0 "there was a fraction of a second when their eyes met, and for as long as it took to happen Winston knew—yes, he KNEW!—that O\"Brien was thinking the same thing as himself. An unmistakable message had passed. It was as though their two minds had opened and the thoughts were flowing from one into the other through their eyes. \"I am with you,\" O\"Brien seemed to be saying to him. \"I know precisely what you are feeling. I know all about your contempt, your hatred, your disgust. But don\"t worry, I am on your side!\""
 OCA_Expand_Terror_Bombings:0 "Expand Terror Bombings"
 OCA_Expand_Terror_Bombings_desc:0 "\"...Julia startled him by saying casually that in her opinion the war was not happening. The rocket bombs which fell daily on London were probably fired by the government of Oceania itself, 'Just to keep the people frightened.'\""
 OCA_We_Were_Always_At_War_With_East_Asia:0 "We Were Always At War With East Asia"
 OCA_We_Were_Always_At_War_With_East_Asia_desc:0 "After six days of this, when the great orgasm was quivering to its climax and the general hatred of Eurasia had boiled up into such delirium that if the crowd could have got their hands on the 2,000 Eurasian war criminals who were to be publicly hanged on the last day of the proceedings, they would unquestionably have torn them to pieces—at just this moment it had been announced that Oceania was not after all at war with Eurasia. Oceania was at war with Eastasia. Eurasia was an ally."
 OCA_Secure_Southern_India:0 "Secure Southern India"
 OCA_Secure_Southern_India_desc:0 "Winston had squatted down beside her. He tore open a corner of the packet.\n\n'It's real tea. Not blackberry leaves.'\n\n'There's been a lot of tea about lately. They've captured India, or something,' she said vaguely."
 OCA_Wolves_In_Sheeps_Clothing:0 "Wolves In Sheep's Clothing"
 OCA_Wolves_In_Sheeps_Clothing_desc:0 "Any sound that Winston made, above the level of a very low whisper, would be picked up by it, moreover, so long as he remained within the field of vision which the metal plaque commanded, he could be seen as well as heard. There was of course no way of knowing whether you were being watched at any given moment. How often, or on what system, the Thought Police plugged in on any individual wire was guesswork. It was even conceivable that they watched everybody all the time."
 OCA_Room_101:0 "Room 101"
 OCA_Room_101_desc:0 "\"What is in Room 101?\"\n\nThe expression on O\"Brien\"s face did not change. He answered drily: \"You know what is in Room 101, Winston. Everyone knows what is in Room 101.\"\n\nHe raised a finger to the man in the white coat. Evidently the session was at an end. A needle jerked into Winston\"s arm. He sank almost instantly into deep sleep."
 OCA_Televise_Confessions:0 "Televise Confessions"
 OCA_Televise_Confessions_desc:0 "It was impossible, in spite of the endless arrests and confessions and executions, to be sure that the Brotherhood was not simply a myth. Some days he believed in it, some days not. There was no evidence, only fleeting glimpses that might mean anything or nothing."
 OCA_Big_Brother_Is_Watching_You:0 "BIG BROTHER IS WATCHING YOU"
 OCA_Big_Brother_Is_Watching_You_desc:0 "Forty years it had taken him to learn what kind of smile was hidden beneath the dark moustache. O cruel, needless misunderstanding! O stubborn, self-willed exile from the loving breast! Two ginscented tears trickled down the sides of his nose. But it was all right, everything was all right, the struggle was finished. He had won the victory over himself.\n\nHe loved Big Brother."
 OCA_Latin_American_Woes:0 "South American Woes"
 OCA_Latin_American_Woes_desc:0 "South America has long been a thorn in the side of Oceania, an entity constantly, drawing resources away from our campaigns in Africa and India out of fear of an opportunistic invasion to reclaim their lost territories. However, with Brazil pulling itself back together and the remaining South American nations militarising for war, the window to crush them is swiftly closing. We cannot wait any longer, the time to invade South America has come."
 OCA_Send_In_Reinforcements:0 "Send in Reinforcements"
 OCA_Send_In_Reinforcements_desc:0 "Whilst Atlantropa Frontline Command os capable of handling the bulk of the war effort, we can't leave it to chance. If Oceania is to regain full control over these territories, sending in some divisions to support the war effort will ensure ensure victory."
 OCA_Bolster_Vulnerable_Garrisons:0 "Draft Oceania's Sons"
 OCA_Bolster_Vulnerable_Garrisons_desc:0 "Atlantropa cannot strictly rely upon the locals and indoctrinated in their conflict, no, we must make sure they have the best and loyal troops fighting at the frontline. By drafting up men from America and Airstrip One, we can provide them with the manpower needed to secure victory."
 OCA_Train_Specialised_Troops:0 "Train Specialised Troops"
 OCA_Train_Specialised_Troops_desc:0 "South America contains a diverse landscape. From uncomfortable heat to freezing cold. Vast rainforests and towering peaks. Standard troops may not be enough to retake the region from the rebels who are well acclimated to the region. To ensure Oceania's continued dominance in the region, we must train and deploy support divisions that can assist our forces in the region."
 OCA_Deploy_High_Mountaineer_Divisions:0 "Deploy Mountaineer Divisions"
 OCA_Deploy_High_Mountaineer_Divisions_desc:0 "Given the strategic advantage of controlling the Andes Mountain Range, which dominate the western coastline of South America, sending in mountaineer forces to bolster Granada will ensure Oceania maintains its foothold on the South American continent."
 OCA_Deploy_Marine_Divisions:0 "Deploy Marine Divisions"
 OCA_Deploy_Marine_Divisions_desc:0 "South America is home to many rivers and rainforest which the rebels have made great use of to continue their guerilla campaign against us, making advancements into regions such as the Amazon Rainforest hellish. To offset the rebel advantage on this front, the deployment of marines will help even the odds."
 OCA_Strengthen_Adminipolis_Regime:0 "Strengthen The Rio Regime"
 OCA_Strengthen_Adminipolis_Regime_desc:0 "Rio has the defacto capital of the Oceanian occupation of South America. It is the seat in which power and influence can be projected across the continent. Losing this city would greatly weaken our reach in the region and undermine the war effort. Therefore, it is essential that Rio de Janeiro never falls into enemy hands"
 OCA_Offer_Industrial_Support:0 "Offer Industrial Support"
 OCA_Offer_Industrial_Support_desc:0 "Industrial might is more often than not the determining factor in who wins and who falters. The rebels may enjoy certain advantages in geography and popular support, but one advantage they lack is industrial capabilities. By expanding the industrial base in certain provinces, we can provide our forces in South America the resources they need to win this war."
 OCA_The_Second_Triumph:0 "The Final Triumph"
 OCA_The_Second_Triumph_desc:0 "The war in South America has been won at last. The rebel threat has been swept away and our total authority restored. Now is the time to break whatever feeble resistance remains and bring the South American continent into the Oceanian fold."
 OCA_The_Resumption_Of_History:0 "The Resumption of History"
 OCA_The_Resumption_Of_History_desc:0 "After many decades of near uncontested ideological rule over the world, opposition has arisen as rebel groups across the province has risen up in an attempt to overthrow Big Brother and Oceania. Despite our best efforts, the old nations still live on enough in the hearts of some to oppose us, all in their attempts to restart Human history and restore the chaos of old.\n\nNo matter.\n\nHistory shall resume as it once was for now, though like last time, it will no go in their favour."
 OCA_Restarting_The_Economy:0 "Restarting the Economy"
 OCA_Restarting_The_Economy_desc:0 "Oceania's economy was built to be stagnant, giving the perception of growth and progress whilst in reality, things were forever and unchanging. Our opponents will not adhere to the doctrine of eternal warfare and stagnation and will no doubt use all abilities to grow and build up as quickly as possible. If we are to end this revolt swiftly, we must adjust to allow for the growth of industry and production so that we may fight this war effectively and restore order to all of Oceania."
 OCA_Refine_Production_Methods:0 "Refine Production Methods"
 OCA_Refine_Production_Methods_desc:0 "In the factories and war foundries, the methods Oceania utilises to produce its military and civilian goods are ineffective and outdated. This was on purpose, of course, but in the face of our enemies, it is clear we will need to innovate our production methods enough to keep up with our rebel rivals."
 OCA_The_Industrial_Expansion_Plan:0 "Industrial Expansion Plan"
 OCA_The_Industrial_Expansion_Plan_desc:0 "The current capacity of factories in the province is inadequte for the war we are fighting at present. Though we are undoubtably the industrial power of this war, in contrast to the rebels, it is clear that we will require more factories in order to crush them completely.\n\nWe must leave nothing to chance."
 OCA_Mandate_New_Workforce_Standards:0 "Mandate New Workforce Standards"
 OCA_Mandate_New_Workforce_Standards_desc:0 "If the war is to be won, the workers of Oceania must give more of themselves to the Party in order to ensure the desired outcome. The workers will need to work longer, produce more, be more, if Oceania is to survive and prosper in the face of this grave threat.\n\nWe must give everything for Big Brother."
 OCA_Increase_Forced_Labour_Hours:0 "Increase Forced Labour Hours"
 OCA_Increase_Forced_Labour_Hours_desc:0 "Those in the 'Joy' Camps, the dessidents and thought criminals who each contributed to the emergence of the anti-revolution will be put to work all day and if necessary, all night. There can be no rest for the wicked who helped infest Oceania with the plague of Nationalism. If they wish to be redeemed in the eyes of Big Brother, they will work, work, work.\n\nWork themselves to the grave."
 OCA_Enslave_The_Earth:0 "Enslave the Earth"
 OCA_Enslave_The_Earth_desc:0 "The Earth is ours.\n\nIt is ours to exploit, to dominate. The nations of old have lost their right to this world long ago and have no right to even exist, let alone breath the same air as us. We will make their homelands unrecognisable, we will make the whole world know that this land is our land.\n\nForever."
 OCA_The_Tenth_Three_Year_Plan:0 "The Tenth Three Year Plan"
 OCA_The_Tenth_Three_Year_Plan_desc:0 "Industrial expansion and growth is paramount to the development of the state in the fight against anti-revolutionaries.\n\nFactories must be built, new quotas must be reached, industrial supremacy must be achieved.\n\nThough the past three year plans of the pre-revolt period were only superficial and on paper, designed as a means to give the illusion of growth and prosperity, this Three Year Plan will not only be real but will foster real results that will increase the power of the Party and help us overwhelm our enemies."
 OCA_Control_The_Narrative:0 "Control the Narrative"
 OCA_Control_The_Narrative_desc:0 "The rebels have done their best to cause chaos in the social order of Oceania. Their efforts to discredit the party, encourage chaotic behaviour and attempts to 'expose' Big Brother have caused much of the public order to breakdown, bringing about chaos and confusion within our ranks.\n\nThe homefront must endure above all else, thus all measures to ensure loyalty and control over our population must and will be taken in order to preserve the rule of the Party and Oceania."
 OCA_Restarting_Innovation:0 "Restarting Innovation"
 OCA_Restarting_Innovation_desc:0 "To succeed against vicious opponents hellbent on destroying their opponents, one must be able to innovate and overcome their enemies in order to match and exceed their abilities as swiftly as possible. Despite our decades long system of continued stagnation, it appears that we will need to restart our technological development sectors as soon as possible so that we do not fall behind our opponents in the field of technological development.\n\nThough a breach of traditional Oceanian system of rule, desperate times call for desperate measures and we cannot afford to fall behind, not in a war such as this."
 OCA_Temporary_Meritocracy:0 "Temporary Meritocracy"
 OCA_Temporary_Meritocracy_desc:0 "Though unconventional in contrast to our existing departments within the Oceanian ministries, if we wish to bring about an effective research and development department as swift as possible, a system of temporary meritocracy will ensure we will be able to find and gather the best and brightest within Oceania."
 OCA_Total_Party_Management:0 "Total Party Management"
 OCA_Total_Party_Management_desc:0 "The research and development sector of Oceania will be ruled over by the Party as all other departments and ministries are. We will decide who emerges and who falls, we will control each and every aspect of this department to ensure that it serves us and only us.\n\nThis department is not for toying around with or experimenting, it has a singular purpose which is to serve Big Brother and the Party and we will ensure there is no deviation from this path whatsoever."
 OCA_Reward_Newthink:0 "Reward Newthink"
 OCA_Reward_Newthink_desc:0 "Amongst our growing scientific class, there are those who have been noted to be coming up with unique ideas and investigating various technologies that can be of great use to the industrial and civilian sector of the province. Though these minds of Newthink haven't been that beneficial to the military sector, these will still prove highly useful to the war effort.\n\nWe should not only encourage Newthink but also reward it whenever it emerges."
 OCA_Relax_Scientific_Oversight:0 "Relax Scientific Oversight"
 OCA_Relax_Scientific_Oversight_desc:0 "Unlike other sectors of Oceanian society, being overbearing and highly controlling of the scientific department is actually more of a hinderence.\n\nLike it or not, scientists require at least some freedom to investigate and experiment with new things in order to produce and create the technologies that will better serve the state."
 OCA_Promote_Brutalist_Science:0 "Promote Brutalist Science"
 OCA_Promote_Brutalist_Science_desc:0 "A great deal of scientists have been more focused on civilian technologies, depriving the military sector the research it needs to win this fight. This Newthink and illusion of scientific freedom must be corrected. Science is to be a tool for the Party, a tool with a specific purpose to ensure that Oceania's rule remains unquestioned and the population forever subjegated.\n\nWe will 'guide' the scientists back onto the correct path by pushing them towards sciences more suit to our interest."
 OCA_End_The_Stagnation:0 "End the Stagnation"
 OCA_End_The_Stagnation_desc:0 "After all the investments, work and effort put into resolving the technological stagnation that has put us at a disadvantage in this war, it's time to finally bring an end to the technological stagnantion and to finally fully restart our research & development sector."
 OCA_The_Thought_Police_Coup:0 "The Thought Police Coup"
 OCA_The_Thought_Police_Coup_desc:0 "Every province of Oceania is experiencing rebellion and, despite the best efforts of the Thought Police, Winston Smith and his allies have brought the Anti-Revolution to Airstip One.\n\nWe can leave nothing to chance, the Thought Police must take swift and immediate control of all governing bodies of Airstrip One in order to ensure the continued survival of INGSOC and Airstrip One."
 OCA_Control_The_Population:0 "Control the Population"
 OCA_Control_The_Population_desc:0 "The spread of Anti-Revolutionary thought has become increasingly widespread, with more and more rebels either escaping to join their brethren or causing their own brand of chaos behind enemy lines. We must do all that we can to ensure that we maintain total control of the population."
 OCA_Stablise_The_Army:0 "Stablise the Army"
 OCA_Stablise_The_Army_desc:0 "With revolutions occuring across Oceania, the armies of Airstrip One are becoming increasingly rattled by the sheer scale of chaos and disorder, with a growing number of conscripts beginning to question why they were fighting, wondering if they were on the correct side of things. This has affected moral and their will to fight, leaving the defence of Airstrip One in crisis.\n\nIt is clear that the Thought Police must involve itself in the affairs of the army as quickly as possible and ensure the loyalty and continued fanaticism of the army before it has a chance to break down."
 OCA_Hate_The_Anti_Big_Brother:0 "Hate the Anti-Big Brother"
 OCA_Hate_The_Anti_Big_Brother_desc:0 "There can be no sympathy, no love for the face of the Anti-Revolution here in Airstrip One. The Anti-Big Brother himself, Winston Smith. People have increasingly been ensared by his message of so called freedom and identity, making them believe there are greener pastures with him.\n\nThe people of Airstrip One must be made aware that all that he says are lies. Filthy lies designed to turn people against your Big Brother."
 OCA_Fortify_London:0 "Fortify London"
 OCA_Fortify_London_desc:0 "The rebels will come for London.\n\nIt is only natural, it is the largest city in Airstrip One and was the capital of the late United Kingdom. A seat of power and might over the British Isles. They cannot be allowed to take the city, not without a fight should they ever come close to it. We must ensure that all defensive preparations are made to ensure the safety and security of the city of London."
 OCA_Thought_Police_Commissars:0 "Thought Police Comissars"
 OCA_Thought_Police_Commissars_desc:0 "The Army. The Thought Police. We alll share the purpose of securing and protecting Oceania from all threats. Already, we have grown increasingly intertwined, a necessary action to protect Oceania from further Anti-Revolutionary plague. However, one can never be too careful. You can never know how many Thought Criminals exist within the ranks of our army, thus it is necessary that Thought Police involvement must continue to increase.\n\nWith Thought Police Comissars keeping a watchful eye on our boys on the front, we will ensure that the loyalty of our soldiers remains absolute."
 OCA_The_Heart_Beats_Again:0 "The Heart Beats Again"
 OCA_The_Heart_Beats_Again_desc:0 "Airstrip One is primed to finish the job. No longer shall it find itself in the disorganised, panicked hands of the Party who have allowed the situation to deteriorate into what exists now. The Thought Police, through heavy handed measures and brutal efficiency have brought Airstrip One to total working order on all fronts to defeat Winston and bring an end to the chaos plaguing the British Isles.\n\nLet us hope it is not too late."
 OCA_Victory_Over_Ourselves:0 "Victory Over Ourselves"
 OCA_Victory_Over_Ourselves_desc:0 "We have done it.\n\nOceania has been tested and Oceania has won. The Anti-Revolution has been destroyed, the legitimacy of INGSOC forever undisputed. All that remains now is to pick up the pieces and continue where we left off."
 OCA_Eviserate_The_Rebel_Remnants:0 "Eviserate the Rebel Remnants"
 OCA_Eviserate_The_Rebel_Remnants_desc:0 "Though the Anti-Revolution is over, there are still those lingering in the mountains, forests and who knows where trying to fight back in the name of a falied cause. It will take some time, but with the Thought Police at the helm, leading the charge against the fractured rebellion, we can wipe away the cockroaches that refuse to give up and restore our nation back to stability."
 OCA_Double_Down_On_The_Old_Ways:0 "Double Down on the Old Ways"
 OCA_Double_Down_On_The_Old_Ways_desc:0 ""
 OCA_Oceanias_New_Boogyman:0 "Oceania's New Boogyman"
 OCA_Oceanias_New_Boogyman_desc:0 ""
 OCA_The_Wrath_Of_Big_Brother:0 "The Wrath of Big Brother"
 OCA_The_Wrath_Of_Big_Brother_desc:0 ""
 OCA_All_Hail_Oceania:0 "All Hail Oceania"
 OCA_All_Hail_Oceania_desc:0 ""
 OCA_decision.1.t:0 "The Face of Big Brother"
 OCA_decision.1.desc:0 "What shall the face of Big Brother be today? Shall we keep him looking as he does now, or shall we adjust the propaganda posters to bring back his old face?"
 OCA_decision.1.a:0 "Bring back to modern look"
 OCA_decision.1.b:0 "Revert to the classic look"
 OCA_starting.1.t:0 "Oceania - 1984"
 OCA_starting.1.desc:0 "Oceania comprises the Americas, the Atlantic islands including the British Isles, Australiasia, and the southern portion of Africa. Ruled by INGSOC and guided by the benevolent Big Brother, Oceania and its population exist in a constant struggle against it enemies, both beyond and within the boundaries of its vast territory. Though the struggle is great, every man and woman stands ready to fight for the ideals and vision of Big Brother and the party, to root out all agents of Goldstein and fully realise the revolution, even if they must be sacrificed in order to do so.\n\nAnything that must be done, will be done in the Big Brother."
 OCA_starting.1.a:0 "BIG BROTHER IS WATCHING YOU"
 OCA_starting.2.t:0 "War Is Peace"
 OCA_starting.2.desc:0 "War, it will be seen, is now a purely internal affair. In the past, the ruling groups of all countries, although they might recognize their common interest and therefore limit the destructiveness of war, did fight against one another, and the victor always plundered the vanquished. In our own day they are not fighting against one another at all. The war is waged by each ruling group against its own subjects, and the object of the war is not to make or prevent conquests of territory, but to keep the structure of society intact.\n\nThe peculiar pressure that it exerted on human beings between the Neolithic Age and the early twentieth century has disappeared and been replaced by something quite different. The effect would be much the same if the three super-states, instead of fighting one another, should agree to live in perpetual peace, each inviolate within its own boundaries. For in that case each would still be a self-contained universe, freed for ever from the sobering influence of external danger.\n\nA peace that was truly permanent would be the same as a permanent war."
 OCA_starting.2.a:0 "BIG BROTHER IS WATCHING YOU"
 OCA_starting.3.t:0 "Freedom Is Slavery"
 OCA_starting.3.desc:0 "They had confessed to intelligence to the enemy (At that date, too, the enemy was Eurasia), embezzlement of public funds, the murder of various trusted Party members, intrigues against the leadership of Big Brother which had started long before the revolution had happened, and acts of sabotage causing the deaths of hundreds of thousands of people.\n\nAfter confessing to these things they had been pardoned, reinstated in the Party, and given posts that were in fact sinecures but which sounded important. All three had written long, abject articles in The Times, analysing the reasons for their defection and promising to make amends."
 OCA_starting.3.a:0 "BIG BROTHER IS WATCHING YOU"
 OCA_starting.4.t:0 "Ignorance Is Strength"
 OCA_starting.4.desc:0 "Throughout recorded time, and probably since the end of the Neolithic Age, there have been three kinds of people in the world, the High, the Middle, and the Low. They have been subdivided in many ways, they have borne count- less different names, and their relative numbers, as well as their attitude towards one another, have varied from age to age: but the essential structure of society has never altered. Even after enormous upheavals and seemingly irrevocable changes, the same pattern has always reasserted itself, just as a gyroscope will always return to equilibrium, however far it is pushed one way or the other. The aims of these groups are entirely irreconcilable...\n\nWinston stopped reading, chiefly in order to appreciate the fact that he was reading, in comfort and safety. He was alone: no telescreen, no ear at the keyhole, no nervous impulse to glance over his shoulder or cover the page with his hand. The sweet summer air played against his cheek. From somewhere far away there floated the faint shouts of children: in the room itself there was no sound except the insect voice of the clock. He settled deeper into the arm-chair and put his feet up on the fender.\n\nIt was bliss, it was etemity."
 OCA_starting.4.a:0 "BIG BROTHER IS WATCHING YOU"
 OCA_starting.5.t:0 "Hate Rally"
 OCA_starting.5.desc:0 "As usual, the face of Emmanuel Goldstein, the Enemy of the People, had flashed on to the screen. There were hisses here and there among the audience. The little sandy-haired woman gave a squeak of mingled fear and disgust. (how long ago, nobody quite remembered), had been one of the leading figures of the Party, almost on a level with Big Brother himself, and then had engaged in counter-mysteriously escaped and disappeared. The programmes of the Two Minutes Hate varied from day to day, but there wasnone in which Goldstein was not the principal figure. He was the primal traitor, the earliest defiler of the Party's purity. All subsequent crimes against the Party, all treacheries, acts of sabotage, heresies, deviations, sprang directly out of his teaching. Somewhere or other he was still alive and hatching his conspiracies: perhaps somewhere beyond the sea, under the protection of his foreign paymasters, perhaps even - so it was occasionally rumoured - in some hiding place in Oceania itself.\n\nWinston's diaphragm was constricted. He could never see the face of Goldstein without a painful mixture of emotions. It had begun. A montage of Goldstein and Eurasian military faces. Scenes of warfare and destruction, the enemies screaming blasphomies at Oceania and Big Brother himself. And the crowds raged against what was show, displaying their hate toward the enemies, with a girl even shouting 'Swine!' behind him when the face of Goldstein reemerged. The horrible thing about the Two Minutes Hate was not that one was obliged to act a part, but, on the contrary, that it was impossible to avoid joining in. It was sheep-like, but the conformity of the event, the emotions were impossible to ignore.\n\nEven Winston himself was ensared in the terrible ensemble of the Two Minutes Hate."
 OCA_starting.5.a:0 "BIG BROTHER IS WATCHING YOU"
 OCA_starting.6.t:0 "April 4th, 1984"
 OCA_starting.6.desc:0 "Last night to the flicks. All war films. One very good one of a ship full of refugees being bombed somewhere in the Mediterranean. Audience much amused by shots of a great huge fat man trying to swim away with a helicopter after him, first you saw him wallowing along in the water like a porpoise, then you saw him through the helicopters gunsights, then he was full of holes and the sea round him turned pink and he sank as suddenly as though the holes had let in the water, audience shouting with laughterwhen he sank. Then you saw a lifeboat full of children with a helicopter hovering over it. There was a middle-aged woman might have been a Jewess sitting up in the bow with a little boy about three years old in her arms. Little boy screaming with fright and hiding his head between her breasts as if he was trying to burrow right into her and the woman putting her arms round him and comforting him although she was blue with fright herself, all the time covering him up as much as possible as if she thought her arms could keep the bullets off him.\n\nThen the helicopter planted a 20 kilo bomb in among them terrific flash and the boat went all to matchwood. Then there was a wonderful shot of a child's arm going up up up right up into the air a helicopter with a camera in its nose must have followed it up and there was a lot of applause from the party seats but a woman down in the prole part of the house suddenly started kicking up a fuss and shouting they didnt oughter of showed it not in front of kids they didnt it aint right not in front of kids it aint until the police turned her turned her out I dont suppose anything happened to her nobody cares what the proles say typical prole reaction they never--'\n\nWinston stopped writing, partly because he was suffering from cramp. He did not know what had made him pour out this stream of rubbish. But the curious thing was that while he was doing so a totally different memory had clarified itself in his mind, to the point where he almost felt equal to writing it down. It was, he now realized, because of this other incident that he had suddenly decided to come home and begin the diary today."
 OCA_starting.6.a:0 "The woman he saw at the Two Minutes Hate"
 OCA_starting.7.t:0 "Doubleplusgood"
 OCA_starting.7.desc:0 "All converstation ceased as the telescreen pinged to signal the day's big announcement\n\nBrothers and sisters,  the battle for production has been won. Completed returns show that the standard of living has risen by no less than 20 percent over the last year.\n\nAll over Oceania there've been spontaneous demonstrations of Party workers voicing their gratitude and joy!\n\nIn honor of this massive overfulfillment of the ninth three-year plan, it's been announced that chocolate ration is to be increased to 25 grams per week!\n\nAll present in the room clapped and applauded in approval, pleased with the news and the soon-to-come 'increase' of the beloved chocolate rations."
 OCA_starting.7.a:0 "BIG BROTHER IS WATCHING YOU"
 OCA_starting.8.t:0 "Two Different Worlds"
 OCA_starting.8.desc:0 "\"You can turn it off!\" Winston exclaimed, in awe of the telescreen actually being turned off.\n\n\"Yes,\" said O'Brien, \"we can turn it off. We have that privilege.\"\n\nHe was opposite them now. His solid form towered over the pair of them, and the expression on his face was still indecipherable. He was waiting, somewhat sternly, for Winston to speak.\"Shall I say it, or will you?\" he asked.\n\n\"I will say it,\" said Winston promptly.\n\n\"That thing is really turned off?\"\n\n\"Yes, everything is turned off. We are alone.\"\n\n\"We have come here because-\"\n\nHe paused, realizing for the first time the vagueness of his own motives. Since he did not in fact know what kind of help he expected from O'Brien, it was not easy to say why he had come here. He went on, conscious that what he was saying must sound both feeble and pretentious:\"We believe that there is some kind of conspiracy, some kind of secret organization working against the Party, and that you are involved in it. We want to join it and work for it. We are enemies of the Party. We disbelieve in the principles of INGSOC. We are thought-criminals. We are also adulterers. I tell you this because we want to put ourselves at your mercy. If you want us to incriminate ourselves in any other way, we are ready.\"\n\nO'Brien sized them up for a moment before humming and walking over to a nearby cabinent, taking a bottle and some glasses out before returning to his desk.\n\n\"It is called wine\" said O'Brien with a faint smile as he poured the red liquid into the glasses before gesturing for Julia and Winston to take a glass which they did.\n\n\"You will have read about it in books, no doubt. Not much of it gets to the Outer Party, I am afraid.\"\n\nHis face grew solemn again, and he raised his glass: \"I think it is fitting that we should begin by drinking a health. To our Leader: To Emmanuel Goldstein\" O'Brien spoke, pausing for a moment before they all took a sip of the wine, O'Brien's lips twisting into a slight smirk as the drink hid his deceptive expression."
 OCA_starting.8.a:0 "A false sense of security"
 OCA_starting.9.t:0 "Betrayal!"
 OCA_starting.9.desc:0 "At every few moments the fury of the crowd boiled over and the voice of the speaker was drowned by a wild beast-like roaring that rose uncontrollably from thousands of throats. The most savage yells of all came from the schoolchildren. The speech had been proceeding for perhaps twenty minutes when a messenger hurried on to the platform and a scrap of paper was slipped into the speaker's hand. He unrolled and read it without pausing in his speech. Nothing altered in his voice or manner, or in the content of what he was saying, but suddenly the names were different. Without words said, a wave of understanding rippled through the crowd.\n\nOceania was at war with Eastasia!"
 OCA_starting.9.a:0 "BIG BROTHER IS WATCHING YOU"
 OCA_starting.10.t:0 "News From The Malabar Front"
 OCA_starting.10.desc:0 "'Attention! Your attention, please! A newsflash has this\nmoment arrived from the Malabar front. Our forces in South\nIndia have won a glorious victory. I am authorized to say\nthat the action we are now reporting may well bring the war\nwithin measurable distance of its end."
 OCA_starting.10.a:0 "BIG BROTHER IS WATCHING YOU"
 OCA_starting.11.t:0 "Stop Right There!"
 OCA_starting.11.desc:0 "The birds sang, the proles sang. the Party did not sing. All round the world, in London and New York, in Africa and Brazil, and in the mysterious, forbidden lands beyond the frontiers, in the streets of Paris and Berlin, in the villages of the endless Russian plain, in the bazaars of China and Japan—everywhere stood the same solid unconquerable figure, made monstrous by work and childbearing, toiling from birth to death and still singing. Out of those mighty loins a race of conscience beings must one day come. You were the dead, theirs was the future. But you could share in that future if you kept alive the mind as they kept alive the body, and passed on the secret doctrine that two plus two make four.\n\n'We are the dead,' he said.\n'We are the dead,' echoed Julia dutifully.\n'You are the dead,' said an iron voice behind them.\n\nThey sprang apart. Winston's entrails seemed to have turned into ice. He could see the white all round the irises of Julia's eyes. Her face had turned a milky yellow. The smear of rouge that was still on each cheekbone stood out sharply, almost as though unconnected with the skin beneath.\n\n'You are the dead,' repeated the iron voice.\n'It was behind the picture,' breathed Julia.\n'It was behind the picture,' said the voice. 'Remain exactly where you are. Make no movement until you are ordered.'\n\nIt was starting, it was starting at last! They could do nothing except stand gazing into one another's eyes. To run for life, to get out of the house before it was too late—no such thought occurred to them. Unthinkable to disobey the iron voice from the wall. There was a snap as though a catch had been turned back, and a crash of breaking glass. The picture had fallen to the floor uncovering the telescreen behind it.\n\n'Now they can see us,' said Julia.\n'Now we can see you,' said the voice. 'Stand out in the middle of the room. Stand back to back. Clasp your hands behind your heads. Do not touch one another.'\n\nThey were not touching, but it seemed to him that he could feel Julia's body shaking. Or perhaps it was merelythe shaking of his own. He could just stop his teeth from chattering, but his knees were beyond his control. There was a sound of trampling boots below, inside the house and outside. The yard seemed to be full of men. Something was being dragged across the stones. The woman's singing had stopped abruptly. There was a long, rolling clang, as though the washtub had been flung across the yard, and then a confusion of angry shouts which ended in a yell of pain.'The house is surrounded,' said Winston.\n\n'The house is surrounded,' said the voice.\n\nHe heard Julia snap her teeth together.\n\n'I suppose we may as well say good-bye,' she said.\n'You may as well say good-bye,' said the voice."
 OCA_starting.11.a:0 "BIG BROTHER IS WATCHING YOU"
 OCA_starting.12.t:0 "The Last Man on Earth"
 OCA_starting.12.desc:0 "\"Do you believe in God, Winston?\"\n\n\"No.\"\n\n\"Then what is it, this principle that will defeat us?\"\n\n\"I don\"t know. The spirit of Man.\"\n\n\"And do you consider yourself a man?\"\n\n\"Yes.\"\n\n\"If you are a man, Winston, you are the last man. Your kind is extinct; we are the inheritors. Do you understand that you are ALONE? You are outside history, you are non existent.\" O'Brien spoke, before his manner changed and he said more harshly. \"And you consider yourself morally superior to us, with our lies and our cruelty?\"\n\n\"Yes, I consider myself superior.\"\n\nO'Brien did not speak before unclasping Winston's restraints and hauling him to his feet before a mirror.\n\n\"You are the last man,\" said O'Brien. \"You are the guardian of the human spirit. Look at you. Filthy\" O'Brien spoke with a sneer before spinning Winston around to face him.‘You have thought sometimes,' said O'Brien, \"that my face - the face of a member of the Inner Party - looks old and worn. Yet look at you. I could snap your neck like a carrot. Do you know that you have lost twenty-five kilograms since you have been in our hands? Even your hair is coming out in handfuls. Look!\" He plucked at Winston's head and brought away a tuft of hair.\n\n\"Open your mouth. Look here!\"\n\nHe seized one of Winston's teeth between his powerful thumb and forefinger. A twinge of pain shot through Winston's jaw. O'Brien had wrenched the loose tooth out by the roots. He tossed it across the cell.\n\n\"You are rotting away,\" he said; \"you are falling to pieces. What are you? A bag of filth. Now turn around and look into that mirror again. Do you see that thing facing you? That is the last man.\""
 OCA_starting.12.a:0 "\"If you are human, that is humanity.\""
 OCA_starting.13.t:0 "The Confession of Winston Smith"
 OCA_starting.13.desc:0 "Walking through the limited greenspace left in the city of London, working men and women passed by a large telescreen, a rusted and decaying structure, yet still active and displaying the endless broadcast of Oceania. On the screen was none other than Winston Smith, an Outer Party member turned an agent of Goldstein.\n\n\"I accuse myself of the following crimes.\nI have seduced Party members of both sexes\nI have been to the proletarian areas\nI deliberately contracted syphilis in order to spread the disease to my wife and other Party members.\nTogether with other agents, I have counterfeited banknotes, wrecked industrial machinery, polluted the water supply, guided Eurasian rocket bombs to targets on Airstrip One by means of coded radio signals.\nI stand here, a victim of the influence of Emmanuel Goldstein.\nGuilty on all counts.\nI'm glad I was caught.\nI was mentally deranged.\nNow, I am cured.\nI ask only for you to accept my love of our leader.\n I ask only to be shot while my mind is still clean.\"\n\nGlancing up at the telescreen, an older man simply sighed at the screen above.\n\n\"Another one gone\" He mumbled quietly to himself."
 OCA_starting.13.a:0 "Big Brother Is Watching You"
 OCA_starting.14.t:0 "BIG BROTHER IS WATCHING YOU"
 OCA_starting.14.desc:0 "WAR IS PEACE.\nFREEDOM IS SLAVERY.\nIGNORANCE IS STRENGTH."
 OCA_starting.14.a:0 "BIG BROTHER IS WATCHING YOU"
 OCA_starting.15.t:0 "The Chestnut Tree Cafe"
 OCA_starting.15.desc:0 "Winston sat before the chest board alone in the Chestnut Cafe, something he had long grown accustomed to now. He toyed with one of the pieces, a pawn.\n\n'Fitting' Winston thought to himself, sighing as he dropped the piece onto the board and rubbed his eyes.\n\nHe glanced around, noting the other regulars of the cafe, aside from the Party doctors and guards. Rutherford, Aaronson, and Jones. It was funny really. They were higher up Party Officials back in the day. He was just a man from the Ministry of Truth, nobody of any real importance. Not really. Yet, here they were under one roof, waiting for the day of their deaths... should that ever come. Winston couldn't really be sure. He was promised death when he least expected it, but as he sat there, he began to wonder if they would ever follow through with that threat or if it was just another ploy designed to keep him and the others from reverting back to who they used to be.\n\n\"I guess time will tell\" Winston murmured to himself, barely a whisper.\n\nHe looked over at the telescreen nearby, his tired eyes watching another news report about some great Oceanian victory against Eurasia... or was it East Asia? Did it even matter who they were fighting at this point?\n\nWinston exhaled, glancing back down at the table, at the pawn that was laid down on the board, no long standing but seeming to be utterly defeated. Representative of many people these days, just another example of a pawn of the Party being defeated by its own master."
 OCA_starting.15.a:0 "Is this all we are to be now?"
 OCA_SLAW.1.t:0 "PARTY REPORT - SOUTH AMERICA"
 OCA_SLAW.1.desc:0 "BRAZIL:\nMilitary remnants lead by General João Figueiredo have been undergoing a campaign of uniting the other states of Brazil, consolidating territory under his rule with expressed aims to reconquer Brazil's lost eastern territories. Brazil, even in it's weakened state, could still pose a problem when combined with the rest of South America. We cannot afford to leave Brazil to it's own devices.\n\nSOUTH AMERICAN UNITED FRONT:\nUnder the leadership of Augusto Pinochet of Chile, the South American United Front, whilst inferior to us in terms of manpower resources, makes up for it in dicipline and shared vision for the continent. The organisation has proven fruitful in squashing old rivalries for the sake of survival, our presence on the continent allowing for a common enemy to keep this diverse faction unified against us. There is no simple way to undermine that unity that can prove viable in the long term. The only solution that there is to resolve the issue of this threat is to crush them before they gather enough strength to keep Oceania out permanently"
 OCA_SLAW.1.a:0 "Mercy can no longer be granted by Big Brother."
 OCA_SLAW.2.t:0 "OPERATION: GRIDLOCK"
 OCA_SLAW.2.desc:0 "The time has come for South America to be brought into the fold of Oceania. Our troops and industrial capabilities are ready for the fight ahead, prepared to take advantage of Entente weakness in West Africa and crush their only allies in the Western Hemisphere. The fight will not be easy, and they will most certainly resist our efforts, but Oceania has endured sacrifice once more, and to secure the continued greatness of Ocenaia, our people will sacrifice once again."
 OCA_SLAW.2.a:0 "The time has come."
 OCA_SLAW.3.t:0 "Priorities"
 OCA_SLAW.3.desc:0 "As the war in South America continues to devastate the land and drain resources, the need of reinforcements grows ever higher. Specifically, specialised divisions that can assist in jungle and mountain warfare.\n\nBut given resource constraints as a result of global and domestic military obligations, we can only provide three specialised divisions capable of fighting in a specific terrain.\n\nEither mountaineers to fight in the mountains to the west, or marines to fight in the Amazon.\n\nWith the Andes and Amazonian fronts being pressed by South American military forces, the question now is which front will recieve their requested specialised troops?"
 OCA_SLAW.3.a:0 "The mountain front must be secured!"
 OCA_SLAW.3.b:0 "The Amazon is the key to all of South America!"
 OCA_collapse.1.t:0 "Whispers of the Anti-Revolution"
 OCA_collapse.1.desc:0 "Across Oceania, similar to the disorder taking place in Eurasia and Eastasia, growing whispers of discontent and rebellion have emerged. Whispers of a hidden army in the Rocky Mountains and the Amazon Rainforest continue to circulate, movements in the frontiers of Australiasia and the vast territories of the Cape Province.\n\nSomething is coming, something that will test Oceania and the success of the Revolution.\n\nThe Anti-Revolution is coming. We must prepare."
 OCA_collapse.1.a:0 "We must prepare"
 OCA_collapse.2.t:0 "Whispers in Africa"
 OCA_collapse.2.desc:0 ""
 OCA_collapse.2.a:0 "Be weary. Be very weary"
 OCA_collapse.3.t:0 "African Bush War"
 OCA_collapse.3.desc:0 ""
 OCA_collapse.3.a:0 "Wipe out any rebels you find!"
 OCA_collapse.4.t:0 "Outposts in the Outback Going Dark"
 OCA_collapse.4.desc:0 ""
 OCA_collapse.4.a:0 "Something is coming"
 OCA_collapse.5.t:0 "Australiasia Revolt"
 OCA_collapse.5.desc:0 ""
 OCA_collapse.5.a:0 "They're little fish in a very large pond"
 OCA_collapse.5.b:0 "G'day, mate"
 OCA_collapse.6.t:0 "Instability in North America"
 OCA_collapse.6.desc:0 "Chaos continues to spread across Oceania, old remnants and dissidents inspired by the war in Latin America and the outbreaks of old world remnants in Africa and Australiasia have begun to organise on a massive scale. Old World governments are crawling out of the holes they have hidden themselves in and eccentric figures have emerged, rallying the proles enmass in a bid to secure their own fiefdom.\n\nWar will come to North America, it's only a matter of when."
 OCA_collapse.6.a:0 "We must prepare."
 OCA_collapse.7.t:0 "Second American Revolution"
 OCA_collapse.7.desc:0 "After many long decades, the remnants of the old capitalist regime and numerous opportunitists have revealled themselves with the goal to join in the Anti-Revolution against Big Brother. Stockpiles are being unburied, towns and cities seized with ruthless efficiency and waving their old world flag in defiance of Big Brother.\n\nAfter all these years of our rule, the so called 'Second American Revolution' is upon us."
 OCA_collapse.7.a:0 "Let them come"
 OCA_collapse.8.t:0 "Whispers of Smith"
 OCA_collapse.8.desc:0 ""
 OCA_collapse.8.a:0 "We will not fail!"
 OCA_collapse.8.b:0 "The end of this is coming. For all of us"
 OCA_collapse.9.t:0 "Airstrip One Revolt"
 OCA_collapse.9.desc:0 ""
 OCA_collapse.9.a:0 "Round Two"
 OCA_frontier.1.t:0 "The Chaos Escalates"
 OCA_frontier.1.desc:0 "As predicted, the Bush War has escalated with rebel groups actively seizing urban centres and taking direct control over factories, mines, and numerous other resources to sustain their movements and restart their nations.\n\nIn Southern Rhodesia, we've seen the so-called Rhodesians seizing the city of Bulawyo. In Luanda, Angolan Marxist forces have seized the city. In Madagascar, rebel forces have assumed control over southern sections of the island, and in the resource rich Katanga, the entire regional administration was overthrown with a new Republic founded in its place.\n\nIt seems the worse has come at last. The Bush War has escalated and the land will stained with the blood of the many and weary."
 OCA_frontier.1.a:0 "Everyone to arms!"
 OCA_frontier.1.b:0 "For Rhodesia!"
 OCA_frontier.2.t:0 "FRONTIER REPORT: BUSH WAR ESCALATION!"
 OCA_frontier.2.desc:0 "Reports coming in from officials from the Frontier territories of Africa have reported that control over the situtation against rebel forces in its territories has grown out of control.\n\nFrom the Rhodesians in Southern Rhodesia to Afro-Marxist Nationalists in Angola and Madagascar, the situation has shifted from insurgency and guerilla movements to full open warfare.\n\nThe administrators have requested assistance from Oceania proper, asking that additional resources and men be sent in to restore order to the region and put down the rebels for good."
 OCA_frontier.2.a:0 "We will do what we can"
 OCA_exposed.1.t:0 "Big Brother Exposed!"
 OCA_exposed.1.desc:0 ""
 OCA_exposed.1.a:0 "Control the situation!"
 OCA_victory.1.t:0 "The Anti-Revolution Destroyed"
 OCA_victory.1.desc:0 "Joseph sat in the holding cell, waiting quietly for the guards to inevitably take him to the dreaded Room 101. He didn't know what he was expecting. He took up arms against Big Brother, joined Winston in his fruitless effort to try depose Big Brother and look where that landed him, back in the grips of Big Brother and in an even worse position than he could have possibibly imagine.\n\n\"Damn him\" Joseph muttered under his breath.\n\n\"Damn Winston, damn his words. Damn him for roping us all into it!\" He continued, gritting his teeth in frustration as he held his head in his hands.\n\nHe exhaled, a look of defeat emerging on his face.\n\n\"And damn me for falling for it\"\n\nThe door opened and the officer heading his case, followed by a set of guards entered the room with cold, emotionless expressions on their face.\n\nIt was time to go."
 OCA_victory.1.a:0 "No more traitors"
 OCA_victory.2.t:0 "The Villainization of Winston"
 OCA_victory.2.desc:0 "Jennifer walked through the streets of New York, otherwise known as Polis-Two, with a solemn look on her face. Like many others, whispering in the dark away from prying ears, she had hoped that the revolt out west would lead to change. She had hoped that when she looked up at the towering concrete structures that ruled the city, she'd see the old Red, White, and Blue waving proudly like it had done once long ago during the days when she was a child before everything went wrong.\n\nBut she should have known better than to hope.\n\nOceania's flag waved on like it always did, with posters of Big Brother and his fixed gaze glaring deep into her soul no matter where she went. In addition to that was a poster of a redheaded man from Airstrip One, seemingly made the new Goldstein. Apparently, this Winston was the leader of a revolt over in England, whether that was true or not, she didn't know and perhaps it didn't really matter anyway.\n\nOceania had someone new to hate, someone to fuel the system they were all stuck in.\n\nThe face had changed but life still went on."
 OCA_victory.2.a:0 "Forever Stained"
 OCA_victory.3.t:0 "Anti-Revolution Trials"
 OCA_victory.3.desc:0 "Victory Square was unusually quiet as they brought out the next set of traitors to be executed publicly before the crowds of fanatics that filled the place. They had been doing this for some time now, day in and day out. It seemed endless, the amount of supposed tratiors they had been executing. It would seem even the fanatics were beginning to be disturbed by the extent of the death.\n\nThey were used to Eurasians and East Asians being trucked out and executed, it was easier to hate someone who lived elsewhere, who were your supposed enemies. When it is your own people, its a different matter. Even in the most indoctrinated, there seemed to be a part of them that yearned to escape this show of death, to clamp their hands over their ears and shut their eyes.\n\nYet they knew better than to look away as the next set of men and women were placed against the wall, fear in their eyes as the soldiers with the rifles in their hands took aim at them.\n\nMany inhaled sharply, awaiting the fate they knew was sure to come for these people."
 OCA_victory.3.a:0 "Their cries remained forever on deaf ears"
 OCA_victory.4.t:0 "Forevermore"
 OCA_victory.4.desc:0 "YOU LOVE BIG BROTHER.\nYOU WILL LOVE BIG BROTHER WITH ALL YOUR SOUL AND MIND.\nDOWN WITH THE ANTI-REVOLUTIONARIES.\nDEATH TO WINSTON.\nDEATH TO REBELLION.\n\nYOU LOVE BIG BROTHER.\nYOU WILL LOVE BIG BROTHER WITH ALL YOUR SOUL AND MIND.\nDOWN WITH THE ANTI-REVOLUTIONARIES.\nDEATH TO WINSTON.\nDEATH TO REBELLION.\n\nYOU LOVE BIG BROTHER.\nYOU WILL LOVE BIG BROTHER WILL ALL YOUR SOUL AND MIND.\nDOWN WITH THE ANTI-REVOLUTIONARIES.\nDEATH TO WINSTON.\nDEATH TO REBELLION.\n\nYOU LOVE BIG BROTHER.\nYOU WILL LOVE BIG BROTHER WITH ALL YOUR SOUL AND MIND.\nDOWN WITH THE ANTI-REVOLUTIONARIES.\nDEATH TO WINSTON.\nDEATH TO REBELLION."
 OCA_victory.4.a:0 "Trapped Forever"