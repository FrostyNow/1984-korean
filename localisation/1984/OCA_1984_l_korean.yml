 OCA_The_Forever_War:0 "The Forever War"
 OCA_The_Forever_War_desc:0 "\n\n\n\n£GFX_OCA_The_Forever_War_Banner\n\n\n\n\n\n\n§WThe war is not meant to be won, it is meant to be continuous.\n\nHierarchical society is only possible on the basis of poverty and ignorance. This new version is the past and no different past can ever have existed. In principle the war effort is always planned to keep society on the brink of starvation. The war is waged by the ruling group against its own subjects and its object is not the victory over either Eurasia or East Asia, but to keep the very structure of society intact.§!"
 OCA_Surveillanced_Hierarchy:0 "Surveillanced Hierarchy"
 OCA_Surveillanced_Hierarchy_desc:0 "\n\n\n\n£GFX_OCA_Surveillanced_Hierarchy_Banner\n\n\n\n\n\n\n§WIn Oceania, all aspects of society are scrutinised by the watchful eyes of the Thought Police, the secretive guardians of the Revolution, allegiant to the higher will of Big Brother and the Party.\n\nThey often hide in plain sight, disguised as any other member of society, virtually invisible to the naked eye, yet keenly aware of you and where your loyalties. The higher up in the social ladder you are in Oceania, the more closely you are observed by the members of the Thought Police.\n\nPrivacy does not exist in Oceania, especially if you have something to hide.§!"
 OCA_Surveillanced_Hierarchy_Two:0 "Surveillanced Hierarchy"
 OCA_Surveillanced_Hierarchy_Two_desc:0 "\n\n\n\n£GFX_OCA_Surveillanced_Hierarchy_Banner\n\n\n\n\n\n\n§WIn Oceania, all aspects of society are scrutinised by the watchful eyes of the Thought Police, the secretive guardians of the Revolution, allegiant to the higher will of Big Brother and the Party.\n\nThey often hide in plain sight, disguised as any other member of society, virtually invisible to the naked eye, yet keenly aware of you and where your loyalties. The higher up in the social ladder you are in Oceania, the more closely you are observed by the members of the Thought Police.\n\nPrivacy does not exist in Oceania, especially if you have something to hide.§!"
 OCA_Serving_Big_Brother_Forever:0 "Serving Big Brother. Forever"
 OCA_Serving_Big_Brother_Forever_desc:0 "\n\n\n\n£GFX_OCA_Serving_Big_Brother_Forever_Banner\n\n\n\n\n\n\n§WLife is defined by the Party. Nothing can exist without the Party, for without the Party, life has no meaning. Big Brother, ever your provider, ensures your protection. All that is asked of you in return is your everlasting service and unquestionable loyalty. You will work to the best of your ability. You will sleep as needed. Eat as is required, and serve as if your life depends on it.\n\nAnd above all, you will love Big Brother with all of your heart.§!"
 OCA_Serving_Big_Brother_Forever_2:0 "Serving Big Brother. Forever"
 OCA_Serving_Big_Brother_Forever_2_desc:0 "\n\n\n\n£GFX_OCA_Serving_Big_Brother_Forever_Banner\n\n\n\n\n\n\n§WLife is defined by the Party. Nothing can exist without the Party, for without the Party, life has no meaning. Big Brother, ever your provider, ensures your protection. All that is asked of you in return is your everlasting service and unquestionable loyalty. You will work to the best of your ability. You will sleep as needed. Eat as is required, and serve as if your life depends on it.\n\nAnd above all, you will love Big Brother with all of your heart.§!"
 OCA_Serving_Big_Brother_Forever_3:0 "Serving Big Brother. Forever"
 OCA_Serving_Big_Brother_Forever_3_desc:0 "\n\n\n\n£GFX_OCA_Serving_Big_Brother_Forever_Banner\n\n\n\n\n\n\n§WLife is defined by the Party. Nothing can exist without the Party, for without the Party, life has no meaning. Big Brother, ever your provider, ensures your protection. All that is asked of you in return is your everlasting service and unquestionable loyalty. You will work to the best of your ability. You will sleep as needed. Eat as is required, and serve as if your life depends on it.\n\nAnd above all, you will love Big Brother with all of your heart.§!"
 OCA_The_Conscious_Of_Man:0 "The Conscious of Man"
 OCA_The_Conscious_Of_Man_desc:0 "\n\n\n\n£GFX_OCA_The_Conscious_Of_Man_Banner\n\n\n\n\n\n\n§WThe Party controls many things about Human beings. From the clothes we wear, and the food in our bellies to the job we work. All life is determined by the Party. In spite of their best efforts, there is one thing the Party can never control.\n\nConscious.\n\nYour mind belongs to you. The Party hates this and will work tirelessly to break you. But no matter how hard they try, they can never truly control your mind. Your thoughts, no matter how dangerous, are forever yours. So take heart, though the Party may take everything from you, even your life, your mind is forever yours.§!"
 OCA_The_Conscious_Of_Man_2:0 "The Conscious of Man"
 OCA_The_Conscious_Of_Man_2_desc:0 "\n\n\n\n£GFX_OCA_The_Conscious_Of_Man_Banner\n\n\n\n\n\n\n§WThe Party controls many things about Human beings. From the clothes we wear, and the food in our bellies to the job we work. All life is determined by the Party. In spite of their best efforts, there is one thing the Party can never control.\n\nConscious.\n\nYour mind belongs to you. The Party hates this and will work tirelessly to break you. But no matter how hard they try, they can never truly control your mind. Your thoughts, no matter how dangerous, are forever yours. So take heart, though the Party may take everything from you, even your life, your mind is forever yours.§!"
 OCA_Frontier_Crisis:0 "Frontier Crisis"
 OCA_Frontier_Crisis_desc:0 ""
 OCA_War_Is_Peace_idea:0 "War Is Peace"
 OCA_War_Is_Peace_idea_desc:0 "\n\n\n\n£GFX_OCA_War_Is_Peace_Banner\n\n\n\n\n\n\n§WWhen war becomes literally continuous, it also ceases to be dangerous. When war is continuous there is no suchthing as military necessity. Technical progress can ceaseand the most palpable facts can be denied or disregarded.\n\nAs we have seen, researches that could be called scientific are still carried out for the purposes of war, but they are essentially a kind of daydreaming, and their failure to show results is not important. Efficiency, even military efficiency, is no longer needed. Nothing is efficient in Oceania except the Thought Police§!"
