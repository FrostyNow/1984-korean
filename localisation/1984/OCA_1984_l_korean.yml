 OCA_second_american_war_decision_category:0 "South American War"
 OCA_second_american_war_decision_category_desc:0 "Despite the triumph of the 1970s which saw the much of the Latin American world inducted into the Oceanian sphere, the stubborn resistance in South America still continues.\n\nWith each passing day, South America grows stronger, threatening our dominance in the region. Brazil, once a shattered entity, has been reuniting it's lost territories in preparation to reclaim their western lands, and the rest of South America, unified under the South American United Front, has long prepared for war against us.\n\nOur next move is clear. South America must be dealt with swiftly and decisively before this vast landmass becomes the catalyst for our own downfall."
