l_korean:
 OCA_BOOKMARK_DESC:0 "The English Socialist States of Oceania rose from the ashes of the nuclear war that ravaged the early 1950s. This catastrophic conflict left the Western world in ruins and allowed the Soviet Union to seize Europe. In the aftermath, the Party of English Socialism, known as INGSOC, seized power, dismantling the frail old regime and replacing all political and social institutions with its own authoritarian rule.\n\nInitially, the Party promised significant change, capitalizing on the failures of the previous government to win the people's support. However, the transformation they delivered plunged the nation into an era of oppression and cultural annihilation. The once vibrant and powerful nations were suffocated under the Party's iron fist. Big Brother controls everything—he sees all, hears all, and wields absolute power. He has taken the place of God, mercilessly subjugating his territory and instilling fear wherever the Oceanian flag is raised.\n\nAs we enter the year 1984, we must confront a pivotal question: will this year unfold as before, or will it finally bring change for the long-suffering people of this land?"
 1984_Opening_Screen_OCA_Title_TT:0 "§qENGLISH SOCIALIST STATES OF OCEANIA§!"
 1984_Opening_Screen_OCA_Desc_TT:0 "A vast multi-continental nation stretching from the Americas to Australasia, from the British Isles to the southern half of Africa, the §qEnglish Socialist States of Oceania§! truly encompass the meaning of Super State. Formed following the nuclear war of the early 1950s which saw Europe fall to forces of the then §RUnion of Soviet Socialist Republics§!, Oceania was originally supposed to be a stronghold of global capitalism.\n\nBut it was their own hubris that lead to the rise of §REnglish Socialism§!, their ignorance to the plight of the masses leading to the revolution breaking out, engulfing the vast nation in a bloody civil war until only INGSOC remained, our enemies scattered and the rest of the so-called '§YNationalist§!' and '§YSeparatist§!' forces broken.\n\nToday, Oceania is a one party totalitarian state lead by the enigmatic §RBig Brother§!. Surveillance and control reigns in the urban centers, from §YLondon§! to §YMetropolis§!, whilst out in the countryside, the military patrols the plains and towns in search of partisan activity and lingering rebel cells still fighting for their old world ideals. The rule of Big Brother from the perspective of those within the Party and the cityscapes seems absolute, with the dream of rebellion a distant dream.\n\nBut beneath the surface, something is stirring in Oceania, something that may make or break Oceania as we know it §Rforever§!."
 1984_Opening_Screen_OCA_Gameplay_Paths_Desc_TT:0 "§YOceania Paths§!\n- Crush the §RAnti-Revolution§! and restore stability to all of Oceania.\n- Reconquer the fallen provinces, one invasion at a time.\n- Wage a global war to unite the Earth under the rule of §gBig Brother.§!\n\n§YOCEANIAN REVOLT TAGS§!\n- @ENG§RUnited English Partisan Network§!\n- @USA§mSecond Continental Army§!\n- @FLR§CRebel Army of Florida§!\n- @TEX§tTexan Liberation Army§!"
 1984_Opening_Screen_OCA_Button_TT:0 "Forevermore"
 1984_Opening_Screen_OCA_Province_Title_TT:0 "§q[This.GetName]§!"
 1984_Opening_Screen_OCA_Province_Desc_TT:0 "This is a province of §qOceania§!. Though many of the provinces of Oceania, aside from §gPeninsula One§!, §gThirteen Sectors§! and the §gFrontier Administration§! don't have unique content §Y(yet!)§!, there still exists generic content for you to squash the rebellions, retake Oceanian lands and reform the §qEnglish Socialist States of Oceania§!."
 1984_Opening_Screen_OCA_Province_Gameplay_Paths_Desc_TT:0 "§YOceanian Provinces Paths§!\n- Crush the revolters and restore order to the province.\n- Reclaim all fallen provinces and reunite Oceanian lands.\n\n§YAIRSTRIP ONE TAGS§!\n- @ENG§RUnited English Partisan Network§!\n\n§YMOUNTAIN ZONE ONE REVOLT TAGS§!\n- @USA§mSecond Continental Army§!\n\n§YRED PROVINCE REVOLT TAGS§!\n- @TEX§tTexan Liberation Army§!\n\n§YPENINSULA ONE REVOLT TAGS§!\n- @FLR§CRebel Army of Florida§!\n\n§YFRONTIER ADMINISTRATION REVOLT TAGS§!\n- @RHO§nRepublic of Rhodesia§!"
 1984_Opening_Screen_OCA_Province_Button_TT:0 "Big Brother is Watching"
 BIG_BROTHER_DESC:0 "§WThe enigmatic figure of Oceania, only known to the public and majority of the Party as Big Brother, rules Oceania with an iron fist, his will becoming the will of the Party and by extension, the nation. In other words, Big Brother represents Oceania and all it strives to be.\n\nThere are none greater nor wiser than our beloved Big Brother. Never has there been a man as great as he before, nor shall there ever be one to surpass him. Big Brother is life, and it is for him that you work and fight for our great Oceania. And remember, Big Brother is always watching.\n\nAssuming he's exists, of course.§!"
