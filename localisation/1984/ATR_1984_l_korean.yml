 ATR_Australiasia_Desc_tt:0 "The frontier of Oceania, the Party has pursued a different direction for this land compared to others. Here, efforts have been taken not just to subjegate the land and it's people, but to transform it entirely. Numerous terraforming projects have taken place, from the Bradfield Scheme seeking to increase waterflow inland to the even grander Eyre Canal, a Mega Project that saw mountains and landscpe be torn apart to create the Eyre Sea, which has brought in vast amounts of water and has contributed to the greening of the desert interior.\n\nThe hope of this Province is to create a land that is truly Oceanian in every way.\n\nLand carved and molded by Oceania.\nPeople that know no God other than Big Brother."
 ATR_Reconstruction:0 "Australiasian Reconstruction Zone"
