 CHI_Minsheng_idea_Three:0 "Minsheng"
 San_Min_Chu_i_idea:0 "San Min Chu-i"
 CHI_The_Second_Xinhai_Revolution:0 "The Second Xinhai Revolution"
 CHI_The_Second_Xinhai_Revolution_desc:0 "After many long years of waiting and preparing, the time has come for the National Revolutionary Army to emerge from the shadows of our homeland. Much like back in 1911 when the decaying Qing Dynasty was cast down from power, so too shall the Kim Dynasty have the reigns of power ripped from their hands by the might of Nationalist Forces."
 CHI_Start_The_Second_Northern_Expedition:0 "Start the Second Northern Expedition"
 CHI_Start_The_Second_Northern_Expedition_desc:0 "Though we have secured much of the south of the province, Beijing and the rest of the north is held firmly in the grasp of East Asia still. If we want to vanquish the enemy that has made a mockery of our people and nation for too long, we must begin the long and arduous offensive north toward the city of Beijing."
 CHI_Reopen_The_Central_Military_Academy:0 "Reopen the Central Military Academy"
 CHI_Reopen_The_Central_Military_Academy_desc:0 "If the National Revolutionary Army is to secure the future of China from the Juche menace, we need the best of the best leading our armies. By reopening the Central Military Academy as well as other relevant military instillations, we can begin the process of training the next generation of soldiers and officers."
 CHI_Human_Wave_Tactics:0 "Human Wave Tactics"
 CHI_Human_Wave_Tactics_desc:0 "Don't fight a land war in Asia.\n\nThese are the words that have long defined the consequences of warfare in China. The fact is that China is a land of a billion people, with each province containing tens of millions of our countrymen.\n\nThe manpower resources of China can allow us to endure the enemy for as long as it takes. We used this advantage to hold off the Japanese Imperial Army during World War 2 and we will use it again against our current foes."
 CHI_The_Third_United_Front:0 "The Third United Front"
 CHI_The_Third_United_Front_desc:0 "When the Japanese first invaded China decades ago following the Marco Polo Bridge incident, we were forced to work together with the warlords and opposition factions that had long infested our territory in order to force back the common foe from our homeland.\n\nIf we want to stand any kind of chance against the combined might of East Asia and liberate our nation, then we must extend an olive branch once more and come together to free China for a second time."
 CHI_Coordinate_Our_Armies:0 "Coordinate our Armies"
 CHI_Coordinate_Our_Armies_desc:0 "If this alliance is going to accomplish anything, it has to be together. We must set aside our ideological differences and goals and focus on what truly matters. The complete destruction of East Asia. To do this, we must increase the level of coordination and cooperation between our militaries.\n\nAfter all. Our differences are meaningless if we are all dead."
 CHI_Exterminate_The_Stain_Of_Juche:0 "Exterminate the Stain of Juche"
 CHI_Exterminate_The_Stain_Of_Juche_desc:0 "There can be no future in which Juche is allowed to persist in China. In the brief time they have been in control of our homeland, they have brought forth untold cultural destruction to our people and committed numerous atrocities in the name of enforcing their hold upon our nation.\n\nNo more. No matter what it takes, no matter how long it takes, the threat of Juche will be driven away from our lands!"
 CHI_Mobilising_The_Workforce:0 "Mobilising the Workforce"
 CHI_Mobilising_The_Workforce_desc:0 "The liberation of China is at hand. If triumph is what we seek, then we need all available hands on deck. If you cannot fight on the battlefield, then you will support our troops by any means necessary, whether that be harvesting the fields and sustaining the production lines."
 CHI_Kickstart_Industrial_Development:0 "Kickstart Industrial Development"
 CHI_Kickstart_Industrial_Development_desc:0 "The forces of Juche brought industry to China, not for the betterment of our people, but to sustain their endless wars to the south and constant skirmishes against Eurasia to the North. While many of these facilities have fallen into our hands and have proven themselves useful in the war, this will not do in the long term. We must invest in the rapid industrialisation of China as soon as possible, in order to secure the strength and security of the Chinese nation."
 CHI_Enhance_Production_Methods:0 "Enhance Production Methods"
 CHI_Enhance_Production_Methods_desc:0 "The backwards and archaic ways in which East Asia ran industrial facilties will simply not do for the current situation. If East Asia wants to continue being inefficient in the name of keeping workers in line, they can do that. We, on the otherhand, will innovate and refine our production methods as much as possible to ensure maximum efficiency and output for the war effort."
 CHI_Ransack_The_EAPA_Armories:0 "Ransack the EAPA Armories"
 CHI_Ransack_The_EAPA_Armories_desc:0 "Within our territory, there exist numerous depots and warehouses stocked with East Asian military equipment that remain unused. With the EAPA presently unable to access these weapons, I'm sure they wouldn't mind us making use of their stockpiles."
 CHI_Innovation_For_Liberation:0 "Innovation for Liberation"
 CHI_Innovation_For_Liberation_desc:0 "There cannot be victory in the fight against the East Asians unless we can outclass them in the field of technological development. Much like the other super states, East Asia is slow to roll out technologies, more prone to sink resources into experimental technological endeavours that rarely bare fruit. This leaves their forces and industries outdated and slow to modernise.\n\nBy restarting our own Research & Development Sectors and focusing on innovating existing technologies, we can quickly turn their disadvantage into our advantage."
 CHI_The_Miracle_On_The_Yangtze:0 "The Miracle on the Yangtze"
 CHI_The_Miracle_On_The_Yangtze_desc:0 "With all our capabilities combined, we are now ready to sustain the long war for Chinese reunification. The Yangtze River, the lifeblood of the nation, now home to numerous industrial and research facilities focused on propelling the nation forward. From our springboard here on the Yangzte shall we spread out and reunite China under the invincible banner of the white sun against the blue sky!"
 CHI_Reviving_Our_Past:0 "Reviving our Past"
 CHI_Reviving_Our_Past_desc:0 "China's past is long and it is ancient. Sadly, the Juche Regime made it their objective in this land to twist and weave themselves into the legacy of China, making themselves seem integral to our nation and our history whislst undermining the past Emperors and figures that came before. We must counteract the spread of these falsities and teach the youth the true glory of their ancestral land."
 CHI_The_Question_Of_Autonomy:0 "The Question of Autonomy"
 CHI_The_Question_Of_Autonomy_desc:0 "Han Chinese may be the largest ethnic group in all of China, we are not the only group. To the west, north and south, there exist many different groups and identities such as Tibetans and Mongols. Many of these lands have had a long history being part of the Chinese nation in some way, shape or form. With the war for the liberation of China underway, the question of what the status of these groups will be in relation to a resurgent China becomes ever more prevalent."
 CHI_Instill_Confucian_Values:0 "Instill Confucian Values"
 CHI_Instill_Confucian_Values_desc:0 "For a long time now, East Asia has attempted to uproot the faiths and philosophies of China in favour of instilling their state-backed Chondoist faith upon the populace. They took over many temples and shrines, distorting them to suit the needs of the 'People's Faith'.\n\nNo more shall we submit to this alien doctrine. One step at a time, we shall reclaim our temples and shrines for our people and begin the restoration of China's Confucian legacy."
 CHI_Reinstating_Tridemism:0 "Reinstating Tridemism"
 CHI_Reinstating_Tridemism_desc:0 "Nationalism. Democracy. Welfare.\n\nIt was these principles that served as the basis for the Kuomintang, the very bedrock through which our vision is founded upon. Though granted, we are a long way from realising the vision of Sun Yat-sen in full, we can begin the process of spreading these ideals through government and populace to ensure that when the war is over and the work begins, we will have a strong popular framework in plcae."
 CHI_Legacy_Of_The_Generalissimo:0 "Legacy of the Generalissimo"
 CHI_Legacy_Of_The_Generalissimo_desc:0 "When the Japanese came to wage war against all of China in 1937, it was the Generalissimo Chiang Kai-shek who stood firm as the leader of China, fighting back against the barbaric Japanese Imperial Army. Through his will and determination, and the combined strength of our people, we were able to repel the Japanese from our shores.\n\nMuch like the Generalissimo, so too must we do as he once did and repel the menace of Juche from our homeland!"
 CHI_Years_Of_Civilisation_Reborn:0 "Years of Civilisation Reborn"
 CHI_Years_Of_Civilisation_Reborn_desc:0 "After decades of humiliation, decadence of foreign overlordship, the nation of China is finally rising again to reclaim her past glory. No more shall our civilisation be submissive and pushed around at the whim of distant powers, no. China shall take the reigns of her destiny once and for all!"
 CHI_Wansui:0 "Wansui!"
 CHI_Wansui_desc:0 "China is one of the oldest and greatest civilisations on Earth, it's history dating back thousands of years, enduring many eras and many more opponents. Though triumph or fall, our people and nation have always remained and the age of so called 'East Asia' was no different. Though there still exists many issues to resolve, including the other groups and organisations within China who now have less incentitive to work with us now that the foe is gone, the time to deal with that can wait.\n\nWe have a victory to celebrate."
 CHI_The_White_Sun_Over_China:0 "The White Sun Over China"
 CHI_The_White_Sun_Over_China_desc:0 "After years of battle and struggle, China has finally been liberated from the threat of Juche. With the White Sun triumphant, the next era of China can begin."
 CHI_In_The_Footsteps_Of_The_Generalissimo:0 "In the Footsteps of the Generalissimo"
 CHI_In_The_Footsteps_Of_The_Generalissimo_desc:0 "Like the Generalissimo before it, it was a strong and decisive leader that secured victory for all of China. Whilst it is important for there to be the various Yuan's in control and for the will of the people to be adhered to, we must be mindful of the bloat of bureaucracy.\n\nTherefore, to ensure China doesn't become bogged down by administrative indecision, ensuring a strong executive office is the best way to ensure a flexible and active Republic."
 CHI_Staying_True_To_The_Three_Principles:0 "Staying True to the Three Principles"
 CHI_Staying_True_To_The_Three_Principles_desc:0 "The Kuomintang was built upon the foundations of the Three Principles, set out by the late Dr Sun Yat-sen. To endure all these years of war and pain just to turn our backs on the very ideas we fought for would be the greatest betrayal to his memory and our people."
 CHI_Minzu:0 "Minzu"
 CHI_Minzu_desc:0 "The first principle of reinvigorated China is Minzu.\n\nMinzu, which can be summarised as Nationalism, the promotion China as a distinct people that inhabits a vast territory sharing a common history with over a billion people, with the overall objective being to bring together all peoples of China under a single banner."
 CHI_Reach_Out_To_Separatist_Govermnents:0 "Reach out to Separatist Governments"
 CHI_Reach_Out_To_Separatist_Govermnents_desc:0 "The last time China was divided, it lead to our ruin. We were vulnerable to outside powers, having to be bailed out by outside forces in order to prevent foreign dominion over the Chinese homeland. If China is to come into the new age a strong and decisive power, then the total unification of our homeland must be achieved.\n\nPeaceful or otherwise."
 CHI_Five_Races_Under_One_Union:0 "Five Races Under One Union"
 CHI_Five_Races_Under_One_Union_desc:0 "With the dominance of the Han peoples, it is often easy to forget that there are more people's that make up the Chinese Nation. Whilst the various minorities of China are not nearly as numerous as the Han Chinese, they still have a place within our nation and if the Kuomintang is to be seen positively and not the second coming of Juche, the issue of the Five Races must be resolved."
 CHI_Minquan:0 "Minquan"
 CHI_Minquan_desc:0 "The second principle of reinvigorated China is Minquan.\n\nMinquan, which can be described as Governance, is the idea that Chinese society must follow the General will of the nation. In other words, the popular will is adhered to. It sets out the framework for a Chinese state, from the five Yuan's to the Four Rights of the People."
 CHI_Decide_The_Republican_Capital:0 "Decide the Republican Capital"
 CHI_Decide_The_Republican_Capital_desc:0 "For a long time, the Kuomintang have maintained Nanjing as the capital of China. It was our capital through World War Two and it was our hub during the war against the forces of Juche. However, with North China liberated, new options for a capital city to govern our land have become available to us.\n\nChina has had many capitals over its long history. We should not let attachment to Nanjing blind us from the potential other great Chinese cities hold."
 CHI_Reinstate_The_Five_Power_Constitution:0 "Reinstate the Five Power Constitution"
 CHI_Reinstate_The_Five_Power_Constitution_desc:0 "With the situation over the homeland stablising and Chinese dominion over our territory solidified, the time for the reinstatement of the Five Power Constitution can finally take place, an important act toward securing the Kuomintang's legitimacy as the government of the people."
 CHI_Minsheng:0 "Minsheng"
 CHI_Minsheng_desc:0 "The third principle of reinvigorated China is Minsheng.\n\nMinsheng can be understood as social welfare in which the Chinese State set's out a series of policies and programs that can uplift the people of China, addressing the four core needs of the people, those being clothing, food, housing, and mobility. Whilst not hostile to capitalism, Minsheng does seek to keep capitalism in check."
 CHI_Rebuilding_Our_Nation:0 "Rebuilding our Nation"
 CHI_Rebuilding_Our_Nation_desc:0 "The Chinese Nation has long been devastated and left in a state of disrepair, even before the war of liberation against East Asia. Many cities were left in stagnant, decaying conditions, with most of the Juche Party's funds mostly reserved for industrial, military and administrative facilities.\n\nChina has a long road ahead of it, but if we want to ensure we keep the people's faith in the Kuomintang and do not repeat the failures of the past, we must begin the long process of rebuilding our land and fast."
 CHI_Sweeping_Land_Reform:0 "Sweeping Land Reform"
 CHI_Sweeping_Land_Reform_desc:0 "With the Collectivist policies of Juche swept away and the general chaos of the war over, there still remains the matter of land ownership and distribution. When East Asia ruled China, there was, as far as we are concerned, no land ownership outside of certain members of the Party Elite, which means that the Kuomintang almost owns every piece of land in the state with nobody having any definitive private ownership of their homes.\n\nThis simply will not do, this issue needs to be resolved and fast. Now, giving out swaths of land without a care isn't a great idea. However, by setting out a series of policies and programs designed to help our people gain land ownership, we can begin the long but fruitful process of ensuring every family in China owns their own home."
 CHI_China_Heroically_Stands_In_The_Universe:0 "China Heroically Stands in the Universe!"
 CHI_China_Heroically_Stands_In_The_Universe_desc:0 "China under the Kuomintang has rebounded from the ashes of Juche rule like a phoenix from the ashes. Though the road has been long, after so many decades of failure and struggle, the age of humiliation is over. With the next century around the corner, let the coming 2000s be the Chinese Century."
 CHI_starting.1.t:0 "Revolution Once More"
 CHI_starting.1.desc:0 "Chiang Wei-kuo waked through the city of Nanjing for the first time in a long time. No more was he a fugitive in enemy territory. No, here he was free. Nanjing was free, and soon, so would all of China be. Guards kept close by, ensuring that he could walk unimpeded. Triumphant or not, there would no doubt be Juche loyalists within the city that would seek to bring about his downfall in the name of their 'Supreme Leader'.\n\nLooking around on the walls and the street floors, propaganda posters were strewn about, ranging from praise for the Eternal Leader, to something about East Asia being allied with Eurasia against Oceania. He made a note to organise a clean up crew to rid the cities of lingering propaganda posters. They were mostly torn down and left in tatters by the people, and he was pleased to see that. But no Chinese city, especially Nanjing, ought to be a complete mess. More so then usual, anyway.\n\nBut that could wait. For today, he would enjoy time spent in newly liberated Nanjing.\n\nTomorrow, he would begin the liberation of all of China."
 CHI_starting.1.a:0 "China rises again!"
 CHI_starting.2.t:0 "The Second Northern Expedition"
 CHI_starting.2.desc:0 "Chiang enterd the war room, where an assembled group of generals and officers were located. Taking in the room, he raised his chin slightly, inhaling before exhaling slowly.\n\n\"History... it is said it doesn't repeat. But it does rhyme from time to time\" Chiang began, approaching the map on the table in the center of the room.\n\n\"Now, circumstances are different, but like the first time around when the early Kuomintang emerged amidst the chaost, we are headed for Beijing once more\" Chiang explained, pointing at the city on the map.\n\n\"Now, this won't be east. Of all the scattered news of rebellion and resistance throughout Asia, we've been given a... very difficult task. Beijing is no joke. The Juche Regime made it their capital. They will put as many slaves between us and themselves as possible. And the fact remains that, like it or not, there's no truce to be made, no compromise. If we do not take Beijing, we cannot declare triumph\" Chiang explained to each of the assembled military leadership, all giving him their ear, all listening intently.\n\nChian looked at each of them before slowly looking back at the map.\n\n\"This is it. The final stretch. Let's get it done.\""
 CHI_starting.2.a:0 "Beijing or Bust!"
 CHI_starting.3.t:0 "A Sense of Deja Vu"
 CHI_starting.3.desc:0 "After a series of lengthy negotiations and discussions across various secret bases, Chiang and Mao had both agreed to halt all hostilities for the time being in order to deal with the greater Juche threat at hand.\n\nThe irony was not lost on Chiang as he sat across the table from Mao Anying in an undisclosed location, as their fathers had done decades ago, once more they agreed to put their differences aside in the face of foreign occupation.\n\n\"Funny how we have to do this once more.\" Chiang bantered.\n\n\"Indeed, I could only imagine what our fathers are thinking at this current moment.\" Mao remarked.\n\nAs the agreements were finalised, a thought came to Chiang's head, one of worry as hostilities would inevitably resume once East Asia was dealt with. Still, Chiang recomposed himself swiftly as one thing was certain."
 CHI_starting.3.a:0 "Fate has an odd sense of repetition"
 CHI_starting.4.t:0 "Disdainful Correspondence"
 CHI_starting.4.desc:0 "The city streets were rife with violence as NRA forces clashed with Juche loyalists in a citywide cleanup operation following its recent liberation from East Asian forces. The vicious fighting was expected to last for days had it not been for the unexpected arrival of a group of PLA insurgents coming to the aid of the NRA, sweeping away the remaining Juche remnants.\n\nAs their forces recuperated, an insurgent with a cap adorned with the signature red star approached one of the NRA soldiers.\n\nTurning to face the young insurgent, the NRA soldier had a question he had been meaning to ask since the announcement of the cessation of hostilities between the NRA and PLA.\n\n\"I still don't get why you're helping us; the truce only stated that we're to cease fire on one another.\"\n\n\"Mao's orders, I would reckon that one of us being taken out would make things more difficult for the rest of us in the face of oblivion.\"\n\n\"I suppose so.\"\n\nA truck horn sounded as a soldier with a helmet adorned with the white sun beckoned to the NRA soldier.\n\n\"Well, it's time for me to leave. I suppose the next time we meet will be in battle once we eradicate the Juche scum.\"\n\n\"I'll be sure to have you treated less harshly once the revolution comes,\" the PLA insurgent quipped.\n\n\"Heh, I'll do the same should we win,\" the NRA soldier smirked."
 CHI_starting.4.a:0 "Kinship in the face of oblivion"
 CHI_starting.5.t:0 "KUOMINTANG SPECIAL ORDER: TOTAL MOBILISATION"
 CHI_starting.5.desc:0 "By directive of the Generalissimo Chiang Wei-kuo of the National Revolutionary Army, all able bodied civilians, if not fulfilling military roles, and are not currently working industrial or agricultural jobs, are hereby directed to go Kuomintang political or military offices to be assigned to fulfil a vital work role.\n\nFailure to be assigned to new work without proper reasoning or authorisation will result in immediate arrest and forcible assignment to work without the ability to choose your emergency role.\n\nYou may be exempt from this order if you are: Medically disabled (determined by doctor or medical officer), below the age of 18, above the age of 70, and/or given special assignment by military or Kuomintang officials."
 CHI_starting.5.a:0 "Arise to Duty!"
 CHI_starting.6.t:0 "Reviving the Past"
 CHI_starting.6.desc:0 "China is an ancient land with an ancient past and many, many ancient treasures. When East Asia arose, they seizeed much of these treasures and artifacts from the people and stored them within various archives and vaults that were owned by key members of the Elite, to be kept as their own personal trophies to gawk at.\n\n\"This is a wine vase?\" Chiang asked, holding a bronze wine vase in his hands, which had a black pigment to it.\n\n\"Yes. From the records we recovered, this comes from the 13th century\" Shen Chang-huan answered, observing Chiang examine the wine vase, setting it on the table.\n\n\"Fascinating. The Yuan Dynasty, if memory serves correct... A Mongol family ruled China\" He spoke thoughtfully.\n\n\"Indeed. Hard to believe there was a time Mongolia was a threat to China\" Shen replied lightly, earning a small chuckle from Chiang.\n\n\"Yes. I suppose our people have had their ups and downs\" He spoke lightly before turning back to Shen.\n\n\"I want an exhibit set up for what we recovered so far. In the center of Nanjing. Make it open to all... with sufficient security of course. We cannot keep these artifacts to ourselves. The people must be able to see them to\" Chiang ordered, his gaze meeting Shen's.\n\nShen nodded, getting up from the chair he occupied as he spoke."
 CHI_starting.6.a:0 "\"Of course. Consider it done.\""
 CHI_starting.7.t:0 "Status of the Ethnic Autonomies"
 CHI_starting.7.desc:0 "It was yet another humid morning in Hefei, typical for a city in central China, but for Ha Hongfu, the news that recently came out made this day anything but typical. The announcement of the autonomous regions of China had sparked something inside of him.\n\nHe was only a young boy when he and his family were forced to flee Yinchuan in the wake of the Juche onslaught, settling in Hefei before being forced to flee again, but Ha and some of his other family members were left behind as the rest of them fled to Taiwan, never to be seen again.\n\nWith the announcement of the creation of the Ningxia Hui Autonomous region, Ha didn't know how he should feel about it. The Hui were generally treated less kindly compared to their Han peers, and the question of whether his people and culture survived the horrors of Juche indoctrination also concerned him.\n\nBut Ha wanted things to be different; no, he knew things would be different, especially compared to the decades of Juche occupation and erasure of his people and culture. Perhaps the Nanjing government had ill intent, but for now, the Hui community had faith that they would be treated better, and perhaps that was good enough for them.\n\nWith this, he felt a sense of relief; no matter what happened, he and his people would breathe more freely, even if it was under the flag of another nation."
 CHI_starting.7.a:0 "\"At last we can be free.\""
 CHI_starting.8.t:0 "The Confucius Institute"
 CHI_starting.8.desc:0 "Han Minghui was never really one for educational endeavors. As a young boy, he was subjected to the Chondoist philosophies of self-sacrifice in the name of the party; the teachings never felt right to him, but he dared not question them lest he end up like his classmate, who asked the forbidden question one day and was never seen again.\n\nSo when the new educational system announced mandatory retreats to the provincial Confucius Institute for all senior secondary school students, Han didn't really pay much mind to it, \"Another Young Pioneer trip, another round of indoctrination,\" he thought to himself.\n\nHowever, when the staff taught the class about Confucian values, Han began to feel something he had never felt up until that moment, a sense of purpose and direction. The values that Confucianism preached to Han resonated with a repressed part of him he never knew he had; his compassion and affinity for those around him were affirmed by these new philosophies.\n\nWhen the retreat had ended, Han emerged as a new and wiser man, one who would embrace his role in society and better himself for the sake of the new and emerging society."
 CHI_starting.8.a:0 "\"Perhaps life can hold meaning after all.\""
 CHI_starting.9.t:0 "Memories of the Generalissimo"
 CHI_starting.9.desc:0 "Chiang sat in his office in the presidential palace after a long day of issuing orders and finishing up on remaining paperwork. It was one of the few times he could lie back and relax, even if it was for a fleeting moment; he got up and took a walk around, taking in the sights of the hallways.\n\nHe remembered the time when he was raised by his adoptive father, from being a child of an official's extramarital affair with a Japanese woman, Chiang was accepted by his father as if he were his own, given the name Chiang Wei-kuo in a nod to his older brother Chiang Ching-kuo, their names meaning longitudes and latitudes of the nation respectively.\n\nChiang sighed. With the deaths of both his father and brother at the hands of the Juche scum during the fall of Taipei, the Chiang bloodline itself was officially exterminated. Chiang pondered if he was even worthy of carrying the name of his adoptive family, but he resolved himself, as no one in his adoptive family was alive, he resolved to carry on the legacy of his adoptive father and brother. Chiang affirmed himself with one single thought before carrying on."
 CHI_starting.9.a:0 "\"It is heart, not blood, that makes me a Chiang.\""
 CHI_starting.10.t:0 "5,000 Years of Civilisation Reborn"
 CHI_starting.10.desc:0 "Shen Yun is a brilliant artistic revival and celebration of China's rich cultural heritage.\n\nBut after decades of Juche rule, much of this divinely inspired culture has been lost.\n\nNow, ancient legends and timeless virtues come alive on stage, preserving the essence of a civilization that has endured for millennia. With every performance, Shen Yun conveys the extraordinary depth and breadth of genuine Chinese culture, bringing the magnificence of 5,000 years of civilization vividly back to life.\n\nThe gong resounds, the curtain opens, and fairies emerge from a sea of billowing clouds. Mongolians ride on horseback across grasslands as vast as the sky. Dynasties rise and fall-as ancient legends of love, loss, humor and valor unfold before your eyes.\n\nWe set out to create a performance so extraordinary, it would not only capture the grandeur of China's ancient, divinely-inspired culture..."
 CHI_starting.10.a:0 "You just might catch a glimpse of heaven."
 CHI_starting.11.t:0 "White Sun in The Sky"
 CHI_starting.11.desc:0 "After many long years of struggle and hardship, China is free once more to reclaim its autonomy and its identity. Cities across our land chant with delight at the news of our independence, free from the terrors of East Asia and it's terrible ideology that has done nothing but bring pain and shame to our people.\n\nChiang watched from his stage as soldiers paraded by with jubilance in their step, the people watching on with smiles on their faces. The city Chiang was presently located in was Shanghai, a city which grew in importance during the East Asian era and would no doubt continue to grow in the new era. There was a sense of opimism in the air now that the great foe was gone. What the future would bring, nobody knew. But whatever happened, it would at least be China's future, not someone elses.\n\nYen Chia-kan leaned over, clapping for the troops as he spoke.\n\n\"It's finally over. At least the hard part\" he spoke lightly.\n\nChiang grinned, waving to the crowd before speaking to Yen.\n\n\"Indeed. Now for the boring part\" he joked lightly."
 CHI_starting.11.a:0 "China has been liberated!"
 CHI_victory.1.t:0 "The Future of China"
 CHI_victory.1.desc:0 "The Kuomintang may be returning to power in China, but there still exists the issue of our direction in the wake of our independence.\n\nYes, we fought for the Three Principles of the People and the Vision of Sun Yat-sen, and this has not changed. However, is the time right to implement such a vision? The fact remains that China is devastated, with our cities in ruins and our people wounded by confusion over what has happened. Perhaps a firmer hand, much like Chiang Kai-shek before us, is needed to ensure a strong leader can keep China together.\n\nThen again, if we concede too much power to the Executive of the nation, we may risk the long term difficulty of returning some of that power back to the Yuan and the people."
 CHI_victory.1.a:0 "China needs strong leadership!"
 CHI_victory.1.b:0 "The vision of Sun Yat-sen lives on!"
 CHI_victory.2.t:0 "Nationalism"
 CHI_victory.2.desc:0 "Nationalism is an integral aspect of a nation. If nobody believes in the nation, much less wishes to fight and preserve it, then it becomes nothing more than a house of cards waiting to be blown down by outside forces.\n\nFor a long time, China was demoralised, gripped by outside influence and internal divisions, making us weak and ineffective to face the foes that came. If we want China to rise above its failures and emerge a Great Power on the world stage, we must combat this malaise and instill within our people a sense of pride in the nation. That the Chinese nation is worth defending, that we ought to bow to nobody else. This will not be a simple endeavour, but pride and patriotism is the life blood of a strong nation.\n\nIf we cannot foster this sentiment, it's only a matter of time before a second age of humiliation befalls us all."
 CHI_victory.2.a:0 "Unity is strength."
 CHI_victory.3.t:0 "Governance"
 CHI_victory.3.desc:0 "If the administration is weak, then the nation is weak. Weak to act, weak to react, and vulnerable to outside forces.\n\nIf we want to avoid the fate we endured at the hands of East Asia, the age of incompetence and mismangement must be replaced with efficiency and a strong commitment to the national interest of the people.\n\nIf strong governance is what we seek, then we must act with haste toward reconstituting civilian institutions and powers of the five power constitution. This will take time, however, the sooner we can establish the means of governing China, the sooner we can work on strengthening those means and prepare the Kuomintang to act on the global stage as a major power once more."
 CHI_victory.3.a:0 "A strong government is a strong China"
 CHI_victory.4.t:0 "Nanjing V Beijing"
 CHI_victory.4.desc:0 "During the previous era of Kuomintang rule of China, the capital was located in the city of Nanjing. It made sense at the time. It was centrally located in terms of China's population core, it wasn't far from Shanghai and it was far enough away from Japanese lines that invasion wouldn't touch it. At least, that was the idea.\n\nHowever, with Beijing liberated and under no immediate threat of attack, there have been proposals to shift the capital of China to Beijing instead, where the Forbidden City exists. Not to mention it was the capital of East Asia and thus, has plenty of administrative facilities present. Naturally, internal resistance to the idea has sprung up, with many members of the Kuomintang, feeling that moving the capital is a waste of time and that making Beijing the capital may rub our neighbours the wrong way due to it's legacy as East Asia's capital.\n\nBut regardless of the Party's protests, the final decision on this matter rests with Chiang Wei-kuo."
 CHI_victory.4.a:0 "\"Nanjing, The Southern Capital!\""
 CHI_victory.4.b:0 "\"Beijing, The Northern Capital!\""
 CHI_victory.5.t:0 "Welfare"
 CHI_victory.5.desc:0 "East Asia was rarely helpful toward our people. Or any people they ruled for that matter, not even the Koreans themselves were extended that many privilege. So naturally, our people are poor and lack the power to rule their own lives. Under East Asia, nobody owned anything. It was all owned by the state, a 'privilege' Juche provided, from the roof over their heads to the food om their plates.\n\nWe cannot let this continue on. We must show the people of China that we are different. that we are here to fight for them, not against them. There is much to do, of course. With the devastation from the war on top of the poverty. But the benefit of starting from the bottom is that there is nowhere else to go but up."
 CHI_victory.5.a:0 "Slowly but surely, our people will heal."
 CHI_victory.6.t:0 "His Legacy Secured"
 CHI_victory.6.desc:0 "Chiang looked out at the city of [CHI.GetCapital], the capital of the united China. After so many long years of fighting and struggling, from World War 2 up until now, he'd never truly known peace. There was always an enemy to fight, some challenge to overcome. Yet, as Chiang saw the nation he had fought hard to restore, he felt a sense of peace.\n\nSure, there were still challenges to overcome, but for once, he didnt' feel the stress of his life on the line or the sense of time working against him. No, for once, he could simply just stop and admire the fruits of his labour. The challenges of building up the Chinese nation would come, but for now, he was content to stand and admire.\n\nthose problems could wait just a little while longer."
 CHI_victory.6.a:0 "Behold, the Chinese Century nears"