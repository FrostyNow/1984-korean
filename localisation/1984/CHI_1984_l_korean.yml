 CHI_The_Second_Xinhai:0 "The Second Xinhai"
 CHI_The_Second_Xinhai_desc:0 "\n\n\n\n£GFX_CHI_The_Second_Xinhai_Banner\n\n\n\n\n\n\n§WThe time has come for the Chinese people to liberate themselves from tyranny once more. Like our forefathers before us, we had come under the rule of foreign people attempting to dictate the lives of the Chinese people once more.\n\nNow we have risen again, staging another Wuchang to free our people from the shackles of East Asian tyranny. We shall reestablish the Republic under the vision of Sun Yat-sen once more.\n\nPerhaps this time, the Chinese people shall maintain their liberty forever. §!"
 CHI_Reimplementing_The_Three_Principles:0 "Reimplementing the Three Principles"
 CHI_Reimplementing_The_Three_Principles_desc:0 "\n\n\n\n£GFX_CHI_Reimplementing_The_Three_Principles_Banner\n\n\n\n\n\n\n§WMinzu, Minquan, Minsheng\n\nSun Yat-sen's three principles provided the groundwork for the republic in its early years, the ideals later adopted by other nationalist parties in Asia for the following decades. However, these ideals were lost after the Workers Party established their rule seemingly ending the ideal for good.\n\nOr so it seemed, now that the Chinese Nation is free once again, the ideals of the three principles are being revived and spread across the entire Chinese nation, and the people within working to ensure the continued survival and implementation of these values for generations to come.§!"
 CHI_Confucian_Resurrection:0 "Confucian Resurrection"
 CHI_Confucian_Resurrection_desc:0 "\n\n\n\n£GFX_CHI_Confucian_Resurrection_Banner\n\n\n\n\n\n\n§WUnder the East Asian regime, Orthodox Confucianism was heavily suppressed to near extermination making way for Chondoism, a revision of Confucianism heavily geared towards state control to become the dominant belief of East Asia. As Confucian works continued to be destroyed, many worked to preserve these works at great cost, some even paying the ultimate price.\n\nNow freed, we must work to reverse the damage done to Confucian philosophy and reestablish it as a moral centre for China.§!"
