 CHI_country_selection_tt:0 "§YHOW TO PLAY THE NATIONAL REVOLUTIONARY ARMY\n-----------------------------------------§!\nPlay as the §RDemocratic People's Republic of East Asia§!, play through content until the province breakdown prior to the revolts occurs. When this occurs, remain as the §YProvince of North China§! and wait until the event to switch to the §QNational Revolutionary Army§! pops up."
 1984_Opening_Screen_CHI_Title_TT:0 "§QNATIONAL REVOLUTIONARY ARMY§!"
 1984_Opening_Screen_CHI_Desc_TT:0 "In the aftermath of the victory of the War Against §PJapanese Aggression§!, the §QRepublic of China§! had been battered by the Japanese onslaught and recovery was slow. Adding on to the problems of the recovering nation was the resumption of the §RChinese Communist Party§! as the §RChinese Communist Party§! resumed its campaign against our forces, taking advantage of our weakened state postwar. While we were supported by §mAmerican§! aid, the outbreak of §ROPERATION: UNTHINKABLE§! in the §Y1950s§! led to a significant reduction in said aid, leaving us woefully unequipped for the surprise offensive launched by the §RJuche scum§! from §RManchu-Korea§!, driving us away from the mainland to §BTaiwan§!, where we stayed put, biding our time for when we reclaim our homeland.\n\nChina, although reduced to an island a sea away from home, still endured and was on track to rebound from the brink as American, later known as §YOceanian§! aid seemed poised to flow into the nation, bringing us to the brink of national reclamation. But before we could turn our attention towards the mainland, catastrophe struck as the §ROceanian Civil War§! erupted, halting our prospects of liberation as the Oceanians turned inwards to fight their war. Without Oceanian aid and Europe subjugated by Soviet military might, our ability to rebuild and rearm was impeded. Our industrial capabilities were a shadow of what they used to be, and by the §Y1960s§!, our armed forces were still weak and unprepared for a fight.\n\nIt was there that at the onset of the §Y1970s§! that the §RJuche§! stain that had usurped control of our homeland decades earlier and subjugated all of §REast Asia§!, had turned its sights upon Taiwan.\n\nThey landed their forces, sweeping across our island in waves. Though our military held the line as well as they could, inflicting heavy casualties upon the enemy, our limited industrial and supply capabilities proved to be our undoing. China had finally been conquered.\n\nThough the §QNational Revolutionary Army§! kept the fight against the §RJuche scum§! alive after the fall of the Republic, their ranks were scattered too far across the mainland to pose any meaningful resistance against Beijing. But the sudden arrival of a man thought to have perished in the fall of Taipei changed everything.\n\n§2Chiang Wei-kuo§!, the last man alive bearing the namesake of the late Generalissimo, proclaimed the beginning of the §QSecond Chinese Revolution§! in Nanjing. His arrival had reignited hope that perhaps a Free China is possible and that the dream of §2Dr. Sun Yat-sen§! could be fulfilled once and for all!"
 1984_Opening_Screen_CHI_Gameplay_Paths_Desc_TT:0 "§YChinese Paths§!\n- Crush the §tJuche Scum§! and free China from their grasp!\n- Restore the §QRepublic of China§! and unite the nation under the banner of the §YWhite Sun!§!\n- Continue §gPolitical Tutelage§! or create a §BFull Democracy§! and bring §2Sun Yat-sen's§! dream to reality!"
