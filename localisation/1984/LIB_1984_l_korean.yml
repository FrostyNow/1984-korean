l_korean:
 LIB_Legacy_Of_President_Tubman:0 "Legacy of President Tubman"
 LIB_Legacy_Of_President_Tubman_desc:0 "\n\n\n\n£GFX_LIB_Legacy_Of_President_Tubman_Banner\n\n\n\n\n\n\n§WPresident Tubman is regarded by many as the Father of Modern Liberia. Being the longest-serving President in our nation's history, his tenure is an influential one, being the man who not only ensured stability in otherwise unstable times, but also kept the superstates of Oceania and Eurasia from destroying the Liberian state and working with the coastal states of West Africa to ensure independence.\n\nWhilst some aspects of his Presidency remain controversial, from ordering the occupation of Sierra Leone to the acceptance of American refugees, including White Americans, to Liberia, and the total reorganisation of Liberia's political system to be more like the late United States, Tubman remains one of the most well regarded figures in modern Liberian history.§!"
 LIB_Failure_Of_The_1980_Coup:0 "Failure of the 1980 Coup"
 LIB_Failure_Of_The_1980_Coup_desc:0 "\n\n\n\n£GFX_LIB_Failure_Of_The_1980_Coup_Banner\n\n\n\n\n\n\n§WIn 1980, Indegenous General Samuel Doe and his compatriots attempted a coup upon current President William Tolbert. Though he was close, the coup was swiftly put down by the American Emigres, who quickly killed Doe and reasserted the President's authority over the nation.\n\nThough a failure, the coup highlighted the growing divisions between the indigenous Liberians and the True Whig Party, which is made up of Americo-Liberians and American emigres. This issue, if left unresolved for too long, could possibly lead to further upheaval and instability that may threaten the very fabric of Liberian society.§!"
 LIB_Occupation_Of_Sierra_Leone:0 "Occupation of Sierra Leone"
 LIB_Occupation_Of_Sierra_Leone_desc:0 "\n\n\n\n£GFX_LIB_Occupation_Of_Sierra_Leone_Banner\n\n\n\n\n\n\n§WWhen Oceania had descended into civil war, with Capitalists fighting against INGSOC, President Tubman had decided to occupy Sierra Leone on behalf of the government in Washington until the situation had resolved and INGSOC was destroyed.\n\nWhen the opposite occured, Sierra Leone remained in the hands of Liberian authorities and Oceanian remnants who, after some deliberation, had decided to fully integrate the territory into Liberia proper, with many lands opened to American and Americo-Liberian settlement.\n\nThe native people of this land were largely left out of this save for a few collaborators, leaving much of the native Muslim population in the area bitter over being ruled by an Americanist-Christian oritented government in Monrovia.§!"