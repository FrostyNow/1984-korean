 JAP_Imperial_Glory:0 "Imperial Glory"
 JAP_Imperial_Glory_desc:0 "\n\n\n\n£GFX_JAP_Imperial_Glory_Banner\n\n\n\n\n\n\n§WOur land is a proud nation of Warriors and Poets who have stood against insurmountable odds, whether they be Chinese, Mongol, or European, we have always triumphed against their seemingly better armies.\n\nThe East Asian invader is no different, this is to be our finest hour as we fight for the Emperor’s return to his rightful throne. No more shall our people stare dangerously close to the abyss, the scorching heat of the rising sun shall drive the oppressor away from our islands and shine upon Japan once more!\n\n§RTENNO HEIKA BANZAI!§!§!"
 JAP_Vacant_Chrysanthemum_Throne:0 "Vacant Chrysanthemum Throne"
 JAP_Vacant_Chrysanthemum_Throne_desc:0 "\n\n\n\n£GFX_JAP_Vacant_Chrysanthemum_Throne_Banner\n\n\n\n\n\n\n§WDescended from the Sun Goddess Amaterasu, the Imperial Family has always been at the forefront of Japanese society, their existence an essential part of the Japanese national identity. However, as we fight for our islands and independence, the Imperial Family has yet to appear, sparking questions about their whereabouts.\n\nEver since the Atomic Wars of the 1960s, the Imperial Family had vanished with some giving up on their continued survival. As Mishima assumes the regency and reassures the public of the imminent arrival of the Emperor, hope amongst the people continues to fade as many come to grips with the reality of never having an Emperor to guide them again.§!"
 JAP_The_Zainichi_Question:0 "The Zainichi Question"
 JAP_The_Zainichi_Question_desc:0 "\n\n\n\n£GFX_JAP_The_Zainichi_Question_Banner\n\n\n\n\n\n\n§WSince the vassalisation of the Korean Peninsula in 1905, Korean immigration to the home islands has been a point of contention between the native Japanese and the Koreans arriving for better work opportunities. However, their numbers increased exponentially after the East Asian conquest of the home islands as the Party encouraged Korean settlement into the home islands in an attempt to outnumber the native Japanese on their own soil with the eventual goal of extermination altogether.\n\nWhile many have been born on these islands and call them home, their loyalty to the East Asian oppressors is apparent as they benefit far more under their rule than ours. As the fight for independence rages on the issue of the Zainichi Koreans is brought further to the forefront as many have called for them to be expelled from the islands while others call for assimilation as a way to ease tensions between the two groups.\n\n§RShould the issue not be dealt with immediately, this could spell disaster for our nation before it can even stand on its own two feet!§!§!"
