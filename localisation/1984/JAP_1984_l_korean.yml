 JAP_Nobusuke_Kishi_head_minister_desc:0 "§PImperial Loyalist§!\n§YMonster of the Shōwa era§!"
 JAP_Aiichiro_Fujiyama_foreign_minister_desc:0 "§PImperial Loyalist§!\n§YBuisness Minded§!"
