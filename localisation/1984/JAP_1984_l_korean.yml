 JAP_Discipline_Of_The_Samurai_Two:0 "Discipline of the Samurai"
 JAP_Wartime_Conscription_One:0 "Wartime Conscription"
 JAP_Fanatically_Loyal:0 "Fanatically Loyal"
 JAP_Imperial_Consolidation_One:0 "Imperial Consolidation"
 JAP_Imperial_Consolidation_Two:0 "Imperial Consolidation"
 JAP_Restoring_The_National_Diet_One:0 "Restoring the National Diet"
 JAP_Restoring_The_National_Diet_Two:0 "Restoring the National Diet"
 JAP_The_Sun_Rises_Again:0 "The Sun Rises Again"
 JAP_The_Sun_Rises_Again_desc:0 "After years of preparation and waiting for the coming of the Heir of Japan, the Heir has been found and with it, the time for Japan to rise up and reclaim our glory has come. The Juche ideology which has kept Japan wounded and weak will be cast off, and with it, a new Japanese State will emerge from the ashes."
 JAP_Economic_Restructuring:0 "Economic Restructuring"
 JAP_Economic_Restructuring_desc:0 "To wage war against the Juche Administration on our sacred islands, we need to muster all available resources, from raw to industrial, to fight back against the enemy. The industrial foundations here are ill equiped to fight the war we face. Therefore, total reorganisation of the economic structure of our territory is necessary if we wish to win."
 JAP_Restoring_Industrial_Japan:0 "Restoring Industrial Japan"
 JAP_Restoring_Industrial_Japan_desc:0 "With our economy in a position to rebound to fight the enemy, it is time to take advantage of East Asia's many facilities and warehouses in the region and repurpose them for our own needs, those needs being to sustain our nation and wage war for our future. A Japan without industry is a weak Japan and a weak Japan is unacceptable."
 JAP_Promote_Cultural_Tradition:0 "Promote Cultural Tradition"
 JAP_Promote_Cultural_Tradition_desc:0 "Rebuilding our economy and military is all well and good, but what matters more than anything is the revival of our culture. Due to our past ownership over much of East Asian lands, the Juche ideology was swift to squash Japan and its culture, wiping out much of the Imperial Family and reducing many of our landmarks to ruin.\n\nWe didn't let it break us before, and we won't let it break us now. We will remind our people of our extensive history and cultural tradition, ensuring that all Japanese men and women know what is at stake."
 JAP_Hokkaido_Industrial_Fortress:0 "Hokkaido Industrial Fortress"
 JAP_Hokkaido_Industrial_Fortress_desc:0 "Should we endure failures on the main island, we should ensure we have a strong springboard on Hokkaido from which we can hold and counterattack. We mustn't let pride blind us from the odds we face. Japan fell once. We are not invincible and we need to act accordingly. Let Hokkaido be Japan's firm foundation.\n\nAt least until the rest of the Home Islands can be reclaimed."
 JAP_Reforging_Japanese_Culture:0 "Reforging Japanese Culture"
 JAP_Reforging_Japanese_Culture_desc:0 "To bring back Japan as we once knew it, it will take more than simply bringing back tradition and history, it will take direction. What shall our people be? What path shall Japan and her many subjects take as we remove Juche from our shores and regain total control over the Home Islands?"
 JAP_Revive_Imperial_Mindset:0 "Revive Imperial Mindset"
 JAP_Revive_Imperial_Mindset_desc:0 "Japan reached the heights of its power when it looked beyond its boundaries. Our territories were vast and our power was great, on par with the old Empire's of the West. Had it not been for our dependence on the United States of America, their later embargo which sparked war, our dominance over Asia would have been unquestioned.\n\nThings have changed now. The reset button has been hit, so to speak, and with it, the potential for Japan to rise again as an Empire."
 JAP_Path_Of_Self_Reliance:0 "Path of Self Reliance"
 JAP_Path_Of_Self_Reliance_desc:0 "The age of Empire only lead us to destruction in the end. It left us isolated, at the mercy of other powers. The Americans, the British, and the Soviets. The three that tore down the Japanese Empire and left us vulnerable to the emergence of Juche in Korea, and it's subsequent conquest of East Asia.\n\nWe can't afford to be vulnerable again. Over extension beyond our own territories will only harm us in the long run as history has proven. Japan will be an island of self sufficiency. The fortress of the East."
 JAP_Eastern_Sun_Rising:0 "Eastern Sun Rising"
 JAP_Eastern_Sun_Rising_desc:0 "As the war rages across Japan, affecting thousands of our people, we can't lose sight of our goal. Whatever the future holds, there must be one guarantee above all else. A free Japan. No matter how much blood is spilt or how long it takes, we must commit ourselves to this goal. Japan is rising again and the Second Righteous Army will make sure of that."
 JAP_Rehabilitating_The_Heir:0 "Rehabilitating the Heir"
 JAP_Rehabilitating_The_Heir_desc:0 "The heir of Japan has been discovered, though he is not yet ready for the weight of the throne. The heir was young when the Imperial Family had been massacred by Juche forces which forced him to flee. For years, he has lived much like the rest of our people. Whilst not completely oblivious to his legacy, the throne has long been a distant dream to him, something that fled his mind as he was forced to toil alongside his subjects.\n\nThe future Emperor requires help to get him fully prepared and understanding of his destiny and Yukio Mishima is the man to ensure it is done."
 JAP_An_Ancient_Legacy:0 "An Ancient Legacy"
 JAP_An_Ancient_Legacy_desc:0 "The Emperors, much like Japan, has ancient roots stretching a thousand years. Regardless of whatever was occuring to Japan at any point in history, there was always an Emperor that reigned over Japan. No Presidents or other figure heads. The heir must understand his importance to all of Japan if he is to realise his destiny as the divine Emperor of Japan."
 JAP_Imperial_Archivist_Corps:0 "Imperial Archivist Corps"
 JAP_Imperial_Archivist_Corps_desc:0 "The brief rule of Juche has lead to much being lost. Records are scattered and piecing it all back together will take considerable time. Thus, it is essential that resources are set aside for an organisation solely dedicated to research and recovery of historical Japan."
 JAP_The_Emperors_New_Groove:0 "The Emperor's New Groove"
 JAP_The_Emperors_New_Groove_desc:0 "The Emperor, though still having much to learn, is growing more comfortable in his role. With each day that passes, he grows more ready and determined to lead the Japanese nation away from the grip of Juche and toward the new tomorrow. His spirit renewed and his mind focused, Japan will soon have a strong Emperor once more."
 JAP_Japan_Reborn:0 "Japan Reborn"
 JAP_Japan_Reborn_desc:0 "After all the fighting and death that has plagued our islands, we have done it. Japan is free once more, from Hokkaido to Kyushu, the Second Righteous Army has emerged triumphant. The foreign invaders have been repelled, and with it, a chance for Japan to chart its own destiny once more.\n\nWhatever our path may be, we all take comfort, for Japan is free again."
 JAP_Rebuilding_The_Japanese_Imperial_Army:0 "Rebuilding the Japanese Imperial Army"
 JAP_Rebuilding_The_Japanese_Imperial_Army_desc:0 "The Japanses Imperial Army once fought across Asia and the Pacific, battling against the Chinese and contesting the Americans. Like World War Two, Japan faces an insurmountable enemy in the form of East Asia. The fight ahead will be tough. If we're going to win, we need to get the army back up to standard and fast."
 JAP_Imperial_Naval_Legacy:0 "Imperial Naval Legacy"
 JAP_Imperial_Naval_Legacy_desc:0 "Though the naval side of things seem distant, it wouldn't hurt to begin laying the foundations of a future naval build up. Japan is an island nation, and once we regain total control over our territory, the Navy will only grow in importance, especially when it comes to matters beyond our islands."
 JAP_Retrofit_Naval_Shipyards:0 "Retrofit Naval Shipyards"
 JAP_Retrofit_Naval_Shipyards_desc:0 "Throughout Japan, there are plenty of shipyards that fell into disrepair or were simply shut down in favour of advancing other industries. If Japan wants to be connected to the rest of the world through trade, and eventually rebuild its Navy, we should see to it that these facilities are brought back to working order."
 JAP_The_Warrior_Army:0 "The Warrior Army"
 JAP_The_Warrior_Army_desc:0 "In the face of overwhelming odds, Japan can't let slip her pride and invoke the same tactics of overwhelming human wave tactics that East Asia uses. Our people have long held onto a strong sense of discipline and honour. It was what kept us strong and united for many long centuries, and it will be that mindset that we see us through this crisis.\n\nWhen East Asia first came for our islands, Japan was a shell, broken and battered by the Second World War. But this time we are strong in mind and spirit, no longer demoralised by defeat but invigorated by the fruits of a free Japan."
 JAP_Tenno_Heika_Banzai:0 "Tenno Heika Banzai!"
 JAP_Tenno_Heika_Banzai_desc:0 "Long live His Imperial Majesty the Emperor, who will soon reign over all of Japan and restore glory to our people. Let our nation reign for thousands of years more. Let our soldiers be unmatched on the battlefield. Let our enemies cower and fear in the face of the Emperor's loyal army and may our islands know peace again once the sun rises upon us once more."
 JAP_An_Army_Of_Many:0 "An Army of Many"
 JAP_An_Army_Of_Many_desc:0 "There is a simple saying in this part of the world.\n\nDon't fight a land war in Asia.\n\nEast Asia's forces are vast and they are not afraid to conscript the masses to crush us. If we want to win and win quickly, we need numbers and fast."
 JAP_No_Death_Without_Honour:0 "No Death Without Honour"
 JAP_No_Death_Without_Honour_desc:0 "To surrender or fall in cowardice before this enemy brings forth great shame to the one who fights and the nation he fights for. Remember how our enemy treated our people, how they crushed our culture and imposed their 'Great Leader' upon us! Don't let them drive you back or kneel before them.\n\nIf you must die in the heat of battle, then die with honour."
 JAP_Restoring_The_Imperial_Arsenals:0 "Restoring the Imperial Armsenals"
 JAP_Restoring_The_Imperial_Arsenals_desc:0 "Industry is victory and if we're going to beat back the Juche Hordes, we need industry fast. Luckily, there are plenty of facilities in our territory that were abandoned by East Asia when our armies emerged from the shadows. Given time, they could be made to support and manufacture everything our military needs to win."
 JAP_Restart_Aviation_Industry:0 "Restart Aviation Industry"
 JAP_Restart_Aviation_Industry_desc:0 "A war on the ground is meaningless if we can't even control our own skies. Our war long ago against the United States of America showed us the true consequences of being unable to protect your own skies.\n\nTwice.\n\nIt is a lesson that was well learned, a lesson Japan would prefer not having to be instructed on again. Deticating resources to get some planes in the sky and off setting East Asia's air campaign would be a considerable advantage to gain."
 JAP_Hijack_East_Asian_Air_Assets:0 "Hijack East Asian Assets"
 JAP_Hijack_East_Asian_Air_Assets_desc:0 "The Second Righteous Army has spirit, devotion and determination.\n\nIt does not have planes.\n\nEast Asia, on the other hand, has plenty of planes.\n\nPlanes which are better off in our hands."
 JAP_The_Modern_Shogun:0 "The Modern Shogun"
 JAP_The_Modern_Shogun_desc:0 "Yukio has long been the leader of the movement and has spearheaded the restoration of Japan on many fronts, from mentoring the Emperor to waging war against our foes. Mushima has the grit and determination to see this effort too, proving to all Japan that we don't only have an heir prepared to take the throne, but also a Shogun to ensure it is done."
 JAP_The_Akishino_Revival:0 "The Akishino Revival"
 JAP_The_Akishino_Revival_desc:0 "With East Asia cast away from our shores, the Japanese Home Islands are whole once more. Our people celebrate and our military enjoy the spoils of their well earnt victory. But with victory, comes the end of Mishima's time as head of the Japanese State. The Heir is ready and none shall refuse his right to the throne.\n\nLong live Emperor Akishino!"
 JAP_Lessons_From_The_Shogun:0 "Lessons From the Shogun"
 JAP_Lessons_From_The_Shogun_desc:0 "Mishima ruled through discipline and determination. He lead by his own example and kept a firm grip on the affairs of the Second Righteous Army. With Mishima's continued tutelage, guiding and advising the Emperor in this new chapter of Japan, Akishino can learn to do the same."
 JAP_Restore_The_National_Diet:0 "Restore the National Diet"
 JAP_Restore_The_National_Diet_desc:0 "With East Asia gone and Japan free to conduct its own affairs once more, it's time to pick up from where we once were before things went all so horribly wrong. By beginning the process of restoring a National Diet, we can beginning repairing what was broken and bring about the vision of that past Emperors such as Meiji and Taisho had once envisioned for our land."
 JAP_Erasing_The_Taisho_Mindset:0 "Erasing the Taisho Mindset"
 JAP_Erasing_The_Taisho_Mindset_desc:0 "Democracy, as nice as it sounds, is ultimately weak. A system developed far from our shores in the lands of Greece, it is a concept that ultimately does not belong to Japan. Through the centuries, strong leadership have ensure that Japan remained free and independent. It was only with the introduction of democratic ideas into Japan that we began to falter.\n\nThe American occupation.\nThe East Asian Invasion.\nThe Massacre of the Imperial Family.\n\nNo more. Japan has experimented with Democracy and it failed. We shall avoid these ideals entirely and focus on what has already worked so many times before. The unquestioned rule of the Emperor."
 JAP_Finalising_The_Showa_Restoration:0 "Finalising the Showa Restoration"
 JAP_Finalising_The_Showa_Restoration_desc:0 "The Showa Restoration aimed to restore Emperor Hirohito to his full powers, casting off the shackles of Democracy and giving the Emperor the full political influence he is entitled to.\n\nWith Akishino on the throne, this objective can be fully realized, giving the Emperor to full authority needed to enact his divine will and vision for Japan."
 JAP_Rebirth_Of_The_Traditional_Japan:0 "Rebirth of the Traditional Japan"
 JAP_Rebirth_Of_The_Traditional_Japan_desc:0 "The Japan of the past has returned. With the power of the Emperor untarnished by foreign ideas of governance and administration, the Emperor of Japan is now free to carry out his will and see to reconstruction and elevation of Japan once more. With his trust advisor, Mishima, at his side, Japan will achieve its future."
 JAP_Select_The_Imperial_Capital:0 "Select the Imperial Capital"
 JAP_Select_The_Imperial_Capital_desc:0 "Hokkaido has served us well in our quest to revive Japan. But with the islands reclaimed and the Emperor's reign now formally underway, a more suitable and administratively convenient imperial capital needs to be selected."
 JAP_Power_Of_The_Palace:0 "Power of the Palace"
 JAP_Power_Of_The_Palace_desc:0 "The Imperial Palace of Japan has, and will again, be the seat of power in Japan. It will not do for it to simply be the residence of the Emperor. No, it must be an administrative fortress, the place where decisions are made swiftly and without question."
 JAP_A_Home_For_The_Diet:0 "A Home for the Diet"
 JAP_A_Home_For_The_Diet_desc:0 "With a new capital established, it is time to give the National Diet of Japan the resources and facilities neededto establish a proper administration."
 JAP_Delegate_Imperial_Powers:0 "Delegate Imperial Powers"
 JAP_Delegate_Imperial_Powers_desc:0 "If the National Diet is to assume measured authority over the domestic affairs of the Japanese State, then it is important that the Diet have the necessary powers needed to enact reforms and bills in the name of the Emperor himself."
 JAP_Uproot_Juche_Philosophy:0 "Uproot Juche Philosophy"
 JAP_Uproot_Juche_Philosophy_desc:0 "Juche is a poison upon our land, a poison that threatens Japan even now. We must do all that we can to remove this poison from the veins of our nation if we are to bring the Emperor's vision to life."
 JAP_Realising_Meijis_Japan:0 "Realising Meiji's Japan"
 JAP_Realising_Meijis_Japan_desc:0 "Emperor Meiji envisioned a modernised Japanese state, built upon foundations that had elevated the nations of Europe and America to great status on the world stage. And for a time, it did, for Japan became a great power that was able to spread across Asia. It must be upon this vision that the new Japan is built, concious of the past, but adapted for the new age."
 JAP_starting.1.t:0 "Sun Rise"
 JAP_starting.1.desc:0 "\"The heir has been found\" Mishima announced to the assembled leadership before him.\n\n\"The heir? To the throne? You are certain?\" Kishi asked, his aged eyes widening a little as the others looked at each other stunned.\n\n\"I am certain. I inspected the boy myself. He matches records of the Imperial Family. He is the son of Akihito, the late Crown Prince who would succeed Hirohito. Fumihito... now Crown Prince Akishino of Japan\" Mishima explained plainly, his hands firmly behind his back with his chin up.\n\n\"Akishino... he... he would have been barely a toddler, a baby when the massacres happened\" Takeda stated, leaning back in his chair, hands on the table.\n\nFujiyama crossed his arms, brows furrowed.\n\n\"Does he even know of his own line? Does he even grasp what is expected of him? Does he know-\" \"I will educate him\" Mishima cut him firmly, gaze fixed on Fujiyama before glancing around at the others.\n\n\"I will make this clear to all. Any who wishes to deny Akishino his divine birthright offends not only him... but me also. Is there any confusion?\" Mishima asked flatly, standing as he placed his hands flat on the table.\n\nThe leadership glanced around the room, as though daring one another to say something before returning their gazes to Mishima.\n\n\"You will find no confusion here, Yukio\" Nagano spoke for the group.\n\nMishima nodded a little in approval."
 JAP_starting.1.a:0 "\"Then let us begin.\""
 JAP_starting.2.t:0 "What They Tried To Take From You"
 JAP_starting.2.desc:0 "Sakura looked out her window, from the safety of her home in Otaru. It was strange seeing all the changes that had begun to take place since the Mishima and his clique had kicked the East Asians out of Hokkaido. It was beginning to look more and more like the stories of the country her late grandfather once told her when she was younger. The streets were cleaner. Flags of old Japan were hoist up, replacing the old East Asian Banners as more people dared to walk the streets. There was less fear then there was under Juche rule. Sure, there was the anxiety of the war, of East Asia coming back to tear everything down.\n\nBut the return of the Emperor... now that was something.\n\nThere was always desires from many people she knew to rebel from the regime, but they never really felt real or feasible. What would they even fight for exactly? What were the specifics? But the Emperor's return had changed something. The malaise was answered with fire and steel of the Second Righteous Army, guided by the vision of a Japan revived as it once was, stretching from Hokkaido to Kyushu. Where Japan was proud and strong. Like a match igniting a bonfire, people were beliving again, believing in the future."
 JAP_starting.2.a:0 "And maybe... maybe she was starting to believe too."
 JAP_starting.3.t:0 "Japan of Tomorrow"
 JAP_starting.3.desc:0 "In the old days, Japan once commanded an Empire that stretched across much of Asia, from portions of China, all the way to Indonesia. And whilst the hammer was brought down upon us by the United States, shattering our empire and costing us our glory, there now exists a unique opportunity for Japan to enact her Imperial ambitions once more, with promises of resources and glory beyond our island.\n\nThere does exist opposition, however, believing that an attempt to invade all of Asia will only lead to the shame outcome we had the misfortune of facing at the end of the Second World War, reducing Japan to a mere husk of a nation again and we've already observed the results of that vulernability."
 JAP_starting.3.a:0 "We will revive the Empire in ALL it's glory"
 JAP_starting.3.b:0 "Japan must survive on its own, or not at all"
 JAP_starting.4.t:0 "The Righteous War"
 JAP_starting.4.desc:0 "Kiyoshi sat by the radio alongside his friends, the teens listening to the voice of Yukio Mishima through the speakers. It was odd hearing the man's voice. For so long, the man was a distant rumour. Someone people only heard whispers of. An Imperialist enemy of East Asia. That's all they knew him as for the longest time. Now he was on the radio, and his influence was everywhere.\n\n\"Japan's spirit is reawakening in ways never before imagined. For years, our enemies have squashed the spirit and heart of our nation, doing all that they could to erase the Japanese nation entirely, in an effort to foster their cultureless, slave commune of East Asia. A land with no goals. A nation with no vision. A people with no identity. We cannot and must never be anything other than what we are. Japanese!\" Mishima voice spoke through the speaker, filled with conviction and passion for aim to restore Japan as it once was.\n\nKiyoshi shifted, the words reasonating with him. East Asia had felt so hostile toward him, so against him. The Japanese had especially been targeted by the Korean dominated Juche regime. To hear someone speaking to Japan for once, not against it. Against him.\n\nIt felt good.\n\n\"The Emperor will rise again, and Japan will know glory. Our spirit is strong, our convictions strong. My mind and body and soul is ready for war we face. I will not submit to our enemies. No, I shall make them submit to me in the name of the Emperor! We shall cast the demons from our shores and we will restore Japan, no matter the cost!\""
 JAP_starting.4.a:0 "Whatever it takes"
 JAP_starting.5.t:0 "Mishima's Tutelage"
 JAP_starting.5.desc:0 "Akishino sat on the floor in the center of a room on a mat. Mishima was nearby, quietly and methodically organising the desk which were full of various materials and texts relating to the Imperial Family and Imperial Governance. It was strange being here, to be recognised as the Heir. Before Akishino has been discovered by Mishima, he was just a farm hand working out of a small prole village in the countryside. He'd been raised by Japanese farmers, who took him in after he escaped the massacre of the Imperial Family. He'd been young then, and the old couple didn't know who he truly was. From there, it was a tough but humble upbringing. It wasn't always easy, but Akishino had learned and grown during that time, though as he sat here awaiting his... well, teacher, he was beginning to wonder if he could really go from effectively a peasant boy back to the Crown Prince.\n\nBut something told him he'd have to no choice but to figure it all out and fast.\n\nMishima inhaled slowly, tilting his chin up slightly as he glanced out the window before slowly exhaling, turning and looking down at the Crown Prince, hands behind his back as he spoke in a calm, yet measured tone..."
 JAP_starting.5.a:0 "\"Your education begins now, Crown Prince\""
 JAP_starting.6.t:0 "Those Who Came Before You"
 JAP_starting.6.desc:0 "\"The first Japanese Emperor\" Mishma stated, seated before Akishino who say parallel to him.\n\n\"Emperor Jimmu... he is the first Emperor of Japan... he is descendent from the sun goddess... Amarterasu... he is the founder of the Imp... my dynasty. The Yamato dynasty\" Akishino spoke carefully, earning an approving nod from Yukio.\n\n\"Good. You've been learning well, Crown Prince. It's important to know where your linage began in order to value what you are now and what you and all Japan must fight to preserve and protect\"\n\nAkishino nodded, looking down at his lap, at his hands for a while before speaking up.\n\n\"Did you ever know of my family, Yukio? Of my father? Or his father before him?\"\n\nYukio sat there quietly for a while, humming softly in response before he spoke.\n\n\"I did. Emperor Hirohito... your grandfather. I met him on September 9th, 1944... back when I was a much younger man\" Yukio explained, Akishino paying attention to every word.\n\n\"I was graduating from Gakushuin, a university in Kyoto. I was top of my class and... well, the Emperor was there and I meet him for the first time. He gave me a silver watch. This one\" Yukio explained, reaching into one of his pockets before pulling it out and holding it in his hand, the item immediately catching Akishino's eye.\n\n\"I've kept good care of it, I value it dearly. Meeting the Emepror, well... it reminded me that the Emperor is the absolute... no matter who it is\" He finished, smiling just a little before glancing back at Akishino.\n\n\"Your grandfather gave me this watch... now I give it to you\" Mishima spoke, reaching out and placing the watch before Akishino.\n\nAkishino blinked, looking at the watch before carefully picking it up and looking back at Yukio.\n\n\"Yukio, this is... are you certain?\"\n\nYukio simply nodded in response."
 JAP_starting.6.a:0 "\"May you remember this moment fondly.\""
 JAP_starting.7.t:0 "The Voice of a Thousand Generations"
 JAP_starting.7.desc:0 "\"The last time I saw a market in this part of town was back in 1964. Before the Juche slaves made a mess of everything\" Jin spoke gruffly, looking around at the stalls and assembled groups of people.\n\n\"I don't get why we're here, Uncle. I want to hear the Emperor's address. We could have listened on the radio back home, It's the first time we're gonna hear what he sounds like\" Takao protested, the young boy pouting a little at being brought here.\n\nThe old man simply chuckled in response.\n\n\"Well, first off, he's not the Emperor. Not yet, anyway. And secondly, I doubt we could miss it if we want to. Every stall in this place seems to have a radio. We'll hear it. Now, one of these stalls must sell a game of Go somewhere...\" Jin trailed off, looking around before a smile creeped onto his face.\n\n\"Ah. This looks promising\" he spoke lightly as he approached one of the vendors, Takao dragging his feet along.\n\nAs Jin found what he was looking for, and quickly began to haggle the owner of the stall for a good deal on the board game, Takao stood off to the side, arms crossed as he looked down at the floor.\n\n\"Loyal subjects of Japan\" a voice echoed through the radio, causing everyone to go silent as all eyes and ears turned to the radio.\n\n\"I am Crown Prince Akishino. Heir to the Chrysanthemum Throne of Japan. Whether you live freely in Imperial controlled territory or Juche occupied lands... know that I am with you... and that all is being done to ensure that Japan is freed from this evil that has rooted itself in our lands.\"\n\nTakao drew closer to the radio, listening to every word as Jin placed a hand on his nephew's shoulder.\n\n\"Hold steady, my loyal subjects. Be strong in mind and spirit. The enemy will try to break both in the pursuit for power, as they have attempted for many years. You have all endured greatly, and soon, all the pain and suffering will be rewarded. Japan is rising again from the ashes...\""
 JAP_starting.7.a:0 "\"Soon... the nightmare will end.\""
 JAP_starting.8.t:0 "The Sun Rises Once More"
 JAP_starting.8.desc:0 "After many long years of occupation and fighting across Japan, our Home Islands are ours once again. The Juche forces have been shattered and broken, with their remnants being tracked down and destroyed by our Imperial Army. The islands from Hokkaido to Kyushu all rejoice at the collapse of the INGSOC administration, our nation now free to chart its own course once again.\n\nAnd with the war over, the last barrier to the ascension of Akishino to the Chrysanthemum Throne has been removed. It's time to begin preparations for the long awaited coronation of the Heir of Japan and see a Japanese Emperor finally emerge from the chaos, much like a Phoenix rising from the ashes."
 JAP_starting.8.a:0 "The Long Night is over"
 JAP_army.1.t:0 "Reforming the Imperial Army"
 JAP_army.1.desc:0 "Mishima leaned on the table, looking over the documentation strewn about the table, all detailing various combat reports and readiness of combat divisons across their territory.\n\n\"This won't do, Terashima\" Mishima spoke calmly, picking up one of the casualty reports before glancing at his army chief. \"The Juche Slaves are adapting to us. Our current methods of war won't give us the victory we desire, not if our men keep dying.\"\n\n\"And we don't have as many as they do\" Terashima stated grimly, tapping on the armrest of his chair before standing up.\n\n\"We need an overhaul. Of everything\" he stated plainly.\n\n\"Got some ideas in that head of yours?\" Mishima asked curiously, straightening up as the Army Chief stood up.\n\n\"I've got a few proposals in mind. I'll consult with the other officers, come up with some viable proposals for you to look at.\"\n\nMishima was silent for a moment, glancing back down at the reports for a brief moment before letting out a sigh."
 JAP_army.1.a:0 "\"Go on then, General. But keep me in the loop... and work quickly\""
 JAP_army.2.t:0 "Behind Enemy Lines"
 JAP_army.2.desc:0 "Haruto pulled hard on the joy stick of his newly acquired fighter jet, avoiding the stream of anti-air fire shooting at him from the base he'd just infiltrated and stolen the fighter from.\n\n\"You alright, Haruto?\" Ren, his partner in crime in this case, asked over the radio, having taken a Close Air Support aircraft himself.\n\n\"I'm fine, I'm fine. The Juche Slaves weren't very happy about me apprehending their aircraft\" Haruto replied, a grin on his face as the plane breached the clouds, using them to his advantage as the anti-air became easier to avoid before finally escaping it's range.\n\n\"That was chaos. How many do you think we lost down there?\" Ren asked, his aircraft moving to fly alongside him.\n\n\"We knew it wasn't going to be easy. They gave their lives for the Emperor, though. No greater honour\" Haruto replied, glancing at Ren from the view of his cockpit.\n\n\"I suppose so. At least we have some planes now\" Ren replied grimly, glancing over his shoulder back in the general direction of the airbase before looking ahead."
 JAP_army.2.a:0 "\"Indeed we do\""
 JAP_army.3.t:0 "The Shogun Takes Command"
 JAP_army.3.desc:0 "\"Are you sure you want to handle affairs more personally? I understand you already have your hands full as is. With the Crown Prince and the affairs of the state\" Shigeto Nagano inquried measuredly, watching as Mishima adjusted his officer uniform, ensuring everything was prim and proper.\n\n\"Japan requires all its fighters, Shigeto. I cannot remain behind a desk or with the Emperor all the time. His education is progressing well. He doesn't require my presence as much as he did before\" Mishima replied, fixing the Hachimaki around his head and tying it firmly before looking himself over.\n\n\"Very well. But I must make my apprehension clear, Yukio. You are the face of the movement as much as the Crown Prince is, like it or not. Much like the Crown Prince too, your survival matters a great deal\" Shigeto stated bluntly.\n\nMishima exhaled through his nose, nodding his head a little before turning to Shigeto.\n\n\"I appreciate your concerns, Shigeto. I do understand I am important, and that is why I must be out there...\""
 JAP_army.3.a:0 "\"Why I must be seen fighting too, as a warrior should.\""
 JAP_victory.1.t:0 "Rise of the Emperor"
 JAP_victory.1.desc:0 "Akishino's enthronment was today. He was dressed in his Mianfu. He was lacking a crown but that would be given to him soon enough. Exhaling through his nose, he looked himself over in the mirror. Despite all he had learnt, he wasn't very used to looking like an Emperor. It felt so strange and bright. He knew he was going to be the center of attention but the bright red outfit was doing little to settle his nerves. The door opened, Mishima revealing himself to be on the otherside.\n\n\"The nation will be ready for you soon, Crown Prince\" Yukio stated before stepping inside, closing the door behind him.\n\n\"How are you feeling?\" Yukio asked, knowing this would be a big step for the soon to be Emperor of all Japan.\n\n\"Yes, yes. Just... I know we've had time to prepare but it all still feels so quick\" Akishino replied, toying with the sleeve of his garb for a moment before looking back at Yukio.\n\n\"I look ridiculous.\"\n\nYukio couldn't help but let out a small chuckle, shaking his head a little.\n\n\"You look like an Emperor, Akishino. And soon enough, you will have more things to worry about than how you look\" he stated as he walked up to Akishino.\n\n\"Right... that's comforting\" Akishino retorted dryly, glacing down at the ground.\n\nMishima examined the younger man for a moment before reaching out and placing a hand on his shoulder.\n\n\"You'll do great. This I know\" he assured the Emperor, no doubt or deception in his tone.\n\nAkishino looked back at him for a moment before nodding in response. Mishima smirked slightly, patting his shoulder before letting go.\n\n\"Now...\" he began."
 JAP_victory.1.a:0 "\"Let's get going. Your reign awaits.\""
 JAP_victory.1.b:0 "\"You wanted to meet with Kishi, yes?\""
 JAP_victory.2.t:0 "The Weakness of Democracy"
 JAP_victory.2.desc:0 "\"Democracy is poison\" Yukio stated plainly, walking alongside Akishino through one of the restored gardens of reclaimed Imperial property.\n\n\"It's a foreign ideal. Its deceptive, It tells them them they have power they do not, it... feeds the people the idea that they can somehow control the affairs of government\" Mishima elaborated, clearly having given the matter of plenty of thought himself.\n\n\"But Emperor Meiji and Tashido have had their hand on the subject in the past, did they not? Meiji introduced it and Tashido expanded upon it\" Akishino countered calmly.\n\n\"They did this to ingratiate themselves with the West so that they could gain their approval. Their investments. They were stronger than us and we knew it\" Yukio stated plainly.\n\n\"But that isn't the case anymore. The West is... more or less... a shadow of itself. Strong but...\"\n\n\"Not enough to force our affairs\" Mishima finished bluntly.\n\nAkishino exhaled through his nose, glancing at one of the Cherry Trees for a moment, mulling it over in his head before he spoke once more.\n\n\"I'm not ready to play the part my ancestors did. As an absolute Emperor, reigning with complete authority\" Akishino admitted, turnning his gaze back to Mishima.\n\nMishima nodded in understanding, taking a step toward him before placing a hand on his shoulder."
 JAP_victory.2.a:0 "\"I will guide you, until you no longer need me.\""
 JAP_victory.3.t:0 "Absolute Imperial Power"
 JAP_victory.3.desc:0 "Akishino sat upon his throne in the Imperial Palace, inhaling and exhaling slowly as he sat there in his Imperial Regalia. Today, he would hear from some of the business and political leaders that had begun to crop up in the time after Japan's independence had been secured, each bringing forth a grievance or matter they wanted him to solve. Yukio had been insistent that these leaders send in their issues through mail or a phone call, figuring it would be a more effective matter, but the Emperor disagreed, at least for the time being. As he put it to Mishima, he needed to establish himself as a voice of authority, and making the leaders come to introduce themselves personally was a good way to gauge their intentions, as well as make his authority to them clear.\n\n\"How long until the first one arrives?\" Akishino asked, glancing over at Yukio who sat at a desk nearby, quietly working through some personal work of his.\n\nSome kind of book called 'Sun and Steel'.\n\nYukio glanced over at the time before shifting some paper to see the schedule.\n\n\"Shinzo Abe of Shinjuku City is expected to be here soon. He's the first on the list\" Yukio answered, getting to his feet and cleaning his desk in preparation for Abe's arrival.\n\n\"Shinzo Abe... isn't he Kishi's Grandson?\" Akishino inquired, having recognised the name.\n\n\"Yes. He's been down in the South of Japan as of late. Getting the railway lines functional again\" he explained, stepping away from his desk before standing at attention.\n\n\"Ah. I trust he's done well then?\"\n\n\"He has. He's... ambitious, from my understanding. I would keep an eye on him\" Yukio answered, earning a nod of agreement from Akishino.\n\nIt was there that the doors opened, an Imperial Soldier entering before bowing in respect.\"Emperor! Shinzo Abe has arrived from Yamaguchi.\"\n\nAkishino exhaled, adjusting his posture to look more regal before speaking."
 JAP_victory.3.a:0 "\"We are ready for him.\""
 JAP_victory.4.t:0 "Kyoto V Tokyo"
 JAP_victory.4.desc:0 "In Japan, there have been two historical capitals that have been in use at some point or another.\n\nThe first is Kyoto, historically the city that served as capital the longest and housed the Japanese Imperial Family for centuries. Granted, it isn't as large as some other cities in Japan, and it may not be as centrally located, but it's historical importance is undeniable.\n\nSecond is Tokyo, the capital of Japan in more modern times, yet arguably the most important city in all of Japan. Home to the most people in our country and located in the Kanto Region, our most populace and productive province, there was a reason to move the capital from Kyoto to Tokyo and that reason certainly hasn't lost its validity in this age.\n\nWith the two cities presented as possible capitals, the ultimately decision rests with the Emperor on where the administration of Japan shall take place from here on out."
 JAP_victory.4.a:0 "\"Kyoto, the historical capital!\""
 JAP_victory.4.b:0 "\"Tokyo, our largest city!\""
 JAP_victory.5.t:0 "The Building The Diet"
 JAP_victory.5.desc:0 "Akishino observed the constructions of the New National Diet alongside Kishi and Mishima.\n\n\"I still think the Diet is the least of our concerns\" Yukio stated plainly, hands behind his back as he observed the construction.\n\n\"Of course you do. You'd rather rebuild all the Palaces first then work out put together a civilian government\" Kishi answered lightly.\n\nMishima went to retort when Akishino raised his hand.\n\"Enough. Both of you. I know you have your reservations, Yukio, but like it or not, I'm not nearly experienced enough to make decisions with the proper wisdom for Japan. A Diet is necessary to ensure that Japan's needs are concerns are properly addressed. I expect you two to work together to make it happen and that is final.\"\n\nThe two men stood there for a moment before they nodded.\n\n\"Of course, Emperor\" Kishi spoke.\n\n\"I will, you have my word. I just fear the weakness that this could bring to Japan.\"\n\n\"Weakness comes in many forms, Yukio. Even I risk weakness without proper wisdom. I appreciate your concerns, but if Japan is to emerge, it needs strong leadership, not inexperienced leadership. Leadership I know you and Kishi can provide along with other representatives of the people\" Akishino countered measuredly, glancing back at Yukio.\n\nMishima sighed but nodded whilst Kishi smiled a little."
 JAP_victory.5.a:0 "\"Spoken like a true leader, Emperor.\""
 JAP_victory.6.t:0 "The Provisional Diet"
 JAP_victory.6.desc:0 "Akishino sat upon his seat overlooking the House of Councillors in the newly build National Diet, where the various representatives, either provisionally appointed or hastily selected to represent a region, were quickly finding their seats in preparation for their first meeting as a proper government. The Lower House headed by Kishi had already convened the day before, arguing and discussing numerous issues that soon found their to the House of Councilors where they were to be discussed.\n\nThough if he desired, Akishino was able to interject and give his own input on any selected issue, even vetoing bills if he wanted to, he resigned himself to being a silent observer for the time being unless he was asked something directly. Yukio Mushima made his way onto the podium, the newly appointed President of the House of Councilors. This was part of a compromise between he and Kishi. Kishi would be made Prime Minister, whilst Mishima would be President of the House of Councillors. Yukio glanced at the House he was left to wrangle, seeing the representatives all beginning to settle into their seats. Sighing, he glanced back at Akishino before he spoke.\n\n\"This will be chaotic, Emperor. So if you wish to learn, you best not let your mind drift too often.\"\n\nAkishino nodded his head in acknowledgement, Yukio seemingly satisfied with that as he returned his attention the Chambers."
 JAP_victory.6.a:0 "And so begins New Japan."