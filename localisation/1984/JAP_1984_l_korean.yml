l_korean:
 JAP_country_selection_tt:0 "§YHOW TO PLAY THE SECOND RIGHTEOUS ARMY\n-----------------------------------------§!\nPlay as the §RDemocratic People's Republic of East Asia§!, play through content until the province breakdown prior to the revolts occurs. When this occurs, open the decision menu and scroll down to the §Y'Growing Unrest'§! decision menu and click the decision to switch to the §YEastern Islands Province§!\n\nWait until the event to switch to the §PSecond Righteous Army§! pops up."
 1984_Opening_Screen_JAP_Title_TT:0 "§PSECOND RIGHTEOUS ARMY§!"
 1984_Opening_Screen_JAP_Desc_TT:0 "In the wake of §YWorld War Two§!, the §PJapanese Empire§! had been dismantled and the Home Islands occupied by the §mUnited States of America§!. We were beaten by combined Allied might, with two of our cities being devastated by nuclear fire, the first to ever endure such a fate. Many restrictions were imposed upon Japan, from military to political, effectively reducing the nation to a vassal state.\n\nJapan, however, still lived on and it seemed we were bound to bounce back from the brink as American, later known as Oceanian, investment seemed poised to flow into the country, putting on the cusp of an economic miracle. But before we could enjoy the fruits of investment, catastrophy happened as the §ROceanian Civil War§! erupted, silencing all economic prospects as the Oceanians turned inwards to fight their war. Without Oceanian Investment and Europe subjugated by Soviet military might, our ability to rebuild was impeded. Our industrial capabilities were a shadow of what they used to be and though we no longer adhered to American restrictions upon our military by the time of the §Y1960s§!, our Armed Forces were still weak and underprepared for a fight.\n\nIt was there that at the onset of the §Y1970s§! that the §RJuche§! plague that had been spreading across §REast Asia§!, conquering all of Korea and China, had turned its sights upon Japan.\n\nThey landed their forces, sweeping across our islands in waves. Though our military held the line as well as they could, inflicting heavy casualties upon the enemy, our limited industrial and supply capabilities proved to be our undoing. Japan had been conquered, with the final and most devastating act being the §RMassacre of the Imperial Family§!, an act aimed to show to the world the total destruction of Japan, an act not even the Americans performed.\n\nThough the §PSecond Righteous Army§! resisted the §RJuche slaves§!, the people were demoralised and broken, having been defeated twice in warfare, utterly humiliated by foreign powers. Even within our own organisation, there existed a deep malaise. But it would be a discovery that changed everything. The discovery of a young man working in a field, tending to a farm his adoptive carers had left for him after their passing.\n\n§GAkishino§! had been found. An heir to the §YChrysanthemum Throne§! lived, and with it, the reignited hope that §PJapan§! could live again!"
 1984_Opening_Screen_JAP_Gameplay_Paths_Desc_TT:0 "§YJapanese Paths§!\n- Crush all §tEast Asian Juche Slaves§! and cast out East Asia from Japanese shores!\n- Restore the §PEmperor of Japan§! to his rightful place on the §YChrysanthemum Throne!§!\n- Make Japan an §YAbsolute Monarchy§! §YOR§! create a §YConstitutional Monarchy§! and bring back the §PNational Diet!§!"
