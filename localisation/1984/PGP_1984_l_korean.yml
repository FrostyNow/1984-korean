l_korean:
 PGP_PROVISIONAL_GOVERNMENT_OF_THE_PHILIPPINES:0 "§WThe Provisional Government of the Philippines is a coalition of various parties all unified with one goal, to bring back democracy to the Philippines against the RAM-AFP Forces in Manila. Unfortunately, however this is one of the few unifying factors that keeps the provisional government together. The coalition is unstable with a lack of any central leadership, the desire for democracy and the army keeping the whole resistance together.§!"
 PGP_Ninoy_Aquino_head_minister_desc:0 "§aLakas ng Bayan§!\n§YHead of the Resistance!"
 PGP_Salvador_Laurel_foreign_minister_desc:0 "§aUNIDO§!\n§YInfamous Leader§!"
 PGP_Vicente_Jayme_civil_war_economic_minister_desc:0 "§aProvisional Government of the Philippines§!\n§YCivil-Military Leader§!"
 PGP_Juan_Enrile_defence_minister_desc:0 "§aProvisional Government of the Philippines§!\n§YPolitical Protégé§!"
 PGP_Fidel_V_Ramos_defence_minister_desc:0 "§aProvisional Government of the Philippines§!\n§YExperienced Field Marshal§!"
 PGP_Unstable_Coalition:0 "Unstable Coalition"
 PGP_Unstable_Coalition_desc:0 "\n\n\n\n£GFX_PGP_Unstable_Coalition\n\n\n\n\n\n\n§WThe Provisional Government of the Philippines is an unstable coalition consisting of various parties with various beliefs. Although they believe in the fight for democracy the coalition suffers internal issues regarding issues such as providing basic services in this time of crisis. For now however, the provisional government is distracted and united with putting down the RAM-AFP Government.§!"
 PGP_Fight_For_Democracy:0 "Fight for Democracy"
 PGP_Fight_For_Democracy_desc:0 "\n\n\n\n£GFX_PGP_Fight_For_Democracy\n\n\n\n\n\n\n§WThis is it, its democracy or another painful dictatorship for the Philippines. The fight for democracy is now and the RAM-AFP shall be taken down from their illegitimate rule in Manila and we shall restore democracy as it was meant to be. Thousands of men join our ranks for their childrens future and for them to not experience the same suffering as they did during Marcos.§!"