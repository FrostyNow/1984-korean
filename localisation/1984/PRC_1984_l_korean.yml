 PRC_PRC:0 "People's Republic of China"
 PRC_PRC_DEF:0 "The People's Republic of China"
 PRC_PRC_ADJ:0 "Chinese"
 PRC_The_Second_Long_March:0 "The Second Long March"
 PRC_The_Second_Long_March_desc:0 "\n\n\n\n£GFX_PRC_The_Second_Long_March_Banner\n\n\n\n\n\n\n§WDecades ago, our movement was on the verge of being extinguished by the Nationalist Government in Jiangxi when we dared to stage a large-scale military retreat thousands of kilometres to Shaanxi at great cost to our numbers but ultimately allowing us to survive another day. After our takeover of Northern China following the Second World War, we were once again caught off guard by the sudden takeover of our government by the Eurasian-backed Workers’ Party of East Asia.\n\nThe subsequent persecution had once again forced us to retreat back to Shaanxi, once more at great cost to our numbers but once again living to fight another day. The following years have seen us regroup and replenish our lost numbers awaiting the day where we can strike back against the East Asian oppressor.\n\nThat day has now come and we can no longer afford to be on the back foot again, the time for liberation is now or never and we shall take that chance and cling tight for the future of our nation.§!"
 PRC_The_Great_Leap_Forward:0 "The Great Leap Forward"
 PRC_The_Great_Leap_Forward_desc:0 "\n\n\n\n£GFX_PRC_The_Great_Leap_Forward_Banner\n\n\n\n\n\n\n§WOur current industrial position is less than ideal thanks to our size and having no time to implement our reforms before the coup, as a result, our industry is still as much of a backwater as it was when the civil war ended no thanks to the East Asian Regimes insistence on forced industrial and technological stagnation.\n\nWith our fight for independence, we will mobilise our people to serve a greater cause, our farmers will become industrial workers overnight as we work to build our industry to be more than just blind servitude and turn it into something that truly serves the people.§!"
 PRC_The_Cultural_Revolution:0 "The Cultural Revolution"
 PRC_The_Cultural_Revolution_desc:0 "\n\n\n\n£GFX_PRC_The_Cultural_Revolution_Banner\n\n\n\n\n\n\n§WFor centuries, Chinese culture has always been regressive compared to the rest of the world. Even with the revolution of 1912, the traditions that held our people down were mostly maintained, condemning the people to more years of oppression. After the Workers’ Party coup, the Culture became far worse and oppressive, demanding servitude to the state above all else under the guise of \"liberation from the self\".\n\nThis will no longer be the case, our revolution will be the one that will finally bring the change our society needs, no longer will the common peasant will serve the will of an individual or state but instead they shall serve only for the collective good of their community and nation. The Four Olds will be smashed once and for all.§!"