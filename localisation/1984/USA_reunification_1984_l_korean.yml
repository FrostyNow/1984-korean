 USA_AMERICAN_REUNIFICATION_FLAG:0 "§YHAS REUNITED AMERICA§!"
 USA_American_Reunification_decision_category:0 "American Reunification"
 USA_American_Reunification_decision_category_desc:0 "The American People have awoken and have waged a campaign of independence from the rule of Oceania and its vast forces of indoctrinated troops. But as we carve out our piece of the continent, it is becoming increasingly clear that our enemies will be the other warlords and factions soon enough. They will all want to reunify this country under their own regime and no doubt, blood will be spilt in the name of American Reunification.\n\nAmerica is a shadow of its former self, still picking up the pieces in the midst of the chaos that engulfs our land. But if our land is to remain free of Oceanian occupation and stand on its own once more as a nation free to chart its own destiny, there remains only one outcome that must be achieved...\n\n§RAmerica must reunite, lest it be picked off by the wolves.§!"
