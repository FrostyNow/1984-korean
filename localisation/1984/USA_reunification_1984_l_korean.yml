 USA_decision.1.t:0 "Selecting a New Capital"
 USA_decision.1.desc:0 "With the country reunited, members of government have brought up the idea of moving our capital to another city. While many have thrown around the idea of returning to Washington, other cities have also been proposed for a new capital. There are also those who feel that moving the capital elsewhere is a waste of time and resources, believing that the current capital is fine as it.\n\nThe final decision for the capital of America is ultimately yours to make."
 USA_decision.1.a:0 "Our current capital will do"
