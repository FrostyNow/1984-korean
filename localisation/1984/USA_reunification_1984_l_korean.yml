 USA_state_reintegration_decision_category:0 "State Reintegration"
 USA_state_reintegration_decision_category_desc:0 "In the wake of war, the states of our Union, from the Pacific to the Atlantic, have struggled with the notion of what it means to be an American in a world in which that identity has been torn apart and distorted by the forces of Big Brother and Oceania.\n\nConfusion still reigns among the population and there are those who would still consider themselves alligent to their former oppressors. The prospect of reintegrating these regions back into a unified national government will not be a simple one. It will be a long and at times, arduous journey to bring our country back together.\n\nOne state at a time."
