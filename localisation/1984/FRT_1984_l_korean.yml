l_korean:
 FRT_BOOKMARK_DESC:0 "Life in the Frontier is nothing short of a living nightmare. Beyond the relative safety of the cities lies a treacherous landscape where various rebel factions reign supreme. Each day brings new devastation as these groups unleash violence and chaos against the Oceanian regime, which is struggling to impose order on this vast and unruly territory. What was initially envisioned as a straightforward expedition north across the border of the Cape Province has morphed into one of the most significant blunders in the region’s recent history.\n\nThe situation is further complicated by a mix of colonial remnants, disillusioned African Marxists, and courageous freedom fighters, all of whom are united by a common goal: the overthrow of the current administration. This volatile mix of ideologies and motives fuels the ongoing Bush War, which has left communities torn apart and landscapes scarred. As the conflict escalates, the specter of ruin looms ever closer, threatening not only the Frontier but potentially serving as a harbinger of turmoil that could sweep through Oceania itself."
 1984_Opening_Screen_FRT_Title_TT:0 "§gFRONTIER ADMINISTRATION§!"
 1984_Opening_Screen_FRT_Desc_TT:0 "The §gFrontier Administration§! is a recent addition to the territory of Oceania, having been brought into the fold four years ago in 1980 with the breakthrough of Oceanian troops into the region which saw the tribes and governments of the region either collapse or retreat into hiding.\n\nYet, despite the conquest here, Oceanian rule here is far from absolute. Guerrilla fighting rages across the territory, from hostile tribes to the §nRhodesians§!, threatening our hold on the region and preventing Oceania from striking deeper into Africa. With each passing day, the rebels grow ever more bolder, the various factions of the region having largely united in opposition to the Oceanian presence in the region.\n\nWith the growing tensions in the Frontier, combined with the support the rebels enjoy from the other free nations in Africa, its seems to only be a matter of time before rebellion becomes all out §Rwar§!."
 1984_Opening_Screen_FRT_Gameplay_Paths_Desc_TT:0 "§YFrontier Paths§!\n- Crush the §RAnti-Revolution§! and resecure control of the Frontier.\n\n§YFRONTIER REVOLT TAGS§!\n- @RHO§nRepublic of Rhodesia§!"
 1984_Opening_Screen_FRT_Button_TT:0 "Africa In Chains"
 FRT_Let_Them_Come_tt:0 "§RThe Bush War Escalates!§!"
 FRT_frontier_bush_war_decision_category:0 "Frontier Bush War"
 FRT_reunite_frontier:0 "Reunite the Frontier"
 FRT_Frontier_Bush_War:0 "Frontier Bush War"
 FRT_Frontier_Bush_War_desc:0 "\n\n\n\n£GFX_FRT_Frontier_Bush_War_Banner\n\n\n\n\n\n\n§WUnlike the carefully planned and perfected Forever War being waged between Oceania, Eurasia, and East Asia, the Frontier Bush War is an honest to Big Brother War that has put strain on this administration and its ability to retain control.\n\nThe Rebels here are cunning and patient, masters of the terrain we aim to dominate and above all, enjoy high support amongst the local populace, regardless of how they look or the language that is spoken.§!\n\n§RThis Bush War is devastating our forces in the region, and if we can't get the situation under control soon, our time here may be short lived.§!"
 FRT_Party_Mandated_Immigration:0 "Party Mandated Immigration"
 FRT_Party_Mandated_Immigration_desc:0 "\n\n\n\n£GFX_FRT_Party_Mandated_Immigration_Banner\n\n\n\n\n\n\n§WWe can't rely on the people in the Frontier becoming loyal subjects of Oceania any time soon. They're far too rebellious and unruly to be relied on, at least in the short term.\n\nSo the Party has decreed that it would be simplier to just move in people from the other provinces to bolster our presence in the region and try offset the local resistance factor.\n\nThe results have been mixed.\n\nWhilst the immigrants brought in have been useful in boosting our manpower and control in the region, this has also further motivated rebel groups, who don't enjoy the idea of being replaced by Oceanians to say the least. Even certain groups such as the Rhodesians have managed to take advantage of Immigration to further their own goals, managing to snatch up and indoctrinate our fresh citizens into their movement.§!\n\n§RImmigration will only be a benefit to us if we can use the manpower to get the region under control.§!"
 FRT_Linguistic_Chaos:0 "Linguistic Chaos"
 FRT_Linguistic_Chaos_desc:0 "\n\n\n\n£GFX_FRT_Linguistic_Chaos_Banner\n\n\n\n\n\n\n§WEnglish, German, Portuguese and an absolute mess of other native language groups has made the implementation of Newspeak, let alone the wider system of English Socialism, near impossible with only limited success in cities such as Lusaka and Salisbury.\n\nTo put it frankly, Southern Africa is a bit more complex than Oceania's integration of Latin America into it's territory, one that will take considerably more time to assimilate.§!\n\n§RTime we may not have...§!"
 FRT_The_Coming_Storm:0 "The Coming Storm"
 FRT_The_Coming_Storm_desc:0 "The way the Frontier Bush War has been going, the chances of this resolve in a less than chaotic matter becomes increasingly less likely. The rebels here are organised, motivated to fight us and are supported by the Free Nations.\n\nInstead of burying our heads in the sands, it would be more productive to prepare for what is sure to be a fight for our right to dominate this Frontier."
 FRT_Holding_Lusaka:0 "Holding Lusaka"
 FRT_Holding_Lusaka_desc:0 "Lusaka is the heart of the Frontier, our base of operations from which our administration functions. Giving it up is not an option, losing one of the few strongholds we can reliably control leaves is too risky and leaves too many unknowns. We shall pool our resources into Lusaka, ensuring that it will be a fortress that the rebels will never breach."
 FRT_The_Mozambique_Strategy:0 "The Mozambique Strategy"
 FRT_The_Mozambique_Strategy_desc:0 "With war on the horizon, the possibility that we may, for a time, lose control of Lusaka is a possibility that needs to be considered. Located close to many rebel groups, especially the Rhodesians, it may be more efficent to pull over to the somewhat more stable coastal region of Mozambique and prepare it so that if Lusaka is to fall, Mozambique can not only ensure the survival of our administration but also as a spring board from which we can recapture whatever we may have to give up to survive."
 FRT_The_Industrial_Core:0 "The Industrial Core"
 FRT_The_Industrial_Core_desc:0 "Lusaka is our most loyal city, the heart of our territory and the one city that we cannot afford to lose. But with the rebels poised to war open warfare against our faltering regime, it is necessary that all economic and manufacturing resources that we can muster be centered around Lusaka so that when the war comes, we won't find ourselves under-tooled and under-equipped."
 FRT_Request_Aid:0 "Request Aid"
 FRT_Request_Aid_desc:0 "We can't leave anything to chance. We have lost many during the Bush War and we risk losing even more in open conflict against the Frontier. Whilst bodies is something we can spare, our equipment reserves leaves much to be desired. It would be prudent to reach out to Big Brother and the Party aboard and request any aid they can muster to boost our chances of securing this territory in the name of Big Brother."
 FRT_Rapid_Development_Initative:0 "Rapid Development Initative"
 FRT_Rapid_Development_Initative_desc:0 "Having men on the field means nothing if we can't sufficently arm them to face down the rebel threat. The economy of the Frontier is underdeveloped and is already at risk of falling to pieces with the Bush War continuing to weaken our forces. Perhaps the entire economic and industrial base of the Frontier cannot be saved, but we can ensure that Mozambique can house enough industrial facilities to keep the fight going and keep the fight going, even if Mozambique is all we may be forced to rely on."
 FRT_Let_Them_Come:0 "Let Them Come!"
 FRT_Let_Them_Come_desc:0 "Midnight is coming for the Frontier. The rebels are going bolder, recognising our failing authority in parts of the nation and are capitalising on our weakness. It's time to dig in and prepare for the worse, for it won't be long before they challenge us openly.\n\nTo all rebels and traitors alike throughout the Frontier, we say this.\n\n§RCome and get us!§!"
 FRT_starting.1.t:0 "The Frontier - 1984"
 FRT_starting.1.desc:0 "Our time in this land beyond the boundaries of the Cape has been nothing short of hellish. A vast territory filled with rebels and discontented natives at every turn, from the Rhodesians and their mechanized strikes on our supply lines to the guerrilla attacks conducted by rebels in Angola and Madagascar, much of the control Oceania has here is largely on paper, with only a select few settlements that could actually be considered safe.\n\nFrankly, its only a matter of time before this conflict transforms from exhausting guerrilla warfare to an all out war. The clock is ticking and necessary preparations must be made if we want to stand a chance at vanquishing the rebels once and for all."
 FRT_starting.1.a:0 "We must prepare for the worst"
 FRT_starting.2.t:0 "The Frontier Requests Aid!"
 FRT_starting.2.desc:0 "Diplomats from our administration in the Frontier, North of the Cape Province, have come to us requesting material aid in dealing with the internal conflict that has been plaguing their administration. They tell us of growing rebel movements in the region and have insisted that if nothing is done, the entire Frontier could collapse entirely with all of the men and resources that have been poured into the territory being wasted.\n\nUnless we want to show the Free States that we will simply abandon territory if the situation becomes too difficult to manage, we best show our support for the administration and provide an ample amount of equipment to bolster their forces and ensure that integration efforts in the region continues."
 FRT_starting.2.a:0 "We will give them what we can spare"
 FRT_starting.3.t:0 "Additional Hardware Recieved!"
 FRT_starting.3.desc:0 "After some waiting, we have finally recieved positive news from the Party back in Oceania proper, who have agreed to supply us with needed equipment to sustain our operations and counter the rebel threat in our lands. It may be too late to utilize these resources to end the Bush War before it becomes worse, it will provide us with the tools needed to fight the rebels when the time comes, and win."
 FRT_starting.3.a:0 "Ad Victori Spolia"