l_korean:
 OCA_news.1.t:0 "[GetNewspaperHeader]                                         Oceanian Reunification"
 OCA_news.1.desc:0 "With the final rebel groups being routed and the armies of Oceania triumphant, it would appear that all territories of Oceania have been formally reunited under one banner once more. Already, the lingering rebels and Thought Criminals that emerged during the revolt are being hunted down by INGSOC and the old order, once near broken by the scale of the revolution against Big Brother, is slowly but surely being pieced back together.\n\nIt is unknown what the future holds for Oceania now that the dust has settled, or there is to be a future at all now that INGSOC reigns unopposed once more."
 OCA_news.1.a:0 "Death of History"
 OCA_news.2.t:0 "[GetNewspaperHeader]                                         The South American War"
 OCA_news.2.desc:0 "Despite years long efforts to pacify the region of South America and integrate it into Oceania proper, the Entente backed continent has long stood defiant against Oceanian desires to rule the entire Western Hemisphere.\n\nHowever, with the Entente in shambles and South America more isolated than ever, Oceania has made it's move to secure South America once and for all. The response from the Latin American United Front has been swift, all nations quickly mobilising and moving their military forces to the front lines to stop Oceania in it's tracks once more. Only time will tell whether South America will stand triumphant this time or fall to Oceania."
 OCA_news.2.a:0 "The South Alight!"
 ENG_news.1.t:0 "[GetNewspaperHeader]                                         Victory in Britain"
 ENG_news.1.desc:0 "The island of Great Britain. The land from which English Socialist was birthed into existence, setting the stage for what Oceania has become. The heartland of totalitarianism, the seemingly indestructable home of INGSOC and Big Brother, even when other areas of the world have become chaos zones for Oceania.\n\nToday, Great Britain was liberated from Oceanian rule.\n\nAcross the island, celebrations have occured, on the fields and the streets. New governments have been established and INGSOC remnants are being swept away by the new rulers of the island."
 ENG_news.1.a:0 "Long Live Britain"
 ENG_news.2.t:0 "[GetNewspaperHeader]                                         Restoration of the Kingdom of England"
 ENG_news.2.desc:0 "Following the victory in Britain against the forces of INGSOC, the next steps of the newly freed nations were up in the air. But for England, a new destiny had been cemented. With the return of one of the few remaining members of the old Royal Family returning to England, it was only a matter of time before the English returned to their roots with the coronation of a new King, and with it, the restoration of the Kingdom of England.\n\nWhat this means for Britain as whole remains to be seen, with Wales and Scotland fearing a new king may bring about new ambitions within England. But one thing remains certain. Great Britain is moving on from Big Brother."
 ENG_news.2.a:0 "England on the mend"
 ENG_news.3.t:0 "[GetNewspaperHeader]                                         Restoration of the United Kingdom"
 ENG_news.3.desc:0 "What was once believed to be an impossibility by many, both in Great Britain and around the world, the restoration of the United Kingdom of Great Britain has been achieved.\n\nThough a shadow of the once great empire Britain once controlled decades ago, the reunification of the island of Great Britain marks a turn away from the decay and humiliation Britain had endured under the reign of INGSOC and toward a new beginning for Britannia, where Britain can carve out its own place in the world once more.\n\nThough there still exists challenges for new Britain, the future looks much brighter for the British people."
 ENG_news.3.a:0 "The Crown Triumphant"
 USA_news.1.t:0 "[GetNewspaperHeader]                                           The Second American Revolution"
 USA_news.1.desc:0 "More than two centuries after the first shot was fired in Concord, a new revolutionary war for independence has erupted in North America. Amid the chaos in Oceania, rebel groups from the Province of the Thirteen Sectors are rising up against the oppressive regime of Big Brother.\n\nVarious factions across North America are united in a desperate struggle against INGSOC. This conflict not only seeks to determine control over North America but its soul as well. INGSOC officials speaking of behalf of Big Brother have vowed to defeat all elements of the Anti-Revolution and wipe out the traitors and thought criminals whever they dare emerge."
 USA_news.1.a:0 "Echoes of History"
 USA_news.2.t:0 "[GetNewspaperHeader]                                         Cascadian Republic Unifies America!"
 USA_news.2.desc:0 "Fighting from the west all the way to the eastern shores, the lands of America have been unified under the leadership of Howie Hawkins.\n\nA president with a green thumb, Howie has wasted no time in undoing the damage Oceania has done to America over the many years it has ruled over the land. Telescreens have been dismantled, civil liberties have begun to be reinstated with legislative elections acorss the country already being organised. In line with his environmental pursuits, National Parks such as Yellowstone and Yosemite have been reinstated with environmental recovery being a firm aspect of his agenda to rebuild America to the glory and beauty it once knew."
 USA_news.2.a:0 "A green America"
 USA_news.3.t:0 "[GetNewspaperHeader]                                         Northwest White Nationalists establish                                         the American National Imperative!"
 USA_news.3.desc:0 "\nOnce a movement that was contrained to the Northwestern states of the former United States of America, with the aim of establishing and maintaining a white homeland in North America, that vision has since expanded to encompass all of America with Harold Covington as the sole leader of the newly declared American National Imperative.\n\nWith its ideology rooted in white supremacy and isolationism, the American National Imperative stands as a powerful but lonely power, its attention focused inward on the affairs of America, paying no mind to the rest of the world. Whether this mindset pays off for the Americans, only time can tell."
 USA_news.3.a:0 "Whitemans second homeland"
 USA_news.4.t:0 "[GetNewspaperHeader]                                         Silver Front Reunites America!"
 USA_news.4.desc:0 "Beginning as a rebellion in the northeast of Nevada, the Silver Front didn't initially seem to be in a position of strength. They were up against insurmountable odds against Oceania and other emergent warlord states. Yet, against all odds and expectations, the Silver Front has reunited America under their rule. Guided by General Robert J. Dwyer, the Silver Front has promised to the nation to heal the nation from Oceania's rule, promising reconstruction and an eventual return to democratic norms that existed prior to the emergence of INGSOC. Though apprehension lingers in the air over the future of America under the rule of a once fringe movement, the future looks much brighter than it ever did under the rule of Big Brother."
 USA_news.4.a:0 "An unlikely outcome, but not entirely unwelcomed"
 USA_news.5.t:0 "[GetNewspaperHeader]                                         Manson Declares the Covenant"
 USA_news.5.desc:0 "After years of fighting across the lands of the former United States, a battle waged between Oceanian provinces and militant factions, the territories of the United States of America have been reunited, though the result is no improvement from what came before.\n\nCharles Manson and the Manson Family have pulled off an unlikely victory, securing their hold over the entire country through blood and violence, and the consequences are becoming increasingly clear. Rumours of the kidnapping of children into 'Family Camps' and rumours of an internal racial purification war have circulated across the world. America has become a more isolated land, a place of ghost stories and devotion to one psychotic man."
 USA_news.5.a:0 "Heaven must exist because Hell clearly does"
 USA_news.6.t:0 "[GetNewspaperHeader]                                         Reagan Restores the Union!"
 USA_news.6.desc:0 "Years of battle for the future of America has been resolved with Ronald Reagan of California uniting the states of American and declaring the reformation of the United States of America.\n\nEspousing populist sentiments and fostering a renewed sense of American identity among the population of America has helped propell him from the Sierra Nevada mountain range to the eastern shores of America. With conflict coming to a close, Reagan has begun the implementation of programs design to restart the American economy in order to restablise and restrengthen the nation, aiming to make sure that no nation can ever threaten the United States or her people ever again."
 USA_news.6.a:0 "Sea to Shining Sea!"
 USA_news.7.t:0 "[GetNewspaperHeader]                                         The American Empire Declared!"
 USA_news.7.desc:0 "What began as a fringe movement that had rooted itself in California, not only has the American Empire found an heir to be crowned as Emperor of America, but has managed to sweep across the land from the Western Seaboard to the East.\n\nImperial parades in honor of the conquest have popped up in major American cities, as part of a wider effort to legitimise the new regime and further cement the idea of a monarchy reigning over America. The rise of the American Empire appears to be in defiance of the tradition of republicanism in America, seemingly ending any notions of the restoration of the old United States of America for the time being."
 USA_news.7.a:0 "How far will this Empire go?"
 USA_news.8.t:0 "[GetNewspaperHeader]                                         American People's Liberation Army\n                                         Liberates America!"
 USA_news.8.desc:0 "\nAfter years of fighting, Maoist Thought has conquered the entirety of America under the rule of Bob Avakian. Once a loose coalition of leftist resistance groups and partisans fighting united by a desire to cast off the chains of Oceania, Avakian has whipped the coalition into a proper Party and has cemented his rule with brutal efficiency. Work camps designed to transform political dissidents into forced labourers have been opened across the land, with swift implementation of collectivist policies beginning the transformation of America. The roots of privatisation and land ownership have seemingly been swept away as a red order enforces its dominion over the nation."
 USA_news.8.a:0 "Red sun over paradise"
 USA_news.9.t:0 "[GetNewspaperHeader]                                         US Naval Exiles Reunite America!"
 USA_news.9.desc:0 "For the sailors of the remnants of the Pacific Fleet, the idea of returning home had been a distant dream. Bouncing from island to island, scrouging whatever they could to survive, the US Naval Exiles had been on the verge of breaking.\n\nBut with the emergence of rebellion came the chance to come home. From San Diego, the Naval Exiles have fought inch by inch for the home they longed to see, resulting in the total reclamation of America. The Admiralty Board, guided by Admiral Crowe, has begun the transformation of America, implementing the lessons the naval exiles had learnt from their time at sea into their new system of government, designed to forge a new America for the new age."
 USA_news.9.a:0 "The exile is over"
 USA_news.10.t:0 "[GetNewspaperHeader]                                         Howard Hughes Establishes the\n                                         American Economic Free Zone"
 USA_news.10.desc:0 "\nThe rise of the American Economic Free Zone has emerged is almost as mysterious as the man behind it all. From what there is to know about the unified American nation, tracing its new roots from the city of Las Vegas, it its detication to three key princples:\n\nOrder.\nStability.\nInnovation.\n\nAll of this orchestrated by Howard Hughes, a face behind a screen, a voice behind the radio. His presence unknowable, yet his authority unquestioned."
 USA_news.10.a:0 "The House Always Wins"
 USA_news.11.t:0 "[GetNewspaperHeader]                                         Establishment of Arcadia!"
 USA_news.11.desc:0 "When the revolts across North America took place, shaking the very fabric of Oceanian America to its core, very few expected the partisans of the Bitterroot Mountains to succeed to taking control of America. Yet, take control they did. Though, unlike the other warlords of America who sought to rebuild their own vision of America, the new administration led by Wilfred Tripoli has embraced a vision of Arcadia.\n\nFree from the past that came before, Arcadia represents a new chapter of America, one that takes from the old United States of America and refines all the lessons that were learnt in order to produce a new nation primed for the new world it finds itself in."
 USA_news.11.a:0 "A new name for a new era"
 USA_news.12.t:0 "[GetNewspaperHeader]                                         The Second Continental Army\n                                          Reclaims America!"
 USA_news.12.desc:0 "\nAfter years of guerilla warfare in the Rocky Mountains, sabotaging and fighting every day and night to weaken Oceania's authority and one day restore America as it once was, the Second Continental Army has emerged victorious in it's quest to reunite America.\n\nTracing it's roots back to the old government that existed prior to the emergence of INGSOC and the collapse of the old world, the resurgent United States of America stands as the most legitimate of the land. Through all the uncertainty that has plagued the world since the Anti-Revolution kicked off, there is one truth that remains certain: America is back."
 USA_news.12.a:0 "1776 repeated!"
 USA_news.13.t:0 "[GetNewspaperHeader]                                         Freedonia Unites America!"
 USA_news.13.desc:0 "The Wolverines were once a guerilla partisan group battling against Oceania in the mountains, forests and hills surrounding the town of Calumet. Today, they are the sole ruling authority over America, having swept away all opposition to unite America. With their authority over America cemented, not as America, but the nation of Freedonia.\n\nOnce a name suggested for the United States in its early years, Freedonia stands as a nation committed to the ideals of freedom and independence. A land where the children of liberty thrive and the evils of tyranny comes to die. The future for this new nation remains uncertain, but with new leadership comes hope for a better tomorrow."
 USA_news.13.a:0 "A grassroots nation"
 USA_news.14.t:0 "[GetNewspaperHeader]                                         Goldwater Reunifies American Lands"
 USA_news.14.desc:0 "The lands of America after years of warfare and struggle have been reunited under the leadership of Barry Goldwater. Hailing from the lands of Arizona, Barry Goldwater has consolidated America under his control with a unique approach to reconstruction. As opposed to a heavy handed, government led approach to reconstruction, Goldwater seeks to avoid perceived government encroachment on the lives by instead promoting limited government reconstruction projects and free market enterprise, hoping to encourage people to organise among each other to produce the resources necessary to rebuild America whilst also fostering a sense of independence & self-reliance amongst the American people."
 USA_news.14.a:0 "Can the markets rebuild America?"
 USA_news.15.t:0 "[GetNewspaperHeader]                                         The Oil King Saves America!"
 USA_news.15.desc:0 "When the race to unite America began, with various warlords racing to claim land and resources for their efforts, few expected the victor of this race to originate from the Dakotas of all places. And yet, as the American Federation stands as the sole governing authority of the land.\n\nThe American Federation is commanded by a council of industrial and resource interests, rulling with a governing philosophy that solely concerns itself with stability and the development of America. the American Federation is certainly better than Oceanian rule, there do exist clear issues. Heavy critism of the government is heavily suppressed and opposition is managed with a heavy hand."
 USA_news.15.a:0 "One nation under oil"
 USA_news.16.t:0 "[GetNewspaperHeader]                                         The Second American Revolution"
 USA_news.16.desc:0 "When the American Revolution occured, it was a poltical and cultural transformation that saw the Americans establish a nation separated from Britain with a republican foundation. Over two centuries later, the Second American Revolution has come, transforming the political and cultural identity of America once more.\n\nAmerica has come to America, brought forth by Gus Hall. Red Banners fly high in the air as Five Year Plans are implemented to revive the industrial base of America and prepare the Western Hemisphere for total 'liberation' from the bourgeoisie. The world can only watch on as a Red Goliath rises from the ashes of Oceanian rule."
 USA_news.16.a:0 "A Red Dawn engulfs America"
 USA_news.17.t:0 "[GetNewspaperHeader]                                         The Rise of Tomorrowland!"
 USA_news.17.desc:0 "The future is always so near, yet so distant. Under the reign of Oceania, the future was a distant dream, beyond their reach of man. Oceania ensured stagnation in an attempt to cement their regime forever. When Oceania buckled, Tomorrowland emerged under the rule of Michael Carter. A strange man, with strange characteristics and an unusual mindset that some may argue isn't fit for leadership, the outcome speaks for itself. From Los Angeles to New York City, the future is no longer a distant dream but a reality within reach. Technologies once believed impossible are being invented and a sense of hope for tomorrow has begun to take hold within the people. For America, the age of stagnation is over, and with it comes the age of the visionaries."
 USA_news.17.a:0 "Tomorrows future, today!"
 USA_news.18.t:0 "[GetNewspaperHeader]                                         White Supremacists Conquer America!"
 USA_news.18.desc:0 "After a protracted series of conflicts spanning the territory of the former United States, the Knights of the Ku Klux Klan, led by David Duke, has emerged as the ultimate victor. Speaking to the public, Duke has pledged to create America as it was allegedly envisioned by the Founding Fathers. As a paradise for the White Man alone. And with that statement, there doesn't seem to be much room for anyone else in that equation.\n\nAlready, policies of segregation are being implemented with Black Americans being removed from urban areas to designated 'black zones'. A new America has been forged, though it is clear that in the eyes of this nation, not all men were made equal."
 USA_news.18.a:0 "State enforced hierarchy"
 USA_news.19.t:0 "[GetNewspaperHeader]                                         Native Americans Reunify America!"
 USA_news.19.desc:0 "When Oceanian authority collapsed across America, few were expecting the Native American tribes to emerge as a viable faction, much less be the ones to unite America itself. Led by Billy Walkabout of the Cherokee Tribe, the newly established United Tribes of America has before it a difficult task of mending a broken nation. With the fate of the nation in his hands, Billy has begun a program not of supremacy or retalitation, but of reconciling the peoples that are all within the nation, aiding communities, Black, White or otherwise, in the reconstruction of their homes. It will not be an easy effort to unite these groups, but perhaps through the shared experience of life under Oceania, new common ground between all Americans can be found."
 USA_news.19.a:0 "Healing old divisions"
 USA_news.20.t:0 "[GetNewspaperHeader]                                         Texan Nationalists Liberate America!"
 USA_news.20.desc:0 "Beginning as a movement to establish a free Texan Republic, the vision of Chuck Norris and his administration has spread to encompass all of America, uniting the nation under a single banner. The reasoning for expanding Chuck's vision was clear: \"A Texan led America means a safe Texas.\"\n\nThe Norris administration has been swift to minimise the perception of Texan favouritism among the American people, sponsoring the reconstruction of critical infrastructure and industries in major regions whilst utilizing the armed forces to vanquish any lingering INGSOC remnants still terrorising the American people and ensuring order and stability across the nation."
 USA_news.20.a:0 "Nobody crosses Chuck Norris"
 USA_news.21.t:0 "[GetNewspaperHeader]                                         Establishment of the Kingdom of\n                                         America!"
 USA_news.21.desc:0 "\nIn the waning days of the United States of America, there was a growing sense of distance between the United States as the Founding Father's envisioned it and what America had become. It was this sentiment that had inspired the Washington Family to take a more active role in the future of America. By establishing a Kingdom with the Washington's at the helm of the nation, ensuring that all institutions remain adherant to George Washington's vision.\n\nWhilst still democratic, with a Congress remaining a key institution, there is still uncertainty among the population, with many wondering if monarchy is the best solution for America."
 USA_news.21.a:0 "Would Washington have wanted this?"
 USA_news.22.t:0 "[GetNewspaperHeader]                                         The Imperium Declared!"
 USA_news.22.desc:0 "Emerging from the forests of Wisconsin, Francis Parker Yockey and his forces have secured domain over the lands of the former United States of America. Unlike many of the other warlords who emerged to establish their own version of America, Yockey has come with a much different vision in mind. That vision being to the unite all of Western civilisation under one single banner.\n\nAlready, the process of transforming American society has begun with the aim of creating a nation that views themselves as European... and nothing else. Already, concerns have begun to grow across the world, especially in nations that lay within the territorial ambition of Yockey's Imperium."
 USA_news.22.a:0 "The West trembles"
 USA_news.23.t:0 "[GetNewspaperHeader]                                         Railway Workers Take Over America!"
 USA_news.23.desc:0 "After years of chaos and destruction which has pleagued America, an unlikely victor has emerged with the Railway Workers Revolt having seized the entire nation. Intially beginning as a protest against unsafe conditions and poor regulations resulting in constant derailings and loss of life under Oceanian rule, the revolt led by Robert Buckner Claytor has managed to rally the people against all opposition and forge a new government spanning the former United States.\n\nClaytor has promised sweeping changes, promising a more worker focused culture that promotes safety, better infrastructure and above all, fairness for all Americans."
 USA_news.23.a:0 "Nil Unquam Simile"
 USA_news.24.t:0 "[GetNewspaperHeader]                                         Great Lakes Moderates Vanquish\n                                         Radical Opponents!"
 USA_news.24.desc:0 "\nThe broken lands of America have been reunited, not by ideologues or radicals, but by the Great Lakes Federative Republic. Emerging from the Great Lakes as a broad coalition of democratic forces that were opposed to the extremists in the region in addition to Oceania, Robert D. Orr has successfully swept away all extremist influence across America, establishing a nation built upon the values of liberty, law, and above all, reason. Across the nation, legislative elections are being organised whilst radical forces still lingering on continue to be discreeted. The wartime curfews and restrictions have begun to be lifted as stability begins to return to America with a new sense of optimism for the future."
 USA_news.24.a:0 "Reason returns to America"
 USA_news.25.t:0 "[GetNewspaperHeader]                                         Rise of the People's Temple"
 USA_news.25.desc:0 "A new authority has emerged in America, though few will say it is much of an improvement from INGSOC. The People's Temple, a cult led by Jim Jones, has dominated the United States, bringing forth a twisted form of Christian Socialism that is neither Christian, nor Socialism. A Cult of Personality has arisen around Jim Jones, viewing him as a divine leader much akin to Big Brother in certain respects. Echoes of mass killings against dissenting towns have reverberated throughout the free world with entire neighbourhoods going dark overnight. Remnants of opposition churchs in the country have been crushed ruthlessly, the new government insisting that they are the only true Christians left on the planet and that all heretics to the faith need to be destroyed completely."
 USA_news.25.a:0 "Faith divorced from Christ"
 USA_news.26.t:0 "[GetNewspaperHeader]                                         The Darwinist Triumph!"
 USA_news.26.desc:0 "Social Darwinism has always factored itself into various radical ideologies that promote supremacy and strength among a people, but rarely has it been taken to the extremes it has in America under the rule of Neil Armstrong. Originating from Ohio, the new administration that has emerged has embraced an ideology that is almost entirely based around Social Darwinism.\n\nHere, the strong reign over the weak by whatever means they see fit. Men are encouraged to fight their own wars and to divorce themselves from ideologies and beliefs that keep them shackled. The watches on in apprehension as America, once a land of freedom and promise, becomes a nationwide Colosseum."
 USA_news.26.a:0 "Survival of the fittest"
 USA_news.27.t:0 "[GetNewspaperHeader]                                         Dixie Extremists Conquer America!"
 USA_news.27.desc:0 "The South has risen again, though the result is anything but moderate. Emerging from Arkansas as an ethnonationalistic authoritarian regime led by J. B. Stoner, the American Social Republic has begun the swift transformation of the nation into a segregationist state enforced by an authoritarian state with a powerful military apparatus.\n\nRacial policies have already begun to be enacted, ensuring all relations between whites and non-whites in any capacity are restricted. Minority districts & reservations within the nation have been established, with any non-white settlement outside of these districts strictly forbidden. It's a bad time to be a minority in America."
 USA_news.27.a:0 "The South rose again"
 USA_news.28.t:0 "[GetNewspaperHeader]                                         Longists Proclaim the\n                                         Union of America!"
 USA_news.28.desc:0 "\nBeginning as a movement in the north of Louisiana, the Longist Army led by Russell B. Long has swept across America, unifying the nation under his command. The descendant of famous governor Huey Long, Russell has followed in the footsteps of his father, pioneering the nation of 'Every Man a King', a leftwing populist philosophy that sought to elevate everyone to higher status and wellbeing, a stark contrast to the governing approach of Oceania. Though critised for his authoritarian tendencies, the outcome has already had notable change on American society, the reconstruction era providing new opportunities to citizens without any social or racial barriers standing in the way."
 USA_news.28.a:0 "Every Man a King!"
 USA_news.29.t:0 "[GetNewspaperHeader]                                         Proclamation of New Afrika"
 USA_news.29.desc:0 "For centuries, Black Americans were viewed as an underclass of America. When the Anti-Revolution made its way to North America, many figured that whoever would emerge victorious would be a primarily white led government. So it was surprising to the would when the victors of the American Anti-Revolution period were Black Nationalists from the South. With the proclamation of New Afrika, the new administration has flipped the script with the focus being on Black communities throughout America. But the emergence of a Black government in America may not last. Whites are still the Majority in America and if the status of Whites is too severely compromised, the results could spark another period of revolt."
 USA_news.29.a:0 "Turn tables"
 USA_news.30.t:0 "[GetNewspaperHeader]                                         The South Rises Again"
 USA_news.30.desc:0 "Following the end of the American Civil War, it was often said by those in the South following the conflict that the South would rise again. And over a hundred years after the conflict, not only has it done so, but it has taken control over the entire United States of America with the establishment of new Confederate States of America led by George Wallace.\n\nThough technically democratic in nature, there are clear issues with the system. Namely, the reintroduction of Jim Crow laws and the heavy restriction of Black Americans ability to participate in the democratic process, calling into question the Confederate States commitment to democracy and if it can reasonably called a free society."
 USA_news.30.a:0 "The civil war avenged"
 USA_news.31.t:0 "[GetNewspaperHeader]                                         Militarists Take Over of America"
 USA_news.31.desc:0 "What began as an army revolt at Fort Knox orchestrated by General David Shepard, the military led regime has since gone on to conquer the entirity of the United States of America, beginning the nation under the rule of military authority.\n\nGeneral Shepard has made his intentions clear over broadcast, pledging to begin a campaign to wipe away the remaining remnants of INGSOC and extremist radicals in America and restore order and stability across America. Though what wasn't mentioned was the status of military rule over the country, nothing was said about restoring democracy or some kind of civilian government, nor was anything said about the military stepping down."
 USA_news.31.a:0 "Order at last"
 USA_news.32.t:0 "[GetNewspaperHeader]                                         The Kennedy's Establish the\n                                         Commonwealth of America!"
 USA_news.32.desc:0 "\nAmerica has been reunited after years of warfare being waged across the coutnry, brother against brother, rebel against tyrants. And the one to reunite America is none other than John Fitzgerald Kennedy. Leading the the resistance in northern New England for years in the hopes of liberating the people from Oceanian rule, that dream has been fulfilled.\n\nWith JFK at the helm, the process of reconstruction and political restructuing has taken place to restore a safe and fair democratic republic that seeks to right the wrongs committed by the old regime and allow for Americans to reclaim their freedom and independence."
 USA_news.32.a:0 "Nothing bad ever happens to the Kennedy's!"
 USA_news.33.t:0 "[GetNewspaperHeader]                                         Patriots Reunite the United States!"
 USA_news.33.desc:0 "What began as a mix of rascals, conmen, mercenaries and young men too ambitious for their own good rallying in the North Country of New York State has produced a surprising outcome for America as Jordan Belfort and his compatriots have united the nation under his rule.\n\nWith the destiny out of the hands of Big Brother and into the hands of Jordan Belfort, change has come swiftly. Already, the Telescreens have been repurposed to promote entertainment rather than indoctrination & loyalty to an enigmatic leader, with the new administration placing an emphasis on growth, fulfillment, and a renewed sense of Patriotism for America."
 USA_news.33.a:0 "The wolves have claimed their territory"
 USA_news.34.t:0 "[GetNewspaperHeader]                                         Trumps America!"
 USA_news.34.desc:0 "After years of battle across the American continent, the United States of America have been brought back together under one single banner by Fred Trump. Once a local Party minister responsible for construction across New York City, Fred Trump has carried on his vision from the city of New York to the rest of America, envisioning a prosperous land of splendour, where American can build their future without fear of excessive government oversight.\n\nRoads and cities are being rebuilt, local governments restored and civil liberties unleashed. America has a long road ahead of it, filled with challenges and hard decisions, but with the nation freed from Oceanian rule, a bright future is now within reach."
 USA_news.34.a:0 "The Big Apple Trumps Big Brother!"
 USA_news.35.t:0 "[GetNewspaperHeader]                                         American Theocrats\n                                         Divine Proclamation"
 USA_news.35.desc:0 "\nThe resurgence of faith in America with the collapse of the Atheistic Oceanian regime was to be expected, though the rise of a theocratic Christian regime that deifies the Founding Fathers and the concept of American Exceptionalism as the next stage of Christian evolution was not on the cards. Yet, this is the new order that has taken the place of Oceania in America, guided by Wallie Amos Criswell, who is known by the public as 'The Prophet'. Though unusual on the surface, beneath lies something darker. Those of non-Germanic descendant are increasingly pushed aside with figures such as Abraham Lincoln & other liberal American historical figures are demonised as Anti-American."
 USA_news.35.a:0 "The Founding Fathers made divine"
 USA_news.36.t:0 "[GetNewspaperHeader]                                         National Socialists Establish the\n                                         American National Union"
 USA_news.36.desc:0 "\nWhen America stood triumphant alongside the Allied Powers following the end of World War Two, there were very few who believed that National Socialism would ever return. The ideology in the mind of many had been snuffed out. But with the fall of Oceania in North America and the emergence of George Lincoln Rockwell as the sole leader of America, National Socialism has returned in full force in a land much more powerful than Germany. Racial and social laws similar to the laws of the Third Reich have been put into place, communities have been segregated and the military in the process of being overhauled. A new titan has emerged and many fear war may soon come with it."
 USA_news.36.a:0 "It happened here"
 USA_news.37.t:0 "[GetNewspaperHeader]                                         Jimmy Carter Unites America!"
 USA_news.37.desc:0 "Emerging from Georgia as the face democratic resistance in the southern half of the Thirteen Sectors, few expected Jimmy Carter to be the one to be the face of a unified America. One of the many exiles that had fled to Liberia duing the fall of the pre-INGSOC Oceanian regime, Jimmy Carter had joined the exiles in returning to America in the wake of the Anti-Revolution breaking out across Oceania, rising as a key individual in the new government.\n\nWith Carter at the helm, the new President has promised peace for the American people, pledging to focus on internal affairs whilst keeping a strong enough military force to keep the country safe from outside threats, both foreign and domestic."
 USA_news.37.a:0 "Peace in our time?"
 USA_news.38.t:0 "[GetNewspaperHeader]                                         Floridian Rebels Retake America!"
 USA_news.38.desc:0 "One of the oldest rebel movements in North America since the rise of INGSOC to power, the Rebel Army of Florida has not only successfully liberated their state, but has carried that momentum to liberate the rest of America from Oceanian rule. Bringing the nation together under a new government as the Commonwealth of America, the interim President, Billy Waugh, has pledged a long term plan for the nation, beginning with a restoration of peace and stability across the land, follwoed by a comprehensive reconstruction plan aimed to rebuild critical infrastructure and revitalise key aspects of the eocnomy, before finally concluding with a process of organising national elections and returning political power over the nation back to the American people."
 USA_news.38.a:0 "One step at a time."
 USA_news.39.t:0 "[GetNewspaperHeader]                                         Rogue Oceanian Governor\n                                         Establishes the North American \n                                         Social Republic!"
 USA_news.39.desc:0 "\n\nRebellion within the ranks of INGSOC's Inner Party is never tolerated by Oceania, and is often dealt with severely by the Party apparatus. However, rebellion has never come from the administrator of a province himself. With the shattering of Oceanian authority across America and the emergence of warlord factions, John Staunto, who ruled the Thirteen Sectors, took advantage of the conflict to initiate a coup against his own Party, sweeping them away in favour of establishing his own version of America. Ruling with iron fist, Stauton promotes a culture of visionary strength, believing that those with the will and vision to rule must do so with extreme prejudice."
 USA_news.39.a:0 "Seems a little unhinged, doesn't he?"
 SOV_news.1.t:0 "[GetNewspaperHeader]                                         Reformation of the Soviet Union"
 SOV_news.1.desc:0 "The revolutions and rebellions that have engulfed much of the Eurasian provinces of Eastern Europe, Siberia and Central Asia has come to a conclusion, with the old spectre of communism reemerging in force from the ashes of conflict Eurasian control under the control of Marshal Dimitry Yazov. From the Kremlin in the heart of Moscow, Marshal Yazov has formally declared the return of the Union of Soviet Socialist Republics, with all Soviet Republics being formally integrated into the reformed Soviet political structure.\n\nThe red spectre of communism has returned to Eastern Europe, and as it's gaze begins to turns toward Europe."
 SOV_news.1.a:0 "The Red Spectre Returns"
 RUS_news.1.t:0 "[GetNewspaperHeader]                                         Russian Reunification"
 RUS_news.1.desc:0 "After several long years of waging intense war, from the frozen plains of Siberia to the gates of Moscow, the Russian Federation has emerged as the ruling authority of all Russians, from the Baltic Sea to the Bering Strait, from the Black Sea to the Barents and everywhere in between.\n\nUnder the leadership of Vasily Shukshin, a former Eurasian administrator of the Far Eastern District turned President of the newly proclaimed Russian Federation, the President has promised to restore stability & security to Russia and her people, combat the forces of Neo-Bolshevism and guarantee of security & protection of all Russians inside and outside of Russia."
 RUS_news.1.a:0 "The Motherland Restored"
 RUS_news.2.t:0 "Siberian War"
 RUS_news.2.desc:0 ""
 RUS_news.2.a:0 "Siberia Awakens"
 RUS_news.3.t:0 "Russian Invasion of Eastern Europe"
 RUS_news.3.desc:0 ""
 RUS_news.3.a:0 "The war for Russia's future begins"
 RSE_news.1.t:0 "[GetNewspaperHeader]                                         Reformation of the Russian Empire"
 RSE_news.1.desc:0 "Many long decades ago, catastrophe had struck Russia. The then Russian Empire was shattered by the German Empire, submerging the country into a revolution which saw the communist movement under Lenin take over the Russia and deposing the Tsar. But decades later, that event has officially been undone. The Russian Empire has returned with Tsar Vladimir III having cemented his rule over Russia, undoing the 1917 Revolution and bringing about Imperial rule once more.\n\nIt is unclear what the future of Russia will be with a Tsar back on the throne, but one thing is certain. The global communist movement across the globe now has a very vengeful enemy."
 RSE_news.1.a:0 "The Romanov's Redeemed"
 GER_news.1.t:0 "[GetNewspaperHeader]                                         German Reunification War"
 GER_news.1.desc:0 "Following over a year of relative peace, the divided lands of Germany have sparked into all out conflict following a series of escalating skirmishes along the borders of the German States. All parties involved, viewing this as an opportunity to reunite all German lands under their respective governments, have refused any negotiations and mediations offered by Polish and Czech diplomats.\n\nAlready, hundreds of thousands of German men have been returned to the field of battle, brother against brother in the goal to bring about a unified Germany. A united Germany is an inevitability now. The only real question left is which Germany shall be the last one left standing?"
 GER_news.1.a:0 "Germany in flames"
 CHI_news.1.t:0 "[GetNewspaperHeader]                                         The Second Chinese Revolution"
 CHI_news.1.desc:0 "More than half a century since the first shots echoed across Wuchang, a new revolutionary war has broken out in China. Amidst the chaos in East Asia, the National Revolutionary Army, thought to have been exterminated in the fall of Taiwan, suddenly declared an uprising against the Kim Dynasty.\n\nLed by Chiang Wei-kuo, the National Revolutionary Army proclaimed its intent to restore the Republic of China across their former territories and rid their lands of Juche occupation. Speaking from the Victory Palace in Hanseong, Kim Jong Il vowed to crush all Anti-Juche agitators across East Asia, wherever they come from."
 CHI_news.1.a:0 "Will they succeed this time?"
 CHI_news.2.t:0 "[GetNewspaperHeader]                                         The Kuomintang Unites China!"
 CHI_news.2.desc:0 "After years of warfare from the gates of Nanjing to the mountains of Tibet, resisting the East Asian occupation of China in the hopes of restoring the republic, the National Revolutionary Army has emerged victorious in its chaotic bid to unite China.\n\nUnder the leadership of Chiang Wei-kuo, son of the late Chiang Kai-shek, who now assumes his father's position of President of the newly proclaimed Republic of China, the President has promised to uphold the vision of Sun Yat-sen, eliminate the remnants of Juche within the nation, and restore China's prestige on the international stage."
 CHI_news.2.a:0 "Sun's dream becomes reality"
 CHI_news.3.t:0 "[GetNewspaperHeader]                                         The Second Chinese Revolution"
 CHI_news.3.desc:0 "When the Tongmenghui revolted against the Qing Dynasty, the Chinese State saw a political transformation that ended a centuries-long dynasty. Decades later, Mao Zedong attempted to stage a second revolution and transform China to a more radical degree before perishing.\n\nNow, the inheritors of the original PLA have united China, led by Mao Anying, son of the late Chairman. As red banners flew across the nation, Mao announced the \"Great Leap Forward\", a socioeconomic campaign to transform China from an agrarian society to an industrial society. The world can only watch as China undergoes yet another transformation."
 CHI_news.3.a:0 "Mao's revolution avenged"
 CHI_news.4.t:0 "[GetNewspaperHeader]                                         The Restoration of The Great Qing!"
 CHI_news.4.desc:0 "Decades ago, chaos struck China as the Tongmenghui overthrew the centuries-old Qing Dynasty. The decades afterwards were defined by warlordism and endless fighting that eventually led to the fall of China into the hands of Juche forces. But decades later, the failures of the Chinese Revolution have been rectified with the return of Emperor Pujie, cementing his rule across China, undoing the 1911 Revolution, and returning China to Dynastic rule once more.\n\nIt is uncertain what the future will hold for China now that the Emperor is back on the throne, but one thing is certain. The centre of the old order has returned, and it is not going away any time soon."
 CHI_news.4.a:0 "The Dragon Throne reclaimed"
 CHI_news.5.t:0 "[GetNewspaperHeader]                                         Federalists Unite China!"
 CHI_news.5.desc:0 "What initially began as a series of riots across Guangdong quickly escalated to a full-scale revolt in southern China. Originally a Cantonese secessionist movement, no one could have expected the Guangzhou Federalist Government to sweep across China and become its sole authority.\n\nTaking after the ideals of the late Chen Jiongming, the new government has proclaimed the establishment of the Federal Republic of China, acknowledging the vast diversity of China, the Guangzhou government promises democracy and a voice for all people across China, not just the Han majority. The future for this new federation remains uncertain, but the promises have given hope for a better tomorrow."
 CHI_news.5.a:0 "A new direction for China"
 JAP_news.1.t:0 "[GetNewspaperHeader]                                         Imperialist Uprising"
 JAP_news.1.desc:0 "With chaos growing ever more present on mainland East Asia, it was only a matter of time before those on the islands east of the mainland would take notice. And they most certainly did, with the Second Righteous Army of Japan, a long standing guerilla movement that fought against East Asian rule, has risen up to battle against ruling Juche authorities.\n\nLead by Yukio Mishima, the Second Righteous Army has declared their intent to free Japan from foreign rule once and for all and to restore the rule of the Emperor's of Japan. Perhaps the most shocking of all is the emergence of an heir, a survivor of the massacre of the Imperial Family, an event that broke Japan in the first place."
 JAP_news.1.a:0 "Banzai!"
 JAP_news.2.t:0 "[GetNewspaperHeader]                                         Japanese Independence"
 JAP_news.2.desc:0 "For many long years, Japan had been broken and beaten by East Asia, reduced to a shattered remnant of what it used to be. A nation robbed of its pride and of its dignity, its fate for a long time had seemed sealed. But no longer, for after much struggle and hardship, the Second Righteous Army of Japan has triumphed against their foes, freeing Japan from occupation and from shame.\n\nAcross Japan, jubilation and celebration have taken place, the armies of East Asia expelled from their homes. With the Crown Prince of Japan soon to be formally coronated to the Chrysanthemum Throne, spirits and hopes are high as Japan gets to chart its own destiny once more."
 JAP_news.2.a:0 "The sun rises again"
 BRA_news.1.t:0 "[GetNewspaperHeader]                                         Brazilian Military Remnants Unite!"
 BRA_news.1.desc:0 "Following the Invasions of Latin America and subsequent Oceanian stalling in South America, Brazil had been left a broken remnant of itself, with much of it's populous eastern regions seized by Oceanian forces with the rest of the country under more decentralised rule.\n\nThis has begun to change, however, as most of the surviving provinces of Brazil have rallied under the leadership of General Joao Figueiredo, leading from the city of Brasilia. Beginning the consolidation of his territory under a more centralized state, the General has pledged to bring Rondonia and Rio Grande do Sul back into the fold and to prepare for renewed conflict against Oceania to reunite all of Brazil."
 BRA_news.1.a:0 "Is Brazil on the rise?"
 BRA_news.2.t:0 "[GetNewspaperHeader]                                         Brazilian Reclamation War!"
 BRA_news.2.desc:0 "Following the Oceanian invasion of the remaining South American nations, General Figueiredo has declared that the day Brazil has long prepared for had come. As Oceanian troops crossed into Brazilian territory, Brazil was swift to refer to the conflict as the long awaited the Brazilian Reclamation War, Brasilia declaring it's intent to recapture the eastern lands of Brazil from Oceania and remove the presence of INGSOC from South America.\n\nThe SAUF, whom has also endured attacks on their member states, have backed Brazil's war aims, with mass mobilisation across the United Front taking place. The South American War has begun, and the fate of the continent now hangs in the balance."
 BRA_news.2.a:0 "Unity through blood and fire"
 BRA_news.3.t:0 "[GetNewspaperHeader]                                         Brazilian Reunification!"
 BRA_news.3.desc:0 "After years of fighting across vast territories, with thousands of lives put to rest, the objective of General Figueiredo has been achieved with the reclamation of all territories of Brazil. Across the cities of Brazil, celebrations reigned as Brazil's humiliation was overcome with triumph. But no celebration was larger than in the liberated city of Rio de Janeiro where millions took to the street to bring forth the first carnival to be held in the city in many long years. Song and dance filled the air, hope for a new beginning in the air. Though perhaps not as diverse and organised in the past compared to other carnivals, it was no less important to the people. Though questions linger on what comes next, for now, the joy of today reigns in Brazil."
 BRA_news.3.a:0 "Order and Progress!"
 PHI_news.1.t:0 "[GetNewspaperHeader]                                         Revolution in the Philippines"
 PHI_news.1.desc:0 "The military government in the Philippines has been overthrown by a revolution lead by Ninoy Aquino Jr. and opposition after the death of Ferdinand Marcos.\n\nThe ousting of successor Cesar Virata by many Marcos Loyalists had angered the populous, which prompted protests following the coup d'etat. The military government unable to decide on their response, caused protestors to storm Malacanang Palace, causing mass resignations. \n\nFollowing the resignations, Generals Fidel V. Ramos and Juan Enrile allowed a restoration of freedoms and Ninoy Aquino to become the new president before elections can be held in 1992."
 PHI_news.1.a:0 "Will this democracy survive?"
 PHI_news.2.t:0 "[GetNewspaperHeader]                                         Failed Coup in the Philippines"
 PHI_news.2.desc:0 "A recent coup d'etat in the Philippines by an army faction known as RAM-AFP has failed. President Ninoy Aquino Jr. has announced that coup plotters have either fled or been captured, with RAM-AFP being essentially unable to fight. RAM-AFP had originally sided with the democratic opposition during the EDSA Revolution, but had split as key figures such as Juan Ponce Enrile had joined the new government. The coup d'etat had been the biggest coup d'etat out of many against the new Philippine Government.\n\nIt seems however with the end of fighting, the coup d'etat attempts will end."
 PHI_news.2.a:0 "Democracy lives another day"
 PHI_news.3.t:0 "[GetNewspaperHeader]                                         Civil War in the Philippines"
 PHI_news.3.desc:0 "The Philippines has collapsed into a civil war after intense fighting in Manila, with coup plotters barely being able to push the democratic government outside of the city. RAM-AFP, a faction in the Philippine Army had launched a coup d'etat to overthrow the Philippine Government. This ended in a pyrrhic victory, with many regions that are pro-Ninoy refusing to side with the military junta. Other regions have been taken over by Maoist rebels or sided with the new government, the ARMM region has also seceded under Nur Misuari.\n\nFighting is likely to grow country-wide and has no sign of ending."
 PHI_news.3.a:0 "Forsaken by God"
 PHI_news.4.t:0 "[GetNewspaperHeader]                                         Military Coup in the Philippines"
 PHI_news.4.desc:0 "The Philippine Government has been overthrown by a military junta by Gregorio Honasan. Under the RAM-AFP Faction of the Philippine Army. With the intention to fix the army due to a lack of attention given after the People's Power Revolution.\n\nRAM-AFP originally sided with the democratic opposition, however following a split with its leaders, remaining officers plotted to overthrow the government in order to fix the army and re-secure authority in the Philippines. Under Gregorio Honasan, and other allies like Pro-Marcos loyalists such as Fabien Ver, the country has returned to authoritarian rule."
 PHI_news.4.a:0 "Another twenty years of dictatorship"
 PHI_news.11.t:0 "[GetNewspaperHeader]                                        Mount Pinatubo Erupts"
 PHI_news.11.desc:0 "Reports from the Philippines have stated that Mount Pinatubo has erupted in the second largest volcanic eruption of the century. With 17 megatons of sulfur dioxide and 70 megatons of TNT all spewing out in the volcano near many Filipino towns and cities. Early warnings had managed to evacuate thousands, yet hundreds have been killed or reported missing and tens of billions of pesos in damages have to be cleaned up, as ash, sand, and lahar flow onto the plains. Blocking the Tarlac River and causing major damage to the local environment and agriculture, most especially on rice farmers. With ash clouds reaching more than 30 kilometres into the atmosphere causing global temperatures to cool, most especially in Southeast Asia."
 PHI_news.11.a:0 "May God save them"
 PHI_news.5.t:0 "[GetNewspaperHeader]                                         Ninoy Aquino Wins 1992 Election"
 PHI_news.5.desc:0 "Ninoy Aquino Jr., leader of the opposition against Marcos has won the 1992 Philippine Election. Gaining a strong majority of voters through his legacy of heading the UNIDO Coalition against Ferdinand Marcos Sr. and his dictatorship.\n\nNinoy Aquino Jr. who had been imprisoned, nearly killed, and exiled during the Marcos Regime had been a popular figure ever since he voiced out his strong opinions against the Marcos regime. He promises to enshrine democracy in the country while providing more support towards education and poorer families, in order to prevent another dictatorship from gaining hold once more."
 PHI_news.5.a:0 "An expected result"
 PHI_news.6.t:0 "[GetNewspaperHeader]                                         Salvador Laurel Wins 1992 Election"
 PHI_news.6.desc:0 "In an interesting turn of events, Salvador Laurel has won the 1992 Philippine Election. With a large voter base of Christians and Conservatives alike. Running under Partido Nacionalista, he promises to promote Philippine Culture, and allow help to come in the economy for the poor. \n\nSalvador Laurel is part of a lineage of politicians in the family, Jose P. Laurel, former Philippine president under Japan being his father. Salvador Laurel had opposed Marcos with fiery speeches. His strong stance in wanting to promote Philippine Culture and help the poor is expected to help revitalize Filipino values and the economy."
 PHI_news.6.a:0 "What an interesting stance"
 PHI_news.7.t:0 "[GetNewspaperHeader]                                         Jovito Salonga Wins 1992 Election"
 PHI_news.7.desc:0 "With the 1992 election settled, an unexpected candidate has won the election. Jovito Salonga, an advocate of democracy and of honest government. His campaign has entirely focused on bringing in honesty to the government and revitalizing education for a better democracy. \n\nSalonga was from a poorer family, yet through hard studying managed to study in America. He was a victim of the Plaza Miranda Bombing, opposing Marcos throughout it. His long time opposition against Marcos and genuine speeches had brought in immense popularity. With his presidency secured, the Philippines is expected to go a more free path."
 PHI_news.7.a:0 "An honest Filipino government?"
 PHI_news.8.t:0 "[GetNewspaperHeader]                                         RAM-AFP wins in Civil War"
 PHI_news.8.desc:0 "The RAM-AFP Government has announced that they have won in the Philippine Civil War following brutal fighting with the New People's Army and the Provisional Government of the Philippines.\n\nThe Philippine Civil War has brought immense destruction to the Philippines, billions upon billions of dollars of damage has been caused, and many have lost their lives or have been forced to flee elsewhere. Sporadic fighting still continues in the mountains and banditry is common. The RAM-AFP government has re-assured the country that they will rebuild however despite this post-war chaos and re-open to the global economy."
 PHI_news.8.a:0 "Its light fades"
 PHI_news.9.t:0 "[GetNewspaperHeader]                                         Philippines taken over by Maoists"
 PHI_news.9.desc:0 "In an unexpected turn of events, the New People's Army, lead by Jose Maria Sison has won the Philippine Civil War. Bringing in a new age of the Philippines with Maoism. Jose Maria Sison has re-assured the populous that everything will change for the better.\n\n The Philippine Civil War has brought immense damage to the Philippines, causing billions of pesos in damages and many losses of life. It is with no doubt that large changes will come through this, with the New People's Army being more strict on the Church and wishing to root out the dynastic families in the Philippines that have existed since colonial times."
 PHI_news.9.a:0 "Maoism lives elsewhere"
 PHI_news.10.t:0 "[GetNewspaperHeader]                                        Opposition wins in the Philippines"
 PHI_news.10.desc:0 "The Provisional Government of the Philippines has won the Civil War in the Philippines, promising to restore democratic values and local freedoms across the whole country. Despite their victory sporadic fighting continues in rural areas.\n\nBillions of dollars in damages were caused by the Philippine Civil War, and many have died or been forced to flee to other regions or to neighboring countries. However, some have begun returning due to the oppositions large support from the local population. Rebuilding will take years, if not decades. Elections are also temporarily suspended until 1998."
 PHI_news.10.a:0 "Can democracy survive after all this?"
 MAL_news.1.t:0 "[GetNewspaperHeader]                                         Iskandar becomes King of Malaysia"
 MAL_news.1.desc:0 "Sultan Iskandar of Johor has officially become new King of Malaysia. Following Malaysia's unique system where sultans and kings with constitutional power have an election every five years to determine on who should be king.\n\nSultan Iskandar has lived a quiet life before his election. Studying abroad before fleeing during the Third World War. He was appointed in various positions of power within Johor before becoming the regent following his father's death. It is expected that Malaysia's economic growth will continue to be sustained under him so long as Mahatir Mohamed remains in power."
 MAL_news.1.a:0 "My hopes are still in Malaysia"
 SUD_news.1.t:0 "[GetNewspaperHeader]                                         Sudan Reunification"
 SUD_news.1.desc:0 "The Second Sudanese Civil War that has raged since 1983 has come to an end as the Khartoum government backed by OPFOR forces have brought an end to the conflict and has reunified all Sudanese lands once more.\n\nIn a speech to the nation, Gaamar Nimeiry has pledged to begin reconstruction of the southern lands and has vowed to wipe away any lingering rebel presence in the region. In that same speech, in recognition of the efforts of the Iraqi Republic in helping to crush the South Sudanese rebels, Gaamar had also announced Sudan would be joining Opposition Force, an action that grants the faction a formal foothold in Africa and the Red Sea."
 SUD_news.1.a:0 "Sudan restored"
 SUD_news.2.t:0 "[GetNewspaperHeader]                                         South Sudan Secures Independence"
 SUD_news.2.desc:0 "Combined with external pressure and a stalling frontline, the Sudan has capitulated to South Sudanese demands backed by the Ethiopian Empire and has allowed for South Sudan to go free. The division of Sudan has created turmoil within the already fragile Democratic Republic of Sudan, with the nation losing faith in it's Gaamar Nimeiry.\n\nIn South Sudan, however, celebrations have occured across the land, their independence from the Arab dominated Sudan now secured. Already, the newly formed South Sudanese government has joined hands with their Ethiopian sponsors and have joined the East African Entente, shifting the balance of power in Africa."
 SUD_news.2.a:0 "A new nation emerges"
 YEM_news.1.t:0 "[GetNewspaperHeader]                                         Yemen Civil War"
 YEM_news.1.desc:0 "After many years of tension, the civil war in Yemen has reignited with North Yemeni troops, backed by Iraq, invading into the territory of Communist ruled People's Republic of Southern Yemen.\n\nAli Abdullah Saleh, ruler of the Yemen Arab Republic, has vowed to bring unity to Yemen and to destroy Marxist opposition that has ruled Southern Yemen, declaring them nothing more than 'Neo-Eurasianist Puppets' and a threat to the entire Arab World.\n\nAli Nasir Muhammad, ruler of South Yemen, has disavowed these claims, calling the actions of North Yemen completely unjustified."
 YEM_news.1.a:0 "Blood on the Red Sea"
 EGY_news.1.t:0 "[GetNewspaperHeader]                                         Egyptian National Reclamation"
 EGY_news.1.desc:0 "After years of preparation and waiting, with the instablity rocking Eurasia has presented the Egyptian remnants with the opportunity to strike directly at the Nile-Suez Military Administration and reclaim the entirely of Egypt from the now isolated occupation forces. Thousands of troops flow up the Nile river, bringing with them weaponry supplied by OPFOR and the determination to expell the enemy from Egyptian soil.\n\nThe Iraqi Government was swift to back Egyptian efforts, promising aid in their fight, whilst other Free Nations voice offer their support for Egypt, the desire to weaken the Super States superseding any bickering and rivalries within the Free World."
 EGY_news.1.a:0 "The Nile Burns"
 EGY_news.2.t:0 "[GetNewspaperHeader]                                         Egyptian Triumph!"
 EGY_news.2.desc:0 "The division of Egypt has come to an end as OPFOR backed Egyptian forces have successfully crushed all occupation and collaborationist forces that had long occupied the core of Egypt. Egyptian troops had arrived in Cairo with a heroes welcome from the populace, with whatever is left of Eurasia's forces having fled to Alexandria to be evacuated from the region, if there is even somewhere to evacuate to. Across the nation, millions have joined together in celebration of the reunification of the nation and the liberation from outside rule. The victory has also been felt throughout the Arab World, with the Iraqi's celebrating the return of their volunteers from the war and the rise of their newest member of OPFOR."
 EGY_news.2.a:0 "The Lions of Cairo!"
 EGY_news.3.t:0 "[GetNewspaperHeader]                                         Neo-Bolshevik Conquest of Egypt"
 EGY_news.3.desc:0 "What seemed at first to be a bold strike to liberate northern Egypt from the unstable and isolated forces of the Nile-Suez Military Administration has became a devastating catastrophe as Eurasian and collaborationist forces have successfully broken Egyptian and OPFOR forces in the region, sweeping down the Nile River into the city of Aswan, ensuring the effective destruction of Egyptian resistance in the region.\n\nThe Egyptian Salvation Army has been shattered and scattered, with remnant divisions fleeing into the Sahara, promising to continue the fight whilst OPFOR forces flee into Sudan, their attempt to retake Egypt ending in devastating failure."
 EGY_news.3.a:0 "The Nile is Red"
 SAS_news.1.t:0 "United Provinces of India Established"
 SAS_news.1.desc:0 "After years of bombings and warfare over the region between the Super States, with territories largely governed by warlords, militias and regional governors holding onto power, the once broken lands of Northern India, sponsored by the neighbouring Bengal Confederation, has established a national government in Delhi.\n\nThough the new government is young and has many challenges, both domestic and abroad, the return of India marks a significant turning point for the Resistance. With the Super States still in chaos, the Free World continues to capitalise on its weakness, successfully transforming a major battlefield between Oceania, East Asia and Eurasia, into a unified stronghold that will not be so easily conquered."
 SAS_news.1.a:0 "India Arises from the Ashes"
 SAS_news.1.b:0 "A Bulwak Against Totalism"
 SAS_news.1.c:0 "OPPOSITION HAS EMERGED"
 WW4_news.1.t:0 "[GetNewspaperHeader]                                         World War Four"
 WW4_news.1.desc:0 "Following reunification and the restabilisation of Oceanian territories, the English Socialist States of Oceania have forever shifted the balance of power by leaving behind the old system of skirmishes and occasional bombings, instead commencing a formal invasion of Eurasia and East Asia.\n\nAcross the Earth, millions in the super states are being mobilised once more for warfare, not to take down rebels or participate in skirmishes against the free territories, but to commence the total conquest of the Earth. The free nations, sensing the impending chaos and the likelihood of it spreading into their lands, have begun the process of mobilisation and preparation for the coming global conflict."
 WW4_news.1.a:0 "The Earth Trembles"
 WW4_news.2.t:0 "[GetNewspaperHeader]                                         World War Four"
 WW4_news.2.desc:0 "In the wake of the reunification of the Eurasian lands, the Union of Eurasian Socialist Republics has launched a full-scale invasion of the Democratic People's Republic of East Asia. This transition from a state of superficial hostilities to all-out warfare represents a shift in the geopolitical landscape, with both superstates no longer willing to coexist. Instead, their focus has now turned to eradicating one another until only one remains.\n\nThe conflict is to become the most destructive war in global history, with devastating ramifications for all nations. As violence escalates,  Oceania, likely to view this change in protocol with great hostility. The consequences of this escalation could set off ripples across the globe, changing the world forever."
 WW4_news.2.a:0 "The Earth Trembles"
 WW4_news.3.t:0 "[GetNewspaperHeader]                                         World War Four"
 WW4_news.3.desc:0 "Following the reunification and restabilisation of East Asian territories, the Democratic People's Republic of East Asia has launched a full-scale invasion of the Union of Eurasian Socialist Republics, ditching the decades-long order of performative skirmishes in favor of total warfare.\n\nAcross the world, nations are taking notice of the \"Great Eurasian War\" between the two superstates, with Oceania likely to mobilise in retaliation for the breach of the world order. The Free Nations, seeing the likelihood of the GEW spilling over into their nations, have begun mobilising their militaries for what is likely to be the most devastating war in global history, forever changing the fate of humanity."
 WW4_news.3.a:0 "The Earth Trembles"